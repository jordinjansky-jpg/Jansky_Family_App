<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#141413">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/app-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/app-icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Family Hub — Activities</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/activities.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div id="bannerMount"></div>
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>
  <div id="sheetMount"></div>
  <div id="fabMount"></div>
  <div id="fsTimerMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import {
      initFirebase, isFirstRun, isDev,
      readSettings, readPeople, readActivities, readActivitySessions,
      readAllActiveTimers, readAllActivityEarnings,
      subscribeActiveTimers,
      writeActiveTimer, clearActiveTimer,
      pushActivitySession, updateActivitySession, removeActivitySession,
      removeActivityEarning,
      onConnectionChange,
      onAllMessages, writeMessage, markMessageSeen, removeMessage,
      writeBankToken, markBankTokenUsed, readBank, writeMultiplier,
      readRewards
    } from './shared/firebase.js';
    import {
      initBottomNav, renderHeader, initBell,
      showConfirm, showToast,
      initOfflineBanner,
      renderBottomSheet, renderFormSheetHeader, renderFormFooter,
      renderChipPicker, bindChipPicker,
      renderDateInput, bindDateInput,
      renderFab, applyDataColors
    } from './shared/components.js';
    import { todayKey, weekStart, weekEnd, addDays, detectTimezone, formatDateShort } from './shared/utils.js';
    import {
      elapsedMs, formatElapsed,
      pause as pauseTimer,
      resume as resumeTimer,
      finalDurationMin,
      isForgotten
    } from './shared/timer.js';
    import { applyTheme, resolveTheme, applyTextSize } from './shared/theme.js';

    // ── Module-scoped state ──
    let settings = {}, people = {}, activities = {}, sessions = {}, activeTimers = {}, earnings = {};
    let rewardsData = {};
    let activeTab = 'today';
    let activePersonId = null; // null = All
    let displayInterval = null;
    let headerInitialized = false;

    // ── Full-screen timer overlay state ──
    let openOverlayOnNextRender = null; // personId — set ONLY by same-device Start tap
    let currentOverlayPersonId = null;  // personId currently shown in overlay, or null

    // ── Cached theme ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun && !isDev) { window.location.href = 'setup.html'; }

    // ── Load data + boot ──
    await loadData();

    if (settings?.theme) applyTheme(resolveTheme(settings.theme));
    if (settings?.textSize) applyTextSize(settings.textSize);

    // ── Restore person filter from localStorage ──
    try {
      const saved = localStorage.getItem('activities-active-person');
      if (saved && saved !== 'all' && people[saved]) {
        activePersonId = saved;
      } else {
        activePersonId = null;
      }
    } catch { activePersonId = null; }

    // ── Show content ──
    document.getElementById('loadingState').style.display = 'none';
    const mainContent = document.getElementById('mainContent');
    mainContent.style.display = '';

    // ── Header ──
    initOfflineBanner(onConnectionChange);

    // ── Nav ──
    initBottomNav({
      navMount:    document.getElementById('navMount'),
      activePage:  'activities',
      sheetMount:  document.getElementById('sheetMount'),
      getTheme:    () => settings?.theme,
      personOpts:  undefined,
      currentPage: 'activities',
    });

    // ── Initial render ──
    render();

    // ── Bell (one-time init after first render) ──
    // initBell expects people as an ARRAY with .id, but we store it as an object keyed by id.
    initBell(
      () => Object.entries(people).map(([id, p]) => ({ id, ...p })),
      () => rewardsData,
      onAllMessages,
      {
        writeMessageFn: writeMessage,
        markMessageSeenFn: markMessageSeen,
        removeMessageFn: removeMessage,
        writeBankTokenFn: writeBankToken,
        markBankTokenUsedFn: markBankTokenUsed,
        readBankFn: readBank,
        writeMultiplierFn: writeMultiplier,
        getTodayFn: () => todayKey(settings.timezone || detectTimezone()),
        approverName: null
      }
    );
    headerInitialized = true;

    // ── Header gear → admin ──
    document.getElementById('headerAdmin')?.addEventListener('click', () => {
      location.href = 'admin.html';
    });

    // ── FAB → create new activity (deep-links to admin) ──
    document.getElementById('fabMount').innerHTML =
      renderFab({ id: 'fabAddActivity', label: 'Add activity' });
    document.getElementById('fabAddActivity').addEventListener('click', () => {
      const envFlag = new URLSearchParams(location.search).get('env');
      const envParam = envFlag ? `?env=${encodeURIComponent(envFlag)}` : '';
      location.href = `admin.html${envParam}#activity/new`;
    });

    // ── Subscribe to active timers for live updates ──
    subscribeActiveTimers(t => {
      activeTimers = t || {};
      render();
    });

    // ── Data ──

    async function loadData() {
      const [s, p, a, sess, tim, earn, rwd] = await Promise.all([
        readSettings(),
        readPeople(),
        readActivities(),
        readActivitySessions(),
        readAllActiveTimers(),
        readAllActivityEarnings(),
        readRewards()
      ]);
      settings    = s    || {};
      people      = p    || {};
      activities  = a    || {};
      sessions    = sess || {};
      activeTimers = tim  || {};
      earnings    = earn || {};
      rewardsData = rwd   || {};
    }

    // ── Full-screen timer overlay ──

    function fsTimerProgress(personId) {
      const t = activeTimers[personId];
      if (!t) return { progress: 0, goalHit: false, elapsedMinNow: 0, goalMinutes: 0, paceTarget: 0 };
      const tz = settings.timezone || detectTimezone();
      const a = activities[t.activityId] || {};
      const goalMinutes = a.goalMinutes || 0;
      let progress = 0;
      let paceTarget = 0;
      // Minutes elapsed so far in this session (running portion only)
      const sessionMs = elapsedMs(t);
      // Saved minutes today (excluding the live session)
      const savedToday = minutesForActivityToday(t.activityId, personId, tz);
      const elapsedMinNow = savedToday + sessionMs / 60000;

      if (a.goalPeriod === 'weekly') {
        // Pace bar: same as Today tab primary bar
        const wkMins = minutesForActivityThisWeek(t.activityId, personId, tz);
        const days = daysRemainingInWeek(tz);
        paceTarget = paceMinutesToday(wkMins - savedToday, goalMinutes, days);
        // Include live session minutes in today's pace progress
        const todayMinsLive = savedToday + sessionMs / 60000;
        progress = paceTarget > 0 ? Math.min(1, todayMinsLive / paceTarget) : (wkMins >= goalMinutes ? 1 : 0);
      } else {
        // Daily: progress = total today (saved + live) vs goalMinutes
        progress = goalMinutes > 0 ? Math.min(1, elapsedMinNow / goalMinutes) : 0;
        paceTarget = goalMinutes;
      }

      return { progress, goalHit: elapsedMinNow >= goalMinutes, elapsedMinNow, goalMinutes, paceTarget };
    }

    function buildOverlayHtml(personId) {
      const t = activeTimers[personId];
      if (!t) return '';
      const person = people[personId] || { name: personId };
      const a = activities[t.activityId] || { name: 'Activity', emoji: '·' };
      const elapsed = formatElapsed(elapsedMs(t));
      const paused = !!t.pausedAt;
      const { progress, goalHit } = fsTimerProgress(personId);
      const circumference = 565.49;
      const dashoffset = (circumference * (1 - progress)).toFixed(2);

      return `
        <div class="fs-timer__inner">
          <button class="fs-timer__close" id="fsTimerClose" aria-label="Close overlay" type="button">&#x2715;</button>
          <div class="fs-timer__center">
            <div class="fs-timer__emoji">${a.emoji || '·'}</div>
            <div class="fs-timer__name">${escapeHtml(a.name)}</div>
            <div class="fs-timer__person">for ${escapeHtml(person.name)}</div>
            ${goalHit ? '<div class="fs-timer__goal-chip"><span class="chip chip--success">✓ Goal hit!</span></div>' : ''}
            <div class="fs-timer__ring-wrap">
              <svg class="fs-timer__ring" viewBox="0 0 200 200" width="240" height="240" aria-hidden="true">
                <circle class="fs-timer__ring-track" cx="100" cy="100" r="90" />
                <circle class="fs-timer__ring-fill${goalHit ? ' fs-timer__ring-fill--success' : ''}" cx="100" cy="100" r="90"
                        stroke-dasharray="${circumference}" stroke-dashoffset="${dashoffset}" />
              </svg>
              <div class="fs-timer__readout" data-fs-readout="${personId}">${elapsed}</div>
            </div>
          </div>
          <div class="fs-timer__actions">
            <button class="btn btn--secondary fs-timer__btn" id="fsTimerToggle" data-person-id="${personId}" type="button">${paused ? 'Resume' : 'Pause'}</button>
            <button class="btn btn--primary fs-timer__btn fs-timer__btn--stop" id="fsTimerStop" data-person-id="${personId}" type="button">Stop</button>
          </div>
        </div>
      `;
    }

    function openFullScreenTimer(personId) {
      currentOverlayPersonId = personId;
      const mount = document.getElementById('fsTimerMount');
      if (!mount) return;
      mount.innerHTML = `<div class="fs-timer" id="fsTimerOverlay">${buildOverlayHtml(personId)}</div>`;
      requestAnimationFrame(() => {
        const el = document.getElementById('fsTimerOverlay');
        if (el) el.classList.add('is-active');
      });
      bindOverlayHandlers();
    }

    function closeFullScreenTimer() {
      const el = document.getElementById('fsTimerOverlay');
      if (el) {
        el.classList.remove('is-active');
        setTimeout(() => {
          const mount = document.getElementById('fsTimerMount');
          if (mount) mount.innerHTML = '';
        }, 280);
      }
      currentOverlayPersonId = null;
    }

    function updateFullScreenTimer() {
      if (!currentOverlayPersonId) return;
      const pid = currentOverlayPersonId;
      const t = activeTimers[pid];

      // If the timer is gone (stopped), dismiss the overlay
      if (!t) {
        closeFullScreenTimer();
        return;
      }

      // Update readout
      const readoutEl = document.querySelector(`[data-fs-readout="${pid}"]`);
      if (readoutEl) {
        readoutEl.textContent = formatElapsed(elapsedMs(t));
      }

      // Update ring
      const { progress, goalHit } = fsTimerProgress(pid);
      const circumference = 565.49;
      const dashoffset = (circumference * (1 - progress)).toFixed(2);
      const fillEl = document.querySelector('.fs-timer__ring-fill');
      if (fillEl) {
        fillEl.setAttribute('stroke-dashoffset', dashoffset);
        fillEl.classList.toggle('fs-timer__ring-fill--success', goalHit);
      }

      // Update goal hit chip
      const chipEl = document.querySelector('.fs-timer__goal-chip');
      const centerEl = document.querySelector('.fs-timer__center');
      if (goalHit && !chipEl && centerEl) {
        const personEl = centerEl.querySelector('.fs-timer__person');
        if (personEl) {
          const chip = document.createElement('div');
          chip.className = 'fs-timer__goal-chip';
          chip.innerHTML = '<span class="chip chip--success">✓ Goal hit!</span>';
          personEl.insertAdjacentElement('afterend', chip);
        }
      } else if (!goalHit && chipEl) {
        chipEl.remove();
      }

      // Update pause/resume button label
      const toggleBtn = document.getElementById('fsTimerToggle');
      if (toggleBtn) {
        toggleBtn.textContent = t.pausedAt ? 'Resume' : 'Pause';
      }
    }

    function bindOverlayHandlers() {
      document.getElementById('fsTimerClose')?.addEventListener('click', () => {
        closeFullScreenTimer();
      });

      document.getElementById('fsTimerToggle')?.addEventListener('click', async () => {
        const pid = currentOverlayPersonId;
        if (!pid) return;
        const t = activeTimers[pid];
        if (!t) return;
        const updated = t.pausedAt ? resumeTimer(t) : pauseTimer(t);
        await writeActiveTimer(pid, updated);
        // Update button label immediately (subscription will also re-render)
        const toggleBtn = document.getElementById('fsTimerToggle');
        if (toggleBtn) toggleBtn.textContent = updated.pausedAt ? 'Resume' : 'Pause';
      });

      document.getElementById('fsTimerStop')?.addEventListener('click', async () => {
        const pid = currentOverlayPersonId;
        if (!pid) return;
        closeFullScreenTimer();
        await stopTimer(pid);
      });
    }

    // ── Render ──

    function render() {
      // Header — only render on first call; bell badge updates via initBell subscription
      if (!headerInitialized) {
        document.getElementById('headerMount').innerHTML =
          renderHeader({ title: 'Activities', showBell: true });
        // Insert chip mount slot into header actions area
        document.querySelector('.app-header__actions')?.insertAdjacentHTML(
          'afterbegin',
          '<div id="activitiesPersonChipMount"></div>'
        );
      }

      // Refresh person switcher chip on every render
      const chipMount = document.getElementById('activitiesPersonChipMount');
      if (chipMount) {
        chipMount.innerHTML = renderActivitiesViewAsChip();
        document.getElementById('activitiesPersonSwitcherChip')?.addEventListener('click', openActivitiesPersonSwitcherSheet);
      }

      // Content
      const mount = document.getElementById('activitiesContent');
      if (!mount) {
        // mainContent not yet showing the activities-page — inject the skeleton
        mainContent.innerHTML = `
          <div class="activities-page">
            <nav class="tabs tabs--pill activities-tabs" role="tablist" aria-label="Activities tabs">
              <button class="tab${activeTab === 'today'   ? ' is-active' : ''}" data-tab="today"   type="button" role="tab" aria-selected="${activeTab === 'today'}">Today</button>
              <button class="tab${activeTab === 'week'    ? ' is-active' : ''}" data-tab="week"    type="button" role="tab" aria-selected="${activeTab === 'week'}">This Week</button>
              <button class="tab${activeTab === 'history' ? ' is-active' : ''}" data-tab="history" type="button" role="tab" aria-selected="${activeTab === 'history'}">History</button>
            </nav>
            <div id="activitiesContent" role="tabpanel"></div>
          </div>`;
      } else {
        // Update tab active states in-place
        document.querySelectorAll('.activities-tabs .tab').forEach(t => {
          const isActive = t.dataset.tab === activeTab;
          t.classList.toggle('is-active', isActive);
          t.setAttribute('aria-selected', String(isActive));
        });
      }

      document.getElementById('activitiesContent').innerHTML =
        renderContentForTab(activeTab);

      bindTabHandlers();
      bindCardHandlers();
      bindActiveTimerHandlers();
      bindLongPressHandlers();
      ensureDisplayInterval();

      // Auto-open overlay only on same-device Start tap
      if (openOverlayOnNextRender && activeTimers[openOverlayOnNextRender]) {
        openFullScreenTimer(openOverlayOnNextRender);
        openOverlayOnNextRender = null;
      }

      // Keep overlay up to date if it's open (e.g. cross-device pause from compact card)
      updateFullScreenTimer();
    }

    // ── Helper functions ──

    function localDateKey(timestampMs, tz) {
      const d = new Date(timestampMs);
      const formatter = new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: tz });
      return formatter.format(d);
    }

    function minutesForActivityToday(activityId, personId, tz) {
      const today = todayKey(tz);
      return Object.values(sessions)
        .filter(s => s.activityId === activityId && s.personId === personId && localDateKey(s.startedAt, tz) === today)
        .reduce((sum, s) => sum + (s.durationMin || 0), 0);
    }

    function minutesForActivityThisWeek(activityId, personId, tz) {
      const todayK = todayKey(tz);
      const start = weekStart(todayK);
      const end = weekEnd(todayK);
      return Object.values(sessions)
        .filter(s => {
          if (s.activityId !== activityId || s.personId !== personId) return false;
          const k = localDateKey(s.startedAt, tz);
          return k >= start && k <= end;
        })
        .reduce((sum, s) => sum + (s.durationMin || 0), 0);
    }

    function paceMinutesToday(actualMinutesThisWeek, goalMinutes, daysRemaining) {
      return Math.max(0, Math.ceil((goalMinutes - actualMinutesThisWeek) / Math.max(1, daysRemaining)));
    }

    function daysRemainingInWeek(tz) {
      const todayK = todayKey(tz);
      const endK = weekEnd(todayK);
      let count = 0;
      let k = todayK;
      while (k <= endK) { count++; k = addDays(k, 1); }
      return count;
    }

    function progressBar(actual, target) {
      const pct = target > 0 ? Math.min(1, actual / target) : 0;
      return `<div class="progress-bar"><div class="progress-bar__fill" style="width:${(pct * 100).toFixed(1)}%"></div></div>`;
    }

    function activitiesForPerson(personId) {
      return Object.entries(activities)
        .filter(([id, a]) => a.active !== false && a.assignedTo && a.assignedTo[personId])
        .map(([id, a]) => ({ id, ...a }));
    }

    function sortedPeople() {
      const entries = Object.entries(people)
        .sort(([, x], [, y]) => {
          const kx = x.kid === true ? 0 : 1;
          const ky = y.kid === true ? 0 : 1;
          if (kx !== ky) return kx - ky;
          return (x.name || '').localeCompare(y.name || '');
        });
      if (activePersonId !== null) {
        return entries.filter(([pid]) => pid === activePersonId);
      }
      return entries;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
    }

    // ── Person switcher chip + sheet ──

    function peopleWithActivitiesSet() {
      const set = new Set();
      for (const a of Object.values(activities || {})) {
        if (a.active === false) continue;
        for (const pid of Object.keys(a.assignedTo || {})) set.add(pid);
      }
      return set;
    }

    function renderActivitiesViewAsChip() {
      const has = peopleWithActivitiesSet();
      if (has.size <= 1) return '';

      if (activePersonId === null) {
        return `<button class="activities-view-as-chip" id="activitiesPersonSwitcherChip" type="button" aria-label="Switch person">
          <span class="activities-view-as-chip__all-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3 19v-1a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v1"/><path d="M14 19v-1a3 3 0 0 1 3-3h1a3 3 0 0 1 3 3v1"/></svg>
          </span>
          <span class="activities-view-as-chip__name">All</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>`;
      }
      const person = (people || {})[activePersonId];
      if (!person) return '';
      return `<button class="activities-view-as-chip" id="activitiesPersonSwitcherChip" type="button" aria-label="Switch person">
        <span class="activities-view-as-chip__avatar" style="--person-color: ${escapeHtml(person.color || 'var(--accent)')}">${escapeHtml((person.name || '?')[0].toUpperCase())}</span>
        <span class="activities-view-as-chip__name">${escapeHtml(person.name)}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </button>`;
    }

    function openActivitiesPersonSwitcherSheet() {
      const mount = document.getElementById('sheetMount');
      const CHECK_SVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`;

      const has = peopleWithActivitiesSet();
      const peopleList = Object.entries(people || {})
        .filter(([pid]) => has.has(pid))
        .map(([pid, p]) => ({ id: pid, ...p }))
        .sort((x, y) => {
          const kx = x.kid === true ? 0 : 1;
          const ky = y.kid === true ? 0 : 1;
          if (kx !== ky) return kx - ky;
          return (x.name || '').localeCompare(y.name || '');
        });

      const allRow = `
        <button class="person-switcher-row${activePersonId === null ? ' is-active' : ''}" data-person-id="__all" type="button">
          <span class="person-switcher-row__avatar person-switcher-row__avatar--all" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3 19v-1a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v1"/><path d="M14 19v-1a3 3 0 0 1 3-3h1a3 3 0 0 1 3 3v1"/></svg>
          </span>
          <span class="person-switcher-row__name">View as everyone</span>
          ${activePersonId === null ? `<span class="person-switcher-row__check">${CHECK_SVG}</span>` : ''}
        </button>`;

      const personRows = peopleList.map(p => `
        <button class="person-switcher-row${p.id === activePersonId ? ' is-active' : ''}" data-person-id="${escapeHtml(p.id)}" type="button">
          <span class="person-switcher-row__avatar" style="--person-color: ${escapeHtml(p.color || 'var(--accent)')}">${escapeHtml((p.name || '?')[0].toUpperCase())}</span>
          <span class="person-switcher-row__name">${escapeHtml(p.name)}</span>
          ${p.id === activePersonId ? `<span class="person-switcher-row__check">${CHECK_SVG}</span>` : ''}
        </button>`).join('');

      mount.innerHTML = renderBottomSheet(`
        <h3 class="sheet-section-title">View as</h3>
        <div class="person-switcher-list">${allRow}${personRows}</div>
      `);
      requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));
      document.getElementById('bottomSheet')?.addEventListener('click', e => {
        if (e.target.id === 'bottomSheet') { mount.innerHTML = ''; }
      });

      mount.querySelectorAll('.person-switcher-row[data-person-id]').forEach(row => {
        row.addEventListener('click', () => {
          const pid = row.dataset.personId;
          activePersonId = (pid === '__all') ? null : pid;
          try { localStorage.setItem('activities-active-person', activePersonId == null ? 'all' : activePersonId); } catch {}
          mount.innerHTML = '';
          render();
        });
      });
    }

    // ── Tab content ──

    function renderContentForTab(tab) {
      const tz = settings.timezone || detectTimezone();
      const activeTimerSection = renderActiveTimers(tz);
      if (tab === 'today') return activeTimerSection + renderTodayTab(tz);
      if (tab === 'week') return activeTimerSection + renderWeekTab(tz);
      if (tab === 'history') return renderHistoryTab(tz);
      return '';
    }

    function renderHistoryTab(tz) {
      const sortedSessions = Object.entries(sessions || {})
        .map(([id, s]) => ({ id, ...s }))
        .filter(s => activePersonId === null || s.personId === activePersonId)
        .sort((a, b) => (b.startedAt || 0) - (a.startedAt || 0));
      if (sortedSessions.length === 0) return '<p class="activities-placeholder-content">No sessions logged yet.</p>';

      // Group by local date
      const groups = {};
      for (const s of sortedSessions) {
        const k = localDateKey(s.startedAt, tz);
        (groups[k] = groups[k] || []).push(s);
      }

      return Object.entries(groups).map(([dateKey, sList]) => `
        <div class="history-group">
          <h4 class="history-group__date">${formatDateHeader(dateKey, tz)}</h4>
          ${sList.map(s => {
            const person = people[s.personId] || { name: s.personId, color: 'inherit' };
            const activity = activities[s.activityId] || { name: '(deleted activity)', emoji: '·' };
            const time = formatTime(s.startedAt, tz);
            return `
              <div class="history-row" data-session-id="${s.id}" data-activity-id="${s.activityId}" data-person-id="${s.personId}">
                <span class="history-row__icon">${activity.emoji || '·'}</span>
                <span class="history-row__title">${escapeHtml(person.name)} · ${escapeHtml(activity.name)}</span>
                <span class="history-row__meta">${s.durationMin} min · ${time}</span>
              </div>
            `;
          }).join('')}
        </div>
      `).join('');
    }

    function formatDateHeader(dateKey, tz) {
      const today = todayKey(tz);
      if (dateKey === today) return 'Today';
      if (dateKey === addDays(today, -1)) return 'Yesterday';
      try {
        const d = new Date(`${dateKey}T12:00:00`);
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: tz });
      } catch (e) {
        return dateKey;
      }
    }

    function formatTime(timestampMs, tz) {
      const d = new Date(timestampMs);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: tz });
    }

    function renderActiveTimers(tz) {
      const entries = Object.entries(activeTimers || {}).filter(([, t]) => t);
      if (entries.length === 0) return '';
      return `
        <div class="active-timers">
          <h3 class="section-header">Active timers</h3>
          ${entries.map(([pid, t]) => {
            const person = people[pid] || { name: pid };
            const activity = activities[t.activityId] || { name: 'Unknown', emoji: '·' };
            const elapsed = formatElapsed(elapsedMs(t));
            const forgotten = isForgotten(t);
            const pauseLabel = t.pausedAt ? 'Resume' : 'Pause';
            return `
              <div class="active-timer-card" data-person-id="${pid}">
                <div class="active-timer-card__title">${escapeHtml(person.name)} · ${activity.emoji || ''} ${escapeHtml(activity.name)}</div>
                <div class="active-timer-card__readout" data-timer-readout="${pid}">${elapsed}${forgotten ? ' <span class="chip chip--warning">⚠ Forgotten?</span>' : ''}</div>
                <div class="active-timer-card__actions">
                  <button class="btn btn--secondary" data-timer-action="toggle" data-person-id="${pid}">${pauseLabel}</button>
                  <button class="btn btn--primary" data-timer-action="stop" data-person-id="${pid}">Stop</button>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderTodayTab(tz) {
      const sections = sortedPeople().map(([pid, person]) => {
        const acts = activitiesForPerson(pid);
        if (acts.length === 0) return '';
        return `
          <div class="person-section">
            <h3 class="person-section__name" style="color:${person.color || 'inherit'}">${escapeHtml(person.name)}</h3>
            <div class="person-section__cards">
              ${acts.map(a => renderTodayCard(a, pid, tz)).join('')}
            </div>
          </div>
        `;
      }).filter(Boolean).join('');
      return sections || '<p class="activities-placeholder-content">No activities yet. Admin can add some from More → Admin → Activities.</p>';
    }

    function renderTodayCard(a, pid, tz) {
      if (a.goalPeriod === 'weekly') {
        const wkMins = minutesForActivityThisWeek(a.id, pid, tz);
        const days = daysRemainingInWeek(tz);
        const paceTarget = paceMinutesToday(wkMins, a.goalMinutes, days);
        const todayMins = minutesForActivityToday(a.id, pid, tz);
        const hit = wkMins >= a.goalMinutes;
        return `
          <div class="activity-card" data-activity-id="${a.id}" data-person-id="${pid}">
            <div class="activity-card__head">
              <span class="activity-card__emoji">${a.emoji || '·'}</span>
              <span class="activity-card__name">${escapeHtml(a.name)}</span>
              <span class="activity-card__goal">Weekly ${a.goalMinutes} min</span>
            </div>
            ${progressBar(todayMins, paceTarget || 1)}
            <div class="activity-card__meta">${todayMins} / ${paceTarget} min today${hit ? ' <span class="chip chip--success">✓ Goal hit</span>' : ''}</div>
            <div class="activity-card__sub-meta">wk: ${wkMins} / ${a.goalMinutes}</div>
            <div class="activity-card__actions">
              <button class="btn btn--primary" data-card-action="start" data-activity-id="${a.id}" data-person-id="${pid}">▶ Start</button>
              <button class="btn btn--secondary" data-card-action="log" data-activity-id="${a.id}" data-person-id="${pid}">+ Log</button>
            </div>
          </div>
        `;
      }
      const todayMins = minutesForActivityToday(a.id, pid, tz);
      const hit = todayMins >= a.goalMinutes;
      return `
        <div class="activity-card" data-activity-id="${a.id}" data-person-id="${pid}">
          <div class="activity-card__head">
            <span class="activity-card__emoji">${a.emoji || '·'}</span>
            <span class="activity-card__name">${escapeHtml(a.name)}</span>
            <span class="activity-card__goal">Daily ${a.goalMinutes} min</span>
          </div>
          ${progressBar(todayMins, a.goalMinutes)}
          <div class="activity-card__meta">${todayMins} / ${a.goalMinutes} min${hit ? ' <span class="chip chip--success">✓ Goal hit</span>' : ''}</div>
          <div class="activity-card__actions">
            <button class="btn btn--primary" data-card-action="start" data-activity-id="${a.id}" data-person-id="${pid}">▶ Start</button>
            <button class="btn btn--secondary" data-card-action="log" data-activity-id="${a.id}" data-person-id="${pid}">+ Log</button>
          </div>
        </div>
      `;
    }

    function renderWeekTab(tz) {
      const sections = sortedPeople().map(([pid, person]) => {
        const acts = activitiesForPerson(pid);
        if (acts.length === 0) return '';
        return `
          <div class="person-section">
            <h3 class="person-section__name" style="color:${person.color || 'inherit'}">${escapeHtml(person.name)}</h3>
            <div class="person-section__cards">
              ${acts.map(a => renderWeekCard(a, pid, tz)).join('')}
            </div>
          </div>
        `;
      }).filter(Boolean).join('');
      return sections || '<p class="activities-placeholder-content">No activities yet.</p>';
    }

    function renderWeekCard(a, pid, tz) {
      if (a.goalPeriod === 'weekly') {
        const wkMins = minutesForActivityThisWeek(a.id, pid, tz);
        const hit = wkMins >= a.goalMinutes;
        return `
          <div class="activity-card" data-activity-id="${a.id}" data-person-id="${pid}">
            <div class="activity-card__head">
              <span class="activity-card__emoji">${a.emoji || '·'}</span>
              <span class="activity-card__name">${escapeHtml(a.name)}</span>
              <span class="activity-card__goal">Weekly ${a.goalMinutes} min</span>
            </div>
            ${progressBar(wkMins, a.goalMinutes)}
            <div class="activity-card__meta">${wkMins} / ${a.goalMinutes} min this week${hit ? ' <span class="chip chip--success">✓ Goal hit</span>' : ''}</div>
            <div class="activity-card__actions">
              <button class="btn btn--primary" data-card-action="start" data-activity-id="${a.id}" data-person-id="${pid}">▶ Start</button>
              <button class="btn btn--secondary" data-card-action="log" data-activity-id="${a.id}" data-person-id="${pid}">+ Log</button>
            </div>
          </div>
        `;
      }
      // Daily activity in Week tab: show 7-day mini-dot summary
      const todayK = todayKey(tz);
      const start = weekStart(todayK);
      const days = [];
      let k = start;
      for (let i = 0; i < 7; i++) {
        const m = Object.values(sessions)
          .filter(s => s.activityId === a.id && s.personId === pid && localDateKey(s.startedAt, tz) === k)
          .reduce((sum, s) => sum + (s.durationMin || 0), 0);
        const inFuture = k > todayK;
        days.push({ k, hit: m >= a.goalMinutes, mins: m, inFuture });
        k = addDays(k, 1);
      }
      const hits = days.filter(d => d.hit && !d.inFuture).length;
      const elapsed = days.filter(d => !d.inFuture).length;
      return `
        <div class="activity-card" data-activity-id="${a.id}" data-person-id="${pid}">
          <div class="activity-card__head">
            <span class="activity-card__emoji">${a.emoji || '·'}</span>
            <span class="activity-card__name">${escapeHtml(a.name)}</span>
            <span class="activity-card__goal">Daily ${a.goalMinutes} min</span>
          </div>
          <div class="activity-card__dots">${days.map(d => `<span class="dot ${d.inFuture ? 'dot--future' : (d.hit ? 'dot--hit' : 'dot--miss')}" title="${d.k}: ${d.mins} min"></span>`).join('')}</div>
          <div class="activity-card__meta">${hits} / ${elapsed} days hit so far</div>
          <div class="activity-card__actions">
            <button class="btn btn--primary" data-card-action="start" data-activity-id="${a.id}" data-person-id="${pid}">▶ Start</button>
            <button class="btn btn--secondary" data-card-action="log" data-activity-id="${a.id}" data-person-id="${pid}">+ Log</button>
          </div>
        </div>
      `;
    }

    // ── Event binding ──

    function bindTabHandlers() {
      document.querySelectorAll('.activities-tabs .tab').forEach(t => {
        t.addEventListener('click', () => {
          activeTab = t.dataset.tab;
          render();
        });
      });
    }

    function bindCardHandlers() {
      document.querySelectorAll('[data-card-action="start"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const pid = btn.dataset.personId;
          const aid = btn.dataset.activityId;
          const current = activeTimers[pid];
          if (current && current.activityId !== aid) {
            const stopOk = await showConfirm({
              title: 'Switch activity',
              message: `Stop "${activities[current.activityId]?.name || 'current activity'}" and start "${activities[aid]?.name || aid}"?`,
              confirmLabel: 'Switch',
              cancelLabel: 'Cancel'
            });
            if (!stopOk) return;
            await stopTimer(pid);
          }
          if (current && current.activityId === aid && !current.pausedAt) return; // already running
          openOverlayOnNextRender = pid; // flag: overlay opens when subscription fires render()
          const now = Date.now();
          await writeActiveTimer(pid, {
            activityId: aid,
            startedAt: now,
            originalStartedAt: now,
            pausedAt: null,
            accumulatedMs: 0
          });
          const a = activities[aid] || {};
          const p = people[pid] || { name: pid };
          showToast(`Started ${a.emoji || ''} ${a.name || aid} for ${p.name}`);
        });
      });
      document.querySelectorAll('[data-card-action="log"]').forEach(btn => {
        btn.addEventListener('click', () => openManualEntrySheet(btn.dataset.activityId, btn.dataset.personId));
      });
      document.querySelectorAll('.history-row').forEach(row => {
        row.addEventListener('click', () => {
          const sid = row.dataset.sessionId;
          const aid = row.dataset.activityId;
          const pid = row.dataset.personId;
          openManualEntrySheet(aid, pid, sid);
        });
      });
    }

    function bindActiveTimerHandlers() {
      document.querySelectorAll('[data-timer-action="toggle"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const pid = btn.dataset.personId;
          const t = activeTimers[pid];
          if (!t) return;
          const updated = t.pausedAt ? resumeTimer(t) : pauseTimer(t);
          await writeActiveTimer(pid, updated);
        });
      });
      document.querySelectorAll('[data-timer-action="stop"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          await stopTimer(btn.dataset.personId);
        });
      });
    }

    async function stopTimer(pid) {
      const t = activeTimers[pid];
      if (!t) return;
      const durationMin = finalDurationMin(t);
      const sessionData = {
        activityId: t.activityId,
        personId: pid,
        startedAt: t.originalStartedAt || t.startedAt,
        endedAt: Date.now(),
        durationMin,
        source: 'timer',
        createdBy: pid
      };
      await pushActivitySession(sessionData);
      await clearActiveTimer(pid);
      // Invalidate settled earning so worker recomputes on next tick
      const periodKey = sessionPeriodKey(sessionData, t.activityId);
      if (periodKey) {
        await removeActivityEarning(pid, t.activityId, periodKey);
      }
      await loadData();
      render();
      const a = activities[t.activityId] || {};
      showToast(`Session saved · ${durationMin} min · ${a.name || 'activity'}`);
    }

    function sessionPeriodKey(session, activityId) {
      const a = activities[activityId];
      if (!a) return null;
      const tz = settings.timezone || detectTimezone();
      const dateKey = localDateKey(session.startedAt, tz);
      if (a.goalPeriod === 'daily') return dateKey;
      // ISO week key for weekly activities
      const d = new Date(session.startedAt);
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
    }

    function openManualEntrySheet(activityId, personId, sessionIdForEdit) {
      const editing = sessionIdForEdit ? sessions[sessionIdForEdit] : null;
      const aid = editing ? editing.activityId : activityId;  // null when called from FAB
      const pid = editing ? editing.personId : personId;
      const activity = aid ? activities[aid] : null;
      const noPreselect = !aid; // FAB mode — user must pick activity

      if (!noPreselect && !activity) {
        showToast('Activity not found');
        return;
      }

      const tz = settings.timezone || detectTimezone();
      const dateValue = editing ? localDateKey(editing.startedAt, tz) : todayKey(tz);
      const dateLabel = dateValue ? formatDateShort(dateValue) : 'Set date';

      // Active activities list (for picker in no-preselect mode)
      const allActiveActivities = Object.entries(activities)
        .filter(([, a]) => a.active !== false)
        .sort(([, a], [, b]) => (a.name || '').localeCompare(b.name || ''));

      // Compute person options for a given activityId
      function personOptionsFor(actId) {
        const act = actId ? activities[actId] : null;
        const allowedIds = act ? Object.keys(act.assignedTo || {}) : [];
        return allowedIds.map(id => ({ value: id, label: people[id]?.name || id }));
      }

      const initialPersonOptions = noPreselect ? [] : personOptionsFor(aid);

      const headerHtml = renderFormSheetHeader({
        title: editing ? 'Edit Session' : 'Log Session',
        closeId: 'sessFormClose',
        saveId: 'sessFormSaveHeader',
        deleteId: editing ? 'sessFormDelete' : null
      });

      const activityPickerHtml = noPreselect ? `
        <div class="rf-adv-row">
          <div class="rf-adv-label">Activity</div>
          <div class="chip-picker" id="sessFormActivityPicker">
            ${allActiveActivities.map(([id, a]) =>
              `<button class="chip" data-value="${id}" type="button">${a.emoji || ''} ${escapeHtml(a.name)}</button>`
            ).join('')}
          </div>
          <input type="hidden" id="sessFormActivityValue" value="">
        </div>
      ` : `
        <div class="rf-adv-row">
          <strong>${activity.emoji || ''} ${escapeHtml(activity.name)}</strong>
        </div>
      `;

      const bodyHtml = `
        <div class="tf-form">
          ${activityPickerHtml}
          <div class="rf-adv-row" id="sessFormPersonRow">
            <div class="rf-adv-label">Person</div>
            ${renderChipPicker({
              pickerId: 'sessFormPerson',
              hiddenId: 'sessFormPersonValue',
              options: initialPersonOptions,
              value: noPreselect ? '' : pid,
              allowClear: false
            })}
          </div>
          <div class="rf-adv-row">
            <div class="rf-adv-label">Date</div>
            ${renderDateInput({ btnId: 'sessFormDateBtn', inputId: 'sessFormDate', labelId: 'sessFormDateLabel', value: dateValue, label: dateLabel })}
          </div>
          <div class="rf-adv-row">
            <div class="rf-adv-label">Duration (min)</div>
            <input type="number" id="sessFormDuration" class="rf-adv-input" min="1" max="1440" value="${editing ? editing.durationMin : 30}" />
          </div>
          <div class="rf-adv-row">
            <div class="rf-adv-label">Notes</div>
            <input type="text" id="sessFormNotes" class="rf-adv-input" maxlength="200" value="${escapeHtml(editing?.notes || '')}" />
          </div>
        </div>
      `;

      const footerHtml = renderFormFooter({
        saveLabel: 'Save',
        cancelId: 'sessFormCancel',
        saveId: 'sessFormSaveFooter',
        disabled: noPreselect // start disabled when no activity preselected
      });

      const fullHtml = headerHtml + bodyHtml + footerHtml;
      const mount = document.getElementById('sheetMount');
      mount.innerHTML = renderBottomSheet(fullHtml);
      requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));

      // Track selected activityId in no-preselect mode
      let selectedAid = aid;

      function syncSaveState() {
        const hasActivity = noPreselect ? !!selectedAid : true;
        const hasPerson = !!(document.getElementById('sessFormPersonValue')?.value);
        const ok = hasActivity && hasPerson;
        const footer = document.getElementById('sessFormSaveFooter');
        const header = document.getElementById('sessFormSaveHeader');
        if (footer) footer.disabled = !ok;
        if (header) {
          if (ok) header.removeAttribute('disabled');
          else header.setAttribute('disabled', '');
        }
      }

      function rebuildPersonPicker(actId) {
        const opts = personOptionsFor(actId);
        const personRow = document.getElementById('sessFormPersonRow');
        if (!personRow) return;
        // Auto-select when only one person assigned to this activity
        const autoVal = opts.length === 1 ? opts[0].value : '';
        personRow.innerHTML = `
          <div class="rf-adv-label">Person</div>
          ${renderChipPicker({
            pickerId: 'sessFormPerson',
            hiddenId: 'sessFormPersonValue',
            options: opts,
            value: autoVal,
            allowClear: false
          })}`;
        bindChipPicker({ pickerId: 'sessFormPerson', hiddenId: 'sessFormPersonValue' });
        document.getElementById('sessFormPerson')?.addEventListener('click', syncSaveState);
        syncSaveState();
      }

      // Activity picker in no-preselect mode
      if (noPreselect) {
        const picker = document.getElementById('sessFormActivityPicker');
        if (picker) {
          picker.addEventListener('click', e => {
            const btn = e.target.closest('[data-value]');
            if (!btn) return;
            // Toggle selection
            picker.querySelectorAll('[data-value]').forEach(b => {
              b.classList.toggle('chip--primary', b === btn);
              b.dataset.state = b === btn ? 'primary' : '';
            });
            selectedAid = btn.dataset.value || null;
            document.getElementById('sessFormActivityValue').value = selectedAid || '';
            rebuildPersonPicker(selectedAid);
          });
        }
        // Header save starts disabled — no activity picked yet
        document.getElementById('sessFormSaveHeader')?.setAttribute('disabled', '');
      } else {
        bindChipPicker({ pickerId: 'sessFormPerson', hiddenId: 'sessFormPersonValue' });
        document.getElementById('sessFormPerson')?.addEventListener('click', syncSaveState);
      }

      bindDateInput({
        btnId: 'sessFormDateBtn',
        inputId: 'sessFormDate',
        labelId: 'sessFormDateLabel',
        format: v => v ? formatDateShort(v) : 'Set date'
      });

      const close = () => {
        const overlay = document.getElementById('bottomSheet');
        if (overlay) {
          overlay.classList.remove('active');
          setTimeout(() => { mount.innerHTML = ''; }, 280);
        } else {
          mount.innerHTML = '';
        }
      };
      document.getElementById('sessFormClose')?.addEventListener('click', close);
      document.getElementById('sessFormCancel')?.addEventListener('click', close);

      const doSave = async () => {
        const finalAid = noPreselect ? selectedAid : aid;
        const finalActivity = finalAid ? activities[finalAid] : null;
        const finalPid = document.getElementById('sessFormPersonValue').value;
        const dateKey = document.getElementById('sessFormDate').value;
        const durationMin = parseInt(document.getElementById('sessFormDuration').value, 10);
        const notes = document.getElementById('sessFormNotes').value.trim();
        if (!finalAid || !finalPid || !dateKey || !Number.isInteger(durationMin) || durationMin < 1) {
          showToast('Please fill all required fields');
          return;
        }
        // Anchor the session at noon local on that date (predictable period attribution)
        const noonMs = Date.parse(`${dateKey}T12:00:00`);
        const sessionData = {
          activityId: finalAid,
          personId: finalPid,
          startedAt: noonMs,
          endedAt: noonMs + durationMin * 60000,
          durationMin,
          source: 'manual',
          notes: notes || null,
          createdBy: finalPid
        };
        if (editing) {
          await updateActivitySession(sessionIdForEdit, sessionData);
        } else {
          await pushActivitySession(sessionData);
        }
        // Invalidate settled earning for affected period
        const periodKey = sessionPeriodKey(sessionData, finalAid);
        if (periodKey) {
          await removeActivityEarning(finalPid, finalAid, periodKey);
        }
        close();
        await loadData();
        render();
        const actName = finalActivity?.name || 'activity';
        showToast(`Manual entry saved · ${actName} · ${durationMin} min · ${people[finalPid]?.name || finalPid}`);
      };
      document.getElementById('sessFormSaveFooter')?.addEventListener('click', doSave);
      document.getElementById('sessFormSaveHeader')?.addEventListener('click', doSave);

      if (editing) {
        document.getElementById('sessFormDelete')?.addEventListener('click', async () => {
          const ok = await showConfirm({
            title: 'Delete session?',
            message: `Permanently delete this ${editing.durationMin} min ${activity?.name || 'activity'} session?`,
            confirmLabel: 'Delete',
            cancelLabel: 'Cancel',
            danger: true
          });
          if (!ok) return;
          await removeActivitySession(sessionIdForEdit);
          const periodKey = sessionPeriodKey(editing, editing.activityId);
          if (periodKey) {
            await removeActivityEarning(editing.personId, editing.activityId, periodKey);
          }
          close();
          await loadData();
          render();
          showToast('Session deleted');
        });
      }
    }

    // ── Long-press on activity cards → deep-link to admin edit form ──

    function bindLongPressHandlers() {
      document.querySelectorAll('.activity-card').forEach(card => {
        let lpTimer = null;

        const cancelLp = () => {
          if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
        };

        // Don't trigger long-press when interacting with action buttons
        card.querySelectorAll('[data-card-action]').forEach(btn => {
          btn.addEventListener('pointerdown', e => e.stopPropagation());
        });

        card.addEventListener('pointerdown', e => {
          if (e.button && e.button !== 0) return;
          lpTimer = setTimeout(() => {
            lpTimer = null;
            const aid = card.dataset.activityId;
            if (!aid) return;
            const envParam = isDev ? '?env=dev' : '';
            window.location.href = `admin.html${envParam}#activity/${aid}`;
          }, 800);
        });
        card.addEventListener('pointerup',     cancelLp);
        card.addEventListener('pointerleave',  cancelLp);
        card.addEventListener('pointercancel', cancelLp);
      });
    }

    // ── Display interval for live timer readouts ──

    function ensureDisplayInterval() {
      const anyRunning = Object.values(activeTimers).some(t => t && !t.pausedAt);
      if (anyRunning && !displayInterval) {
        displayInterval = setInterval(() => {
          // Update compact active-timer card readouts
          document.querySelectorAll('[data-timer-readout]').forEach(el => {
            const pid = el.dataset.timerReadout;
            const t = activeTimers[pid];
            if (t) el.textContent = formatElapsed(elapsedMs(t));
          });
          // Update full-screen overlay readout + ring
          updateFullScreenTimer();
        }, 250);
      } else if (!anyRunning && displayInterval) {
        clearInterval(displayInterval);
        displayInterval = null;
      }
    }
  </script>
</body>
