<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/App Icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/App Icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Family Hub — Admin</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/admin.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>

    <!-- PIN Gate -->
    <div id="pinGate" style="display:none;">
      <div class="admin-pin-gate">
        <div>🔒</div>
        <h2 class="admin-pin-gate__title">Admin Access</h2>
        <p class="admin-pin-gate__desc">Enter your 4-digit PIN</p>
        <div class="admin-pin-gate__inputs">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="0" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="1" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="2" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="3" inputmode="numeric">
        </div>
        <p class="admin-pin-gate__error" id="pinError"></p>
      </div>
    </div>

    <!-- Admin Content (after PIN) -->
    <div id="mainContent" style="display:none;overflow-x:hidden;"></div>
  </div>
  <div id="navMount"></div>
  <div id="toastMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import {
      initFirebase, isFirstRun, readSettings, writeSettings,
      readPeople, writePerson, pushPerson, removeData,
      readTasks, pushTask, writeTask, removeTask,
      readCategories, writeCategories,
      readEvents, pushEvent, writeEvent, removeEvent,
      readCompletions, readAllSchedule, readOnce,
      multiUpdate, pushDebugEvent, factoryReset, onConnectionChange,
      readRewards, pushReward, writeReward, archiveReward
    } from './shared/firebase.js';
    import { renderNavBar, renderHeader, renderEmptyState, renderUndoToast, renderTaskFormCompact, initOfflineBanner } from './shared/components.js';
    import { initOwnerChips, getSelectedOwners } from './shared/dom-helpers.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig, getPresets, getColorPalette, resolveTheme } from './shared/theme.js';
    import { todayKey, addDays, dateRange, formatDateShort, getTimezoneOptions, detectTimezone, dayOfWeek, escapeHtml, parseIntOr, parseFloatOr } from './shared/utils.js';
    const esc = (s) => escapeHtml(String(s ?? ''));
    import { generateSchedule, buildScheduleUpdates, getRotationOwner } from './shared/scheduler.js';
    import { basePoints } from './shared/scoring.js';

    // ── Undo toast helper ──
    let undoTimer = null;
    function showUndoToast(message, undoCallback) {
      const mount = document.getElementById('toastMount');
      mount.innerHTML = renderUndoToast(message);
      if (undoTimer) clearTimeout(undoTimer);
      const undoBtn = mount.querySelector('.undo-toast__btn');
      if (undoCallback) {
        undoBtn.addEventListener('click', () => {
          clearTimeout(undoTimer);
          mount.innerHTML = '';
          undoCallback();
        });
      } else {
        undoBtn.style.display = 'none';
      }
      undoTimer = setTimeout(() => {
        const toast = mount.querySelector('.undo-toast');
        if (toast) toast.style.opacity = '0';
        setTimeout(() => { mount.innerHTML = ''; }, 300);
      }, 5000);
    }

    // ── Task template presets ──
    const TASK_TEMPLATES = {
      'daily-chores': {
        label: 'Daily Chores',
        icon: '🧹',
        tasks: [
          { name: 'Make bed', rotation: 'daily', difficulty: 'easy', estMin: 5, timeOfDay: 'am' },
          { name: 'Brush teeth (morning)', rotation: 'daily', difficulty: 'easy', estMin: 3, timeOfDay: 'am' },
          { name: 'Brush teeth (night)', rotation: 'daily', difficulty: 'easy', estMin: 3, timeOfDay: 'pm' },
          { name: 'Pick up room', rotation: 'daily', difficulty: 'easy', estMin: 10, timeOfDay: 'pm' },
          { name: 'Set the table', rotation: 'daily', difficulty: 'easy', estMin: 5, timeOfDay: 'pm' },
          { name: 'Clear the table', rotation: 'daily', difficulty: 'easy', estMin: 5, timeOfDay: 'pm' },
          { name: 'Load dishwasher', rotation: 'daily', difficulty: 'medium', estMin: 10, timeOfDay: 'pm' },
          { name: 'Wipe kitchen counters', rotation: 'daily', difficulty: 'easy', estMin: 5, timeOfDay: 'pm' }
        ]
      },
      'weekly-chores': {
        label: 'Weekly Chores',
        icon: '📅',
        tasks: [
          { name: 'Vacuum living room', rotation: 'weekly', difficulty: 'medium', estMin: 15, timeOfDay: 'anytime' },
          { name: 'Mop kitchen floor', rotation: 'weekly', difficulty: 'medium', estMin: 15, timeOfDay: 'anytime' },
          { name: 'Clean bathroom', rotation: 'weekly', difficulty: 'hard', estMin: 20, timeOfDay: 'anytime' },
          { name: 'Take out trash', rotation: 'weekly', difficulty: 'easy', estMin: 5, timeOfDay: 'anytime' },
          { name: 'Do laundry', rotation: 'weekly', difficulty: 'medium', estMin: 15, timeOfDay: 'anytime' },
          { name: 'Change bed sheets', rotation: 'weekly', difficulty: 'medium', estMin: 10, timeOfDay: 'anytime' },
          { name: 'Water plants', rotation: 'weekly', difficulty: 'easy', estMin: 10, timeOfDay: 'anytime' }
        ]
      },
      'monthly-chores': {
        label: 'Monthly Chores',
        icon: '📆',
        tasks: [
          { name: 'Deep clean fridge', rotation: 'monthly', difficulty: 'hard', estMin: 30, timeOfDay: 'anytime' },
          { name: 'Wipe baseboards', rotation: 'monthly', difficulty: 'medium', estMin: 20, timeOfDay: 'anytime' },
          { name: 'Clean windows', rotation: 'monthly', difficulty: 'medium', estMin: 25, timeOfDay: 'anytime' },
          { name: 'Organize pantry', rotation: 'monthly', difficulty: 'medium', estMin: 20, timeOfDay: 'anytime' },
          { name: 'Dust ceiling fans', rotation: 'monthly', difficulty: 'medium', estMin: 15, timeOfDay: 'anytime' }
        ]
      },
      'kid-chores': {
        label: 'Kid-Friendly Chores',
        icon: '👦',
        tasks: [
          { name: 'Feed the pet', rotation: 'daily', difficulty: 'easy', estMin: 5, timeOfDay: 'am' },
          { name: 'Put away toys', rotation: 'daily', difficulty: 'easy', estMin: 10, timeOfDay: 'pm' },
          { name: 'Help with laundry', rotation: 'weekly', difficulty: 'easy', estMin: 10, timeOfDay: 'anytime' },
          { name: 'Dust furniture', rotation: 'weekly', difficulty: 'easy', estMin: 10, timeOfDay: 'anytime' },
          { name: 'Sort recycling', rotation: 'weekly', difficulty: 'easy', estMin: 5, timeOfDay: 'anytime' },
          { name: 'Water garden', rotation: 'weekly', difficulty: 'easy', estMin: 10, timeOfDay: 'anytime' }
        ]
      },
      'self-care': {
        label: 'Self-Care & Routines',
        icon: '🧘',
        tasks: [
          { name: 'Morning workout', rotation: 'daily', difficulty: 'medium', estMin: 30, timeOfDay: 'am' },
          { name: 'Read for 20 minutes', rotation: 'daily', difficulty: 'easy', estMin: 20, timeOfDay: 'pm' },
          { name: 'Practice instrument', rotation: 'daily', difficulty: 'medium', estMin: 20, timeOfDay: 'anytime' },
          { name: 'Journal / reflect', rotation: 'daily', difficulty: 'easy', estMin: 10, timeOfDay: 'pm' },
          { name: 'Screen-free hour', rotation: 'daily', difficulty: 'easy', estMin: 60, timeOfDay: 'pm' }
        ]
      }
    };

    // ── Cached theme (device override > family cache > default) ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load data ──
    let settings = await readSettings();
    if (settings?.theme) applyTheme(resolveTheme(settings.theme));

    let peopleObj = await readPeople() || {};
    let tasksObj = await readTasks() || {};
    let catsObj = await readCategories() || {};
    let eventsObj = await readEvents() || {};
    rewardsObj = (await readRewards()) || {};

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);

    // ── Header & Nav ──
    const debugActive = localStorage.getItem('dr-debug') === 'true';
    document.getElementById('headerMount').innerHTML = renderHeader({
      appName: settings?.appName || 'Daily Rundown',
      subtitle: 'Admin',
      showAdmin: false,
      showDebug: debugActive
    });
    document.getElementById('navMount').innerHTML = renderNavBar(null);

    // ── Connection status + Offline/Online banner ──
    initOfflineBanner(onConnectionChange);

    // ══════════════════════════════════════════
    // PIN Gate
    // ══════════════════════════════════════════

    document.getElementById('loadingState').style.display = 'none';

    const PIN_SESSION_KEY = 'dr-admin-pin-ts';
    const PIN_SESSION_TTL = 30 * 60 * 1000; // 30 minutes
    const adminPin = settings?.adminPin || '';
    const recoveryPin = settings?.recoveryPin || '2522';

    // Check if PIN session is still valid
    const pinTs = parseInt(sessionStorage.getItem(PIN_SESSION_KEY) || '0', 10);
    const pinSessionValid = Date.now() - pinTs < PIN_SESSION_TTL;
    if (pinSessionValid) {
      // Skip PIN gate — render() called after main is defined below
      document.getElementById('mainContent').style.display = '';
    } else {
      document.getElementById('pinGate').style.display = '';
      const digits = document.querySelectorAll('.admin-pin-digit');

      digits.forEach((input, i) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value.replace(/\D/g, '');
          e.target.value = val.slice(0, 1);
          if (val && i < digits.length - 1) digits[i + 1].focus();
          checkPin();
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && i > 0) digits[i - 1].focus();
        });
      });
      digits[0].focus();

      function checkPin() {
        const entered = Array.from(digits).map(d => d.value).join('');
        if (entered.length !== 4) return;

        if (entered === adminPin || entered === recoveryPin) {
          sessionStorage.setItem(PIN_SESSION_KEY, String(Date.now()));
          document.getElementById('pinGate').style.display = 'none';
          const main = document.getElementById('mainContent');
          main.style.display = '';
          render();
        } else {
          document.getElementById('pinError').textContent = 'Incorrect PIN';
          digits.forEach(d => d.value = '');
          digits[0].focus();
          setTimeout(() => { document.getElementById('pinError').textContent = ''; }, 2000);
        }
      }
    }

    // ══════════════════════════════════════════
    // Admin panel — tab-based layout
    // ══════════════════════════════════════════

    const TABS = [
      { id: 'tasks', icon: '✅', label: 'Tasks' },
      { id: 'events', icon: '📅', label: 'Events' },
      { id: 'people', icon: '👥', label: 'People' },
      { id: 'categories', icon: '📂', label: 'Categories' },
      { id: 'rewards', icon: '🎁', label: 'Rewards' },
      { id: 'settings', icon: '⚙️', label: 'Settings' },
      { id: 'theme', icon: '🎨', label: 'Theme' },
      { id: 'schedule', icon: '📅', label: 'Schedule' },
      { id: 'data', icon: '💾', label: 'Data' },
      { id: 'debug', icon: '🐛', label: 'Debug' }
    ];

    let activeTab = 'tasks';
    let rewardsObj = {};
    let editingRewardId = null; // null = not editing, 'new' = creating, pushId = editing

    // ── Helpers ──
    function peopleArray() {
      return Object.entries(peopleObj).map(([id, p]) => ({ id, ...p }));
    }
    function catsArray() {
      return Object.entries(catsObj).map(([key, c]) => ({ key, ...c }));
    }

    const main = document.getElementById('mainContent');

    // ══════════════════════════════════════════
    // Main render
    // ══════════════════════════════════════════

    function render() {
      let html = `<div class="admin-tabs" role="tablist" aria-label="Admin sections">`;
      for (const tab of TABS) {
        const active = tab.id === activeTab ? ' admin-tab--active' : '';
        html += `<button class="admin-tab${active}" data-tab="${tab.id}" type="button" role="tab" aria-selected="${tab.id === activeTab}" aria-controls="admin-panel-${tab.id}">
          <span class="admin-tab__icon" aria-hidden="true">${tab.icon}</span>
          <span class="admin-tab__label">${tab.label}</span>
        </button>`;
      }
      html += `</div><div class="admin-content" role="tabpanel" id="admin-panel-${activeTab}">`;

      switch (activeTab) {
        case 'tasks': html += renderTasksTab(); break;
        case 'events': html += renderEventsTab(); break;
        case 'people': html += renderPeopleTab(); break;
        case 'categories': html += renderCategoriesTab(); break;
        case 'rewards': html += renderRewardsTab(); break;
        case 'settings': html += renderSettingsTab(); break;
        case 'theme': html += renderThemeTab(); break;
        case 'schedule': html += renderScheduleTab(); break;
        case 'data': html += renderDataTab(); break;
        case 'debug': html += renderDebugTab(); break;
      }

      html += `</div>`;
      main.innerHTML = html;
      bindTabEvents();
      bindTabContent();
    }

    function bindTabEvents() {
      for (const tab of main.querySelectorAll('.admin-tab')) {
        tab.addEventListener('click', () => {
          activeTab = tab.dataset.tab;
          selectMode = false;
          selectedTaskIds.clear();
          render();
        });
      }
    }

    // ══════════════════════════════════════════
    // Tasks Tab
    // ══════════════════════════════════════════

    let taskFilter = { rotation: '', owner: '', category: '', status: '', difficulty: '' };
    let taskSort = 'name';
    let editingTaskId = null;
    let showingTemplates = false;
    let selectMode = false;
    let selectedTaskIds = new Set();


    function renderTemplatePanel() {
      let html = `<div class="admin-form mb-md" id="templatePanel">
        <h3 class="admin-form__title">Task Templates</h3>
        <p class="form-hint mb-md">Select a template pack to import common chore sets. Tasks are created with "rotate" assignment mode — assign owners after import.</p>`;

      for (const [key, pack] of Object.entries(TASK_TEMPLATES)) {
        html += `<div class="admin-template-pack mb-md" style="border:1px solid var(--border-color);border-radius:8px;padding:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <strong>${pack.icon} ${esc(pack.label)}</strong>
            <button class="btn btn--primary btn--sm template-import-btn" data-template="${key}" type="button">Import ${pack.tasks.length} tasks</button>
          </div>
          <div class="form-hint mt-sm">${pack.tasks.map(t => esc(t.name)).join(', ')}</div>
        </div>`;
      }

      html += `<button class="btn btn--secondary" id="closeTemplates" type="button">Close</button>
      </div>`;
      return html;
    }

    function renderTasksTab() {
      const pa = peopleArray();
      const ca = catsArray();
      const taskEntries = Object.entries(tasksObj);

      // Filters
      let html = `<div class="admin-section">
        <div class="admin-filters">
          <select class="admin-select" id="taskFilterRotation">
            <option value="">All Rotations</option>
            <option value="daily"${taskFilter.rotation === 'daily' ? ' selected' : ''}>Daily</option>
            <option value="weekly"${taskFilter.rotation === 'weekly' ? ' selected' : ''}>Weekly</option>
            <option value="monthly"${taskFilter.rotation === 'monthly' ? ' selected' : ''}>Monthly</option>
            <option value="once"${taskFilter.rotation === 'once' ? ' selected' : ''}>One-Time</option>
          </select>
          <select class="admin-select" id="taskFilterOwner">
            <option value="">All Owners</option>
            ${pa.map(p => `<option value="${p.id}"${taskFilter.owner === p.id ? ' selected' : ''}>${esc(p.name)}</option>`).join('')}
          </select>
          <select class="admin-select" id="taskFilterCategory">
            <option value="">All Categories</option>
            ${ca.map(c => `<option value="${esc(c.key)}"${taskFilter.category === c.key ? ' selected' : ''}>${esc(c.icon)} ${esc(c.label)}</option>`).join('')}
          </select>
          <select class="admin-select" id="taskFilterStatus">
            <option value="">All Statuses</option>
            <option value="active"${taskFilter.status === 'active' ? ' selected' : ''}>Active</option>
            <option value="paused"${taskFilter.status === 'paused' ? ' selected' : ''}>Paused</option>
            <option value="completed"${taskFilter.status === 'completed' ? ' selected' : ''}>Completed</option>
          </select>
          <select class="admin-select" id="taskFilterDifficulty">
            <option value="">All Difficulties</option>
            <option value="easy"${taskFilter.difficulty === 'easy' ? ' selected' : ''}>Easy</option>
            <option value="medium"${taskFilter.difficulty === 'medium' ? ' selected' : ''}>Medium</option>
            <option value="hard"${taskFilter.difficulty === 'hard' ? ' selected' : ''}>Hard</option>
          </select>
        </div>
        <div class="admin-filters" style="margin-top:4px">
          <select class="admin-select" id="taskSortBy">
            <option value="name"${taskSort === 'name' ? ' selected' : ''}>Sort: Name</option>
            <option value="difficulty"${taskSort === 'difficulty' ? ' selected' : ''}>Sort: Difficulty</option>
            <option value="points"${taskSort === 'points' ? ' selected' : ''}>Sort: Points</option>
            <option value="rotation"${taskSort === 'rotation' ? ' selected' : ''}>Sort: Rotation</option>
            <option value="estMin"${taskSort === 'estMin' ? ' selected' : ''}>Sort: Est. Time</option>
          </select>
        </div>
      </div>`;

      // Filtered tasks
      let filtered = taskEntries.filter(([id, t]) => {
        // Auto-hide completed one-time tasks unless status filter is explicitly set
        if (!taskFilter.status && t.rotation === 'once' && t.status === 'completed') return false;
        if (taskFilter.rotation && t.rotation !== taskFilter.rotation) return false;
        if (taskFilter.owner && !(t.owners || []).includes(taskFilter.owner)) return false;
        if (taskFilter.category && t.category !== taskFilter.category) return false;
        if (taskFilter.status && t.status !== taskFilter.status) return false;
        if (taskFilter.difficulty && (t.difficulty || 'medium') !== taskFilter.difficulty) return false;
        return true;
      });

      // Sort
      const diffOrder = { easy: 0, medium: 1, hard: 2 };
      const rotOrder = { daily: 0, weekly: 1, monthly: 2, once: 3 };
      filtered.sort((a, b) => {
        const ta = a[1], tb = b[1];
        switch (taskSort) {
          case 'name': return (ta.name || '').localeCompare(tb.name || '');
          case 'difficulty': return (diffOrder[ta.difficulty || 'medium'] || 0) - (diffOrder[tb.difficulty || 'medium'] || 0);
          case 'points': return basePoints(tb, settings?.difficultyMultipliers) - basePoints(ta, settings?.difficultyMultipliers);
          case 'rotation': return (rotOrder[ta.rotation] ?? 9) - (rotOrder[tb.rotation] ?? 9);
          case 'estMin': return (tb.estMin || 0) - (ta.estMin || 0);
          default: return 0;
        }
      });

      if (selectMode) {
        html += `<div class="admin-section-header">
          <span>${selectedTaskIds.size} selected</span>
          <div>
            <button class="btn btn--ghost btn--sm" id="selectAllBtn" type="button">Select All</button>
            <button class="btn btn--ghost btn--sm" id="deselectAllBtn" type="button">Deselect All</button>
            <button class="btn btn--secondary btn--sm" id="cancelSelectBtn" type="button">Cancel</button>
          </div>
        </div>`;
      } else {
        html += `<div class="admin-section-header">
          <span>${filtered.length} task${filtered.length !== 1 ? 's' : ''}</span>
          <div>
            <button class="btn btn--secondary btn--sm" id="selectModeBtn" type="button">Select</button>
            <button class="btn btn--secondary btn--sm" id="templateBtn" type="button">📋 Templates</button>
            <button class="btn btn--primary btn--sm" id="addTaskBtn" type="button">+ Add Task</button>
          </div>
        </div>`;
      }

      if (!selectMode) {
        // Template panel
        if (showingTemplates) {
          html += renderTemplatePanel();
        }

        // New task form at top
        if (editingTaskId === 'new') {
          html += renderTaskForm(null);
        }
      }

      // Task list with inline edit form
      if (filtered.length === 0 && editingTaskId === null) {
        html += renderEmptyState('✅', 'No tasks', 'Add your first task to get started.');
      } else {
        html += `<div class="admin-list">`;
        for (const [id, task] of filtered) {
          const cat = catsObj[task.category];
          const owners = (task.owners || []).map(oid => peopleObj[oid]?.name || '?').join(', ');
          const pausedClass = task.status === 'paused' ? ' admin-list-item--paused' : '';
          const pausedBadge = task.status === 'paused' ? '<span class="admin-badge admin-badge--muted">⏸ Paused</span>' : '';
          const diffLabel = { easy: 'Easy', medium: 'Med', hard: 'Hard' }[task.difficulty] || 'Med';
          const todLabel = { am: 'AM', pm: 'PM', anytime: 'Any', both: 'AM+PM' }[task.timeOfDay] || 'Any';
          // Detail badges: est time, cooldown, exempt
          let detailBadges = '';
          if (task.estMin) detailBadges += `<span class="admin-badge">${task.estMin}m</span>`;
          detailBadges += `<span class="admin-badge">${todLabel}</span>`;
          if (task.cooldownDays) detailBadges += `<span class="admin-badge">CD ${task.cooldownDays}d</span>`;
          if (task.dedicatedDay != null) {
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            detailBadges += `<span class="admin-badge">📅 ${dayNames[task.dedicatedDay] || task.dedicatedDay}</span>`;
          }
          if (task.dedicatedDate) detailBadges += `<span class="admin-badge">📅 ${task.dedicatedDate}</span>`;
          if (task.exempt) detailBadges += `<span class="admin-badge admin-badge--muted">Exempt</span>`;
          const selectedClass = selectMode && selectedTaskIds.has(id) ? ' admin-list-item--selected' : '';
          const checkboxHtml = selectMode ? `<input type="checkbox" class="bulk-checkbox" ${selectedTaskIds.has(id) ? 'checked' : ''}>` : '';
          const actionsHtml = selectMode ? '' : `<div class="admin-list-item__actions">
                <button class="btn btn--ghost btn--sm admin-edit-task" data-task-id="${id}" type="button">Edit</button>
                <button class="btn btn--ghost btn--sm admin-pause-task" data-task-id="${id}" type="button">${task.status === 'paused' ? '▶' : '⏸'}</button>
                <button class="btn btn--ghost btn--sm admin-delete-task" data-task-id="${id}" type="button">✕</button>
              </div>`;
          html += `<div class="admin-list-item admin-list-item--clickable${pausedClass}${selectedClass}" data-task-id="${id}">
            <div class="admin-list-item__row">
              ${checkboxHtml}<span class="admin-list-item__name">${esc(task.name)}${cat?.icon ? ' ' + cat.icon : ''}</span>
              <span class="admin-list-item__tags">
                <span class="admin-badge">${task.rotation}</span>
                <span class="admin-badge">${diffLabel}</span>
                ${pausedBadge}
              </span>
            </div>
            <div class="admin-list-item__tags" style="padding:0 0 2px">${detailBadges}</div>
            <div class="admin-list-item__row">
              <span class="admin-list-item__meta">${owners || 'Unassigned'}${cat ? ' · ' + cat.label : ''}</span>
              ${actionsHtml}
            </div>
          </div>`;
        }
        html += `</div>`;
      }

      // Modal overlay for editing (not for 'new' — new stays at top)
      if (!selectMode && editingTaskId && editingTaskId !== 'new') {
        html += `<div class="task-form-backdrop" id="taskFormBackdrop">
          <div class="task-form-modal">${renderTaskForm(editingTaskId)}</div>
        </div>`;
      }

      // Floating action bar (select mode with selections)
      if (selectMode && selectedTaskIds.size > 0) {
        html += `<div class="bulk-action-bar">
          <button class="btn btn--ghost btn--sm" id="bulkCancelBtn" type="button">Cancel</button>
          <button class="btn btn--danger btn--sm" id="bulkDeleteBtn" type="button">Delete ${selectedTaskIds.size}</button>
          <button class="btn btn--primary btn--sm" id="bulkEditBtn" type="button">Edit ${selectedTaskIds.size}</button>
        </div>`;
      }

      return html;
    }

    function renderTaskForm(taskId) {
      const task = taskId ? tasksObj[taskId] : {};
      const pa = peopleArray();
      const ca = catsArray();
      return `<div class="admin-form">${renderTaskFormCompact({
        task,
        taskId,
        mode: taskId ? 'edit' : 'create',
        categories: ca,
        people: pa,
        prefix: 'tf',
        rewards: rewardsObj
      })}</div>`;
    }

    // ══════════════════════════════════════════
    // Events Tab
    // ══════════════════════════════════════════

    let editingEventId = null;

    function renderEventsTab() {
      const eventsList = Object.entries(eventsObj).sort(([, a], [, b]) => (a.date || '').localeCompare(b.date || ''));
      const upcoming = eventsList.filter(([, e]) => e.date >= today);
      const past = eventsList.filter(([, e]) => e.date < today);

      let html = `<div class="admin-section-header">
        <span>${eventsList.length} event${eventsList.length !== 1 ? 's' : ''}</span>
        <button class="btn btn--primary btn--sm" id="addEventBtn" type="button">+ Add Event</button>
      </div>`;

      if (editingEventId !== null) {
        html += renderEventFormAdmin(editingEventId === 'new' ? null : editingEventId);
      }

      if (upcoming.length > 0) {
        html += `<h4 class="form-label mt-md mb-sm">Upcoming</h4>`;
        html += `<div class="admin-list">`;
        for (const [id, event] of upcoming) {
          html += renderEventListItem(id, event);
        }
        html += `</div>`;
      }

      if (past.length > 0) {
        html += `<details class="mt-md"><summary class="form-label" style="cursor:pointer">Past Events (${past.length})</summary>`;
        html += `<div class="admin-list mt-sm">`;
        for (const [id, event] of past.reverse()) {
          html += renderEventListItem(id, event);
        }
        html += `</div></details>`;
      }

      if (eventsList.length === 0 && editingEventId === null) {
        html += `<p class="text-muted mt-md">No events yet. Tap "+ Add Event" to create one.</p>`;
      }

      return html;
    }

    function renderEventListItem(id, event) {
      const peopleName = (event.people || []).map(pid => peopleObj[pid]?.name || '?').join(', ');
      const timeStr = event.allDay ? 'All day' : [event.startTime, event.endTime].filter(Boolean).join(' – ') || '';
      const color = event.color || '#4285f4';
      return `<div class="admin-list-item admin-list-item--clickable admin-event-row" data-event-id="${id}">
        <div class="admin-list-item__main" style="border-left:3px solid ${color};padding-left:var(--spacing-sm)">
          <span class="admin-list-item__name">${esc(event.name)}</span>
          <span class="admin-list-item__meta">${esc(event.date)} ${timeStr ? '· ' + esc(timeStr) : ''} ${peopleName ? '· ' + esc(peopleName) : ''}</span>
        </div>
        <div class="admin-list-item__actions">
          <button class="btn btn--ghost btn--sm admin-event-delete" data-event-id="${id}" type="button">Del</button>
        </div>
      </div>`;
    }

    function renderEventFormAdmin(eventId) {
      const event = eventId ? eventsObj[eventId] || {} : {};

      const currentColor = event.color || '#4285f4';
      const colorDots = colorPalette.map(c =>
        `<button class="dt-color-btn${c === currentColor ? ' dt-color-btn--active' : ''}" data-color="${c}" style="background:${c}" type="button"></button>`
      ).join('');

      return `<div class="admin-form" id="eventFormAdmin">
        <h3 class="admin-form__title">${title}</h3>
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" id="aef_name" value="${esc(event.name || '')}" placeholder="Soccer practice, Dentist, etc.">
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="aef_date" value="${event.date || today}">
        </div>
        <div class="form-group">
          <label class="admin-checkbox"><input type="checkbox" id="aef_allDay" ${event.allDay ? 'checked' : ''}> All day</label>
        </div>
        <div class="form-row" id="aef_timeGroup" ${event.allDay ? 'style="display:none"' : ''}>
          <div class="form-group" style="flex:1">
            <label class="form-label">Start</label>
            <input type="time" id="aef_startTime" value="${event.startTime || ''}">
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label">End</label>
            <input type="time" id="aef_endTime" value="${event.endTime || ''}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">People</label>
          <div class="owner-chips" id="aef_people">${peoplePills}</div>
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <div class="dt-colors" id="aef_colors">${colorDots}</div>
        </div>

          <label class="form-label">Location</label>
          <input type="text" id="aef_location" value="${esc(event.location || '')}" placeholder="Optional">
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea id="aef_notes" rows="2" placeholder="Optional">${esc(event.notes || '')}</textarea>
        </div>
        <div class="admin-form__actions mt-md">
          <button class="btn btn--secondary" id="eventFormCancel" type="button">Cancel</button>
          <button class="btn btn--primary" id="eventFormSave" type="button">${isEdit ? 'Save Changes' : 'Add Event'}</button>
        </div>
      </div>`;
    }

    // People Tab

    function renderPeopleTab() {

          <div class="color-grid" id="pf_colorGrid">
            ${colors.map(c => {

              const sel = selColor === c ? ' selected' : '';

          <label class="admin-checkbox"><input type="checkbox" id="pf_showCalendar"${ks.showCalendar ? ' checked' : ''}> Show calendar</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_canDelegate"${ks.canDelegate ? ' checked' : ''}> Can delegate tasks</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_canMoveTasks"${ks.canMoveTasks ? ' checked' : ''}> Can move tasks</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_showSlider"${ks.showSlider ? ' checked' : ''}> Show points slider</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_showTaskEmoji"${ks.showTaskEmoji ? ' checked' : ''}> Show task emoji (picture hints)</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_showGearIcon"${ks.showGearIcon ? ' checked' : ''}> Show settings gear icon</label>

          <div class="form-group mt-sm">
            <label class="form-label">Celebration Style</label>
            <select id="pf_celebrationStyle">
              <option value="full"${(ks.celebrationStyle || 'full') === 'full' ? ' selected' : ''}>Full</option>
              <option value="subtle"${ks.celebrationStyle === 'subtle' ? ' selected' : ''}>Subtle</option>
              <option value="off"${ks.celebrationStyle === 'off' ? ' selected' : ''}>Off</option>
            </select>
          </div>
          <div class="form-group mt-sm">
            <label class="form-label">Personal Theme</label>
            <select id="pf_theme">
              <option value=""${!person.theme?.preset ? ' selected' : ''}>Use family theme</option>
              ${getPresets().map(p => `<option value="${p.key}"${person.theme?.preset === p.key ? ' selected' : ''}>${esc(p.label)}</option>`).join('')}

          </div>
        </div>
        <div class="admin-form__actions mt-md">
          <button class="btn btn--secondary" id="personFormCancel" type="button">Cancel</button>
          <button class="btn btn--primary" id="personFormSave" type="button">${isEdit ? 'Save Changes' : 'Add Person'}</button>
        </div>
      </div>`;
      return html;
    }

    let editingCatKey = null;

    function renderCategoriesTab() {
      const ca = catsArray();
      let html = `<div class="admin-section-header">
        <span>${ca.length} categories</span>
        <button class="btn btn--primary btn--sm" id="addCatBtn" type="button">+ Add Category</button>
      </div>`;

      if (editingCatKey !== null) {
        html += renderCategoryForm(editingCatKey === 'new' ? null : editingCatKey);

      for (const c of ca) {

        if (c.weightPercent) badges.push(`<span class="admin-badge admin-badge--muted">${c.weightPercent}%</span>`);

          </div>

          <div class="admin-color-grid admin-color-grid--sm" id="eventColorGrid">

    async function loadScheduleStats() {
      const el = document.getElementById('scheduleStats');
      if (!el) return;

      const allSchedule = await readAllSchedule() || {};
      const tomorrow = addDays(today, 1);
      const futureDates = Object.keys(allSchedule).filter(d => d >= tomorrow).sort();
      const pa = peopleArray();

      let totalEntries = 0;
      let totalMinutes = 0;
      const perPerson = {};
      const perPersonMin = {};
      for (const p of pa) { perPerson[p.id] = 0; perPersonMin[p.id] = 0; }

      for (const dateKey of futureDates) {
        const dayEntries = allSchedule[dateKey] || {};
        const entries = Object.values(dayEntries);
        totalEntries += entries.length;
        for (const e of entries) {
          const task = tasksObj[e.taskId];
          const mins = task ? (task.estMin || 0) : 0;
          totalMinutes += mins;
          if (perPerson[e.ownerId] !== undefined) {
            perPerson[e.ownerId]++;
            perPersonMin[e.ownerId] += mins;
          }
        }
      }

      const totalHrs = Math.floor(totalMinutes / 60);
      const totalRem = totalMinutes % 60;
      const totalTimeStr = totalHrs > 0 ? `${totalHrs}h ${totalRem}m` : `${totalRem}m`;

      let html = `<div class="admin-stat-cards">
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${futureDates.length}</span>
          <span class="admin-stat-card__label">Days Scheduled</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${totalEntries}</span>
          <span class="admin-stat-card__label">Total Entries</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${totalTimeStr}</span>
          <span class="admin-stat-card__label">Total Time</span>
        </div>
      </div>
      <h4 class="form-label mt-md">Load per Person</h4>
      <div class="admin-list">`;
      for (const p of pa) {
        const count = perPerson[p.id] || 0;
        const avg = futureDates.length > 0 ? (count / futureDates.length).toFixed(1) : '0';
        const personMins = perPersonMin[p.id] || 0;
        const avgMins = futureDates.length > 0 ? (personMins / futureDates.length) : 0;
        const avgMinsStr = avgMins >= 60
          ? `${Math.floor(avgMins / 60)}h ${Math.round(avgMins % 60)}m`
          : `${Math.round(avgMins)}m`;
        const personTotalStr = personMins >= 60
          ? `${Math.floor(personMins / 60)}h ${personMins % 60}m`
          : `${personMins}m`;
        html += `<div class="admin-list-item">
          <div class="admin-person-row">
            <div class="admin-person-dot admin-person-dot--sm" style="background:${p.color}"></div>
            <span class="admin-list-item__name">${esc(p.name)}</span>
          </div>
          <span class="admin-list-item__meta">${count} tasks · ${avg}/day · ${personTotalStr} · ${avgMinsStr}/day</span>
        </div>`;
      }
      html += `</div>`;
      el.innerHTML = html;
    }

    async function loadEventLog() {
      const el = document.getElementById('eventLog');
      if (!el) return;

      const events = await readOnce('debug/eventLog') || {};
      const entries = Object.entries(events)
        .map(([key, val]) => ({ key, ...val }))
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
        .slice(0, 50);

      if (entries.length === 0) {
        el.innerHTML = '<p class="text-muted">No events logged yet.</p>';
        return;
      }

      let html = `<div class="admin-list admin-list--compact">`;
      for (const e of entries) {
        const time = e.timestamp ? new Date(e.timestamp).toLocaleString() : '—';
        const payload = e.payload ? JSON.stringify(e.payload).slice(0, 100) : '';
        html += `<div class="admin-list-item admin-list-item--compact">
          <div class="admin-list-item__main">
            <span class="admin-list-item__name">${e.type || 'unknown'}</span>
            <span class="admin-list-item__meta">${time}${payload ? ' · ' + payload : ''}</span>
          </div>
        </div>`;
      }
      html += `</div>`;
      el.innerHTML = html;
    }

    function inspectTask(taskId) {
      const el = document.getElementById('inspectResult');
      if (!el || !taskId) { if (el) el.innerHTML = ''; return; }

      const task = tasksObj[taskId];
      if (!task) { el.innerHTML = '<p class="text-muted">Task not found.</p>'; return; }

      const pa = peopleArray();
      const owners = (task.owners || []).map(oid => ({ id: oid, name: peopleObj[oid]?.name || '?' }));
      const pts = basePoints(task, settings?.difficultyMultipliers);

      let info = `Task: ${task.name}\n`;
      info += `Rotation: ${task.rotation}\n`;
      info += `Difficulty: ${task.difficulty} · Est: ${task.estMin}m · Points: ${pts}\n`;
      info += `Time of Day: ${task.timeOfDay}\n`;
      info += `Assignment Mode: ${task.ownerAssignmentMode || 'rotate'}\n`;
      info += `Owners: ${owners.map(o => o.name).join(', ')}\n`;
      info += `Status: ${task.status || 'active'}\n`;
      if (task.dedicatedDay != null) info += `Dedicated Day: ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][task.dedicatedDay]}\n`;
      if (task.cooldownDays) info += `Cooldown: ${task.cooldownDays} days\n`;
      if (task.exempt) info += `Exempt from scoring: Yes\n`;
      info += `Category: ${catsObj[task.category]?.label || task.category || 'None'}\n`;
      info += `Created: ${task.createdDate || '?'}\n`;

      el.innerHTML = `<pre class="admin-pre">${esc(info)}</pre>`;
    }

            <button type="button" class="segmented-btn${reward.rewardType === 'task-skip' ? ' segmented-btn--active' : ''}" data-value="task-skip">Task Skip</button>
            <button type="button" class="segmented-btn${reward.rewardType === 'penalty-removal' ? ' segmented-btn--active' : ''}" data-value="penalty-removal">Penalty Removal</button>
          </div>
          <div id="rf_typeHint" class="form-hint" style="margin-top: 4px;"></div>

          <label class="form-label">Point Cost</label>
          <input type="number" id="rf_pointCost" class="form-input" value="${reward.pointCost || ''}" min="1" placeholder="Enter or use helper below">

          <div class="pricing-helper" style="background: var(--surface-alt, var(--surface)); padding: 12px; border-radius: var(--radius, 8px); margin-top: 8px;">
            <label class="form-label" style="margin-bottom: 4px;">How long should this take to earn?</label>
            <div style="display: flex; align-items: center; gap: 8px;">
              <input type="range" id="rf_daysSlider" min="1" max="30" value="7" style="flex: 1;">
              <input type="number" id="rf_daysInput" class="form-input form-input--sm" value="7" min="1" style="width: 60px;">
              <span>days</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
              <label class="form-label" style="margin: 0;">Assumed average:</label>
              <select id="rf_avgSelect" class="form-input form-input--sm" style="width: auto;">
                ${PRICING_AVERAGES.map(a => `<option value="${a.value}"${a.value === 88 ? ' selected' : ''}>${a.label}</option>`).join('')}
              </select>
            </div>
            <div id="rf_suggestion" class="form-hint" style="margin-top: 8px; cursor: pointer; color: var(--accent);">
              7 days at B+ average &rarr; <strong>615 pts</strong> (click to apply)
            </div>
          </div>

          <label class="form-label" style="margin-top: 12px;">Available to</label>
          <div class="chip-group" id="rf_people">
            ${peopleArray().map(p => {
              const selected = reward.perPerson && reward.perPerson.includes(p.id);
              return `<button class="chip chip--selectable${selected ? ' chip--active' : ''}" data-person-id="${p.id}" style="--person-color:${p.color}" type="button">${esc(p.name)}</button>`;
            }).join('')}
            <span class="form-hint" style="margin-left: 4px;">None = everyone</span>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;">
            <div>
              <label class="form-label">Max redemptions</label>
              <input type="number" id="rf_maxRedemptions" class="form-input" value="${reward.maxRedemptions || ''}" min="1" placeholder="Unlimited">
            </div>
            <div>
              <label class="form-label">Streak requirement</label>
              <input type="number" id="rf_streakReq" class="form-input" value="${reward.streakRequirement || ''}" min="1" placeholder="None">
            </div>
          </div>

          <label class="form-label" style="margin-top: 12px;">Expires on</label>
          <input type="date" id="rf_expiresAt" class="form-input" value="${reward.expiresAt ? new Date(reward.expiresAt).toISOString().split('T')[0] : ''}">

          <div class="admin-form__actions" style="margin-top: 16px;">
            <button class="btn btn--primary" id="rf_save" type="button">${isEdit ? 'Save' : 'Create'}</button>
            <button class="btn btn--ghost" id="rf_cancel" type="button">Cancel</button>
          </div>
        </div>
      </div>`;
    }

    function bindRewardsTab() {
      main.querySelector('#addRewardBtn')?.addEventListener('click', () => {
        editingRewardId = 'new';
        render();
      });

      for (const btn of main.querySelectorAll('.reward-edit')) {
        btn.addEventListener('click', () => {
          editingRewardId = btn.dataset.rewardId;
          render();
        });
      }

      for (const btn of main.querySelectorAll('.reward-archive')) {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.rewardId;
          await archiveReward(id);
          rewardsObj[id].status = 'archived';
          render();
        });
      }

      if (editingRewardId !== null) {
        bindRewardForm();
      }
    }

    function bindRewardForm() {
      const form = document.getElementById('rewardForm');
      if (!form) return;

      // Emoji picker
      for (const btn of form.querySelectorAll('.emoji-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-btn--selected'));
          btn.classList.add('emoji-btn--selected');
          form.querySelector('#rf_customEmoji').value = '';
        });
      }

      // Type segmented control
      for (const btn of form.querySelectorAll('#rf_type .segmented-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('#rf_type .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          const hint = form.querySelector('#rf_typeHint');
          const val = btn.dataset.value;
          hint.textContent = val === 'task-skip' ? 'Person picks a task to skip for the day'
            : val === 'penalty-removal' ? 'Removes the late penalty from a past task' : '';
        });
      }

      // Pricing helper
      const slider = form.querySelector('#rf_daysSlider');
      const daysInput = form.querySelector('#rf_daysInput');
      const avgSelect = form.querySelector('#rf_avgSelect');
      const suggestion = form.querySelector('#rf_suggestion');
      const pointCost = form.querySelector('#rf_pointCost');

      function updateSuggestion() {
        const days = parseInt(daysInput.value) || 7;
        const avg = parseInt(avgSelect.value) || 88;
        const cost = Math.round((days * avg) / 5) * 5;
        const avgLabel = PRICING_AVERAGES.find(a => a.value === avg)?.label || avg + '%';
        suggestion.innerHTML = `${days} day${days > 1 ? 's' : ''} at ${avgLabel} average &rarr; <strong>${cost} pts</strong> (click to apply)`;
        suggestion.dataset.cost = cost;
      }

      slider.addEventListener('input', () => { daysInput.value = slider.value; updateSuggestion(); });
      daysInput.addEventListener('input', () => {
        const v = parseInt(daysInput.value);
        if (v && v <= 30) slider.value = v;
        updateSuggestion();
      });
      avgSelect.addEventListener('change', updateSuggestion);
      suggestion.addEventListener('click', () => { pointCost.value = suggestion.dataset.cost; });
      updateSuggestion();

      // Person chips
      for (const chip of form.querySelectorAll('#rf_people .chip--selectable')) {
        chip.addEventListener('click', () => chip.classList.toggle('chip--active'));
      }

      // Cancel
      form.querySelector('#rf_cancel').addEventListener('click', () => {
        editingRewardId = null;
        render();
      });

      // Save
      form.querySelector('#rf_save').addEventListener('click', async () => {
        const name = form.querySelector('#rf_name').value.trim();
        if (!name) return;

        const selectedEmoji = form.querySelector('.emoji-btn--selected')?.dataset?.emoji
          || form.querySelector('#rf_customEmoji').value.trim() || '🎁';
        const rewardType = form.querySelector('#rf_type .segmented-btn--active')?.dataset?.value || 'custom';
        const cost = parseInt(form.querySelector('#rf_pointCost').value) || 0;
        if (cost <= 0) return;

        const selectedPeople = [...form.querySelectorAll('#rf_people .chip--active')]
          .map(c => c.dataset.personId);
        const maxRedemptions = parseInt(form.querySelector('#rf_maxRedemptions').value) || null;
        const streakReq = parseInt(form.querySelector('#rf_streakReq').value) || null;
        const expiresDate = form.querySelector('#rf_expiresAt').value;
        const expiresAt = expiresDate ? new Date(expiresDate + 'T23:59:59').getTime() : null;

        const data = {
          name,
          icon: selectedEmoji,
          pointCost: cost,
          rewardType,
          perPerson: selectedPeople.length > 0 ? selectedPeople : null,
          maxRedemptions,
          streakRequirement: streakReq,
          expiresAt,
          status: 'active'
        };

        if (editingRewardId && editingRewardId !== 'new') {
          await writeReward(editingRewardId, data);
          rewardsObj[editingRewardId] = data;
        } else {
          const ref = await pushReward(data);
          rewardsObj[ref.key] = data;
        }

        editingRewardId = null;
        render();
      });
    }

    // ══════════════════════════════════════════
    // Tab-specific event binding
    // ══════════════════════════════════════════

    function bindTabContent() {
      switch (activeTab) {
        case 'tasks': bindTasksTab(); break;
        case 'events': bindEventsTab(); break;
        case 'people': bindPeopleTab(); break;
        case 'categories': bindCategoriesTab(); break;
        case 'rewards': bindRewardsTab(); break;
        case 'settings': bindSettingsTab(); break;
        case 'theme': bindThemeTab(); break;
        case 'schedule': bindScheduleTab(); break;
        case 'data': bindDataTab(); break;
        case 'debug': bindDebugTab(); break;
      }
    }

    // ── Tasks tab events ──

    function bindTasksTab() {
      // Filters
      for (const id of ['taskFilterRotation', 'taskFilterOwner', 'taskFilterCategory', 'taskFilterStatus', 'taskFilterDifficulty', 'taskSortBy']) {
        const el = main.querySelector(`#${id}`);
        if (el) el.addEventListener('change', () => {
          taskFilter.rotation = main.querySelector('#taskFilterRotation')?.value || '';
          taskFilter.owner = main.querySelector('#taskFilterOwner')?.value || '';
          taskFilter.category = main.querySelector('#taskFilterCategory')?.value || '';
          taskFilter.status = main.querySelector('#taskFilterStatus')?.value || '';
          taskFilter.difficulty = main.querySelector('#taskFilterDifficulty')?.value || '';
          taskSort = main.querySelector('#taskSortBy')?.value || 'name';
          render();
        });
      }

      // Add task
      main.querySelector('#addTaskBtn')?.addEventListener('click', () => {
        editingTaskId = 'new';
        showingTemplates = false;
        render();
      });

      // Templates toggle
      main.querySelector('#templateBtn')?.addEventListener('click', () => {
        showingTemplates = !showingTemplates;
        render();
      });
      main.querySelector('#closeTemplates')?.addEventListener('click', () => {
        showingTemplates = false;
        render();
      });

      // Select mode toggle
      main.querySelector('#selectModeBtn')?.addEventListener('click', () => {
        selectMode = true;
        editingTaskId = null;
        showingTemplates = false;
        render();
      });
      main.querySelector('#cancelSelectBtn')?.addEventListener('click', () => {
        selectMode = false;
        selectedTaskIds.clear();
        render();
      });
      main.querySelector('#selectAllBtn')?.addEventListener('click', () => {
        for (const item of main.querySelectorAll('.admin-list-item[data-task-id]')) {
          selectedTaskIds.add(item.dataset.taskId);
        }
        render();
      });
      main.querySelector('#deselectAllBtn')?.addEventListener('click', () => {
        selectedTaskIds.clear();
        render();
      });

      // Floating action bar buttons
      main.querySelector('#bulkCancelBtn')?.addEventListener('click', () => {
        selectMode = false;
        selectedTaskIds.clear();
        render();
      });
      main.querySelector('#bulkEditBtn')?.addEventListener('click', () => {
        renderBulkEditModal();
      });
      main.querySelector('#bulkDeleteBtn')?.addEventListener('click', () => {
        handleBulkDelete();
      });

      // Template import buttons
      for (const btn of main.querySelectorAll('.template-import-btn')) {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.template;
          const pack = TASK_TEMPLATES[key];
          if (!pack) return;
          btn.disabled = true;
          btn.textContent = 'Importing...';

          // Find default category (first non-event category, or none)
          const defaultCat = catsArray().find(c => !c.isEvent)?.key || '';

          let imported = 0;
          for (const t of pack.tasks) {
            // Skip if task with same name already exists
            const exists = Object.values(tasksObj).some(existing => existing.name === t.name);
            if (exists) continue;

            const taskData = {
              name: t.name,
              rotation: t.rotation,
              difficulty: t.difficulty || 'medium',
              estMin: t.estMin || 10,
              timeOfDay: t.timeOfDay || 'anytime',
              ownerAssignmentMode: 'rotate',
              owners: [],
              category: defaultCat,
              status: 'active',
              createdDate: today
            };
            const newId = await pushTask(taskData);
            tasksObj[newId] = taskData;
            imported++;
          }

          showingTemplates = false;
          render();
          if (imported > 0) {
            showUndoToast(`Imported ${imported} tasks from "${pack.label}"`, () => {});
          } else {
            showUndoToast(`All tasks from "${pack.label}" already exist`, () => {});
          }
        });
      }

      // Task row click — select mode toggles checkbox, normal mode opens edit
      for (const item of main.querySelectorAll('.admin-list-item[data-task-id]')) {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.admin-list-item__actions')) return;
          const tid = item.dataset.taskId;
          if (selectMode) {
            if (selectedTaskIds.has(tid)) {
              selectedTaskIds.delete(tid);
            } else {
              selectedTaskIds.add(tid);
            }
            render();
          } else {
            editingTaskId = editingTaskId === tid ? null : tid;
            render();
          }
        });
      }
      for (const btn of main.querySelectorAll('.admin-edit-task')) {
        btn.addEventListener('click', () => {
          const tid = btn.dataset.taskId;
          editingTaskId = editingTaskId === tid ? null : tid;
          render();
        });
      }

      // Modal backdrop click → close
      document.querySelector('#taskFormBackdrop')?.addEventListener('click', (e) => {
        if (e.target.id === 'taskFormBackdrop') {
          editingTaskId = null;
          render();
        }
      });

      // Pause/unpause
      for (const btn of main.querySelectorAll('.admin-pause-task')) {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.taskId;
          const task = tasksObj[id];
          if (!task) return;
          task.status = task.status === 'paused' ? 'active' : 'paused';
          await writeTask(id, task);
          // Rebuild schedule so paused tasks are removed / unpaused tasks are placed
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, { includeToday: true }, catsObj);
          await multiUpdate(futureUpdates);
          render();
        });
      }

      // Delete task (with undo)
      for (const btn of main.querySelectorAll('.admin-delete-task')) {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.taskId;
          const taskBackup = { ...tasksObj[id] };
          const taskName = taskBackup.name || 'task';

          // Immediately hide from UI
          delete tasksObj[id];
          editingTaskId = null;
          render();

          // Delayed delete — undo restores before Firebase delete fires
          let cancelled = false;
          const deleteTimer = setTimeout(async () => {
            if (cancelled) return;
            // Delete the task first — this is the critical operation
            await removeTask(id);
            // Clean up orphaned schedule entries and completions (best-effort)
            try {
              const allSched = await readAllSchedule() || {};
              const allComp = await readCompletions() || {};
              const cleanupUpdates = {};
              for (const [dateKey, dayEntries] of Object.entries(allSched)) {
                for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
                  if (entry.taskId === id) {
                    cleanupUpdates[`schedule/${dateKey}/${entryKey}`] = null;
                    if (allComp[entryKey]) {
                      cleanupUpdates[`completions/${entryKey}`] = null;
                    }
                  }
                }
              }
              if (Object.keys(cleanupUpdates).length > 0) {
                await multiUpdate(cleanupUpdates);
              }
            } catch (e) {
              console.warn('Task deleted but schedule cleanup failed:', e);
            }
          }, 5500);

          showUndoToast(`Deleted "${taskName}"`, () => {
            cancelled = true;
            clearTimeout(deleteTimer);
            tasksObj[id] = taskBackup;
            render();
          });
        });
      }

      // Task form events
      if (editingTaskId !== null) {
        bindTaskForm();
      }
    }

    function bindTaskForm() {
      const root = editingTaskId === 'new' ? main : document;
      initOwnerChips('tf_owners');
      // Assignment mode toggle
      for (const btn of root.querySelectorAll('#tf_assignMode .admin-mode-btn')) {
        btn.addEventListener('click', () => {
          root.querySelectorAll('#tf_assignMode .admin-mode-btn').forEach(b => b.classList.remove('admin-mode-btn--active'));
          btn.classList.add('admin-mode-btn--active');
        });
      }

      // Category change — show/hide event date icon
      root.querySelector('#tf_category')?.addEventListener('change', (e) => {
        const opt = e.target.selectedOptions[0];
        const isEvent = opt?.dataset.event === '1';
        const eventBtn = root.querySelector('#tf_eventDateBtn');
        if (eventBtn) eventBtn.style.display = isEvent ? 'inline' : 'none';
        const eventTimeGroup = root.querySelector('#tf_eventTimeGroup');
        if (eventTimeGroup) eventTimeGroup.style.display = isEvent ? '' : 'none';
        const notesGroup = root.querySelector('#tf_notesGroup');
        if (notesGroup) notesGroup.style.display = isEvent ? '' : 'none';
        // If event, force rotation to once
        if (isEvent) {
          const rotSelect = root.querySelector('#tf_rotation');
          if (rotSelect) { rotSelect.value = 'once'; rotSelect.dispatchEvent(new Event('change')); }
        }
      });

      // Event date icon — open native date picker
      root.querySelector('#tf_eventDateBtn')?.addEventListener('click', () => {
        const picker = root.querySelector('#tf_eventDate');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      // Rotation change — show/hide dedicated day vs date picker
      root.querySelector('#tf_rotation')?.addEventListener('change', (e) => {
        const rot = e.target.value;
        const group = root.querySelector('#tf_dedicatedDayGroup');
        const daySelect = root.querySelector('#tf_daySelect');
        const dateRow = root.querySelector('#tf_dedicatedDateRow');
        const label = root.querySelector('#tf_dedicatedDayLabel');
        const catOpt = root.querySelector('#tf_category')?.selectedOptions[0];
        const isEvent = catOpt?.dataset.event === '1';
        if (rot === 'daily') {
          group.style.display = 'none';
        } else {
          group.style.display = '';
          const eventBtn = label?.querySelector('#tf_eventDateBtn');
          const btnHtml = eventBtn ? eventBtn.outerHTML : '';
          if (rot === 'once') {
            daySelect.style.display = 'none';
            dateRow.style.display = isEvent ? 'none' : '';
            label.innerHTML = (isEvent ? 'Event Date ' : 'Date ') + btnHtml;
          } else {
            daySelect.style.display = '';
            dateRow.style.display = 'none';
            label.innerHTML = 'Day ' + btnHtml;
          }
          // Re-bind event date button after innerHTML replace
          label?.querySelector('#tf_eventDateBtn')?.addEventListener('click', () => {
            const picker = root.querySelector('#tf_eventDate');
            if (picker) { try { picker.showPicker(); } catch(e2) { picker.click(); } }
          });
        }
      });

      // Bounty toggle
      const bountyToggle = root.querySelector('#tf_bountyToggle');
      const bountyFields = root.querySelector('#tf_bountyFields');
      if (bountyToggle) {
        bountyToggle.addEventListener('change', () => {
          bountyFields.style.display = bountyToggle.checked ? '' : 'none';
          if (bountyToggle.checked) {
            root.querySelector('#tf_exempt').checked = true;
          }
        });
      }
      // Bounty type segmented control
      for (const btn of root.querySelectorAll('#tf_bountyType .segmented-btn')) {
        btn.addEventListener('click', () => {
          root.querySelectorAll('#tf_bountyType .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          root.querySelector('#tf_bountyPointsField').style.display = btn.dataset.value === 'points' ? '' : 'none';
          root.querySelector('#tf_bountyRewardField').style.display = btn.dataset.value === 'reward' ? '' : 'none';
        });
      }

      // Cancel
      root.querySelector('#tf_cancel')?.addEventListener('click', () => {
        editingTaskId = null;
        render();
      });

      // Save
      root.querySelector('#tf_save')?.addEventListener('click', async () => {
        const name = root.querySelector('#tf_name')?.value.trim();
        if (!name) { root.querySelector('#tf_name')?.focus(); return; }

        const owners = getSelectedOwners('tf_owners');
        const activeMode = root.querySelector('#tf_assignMode .admin-mode-btn.admin-mode-btn--active');
        const assignMode = activeMode?.dataset.mode || 'rotate';
        const cooldown = root.querySelector('#tf_cooldown')?.value;
        const rotation = root.querySelector('#tf_rotation')?.value || 'daily';

        // Read dedicated day from select or date from picker
        const dayVal = root.querySelector('#tf_daySelect')?.value;
        const dedicatedDay = (rotation !== 'once' && dayVal !== '' && dayVal != null) ? parseInt(dayVal, 10) : null;
        const dedicatedDate = rotation === 'once' ? (root.querySelector('#tf_dedicatedDate')?.value || null) : null;

        const catKey = root.querySelector('#tf_category')?.value || '';
        const catIsEvent = catsObj[catKey]?.isEvent || false;
        const effectiveMode = catIsEvent ? 'fixed' : assignMode;

        // Event date overrides dedicatedDate & rotation
        const eventDate = catIsEvent ? (root.querySelector('#tf_eventDate')?.value || null) : null;
        const effectiveRotation = catIsEvent && eventDate ? 'once' : rotation;
        const effectiveDedicatedDate = catIsEvent && eventDate ? eventDate : dedicatedDate;
        const eventTime = catIsEvent ? (root.querySelector('#tf_eventTime')?.value || null) : null;
        const notes = catIsEvent ? (root.querySelector('#tf_notes')?.value.trim() || null) : null;

        const taskData = {
          name,
          rotation: effectiveRotation,
          difficulty: root.querySelector('#tf_difficulty')?.value || 'medium',
          timeOfDay: root.querySelector('#tf_timeOfDay')?.value || 'anytime',
          estMin: (v => isNaN(v) ? 10 : v)(parseInt(root.querySelector('#tf_estMin')?.value, 10)),
          category: catKey,
          owners,
          ownerAssignmentMode: effectiveMode,
          dedicatedDay,
          dedicatedDate: effectiveDedicatedDate,
          eventTime,
          notes,
          cooldownDays: cooldown ? parseInt(cooldown, 10) : null,
          exempt: root.querySelector('#tf_exempt')?.checked || false,
          status: 'active'
        };

        // Read bounty data
        const isBounty = root.querySelector('#tf_bountyToggle')?.checked;
        let bounty = null;
        if (isBounty) {
          const bountyType = root.querySelector('#tf_bountyType .segmented-btn--active')?.dataset?.value || 'points';
          bounty = {
            type: bountyType,
            amount: bountyType === 'points' ? (parseInt(root.querySelector('#tf_bountyAmount')?.value) || 50) : null,
            rewardId: bountyType === 'reward' ? (root.querySelector('#tf_bountyReward')?.value || null) : null
          };
          taskData.exempt = true;
        }
        taskData.bounty = bounty;

        if (editingTaskId === 'new') {
          taskData.createdDate = today;
          const newId = await pushTask(taskData);
          tasksObj[newId] = taskData;

          // Create schedule entry for today so the task appears immediately
          // Skip if one-time task with a future dedicatedDate
          // Skip weekly/monthly if they have a dedicatedDay that isn't today
          const skipToday = (taskData.rotation === 'once' && taskData.dedicatedDate && taskData.dedicatedDate !== today)
            || ((taskData.rotation === 'weekly' || taskData.rotation === 'monthly') && taskData.dedicatedDay != null && dayOfWeek(today) !== taskData.dedicatedDay);
          if (owners.length > 0 && !skipToday) {
            const schedUpdates = {};
            const baseEntry = { taskId: newId, rotationType: taskData.rotation, ownerAssignmentMode: effectiveMode, ...(taskData.notes ? { notes: taskData.notes } : {}) };
            const tod = taskData.timeOfDay || 'anytime';
            let newCounter = 0;
            const newKey = () => `sched_${Date.now()}_${String(newCounter++).padStart(5, '0')}`;

            if (effectiveMode === 'duplicate') {
              for (const oid of owners) {
                if (tod === 'both') {
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'am' };
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'pm' };
                } else {
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: tod };
                }
              }
            } else {
              // Use proper rotation owner instead of always first owner
              const ownerId = effectiveMode === 'fixed' ? owners[0] : getRotationOwner(taskData, today, newId);
              if (tod === 'both') {
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'am' };
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'pm' };
              } else {
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: tod };
              }
            }
            await multiUpdate(schedUpdates);
          }

          // Rebuild future schedule so the new task appears on upcoming days
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, undefined, catsObj);
          await multiUpdate(futureUpdates);
        } else {
          // Preserve existing fields
          const existing = tasksObj[editingTaskId] || {};
          taskData.createdDate = existing.createdDate || today;
          taskData.status = existing.status || 'active';
          await writeTask(editingTaskId, taskData);
          tasksObj[editingTaskId] = taskData;

          // Auto-rebuild future schedule so edits take effect immediately
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, { includeToday: true }, catsObj);
          await multiUpdate(futureUpdates);
        }

        editingTaskId = null;
        render();
      });
    }

        if (difficulty) changes.difficulty = difficulty;

    async function handleBulkDelete() {
      const count = selectedTaskIds.size;
      if (!confirm(`Delete ${count} task${count !== 1 ? 's' : ''}? This cannot be undone.`)) return;

      const ids = [...selectedTaskIds];

      // Remove from local state immediately
      for (const id of ids) {
        delete tasksObj[id];
      }
      selectMode = false;
      selectedTaskIds.clear();
      editingTaskId = null;
      render();

      // Delete tasks from Firebase
      for (const id of ids) {
        await removeTask(id);
      }

      // Clean up orphaned schedule entries and completions
      try {
        const allSched = await readAllSchedule() || {};
        const allComp = await readCompletions() || {};
        const cleanupUpdates = {};
        const idSet = new Set(ids);
        for (const [dateKey, dayEntries] of Object.entries(allSched)) {
          for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
            if (idSet.has(entry.taskId)) {
              cleanupUpdates[`schedule/${dateKey}/${entryKey}`] = null;
              if (allComp[entryKey]) {
                cleanupUpdates[`completions/${entryKey}`] = null;
              }
            }
          }
        }
        if (Object.keys(cleanupUpdates).length > 0) {
          await multiUpdate(cleanupUpdates);
        }
      } catch (e) {
        console.warn('Tasks deleted but schedule cleanup failed:', e);
      }

      // Rebuild schedule
      const allSched2 = await readAllSchedule() || {};
      const allComp2 = await readCompletions() || {};
      const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp2, allSched2, { includeToday: true }, catsObj);
      await multiUpdate(futureUpdates);

      showUndoToast(`Deleted ${count} task${count !== 1 ? 's' : ''}`);
    }
