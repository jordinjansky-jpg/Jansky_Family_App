<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daily Rundown — Admin</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>

    <!-- PIN Gate -->
    <div id="pinGate" style="display:none;">
      <div class="admin-pin-gate">
        <div>🔒</div>
        <h2 class="admin-pin-gate__title">Admin Access</h2>
        <p class="admin-pin-gate__desc">Enter your 4-digit PIN</p>
        <div class="admin-pin-gate__inputs">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="0" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="1" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="2" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="3" inputmode="numeric">
        </div>
        <p class="admin-pin-gate__error" id="pinError"></p>
      </div>
    </div>

    <!-- Admin Content (after PIN) -->
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script type="module">
    import {
      initFirebase, isFirstRun, readSettings, writeSettings,
      readPeople, writePerson, pushPerson, removeData,
      readTasks, pushTask, writeTask, removeTask,
      readCategories, writeCategories,
      readCompletions, readAllSchedule, readOnce,
      multiUpdate, pushDebugEvent, factoryReset, onConnectionChange
    } from './shared/firebase.js';
    import { renderNavBar, renderHeader, renderConnectionStatus, renderEmptyState } from './shared/components.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig, getPresets, getColorPalette } from './shared/theme.js';
    import { todayKey, addDays, dateRange, formatDateShort, getTimezoneOptions, detectTimezone, dayOfWeek } from './shared/utils.js';
    import { generateSchedule, buildScheduleUpdates, buildPeriodResetUpdates, getRotationOwner } from './shared/scheduler.js';
    import { basePoints } from './shared/scoring.js';

    // ── Cached theme ──
    const cached = loadCachedTheme();
    applyTheme(cached || defaultThemeConfig());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load data ──
    let settings = await readSettings();
    if (!cached && settings?.theme) applyTheme(settings.theme);

    let peopleObj = await readPeople() || {};
    let tasksObj = await readTasks() || {};
    let catsObj = await readCategories() || {};

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);

    // ── Header & Nav ──
    const debugActive = localStorage.getItem('dr-debug') === 'true';
    document.getElementById('headerMount').innerHTML = renderHeader({
      appName: settings?.appName || 'Daily Rundown',
      subtitle: 'Admin',
      showAdmin: false,
      showDebug: debugActive
    });
    document.getElementById('navMount').innerHTML = renderNavBar(null);

    // ── Connection status ──
    onConnectionChange(connected => {
      const existing = document.querySelector('.connection-dot');
      const html = renderConnectionStatus(connected);
      if (existing) existing.outerHTML = html;
      else document.querySelector('.header__right')?.insertAdjacentHTML('afterbegin', html);
    });

    // ══════════════════════════════════════════
    // PIN Gate
    // ══════════════════════════════════════════

    document.getElementById('loadingState').style.display = 'none';

    const PIN_SESSION_KEY = 'dr-admin-pin-ts';
    const PIN_SESSION_TTL = 30 * 60 * 1000; // 30 minutes
    const adminPin = settings?.adminPin || '';
    const recoveryPin = settings?.recoveryPin || '9999';

    // Check if PIN session is still valid
    const pinTs = parseInt(sessionStorage.getItem(PIN_SESSION_KEY) || '0', 10);
    const pinSessionValid = Date.now() - pinTs < PIN_SESSION_TTL;
    if (pinSessionValid) {
      // Skip PIN gate — render() called after main is defined below
      document.getElementById('mainContent').style.display = '';
    } else {
      document.getElementById('pinGate').style.display = '';
      const digits = document.querySelectorAll('.admin-pin-digit');

      digits.forEach((input, i) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value.replace(/\D/g, '');
          e.target.value = val.slice(0, 1);
          if (val && i < digits.length - 1) digits[i + 1].focus();
          checkPin();
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && i > 0) digits[i - 1].focus();
        });
      });
      digits[0].focus();

      function checkPin() {
        const entered = Array.from(digits).map(d => d.value).join('');
        if (entered.length !== 4) return;

        if (entered === adminPin || entered === recoveryPin) {
          sessionStorage.setItem(PIN_SESSION_KEY, String(Date.now()));
          document.getElementById('pinGate').style.display = 'none';
          const main = document.getElementById('mainContent');
          main.style.display = '';
          render();
        } else {
          document.getElementById('pinError').textContent = 'Incorrect PIN';
          digits.forEach(d => d.value = '');
          digits[0].focus();
          setTimeout(() => { document.getElementById('pinError').textContent = ''; }, 2000);
        }
      }
    }

    // ══════════════════════════════════════════
    // Admin panel — tab-based layout
    // ══════════════════════════════════════════

    const TABS = [
      { id: 'tasks', icon: '✅', label: 'Tasks' },
      { id: 'people', icon: '👥', label: 'People' },
      { id: 'categories', icon: '📂', label: 'Categories' },
      { id: 'settings', icon: '⚙️', label: 'Settings' },
      { id: 'theme', icon: '🎨', label: 'Theme' },
      { id: 'schedule', icon: '📅', label: 'Schedule' },
      { id: 'data', icon: '💾', label: 'Data' },
      { id: 'debug', icon: '🐛', label: 'Debug' }
    ];

    let activeTab = 'tasks';

    // ── Helpers ──
    function peopleArray() {
      return Object.entries(peopleObj).map(([id, p]) => ({ id, ...p }));
    }
    function catsArray() {
      return Object.entries(catsObj).map(([key, c]) => ({ key, ...c }));
    }

    const main = document.getElementById('mainContent');

    // ══════════════════════════════════════════
    // Main render
    // ══════════════════════════════════════════

    function render() {
      let html = `<div class="admin-tabs">`;
      for (const tab of TABS) {
        const active = tab.id === activeTab ? ' admin-tab--active' : '';
        html += `<button class="admin-tab${active}" data-tab="${tab.id}" type="button">
          <span class="admin-tab__icon">${tab.icon}</span>
          <span class="admin-tab__label">${tab.label}</span>
        </button>`;
      }
      html += `</div><div class="admin-content">`;

      switch (activeTab) {
        case 'tasks': html += renderTasksTab(); break;
        case 'people': html += renderPeopleTab(); break;
        case 'categories': html += renderCategoriesTab(); break;
        case 'settings': html += renderSettingsTab(); break;
        case 'theme': html += renderThemeTab(); break;
        case 'schedule': html += renderScheduleTab(); break;
        case 'data': html += renderDataTab(); break;
        case 'debug': html += renderDebugTab(); break;
      }

      html += `</div>`;
      main.innerHTML = html;
      bindTabEvents();
      bindTabContent();
    }

    function bindTabEvents() {
      for (const tab of main.querySelectorAll('.admin-tab')) {
        tab.addEventListener('click', () => {
          activeTab = tab.dataset.tab;
          render();
        });
      }
    }

    // ══════════════════════════════════════════
    // Tasks Tab
    // ══════════════════════════════════════════

    let taskFilter = { rotation: '', owner: '', category: '', status: '' };
    let editingTaskId = null;

    function renderTasksTab() {
      const pa = peopleArray();
      const ca = catsArray();
      const taskEntries = Object.entries(tasksObj);

      // Filters
      let html = `<div class="admin-section">
        <div class="admin-filters">
          <select class="admin-select" id="taskFilterRotation">
            <option value="">All Rotations</option>
            <option value="daily"${taskFilter.rotation === 'daily' ? ' selected' : ''}>Daily</option>
            <option value="weekly"${taskFilter.rotation === 'weekly' ? ' selected' : ''}>Weekly</option>
            <option value="monthly"${taskFilter.rotation === 'monthly' ? ' selected' : ''}>Monthly</option>
            <option value="once"${taskFilter.rotation === 'once' ? ' selected' : ''}>One-Time</option>
          </select>
          <select class="admin-select" id="taskFilterOwner">
            <option value="">All Owners</option>
            ${pa.map(p => `<option value="${p.id}"${taskFilter.owner === p.id ? ' selected' : ''}>${p.name}</option>`).join('')}
          </select>
          <select class="admin-select" id="taskFilterCategory">
            <option value="">All Categories</option>
            ${ca.map(c => `<option value="${c.key}"${taskFilter.category === c.key ? ' selected' : ''}>${c.icon} ${c.label}</option>`).join('')}
          </select>
          <select class="admin-select" id="taskFilterStatus">
            <option value="">All Statuses</option>
            <option value="active"${taskFilter.status === 'active' ? ' selected' : ''}>Active</option>
            <option value="paused"${taskFilter.status === 'paused' ? ' selected' : ''}>Paused</option>
          </select>
        </div>
      </div>`;

      // Filtered tasks
      let filtered = taskEntries.filter(([id, t]) => {
        if (taskFilter.rotation && t.rotation !== taskFilter.rotation) return false;
        if (taskFilter.owner && !(t.owners || []).includes(taskFilter.owner)) return false;
        if (taskFilter.category && t.category !== taskFilter.category) return false;
        if (taskFilter.status && t.status !== taskFilter.status) return false;
        return true;
      });

      html += `<div class="admin-section-header">
        <span>${filtered.length} task${filtered.length !== 1 ? 's' : ''}</span>
        <button class="btn btn--primary btn--sm" id="addTaskBtn" type="button">+ Add Task</button>
      </div>`;

      // New task form at top
      if (editingTaskId === 'new') {
        html += renderTaskForm(null);
      }

      // Task list with inline edit form
      if (filtered.length === 0 && editingTaskId === null) {
        html += renderEmptyState('✅', 'No tasks', 'Add your first task to get started.');
      } else {
        html += `<div class="admin-list">`;
        for (const [id, task] of filtered) {
          const cat = catsObj[task.category];
          const owners = (task.owners || []).map(oid => peopleObj[oid]?.name || '?').join(', ');
          const pts = basePoints(task);
          const pausedClass = task.status === 'paused' ? ' admin-list-item--paused' : '';
          const pausedBadge = task.status === 'paused' ? '<span class="admin-badge admin-badge--muted">⏸ Paused</span>' : '';
          const editingThis = editingTaskId === id;
          html += `<div class="admin-list-item admin-list-item--clickable${pausedClass}${editingThis ? ' admin-list-item--editing' : ''}" data-task-id="${id}">
            <div class="admin-list-item__row">
              <span class="admin-list-item__name">${cat?.icon || ''} ${task.name}</span>
              <span class="admin-list-item__tags">
                <span class="admin-badge">${task.rotation}</span>
                <span class="admin-badge">${pts}pt</span>
                ${pausedBadge}
              </span>
            </div>
            <div class="admin-list-item__row">
              <span class="admin-list-item__meta">${owners || 'Unassigned'}${cat ? ' · ' + cat.label : ''}</span>
              <div class="admin-list-item__actions">
                <button class="btn btn--ghost btn--sm admin-edit-task" data-task-id="${id}" type="button">Edit</button>
                <button class="btn btn--ghost btn--sm admin-pause-task" data-task-id="${id}" type="button">${task.status === 'paused' ? '▶' : '⏸'}</button>
                <button class="btn btn--ghost btn--sm admin-delete-task" data-task-id="${id}" type="button">✕</button>
              </div>
            </div>
          </div>`;
          // Inline edit form right after this task row
          if (editingThis) {
            html += renderTaskForm(id);
          }
        }
        html += `</div>`;
      }

      return html;
    }

    function renderTaskForm(taskId) {
      const task = taskId ? tasksObj[taskId] : {};
      const pa = peopleArray();
      const ca = catsArray();
      const isEdit = !!taskId;
      const title = isEdit ? 'Edit Task' : 'New Task';

      const selectedOwners = task.owners || [];
      const assignMode = task.ownerAssignmentMode || 'rotate';

      let html = `<div class="admin-form" id="taskForm">
        <h3 class="admin-form__title">${title}</h3>
        <div class="form-group">
          <label class="form-label">Task Name</label>
          <input type="text" id="tf_name" value="${task.name || ''}" placeholder="e.g., Take out trash">
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label class="form-label">Rotation</label>
            <select id="tf_rotation">
              <option value="daily"${task.rotation === 'daily' ? ' selected' : ''}>Daily</option>
              <option value="weekly"${task.rotation === 'weekly' ? ' selected' : ''}>Weekly</option>
              <option value="monthly"${task.rotation === 'monthly' ? ' selected' : ''}>Monthly</option>
              <option value="once"${task.rotation === 'once' ? ' selected' : ''}>One-Time</option>
            </select>
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label">Difficulty</label>
            <select id="tf_difficulty">
              <option value="easy"${task.difficulty === 'easy' ? ' selected' : ''}>Easy</option>
              <option value="medium"${(task.difficulty || 'medium') === 'medium' ? ' selected' : ''}>Medium</option>
              <option value="hard"${task.difficulty === 'hard' ? ' selected' : ''}>Hard</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1">
            <label class="form-label">Time of Day</label>
            <select id="tf_timeOfDay">
              <option value="anytime"${(task.timeOfDay || 'anytime') === 'anytime' ? ' selected' : ''}>Anytime</option>
              <option value="am"${task.timeOfDay === 'am' ? ' selected' : ''}>Morning</option>
              <option value="pm"${task.timeOfDay === 'pm' ? ' selected' : ''}>Afternoon</option>
              <option value="both"${task.timeOfDay === 'both' ? ' selected' : ''}>Both</option>
            </select>
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label">Est. Minutes</label>
            <input type="number" id="tf_estMin" value="${task.estMin || 10}" min="1" max="120">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="tf_category">
            ${ca.map(c => `<option value="${c.key}" data-event="${c.isEvent ? '1' : ''}"${task.category === c.key ? ' selected' : ''}>${c.icon} ${c.label}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Owners</label>
          <div class="admin-checkboxes" id="tf_owners">
            ${pa.map(p => `<label class="admin-checkbox"><input type="checkbox" value="${p.id}"${selectedOwners.includes(p.id) ? ' checked' : ''}> ${p.name}</label>`).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Assignment Mode</label>
          <div class="form-row">
            <button class="btn btn--secondary btn--sm admin-mode-btn${assignMode === 'rotate' ? ' admin-mode-btn--active' : ''}" data-mode="rotate" type="button">Rotate</button>
            <button class="btn btn--secondary btn--sm admin-mode-btn${assignMode === 'duplicate' ? ' admin-mode-btn--active' : ''}" data-mode="duplicate" type="button">Duplicate</button>
          </div>
          <p class="form-hint" id="assignModeHint">${assignMode === 'duplicate' ? 'Each selected owner gets their own task instance every period.' : 'Rotate between owners each period.'}</p>
        </div>
        <div class="form-group" id="dedicatedDayGroup" style="display:${(!task.rotation || task.rotation === 'daily') ? 'none' : ''}">
          <label class="form-label" id="dedicatedDayLabel">${task.rotation === 'once' ? 'Scheduled Date' : 'Dedicated Day'} <button type="button" id="tf_eventDateBtn" class="btn btn--ghost btn--sm" style="display:${catsObj[task.category]?.isEvent ? 'inline' : 'none'};padding:0 4px;font-size:1.1em;vertical-align:middle" title="Pick event date">📅</button></label>
          <input type="date" id="tf_eventDate" style="position:absolute;opacity:0;pointer-events:none;" value="${task.dedicatedDate || ''}">
          <select id="daySelect" class="dedicated-day-select" style="display:${task.rotation === 'once' ? 'none' : ''}">
            <option value=""${task.dedicatedDay == null ? ' selected' : ''}>Any</option>
            ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d, i) => {
              const val = (i + 1) % 7; // Mon=1..Sat=6,Sun=0
              return `<option value="${val}"${task.dedicatedDay === val ? ' selected' : ''}>${d}</option>`;
            }).join('')}
          </select>
          <div id="dedicatedDateRow" style="display:${task.rotation === 'once' ? '' : 'none'}">
            <input type="date" id="tf_dedicatedDate" value="${task.dedicatedDate || ''}" class="task-detail__date-input" style="width:100%">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Cooldown Days</label>
          <input type="number" id="tf_cooldown" value="${task.cooldownDays || ''}" min="0" max="30" placeholder="0">
        </div>
        <label class="admin-checkbox mt-sm"><input type="checkbox" id="tf_exempt"${task.exempt ? ' checked' : ''}> Exempt from scoring</label>
        <div class="admin-form__actions mt-md">
          <button class="btn btn--secondary" id="taskFormCancel" type="button">Cancel</button>
          <button class="btn btn--primary" id="taskFormSave" type="button">${isEdit ? 'Save Changes' : 'Create Task'}</button>
        </div>
      </div>`;
      return html;
    }

    // ══════════════════════════════════════════
    // People Tab
    // ══════════════════════════════════════════

    let editingPersonId = null;

    function renderPeopleTab() {
      const pa = peopleArray();
      let html = `<div class="admin-section-header">
        <span>${pa.length} people</span>
        <button class="btn btn--primary btn--sm" id="addPersonBtn" type="button">+ Add Person</button>
      </div>`;

      if (editingPersonId !== null) {
        html += renderPersonForm(editingPersonId === 'new' ? null : editingPersonId);
      }

      if (pa.length === 0 && editingPersonId === null) {
        html += renderEmptyState('👥', 'No people', 'Add family members to get started.');
      } else {
        html += `<div class="admin-list">`;
        for (const p of pa) {
          const roleLabel = p.role === 'child' ? '👦 Child' : '👤 Adult';
          const kidFlags = p.role === 'child' && p.kidSettings
            ? [p.kidSettings.canDelegate && 'delegate', p.kidSettings.canMoveTasks && 'move', p.kidSettings.showSlider && 'slider'].filter(Boolean).join(', ')
            : '';
          html += `<div class="admin-list-item admin-list-item--clickable" data-person-id="${p.id}">
            <div class="admin-person-row">
              <div class="admin-person-dot" style="background:${p.color}"></div>
              <div class="admin-person-info">
                <span class="admin-list-item__name">${p.name}</span>
                <span class="admin-list-item__meta">${roleLabel}${kidFlags ? ' · ' + kidFlags : ''}</span>
              </div>
            </div>
            <div class="admin-list-item__actions">
              ${p.role === 'child' ? `<a href="kid.html?kid=${encodeURIComponent(p.name)}" class="btn btn--ghost btn--sm" title="Open kid page" target="_blank" onclick="event.stopPropagation()">Link</a>` : ''}
              <button class="btn btn--ghost btn--sm admin-edit-person" data-person-id="${p.id}" type="button">Edit</button>
              <button class="btn btn--ghost btn--sm admin-delete-person" data-person-id="${p.id}" type="button">✕</button>
            </div>
          </div>`;
        }
        html += `</div>`;
      }

      return html;
    }

    function renderPersonForm(personId) {
      const person = personId ? peopleObj[personId] : {};
      const isEdit = !!personId;
      const title = isEdit ? 'Edit Person' : 'New Person';
      const colors = getColorPalette();
      const usedColors = peopleArray().filter(p => p.id !== personId).map(p => p.color);
      const selColor = person.color || colors.find(c => !usedColors.includes(c)) || colors[0];
      const role = person.role || 'adult';
      const ks = person.kidSettings || {};

      let html = `<div class="admin-form" id="personForm">
        <h3 class="admin-form__title">${title}</h3>
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" id="pf_name" value="${person.name || ''}" placeholder="e.g., Jordin">
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <div class="color-grid" id="pf_colorGrid">
            ${colors.map(c => {
              const used = usedColors.includes(c);
              const sel = selColor === c ? ' selected' : '';
              const usedCls = used ? ' color-swatch--used' : '';
              return `<div class="color-swatch${sel}${usedCls}" data-color="${c}" style="background:${c};position:relative;"></div>`;
            }).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <div class="form-row">
            <button class="btn btn--secondary btn--sm admin-role-btn${role === 'adult' ? ' admin-mode-btn--active' : ''}" data-role="adult" type="button">👤 Adult</button>
            <button class="btn btn--secondary btn--sm admin-role-btn${role === 'child' ? ' admin-mode-btn--active' : ''}" data-role="child" type="button">👦 Child</button>
          </div>
        </div>
        <div id="kidSettingsSection" style="display:${role === 'child' ? '' : 'none'}">
          <h4 class="form-label mt-md">Kid Mode Settings</h4>
          <label class="admin-checkbox"><input type="checkbox" id="pf_showWeekView"${ks.showWeekView ? ' checked' : ''}> Show week view</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_showCalendar"${ks.showCalendar ? ' checked' : ''}> Show calendar</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_canDelegate"${ks.canDelegate ? ' checked' : ''}> Can delegate tasks</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_canMoveTasks"${ks.canMoveTasks ? ' checked' : ''}> Can move tasks</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_showSlider"${ks.showSlider ? ' checked' : ''}> Show points slider</label>
          <label class="admin-checkbox"><input type="checkbox" id="pf_celebrationsEnabled"${ks.celebrationsEnabled !== false ? ' checked' : ''}> Celebrations enabled</label>
          <div class="form-group mt-sm">
            <label class="form-label">Celebration Style</label>
            <select id="pf_celebrationStyle">
              <option value="full"${(ks.celebrationStyle || 'full') === 'full' ? ' selected' : ''}>Full</option>
              <option value="subtle"${ks.celebrationStyle === 'subtle' ? ' selected' : ''}>Subtle</option>
              <option value="off"${ks.celebrationStyle === 'off' ? ' selected' : ''}>Off</option>
            </select>
          </div>
        </div>
        <div class="admin-form__actions mt-md">
          <button class="btn btn--secondary" id="personFormCancel" type="button">Cancel</button>
          <button class="btn btn--primary" id="personFormSave" type="button">${isEdit ? 'Save Changes' : 'Add Person'}</button>
        </div>
      </div>`;
      return html;
    }

    // ══════════════════════════════════════════
    // Categories Tab
    // ══════════════════════════════════════════

    let editingCatKey = null;

    function renderCategoriesTab() {
      const ca = catsArray();
      let html = `<div class="admin-section-header">

    async function loadScheduleStats() {
      const el = document.getElementById('scheduleStats');
      if (!el) return;

      const allSchedule = await readAllSchedule() || {};
      const tomorrow = addDays(today, 1);
      const futureDates = Object.keys(allSchedule).filter(d => d >= tomorrow).sort();
      const pa = peopleArray();

      let totalEntries = 0;
      const perPerson = {};
      for (const p of pa) perPerson[p.id] = 0;

      for (const dateKey of futureDates) {
        const dayEntries = allSchedule[dateKey] || {};
        const entries = Object.values(dayEntries);
        totalEntries += entries.length;
        for (const e of entries) {
          if (perPerson[e.ownerId] !== undefined) perPerson[e.ownerId]++;
        }
      }

      let html = `<div class="admin-stat-cards">
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${futureDates.length}</span>
          <span class="admin-stat-card__label">Days Scheduled</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${totalEntries}</span>
          <span class="admin-stat-card__label">Total Entries</span>
        </div>
      </div>
      <h4 class="form-label mt-md">Load per Person</h4>
      <div class="admin-list">`;
      for (const p of pa) {
        const count = perPerson[p.id] || 0;
        const avg = futureDates.length > 0 ? (count / futureDates.length).toFixed(1) : '0';
        html += `<div class="admin-list-item">
          <div class="admin-person-row">
            <div class="admin-person-dot admin-person-dot--sm" style="background:${p.color}"></div>
            <span class="admin-list-item__name">${p.name}</span>
          </div>
          <span class="admin-list-item__meta">${count} tasks · ${avg}/day avg</span>
        </div>`;
      }
      html += `</div>`;
      el.innerHTML = html;
    }

    async function loadEventLog() {
      const el = document.getElementById('eventLog');
      if (!el) return;

      const events = await readOnce('debug/eventLog') || {};
      const entries = Object.entries(events)
        .map(([key, val]) => ({ key, ...val }))
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
        .slice(0, 50);

      if (entries.length === 0) {
        el.innerHTML = '<p class="text-muted">No events logged yet.</p>';
        return;
      }

      let html = `<div class="admin-list admin-list--compact">`;
      for (const e of entries) {
        const time = e.timestamp ? new Date(e.timestamp).toLocaleString() : '—';
        const payload = e.payload ? JSON.stringify(e.payload).slice(0, 100) : '';
        html += `<div class="admin-list-item admin-list-item--compact">
          <div class="admin-list-item__main">
            <span class="admin-list-item__name">${e.type || 'unknown'}</span>
            <span class="admin-list-item__meta">${time}${payload ? ' · ' + payload : ''}</span>
          </div>
        </div>`;
      }
      html += `</div>`;
      el.innerHTML = html;
    }

    function inspectTask(taskId) {
      const el = document.getElementById('inspectResult');
      if (!el || !taskId) { if (el) el.innerHTML = ''; return; }

      const task = tasksObj[taskId];
      if (!task) { el.innerHTML = '<p class="text-muted">Task not found.</p>'; return; }

      const pa = peopleArray();
      const owners = (task.owners || []).map(oid => ({ id: oid, name: peopleObj[oid]?.name || '?' }));
      const pts = basePoints(task);

      let info = `Task: ${task.name}\n`;
      info += `Rotation: ${task.rotation}\n`;
      info += `Difficulty: ${task.difficulty} · Est: ${task.estMin}m · Points: ${pts}\n`;
      info += `Time of Day: ${task.timeOfDay}\n`;
      info += `Assignment Mode: ${task.ownerAssignmentMode || 'rotate'}\n`;
      info += `Owners: ${owners.map(o => o.name).join(', ')}\n`;
      info += `Status: ${task.status || 'active'}\n`;
      if (task.dedicatedDay != null) info += `Dedicated Day: ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][task.dedicatedDay]}\n`;
      if (task.cooldownDays) info += `Cooldown: ${task.cooldownDays} days\n`;
      if (task.exempt) info += `Exempt from scoring: Yes\n`;
      info += `Category: ${catsObj[task.category]?.label || task.category || 'None'}\n`;
      info += `Created: ${task.createdDate || '?'}\n`;

      el.innerHTML = `<pre class="admin-pre">${info}</pre>`;
    }

    // ══════════════════════════════════════════
    // Tab-specific event binding
    // ══════════════════════════════════════════

    function bindTabContent() {
      switch (activeTab) {
        case 'tasks': bindTasksTab(); break;
        case 'people': bindPeopleTab(); break;
        case 'categories': bindCategoriesTab(); break;
        case 'settings': bindSettingsTab(); break;
        case 'theme': bindThemeTab(); break;
        case 'schedule': bindScheduleTab(); break;
        case 'data': bindDataTab(); break;
        case 'debug': bindDebugTab(); break;
      }
    }

    // ── Tasks tab events ──

    function bindTasksTab() {
      // Filters
      for (const id of ['taskFilterRotation', 'taskFilterOwner', 'taskFilterCategory', 'taskFilterStatus']) {
        const el = main.querySelector(`#${id}`);
        if (el) el.addEventListener('change', () => {
          taskFilter.rotation = main.querySelector('#taskFilterRotation')?.value || '';
          taskFilter.owner = main.querySelector('#taskFilterOwner')?.value || '';
          taskFilter.category = main.querySelector('#taskFilterCategory')?.value || '';
          taskFilter.status = main.querySelector('#taskFilterStatus')?.value || '';
          render();
        });
      }

      // Add task
      main.querySelector('#addTaskBtn')?.addEventListener('click', () => {
        editingTaskId = 'new';
        render();
      });

      // Edit task — click row or edit button
      for (const item of main.querySelectorAll('.admin-list-item[data-task-id]')) {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.admin-list-item__actions')) return;
          editingTaskId = editingTaskId === item.dataset.taskId ? null : item.dataset.taskId;
          render();
        });
      }
      for (const btn of main.querySelectorAll('.admin-edit-task')) {
        btn.addEventListener('click', () => {
          editingTaskId = editingTaskId === btn.dataset.taskId ? null : btn.dataset.taskId;
          render();
        });
      }

      // Pause/unpause
      for (const btn of main.querySelectorAll('.admin-pause-task')) {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.taskId;
          const task = tasksObj[id];
          if (!task) return;
          task.status = task.status === 'paused' ? 'active' : 'paused';
          await writeTask(id, task);
          render();
        });
      }

      // Delete task
      for (const btn of main.querySelectorAll('.admin-delete-task')) {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.taskId;
          if (!confirm(`Delete task "${tasksObj[id]?.name}"? This cannot be undone.`)) return;

          // Clean up schedule entries and completions for this task
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const cleanupUpdates = {};
          for (const [dateKey, dayEntries] of Object.entries(allSched)) {
            for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
              if (entry.taskId === id) {
                cleanupUpdates[`schedule/${dateKey}/${entryKey}`] = null;
                if (allComp[entryKey]) {
                  cleanupUpdates[`completions/${entryKey}`] = null;
                }
              }
            }
          }
          if (Object.keys(cleanupUpdates).length > 0) {
            await multiUpdate(cleanupUpdates);
          }

          await removeTask(id);
          delete tasksObj[id];
          render();
        });
      }

      // Task form events
      if (editingTaskId !== null) {
        bindTaskForm();
      }

    function bindTaskForm() {
      // Assignment mode toggle
      for (const btn of main.querySelectorAll('.admin-mode-btn')) {
        btn.addEventListener('click', () => {
          main.querySelectorAll('.admin-mode-btn').forEach(b => b.classList.remove('admin-mode-btn--active'));
          btn.classList.add('admin-mode-btn--active');
          const hint = main.querySelector('#assignModeHint');
          if (hint) hint.textContent = btn.dataset.mode === 'duplicate'
            ? 'Each selected owner gets their own task instance every period.'
            : 'Rotate between owners each period.';
        });
      }

      // (Day selection is now a <select> — no chip toggle needed)

      // Category change — show/hide event date icon
      main.querySelector('#tf_category')?.addEventListener('change', (e) => {
        const opt = e.target.selectedOptions[0];
        const isEvent = opt?.dataset.event === '1';
        const eventBtn = main.querySelector('#tf_eventDateBtn');
        if (eventBtn) eventBtn.style.display = isEvent ? 'inline' : 'none';
        // If event, force rotation to once
        if (isEvent) {
          const rotSelect = main.querySelector('#tf_rotation');
          if (rotSelect) { rotSelect.value = 'once'; rotSelect.dispatchEvent(new Event('change')); }
        }
      });

      // Event date icon — open native date picker
      main.querySelector('#tf_eventDateBtn')?.addEventListener('click', () => {
        const picker = main.querySelector('#tf_eventDate');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      // Rotation change — show/hide dedicated day vs date picker
      main.querySelector('#tf_rotation')?.addEventListener('change', (e) => {
        const rot = e.target.value;
        const group = main.querySelector('#dedicatedDayGroup');
        const daySelect = main.querySelector('#daySelect');
        const dateRow = main.querySelector('#dedicatedDateRow');
        const label = main.querySelector('#dedicatedDayLabel');
        const catOpt = main.querySelector('#tf_category')?.selectedOptions[0];
        const isEvent = catOpt?.dataset.event === '1';
        if (rot === 'daily') {
          group.style.display = 'none';
        } else {
          group.style.display = '';
          const eventBtn = label?.querySelector('#tf_eventDateBtn');
          const btnHtml = eventBtn ? eventBtn.outerHTML : '';
          if (rot === 'once') {
            daySelect.style.display = 'none';
            dateRow.style.display = isEvent ? 'none' : '';
            label.innerHTML = (isEvent ? 'Event Date ' : 'Scheduled Date ') + btnHtml;
          } else {
            daySelect.style.display = '';
            dateRow.style.display = 'none';
            label.innerHTML = 'Dedicated Day ' + btnHtml;
          }
          // Re-bind event date button after innerHTML replace
          label?.querySelector('#tf_eventDateBtn')?.addEventListener('click', () => {
            const picker = main.querySelector('#tf_eventDate');
            if (picker) { try { picker.showPicker(); } catch(e2) { picker.click(); } }
          });
        }
      });

      // Cancel
      main.querySelector('#taskFormCancel')?.addEventListener('click', () => {
        editingTaskId = null;
        render();
      });

      // Save
      main.querySelector('#taskFormSave')?.addEventListener('click', async () => {
        const name = main.querySelector('#tf_name')?.value.trim();
        if (!name) { main.querySelector('#tf_name')?.focus(); return; }

        const owners = Array.from(main.querySelectorAll('#tf_owners input:checked')).map(cb => cb.value);
        const activeMode = main.querySelector('.admin-mode-btn.admin-mode-btn--active');
        const assignMode = activeMode?.dataset.mode || 'rotate';
        const cooldown = main.querySelector('#tf_cooldown')?.value;
        const rotation = main.querySelector('#tf_rotation')?.value || 'daily';

        // Read dedicated day from select or date from picker
        const dayVal = main.querySelector('#daySelect')?.value;
        const dedicatedDay = (rotation !== 'once' && dayVal !== '' && dayVal != null) ? parseInt(dayVal, 10) : null;
        const dedicatedDate = rotation === 'once' ? (main.querySelector('#tf_dedicatedDate')?.value || null) : null;

        const catKey = main.querySelector('#tf_category')?.value || '';
        const catIsEvent = catsObj[catKey]?.isEvent || false;
        const effectiveMode = catIsEvent ? 'fixed' : assignMode;

        // Event date overrides dedicatedDate & rotation
        const eventDate = catIsEvent ? (main.querySelector('#tf_eventDate')?.value || null) : null;
        const effectiveRotation = catIsEvent && eventDate ? 'once' : rotation;
        const effectiveDedicatedDate = catIsEvent && eventDate ? eventDate : dedicatedDate;

        const taskData = {
          name,
          rotation: effectiveRotation,
          difficulty: main.querySelector('#tf_difficulty')?.value || 'medium',
          timeOfDay: main.querySelector('#tf_timeOfDay')?.value || 'anytime',
          estMin: parseInt(main.querySelector('#tf_estMin')?.value, 10) || 10,
          category: catKey,
          owners,
          ownerAssignmentMode: effectiveMode,
          dedicatedDay,
          dedicatedDate: effectiveDedicatedDate,
          cooldownDays: cooldown ? parseInt(cooldown, 10) : null,
          exempt: main.querySelector('#tf_exempt')?.checked || false,
          status: 'active'
        };

        if (editingTaskId === 'new') {
          taskData.createdDate = today;
          const newId = await pushTask(taskData);
          tasksObj[newId] = taskData;

          // Create schedule entry for today so the task appears immediately
          // Skip if one-time task with a future dedicatedDate
          // Skip weekly/monthly if they have a dedicatedDay that isn't today
          const skipToday = (taskData.rotation === 'once' && taskData.dedicatedDate && taskData.dedicatedDate !== today)
            || ((taskData.rotation === 'weekly' || taskData.rotation === 'monthly') && taskData.dedicatedDay != null && dayOfWeek(today) !== taskData.dedicatedDay);
          if (owners.length > 0 && !skipToday) {
            const schedUpdates = {};
            const baseEntry = { taskId: newId, rotationType: taskData.rotation, ownerAssignmentMode: effectiveMode };
            const tod = taskData.timeOfDay || 'anytime';
            let newCounter = 0;
            const newKey = () => `sched_${Date.now()}_new_${String(newCounter++).padStart(3, '0')}`;

            if (effectiveMode === 'duplicate') {
              for (const oid of owners) {
                if (tod === 'both') {
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'am' };
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'pm' };
                } else {
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: tod };
                }
              }
            } else {
              // Use proper rotation owner instead of always first owner
              const ownerId = effectiveMode === 'fixed' ? owners[0] : getRotationOwner(taskData, today);
              if (tod === 'both') {
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'am' };
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'pm' };
              } else {
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: tod };
              }
            }
            await multiUpdate(schedUpdates);
          }

          // Rebuild future schedule so the new task appears on upcoming days
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched);
          await multiUpdate(futureUpdates);
        } else {
          // Preserve existing fields
          const existing = tasksObj[editingTaskId] || {};
          taskData.createdDate = existing.createdDate || today;
          taskData.status = existing.status || 'active';
          await writeTask(editingTaskId, taskData);
          tasksObj[editingTaskId] = taskData;
        }

        editingTaskId = null;
        render();
      });
    }

          if (ca.length <= 1) { alert('Cannot delete the last category.'); return; }
          if (!confirm(`Delete category "${catsObj[key]?.label}"? Tasks will be reassigned to Chores.`)) return;

          render();

        await multiUpdate(updates);

        if (msgEl) {
          msgEl.textContent = `Created overdue entry for "${task.name}" on ${dateKey}`;
          msgEl.className = 'admin-msg admin-msg--success mt-sm';
          setTimeout(() => { msgEl.textContent = ''; }, 3000);
        }
      });
    }

    // ── Initial render if PIN session was cached ──
    if (pinSessionValid) {
      render();
    }
  </script>
</body>
</html>
