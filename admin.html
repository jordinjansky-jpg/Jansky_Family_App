<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/App Icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/App Icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Family Hub — Admin</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/admin.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>

    <!-- PIN Gate -->
    <div id="pinGate" style="display:none;">
      <div class="admin-pin-gate">
        <div>🔒</div>
        <h2 class="admin-pin-gate__title">Admin Access</h2>
        <p class="admin-pin-gate__desc">Enter your 4-digit PIN</p>
        <div class="admin-pin-gate__inputs">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="0" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="1" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="2" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="3" inputmode="numeric">
        </div>
        <p class="admin-pin-gate__error" id="pinError"></p>
      </div>
    </div>

    <!-- Admin Content (after PIN) -->
    <div id="mainContent" style="display:none;overflow-x:hidden;"></div>
  </div>
  <div id="navMount"></div>
  <div id="toastMount"></div>
  <div id="taskSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import {
      initFirebase, isFirstRun, readSettings, writeSettings,
      readPeople, writePerson, pushPerson, removeData,
      readTasks, pushTask, writeTask, removeTask,
      readCategories, writeCategories,
      readEvents, pushEvent, writeEvent, removeEvent,
      readCompletions, readAllSchedule, readOnce,
      multiUpdate, updateData, pushDebugEvent, factoryReset, onConnectionChange,
      readRewards, pushReward, writeReward, archiveReward, removeReward,
      readMessages, readAllMessages, writeMessage, readAllSnapshots, readBalanceAnchor, writeBalanceAnchor, clearMessages, deletePersonRewardsData, readMultipliers,
      readAllAchievements, writeAchievement, deleteAchievement,
      readAchievementDefs, writeAchievementDef, deleteAchievementDef,
      readBank, writeBankToken, removeBankToken,
      readMealLibrary, pushMealLibrary, writeMealLibrary, removeMealLibrary, readAllMeals, removeMeal
    } from './shared/firebase.js';
    import { renderNavBar, renderHeader, renderEmptyState, renderUndoToast, renderTaskFormCompact, renderBottomSheet, initOfflineBanner, showConfirm, applyDataColors, renderMealEditorSheet, renderSendMessageSheet, bindSendMessageSheet } from './shared/components.js';
    import { initOwnerChips, getSelectedOwners } from './shared/dom-helpers.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig, getPresets, getColorPalette, resolveTheme } from './shared/theme.js';
    import { todayKey, addDays, dateRange, formatDateShort, getTimezoneOptions, detectTimezone, dayOfWeek, escapeHtml, parseIntOr, parseFloatOr } from './shared/utils.js';
    const esc = (s) => escapeHtml(String(s ?? ''));
    import { generateSchedule, buildScheduleUpdates, getRotationOwner } from './shared/scheduler.js';
    import { basePoints, calculateBalance, ACHIEVEMENTS, DEFAULT_ACHIEVEMENTS, mergeAchievementDefs, getActiveAchievements } from './shared/scoring.js';
    import { clearWeatherCache } from './shared/weather.js';

    // ── Undo toast helper ──
    let undoTimer = null;
    function showUndoToast(message, undoCallback) {
      const mount = document.getElementById('toastMount');
      mount.innerHTML = renderUndoToast(message);
      if (undoTimer) clearTimeout(undoTimer);
      const undoBtn = mount.querySelector('.undo-toast__btn');
      if (undoCallback) {
        undoBtn.addEventListener('click', () => {
          clearTimeout(undoTimer);
          mount.innerHTML = '';
          undoCallback();
        });
      } else {
        undoBtn.style.display = 'none';
      }
      undoTimer = setTimeout(() => {
        const toast = mount.querySelector('.undo-toast');
        if (toast) toast.style.opacity = '0';
        setTimeout(() => { mount.innerHTML = ''; }, 300);
      }, 5000);
    }

    // ── Cached theme (device override > family cache > default) ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load data ──
    let settings = await readSettings();
    if (settings?.theme) applyTheme(resolveTheme(settings.theme));

    let peopleObj = await readPeople() || {};
    let tasksObj = await readTasks() || {};
    let catsObj = await readCategories() || {};
    let eventsObj = await readEvents() || {};
    let rewardsObj = (await readRewards()) || {};
    let allAchievements = (await readAllAchievements()) || {};
    let allMessagesObj = (await readAllMessages()) || {};
    let mealLibrary = (await readMealLibrary()) || {};
    let allBankData = {};
    let achievementDefsObj = (await readAchievementDefs()) || {};

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);

    // ── Header & Nav ──
    document.getElementById('headerMount').innerHTML = renderHeader({
      appName: settings?.appName || 'Daily Rundown',
      subtitle: 'Admin',
      showAdmin: false,
      showDebug: false
    });
    document.getElementById('navMount').innerHTML = renderNavBar(null);

    // ── Connection status + Offline/Online banner ──
    initOfflineBanner(onConnectionChange);

    // ══════════════════════════════════════════
    // PIN Gate
    // ══════════════════════════════════════════

    document.getElementById('loadingState').style.display = 'none';

    const PIN_SESSION_KEY = 'dr-admin-pin-ts';
    const PIN_SESSION_TTL = 30 * 60 * 1000; // 30 minutes
    const adminPin = settings?.adminPin || '';
    const recoveryPin = settings?.recoveryPin || '2522';

    // Check if PIN session is still valid
    const pinTs = parseInt(sessionStorage.getItem(PIN_SESSION_KEY) || '0', 10);
    const pinSessionValid = Date.now() - pinTs < PIN_SESSION_TTL;

    // isAdmin bypass: person.html writes dr-person-home (name string). The spec mentioned
    // dr-active-person (ID) but that key is never written — name lookup is what's available.
    const personHomeName = sessionStorage.getItem('dr-person-home');
    const personHomeEntry = personHomeName
      ? Object.values(peopleObj).find(p => p.name === personHomeName)
      : null;
    const isAdminBypass = !!personHomeEntry?.isAdmin;

    if (pinSessionValid || isAdminBypass) {
      if (isAdminBypass && !pinSessionValid) {
        sessionStorage.setItem(PIN_SESSION_KEY, String(Date.now()));
      }
      // Skip PIN gate — render() called after main is defined below
      document.getElementById('mainContent').style.display = '';
    } else {
      document.getElementById('pinGate').style.display = '';
      const digits = document.querySelectorAll('.admin-pin-digit');

      digits.forEach((input, i) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value.replace(/\D/g, '');
          e.target.value = val.slice(0, 1);
          if (val && i < digits.length - 1) digits[i + 1].focus();
          checkPin();
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && i > 0) digits[i - 1].focus();
        });
      });
      digits[0].focus();

      function checkPin() {
        const entered = Array.from(digits).map(d => d.value).join('');
        if (entered.length !== 4) return;

        if (entered === adminPin || entered === recoveryPin) {
          sessionStorage.setItem(PIN_SESSION_KEY, String(Date.now()));
          document.getElementById('pinGate').style.display = 'none';
          const main = document.getElementById('mainContent');
          main.style.display = '';
          render();
        } else {
          document.getElementById('pinError').textContent = 'Incorrect PIN';
          digits.forEach(d => d.value = '');
          digits[0].focus();
          setTimeout(() => { document.getElementById('pinError').textContent = ''; }, 2000);
        }
      }
    }

    // ══════════════════════════════════════════
    // Admin panel — tab-based layout
    // ══════════════════════════════════════════

    const TABS = [
      { id: 'library',  label: 'Library'  },
      { id: 'people',   label: 'People'   },
      { id: 'settings', label: 'Settings' },
      { id: 'tools',    label: 'Tools'    },
    ];

    const LIBRARY_SECTIONS = [
      { id: 'tasks',      label: 'Tasks'      },
      { id: 'events',     label: 'Events'     },
      { id: 'meals',      label: 'Meals'      },
      { id: 'categories', label: 'Categories' },
      { id: 'rewards',    label: 'Rewards'    },
      { id: 'badges',     label: 'Badges'     },
    ];

    let activeTab = 'library';
    let activeLibrarySection = 'tasks';
    let editingRewardId = null; // null = not editing, 'new' = creating, pushId = editing

    // ── Helpers ──
    function peopleArray() {
      return Object.entries(peopleObj).map(([id, p]) => ({ id, ...p }));
    }
    function catsArray() {
      return Object.entries(catsObj).map(([key, c]) => ({ key, ...c }));
    }
    function getAccentColors() {
      return [
        '#ef5350', '#e85d75', '#ec407a', '#f06292',
        '#ab47bc', '#8e24aa', '#7e57c2', '#5b7fd6',
        '#42a5f5', '#00acc1', '#26a69a', '#43a047',
        '#66bb6a', '#ffca28', '#ffa726', '#ff9800',
        '#ff7043', '#8d6e63', '#78909c', '#546e7a'
      ];
    }

    /**
     * Shared list row for all Library sections.
     * icon: HTML string (SVG, emoji in a span, or color swatch div)
     * primary: escaped text string
     * secondary: escaped text string or ''
     * dataAttrs: string of additional data-* attributes for the row
     */
    function renderAdminRow({ icon, primary, secondary = '', dataAttrs = '' }) {
      return `<div class="admin-list-item admin-list-item--clickable" ${dataAttrs}>
    <div class="admin-icon-tile">${icon}</div>
    <div class="admin-list-item__body">
      <span class="admin-list-item__name">${primary}</span>
      ${secondary ? `<span class="admin-list-item__meta">${secondary}</span>` : ''}
    </div>
    <svg class="admin-list-item__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
  </div>`;
    }

    /**
     * 40×40 color swatch for use as the icon in renderAdminRow.
     * color: CSS color string
     */
    function renderColorSwatch(color) {
      return `<div class="admin-icon-tile__swatch" style="background:${color}"></div>`;
    }

    /**
     * Emoji tile for use as the icon in renderAdminRow.
     */
    function renderEmojiTile(emoji) {
      return `<span class="admin-icon-tile__emoji" aria-hidden="true">${emoji}</span>`;
    }

    const main = document.getElementById('mainContent');

    // ══════════════════════════════════════════
    // Main render
    // ══════════════════════════════════════════

    function render() {
      // Top-level tab bar
      let html = `<div class="admin-tabs" role="tablist" aria-label="Admin sections">`;
      for (const tab of TABS) {
        const active = tab.id === activeTab ? ' admin-tab--active' : '';
        html += `<button class="admin-tab${active}" data-tab="${tab.id}" type="button" role="tab" aria-selected="${tab.id === activeTab}">${esc(tab.label)}</button>`;
      }
      html += `</div>`;

      // Library sub-nav
      if (activeTab === 'library') {
        html += `<div class="admin-subnav" role="tablist" aria-label="Library sections">`;
        for (const sec of LIBRARY_SECTIONS) {
          const active = sec.id === activeLibrarySection ? ' admin-subnav__pill--active' : '';
          html += `<button class="admin-subnav__pill${active}" data-section="${sec.id}" type="button">${esc(sec.label)}</button>`;
        }
        html += `</div>`;
      }

      html += `<div class="admin-content" role="tabpanel">`;

      switch (activeTab) {
        case 'library':
          switch (activeLibrarySection) {
            case 'tasks':      html += renderTasksTab();      break;
            case 'events':     html += renderEventsTab();     break;
            case 'meals':      html += renderMealsTab();      break;
            case 'categories': html += renderCategoriesTab(); break;
            case 'rewards':    html += renderRewardsTab();    break;
            case 'badges':     html += renderAchievementsTab(); break;
          }
          break;
        case 'people':   html += renderPeopleTab();   break;
        case 'settings': html += renderSettingsTab(); break;
        case 'tools':    html += renderToolsTab();    break;
      }

      html += `</div>`;
      main.innerHTML = html;
      applyDataColors(main);
      bindTabEvents();
      bindTabContent();
    }

    function bindTabEvents() {
      for (const tab of main.querySelectorAll('.admin-tab')) {
        tab.addEventListener('click', async () => {
          activeTab = tab.dataset.tab;
          selectMode = false;
          selectedTaskIds.clear();
          if (activeTab === 'library' && activeLibrarySection === 'badges') {
            allAchievements = (await readAllAchievements()) || {};
            achievementDefsObj = (await readAchievementDefs()) || {};
          }
          render();
        });
      }
      for (const pill of main.querySelectorAll('.admin-subnav__pill')) {
        pill.addEventListener('click', async () => {
          activeLibrarySection = pill.dataset.section;
          selectMode = false;
          selectedTaskIds.clear();
          if (activeLibrarySection === 'badges') {
            allAchievements = (await readAllAchievements()) || {};
            achievementDefsObj = (await readAchievementDefs()) || {};
          }
          if (activeLibrarySection === 'rewards') {
            allAchievements = (await readAllAchievements()) || {};
            allMessagesObj = (await readAllMessages()) || {};
            allBankData = {};
            for (const pid of Object.keys(peopleObj)) {
              allBankData[pid] = (await readBank(pid)) || {};
            }
          }
          render();
        });
      }
    }

    // ══════════════════════════════════════════
    // Tasks Tab
    // ══════════════════════════════════════════

    let taskFilter = { rotation: '', owner: '', category: '', status: '', difficulty: '' };
    let taskSort = 'name';
    let editingTaskId = null;
    let selectMode = false;
    let selectedTaskIds = new Set();

    function renderTasksTab() {
      const pa = peopleArray();
      const ca = catsArray();
      const taskEntries = Object.entries(tasksObj);

      // Filters
      let html = `<div class="admin-section">
        <div class="admin-filters">
          <select class="admin-select" id="taskFilterRotation">
            <option value="">All Rotations</option>
            <option value="daily"${taskFilter.rotation === 'daily' ? ' selected' : ''}>Daily</option>
            <option value="weekly"${taskFilter.rotation === 'weekly' ? ' selected' : ''}>Weekly</option>
            <option value="monthly"${taskFilter.rotation === 'monthly' ? ' selected' : ''}>Monthly</option>
            <option value="once"${taskFilter.rotation === 'once' ? ' selected' : ''}>One-Time</option>
          </select>
          <select class="admin-select" id="taskFilterOwner">
            <option value="">All Owners</option>
            ${pa.map(p => `<option value="${p.id}"${taskFilter.owner === p.id ? ' selected' : ''}>${esc(p.name)}</option>`).join('')}
          </select>
          <select class="admin-select" id="taskFilterCategory">
            <option value="">All Categories</option>
            ${ca.map(c => `<option value="${esc(c.key)}"${taskFilter.category === c.key ? ' selected' : ''}>${esc(c.icon)} ${esc(c.label)}</option>`).join('')}
          </select>
          <select class="admin-select" id="taskFilterStatus">
            <option value="">All Statuses</option>
            <option value="active"${taskFilter.status === 'active' ? ' selected' : ''}>Active</option>
            <option value="paused"${taskFilter.status === 'paused' ? ' selected' : ''}>Paused</option>
            <option value="completed"${taskFilter.status === 'completed' ? ' selected' : ''}>Completed</option>
          </select>
          <select class="admin-select" id="taskFilterDifficulty">
            <option value="">All Difficulties</option>
            <option value="easy"${taskFilter.difficulty === 'easy' ? ' selected' : ''}>Easy</option>
            <option value="medium"${taskFilter.difficulty === 'medium' ? ' selected' : ''}>Medium</option>
            <option value="hard"${taskFilter.difficulty === 'hard' ? ' selected' : ''}>Hard</option>
          </select>
        </div>
        <div class="admin-filters admin-filters--stacked">
          <select class="admin-select" id="taskSortBy">
            <option value="name"${taskSort === 'name' ? ' selected' : ''}>Sort: Name</option>
            <option value="difficulty"${taskSort === 'difficulty' ? ' selected' : ''}>Sort: Difficulty</option>
            <option value="points"${taskSort === 'points' ? ' selected' : ''}>Sort: Points</option>
            <option value="rotation"${taskSort === 'rotation' ? ' selected' : ''}>Sort: Rotation</option>
            <option value="estMin"${taskSort === 'estMin' ? ' selected' : ''}>Sort: Est. Time</option>
          </select>
        </div>
      </div>`;

      // Filtered tasks
      let filtered = taskEntries.filter(([id, t]) => {
        // Auto-hide completed one-time tasks unless status filter is explicitly set
        if (!taskFilter.status && t.rotation === 'once' && t.status === 'completed') return false;
        if (taskFilter.rotation && t.rotation !== taskFilter.rotation) return false;
        if (taskFilter.owner && !(t.owners || []).includes(taskFilter.owner)) return false;
        if (taskFilter.category && t.category !== taskFilter.category) return false;
        if (taskFilter.status && t.status !== taskFilter.status) return false;
        if (taskFilter.difficulty && (t.difficulty || 'medium') !== taskFilter.difficulty) return false;
        return true;
      });

      // Sort
      const diffOrder = { easy: 0, medium: 1, hard: 2 };
      const rotOrder = { daily: 0, weekly: 1, monthly: 2, once: 3 };
      filtered.sort((a, b) => {
        const ta = a[1], tb = b[1];
        switch (taskSort) {
          case 'name': return (ta.name || '').localeCompare(tb.name || '');
          case 'difficulty': return (diffOrder[ta.difficulty || 'medium'] || 0) - (diffOrder[tb.difficulty || 'medium'] || 0);
          case 'points': return basePoints(tb, settings?.difficultyMultipliers) - basePoints(ta, settings?.difficultyMultipliers);
          case 'rotation': return (rotOrder[ta.rotation] ?? 9) - (rotOrder[tb.rotation] ?? 9);
          case 'estMin': return (tb.estMin || 0) - (ta.estMin || 0);
          default: return 0;
        }
      });

      if (selectMode) {
        html += `<div class="admin-section-header">
          <span>${selectedTaskIds.size} selected</span>
          <div>
            <button class="btn btn--ghost btn--sm" id="selectAllBtn" type="button">Select All</button>
            <button class="btn btn--ghost btn--sm" id="deselectAllBtn" type="button">Deselect All</button>
            <button class="btn btn--secondary btn--sm" id="cancelSelectBtn" type="button">Cancel</button>
          </div>
        </div>`;
      } else {
        html += `<div class="admin-section-header">
          <span>${filtered.length} task${filtered.length !== 1 ? 's' : ''}</span>
          <div>
            <button class="btn btn--secondary btn--sm" id="selectModeBtn" type="button">Select</button>
          </div>
        </div>`;
      }

      if (!selectMode) {
        // New task form at top
        if (editingTaskId === 'new') {
          html += renderTaskForm(null);
        }
      }

      html += `<div class="admin-list-add">
  <button class="btn btn--primary btn--sm" id="addTaskBtn" type="button">+ Add Task</button>
</div>`;

      if (filtered.length === 0) {
        html += `<div class="admin-empty">No tasks yet. Tap + Add Task to get started.</div>`;
      } else {
        html += `<div class="admin-list" id="taskList">`;
        for (const [id, t] of filtered) {
          const cat = catsObj[t.category] || {};
          const catColor = cat.color || 'var(--surface-2, var(--surface))';
          const icon = renderColorSwatch(catColor);
          const ownerNames = (t.owners || []).map(oid => peopleObj[oid]?.name || '?').join(', ');
          const rotLabel = { daily: 'Daily', weekly: 'Weekly', monthly: 'Monthly', once: 'One-time' }[t.rotation] || t.rotation;
          const secondary = `${rotLabel}${ownerNames ? ' · ' + ownerNames : ''}`;
          html += renderAdminRow({
            icon,
            primary: esc(t.name),
            secondary: esc(secondary),
            dataAttrs: `data-task-id="${id}"`,
          });
        }
        html += `</div>`;
      }

      // Modal overlay for editing (not for 'new' — new stays at top)
      if (!selectMode && editingTaskId && editingTaskId !== 'new') {
        html += `<div class="task-form-backdrop" id="taskFormBackdrop">
          <div class="task-form-modal">${renderTaskForm(editingTaskId)}</div>
        </div>`;
      }

      // Floating action bar (select mode with selections)
      if (selectMode && selectedTaskIds.size > 0) {
        html += `<div class="bulk-action-bar">
          <button class="btn btn--ghost btn--sm" id="bulkCancelBtn" type="button">Cancel</button>
          <button class="btn btn--danger btn--sm" id="bulkDeleteBtn" type="button">Delete ${selectedTaskIds.size}</button>
          <button class="btn btn--primary btn--sm" id="bulkEditBtn" type="button">Edit ${selectedTaskIds.size}</button>
        </div>`;
      }

      return html;
    }

    function renderTaskForm(taskId) {
      const task = taskId ? tasksObj[taskId] : {};
      const pa = peopleArray();
      const ca = catsArray();
      return `<div class="admin-form">${renderTaskFormCompact({
        task,
        taskId,
        mode: taskId ? 'edit' : 'create',
        categories: ca,
        people: pa,
        prefix: 'tf',
        rewards: rewardsObj
      })}</div>`;
    }

    // ══════════════════════════════════════════
    // Events Tab
    // ══════════════════════════════════════════

    let editingEventId = null;

    function renderEventsTab() {
      let html = '';

      if (editingEventId !== null) {
        html += renderEventFormAdmin(editingEventId === 'new' ? null : editingEventId);
      }

      html += `<div class="admin-list-add">
  <button class="btn btn--primary btn--sm" id="addEventBtn" type="button">+ Add Event</button>
</div>`;

      const evEntries = Object.entries(eventsObj || {})
        .sort((a, b) => (a[1].date || '').localeCompare(b[1].date || ''));

      if (evEntries.length === 0) {
        html += `<div class="admin-empty">No events yet. Tap + Add Event to create one.</div>`;
      } else {
        html += `<div class="admin-list" id="eventList">`;
        for (const [id, ev] of evEntries) {
          const color = ev.color || '#4285f4';
          const icon = renderColorSwatch(color);
          const dateStr = ev.date
            ? new Date(ev.date + 'T12:00:00Z').toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric',
                timeZone: settings?.timezone || 'UTC',
              })
            : '';
          const timeStr = ev.allDay ? 'All day' : [ev.startTime, ev.endTime].filter(Boolean).join(' – ');
          const secondary = [dateStr, timeStr].filter(Boolean).join(' · ');
          html += renderAdminRow({
            icon,
            primary: esc(ev.name || 'Untitled'),
            secondary: esc(secondary),
            dataAttrs: `data-event-id="${id}"`,
          });
        }
        html += `</div>`;
      }

      return html;
    }

    function renderEventFormAdmin(eventId) {
      const event = eventId ? eventsObj[eventId] || {} : {};
      const isEdit = !!eventId;
      const title = isEdit ? 'Edit Event' : 'New Event';

    function renderMealsTab() {
      const mealEntries = Object.entries(mealLibrary).sort(([, a], [, b]) => {
        if (a.isFavorite && !b.isFavorite) return -1;
        if (!a.isFavorite && b.isFavorite) return 1;
        return (b.lastUsed || 0) - (a.lastUsed || 0);
      });

      let html = `<div class="admin-list-add">
    <button class="btn btn--primary btn--sm" id="addMealBtn" type="button">+ Add Meal</button>
  </div>`;

      if (mealEntries.length === 0) {
        html += `<div class="admin-empty">No meals in the library yet. Tap + Add Meal to create one.</div>`;
      } else {
        html += `<div class="admin-list" id="mealList">`;
        for (const [id, meal] of mealEntries) {
          const icon = renderEmojiTile(meal.isFavorite ? '⭐' : '🍽');
          const tags = (meal.tags || []).slice(0, 2).join(', ');
          const extraTags = (meal.tags || []).length > 2 ? ` +${(meal.tags || []).length - 2}` : '';
          const secondary = tags ? esc(tags + extraTags) : '';
          html += renderAdminRow({
            icon,
            primary: esc(meal.name || 'Untitled'),
            secondary,
            dataAttrs: `data-meal-id="${esc(id)}"`,
          });
        }
        html += `</div>`;
      }
      return html;
    }

    function bindMealsTab() {
      main.querySelector('#addMealBtn')?.addEventListener('click', () => openAdminMealEditor(null));

      main.querySelector('#mealList')?.addEventListener('click', e => {
        const row = e.target.closest('[data-meal-id]');
        if (!row) return;
        openAdminMealEditor(row.dataset.mealId);
      });
    }

    function openAdminMealEditor(mealId) {
      const meal = mealId ? mealLibrary[mealId] : null;
      const mount = document.getElementById('taskSheetMount');
      mount.innerHTML = renderBottomSheet(renderMealEditorSheet(meal, mealId));
      requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', e => { if (e.target === overlay) mount.innerHTML = ''; });

      document.getElementById('me_fav')?.addEventListener('click', e => {
        const btn = e.currentTarget;
        const pressed = btn.getAttribute('aria-pressed') === 'true';
        btn.setAttribute('aria-pressed', String(!pressed));
        btn.classList.toggle('is-active', !pressed);
      });

      const urlInput = document.getElementById('me_url');
      const urlOpen = document.getElementById('me_urlOpen');
      urlInput?.addEventListener('input', () => {
        const val = urlInput.value.trim();
        if (urlOpen) { urlOpen.href = val || '#'; urlOpen.hidden = !val; }
      });

      let ingredients = meal ? [...(meal.ingredients || [])] : [];
      let tags = meal ? [...(meal.tags || [])] : [];

      function refreshIngredients() {
        const container = document.getElementById('me_ingredients');
        if (!container) return;
        container.innerHTML = ingredients.map((item, i) =>
          `<div class="me-ingredient-row">
            <input type="text" value="${esc(item)}" placeholder="e.g. 2 cups flour"
                   data-ingr-index="${i}" aria-label="Ingredient ${i + 1}">
            <button class="me-ingredient-remove" data-ingr-index="${i}" type="button" aria-label="Remove ingredient">&times;</button>
          </div>`
        ).join('');
        bindIngrEvents();
      }

      function bindIngrEvents() {
        const container = document.getElementById('me_ingredients');
        container?.querySelectorAll('input[data-ingr-index]').forEach(inp => {
          inp.addEventListener('input', () => { ingredients[parseInt(inp.dataset.ingrIndex)] = inp.value; });
        });
        container?.querySelectorAll('.me-ingredient-remove').forEach(btn => {
          btn.addEventListener('click', () => {
            ingredients.splice(parseInt(btn.dataset.ingrIndex), 1);
            refreshIngredients();
          });
        });
      }
      bindIngrEvents();

      document.getElementById('me_addIngredient')?.addEventListener('click', () => {
        ingredients.push('');
        refreshIngredients();
        const inputs = document.querySelectorAll('#me_ingredients input');
        inputs[inputs.length - 1]?.focus();
      });

      function refreshTags() {
        const container = document.getElementById('me_tags');
        if (!container) return;
        container.innerHTML = tags.map((t, i) =>
          `<span class="me-tag">
            <span>${esc(t)}</span>
            <button class="me-tag__remove" data-tag-index="${i}" type="button" aria-label="Remove tag">&times;</button>
          </span>`
        ).join('');
        container.querySelectorAll('.me-tag__remove').forEach(btn => {
          btn.addEventListener('click', () => { tags.splice(parseInt(btn.dataset.tagIndex), 1); refreshTags(); });
        });
      }

      document.getElementById('me_tagInput')?.addEventListener('keydown', e => {
        if ((e.key === 'Enter' || e.key === ',') && e.target.value.trim()) {
          e.preventDefault();
          tags.push(e.target.value.trim());
          e.target.value = '';
          refreshTags();
        }
      });

      document.getElementById('meDelete')?.addEventListener('click', async () => {
        const confirmed = await showConfirm({
          title: 'Delete meal?',
          message: `"${esc(meal?.name ?? '')}" will be removed from any planned days.`,
          confirmLabel: 'Delete',
          danger: true,
        });
        if (!confirmed) return;
        const allMealsSnap = await readOnce('meals');
        const cascadeUpdates = {};
        if (allMealsSnap) {
          for (const [dateKey, slots] of Object.entries(allMealsSnap)) {
            for (const [s, entry] of Object.entries(slots || {})) {
              if (entry?.mealId === mealId) cascadeUpdates[`meals/${dateKey}/${s}`] = null;
            }
          }
        }
        cascadeUpdates[`mealLibrary/${mealId}`] = null;
        await multiUpdate(cascadeUpdates);
        delete mealLibrary[mealId];
        mount.innerHTML = '';
        render();
      });

      document.getElementById('meForm')?.addEventListener('submit', async e => {
        e.preventDefault();
        const name = document.getElementById('me_name').value.trim();
        if (!name) { document.getElementById('me_nameError').textContent = 'Name is required'; return; }
        document.querySelectorAll('#me_ingredients input[data-ingr-index]').forEach(inp => {
          ingredients[parseInt(inp.dataset.ingrIndex)] = inp.value;
        });
        const data = {
          name,
          isFavorite: document.getElementById('me_fav')?.getAttribute('aria-pressed') === 'true',
          prepTime: document.getElementById('me_prepTime').value.trim() || null,
          tags: tags.filter(Boolean),
          ingredients: ingredients.filter(Boolean),
          url: document.getElementById('me_url').value.trim() || null,
          notes: document.getElementById('me_notes').value.trim() || null,
          lastUsed: meal?.lastUsed || null,
          createdAt: meal?.createdAt || firebase.database.ServerValue.TIMESTAMP,
        };
        if (mealId) {
          await writeMealLibrary(mealId, data);
          mealLibrary[mealId] = data;
        } else {
          const newId = await pushMealLibrary({ ...data, createdAt: firebase.database.ServerValue.TIMESTAMP });
          mealLibrary[newId] = data;
        }
        mount.innerHTML = '';
        render();
      });
    }

    async function deleteAdminMeal(mealId) {
      const meal = mealLibrary[mealId];
      if (!meal) return;
      const confirmed = await showConfirm({
        title: 'Delete meal?',
        message: `"${esc(meal.name)}" will be removed from any planned days.`,
        confirmLabel: 'Delete',
        danger: true,
      });
      if (!confirmed) return;
      const allMealsSnap = await readOnce('meals');
      const cascadeUpdates = {};
      if (allMealsSnap) {
        for (const [dateKey, slots] of Object.entries(allMealsSnap)) {
          for (const [s, entry] of Object.entries(slots || {})) {
            if (entry?.mealId === mealId) cascadeUpdates[`meals/${dateKey}/${s}`] = null;
          }
        }
      }
      cascadeUpdates[`mealLibrary/${mealId}`] = null;
      await multiUpdate(cascadeUpdates);
      delete mealLibrary[mealId];
      render();
    }

    async function loadScheduleStats() {
      const el = document.getElementById('scheduleStats');
      if (!el) return;

      const allSchedule = await readAllSchedule() || {};
      const tomorrow = addDays(today, 1);
      const futureDates = Object.keys(allSchedule).filter(d => d >= tomorrow).sort();
      const pa = peopleArray();

      let totalEntries = 0;
      let totalMinutes = 0;
      const perPerson = {};
      const perPersonMin = {};
      for (const p of pa) { perPerson[p.id] = 0; perPersonMin[p.id] = 0; }

      for (const dateKey of futureDates) {
        const dayEntries = allSchedule[dateKey] || {};
        const entries = Object.values(dayEntries);
        totalEntries += entries.length;
        for (const e of entries) {
          const task = tasksObj[e.taskId];
          const mins = task ? (task.estMin || 0) : 0;
          totalMinutes += mins;
          if (perPerson[e.ownerId] !== undefined) {
            perPerson[e.ownerId]++;
            perPersonMin[e.ownerId] += mins;
          }
        }
      }

      const totalHrs = Math.floor(totalMinutes / 60);
      const totalRem = totalMinutes % 60;
      const totalTimeStr = totalHrs > 0 ? `${totalHrs}h ${totalRem}m` : `${totalRem}m`;

      let html = `<div class="admin-stat-cards">
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${futureDates.length}</span>
          <span class="admin-stat-card__label">Days Scheduled</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${totalEntries}</span>
          <span class="admin-stat-card__label">Total Entries</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${totalTimeStr}</span>
          <span class="admin-stat-card__label">Total Time</span>
        </div>
      </div>
      <h4 class="form-label mt-md">Load per Person</h4>
      <div class="admin-list">`;
      for (const p of pa) {
        const count = perPerson[p.id] || 0;
        const avg = futureDates.length > 0 ? (count / futureDates.length).toFixed(1) : '0';
        const personMins = perPersonMin[p.id] || 0;
        const avgMins = futureDates.length > 0 ? (personMins / futureDates.length) : 0;
        const avgMinsStr = avgMins >= 60
          ? `${Math.floor(avgMins / 60)}h ${Math.round(avgMins % 60)}m`
          : `${Math.round(avgMins)}m`;
        const personTotalStr = personMins >= 60
          ? `${Math.floor(personMins / 60)}h ${personMins % 60}m`
          : `${personMins}m`;
        html += `<div class="admin-list-item">
          <div class="admin-person-row">
            <div class="admin-person-dot admin-person-dot--sm" style="background:${p.color}"></div>
            <span class="admin-list-item__name">${esc(p.name)}</span>
          </div>
          <span class="admin-list-item__meta">${count} tasks · ${avg}/day · ${personTotalStr} · ${avgMinsStr}/day</span>
        </div>`;
      }
      html += `</div>`;
      el.innerHTML = html;
    }

    const REWARD_EMOJIS = ['🍕', '🎮', '🍦', '⭐', '🎬', '📱', '🛹', '🧁', '🎯', '🏆', '🎪', '🏊', '🎨', '🎵', '🛍️', '🧸'];

    function renderRewardsTab() {
      let html = '';

      html += `<div class="admin-list-add">
  <button class="btn btn--primary btn--sm" id="addRewardBtn" type="button">+ Add Reward</button>
</div>`;

      const activeRewards = Object.entries(rewardsObj || {}).filter(([, r]) => r.status !== 'archived');

      if (activeRewards.length === 0) {
        html += `<div class="admin-empty">No rewards defined yet. Tap + Add Reward to create one.</div>`;
      } else {
        html += `<div class="admin-list" id="rewardList">`;
        for (const [id, r] of activeRewards) {
          const icon = renderEmojiTile(r.icon || '🎁');
          const secondary = `${r.pointCost ?? 0} pts · ${r.rewardType || 'custom'}`;
          html += renderAdminRow({
            icon,
            primary: esc(r.name || 'Untitled'),
            secondary: esc(secondary),
            dataAttrs: `data-reward-id="${id}"`,
          });
        }
        html += `</div>`;
      }

      // Reward form modal
      if (editingRewardId) {
        const modalRewardId = editingRewardId === 'new' ? null : editingRewardId;
        html += `<div class="task-form-backdrop" id="rewardFormBackdrop">
          <div class="task-form-modal">${renderRewardForm(modalRewardId)}</div>
        </div>`;
      }

      // Archived rewards toggle
      const archived = Object.entries(rewardsObj).filter(([, r]) => r.status === 'archived');
      if (archived.length > 0) {
        html += `<details class="admin-archived-rewards" style="margin-top: 16px;">
          <summary style="cursor: pointer; color: var(--text-muted); font-size: var(--font-sm);">${archived.length} archived reward${archived.length > 1 ? 's' : ''}</summary>
          <div class="reward-list" style="margin-top: 8px;">`;
        for (const [id, reward] of archived) {
          html += `<div class="reward-card reward-card--archived" data-reward-id="${id}">
            <div class="reward-card__icon" style="opacity: 0.5;">${esc(reward.icon || '🎁')}</div>
            <div class="reward-card__body">
              <div class="reward-card__name" style="text-decoration: line-through;">${esc(reward.name)}</div>
              <div class="reward-card__meta"><span class="reward-card__cost">${reward.pointCost} pts</span></div>
            </div>
          </div>`;
        }
        html += `</div></details>`;
      }

      // ── Redemption History ──
      const redemptionTypes = ['redemption-request', 'redemption-approved', 'redemption-denied', 'use-request', 'use-approved', 'use-denied'];
      const allRedemptions = [];
      for (const [personId, msgs] of Object.entries(allMessagesObj)) {
        if (!msgs) continue;
        for (const [msgId, m] of Object.entries(msgs)) {
          if (redemptionTypes.includes(m.type)) {
            allRedemptions.push({ personId, msgId, ...m });
          }
        }
      }
      allRedemptions.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      if (allRedemptions.length > 0) {
        const shown = allRedemptions.slice(0, 20);
        html += `<details class="admin-section" style="margin-top: 24px;">
          <summary class="admin-section__header" style="cursor: pointer;"><h3>Redemption History (${allRedemptions.length})</h3></summary>
          <div class="redemption-history" style="margin-top: 8px;">`;
        for (const r of shown) {
          const person = peopleObj[r.personId];
          const reward = r.rewardId ? rewardsObj[r.rewardId] : null;
          const statusIcon = (r.type === 'redemption-approved' || r.type === 'use-approved') ? '✅' :
                             (r.type === 'redemption-denied' || r.type === 'use-denied') ? '❌' : '⏳';
          const statusLabel = (r.type === 'redemption-approved' || r.type === 'use-approved') ? 'Approved' :
                              (r.type === 'redemption-denied' || r.type === 'use-denied') ? 'Denied' :
                              r.type === 'use-request' ? 'Use Request' : 'Pending';
          const date = r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-US', { timeZone: tz }) : '';
          html += `<div class="redemption-row">
            <span class="redemption-row__status">${statusIcon}</span>
            <span class="redemption-row__person" style="color: ${person?.color || 'inherit'}">${esc(person?.name || '?')}</span>
            <span class="redemption-row__reward">${esc(reward?.icon || '🎁')} ${esc(r.title || reward?.name || 'Reward')}</span>
            <span class="redemption-row__cost">${Math.abs(r.amount || 0)} pts</span>
            <span class="redemption-row__date">${date}</span>
            <span class="redemption-row__label">${statusLabel}</span>
          </div>`;
        }
        if (allRedemptions.length > 20) {
          html += `<div style="text-align: center; padding: 8px; color: var(--text-muted); font-size: var(--font-sm);">+ ${allRedemptions.length - 20} more</div>`;
        }
        html += `</div></details>`;
      }

      return html;
    }

              <button type="button" class="segmented-btn${reward.rewardType === 'task-skip' ? ' segmented-btn--active' : ''}" data-value="task-skip">Task Skip</button>

            </div>
            <div class="form-group">
              <label class="form-label">Earn in ~</label>
              <div style="display: flex; gap: 4px; align-items: center;">

            <label class="form-label">Available to</label>
            <div class="chip-group" id="rf_people">
              ${peopleArray().map(p => {
                const selected = reward.perPerson && reward.perPerson.includes(p.id);
                return `<button class="chip chip--selectable${selected ? ' chip--active' : ''}" data-person-id="${p.id}" style="--person-color:${p.color}" type="button">${esc(p.name)}</button>`;

              <label class="form-label">Streak req.</label>
              <input type="number" id="rf_streakReq" class="form-input" value="${reward.streakRequirement || ''}" min="1" placeholder="None">

              <label class="form-label">Expires</label>

    function bindRewardsTab() {
      // Row click — delegated
      main.querySelector('#rewardList')?.addEventListener('click', e => {
        const row = e.target.closest('[data-reward-id]');
        if (!row) return;
        editingRewardId = row.dataset.rewardId;
        render();
      });

      main.querySelector('#addRewardBtn')?.addEventListener('click', () => {
        editingRewardId = 'new';
        render();
      });

      // Bind modal form if visible
      const form = main.querySelector('#rewardForm');
      if (form) bindRewardForm();

      // Backdrop close
      document.querySelector('#rewardFormBackdrop')?.addEventListener('click', (e) => {
        if (e.target.id === 'rewardFormBackdrop') {
          editingRewardId = null;
          render();
        }
      });

    }

    function bindRewardForm() {
      const form = main.querySelector('#rewardForm') || document.getElementById('rewardForm');
      if (!form) return;

      // Emoji picker
      for (const btn of form.querySelectorAll('.emoji-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-btn--selected'));
          btn.classList.add('emoji-btn--selected');
          form.querySelector('#rf_customEmoji').value = '';
        });
      }

      // Type segmented control
      for (const btn of form.querySelectorAll('#rf_type .segmented-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('#rf_type .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          const hint = form.querySelector('#rf_typeHint');
          const val = btn.dataset.value;
          hint.textContent = val === 'task-skip' ? 'Person picks a task to skip for the day'
            : val === 'penalty-removal' ? 'Removes the late penalty from a past task' : '';
        });
      }

      // Pricing helper
      const slider = form.querySelector('#rf_daysSlider');
      const daysInput = form.querySelector('#rf_daysInput');
      const avgSelect = form.querySelector('#rf_avgSelect');
      const suggestion = form.querySelector('#rf_suggestion');
      const pointCost = form.querySelector('#rf_pointCost');

      function updateSuggestion() {
        const days = parseInt(daysInput.value) || 7;
        const avg = parseInt(avgSelect.value) || 88;
        const cost = Math.round((days * avg) / 5) * 5;
        const avgLabel = PRICING_AVERAGES.find(a => a.value === avg)?.label || avg + '%';
        suggestion.innerHTML = `${days} day${days > 1 ? 's' : ''} at ${avgLabel} average &rarr; <strong>${cost} pts</strong> (click to apply)`;
        suggestion.dataset.cost = cost;
      }

      slider.addEventListener('input', () => { daysInput.value = slider.value; updateSuggestion(); });
      daysInput.addEventListener('input', () => {
        const v = parseInt(daysInput.value);
        if (v && v <= 30) slider.value = v;
        updateSuggestion();
      });
      avgSelect.addEventListener('change', updateSuggestion);
      suggestion.addEventListener('click', () => { pointCost.value = suggestion.dataset.cost; });
      updateSuggestion();

      // Person chips
      for (const chip of form.querySelectorAll('#rf_people .chip--selectable')) {
        chip.addEventListener('click', () => chip.classList.toggle('chip--active'));
      }

      // Cancel
      form.querySelector('#rf_cancel').addEventListener('click', () => {
        editingRewardId = null;
        render();
      });

      // Delete
      form.querySelector('#rf_delete')?.addEventListener('click', async () => {
        const reward = rewardsObj[editingRewardId];
        if (!await showConfirm({ title: `Delete "${reward?.name || 'this reward'}"?`, message: 'This cannot be undone.', danger: true })) return;
        await removeReward(editingRewardId);
        delete rewardsObj[editingRewardId];
        editingRewardId = null;
        render();
      });

      // Save
      form.querySelector('#rf_save').addEventListener('click', async () => {
        const name = form.querySelector('#rf_name').value.trim();
        if (!name) return;

        const selectedEmoji = form.querySelector('.emoji-btn--selected')?.dataset?.emoji
          || form.querySelector('#rf_customEmoji').value.trim() || '🎁';
        const rewardType = form.querySelector('#rf_type .segmented-btn--active')?.dataset?.value || 'custom';
        const cost = parseInt(form.querySelector('#rf_pointCost').value) || 0;
        if (cost <= 0) return;

        const selectedPeople = [...form.querySelectorAll('#rf_people .chip--active')]
          .map(c => c.dataset.personId);
        const maxRedemptions = parseInt(form.querySelector('#rf_maxRedemptions').value) || null;
        const streakReq = parseInt(form.querySelector('#rf_streakReq').value) || null;
        const expiresDate = form.querySelector('#rf_expiresAt').value;
        const expiresAt = expiresDate ? new Date(expiresDate + 'T23:59:59').getTime() : null;

        const data = {
          name,
          icon: selectedEmoji,
          pointCost: cost,
          rewardType,
          perPerson: selectedPeople.length > 0 ? selectedPeople : null,
          maxRedemptions,
          streakRequirement: streakReq,
          expiresAt,
          status: 'active'
        };

        if (editingRewardId && editingRewardId !== 'new') {
          await writeReward(editingRewardId, data);
          rewardsObj[editingRewardId] = data;
        } else {
          const newKey = await pushReward(data);
          rewardsObj[newKey] = data;
        }

        editingRewardId = null;
        render();
      });
    }

    // ══════════════════════════════════════════
    // Achievements Tab
    // ══════════════════════════════════════════

    let editingAchievementId = null;
    let achievementPersonExpanded = {};

    const ACHIEVEMENT_STATS = [
      { value: 'streak', label: 'Current Streak (days)' },
      { value: 'bestStreak', label: 'Best Streak (days)' },
      { value: 'totalEarned', label: 'Total Points Earned' },
      { value: 'tasksCompleted', label: 'Tasks Completed' },
      { value: 'perfectDays', label: 'Perfect Days (100%)' },
      { value: 'gradeDay', label: 'Daily Grade' },
      { value: 'gradeWeek', label: 'Weekly Grade' },
      { value: 'gradeMonth', label: 'Monthly Grade' },
      { value: 'firstRedemption', label: 'First Store Purchase' }
    ];

    const ACHIEVEMENT_EMOJIS = ['🏆','⭐','🔥','💎','🎯','🏅','👑','💪','🌟','🚀','🎖️','💰','🎁','📚','🧹','🏠','⚡','🌈'];

    function renderAchievementsTab() {
      const allDefs = mergeAchievementDefs(achievementDefsObj);
      const activeDefs = getActiveAchievements(allDefs);
      const ppl = peopleArray();

      let html = '';

      // ── Per-person status (collapsible) ──
      html += `<div class="admin-section">
        <div class="admin-section__header"><h3>Status by Person</h3></div>`;

      for (const p of ppl) {
        const pa = allAchievements[p.id] || {};
        const unlocked = Object.keys(pa).filter(k => activeDefs[k] && !pa[k].revoked).length;
        const total = Object.keys(activeDefs).length;
        const isExpanded = achievementPersonExpanded[p.id];

        html += `<div class="ach-person-row">
          <button class="ach-person-header" data-person-id="${p.id}" type="button">
            <span class="sb-mini-dot" style="background:${p.color}"></span>
            <span class="ach-person-name">${esc(p.name)}</span>
            <span class="ach-person-count">${unlocked}/${total}</span>
            <span class="ach-person-chevron">${isExpanded ? '▾' : '▸'}</span>
          </button>`;

        if (isExpanded) {
          html += `<div class="ach-person-badges">`;
          for (const [key, def] of Object.entries(activeDefs)) {
            if (def.perPerson && !def.perPerson.includes(p.id)) continue;
            const got = pa[key];
            const isRevoked = got?.revoked;
            const isUnlocked = got && !isRevoked;
            const date = isUnlocked ? new Date(got.unlockedAt).toLocaleDateString('en-US', { timeZone: tz }) : '';
            html += `<button class="ach-badge-btn ${isUnlocked ? 'ach-badge-btn--unlocked' : ''}" data-key="${esc(key)}" data-person-id="${p.id}" type="button" title="${esc(def.label)}">
              <span class="ach-badge-icon">${def.icon}</span>
              <span class="ach-badge-label">${esc(def.label)}</span>
              ${isRevoked ? '<span class="ach-badge-date" style="color: var(--accent-danger, #e53e3e);">Revoked</span>' : ''}
              ${date ? `<span class="ach-badge-date">${date}</span>` : ''}
            </button>`;
          }
          html += `</div>`;
          if (unlocked > 0 || Object.keys(pa).length > 0) {
            html += `<div style="text-align: right; margin-top: var(--spacing-xs);">
              <button class="btn btn--ghost btn--xs ach-reset-all" data-person-id="${p.id}" type="button" style="color: var(--accent-danger, #e53e3e);">Reset All</button>
            </div>`;
          }
        }
        html += `</div>`;
      }
      html += `</div>`;

      // ── Achievement definitions list ──
      html += `<div class="admin-list-add">
        <button class="btn btn--primary btn--sm" id="addAchBtn" type="button">+ Add Badge</button>
      </div>`;

      const defsEntries = Object.entries(allDefs).sort((a, b) => {
        if (a[1].isDefault && !b[1].isDefault) return -1;
        if (!a[1].isDefault && b[1].isDefault) return 1;
        return (a[1].label || '').localeCompare(b[1].label || '');
      });

      if (defsEntries.length === 0) {
        html += `<div class="admin-empty">No badges defined.</div>`;
      } else {
        html += `<div class="admin-list" id="badgeList">`;
        for (const [key, def] of defsEntries) {
          const icon = renderEmojiTile(def.icon || '🏆');
          const unlockedCount = Object.values(allAchievements).filter(pa => pa[key]?.unlockedAt && !pa[key]?.revoked).length;
          const totalPeople = peopleArray().length;
          const secondary = `${unlockedCount} / ${totalPeople} unlocked`;
          html += renderAdminRow({
            icon,
            primary: esc(def.label || key),
            secondary: esc(secondary),
            dataAttrs: `data-ach-key="${esc(key)}"`,
          });
        }
        html += `</div>`;
      }

      // Achievement form modal
      if (editingAchievementId) {
        const modalAchKey = editingAchievementId === 'new' ? null : editingAchievementId;
        html += `<div class="task-form-backdrop" id="achFormBackdrop">
          <div class="task-form-modal">${renderAchievementForm(modalAchKey)}</div>
        </div>`;
      }

      return html;
    }

    function renderAchievementForm(achKey) {
      const allDefs = mergeAchievementDefs(achievementDefsObj);
      const def = achKey ? allDefs[achKey] || {} : {};
      const isEdit = !!achKey;
      const title = isEdit ? 'Edit Badge' : 'New Badge';
      const cType = def.conditionType || 'hybrid';
      const cStat = def.condition?.stat || '';
      const cThreshold = def.condition?.threshold ?? '';
      const isGradeStat = ['gradeDay', 'gradeWeek', 'gradeMonth'].includes(cStat);
      const rType = def.reward?.type || 'none';

      return `<div class="form-compact" id="achForm">
        <h3 class="admin-form__title">${title}</h3>

        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" id="af_name" value="${esc(def.label || '')}" placeholder="e.g. 7-Day Streak">
        </div>
        <div class="form-group">
          <label class="form-label">Icon</label>
          <div class="emoji-picker" id="af_emojiPicker">
            ${ACHIEVEMENT_EMOJIS.map(e => `<button type="button" class="emoji-btn${def.icon === e ? ' emoji-btn--selected' : ''}" data-emoji="${e}">${e}</button>`).join('')}
            <input type="text" id="af_customEmoji" class="form-input form-input--sm" placeholder="✏️" maxlength="2" style="width: 44px; text-align: center;" value="${def.icon && !ACHIEVEMENT_EMOJIS.includes(def.icon) ? esc(def.icon) : ''}">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" id="af_desc" value="${esc(def.description || '')}" placeholder="What does this badge celebrate?">
        </div>

        <div class="form-group">
          <label class="form-label">Trigger</label>
          <div class="segmented-control" id="af_condType">
            <button type="button" class="segmented-btn${cType === 'stat' ? ' segmented-btn--active' : ''}" data-value="stat">Auto</button>
            <button type="button" class="segmented-btn${cType === 'hybrid' ? ' segmented-btn--active' : ''}" data-value="hybrid">Either</button>
            <button type="button" class="segmented-btn${cType === 'manual' ? ' segmented-btn--active' : ''}" data-value="manual">Manual</button>
          </div>
        </div>

        <div id="af_condFields" style="${cType === 'manual' ? 'display:none;' : ''}">
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Condition</label>
              <select id="af_stat">
                <option value="">Select...</option>
                ${ACHIEVEMENT_STATS.map(s => `<option value="${s.value}"${cStat === s.value ? ' selected' : ''}>${s.label}</option>`).join('')}
              </select>
            </div>
            <div class="form-group" id="af_thresholdGroup">
              <label class="form-label">Threshold</label>
              ${isGradeStat
                ? `<select id="af_threshold">
                    <option value="A+"${cThreshold === 'A+' ? ' selected' : ''}>A+</option>
                    <option value="A"${cThreshold === 'A' ? ' selected' : ''}>A</option>
                    <option value="B+"${cThreshold === 'B+' ? ' selected' : ''}>B+</option>
                    <option value="B"${cThreshold === 'B' ? ' selected' : ''}>B</option>
                  </select>`
                : `<input type="number" id="af_threshold" value="${cThreshold}" min="1" placeholder="e.g. 7">`}
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Reward on unlock</label>
          <div class="segmented-control" id="af_rewardType">
            <button type="button" class="segmented-btn${rType === 'none' ? ' segmented-btn--active' : ''}" data-value="none">Badge Only</button>
            <button type="button" class="segmented-btn${rType === 'points' ? ' segmented-btn--active' : ''}" data-value="points">+ Points</button>
            <button type="button" class="segmented-btn${rType === 'reward' ? ' segmented-btn--active' : ''}" data-value="reward">Store Item</button>

        <div id="af_rewardItemField" style="${rType === 'reward' ? '' : 'display:none;'}">
          <div class="form-group">
            <label class="form-label">Store reward</label>
            <select id="af_rewardId" class="form-input">
              <option value="">Select...</option>
              ${Object.entries(rewardsObj).filter(([,r]) => r.status === 'active').map(([id, r]) =>
                `<option value="${id}" ${def.reward?.rewardId === id ? 'selected' : ''}>${esc(r.icon || '')} ${esc(r.name)}</option>`
              ).join('')}
            </select>

        <div class="form-group">
          <label class="form-label">Available to</label>
          <div class="chip-group" id="af_people">
            ${peopleArray().map(p => {
              const selected = def.perPerson && def.perPerson.includes(p.id);
              return `<button class="chip chip--selectable${selected ? ' chip--active' : ''}" data-person-id="${p.id}" style="--person-color:${p.color}" type="button">${esc(p.name)}</button>`;

            <span class="form-hint" style="margin-left: 4px;">None = all</span>
          </div>

        <div class="admin-form__actions">
