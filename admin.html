              <div class="rf-adv-row">
                <span class="rf-adv-label">Max uses</span>
                <input type="number" id="rf_maxRedemptions" class="rf-adv-input" value="${reward.maxRedemptions || ''}" min="1" placeholder="Unlimited">

              <div class="rf-adv-row">
                <span class="rf-adv-label">Streak required</span>
                <input type="number" id="rf_streakReq" class="rf-adv-input" value="${reward.streakRequirement || ''}" min="1" placeholder="None">
              </div>
              <div class="rf-adv-row">
                <span class="rf-adv-label">Expires</span>
                <input type="date" id="rf_expiresAt" class="rf-adv-input" value="${reward.expiresAt ? new Date(reward.expiresAt).toLocaleDateString('en-CA', { timeZone: tz }) : ''}">

      requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));

      const close = () => closeAdminSheet();

      document.getElementById('bottomSheet')?.addEventListener('click', e => {
        if (e.target.id === 'bottomSheet') close();
      });

      // Emoji preview + grid toggle
      let currentEmoji = defaultEmoji;
      const emojiReveal = mount.querySelector('#rf_emojiReveal');
      mount.querySelector('#rf_emojiBtnPreview')?.addEventListener('click', () => {
        emojiReveal?.classList.toggle('is-open');
      });
      for (const cell of mount.querySelectorAll('.rf-emoji-cell')) {
        cell.addEventListener('click', () => {
          mount.querySelectorAll('.rf-emoji-cell').forEach(c => c.classList.remove('is-selected'));
          cell.classList.add('is-selected');
          currentEmoji = cell.dataset.emoji;
          mount.querySelector('#rf_emojiBtnPreview').textContent = currentEmoji;
          mount.querySelector('#rf_customEmoji').value = '';
          emojiReveal?.classList.remove('is-open');
        });
      }
      mount.querySelector('#rf_customEmoji')?.addEventListener('input', e => {
        const v = e.target.value.trim();
        if (v) {
          currentEmoji = v;
          mount.querySelector('#rf_emojiBtnPreview').textContent = v;
          mount.querySelectorAll('.rf-emoji-cell').forEach(c => c.classList.remove('is-selected'));
        }
      });

      // Type pills
      const typeHint = mount.querySelector('#rf_typeHint');
      const initType = mount.querySelector('#rf_type .tf-rot-pill--active')?.dataset?.rtype || 'custom';
      if (initType === 'task-skip') typeHint.textContent = 'Person picks a task to skip for the day';
      else if (initType === 'penalty-removal') typeHint.textContent = 'Removes the late penalty from a past task';
      for (const pill of mount.querySelectorAll('#rf_type .tf-rot-pill')) {
        pill.addEventListener('click', () => {
          mount.querySelectorAll('#rf_type .tf-rot-pill').forEach(p => p.classList.remove('tf-rot-pill--active'));
          pill.classList.add('tf-rot-pill--active');
          const val = pill.dataset.rtype;
          typeHint.textContent = val === 'task-skip' ? 'Person picks a task to skip for the day'
            : val === 'penalty-removal' ? 'Removes the late penalty from a past task' : '';
        });
      }

      // Pricing helper
      const slider = mount.querySelector('#rf_daysSlider');
      const daysInput = mount.querySelector('#rf_daysInput');
      const avgSelect = mount.querySelector('#rf_avgSelect');
      const suggestion = mount.querySelector('#rf_suggestion');
      const pointCostInput = mount.querySelector('#rf_pointCost');

      function updateSuggestion() {
        const days = parseInt(daysInput.value) || 7;
        const avg = parseInt(avgSelect.value) || 88;
        const cost = Math.round((days * avg) / 5) * 5;
        const avgLabel = PRICING_AVERAGES.find(a => a.value === avg)?.label || avg + '%';
        suggestion.innerHTML = `${days} day${days > 1 ? 's' : ''} at ${avgLabel} &rarr; <strong>${cost} pts</strong> (tap to apply)`;
        suggestion.dataset.cost = cost;
      }

      mount.querySelector('#rf_pricingChip')?.addEventListener('click', () => {
        const reveal = mount.querySelector('#rf_pricingReveal');
        reveal?.classList.toggle('is-open');
        mount.querySelector('#rf_pricingChip')?.classList.toggle('is-active', reveal?.classList.contains('is-open'));
        if (reveal?.classList.contains('is-open')) updateSuggestion();
      });
      slider?.addEventListener('input', () => { daysInput.value = slider.value; updateSuggestion(); });
      daysInput?.addEventListener('input', () => {
        const v = parseInt(daysInput.value);
        if (v && v <= 30) slider.value = v;
        updateSuggestion();
      });
      avgSelect?.addEventListener('change', updateSuggestion);
      suggestion?.addEventListener('click', () => { pointCostInput.value = suggestion.dataset.cost; });

      // Person chips
      for (const chip of mount.querySelectorAll('#rf_people .ef2-person-chip')) {
        chip.addEventListener('click', () => {
          if (chip.dataset.state === 'primary') chip.removeAttribute('data-state');
          else chip.setAttribute('data-state', 'primary');
        });

      let approvalRequired = isApprovalRequired;
      mount.querySelector('#rf_approvalChip')?.addEventListener('click', () => {
        approvalRequired = !approvalRequired;
        mount.querySelector('#rf_approvalChip')?.classList.toggle('is-active', approvalRequired);
      });

      // Advanced chip toggle
      mount.querySelector('#rf_advancedChip')?.addEventListener('click', () => {
        const reveal = mount.querySelector('#rf_advancedReveal');
        reveal?.classList.toggle('is-open');
        mount.querySelector('#rf_advancedChip')?.classList.toggle('is-active', reveal?.classList.contains('is-open'));
      });

      // Close
      mount.querySelector('#rf_close')?.addEventListener('click', close);

      // Archive / Unarchive / Delete
      mount.querySelector('#rf_delete')?.addEventListener('click', async () => {
        const name = rewardsObj[rewardId]?.name || 'this reward';
        if (!await showConfirm({ title: `Delete "${name}"?`, message: 'This cannot be undone.', danger: true })) return;
        await removeReward(rewardId);
        delete rewardsObj[rewardId];
        close(); render();
      });

      mount.querySelector('#rf_archive')?.addEventListener('click', async () => {
        const name = rewardsObj[rewardId]?.name || 'this reward';
        if (!await showConfirm({ title: `Archive "${name}"?`, message: 'It will be hidden from the store but not deleted.' })) return;
        await archiveReward(rewardId);
        rewardsObj[rewardId] = { ...rewardsObj[rewardId], status: 'archived' };
        close(); render();
      });

      mount.querySelector('#rf_unarchive')?.addEventListener('click', async () => {
        await writeReward(rewardId, { ...rewardsObj[rewardId], status: 'active' });
        rewardsObj[rewardId] = { ...rewardsObj[rewardId], status: 'active' };
        close(); render();
      });

      // Save
      mount.querySelector('#rf_save')?.addEventListener('click', async () => {
        const name = mount.querySelector('#rf_name').value.trim();
        if (!name) {
          mount.querySelector('#rf_name').classList.add('is-invalid');
          mount.querySelector('#rf_name').focus();
          return;
        }
        const rewardType = mount.querySelector('#rf_type .tf-rot-pill--active')?.dataset?.rtype || 'custom';
        const cost = parseInt(mount.querySelector('#rf_pointCost').value) || 0;
        if (cost <= 0) { mount.querySelector('#rf_pointCost').focus(); return; }
        const selectedPeople = [...mount.querySelectorAll('#rf_people .ef2-person-chip[data-state="primary"]')].map(c => c.dataset.personId);
        const maxRedemptions = parseInt(mount.querySelector('#rf_maxRedemptions').value) || null;
        const streakReq = parseInt(mount.querySelector('#rf_streakReq').value) || null;
        const expiresDate = mount.querySelector('#rf_expiresAt').value;
        const expiresAt = expiresDate ? new Date(expiresDate + 'T23:59:59').getTime() : null;
        const data = {
          name, icon: currentEmoji, pointCost: cost, rewardType,
          approvalRequired,
          perPerson: selectedPeople, maxRedemptions, streakRequirement: streakReq, expiresAt,
          status: rewardId ? (rewardsObj[rewardId]?.status || 'active') : 'active'
        };
        if (rewardId) {
          await writeReward(rewardId, data);
          rewardsObj[rewardId] = data;
        } else {
          const newKey = await pushReward(data);
          rewardsObj[newKey] = data;
        }
        close(); render();
      });
    }

      { value: 'bestStreak', label: 'Best Streak (days)' },
      { value: 'totalEarned', label: 'Total Points Earned' },

    function renderAchievementsTab() {
      const allDefs = mergeAchievementDefs(achievementDefsObj);
      const activeDefs = getActiveAchievements(allDefs);
      const ppl = peopleArray();

      let html = '';

      // ── Per-person status (collapsible) ──
      html += `<div class="admin-section">
        <div class="admin-section__header"><h3>Status by Person</h3></div>`;

      for (const p of ppl) {
        const pa = allAchievements[p.id] || {};
        const unlocked = Object.keys(pa).filter(k => activeDefs[k] && !pa[k].revoked).length;
        const total = Object.keys(activeDefs).length;
        const isExpanded = achievementPersonExpanded[p.id];

        html += `<div class="ach-person-row">
          <button class="ach-person-header" data-person-id="${p.id}" type="button">
            <span class="sb-mini-dot" style="background:${p.color}"></span>
            <span class="ach-person-name">${esc(p.name)}</span>
            <span class="ach-person-count">${unlocked}/${total}</span>
            <span class="ach-person-chevron">${isExpanded ? '▾' : '▸'}</span>
          </button>`;

        if (isExpanded) {
          html += `<div class="ach-person-badges">`;
          for (const [key, def] of Object.entries(activeDefs)) {
            if (def.perPerson && !def.perPerson.includes(p.id)) continue;
            const got = pa[key];
            const isRevoked = got?.revoked;
            const isUnlocked = got && !isRevoked;
            const date = isUnlocked ? new Date(got.unlockedAt).toLocaleDateString('en-US', { timeZone: tz }) : '';
            html += `<button class="ach-badge-btn ${isUnlocked ? 'ach-badge-btn--unlocked' : ''}" data-key="${esc(key)}" data-person-id="${p.id}" type="button" title="${esc(def.label)}">
              <span class="ach-badge-icon">${def.icon}</span>
              <span class="ach-badge-label">${esc(def.label)}</span>
              ${isRevoked ? '<span class="ach-badge-date" style="color: var(--accent-danger, #e53e3e);">Revoked</span>' : ''}
              ${date ? `<span class="ach-badge-date">${date}</span>` : ''}
            </button>`;
          }
          html += `</div>`;
          if (unlocked > 0 || Object.keys(pa).length > 0) {
            html += `<div style="text-align: right; margin-top: var(--spacing-xs);">
              <button class="btn btn--ghost btn--xs ach-reset-all" data-person-id="${p.id}" type="button" style="color: var(--accent-danger, #e53e3e);">Reset All</button>
            </div>`;
          }
        }
        html += `</div>`;
      }
      html += `</div>`;

      // ── Achievement definitions list ──
      html += `<div class="admin-filters admin-filters--row">
  <input class="admin-select" type="search" id="badgesSearch" placeholder="Search badges…" value="${esc(badgesSearch)}">
  ${renderFilterSortChip('badgesFilterSortBtn', badgesFilterActiveCount())}
  <button class="btn btn--primary btn--sm" id="addAchBtn" type="button">+ Add Badge</button>
</div>`;

      let defsEntries = Object.entries(allDefs);
      if (badgesSearch) defsEntries = defsEntries.filter(([, def]) => (def.label || '').toLowerCase().includes(badgesSearch.toLowerCase()));
      if (badgesFilter === 'earned') defsEntries = defsEntries.filter(([key]) => Object.values(allAchievements).some(pa => pa[key]?.unlockedAt && !pa[key]?.revoked));
      else if (badgesFilter === 'not-earned') defsEntries = defsEntries.filter(([key]) => !Object.values(allAchievements).some(pa => pa[key]?.unlockedAt && !pa[key]?.revoked));
      defsEntries.sort((a, b) => {
        if (badgesSort === 'unlocked') {
          const ua = Object.values(allAchievements).filter(pa => pa[a[0]]?.unlockedAt && !pa[a[0]]?.revoked).length;
          const ub = Object.values(allAchievements).filter(pa => pa[b[0]]?.unlockedAt && !pa[b[0]]?.revoked).length;
          return ub - ua;
        }
        if (badgesSort === 'least-unlocked') {
          const ua = Object.values(allAchievements).filter(pa => pa[a[0]]?.unlockedAt && !pa[a[0]]?.revoked).length;
          const ub = Object.values(allAchievements).filter(pa => pa[b[0]]?.unlockedAt && !pa[b[0]]?.revoked).length;
          return ua - ub;
        }
        if (a[1].isDefault && !b[1].isDefault) return -1;
        if (!a[1].isDefault && b[1].isDefault) return 1;
        return (a[1].label || '').localeCompare(b[1].label || '');
      });

      if (defsEntries.length === 0) {
        html += `<div class="admin-empty">No badges defined.</div>`;
      } else {
        html += `<div class="admin-list" id="badgeList">`;
        for (const [key, def] of defsEntries) {
          const icon = renderEmojiTile(def.icon || '🏆');
          const unlockedCount = Object.values(allAchievements).filter(pa => pa[key]?.unlockedAt && !pa[key]?.revoked).length;
          const totalPeople = peopleArray().length;
          const secondary = `${unlockedCount} / ${totalPeople} unlocked`;
          html += renderAdminRow({
            icon,
            primary: esc(def.label || key),
            secondary: esc(secondary),
            dataAttrs: `data-ach-key="${esc(key)}"`,
          });
        }
        html += `</div>`;
      }


      return html;
    }

    function openAdminAchSheet(achKey) {

        ${renderAchievementForm(isNew ? null : achKey)}

    function bindAchievementsTab() {
      // Reset all achievements for a person
      for (const btn of main.querySelectorAll('.ach-reset-all')) {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const pid = btn.dataset.personId;
          const person = peopleObj[pid];
          if (!await showConfirm({ title: `Reset all achievements for ${person?.name}?`, message: 'They can re-earn them when criteria are met again.', danger: true })) return;
          await removeData(`achievements/${pid}`);
          allAchievements = (await readAllAchievements()) || {};
          render();
        });
      }

      // Person expand/collapse
      for (const btn of main.querySelectorAll('.ach-person-header')) {
        btn.addEventListener('click', () => {
          const pid = btn.dataset.personId;
          achievementPersonExpanded[pid] = !achievementPersonExpanded[pid];
          render();
        });
      }

      // Badge long-press in person view — opens popup to award/revoke
      for (const btn of main.querySelectorAll('.ach-badge-btn')) {
        let pressTimer = null;
        const openPopup = () => {
          const key = btn.dataset.key;
          const pid = btn.dataset.personId;
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          const def = allDefs[key] || {};
          const pa = allAchievements[pid] || {};
          const got = pa[key];
          const isRevoked = got?.revoked;
          const isUnlocked = got && !isRevoked;
          const person = peopleObj[pid];

          const mount = document.getElementById('taskSheetMount');
          let statusHtml = isUnlocked
            ? `<span style="color: var(--accent-success, #38a169);">Unlocked ${new Date(got.unlockedAt).toLocaleDateString('en-US', { timeZone: tz })}</span>`
            : isRevoked
              ? `<span style="color: var(--accent-danger, #e53e3e);">Revoked</span>`
              : `<span style="color: var(--text-faint);">Locked</span>`;

          let popupHtml = `<div style="padding: 8px 0; text-align: center;">
            <div style="font-size: 2.5rem; margin-bottom: 4px;">${def.icon || '🏆'}</div>
            <h3 style="margin-bottom: 4px;">${esc(def.label || key)}</h3>
            <p style="color: var(--text-muted); font-size: var(--font-sm); margin-bottom: 12px;">${esc(def.description || '')}</p>
            <p style="font-size: var(--font-sm); margin-bottom: 16px;">
              <span style="color: ${person?.color || 'inherit'}; font-weight: 600;">${esc(person?.name || '?')}</span> —
              ${statusHtml}
            </p>
            <div style="display: flex; gap: 8px; justify-content: center;">
              ${isUnlocked
                ? `<button class="btn btn--sm btn--ghost" id="achPopupRevoke" type="button" style="color: var(--accent-danger, #e53e3e);">Revoke</button>`
                : `<button class="btn btn--sm btn--primary" id="achPopupAward" type="button">Award</button>`}
              <button class="btn btn--sm btn--ghost" id="achPopupClose" type="button">Close</button>
            </div>
          </div>`;

          mount.innerHTML = renderBottomSheet(popupHtml);
          applyDataColors(mount);
          requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

          mount.querySelector('#achPopupAward')?.addEventListener('click', async () => {
            await writeAchievement(pid, key, { unlockedAt: Date.now(), seen: false });
            // Grant point reward if configured
            if (def.reward?.type === 'points' && def.reward.amount > 0) {
              await writeMessage(pid, {
                type: 'bonus', title: `🏅 ${def.label}`, body: `Achievement reward: +${def.reward.amount} pts`,
                amount: def.reward.amount, rewardId: null, entryKey: null,
                seen: true, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system'
              });
            }
            allAchievements = (await readAllAchievements()) || {};
            mount.innerHTML = '';
            render();
          });
          mount.querySelector('#achPopupRevoke')?.addEventListener('click', async () => {
            if (!await showConfirm({ title: `Revoke "${def.label}" from ${person?.name}?`, danger: true })) return;
            await updateData(`achievements/${pid}/${key}`, { revoked: true, revokedAt: Date.now() });
            allAchievements = (await readAllAchievements()) || {};
            mount.innerHTML = '';
            render();
          });
          mount.querySelector('#achPopupClose')?.addEventListener('click', () => { mount.innerHTML = ''; });
          mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
            if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
          });
        };

        let longPressFired = false;
        btn.addEventListener('pointerdown', () => {
          longPressFired = false;
          pressTimer = setTimeout(() => { longPressFired = true; openPopup(); }, 500);
        });
        btn.addEventListener('pointerup', () => {
          clearTimeout(pressTimer);
          if (!longPressFired) openPopup();
        });
        btn.addEventListener('pointerleave', () => { clearTimeout(pressTimer); });
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
      }

      // Add badge button
      main.querySelector('#addAchBtn')?.addEventListener('click', () => {
        openAdminAchSheet('new');
      });

      // Row click to open sheet
      main.querySelector('#badgeList')?.addEventListener('click', e => {
        const row = e.target.closest('[data-ach-key]');
        if (!row) return;
        openAdminAchSheet(row.dataset.achKey);
      });

      main.querySelector('#badgesSearch')?.addEventListener('input', e => {
        badgesSearch = e.target.value;
        render();
        const el = main.querySelector('#badgesSearch');
        if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      });
      main.querySelector('#badgesFilterSortBtn')?.addEventListener('click', openBadgesFilterSheet);

      // Hide/Show toggle for defaults
      for (const btn of main.querySelectorAll('.ach-toggle')) {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.achKey;
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          const def = allDefs[key] || {};
          const newStatus = def.status === 'hidden' ? 'active' : 'hidden';
          await writeAchievementDef(key, { status: newStatus });
          achievementDefsObj = (await readAchievementDefs()) || {};
          render();
        });
      }

      // Delete custom achievements
      for (const btn of main.querySelectorAll('.ach-delete')) {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.achKey;
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          if (!await showConfirm({ title: `Delete "${allDefs[key]?.label || key}"?`, message: 'This cannot be undone.', danger: true })) return;
          await deleteAchievementDef(key);
          // Also remove from all people
          for (const p of peopleArray()) {
            if (allAchievements[p.id]?.[key]) {
              await deleteAchievement(p.id, key);
            }
          }
          achievementDefsObj = (await readAchievementDefs()) || {};
          allAchievements = (await readAllAchievements()) || {};
          render();
        });
      }

    }

    function bindAchievementForm(form) {
      // Emoji picker
      for (const btn of form.querySelectorAll('.emoji-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-btn--selected'));
          btn.classList.add('emoji-btn--selected');
          form.querySelector('#af_customEmoji').value = '';
        });
      }
      form.querySelector('#af_customEmoji')?.addEventListener('input', () => {
        form.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-btn--selected'));
      });

      // Condition type toggle
      for (const btn of form.querySelectorAll('#af_condType .segmented-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('#af_condType .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          form.querySelector('#af_condFields').style.display = btn.dataset.value === 'manual' ? 'none' : '';
        });
      }

      // Stat change — swap threshold input for grade selects
      form.querySelector('#af_stat')?.addEventListener('change', () => {
        const stat = form.querySelector('#af_stat').value;
        const isGrade = ['gradeDay', 'gradeWeek', 'gradeMonth'].includes(stat);
        const isBool = stat === 'firstRedemption';
        const group = form.querySelector('#af_thresholdGroup');
        if (isBool) {
          group.style.display = 'none';
        } else {
          group.style.display = '';
          group.innerHTML = `<label class="form-label">Threshold</label>` + (isGrade
            ? `<select id="af_threshold"><option value="A+">A+</option><option value="A">A</option><option value="B+">B+</option><option value="B">B</option></select>`
            : `<input type="number" id="af_threshold" value="" min="1" placeholder="e.g. 7">`);
        }
      });

      // Reward type toggle
      for (const btn of form.querySelectorAll('#af_rewardType .segmented-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('#af_rewardType .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          form.querySelector('#af_rewardPointsField').style.display = btn.dataset.value === 'points' ? '' : 'none';
          form.querySelector('#af_rewardItemField').style.display = btn.dataset.value === 'reward' ? '' : 'none';
        });
      }

      // Person chips
      for (const chip of form.querySelectorAll('#af_people .chip--selectable')) {
        chip.addEventListener('click', () => chip.classList.toggle('chip--active'));
      }

      // Cancel
      form.querySelector('#af_cancel')?.addEventListener('click', () => {
        closeAdminSheet();
      });

      // Save
      form.querySelector('#af_save')?.addEventListener('click', async () => {
        const name = form.querySelector('#af_name')?.value?.trim();
        if (!name) { await showConfirm({ title: 'Name is required', alert: true }); return; }

        const selectedEmoji = form.querySelector('.emoji-btn--selected')?.dataset?.emoji;
        const customEmoji = form.querySelector('#af_customEmoji')?.value?.trim();
        const icon = customEmoji || selectedEmoji || '🏆';

        const description = form.querySelector('#af_desc')?.value?.trim() || '';
        const conditionType = form.querySelector('#af_condType .segmented-btn--active')?.dataset?.value || 'hybrid';

        let condition = null;
        if (conditionType !== 'manual') {
          const stat = form.querySelector('#af_stat')?.value;
          if (stat) {
            const thresholdEl = form.querySelector('#af_threshold');
            const threshold = thresholdEl?.tagName === 'SELECT' ? thresholdEl.value : (parseInt(thresholdEl?.value) || null);
            if (stat !== 'firstRedemption' && !threshold) { await showConfirm({ title: 'Threshold is required', alert: true }); return; }
            condition = { stat, threshold: stat === 'firstRedemption' ? 1 : threshold };
          }
        }

        let reward = null;
        const rType = form.querySelector('#af_rewardType .segmented-btn--active')?.dataset?.value || 'none';
        if (rType === 'points') {
          reward = { type: 'points', amount: parseInt(form.querySelector('#af_rewardAmount')?.value) || 50 };
        } else if (rType === 'reward') {
          const rid = form.querySelector('#af_rewardId')?.value;
          if (rid) reward = { type: 'reward', rewardId: rid };
        }

        const perPerson = [...form.querySelectorAll('#af_people .chip--active')].map(c => c.dataset.personId);

        const data = {
          label: name,
          icon,
          description,
          conditionType,
          condition,
          reward,
          perPerson: perPerson.length > 0 ? perPerson : null,
          status: 'active'
        };

        const existingKey = form.querySelector('#af_save')?.dataset?.achKey;
        if (existingKey) {
          // Editing existing
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          if (allDefs[existingKey]?.isDefault) data.isDefault = true;
          await writeAchievementDef(existingKey, data);
        } else {
          // New — generate key
          const key = 'custom-' + Date.now();
          await writeAchievementDef(key, data);
        }

        achievementDefsObj = (await readAchievementDefs()) || {};
        closeAdminSheet();
        render();
      });
    }

      ownersContainer?.addEventListener('click', (e) => {
        const chip = e.target.closest('.owner-chip');

        const category = document.getElementById('be_category')?.value;
        const status = document.getElementById('be_status')?.value;

        if (status) changes.status = status;
        if (difficulty) changes.difficulty = difficulty;
        if (timeOfDay) changes.timeOfDay = timeOfDay;
        if (estMinVal !== '' && estMinVal != null) {
          const parsed = parseInt(estMinVal, 10);
          if (!isNaN(parsed)) changes.estMin = parsed;
        }
        if (ownersChanged) {
          changes.owners = Array.from(document.querySelectorAll('#be_owners .owner-chip--selected')).map(b => b.dataset.id);

        if (Object.keys(changes).length === 0) {

        // Disable button during save
        const applyBtn = document.getElementById('bulkEditApply');

          const merged = { ...existing, ...changes };
          await writeTask(id, merged);
          tasksObj[id] = merged;
        }

        // Single schedule rebuild
        const allSched = await readAllSchedule() || {};
        const allComp = await readCompletions() || {};
        const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, { includeToday: true }, catsObj);

        closeBulkEditModal();

        selectedTaskIds.clear();
        render();
        showUndoToast(`Updated ${ids.length} task${ids.length !== 1 ? 's' : ''}`);
      });

    async function handleBulkDelete() {
      const count = selectedTaskIds.size;
      if (!await showConfirm({ title: `Delete ${count} task${count !== 1 ? 's' : ''}?`, message: 'This cannot be undone.', danger: true })) return;

      const ids = [...selectedTaskIds];

      // Remove from local state immediately
      for (const id of ids) {
        delete tasksObj[id];
      }
      selectMode = false;
      selectedTaskIds.clear();
      render();

      // Delete tasks from Firebase
      for (const id of ids) {
        await removeTask(id);
      }

      // Clean up orphaned schedule entries and completions
      try {
        const allSched = await readAllSchedule() || {};
        const allComp = await readCompletions() || {};
        const cleanupUpdates = {};
        const idSet = new Set(ids);
        for (const [dateKey, dayEntries] of Object.entries(allSched)) {
          for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
            if (idSet.has(entry.taskId)) {
              cleanupUpdates[`schedule/${dateKey}/${entryKey}`] = null;
              if (allComp[entryKey]) {
                cleanupUpdates[`completions/${entryKey}`] = null;
              }
            }
          }
        }
        if (Object.keys(cleanupUpdates).length > 0) {
          await multiUpdate(cleanupUpdates);
        }
      } catch (e) {
        console.warn('Tasks deleted but schedule cleanup failed:', e);
      }

      // Rebuild schedule
      const allSched2 = await readAllSchedule() || {};
      const allComp2 = await readCompletions() || {};
      const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp2, allSched2, { includeToday: true }, catsObj);
      await multiUpdate(futureUpdates);

      showUndoToast(`Deleted ${count} task${count !== 1 ? 's' : ''}`);
    }

        await firebase.database().ref(`rundown/balanceAnchors/${pid}`).set({ amount, anchoredAt: firebase.database.ServerValue.TIMESTAMP });

      });

      // Bonus / deduction — open modal with person pre-selected
      main.querySelector('#pf_addBonus')?.addEventListener('click', () => {
        const pid = editingPersonId;
        if (!pid || pid === 'new') return;
        openMsgModal(pid, 'bonus');
      });
      main.querySelector('#pf_addDeduction')?.addEventListener('click', () => {
        const pid = editingPersonId;
        if (!pid || pid === 'new') return;
        openMsgModal(pid, 'deduction');
      });

      // Populate balance display and anchor input from Firebase
      if (editingPersonId && editingPersonId !== 'new') {
        const pid = editingPersonId;
        Promise.all([
          readBalanceAnchor(pid),
          readAllSnapshots(),
          readMultipliers()
        ]).then(([anchor, allSnapshots, multipliers]) => {
          const msgs = allMessagesObj[pid] || {};
          const { balance } = calculateBalance(pid, allSnapshots || {}, msgs, anchor, multipliers || {}, tz);
          const balEl = main.querySelector(`#personBalance_${pid}`);
          if (balEl) balEl.textContent = `${balance} pts`;
          const anchorEl = main.querySelector('#pf_balanceAnchor');
          if (anchorEl) anchorEl.value = anchor?.amount ?? 0;

    // ── Settings tab events ──

    function bindSettingsTab() {

      // ── Scoring validation (wired to Save Scoring button) ──
      function validateDiffMults() {
        const clamp = (raw, fb) => Math.min(10, Math.max(1, parseIntOr(raw, fb)));
        const easy   = clamp(main.querySelector('#sf_diffEasy')?.value, 1);
        const medium = clamp(main.querySelector('#sf_diffMedium')?.value, 2);
        const hard   = clamp(main.querySelector('#sf_diffHard')?.value, 3);
        const invalid = easy >= medium || medium >= hard;
        const errEl  = main.querySelector('#sf_diffError');
        const saveBtn = main.querySelector('#settingsSave_scoring');
        if (errEl)   errEl.hidden = !invalid;
        if (saveBtn) saveBtn.disabled = invalid;
        return !invalid;
      }

      for (const id of ['#sf_diffEasy', '#sf_diffMedium', '#sf_diffHard']) {
        main.querySelector(id)?.addEventListener('input', validateDiffMults);
      }

      // ── Text size — live apply on tap ──
      for (const btn of main.querySelectorAll('#sf_textSize .segmented-btn')) {
        btn.addEventListener('click', () => {
          main.querySelectorAll('#sf_textSize .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          document.documentElement.setAttribute('data-text-size', btn.dataset.size);
        });
      }

      // ── Theme preset — live apply ──
      main.querySelector('#sf_themePreset')?.addEventListener('change', async (e) => {
        const theme = { ...(settings?.theme || {}), preset: e.target.value };
        const updated = { ...settings, theme };
        await writeSettings(updated);
        settings = updated;
        applyTheme(resolveTheme(settings.theme));
      });

      // ── Accent color — live apply ──
      initColorButton(main.querySelector('#sf_accentPicker')?.closest('.cpick-wrap'), async (color) => {
        const theme = { ...(settings?.theme || {}), accent: color };
        applyTheme(resolveTheme(theme));
        const updated = { ...settings, theme };
        await writeSettings(updated);
        settings = updated;
      });

      // ── Weather test ──
      main.querySelector('#sf_weatherTest')?.addEventListener('click', async () => {
        const loc = main.querySelector('#sf_weatherLocation')?.value.trim();
        const key = main.querySelector('#sf_weatherApiKey')?.value.trim();
        const resultEl = main.querySelector('#sf_weatherTestResult');
        if (!loc || !key) {
          resultEl.textContent = '✗ Enter a location and API key first.';
          resultEl.className = 'form-hint form-hint--error';
          resultEl.hidden = false;
          return;
        }
        resultEl.textContent = 'Checking…';
        resultEl.className = 'form-hint';
        resultEl.hidden = false;
        try {
          const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(loc)}&appid=${encodeURIComponent(key)}&units=imperial`
          );
          if (!res.ok) throw new Error(res.status);
          const json = await res.json();
          const temp = Math.round(json.main.temp);
          const cond = json.weather[0].description.replace(/\b\w/g, c => c.toUpperCase());
          resultEl.textContent = `✓ ${json.name} · ${temp}°F · ${cond}`;
          resultEl.className = 'form-hint form-hint--success';
          setTimeout(() => { resultEl.hidden = true; }, 10000);
        } catch (err) {
          resultEl.textContent = "✗ Couldn't fetch — check location and API key.";
          resultEl.className = 'form-hint form-hint--error';
          setTimeout(() => { resultEl.hidden = true; }, 10000);
        }
      });

      // ── Diff reset ──
      main.querySelector('#sf_diffReset')?.addEventListener('click', () => {
        const easyInput = main.querySelector('#sf_diffEasy');
        const mediumInput = main.querySelector('#sf_diffMedium');
        const hardInput = main.querySelector('#sf_diffHard');
        if (easyInput) easyInput.value = 1;
        if (mediumInput) mediumInput.value = 2;
        if (hardInput) hardInput.value = 3;
        validateDiffMults();
      });

      // ── Shared helper: flash save message ──
      function showMsg(id, success, text) {
        const el = main.querySelector(id);
        if (!el) return;
        el.textContent = text;
        el.className = success ? 'admin-msg admin-msg--success mt-sm' : 'admin-msg admin-msg--danger mt-sm';
        setTimeout(() => { el.textContent = ''; el.className = 'admin-msg mt-sm'; }, 2000);
      }

      // ── Save Family ──
      main.querySelector('#settingsSave_family')?.addEventListener('click', async () => {
        const updated = {
          ...settings,

          familyName: main.querySelector('#sf_familyName')?.value.trim() || '',
          timezone:   main.querySelector('#sf_timezone')?.value || settings?.timezone,
        };
        delete updated.sliderMin; delete updated.sliderMax;
        delete updated.longPressMs; delete updated.kidLongPressMs;
        await writeSettings(updated);
        settings = updated;
        document.getElementById('headerMount').innerHTML = renderHeader({
          variant: 'admin', title: 'Admin', subtitle: settings.appName,
        });
        showMsg('#settingsMsg_family', true, 'Family saved!');

      // ── Save Appearance ──
      main.querySelector('#settingsSave_appearance')?.addEventListener('click', async () => {
        const updated = {
          ...settings,
          ambientStrip:    main.querySelector('#set_ambientStrip')?.checked ?? false,
          textSize:        main.querySelector('#sf_textSize .segmented-btn--active')?.dataset.size || 'default',
          showTodIconBoth:   !!main.querySelector('#sf_showTodIconBoth')?.checked,
          showTodIconSingle: !!main.querySelector('#sf_showTodIconSingle')?.checked,
        };
        delete updated.sliderMin; delete updated.sliderMax;
        delete updated.longPressMs; delete updated.kidLongPressMs;
        await writeSettings(updated);
        settings = updated;
        showMsg('#settingsMsg_appearance', true, 'Appearance saved!');
      });

      // ── Save Scoring ──
      main.querySelector('#settingsSave_scoring')?.addEventListener('click', async () => {
        if (!validateDiffMults()) return;
        const clampMult = (raw, fallback) => Math.min(10, Math.max(1, parseIntOr(raw, fallback)));
        const updated = {
          ...settings,
          difficultyMultipliers: {
            easy:   clampMult(main.querySelector('#sf_diffEasy')?.value, 1),
            medium: clampMult(main.querySelector('#sf_diffMedium')?.value, 2),
            hard:   clampMult(main.querySelector('#sf_diffHard')?.value, 3),
          },
          weekendWeightWeekly:  parseFloatOr(main.querySelector('#sf_weekendWeightWeekly')?.value, 1.5),
          weekendWeightMonthly: parseFloatOr(main.querySelector('#sf_weekendWeightMonthly')?.value, 3),
          pastDueCreditPct:     parseIntOr(main.querySelector('#sf_pastDueCredit')?.value, 75),
        };
        delete updated.sliderMin; delete updated.sliderMax;
        delete updated.longPressMs; delete updated.kidLongPressMs;
        await writeSettings(updated);
        settings = updated;
        showMsg('#settingsMsg_scoring', true, 'Scoring saved!');
      });

      // ── Save Calendar ──
      main.querySelector('#settingsSave_calendar')?.addEventListener('click', async () => {
        const updated = {
          ...settings,
          calendarDefaults: {
            defaultView:    main.querySelector('#set_calView')?.value || 'week',
            density:        main.querySelector('#set_calDensity')?.value || 'snug',
            weekStartDay:   parseInt(main.querySelector('#set_weekStart')?.value, 10) || 0,
            showDailyInWeek: main.querySelector('#set_showDaily')?.value !== 'false',
          },
        };
        delete updated.sliderMin; delete updated.sliderMax;
        delete updated.longPressMs; delete updated.kidLongPressMs;
        await writeSettings(updated);
        settings = updated;
        showMsg('#settingsMsg_calendar', true, 'Calendar saved!');
      });

      // ── Save Integrations ──
      main.querySelector('#settingsSave_integrations')?.addEventListener('click', async () => {
        const newLoc = main.querySelector('#sf_weatherLocation')?.value.trim() || '';
        if ((settings?.weatherLocation || '') !== newLoc) clearWeatherCache();
        const updated = {
          ...settings,
          weatherLocation: newLoc,
          weatherApiKey:   main.querySelector('#sf_weatherApiKey')?.value.trim() || '',
        };
        delete updated.sliderMin; delete updated.sliderMax;
        delete updated.longPressMs; delete updated.kidLongPressMs;
        await writeSettings(updated);
        settings = updated;
        showMsg('#settingsMsg_integrations', true, 'Integrations saved!');
      });

      // ── Save Security ──
      main.querySelector('#settingsSave_security')?.addEventListener('click', async () => {
        const newPin = main.querySelector('#sf_newPin')?.value.trim();
        if (newPin && (newPin.length !== 4 || !/^\d{4}$/.test(newPin))) {
          showMsg('#settingsMsg_security', false, 'PIN must be exactly 4 digits.');
          return;
        }
        const updated = { ...settings };
        delete updated.sliderMin; delete updated.sliderMax;
        delete updated.longPressMs; delete updated.kidLongPressMs;
        if (newPin) updated.adminPin = newPin;
        await writeSettings(updated);
        settings = updated;
        if (newPin) { const pinEl = main.querySelector('#sf_newPin'); if (pinEl) pinEl.value = ''; }
        showMsg('#settingsMsg_security', true, newPin ? 'PIN updated!' : 'No changes.');
      });
    }
    // ── Schedule tab events ──

    function bindScheduleTab() {
      loadScheduleStats();

      for (const [btnId, clearPast, label] of [
        ['rebuildScheduleBtn', false, 'Rebuild Schedule'],
        ['resetScheduleBtn', true, 'Clear Past & Rebuild']
      ]) {
        main.querySelector(`#${btnId}`)?.addEventListener('click', async () => {
          const confirmed = await showConfirm({
            title: clearPast ? 'Clear Past & Rebuild Schedule?' : 'Rebuild Schedule?',
            message: clearPast
              ? 'Removes all uncompleted past schedule entries, then regenerates today + 90 future days.'
              : 'Regenerates today + 90 future days based on current task settings.',
            danger: clearPast
          });
          if (!confirmed) return;

          const msgEl = main.querySelector('#scheduleMsg');
          const btn = main.querySelector(`#${btnId}`);
          btn.disabled = true;
          btn.textContent = clearPast ? 'Clearing & Rebuilding...' : 'Rebuilding...';

          try {
            const completions = await readCompletions() || {};
            const existingSchedule = await readAllSchedule() || {};
            const updates = buildScheduleUpdates(tasksObj, peopleArray(), settings, completions, existingSchedule, { includeToday: true, clearPast }, catsObj);
            await multiUpdate(updates);

            await pushDebugEvent({ type: 'schedule_rebuilt', payload: { clearPast, initiator: 'admin' }, timestamp: Date.now() });

            if (msgEl) {
              msgEl.textContent = clearPast ? 'Past cleared & schedule rebuilt!' : 'Schedule rebuilt successfully!';
              msgEl.className = 'admin-msg admin-msg--success mt-sm';
            }
            await loadScheduleStats();
          } catch (err) {
            console.error('Rebuild failed:', err);
            if (msgEl) {
              msgEl.textContent = 'Rebuild failed: ' + err.message;
              msgEl.className = 'admin-msg admin-msg--danger mt-sm';
            }
          }

          btn.disabled = false;
          btn.textContent = label;
        });
      }
    }

    // ── Data tab events ──

    function bindDataTab() {
      // Auto-prune save
      main.querySelector('#autoPruneSave')?.addEventListener('click', async () => {
        const months = parseInt(main.querySelector('#set_autoPruneMonths')?.value || '0', 10);
        const updated = { ...settings, autoPruneMonths: months };
        await writeSettings(updated);
        settings = updated;
        const msgEl = main.querySelector('#autoPruneMsg');
        if (msgEl) {
          msgEl.textContent = 'Saved!';
          msgEl.className = 'admin-msg admin-msg--success mt-sm';
          setTimeout(() => { msgEl.textContent = ''; msgEl.className = 'admin-msg mt-sm'; }, 2000);
        }
      });

      main.querySelector('#exportDataBtn')?.addEventListener('click', async () => {
        const allData = await readOnce('');
        const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `daily-rundown-export-${today}.json`;
        a.click();
        URL.revokeObjectURL(url);
      });

      // Import data
      main.querySelector('#importDataInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const statusEl = main.querySelector('#importStatus');
        statusEl.innerHTML = '<span class="text-muted">Reading file...</span>';

        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!data || typeof data !== 'object') throw new Error('Invalid JSON structure');

          // Validate it looks like a rundown export
          const hasKnownKeys = ['settings', 'people', 'tasks', 'categories', 'schedule'].some(k => k in data);
          if (!hasKnownKeys) throw new Error('File does not appear to be a Daily Rundown export');

          if (!await showConfirm({ title: 'Overwrite all data?', message: 'This will replace everything with the imported backup.', confirmLabel: 'Overwrite', danger: true })) {
            statusEl.innerHTML = '';
            return;
          }

          statusEl.innerHTML = '<span class="text-muted">Importing...</span>';

          // Write the entire data object under rundown/
          const updates = {};
          for (const [key, value] of Object.entries(data)) {
            updates[key] = value;
          }
          await multiUpdate(updates);

          // Reload local state
          const [newSettings, newPeople, newTasks, newCats] = await Promise.all([
            readSettings(), readPeople(), readTasks(), readCategories()
          ]);
          Object.assign(settings, newSettings || {});
          peopleObj = newPeople || {};
          tasksObj = newTasks || {};
          catsObj = newCats || {};

          statusEl.innerHTML = '<span class="admin-msg admin-msg--success">Import complete! Data restored.</span>';
          setTimeout(() => { statusEl.innerHTML = ''; render(); }, 2000);
        } catch (err) {
          statusEl.innerHTML = `<span class="admin-msg admin-msg--danger">Import failed: ${esc(err.message)}</span>`;
        }
      });

      // Scoreboard reset
      main.querySelector('#showScoreResetBtn')?.addEventListener('click', () => {
        main.querySelector('#scoreResetSection').style.display = 'none';
        main.querySelector('#scoreResetConfirm').style.display = '';
      });
      main.querySelector('#scoreResetCancel')?.addEventListener('click', () => {
        main.querySelector('#scoreResetConfirm').style.display = 'none';
        main.querySelector('#scoreResetSection').style.display = '';
      });
      const scoreResetWord = main.querySelector('#scoreResetWord');
      const scoreResetBtn = main.querySelector('#scoreResetConfirmBtn');
      if (scoreResetWord && scoreResetBtn) {
        scoreResetWord.addEventListener('input', () => {
          scoreResetBtn.disabled = scoreResetWord.value.trim() !== 'RESET';
        });
        scoreResetBtn.addEventListener('click', async () => {
          scoreResetBtn.disabled = true;
          scoreResetBtn.textContent = 'Clearing...';
          const updates = {
            'snapshots': null,
            'streaks': null,
            'completions': null
          };
          // Reset all balance anchors so stale earnings don't persist
          const now = Date.now();
          for (const pid of Object.keys(peopleObj)) {
            updates[`balanceAnchors/${pid}`] = { amount: 0, anchoredAt: now };
            updates[`messages/${pid}`] = null;
            updates[`bank/${pid}`] = null;
          }
          await multiUpdate(updates);
          scoreResetBtn.textContent = 'Done!';
          setTimeout(() => {
            main.querySelector('#scoreResetConfirm').style.display = 'none';
            main.querySelector('#scoreResetSection').style.display = '';
          }, 1500);
        });
      }

      // Factory reset
      main.querySelector('#showResetBtn')?.addEventListener('click', () => {
        main.querySelector('#resetSection').style.display = 'none';
        main.querySelector('#resetConfirm').style.display = '';
      });

      main.querySelector('#resetCancel')?.addEventListener('click', () => {
        main.querySelector('#resetConfirm').style.display = 'none';
        main.querySelector('#resetSection').style.display = '';
      });

      const resetWord = main.querySelector('#resetWord');
      const resetBtn = main.querySelector('#resetConfirmBtn');
      if (resetWord && resetBtn) {
        resetWord.addEventListener('input', () => {
          resetBtn.disabled = resetWord.value.trim() !== 'FACTORY RESET';
        });

        resetBtn.addEventListener('click', async () => {
          resetBtn.disabled = true;
          resetBtn.textContent = 'Deleting...';
          await factoryReset();
          localStorage.removeItem('dr-theme');
          localStorage.removeItem('dr-debug');
          window.location.href = 'setup.html';
        });
      }
    }

          setTimeout(() => {
            if (src === 'camera') main.querySelector(btnIds.camera)?.click();
            else if (src === 'gallery') main.querySelector(btnIds.gallery)?.click();
            else main.querySelector(btnIds.files)?.click();
          }, 320);
        });
      });
    }

    let adminPhotoContext = '';

    function bindAiImportsTab() {
      if (!KITCHEN_WORKER_URL) return;

      // ── School Lunch ──
      const onSchoolLunch = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const statusEl = main.querySelector('#schoolLunchStatus');
        if (statusEl) statusEl.innerHTML = `<div class="ai-loading"><div class="ai-loading__spinner"></div>Parsing lunch menu…</div>`;
        try {
          const { base64, mediaType } = await resizeImageForUpload(file);
          const resp = await fetch(KITCHEN_WORKER_URL, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'schoolLunch', input: { base64, mediaType, context: adminPhotoContext } }),
          });
          const data = await resp.json();
          if (data.error || !data.days?.length) {
            if (statusEl) statusEl.innerHTML = `
              <p style="color:var(--text-muted);font-size:var(--font-sm)">No lunch items found — try a clearer photo or PDF.</p>
              <button class="btn btn--secondary btn--sm" id="slRetry" style="margin-top:var(--spacing-sm)">Try again</button>`;
            statusEl?.querySelector('#slRetry')?.addEventListener('click', () => { statusEl.innerHTML = ''; });
            return;
          }
          if (data.monthUncertain) {
            openMonthClarificationSheet(data.assumedMonth, (yearMonth) => {
              const remapped = data.days.map(d => d.date && /^\d{4}-\d{2}-\d{2}$/.test(d.date)
                ? { ...d, date: `${yearMonth}-${d.date.slice(8, 10)}` }
                : d);
              renderSchoolLunchConfirm(remapped, statusEl);
            });
          } else {
            renderSchoolLunchConfirm(data.days, statusEl);
          }
        } catch (err) {
          if (statusEl) statusEl.innerHTML = `
            <p style="color:var(--text-muted);font-size:var(--font-sm)">Something went wrong.</p>
            <p style="color:var(--text-muted);font-size:var(--font-xs)">${esc(err?.message) || 'Check your connection.'}</p>
            <button class="btn btn--secondary btn--sm" id="slRetry" style="margin-top:var(--spacing-sm)">Try again</button>`;
          statusEl?.querySelector('#slRetry')?.addEventListener('click', () => { statusEl.innerHTML = ''; });
        }
        e.target.value = '';
      };
      main.querySelector('#slPhotoBtn')?.addEventListener('click', () =>
        openAdminPhotoSource({ camera: '#slCamera', gallery: '#slGallery', files: '#slFiles' }, 'Import from'));
      main.querySelector('#slCamera')?.addEventListener('change', onSchoolLunch);
      main.querySelector('#slGallery')?.addEventListener('change', onSchoolLunch);
      main.querySelector('#slFiles')?.addEventListener('change', onSchoolLunch);

      main.querySelector('#clearSchoolLunchBtn')?.addEventListener('click', async () => {
        const btn = main.querySelector('#clearSchoolLunchBtn');
        btn.disabled = true;
        btn.textContent = 'Clearing…';
        try {
          const db = firebase.database();
          const snap = await db.ref('rundown/kitchen/plan').once('value');
          const plan = snap.val() || {};
          const dels = [];
          for (const [date, slots] of Object.entries(plan)) {
            if (slots?.['school-lunch'])   dels.push(db.ref(`rundown/kitchen/plan/${date}/school-lunch`).remove());
            if (slots?.['school-lunch-2']) dels.push(db.ref(`rundown/kitchen/plan/${date}/school-lunch-2`).remove());
          }
          await Promise.all(dels);
          const statusEl = main.querySelector('#schoolLunchStatus');
          if (statusEl) statusEl.innerHTML = `<p style="color:var(--text-muted);font-size:var(--font-sm)">Cleared ${dels.length} school lunch entries.</p>`;
        } catch {
          const statusEl = main.querySelector('#schoolLunchStatus');
          if (statusEl) statusEl.innerHTML = `<p style="color:var(--danger)">Error clearing lunches.</p>`;
        }
        btn.disabled = false;
        btn.textContent = 'Clear all school lunches';
      });

      // ── Task Scanner ──
      const onTaskScan = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const statusEl = main.querySelector('#taskScanStatus');
        if (statusEl) statusEl.innerHTML = `<div class="ai-loading"><div class="ai-loading__spinner"></div>Scanning document…</div>`;
        try {
          const { base64, mediaType } = await resizeImageForUpload(file);
          const resp = await fetch(KITCHEN_WORKER_URL, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'taskScan', input: { base64, mediaType, contextDate: todayKey(settings?.timezone || 'America/Chicago'), context: adminPhotoContext } }),
          });
          const data = await resp.json();
          if (data.error || !data.tasks?.length) {
            if (statusEl) statusEl.innerHTML = `
              <p style="color:var(--text-muted);font-size:var(--font-sm)">No tasks found — try a clearer photo.</p>
              <button class="btn btn--secondary btn--sm" id="hwRetry" style="margin-top:var(--spacing-sm)">Try again</button>`;
            statusEl?.querySelector('#hwRetry')?.addEventListener('click', () => { statusEl.innerHTML = ''; });
            return;
          }
          renderTaskScanConfirm(data.tasks, statusEl, data.hasUncertainDates);
        } catch (err) {
          if (statusEl) statusEl.innerHTML = `
            <p style="color:var(--text-muted);font-size:var(--font-sm)">Something went wrong.</p>
            <p style="color:var(--text-muted);font-size:var(--font-xs)">${esc(err?.message) || 'Check your connection.'}</p>
            <button class="btn btn--secondary btn--sm" id="hwRetry" style="margin-top:var(--spacing-sm)">Try again</button>`;
          statusEl?.querySelector('#hwRetry')?.addEventListener('click', () => { statusEl.innerHTML = ''; });
        }
        e.target.value = '';
      };
      main.querySelector('#tsPhotoBtn')?.addEventListener('click', () =>
        openAdminPhotoSource({ camera: '#tsCamera', gallery: '#tsGallery', files: '#tsFiles' }, 'Import from'));
      main.querySelector('#tsCamera')?.addEventListener('change', onTaskScan);
      main.querySelector('#tsGallery')?.addEventListener('change', onTaskScan);
      main.querySelector('#tsFiles')?.addEventListener('change', onTaskScan);

      // ── Email Imports ──
      loadEmailImports();
      main.querySelector('#emailImportsRefresh')?.addEventListener('click', loadEmailImports);
    }

    function renderSchoolLunchConfirm(days, statusEl) {
      if (!statusEl) return;

      const formatLunchDate = (d) => {
        if (!d) return d;
        const [y, m, day] = d.split('-');
        return new Date(+y, +m - 1, +day).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      };

      const enriched = days.map((d, i) => ({
        ...d,
        _label: formatLunchDate(d.date),
        _sub: d.lunch2 ? `${d.lunch1} · ${d.lunch2}` : d.lunch1,
      }));

      const rows = enriched.map((d, i) => renderConfirmRow(d, {
        labelKey: '_label',
        subKey: '_sub',
        confidenceKey: 'confidence',
        key: i,
      })).join('');

      statusEl.innerHTML = `
        <div class="confirm-list" id="slItems">${rows}</div>
        <div class="admin-form__actions mt-md">
          <button class="btn btn--secondary btn--sm" id="slCancel">Cancel</button>
          <button class="btn btn--primary btn--sm" id="slSave">Import ${days.length} day${days.length !== 1 ? 's' : ''}</button>
        </div>`;

      const list = statusEl.querySelector('#slItems');
      const saveBtn = statusEl.querySelector('#slSave');

      function updateBtn() {
        const n = list.querySelectorAll('.confirm-row:not(.is-deselected)').length;
        saveBtn.textContent = `Import ${n} day${n !== 1 ? 's' : ''}`;
        saveBtn.disabled = n === 0;
      }

      list.addEventListener('click', (e) => {
        const row = e.target.closest('.confirm-row');
        if (!row) return;
        row.classList.toggle('is-deselected');
        updateBtn();
      });

      statusEl.querySelector('#slCancel')?.addEventListener('click', () => { statusEl.innerHTML = ''; });

      saveBtn.addEventListener('click', async () => {
        const selected = [...list.querySelectorAll('.confirm-row:not(.is-deselected)')]
          .map(row => days[+row.dataset.key]);
        if (!selected.length) { statusEl.innerHTML = ''; return; }
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        try {
          const db = firebase.database();
          for (const d of selected) {
            await db.ref(`rundown/kitchen/plan/${d.date}/school-lunch`).set({ mealName: d.lunch1, source: 'school' });
            if (d.lunch2) await db.ref(`rundown/kitchen/plan/${d.date}/school-lunch-2`).set({ mealName: d.lunch2, source: 'school' });
          }
          statusEl.innerHTML = `<span style="color:var(--success);font-size:var(--font-sm)">${selected.length} day${selected.length !== 1 ? 's' : ''} imported.</span>`;
        } catch (err) {
          saveBtn.disabled = false;
          saveBtn.textContent = `Import ${selected.length} day${selected.length !== 1 ? 's' : ''}`;
        }
      });
    }

    function renderTaskScanConfirm(tasks, statusEl, hasUncertainDates) {
      if (!statusEl) return;

      const formatDueDate = (d) => {
        if (!d) return null;
        const [y, m, day] = d.split('-');
        return new Date(+y, +m - 1, +day).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      };

      const uncertainBanner = hasUncertainDates
        ? `<p style="font-size:var(--font-sm);color:var(--warning);margin-bottom:var(--spacing-sm)">Some dates were unclear — review before importing.</p>`
        : '';

      const rowsHtml = tasks.map((t, i) => {
        const sub = t.dueDate ? `Due ${formatDueDate(t.dueDate)}${t.notes ? ' · ' + t.notes : ''}` : null;
        const row = renderConfirmRow(
          { ...t, _sub: sub },
          { labelKey: 'name', subKey: '_sub', confidenceKey: 'confidence', key: i }
        );
        const dateInput = !t.dueDate
          ? `<div class="hw-date-wrap" data-idx="${i}" style="padding:0 var(--spacing-md) var(--spacing-xs)">
               <label style="font-size:var(--font-xs);color:var(--text-muted)">Due date (optional)</label>
               <input type="date" class="field__input hw-date" data-idx="${i}" style="margin-top:4px">
             </div>`
          : '';
        return row + dateInput;
      }).join('');

      statusEl.innerHTML = `
        ${uncertainBanner}
        <div class="confirm-list" id="hwItems">${rowsHtml}</div>
        <div class="admin-form__actions mt-md">
          <button class="btn btn--secondary btn--sm" id="hwCancel">Cancel</button>
          <button class="btn btn--primary btn--sm" id="hwSave">Add ${tasks.length} task${tasks.length !== 1 ? 's' : ''}</button>
        </div>`;

      const list = statusEl.querySelector('#hwItems');
      const saveBtn = statusEl.querySelector('#hwSave');

      function updateBtn() {
        const n = list.querySelectorAll('.confirm-row:not(.is-deselected)').length;
        saveBtn.textContent = `Add ${n} task${n !== 1 ? 's' : ''}`;
        saveBtn.disabled = n === 0;
      }

      list.addEventListener('click', (e) => {
        const row = e.target.closest('.confirm-row');
        if (!row) return;
        if (e.target.closest('.hw-date-wrap')) return;
        const idx = row.dataset.key;
        row.classList.toggle('is-deselected');
        const dateWrap = list.querySelector(`.hw-date-wrap[data-idx="${idx}"]`);
        if (dateWrap) dateWrap.style.display = row.classList.contains('is-deselected') ? 'none' : 'block';
        updateBtn();
      });

      list.querySelectorAll('.hw-date-wrap').forEach(wrap => { wrap.style.display = 'block'; });

      statusEl.querySelector('#hwCancel')?.addEventListener('click', () => { statusEl.innerHTML = ''; });

      saveBtn.addEventListener('click', async () => {
        const selected = [...list.querySelectorAll('.confirm-row:not(.is-deselected)')]
          .map(row => {
            const t = tasks[+row.dataset.key];
            if (!t) return null;
            if (!t.dueDate) {
              const dateEl = list.querySelector(`.hw-date[data-idx="${row.dataset.key}"]`);
              return { ...t, dueDate: dateEl?.value || null };
            }
            return t;
          })
          .filter(Boolean)
          .filter(t => t.dueDate);
        if (!selected.length) { statusEl.innerHTML = ''; return; }
        saveBtn.disabled = true; saveBtn.textContent = 'Adding…';
        try {
          const tz = settings?.timezone || 'America/Chicago';
          let counter = 0;
          for (const t of selected) {
            const firstPersonId = Object.keys(peopleObj)[0] || null;
            const taskData = {
              name: t.name, rotation: 'once', owners: firstPersonId ? [firstPersonId] : [],
              ownerAssignmentMode: 'fixed', timeOfDay: 'anytime',
              dedicatedDate: t.dueDate, estMin: 30, difficulty: 'medium',
              category: 'general', status: 'active',
              createdDate: todayKey(tz), notes: t.notes || null, exempt: false,
            };
            const taskId = await pushTask(taskData);
            if (taskData.owners[0]) {
              const schedKey = `sched_${Date.now()}_hw_${counter++}`;
              await multiUpdate({ [`schedule/${t.dueDate}/${schedKey}`]: {
                taskId, ownerId: taskData.owners[0], rotationType: 'once',
                ownerAssignmentMode: 'fixed', timeOfDay: 'anytime',
              }});
            }
          }
          statusEl.innerHTML = `<span style="color:var(--success);font-size:var(--font-sm)">${selected.length} task${selected.length !== 1 ? 's' : ''} added.</span>`;
        } catch (err) {
          saveBtn.disabled = false;
          saveBtn.textContent = `Add ${selected.length} task${selected.length !== 1 ? 's' : ''}`;
        }
      });
    }

    function formatRelativeTime(epochMs) {
      const diff = Date.now() - epochMs;
      const mins = Math.floor(diff / 60000);
      if (mins < 2) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days === 1) return 'Yesterday';
      if (days < 7) return `${days}d ago`;
      return new Date(epochMs).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function parseSenderName(from) {
      if (!from) return '?';
      const m = from.match(/^([^<]+)</);
      return m ? m[1].trim() : from.replace(/<[^>]+>/, '').trim() || from;
    }

    async function loadEmailImports() {
      const listEl = main.querySelector('#emailImportsList');
      if (!listEl) return;

      listEl.innerHTML = `<div class="ai-loading"><div class="ai-loading__spinner"></div>Loading email imports…</div>`;

      try {
        const db = firebase.database();
        const snap = await db.ref('rundown/emailImports').orderByChild('processed').equalTo(false).once('value');
        const imports = snap.val();

        if (!imports) {
          listEl.innerHTML = `<p style="color:var(--text-muted);font-size:var(--font-sm)">No pending imports.</p>`;
          return;
        }

        const entries = Object.entries(imports).sort((a, b) => (b[1].receivedAt || 0) - (a[1].receivedAt || 0));
        listEl.innerHTML = '';

        for (const [emailId, entry] of entries) {
          const events = entry.events || [];
          const senderName = parseSenderName(entry.from);
          const timestamp = entry.receivedAt ? formatRelativeTime(entry.receivedAt) : '';

          let eventsHtml;
          if (!events.length) {
            eventsHtml = `<p style="color:var(--text-muted);font-size:var(--font-sm)">No events found.</p>`;
          } else {
            eventsHtml = events.map((ev, i) => {
              const datePart = ev.date
                ? new Date(...ev.date.split('-').map((v, j) => j === 1 ? +v - 1 : +v)).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
                : null;
              const timePart = ev.time ? ` · ${ev.time}` : (ev.allDay ? ' · All day' : '');
              const sub = datePart ? `${datePart}${timePart}` : null;
              const row = renderConfirmRow(
                { ...ev, _sub: sub },
                { labelKey: 'name', subKey: '_sub', confidenceKey: 'confidence', key: i }
              );
              const dateInput = !ev.date
                ? `<div class="em-date-wrap" data-idx="${i}" style="padding:0 var(--spacing-md) var(--spacing-xs)">
                     <label style="font-size:var(--font-xs);color:var(--warning)">Date unknown — tap to set</label>
                     <input type="date" class="field__input em-date" data-idx="${i}" style="margin-top:4px">
                   </div>`
                : '';
              return row + dateInput;
            }).join('');
          }

          const card = document.createElement('div');
          card.className = 'admin-form__section';
          card.style.cssText = 'border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--spacing-md);margin-bottom:var(--spacing-md)';
          card.dataset.emailId = emailId;
          card.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">
              <span style="font-size:var(--font-sm);font-weight:600">${esc(senderName)}</span>
              <span style="font-size:var(--font-xs);color:var(--text-muted)">${esc(timestamp)}</span>
            </div>
            <div style="font-size:var(--font-sm);color:var(--text-muted);margin-bottom:var(--spacing-sm)">${esc(entry.subject || '(no subject)')}</div>
            <div class="confirm-list em-events">${eventsHtml}</div>
            <div class="admin-form__actions mt-sm">
              <button class="btn btn--secondary btn--sm em-dismiss">Dismiss</button>
              ${events.length ? `<button class="btn btn--primary btn--sm em-import">Import ${events.length} event${events.length !== 1 ? 's' : ''}</button>` : ''}
            </div>
            <div class="em-status" style="font-size:var(--font-sm);margin-top:var(--spacing-xs)"></div>`;

          listEl.appendChild(card);

          if (events.length) {
            const evList = card.querySelector('.em-events');
            const importBtn = card.querySelector('.em-import');

            const updateImportBtn = () => {
              const n = evList.querySelectorAll('.confirm-row:not(.is-deselected)').length;
              importBtn.textContent = `Import ${n} event${n !== 1 ? 's' : ''}`;
              importBtn.disabled = n === 0;
            };

            evList.addEventListener('click', (e) => {
              if (e.target.closest('.em-date-wrap')) return;
              const row = e.target.closest('.confirm-row');
              if (!row) return;
              row.classList.toggle('is-deselected');
              updateImportBtn();
            });

            importBtn.addEventListener('click', async () => {
              const selected = [...evList.querySelectorAll('.confirm-row:not(.is-deselected)')]
                .map(row => {
                  const ev = events[+row.dataset.key];
                  if (!ev) return null;
                  if (!ev.date) {
                    const dateEl = evList.querySelector(`.em-date[data-idx="${row.dataset.key}"]`);
                    return { ...ev, date: dateEl?.value || null };
                  }
                  return ev;
                })
                .filter(Boolean)
                .filter(ev => ev.date);

              if (!selected.length) return;
              importBtn.disabled = true; importBtn.textContent = 'Adding…';

              try {
                let counter = 0;
                for (const ev of selected) {
                  const newId = await pushEvent({
                    name: ev.name, date: ev.date, allDay: ev.allDay ?? true,
                    startTime: ev.time || null, endTime: null,
                    color: Object.values(peopleObj)[0]?.color || '#4285f4',
                    people: [], notes: ev.notes || null, url: null,
                  });
                  const schedKey = `sched_${Date.now()}_em_${counter++}`;
                  await multiUpdate({ [`schedule/${ev.date}/${schedKey}`]: { type: 'event', eventId: newId } });
                }

                await db.ref(`rundown/emailImports/${emailId}/processed`).set(true);
                const statusEl = card.querySelector('.em-status');
                if (statusEl) statusEl.innerHTML = `<span style="color:var(--success)">${selected.length} event${selected.length !== 1 ? 's' : ''} added.</span>`;
                showToast(`${selected.length} event${selected.length !== 1 ? 's' : ''} added to schedule`);
                setTimeout(() => {
                  card.style.opacity = '0';
                  card.style.transition = 'opacity 0.3s';
                  setTimeout(() => card.remove(), 300);
                }, 1500);
              } catch (err) {
                importBtn.disabled = false;
                importBtn.textContent = `Import ${selected.length} event${selected.length !== 1 ? 's' : ''}`;
              }
            });
          }

          card.querySelector('.em-dismiss').addEventListener('click', async () => {
            try {
              await db.ref(`rundown/emailImports/${emailId}/processed`).set(true);
            } catch (err) { /* ignore — dismiss visually; write will retry on reconnect */ }
            card.style.opacity = '0';
            card.style.transition = 'opacity 0.3s';
            setTimeout(() => {
              card.remove();
              if (!listEl.querySelector('[data-email-id]')) {
                listEl.innerHTML = `<p style="color:var(--text-muted);font-size:var(--font-sm)">No pending imports.</p>`;
              }
            }, 300);
          });
        }
      } catch (err) {
        listEl.innerHTML = `
          <p style="color:var(--text-muted);font-size:var(--font-sm)">Couldn't load imports.</p>
          <p style="color:var(--text-muted);font-size:var(--font-xs)">${esc(err?.message) || ''}</p>
          <button class="btn btn--secondary btn--sm" id="emRetry" style="margin-top:var(--spacing-sm)">Retry</button>`;
        listEl.querySelector('#emRetry')?.addEventListener('click', loadEmailImports);
      }
    }

    // ── Initial render if PIN session was cached or bypass applies ──
    if (pinSessionValid || isAdminBypass) {
      render();
    }
  </script>
</body>
</html>
