    function openActivityFormSheet(id) {
      const mount = document.getElementById('taskSheetMount');
      const existing = id ? (activitiesObj[id] || null) : null;
      const mode = id ? 'edit' : 'create';
      mount.innerHTML = renderBottomSheet(renderActivityForm({ existing, mode, people: peopleObj }));

      // Apply person chip colors
      mount.querySelectorAll('.ef2-person-chip[data-person-color]').forEach(chip => {
        chip.style.setProperty('--chip-color', chip.dataset.personColor);
      });

      requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));

      bindChipPicker({ pickerId: 'actFormGoalPeriod', hiddenId: 'actFormGoalPeriodValue' });

      // Compact emoji picker (mirrors reward form pattern)
      {
        const emojiReveal = mount.querySelector('#af_emojiReveal');
        mount.querySelector('#af_emojiBtnPreview')?.addEventListener('click', () => {
          emojiReveal?.classList.toggle('is-open');
        });
        for (const cell of mount.querySelectorAll('#af_emojiPicker .rf-emoji-cell')) {
          cell.addEventListener('click', () => {
            mount.querySelectorAll('#af_emojiPicker .rf-emoji-cell').forEach(c => c.classList.remove('is-selected'));
            cell.classList.add('is-selected');
            const picked = cell.dataset.emoji;
            mount.querySelector('#af_emojiBtnPreview').textContent = picked;
            const hiddenEmoji = document.getElementById('actFormEmoji');
            if (hiddenEmoji) hiddenEmoji.value = picked;
            mount.querySelector('#af_customEmoji').value = '';
            emojiReveal?.classList.remove('is-open');
            setTimeout(syncActivitySaveState, 0);
          });
        }
        mount.querySelector('#af_customEmoji')?.addEventListener('input', e => {
          const v = e.target.value.trim();
          if (v) {
            mount.querySelector('#af_emojiBtnPreview').textContent = v;
            const hiddenEmoji = document.getElementById('actFormEmoji');
            if (hiddenEmoji) hiddenEmoji.value = v;
            mount.querySelectorAll('#af_emojiPicker .rf-emoji-cell').forEach(c => c.classList.remove('is-selected'));
            setTimeout(syncActivitySaveState, 0);
          }
        });
      }

      const close = () => closeAdminSheet();
      mount.querySelector('#actFormClose')?.addEventListener('click', close);
      mount.querySelector('#actFormCancel')?.addEventListener('click', close);
      document.getElementById('bottomSheet')?.addEventListener('click', e => {
        if (e.target.id === 'bottomSheet') close();
      });

      // --- Validation -------------------------------------------------------

      function validateActivityForm() {
        const name = document.getElementById('actFormName')?.value.trim() || '';
        const emoji = document.getElementById('actFormEmoji')?.value.trim() || '';
        const period = document.getElementById('actFormGoalPeriodValue')?.value || '';
        const mins = parseInt(document.getElementById('actFormGoalMinutes')?.value, 10);
        const pts = parseInt(document.getElementById('actFormPointsAtGoal')?.value, 10);
        const assigned = Array.from(
          document.querySelectorAll('#actFormAssignedTo .ef2-person-chip[data-state="primary"]')
        ).map(b => b.dataset.personId).filter(Boolean);
        const maxMins = period === 'weekly' ? 10080 : 1440;
        return (
          name.length > 0 && name.length <= 50 &&
          emoji.length > 0 &&
          (period === 'daily' || period === 'weekly') &&
          Number.isInteger(mins) && mins >= 1 && mins <= maxMins &&
          Number.isInteger(pts) && pts >= 0 && pts <= 1000 &&
          assigned.length >= 1
        );
      }

      function syncActivitySaveState() {
        const ok = validateActivityForm();
        const footer = document.getElementById('actFormSaveFooter');
        const header = document.getElementById('actFormSaveHeader');
        if (footer) footer.disabled = !ok;
        if (header) {
          if (ok) header.removeAttribute('disabled');
          else header.setAttribute('disabled', '');
        }
      }

      // Initial sync вАФ fixes Task 6 reviewer's note: header save starts enabled in create mode
      syncActivitySaveState();

      // Wire all validation triggers
      ['actFormName', 'actFormEmoji', 'actFormGoalPeriodValue', 'actFormGoalMinutes', 'actFormPointsAtGoal'].forEach(elId => {
        const el = document.getElementById(elId);
        el?.addEventListener('input', syncActivitySaveState);
        el?.addEventListener('change', syncActivitySaveState);
      });
      // Person chip clicks вАФ toggle primary вЖФ unselected, then re-validate
      document.getElementById('actFormAssignedTo')?.addEventListener('click', e => {
        const chip = e.target.closest('.ef2-person-chip');
        if (!chip) return;
        chip.dataset.state = chip.dataset.state === 'primary' ? '' : 'primary';
        setTimeout(syncActivitySaveState, 0);
      });
      // Goal period chip picker mutates hidden input on click
      document.getElementById('actFormGoalPeriod')?.addEventListener('click', () => setTimeout(syncActivitySaveState, 0));
      // Emoji picker cells
      document.getElementById('actFormEmojiPicker')?.addEventListener('click', () => setTimeout(syncActivitySaveState, 0));

      // --- Save -------------------------------------------------------------

      async function saveActivity() {
        if (!validateActivityForm()) return;
        const name = document.getElementById('actFormName').value.trim();
        const emoji = document.getElementById('actFormEmoji').value.trim();
        const period = document.getElementById('actFormGoalPeriodValue').value;
        const mins = parseInt(document.getElementById('actFormGoalMinutes').value, 10);
        const pts = parseInt(document.getElementById('actFormPointsAtGoal').value, 10);
        const active = document.getElementById('actFormActive').checked;
        const assignedIds = Array.from(
          document.querySelectorAll('#actFormAssignedTo .ef2-person-chip[data-state="primary"]')
        ).map(b => b.dataset.personId).filter(Boolean);

        const data = {
          name, emoji,
          goalPeriod: period,
          goalMinutes: mins,
          pointsAtGoal: pts,
          active,
          assignedTo: Object.fromEntries(assignedIds.map(pid => [pid, true]))
        };

        if (id) {
          // Invalidate current-period earnings when goal-affecting fields change
          const old = existing || {};
          const goalAffectingChanged =
            old.goalPeriod !== data.goalPeriod ||
            old.goalMinutes !== data.goalMinutes ||
            old.pointsAtGoal !== data.pointsAtGoal;
          if (goalAffectingChanged) {
            // A12: period keys in the FAMILY timezone вАФ UTC keys invalidated
            // the wrong day/week near midnight (same class as activities AC2).
            const tzInv = settings?.timezone || 'America/Chicago';
            const todayInv = todayKey(tzInv);
            let currentKey;
            if (data.goalPeriod === 'weekly') {
              const d = new Date(`${todayInv}T12:00:00Z`);
              d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
              const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
              const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
              currentKey = `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
            } else {
              currentKey = todayInv;
            }
            for (const pid of assignedIds) {
              await removeActivityEarning(pid, id, currentKey);
            }
          }
          await updateActivity(id, data);
        } else {
          data.createdBy = 'admin';
          await pushActivity(data);
        }

        close();
        activitiesObj = (await readActivities()) || {};
        render();
      }

      const actFooterBtn = mount.querySelector('#actFormSaveFooter');
      const actHeaderBtn = mount.querySelector('#actFormSaveHeader');
      actFooterBtn?.addEventListener('click', () => withButtonLock(actFooterBtn, saveActivity));
      actHeaderBtn?.addEventListener('click', () => withButtonLock(actHeaderBtn, saveActivity));

      // --- Delete (edit mode only) ------------------------------------------

      if (mode === 'edit') {
        mount.querySelector('#actFormDelete')?.addEventListener('click', async () => {
          const allSessions = (await readActivitySessions()) || {};
          const sessionsForThis = Object.entries(allSessions).filter(([, s]) => s.activityId === id);

          if (sessionsForThis.length === 0) {
            // No history вАФ simple confirm then hard delete
            const ok = await showConfirm({ title: 'Delete this activity?', danger: true });
            if (!ok) return;
            await removeActivity(id);
          } else {
            // Has history вАФ offer to mark inactive first
            const inactiveOk = await showConfirm({
              title: 'Activity has session history',
              message: `This activity has ${sessionsForThis.length} logged session(s). Mark it inactive to keep history, or delete permanently.`,
              confirmLabel: 'Mark Inactive',
              cancelLabel: 'Delete Permanently',
            });
            if (inactiveOk) {
              await updateActivity(id, { active: false });
              close();
              activitiesObj = (await readActivities()) || {};
              render();
              return;
            }
            // Destructive path вАФ typed confirmation
            const result = await showConfirm({
              title: 'Delete permanently?',
              message: `This will delete the activity AND all ${sessionsForThis.length} session(s). This cannot be undone.`,
              confirmLabel: 'Delete',
              cancelLabel: 'Cancel',
              danger: true,
              inputPlaceholder: `Type "${existing?.name || ''}" to confirm`,
            });
            if (!result || !result.confirmed) return;
            if (result.value !== (existing?.name || '')) return;
            // Delete activity, all sessions, and all earnings
            await removeActivity(id);
            for (const [sid] of sessionsForThis) {
              await removeActivitySession(sid);
            }
            const allEarnings = (await readAllActivityEarnings()) || {};
            for (const [pid, perPerson] of Object.entries(allEarnings)) {
              if (perPerson[id]) {
                await removeActivityEarningsForActivity(pid, id);
              }
            }
          }

          close();
          activitiesObj = (await readActivities()) || {};
          render();
        });
      }
    }

    function bindActivitiesTab() {
      main.querySelector('#activityAddBtn')?.addEventListener('click', () => {
        openActivityFormSheet(null);
      });

      main.querySelectorAll('.activity-active-toggle').forEach(toggle => {
        toggle.addEventListener('change', async (e) => {

        });

    // вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
    // Achievements Tab
    // вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР

    let achievementPersonExpanded = {};

    const ACHIEVEMENT_STATS = [
      { value: 'streak', label: 'Current Streak (days)' },
      { value: 'bestStreak', label: 'Best Streak (days)' },
      { value: 'totalEarned', label: 'Total Points Earned' },

      { value: 'gradeMonth', label: 'Monthly Grade' },
      { value: 'firstRedemption', label: 'First Store Purchase' }
    ];

    const ACHIEVEMENT_EMOJIS = ['рЯПЖ','в≠Р','рЯФ•','рЯТО','рЯОѓ','рЯПЕ','рЯСС','рЯТ™','рЯМЯ','рЯЪА','рЯОЦпЄП','рЯТ∞','рЯОБ','рЯУЪ','рЯІє','рЯП†','вЪ°','рЯМИ'];

    function renderAchievementsTab() {
      const allDefs = mergeAchievementDefs(achievementDefsObj);
      const activeDefs = getActiveAchievements(allDefs);
      const ppl = peopleArray();

      let html = '';

      // вФАвФА Per-person status (collapsible) вФАвФА
      html += `<div class="admin-section">
        <div class="admin-section__header"><h3>Status by Person</h3></div>`;

      for (const p of ppl) {
        const pa = allAchievements[p.id] || {};
        const eligible = Object.entries(activeDefs).filter(([k, def]) => !def.perPerson || def.perPerson.includes(p.id));
        const unlocked = eligible.filter(([k]) => pa[k] && !pa[k].revoked).length;
        const total = eligible.length;
        const pct = total > 0 ? Math.round((unlocked / total) * 100) : 0;
        const isExpanded = achievementPersonExpanded[p.id];

        html += `<div class="ach-person-row">
          <button class="ach-person-header" data-person-id="${p.id}" type="button">
            <div class="ach-person-header-row">
              <span class="sb-mini-dot" style="background:${p.color}"></span>
              <span class="ach-person-name">${esc(p.name)}</span>
              <span class="ach-person-count">${unlocked}/${total}</span>
              <span class="ach-person-chevron${isExpanded ? ' is-open' : ''}">вАЇ</span>
            </div>
            <div class="ach-person-progress">
              <div class="ach-person-progress-fill" style="width:${pct}%;background:${p.color}"></div>
            </div>
          </button>`;

        if (isExpanded) {
          const unlockedEntries = eligible
            .filter(([k]) => pa[k] && !pa[k].revoked)
            .sort((a, b) => (pa[b[0]]?.unlockedAt || 0) - (pa[a[0]]?.unlockedAt || 0));
          const lockedEntries = eligible.filter(([k]) => !pa[k] || pa[k].revoked);
          html += `<div class="ach-person-badges">`;
          for (const [key, def] of [...unlockedEntries, ...lockedEntries]) {
            const got = pa[key];
            const isRevoked = got?.revoked;
            const isUnlocked = got && !isRevoked;
            html += `<div class="ach-badge-btn ${isUnlocked ? 'ach-badge-btn--unlocked' : ''}" data-key="${esc(key)}" data-person-id="${esc(p.id)}" title="${esc(def.label)}">
              <span class="ach-badge-icon">${esc(def.icon)}</span>
              <span class="ach-badge-label">${esc(def.label)}</span>
            </div>`;
          }
          html += `</div>`;
          if (unlocked > 0 || Object.keys(pa).length > 0) {
            html += `<div style="text-align: right; padding: 0 var(--spacing-md) var(--spacing-xs);">
              <button class="btn btn--ghost btn--xs ach-reset-all" data-person-id="${p.id}" type="button" style="color: var(--accent-danger, #e53e3e);">Reset All</button>
            </div>`;
          }
        }
        html += `</div>`;
      }
      html += `</div>`;

      // вФАвФА Achievement definitions list вФАвФА
      html += `<div class="admin-filters admin-filters--row">
  <input class="admin-select" type="search" id="badgesSearch" placeholder="Search badgesвА¶" value="${esc(badgesSearch)}">
  ${renderFilterSortChip('badgesFilterSortBtn', badgesFilterActiveCount())}
  <button class="btn btn--primary btn--sm" id="addAchBtn" type="button">+ Add Badge</button>
</div>`;

      let defsEntries = Object.entries(allDefs);
      if (badgesSearch) defsEntries = defsEntries.filter(([, def]) => (def.label || '').toLowerCase().includes(badgesSearch.toLowerCase()));
      if (badgesFilter === 'earned') defsEntries = defsEntries.filter(([key]) => Object.values(allAchievements).some(pa => pa[key]?.unlockedAt && !pa[key]?.revoked));
      else if (badgesFilter === 'not-earned') defsEntries = defsEntries.filter(([key]) => !Object.values(allAchievements).some(pa => pa[key]?.unlockedAt && !pa[key]?.revoked));
      defsEntries.sort((a, b) => {
        if (badgesSort === 'unlocked') {
          const ua = Object.values(allAchievements).filter(pa => pa[a[0]]?.unlockedAt && !pa[a[0]]?.revoked).length;
          const ub = Object.values(allAchievements).filter(pa => pa[b[0]]?.unlockedAt && !pa[b[0]]?.revoked).length;
          return ub - ua;
        }
        if (badgesSort === 'least-unlocked') {
          const ua = Object.values(allAchievements).filter(pa => pa[a[0]]?.unlockedAt && !pa[a[0]]?.revoked).length;
          const ub = Object.values(allAchievements).filter(pa => pa[b[0]]?.unlockedAt && !pa[b[0]]?.revoked).length;
          return ua - ub;
        }
        if (a[1].isDefault && !b[1].isDefault) return -1;
        if (!a[1].isDefault && b[1].isDefault) return 1;
        return (a[1].label || '').localeCompare(b[1].label || '');
      });

      if (defsEntries.length === 0) {
        html += `<div class="admin-empty">No badges defined.</div>`;
      } else {
        html += `<div class="admin-list" id="badgeList">`;
        for (const [key, def] of defsEntries) {
          const icon = renderEmojiTile(def.icon || 'рЯПЖ');
          const unlockedCount = Object.values(allAchievements).filter(pa => pa[key]?.unlockedAt && !pa[key]?.revoked).length;
          const totalPeople = peopleArray().length;
          const secondary = `${unlockedCount} / ${totalPeople} unlocked`;
          html += renderAdminRow({
            icon,
            primary: esc(def.label || key),
            secondary: esc(secondary),
            dataAttrs: `data-ach-key="${esc(key)}"`,
          });
        }
        html += `</div>`;
      }


      return html;
    }

    function openBadgesFilterSheet() {
      const mount = document.getElementById('taskSheetMount');

      const sortOpts = [
        {v:'name',l:'Name'},
        {v:'unlocked',l:'Most Unlocked'},
        {v:'least-unlocked',l:'Least Unlocked'},

      const filterOpts = [{v:'',l:'All'},{v:'earned',l:'Earned'},{v:'not-earned',l:'Not Earned'}];

      mount.innerHTML = renderBottomSheet(`
        <h3 class="sheet-section-title">Filter &amp; Sort</h3>

        <div class="fs-section">
          <div class="fs-section__label">Sort by</div>

      document.getElementById('fsBadgesClear')?.addEventListener('click', () => {
        badgesSort = 'name'; badgesFilter = '';
        closeAdminSheet();
        render();
      }, { once: true });
    }

        const selected = def.perPerson && def.perPerson.includes(p.id);
        return `<button class="chip chip--selectable${selected ? ' chip--active' : ''}" data-person-id="${p.id}" data-person-color="${p.color}" type="button">${esc(p.name)}</button>`;

    function openAdminAchSheet(achKey) {
      const isNew = achKey === 'new';
      const mount = document.getElementById('taskSheetMount');
      if (!mount) return;
      mount.innerHTML = renderBottomSheet(renderAchievementForm(isNew ? null : achKey));
      requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });
      document.getElementById('bottomSheet')?.addEventListener('click', e => {
        if (e.target.id === 'bottomSheet') closeAdminSheet();
      });
      const form = mount.querySelector('#achForm');
      if (form) bindAchievementForm(form);
    }

    function bindAchievementsTab() {
      // Reset all achievements for a person
      for (const btn of main.querySelectorAll('.ach-reset-all')) {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const pid = btn.dataset.personId;
          const person = peopleObj[pid];
          if (!await showConfirm({ title: `Reset all achievements for ${person?.name}?`, message: 'They can re-earn them when criteria are met again.', danger: true })) return;
          await removeData(`achievements/${pid}`);
          allAchievements = (await readAllAchievements()) || {};
          render();
        });
      }

      // Person expand/collapse вАФ only one open at a time
      for (const btn of main.querySelectorAll('.ach-person-header')) {
        btn.addEventListener('click', () => {
          const pid = btn.dataset.personId;
          const wasExpanded = achievementPersonExpanded[pid];
          achievementPersonExpanded = {};
          if (!wasExpanded) achievementPersonExpanded[pid] = true;
          render();
        });
      }

      // Badge long-press in person view вАФ opens popup to award/revoke (only for cells with data-key)
      for (const btn of main.querySelectorAll('.ach-badge-btn')) {
        if (!btn.dataset.key) continue;
        let pressTimer = null;
        const openPopup = () => {
          const key = btn.dataset.key;
          const pid = btn.dataset.personId;
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          const def = allDefs[key] || {};
          const pa = allAchievements[pid] || {};
          const got = pa[key];
          const isRevoked = got?.revoked;
          const isUnlocked = got && !isRevoked;
          const person = peopleObj[pid];

          const mount = document.getElementById('taskSheetMount');
          let statusHtml = isUnlocked
            ? `<span style="color: var(--accent-success, #38a169);">Unlocked ${new Date(got.unlockedAt).toLocaleDateString('en-US', { timeZone: tz })}</span>`
            : isRevoked
              ? `<span style="color: var(--accent-danger, #e53e3e);">Revoked</span>`
              : `<span style="color: var(--text-faint);">Locked</span>`;

          let popupHtml = `<div style="padding: 8px 0; text-align: center;">
            <div style="font-size: 2.5rem; margin-bottom: 4px;">${def.icon || 'рЯПЖ'}</div>
            <h3 style="margin-bottom: 4px;">${esc(def.label || key)}</h3>
            <p style="color: var(--text-muted); font-size: var(--font-sm); margin-bottom: 12px;">${esc(def.description || '')}</p>
            <p style="font-size: var(--font-sm); margin-bottom: 16px;">
              <span style="color: ${person?.color || 'inherit'}; font-weight: 600;">${esc(person?.name || '?')}</span> вАФ
              ${statusHtml}
            </p>
            <div style="display: flex; gap: 8px; justify-content: center;">
              ${isUnlocked
                ? `<button class="btn btn--sm btn--ghost" id="achPopupRevoke" type="button" style="color: var(--accent-danger, #e53e3e);">Revoke</button>`
                : `<button class="btn btn--sm btn--primary" id="achPopupAward" type="button">Award</button>`}
              <button class="btn btn--sm btn--ghost" id="achPopupClose" type="button">Close</button>
            </div>
          </div>`;

          mount.innerHTML = renderBottomSheet(popupHtml);
          applyDataColors(mount);
          requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

          const achAwardBtn = mount.querySelector('#achPopupAward');
          achAwardBtn?.addEventListener('click', () => withButtonLock(achAwardBtn, async () => {
            await writeAchievement(pid, key, { unlockedAt: Date.now(), seen: false });
            // Grant point reward if configured
            if (def.reward?.type === 'points' && def.reward.amount > 0) {
              await writeMessage(pid, {
                type: 'bonus', title: `рЯПЕ ${def.label}`, body: `Achievement reward: +${def.reward.amount} pts`,
                amount: def.reward.amount, rewardId: null, entryKey: null,
                seen: true, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system'
              });
            }
            allAchievements = (await readAllAchievements()) || {};
            mount.innerHTML = '';
            render();
          }));
          const achRevokeBtn = mount.querySelector('#achPopupRevoke');
          achRevokeBtn?.addEventListener('click', () => withButtonLock(achRevokeBtn, async () => {
            if (!await showConfirm({ title: `Revoke "${def.label}" from ${person?.name}?`, danger: true })) return;
            await updateData(`achievements/${pid}/${key}`, { revoked: true, revokedAt: Date.now() });
            allAchievements = (await readAllAchievements()) || {};
            mount.innerHTML = '';
            render();
          }));
          mount.querySelector('#achPopupClose')?.addEventListener('click', () => { mount.innerHTML = ''; });
          mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
            if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
          });
        };

        let longPressFired = false;
        btn.addEventListener('pointerdown', () => {
          longPressFired = false;
          pressTimer = setTimeout(() => { longPressFired = true; openPopup(); }, 500);
        });
        btn.addEventListener('pointerup', () => {
          clearTimeout(pressTimer);
          if (!longPressFired) openPopup();
        });
        btn.addEventListener('pointerleave', () => { clearTimeout(pressTimer); });
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
      }

      // Add badge button
      main.querySelector('#addAchBtn')?.addEventListener('click', () => {
        openAdminAchSheet('new');
      });

      // Row click to open sheet
      main.querySelector('#badgeList')?.addEventListener('click', e => {
        const row = e.target.closest('[data-ach-key]');
        if (!row) return;
        openAdminAchSheet(row.dataset.achKey);
      });

      main.querySelector('#badgesSearch')?.addEventListener('input', e => {
        badgesSearch = e.target.value;
        render();
        const el = main.querySelector('#badgesSearch');
        if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      });
      main.querySelector('#badgesFilterSortBtn')?.addEventListener('click', openBadgesFilterSheet);

      // Hide/Show toggle for defaults
      for (const btn of main.querySelectorAll('.ach-toggle')) {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.achKey;
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          const def = allDefs[key] || {};
          const newStatus = def.status === 'hidden' ? 'active' : 'hidden';
          await writeAchievementDef(key, { status: newStatus });
          achievementDefsObj = (await readAchievementDefs()) || {};
          render();
        });
      }

      // Delete custom achievements
      for (const btn of main.querySelectorAll('.ach-delete')) {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.achKey;
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          if (!await showConfirm({ title: `Delete "${allDefs[key]?.label || key}"?`, message: 'This cannot be undone.', danger: true })) return;
          await deleteAchievementDef(key);
          // Also remove from all people
          for (const p of peopleArray()) {
            if (allAchievements[p.id]?.[key]) {
              await deleteAchievement(p.id, key);
            }
          }
          achievementDefsObj = (await readAchievementDefs()) || {};

    function bindAchievementForm(form) {

      for (const btn of form.querySelectorAll('.emoji-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-btn--selected'));
          btn.classList.add('emoji-btn--selected');
          form.querySelector('#af_customEmoji').value = '';
        });

      form.querySelector('#af_customEmoji')?.addEventListener('input', () => {
        form.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-btn--selected'));
      });

      // Delete (edit mode only)
      form.querySelector('#af_delete')?.addEventListener('click', async () => {
        const achKey = form.querySelector('#af_save')?.dataset?.achKey;
        if (!achKey) return;
        const allDefs = mergeAchievementDefs(achievementDefsObj);
        const def = allDefs[achKey] || {};
        if (def.isDefault) { await showConfirm({ title: 'Cannot delete built-in badges', alert: true }); return; }
        if (!await showConfirm({ title: `Delete badge "${esc(def.label || achKey)}"?`, danger: true })) return;
        await deleteAchievementDef(achKey);
        achievementDefsObj = (await readAchievementDefs()) || {};
        closeAdminSheet();
        render();
      });

      // Trigger hint вАФ describes the active mode
      const TRIGGER_HINTS = {
        stat: 'Auto: awarded automatically when the condition is met.',
        hybrid: 'Either: awarded automatically OR manually from a person\'s page.',
        manual: 'Manual: only awarded by tapping a badge on a person\'s page.',
      };
      const triggerHint = form.querySelector('#af_triggerHint');
      const initialTrigger = form.querySelector('#af_condType .segmented-btn--active')?.dataset?.value || 'hybrid';
      if (triggerHint) triggerHint.textContent = TRIGGER_HINTS[initialTrigger] || '';

      // Condition type toggle
      for (const btn of form.querySelectorAll('#af_condType .segmented-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('#af_condType .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          form.querySelector('#af_condFields').classList.toggle('is-hidden', btn.dataset.value === 'manual');
          if (triggerHint) triggerHint.textContent = TRIGGER_HINTS[btn.dataset.value] || '';
        });
      }

      // Stat change вАФ swap threshold input for grade selects + show/hide for boolean
      form.querySelector('#af_stat')?.addEventListener('change', () => {
        const stat = form.querySelector('#af_stat').value;
        const isGrade = ['gradeDay', 'gradeWeek', 'gradeMonth'].includes(stat);
        const isBool = stat === 'firstRedemption';
        const group = form.querySelector('#af_thresholdGroup');
        const op = form.querySelector('#af_thresholdOp');
        group.classList.toggle('is-hidden', isBool);
        op?.classList.toggle('is-hidden', isBool);
        if (!isBool) {
          group.innerHTML = (isGrade
            ? `<select id="af_threshold"><option value="A+">A+</option><option value="A">A</option><option value="B+">B+</option><option value="B">B</option></select>`
            : `<input type="number" id="af_threshold" inputmode="numeric" value="" min="1" placeholder="e.g. 7">`);
        }
      });

      // Reward type toggle
      for (const btn of form.querySelectorAll('#af_rewardType .segmented-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('#af_rewardType .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          form.querySelector('#af_rewardPointsField').classList.toggle('is-hidden', btn.dataset.value !== 'points');
          form.querySelector('#af_rewardItemField').classList.toggle('is-hidden', btn.dataset.value !== 'reward');
        });
      }

      // Person chips
      for (const chip of form.querySelectorAll('#af_people .chip--selectable')) {
        chip.addEventListener('click', () => chip.classList.toggle('chip--active'));
      }

      // Cancel (header вЬХ + footer Cancel)
      form.querySelector('#af_cancel')?.addEventListener('click', () => {
        closeAdminSheet();
      });
      form.querySelector('#af_footerCancel')?.addEventListener('click', () => {
        closeAdminSheet();
      });

      // Footer Save delegates to header af_save (single save handler below).
      form.querySelector('#af_footerSave')?.addEventListener('click', () => {
        form.querySelector('#af_save')?.click();
      });

      // Name input вЖТ disable both save buttons when empty.
      form.querySelector('#af_name')?.addEventListener('input', (e) => {
        const empty = !e.target.value.trim();
        const headerSave = form.querySelector('#af_save');
        const footerSave = form.querySelector('#af_footerSave');
        if (headerSave) headerSave.disabled = empty;
        if (footerSave) footerSave.disabled = empty;
      });

      // Save
      const afSaveBtn = form.querySelector('#af_save');
      afSaveBtn?.addEventListener('click', () => withButtonLock(afSaveBtn, async () => {
        const name = form.querySelector('#af_name')?.value?.trim();
        if (!name) { await showConfirm({ title: 'Name is required', alert: true }); return; }

        const selectedEmoji = form.querySelector('.emoji-btn--selected')?.dataset?.emoji;
        const customEmoji = form.querySelector('#af_customEmoji')?.value?.trim();
        const icon = customEmoji || selectedEmoji || 'рЯПЖ';

        const description = form.querySelector('#af_desc')?.value?.trim() || '';
        const conditionType = form.querySelector('#af_condType .segmented-btn--active')?.dataset?.value || 'hybrid';

        let condition = null;
        if (conditionType !== 'manual') {
          const stat = form.querySelector('#af_stat')?.value;
          if (stat) {
            const thresholdEl = form.querySelector('#af_threshold');
            const threshold = thresholdEl?.tagName === 'SELECT' ? thresholdEl.value : (parseInt(thresholdEl?.value) || null);
            if (stat !== 'firstRedemption' && !threshold) { await showConfirm({ title: 'Threshold is required', alert: true }); return; }
            condition = { stat, threshold: stat === 'firstRedemption' ? 1 : threshold };
          }
        }

        let reward = null;
        const rType = form.querySelector('#af_rewardType .segmented-btn--active')?.dataset?.value || 'none';
        if (rType === 'points') {
          reward = { type: 'points', amount: parseInt(form.querySelector('#af_rewardAmount')?.value) || 50 };
        } else if (rType === 'reward') {
          const rid = form.querySelector('#af_rewardId')?.value;
          if (rid) reward = { type: 'reward', rewardId: rid };
        }

        const perPerson = [...form.querySelectorAll('#af_people .chip--active')].map(c => c.dataset.personId);

        const data = {
          label: name,
          icon,
          description,
          conditionType,
          condition,
          reward,
          perPerson: perPerson.length > 0 ? perPerson : null,
          status: 'active'
        };

        const existingKey = form.querySelector('#af_save')?.dataset?.achKey;
        if (existingKey) {
          // Editing existing
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          if (allDefs[existingKey]?.isDefault) data.isDefault = true;
          await writeAchievementDef(existingKey, data);
        } else {
          // New вАФ generate key
          const key = 'custom-' + Date.now();
          await writeAchievementDef(key, data);
        }

        achievementDefsObj = (await readAchievementDefs()) || {};
        closeAdminSheet();
        render();
      }));
    }

      const ownersContainer = document.getElementById('be_owners');

      ownersContainer?.addEventListener('click', (e) => {
        const chip = e.target.closest('.owner-chip');
        if (chip) {
          chip.classList.toggle('owner-chip--selected');
          if (!ownersChanged) {
            ownersChanged = true;
            if (ownersHint) ownersHint.style.display = 'none';
          }
        }
      });

        if (e.target.id === 'bottomSheet') closeBulkEditModal();

      document.getElementById('bulkEditCancel')?.addEventListener('click', () => {

        const changes = {};
        const rotation = document.getElementById('be_rotation')?.value;
        const assignMode = document.getElementById('be_assignMode')?.value;
        const category = document.getElementById('be_category')?.value;
        const status = document.getElementById('be_status')?.value;
        const difficulty = document.getElementById('be_difficulty')?.value;
        const timeOfDay = document.getElementById('be_timeOfDay')?.value;
        const estMinVal = document.getElementById('be_estMin')?.value;

        if (rotation) changes.rotation = rotation;
        if (assignMode) changes.ownerAssignmentMode = assignMode;
        if (category) changes.category = category;
        if (status) changes.status = status;
        if (difficulty) changes.difficulty = difficulty;
        if (timeOfDay) changes.timeOfDay = timeOfDay;
        if (estMinVal !== '' && estMinVal != null) {
          const parsed = parseInt(estMinVal, 10);
          if (!isNaN(parsed)) changes.estMin = parsed;
        }
        if (ownersChanged) {
          changes.owners = Array.from(document.querySelectorAll('#be_owners .owner-chip--selected')).map(b => b.dataset.id);

        if (Object.keys(changes).length === 0) {
          closeBulkEditModal();
          return;

        const applyBtn = document.getElementById('bulkEditApply');
        const origApplyBtnText = applyBtn?.textContent || '';

          const existing = tasksObj[id];
          if (!existing) continue;
          const merged = { ...existing, ...changes };
          await writeTask(id, merged);
          tasksObj[id] = merged;
        }

        // Single schedule rebuild
        const allSched = await readAllSchedule() || {};
        const allComp = await readCompletions() || {};
        const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, { includeToday: true }, catsObj);

        closeBulkEditModal();
        selectMode = false;
        selectedTaskIds.clear();
        render();
        showToast(`Updated ${ids.length} task${ids.length !== 1 ? 's' : ''}`);
        } catch (err) {
          console.error('[bulkEdit] save failed:', err);
        } finally {
          if (applyBtn) { applyBtn.disabled = false; applyBtn.textContent = origApplyBtnText; }
        }
      });

    async function handleBulkDelete() {
      const count = selectedTaskIds.size;
      if (!await showConfirm({ title: `Delete ${count} task${count !== 1 ? 's' : ''}?`, message: 'This cannot be undone.', danger: true })) return;

      const ids = [...selectedTaskIds];

      // Remove from local state immediately
      for (const id of ids) {
        delete tasksObj[id];
      }
      selectMode = false;
      selectedTaskIds.clear();
      render();

      // Delete tasks from Firebase
      for (const id of ids) {
        await removeTask(id);
      }

      // Clean up orphaned schedule entries and completions
      try {
        const allSched = await readAllSchedule() || {};
        const allComp = await readCompletions() || {};
        const cleanupUpdates = {};
        const idSet = new Set(ids);
        for (const [dateKey, dayEntries] of Object.entries(allSched)) {
          for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
            if (idSet.has(entry.taskId)) {
              cleanupUpdates[`schedule/${dateKey}/${entryKey}`] = null;
              if (allComp[entryKey]) {
                cleanupUpdates[`completions/${entryKey}`] = null;
              }
            }
          }
        }
        if (Object.keys(cleanupUpdates).length > 0) {
          await multiUpdate(cleanupUpdates);
        }
      } catch (e) {
        console.warn('Tasks deleted but schedule cleanup failed:', e);
      }

      // Rebuild schedule
      const allSched2 = await readAllSchedule() || {};
      const allComp2 = await readCompletions() || {};
      const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp2, allSched2, { includeToday: true }, catsObj);
      await multiUpdate(futureUpdates);

      showToast(`Deleted ${count} task${count !== 1 ? 's' : ''}`);
    }

    function bindDataTab() {
      // Auto-prune: save on change
      main.querySelector('#set_autoPruneMonths')?.addEventListener('change', async () => {
        const months = parseInt(main.querySelector('#set_autoPruneMonths')?.value || '0', 10);
        const updated = { ...settings, autoPruneMonths: months };
        await writeSettings(updated);
        syncSettings(updated);
      });

      main.querySelector('#exportDataBtn')?.addEventListener('click', async () => {
        const allData = await readOnce('');
        const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `daily-rundown-export-${today}.json`;
        a.click();
        URL.revokeObjectURL(url);
      });

      // Import data
      main.querySelector('#importDataInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const statusEl = main.querySelector('#importStatus');
        statusEl.innerHTML = '<span class="text-muted">Reading file...</span>';

        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!data || typeof data !== 'object') throw new Error('Invalid JSON structure');

          // Validate it looks like a rundown export
          const hasKnownKeys = ['settings', 'people', 'tasks', 'categories', 'schedule'].some(k => k in data);
          if (!hasKnownKeys) throw new Error('File does not appear to be a Family Hub export');

          if (!await showConfirm({ title: 'Overwrite all data?', message: 'This will replace everything with the imported backup.', confirmLabel: 'Overwrite', danger: true })) {
            statusEl.innerHTML = '';
            return;
          }

          statusEl.innerHTML = '<span class="text-muted">Importing...</span>';

          // Write the entire data object under rundown/
          const updates = {};
          for (const [key, value] of Object.entries(data)) {
            updates[key] = value;
          }
          await multiUpdate(updates);

          // Reload local state
          const [newSettings, newPeople, newTasks, newCats] = await Promise.all([
            readSettings(), readPeople(), readTasks(), readCategories()
          ]);
          Object.assign(settings, newSettings || {});
          peopleObj = newPeople || {};
          tasksObj = newTasks || {};
          catsObj = newCats || {};

          statusEl.innerHTML = '<span class="admin-msg admin-msg--success">Import complete! Data restored.</span>';
          setTimeout(() => { statusEl.innerHTML = ''; render(); }, 2000);
        } catch (err) {
          statusEl.innerHTML = `<span class="admin-msg admin-msg--danger">Import failed: ${esc(err.message)}</span>`;
        }
      });

      // Scoreboard reset
      main.querySelector('#showScoreResetBtn')?.addEventListener('click', () => {
        main.querySelector('#scoreResetSection').style.display = 'none';
        main.querySelector('#scoreResetConfirm').style.display = '';
      });
      main.querySelector('#scoreResetCancel')?.addEventListener('click', () => {
        main.querySelector('#scoreResetConfirm').style.display = 'none';
        main.querySelector('#scoreResetSection').style.display = '';
      });
      const scoreResetWord = main.querySelector('#scoreResetWord');
      const scoreResetBtn = main.querySelector('#scoreResetConfirmBtn');
      if (scoreResetWord && scoreResetBtn) {
        scoreResetWord.addEventListener('input', () => {
          scoreResetBtn.disabled = scoreResetWord.value.trim() !== 'RESET';
        });
        scoreResetBtn.addEventListener('click', async () => {
          scoreResetBtn.disabled = true;
          scoreResetBtn.textContent = 'Clearing...';
          const updates = {
            'snapshots': null,
            'streaks': null,
            'completions': null
          };
          // Reset all balance anchors so stale earnings don't persist
          const now = Date.now();
          for (const pid of Object.keys(peopleObj)) {
            updates[`balanceAnchors/${pid}`] = { amount: 0, anchoredAt: now };
            updates[`messages/${pid}`] = null;
            updates[`bank/${pid}`] = null;
          }
          await multiUpdate(updates);
          scoreResetBtn.textContent = 'Done!';
          setTimeout(() => {
            main.querySelector('#scoreResetConfirm').style.display = 'none';
            main.querySelector('#scoreResetSection').style.display = '';
          }, 1500);
        });
      }

      // Factory reset
      main.querySelector('#showResetBtn')?.addEventListener('click', () => {
        main.querySelector('#resetSection').style.display = 'none';
        main.querySelector('#resetConfirm').style.display = '';
      });

      main.querySelector('#resetCancel')?.addEventListener('click', () => {
        main.querySelector('#resetConfirm').style.display = 'none';
        main.querySelector('#resetSection').style.display = '';
      });

      main.querySelector('#refreshRecipesBtn')?.addEventListener('click', async () => {
        const btn = main.querySelector('#refreshRecipesBtn');
        const statusEl = main.querySelector('#refreshRecipesStatus');
        const WORKER = 'https://kitchen-import.jordin-jansky.workers.dev';

        btn.disabled = true;
        btn.textContent = 'RefreshingвА¶';
        statusEl.style.display = 'none';

        const recipes = await readOnce('kitchen/recipes');
        if (!recipes) {
          btn.disabled = false;
          btn.textContent = 'Refresh recipes';
          return;
        }

        const entries = Object.entries(recipes).filter(([, r]) => r.url);
        let updated = 0;

        for (const [id, recipe] of entries) {
          try {
            const res = await fetch(WORKER, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ type: 'url', input: recipe.url }),
            });
            if (!res.ok) continue;
            const data = await res.json();
            const patch = {};
            // Backfill only вАФ never overwrite user edits.
            if (!recipe.name        && data.name)        patch.name        = data.name;
            if (!recipe.notes       && data.notes)       patch.notes       = data.notes;
            if (!recipe.prepTime    && data.prepTime)    patch.prepTime    = data.prepTime;
            if (!recipe.cookTime    && data.cookTime)    patch.cookTime    = data.cookTime;
            if (!recipe.servings    && data.servings)    patch.servings    = data.servings;
            if (!recipe.videoUrl    && data.videoUrl)    patch.videoUrl    = data.videoUrl;
            if ((!recipe.tags  || recipe.tags.length === 0)  && Array.isArray(data.tags)  && data.tags.length)  patch.tags  = data.tags;
            if ((!recipe.steps || recipe.steps.length === 0) && Array.isArray(data.steps) && data.steps.length) patch.steps = data.steps;
            if ((!recipe.ingredients || recipe.ingredients.length === 0) && data.ingredients?.length) {
              patch.ingredients = data.ingredients.filter(i => i.name).map(i => ({ name: i.name, qty: i.qty || null }));
            }
            // imageUrl: refresh when current is a non-data URL (CDN URLs are
            // time-signed and expire). Prefer Worker-supplied base64 (server-
            // side fetch, no CORS); fall back to client fetch via urlToDataUrl
            // when only imageUrl is present (older Worker).
            const needsImageRefresh = !recipe.imageUrl || !recipe.imageUrl.startsWith('data:');
            if (needsImageRefresh) {
              let persistent = null;
              if (data.imageData && data.imageMediaType) {
                persistent = await base64ToDataUrl(data.imageData, data.imageMediaType);
              } else if (data.imageUrl) {
                persistent = await urlToDataUrl(data.imageUrl);
              }
              // Only patch if the conversion produced a data URL вАФ storing
              // another short-lived CDN URL would just expire again.
              if (persistent && persistent.startsWith('data:')) {
                patch.imageUrl = persistent;
                patch.imageRefreshFails = null; // success clears the counter
              }
            }
            if (Object.keys(patch).length) {
              await updateData(`kitchen/recipes/${id}`, patch);
              updated++;
            }
          } catch { /* skip on error */ }
        }

        btn.disabled = false;
        btn.textContent = 'Refresh recipes';
        statusEl.textContent = `Done вАФ ${updated} recipe${updated !== 1 ? 's' : ''} updated.`;
        statusEl.style.display = 'block';
      });

      const resetWord = main.querySelector('#resetWord');
      const resetBtn = main.querySelector('#resetConfirmBtn');
      if (resetWord && resetBtn) {
        resetWord.addEventListener('input', () => {
          resetBtn.disabled = resetWord.value.trim() !== 'FACTORY RESET';
        });

        resetBtn.addEventListener('click', async () => {
          resetBtn.disabled = true;
          resetBtn.textContent = 'Deleting...';
          await factoryReset();
          localStorage.removeItem('dr-theme');
          localStorage.removeItem('dr-debug');
          window.location.href = 'setup.html';
        });
      }

      renderNotifLog();
    }

    async function renderNotifLog() {
      const mount = document.getElementById('notifLogTable');
      if (!mount) return;
      try {
        const all = await readNotificationLog();
        if (!all || typeof all !== 'object') {
          mount.innerHTML = '<p class="form-hint">No activity yet.</p>';
          return;
        }
        const peopleMap = peopleObj || {};
        const rows = Object.values(all)
          .filter(e => e && e.ts)
          .sort((a, b) => (b.ts || 0) - (a.ts || 0))
          .slice(0, 50);

        const fmtTs = (ts) => new Date(ts).toLocaleString('en-US', { timeZone: settings?.timezone || 'America/New_York', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        const personName = (pid) => peopleMap[pid]?.name || pid?.slice(0, 6) || 'вАФ';
        const result = (e) => {
          if (e.skipped) return `skipped: ${e.skipped}`;
          const parts = [];
          if (e.sent)    parts.push(`sent ${e.sent}`);
          if (e.removed) parts.push(`removed ${e.removed}`);
          if (e.errors)  parts.push(`errors ${e.errors}`);
          return parts.join(' ¬Ј ') || 'вАФ';
        };

        mount.innerHTML = `
          <table class="notif-log__table">
            <thead><tr><th>Time</th><th>Person</th><th>Type</th><th>Result</th></tr></thead>
            <tbody>
              ${rows.map(e => `
                <tr>
                  <td>${esc(fmtTs(e.ts))}</td>
                  <td>${esc(personName(e.personId))}</td>
                  <td>${esc(e.type || 'вАФ')}</td>
                  <td>${esc(result(e))}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (err) {
        mount.innerHTML = `<p class="form-hint">Could not load log: ${esc(err.message)}</p>`;
      }
    }

    function openAdminPhotoSource(btnIds, title) {

      const GAL_SVG = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;

      const overlay = document.createElement('div');
      overlay.className = 'ef2-subsheet-overlay';
      overlay.innerHTML = `<div class="ef2-subsheet">

        <div class="sheet__content">

          </div>
          <button class="ef2-source-btn" data-source="camera" type="button"><span class="ef2-source-icon">${CAM_SVG}</span><span>Camera</span></button>
          <button class="ef2-source-btn" data-source="gallery" type="button"><span class="ef2-source-icon">${GAL_SVG}</span><span>Gallery</span></button>

          close();
          setTimeout(() => {
            if (src === 'camera') main.querySelector(btnIds.camera)?.click();

            else main.querySelector(btnIds.files)?.click();
          }, 320);
        });

    }

    let adminPhotoContext = '';

    function bindAiImportsTab() {
      bindCalendarsTab();

      // вФАвФА School Lunch Feeds вФАвФА
      main.querySelector('#addSchoolLunchFeedBtn')?.addEventListener('click', () => openSchoolLunchFeedSheet(null));
      main.querySelector('#schoolLunchFeedList')?.addEventListener('click', e => {
        if (e.target.closest('[data-no-row-click]')) return;
        const row = e.target.closest('[data-school-feed-person]');
        if (row) openSchoolLunchFeedSheet(row.dataset.schoolFeedPerson);
      });
      main.querySelectorAll('[data-sync-person]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          syncSchoolLunchFeedFromAdmin(btn.dataset.syncPerson);
        });
      });

      if (!KITCHEN_WORKER_URL) return;

      // вФАвФА Task Scanner вФАвФА
      const onTaskScan = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const statusEl = main.querySelector('#taskScanStatus');
        if (statusEl) statusEl.innerHTML = `<div class="ai-loading"><div class="ai-loading__spinner"></div>Scanning documentвА¶</div>`;
        try {
          const { base64, mediaType } = await resizeImageForUpload(file);
          const resp = await fetch(KITCHEN_WORKER_URL, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'taskScan', input: { base64, mediaType, contextDate: todayKey(settings?.timezone || 'America/Chicago'), context: adminPhotoContext } }),
          });
          const data = await resp.json();
          if (data.error || !data.tasks?.length) {
            if (statusEl) statusEl.innerHTML = `
              <p style="color:var(--text-muted);font-size:var(--font-sm)">No tasks found вАФ try a clearer photo.</p>
              <button class="btn btn--secondary btn--sm" id="hwRetry" style="margin-top:var(--spacing-sm)">Try again</button>`;
            statusEl?.querySelector('#hwRetry')?.addEventListener('click', () => { statusEl.innerHTML = ''; });
            return;
          }
          renderTaskScanConfirm(data.tasks, statusEl, data.hasUncertainDates);
        } catch (err) {
          if (statusEl) statusEl.innerHTML = `
            <p style="color:var(--text-muted);font-size:var(--font-sm)">Something went wrong.</p>
            <p style="color:var(--text-muted);font-size:var(--font-xs)">${esc(err?.message) || 'Check your connection.'}</p>
            <button class="btn btn--secondary btn--sm" id="hwRetry" style="margin-top:var(--spacing-sm)">Try again</button>`;
          statusEl?.querySelector('#hwRetry')?.addEventListener('click', () => { statusEl.innerHTML = ''; });
        }
        e.target.value = '';
      };
      main.querySelector('#tsPhotoBtn')?.addEventListener('click', () =>
        openAdminPhotoSource({ camera: '#tsCamera', gallery: '#tsGallery', files: '#tsFiles' }, 'Import from'));
      main.querySelector('#tsCamera')?.addEventListener('change', onTaskScan);
      main.querySelector('#tsGallery')?.addEventListener('change', onTaskScan);
      main.querySelector('#tsFiles')?.addEventListener('change', onTaskScan);

      // вФАвФА Email Imports вФАвФА
      loadEmailImports();
      main.querySelector('#emailImportsRefresh')?.addEventListener('click', loadEmailImports);
    }

function renderTaskScanConfirm(tasks, statusEl, hasUncertainDates) {
      if (!statusEl) return;

      const formatDueDate = (d) => {
        if (!d) return null;
        const [y, m, day] = d.split('-');
        return new Date(+y, +m - 1, +day).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      };

      const uncertainBanner = hasUncertainDates
        ? `<p style="font-size:var(--font-sm);color:var(--warning);margin-bottom:var(--spacing-sm)">Some dates were unclear вАФ review before importing.</p>`
        : '';

      const rowsHtml = tasks.map((t, i) => {
        const sub = t.dueDate ? `Due ${formatDueDate(t.dueDate)}${t.notes ? ' ¬Ј ' + t.notes : ''}` : null;
        const row = renderConfirmRow(
          { ...t, _sub: sub },
          { labelKey: 'name', subKey: '_sub', confidenceKey: 'confidence', key: i }
        );
        const dateInput = !t.dueDate
          ? `<div class="hw-date-wrap" data-idx="${i}" style="padding:0 var(--spacing-md) var(--spacing-xs)">
               <label style="font-size:var(--font-xs);color:var(--text-muted)">Due date (optional)</label>
               <input type="date" class="field__input hw-date" data-idx="${i}" style="margin-top:4px">
             </div>`
          : '';
        return row + dateInput;
      }).join('');

      statusEl.innerHTML = `
        ${uncertainBanner}
        <div class="confirm-list" id="hwItems">${rowsHtml}</div>
        <div class="admin-form__actions mt-md">
          <button class="btn btn--secondary btn--sm" id="hwCancel">Cancel</button>
          <button class="btn btn--primary btn--sm" id="hwSave">Add ${tasks.length} task${tasks.length !== 1 ? 's' : ''}</button>
        </div>`;

      const list = statusEl.querySelector('#hwItems');
      const saveBtn = statusEl.querySelector('#hwSave');

      function updateBtn() {
        const n = list.querySelectorAll('.confirm-row:not(.is-deselected)').length;
        saveBtn.textContent = `Add ${n} task${n !== 1 ? 's' : ''}`;
        saveBtn.disabled = n === 0;
      }

      list.addEventListener('click', (e) => {
        const row = e.target.closest('.confirm-row');
        if (!row) return;
        if (e.target.closest('.hw-date-wrap')) return;
        const idx = row.dataset.key;
        row.classList.toggle('is-deselected');
        const dateWrap = list.querySelector(`.hw-date-wrap[data-idx="${idx}"]`);
        if (dateWrap) dateWrap.style.display = row.classList.contains('is-deselected') ? 'none' : 'block';
        updateBtn();
      });

      list.querySelectorAll('.hw-date-wrap').forEach(wrap => { wrap.style.display = 'block'; });

      statusEl.querySelector('#hwCancel')?.addEventListener('click', () => { statusEl.innerHTML = ''; });

      saveBtn.addEventListener('click', async () => {
        const selected = [...list.querySelectorAll('.confirm-row:not(.is-deselected)')]
          .map(row => {
            const t = tasks[+row.dataset.key];
            if (!t) return null;
            if (!t.dueDate) {
              const dateEl = list.querySelector(`.hw-date[data-idx="${row.dataset.key}"]`);
              return { ...t, dueDate: dateEl?.value || null };
            }
            return t;
          })
          .filter(Boolean)
          .filter(t => t.dueDate);
        if (!selected.length) { statusEl.innerHTML = ''; return; }
        saveBtn.disabled = true; saveBtn.textContent = 'AddingвА¶';
        try {
          const tz = settings?.timezone || 'America/Chicago';
          let counter = 0;
          for (const t of selected) {
            const firstPersonId = Object.keys(peopleObj)[0] || null;
            const taskData = {
              name: t.name, rotation: 'once', owners: firstPersonId ? [firstPersonId] : [],
              ownerAssignmentMode: 'fixed', timeOfDay: 'anytime',
              dedicatedDate: t.dueDate, estMin: 30, difficulty: 'medium',
              category: 'general', status: 'active',
              createdDate: todayKey(tz), notes: t.notes || null, exempt: false,
            };
            const taskId = await pushTask(taskData);
            if (taskData.owners[0]) {
              const schedKey = `sched_${Date.now()}_hw_${counter++}`;
              await multiUpdate({ [`schedule/${t.dueDate}/${schedKey}`]: {
                taskId, ownerId: taskData.owners[0], rotationType: 'once',
                ownerAssignmentMode: 'fixed', timeOfDay: 'anytime',
              }});
            }
          }
          statusEl.innerHTML = `<span style="color:var(--success);font-size:var(--font-sm)">${selected.length} task${selected.length !== 1 ? 's' : ''} added.</span>`;
        } catch (err) {
          saveBtn.disabled = false;
          saveBtn.textContent = `Add ${selected.length} task${selected.length !== 1 ? 's' : ''}`;
        }
      });
    }

    function formatRelativeTime(epochMs) {
      const diff = Date.now() - epochMs;
      const mins = Math.floor(diff / 60000);
      if (mins < 2) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days === 1) return 'Yesterday';
      if (days < 7) return `${days}d ago`;
      return new Date(epochMs).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function parseSenderName(from) {
      if (!from) return '?';
      const m = from.match(/^([^<]+)</);
      return m ? m[1].trim() : from.replace(/<[^>]+>/, '').trim() || from;
    }

    async function loadEmailImports() {
      const listEl = main.querySelector('#emailImportsList');
      if (!listEl) return;

      listEl.innerHTML = `<div class="ai-loading"><div class="ai-loading__spinner"></div>Loading email importsвА¶</div>`;

      try {
        // Dev-root-aware read (A1); unprocessed filter applied client-side вАФ
        // the tree is tiny and the data layer doesn't expose child queries.
        const allImports = await readOnce('emailImports');
        const imports = allImports
          ? Object.fromEntries(Object.entries(allImports).filter(([, v]) => v && v.processed === false))
          : null;

        if (!imports) {
          listEl.innerHTML = `<p style="color:var(--text-muted);font-size:var(--font-sm)">No pending imports.</p>`;
          return;
        }

        const entries = Object.entries(imports).sort((a, b) => (b[1].receivedAt || 0) - (a[1].receivedAt || 0));
        listEl.innerHTML = '';

        for (const [emailId, entry] of entries) {
          const events = entry.events || [];
          const senderName = parseSenderName(entry.from);
          const timestamp = entry.receivedAt ? formatRelativeTime(entry.receivedAt) : '';

          let eventsHtml;
          if (!events.length) {
            eventsHtml = `<p style="color:var(--text-muted);font-size:var(--font-sm)">No events found.</p>`;
          } else {
            eventsHtml = events.map((ev, i) => {
              const datePart = ev.date
                ? new Date(...ev.date.split('-').map((v, j) => j === 1 ? +v - 1 : +v)).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
                : null;
              const timePart = ev.time ? ` ¬Ј ${ev.time}` : (ev.allDay ? ' ¬Ј All day' : '');
              const sub = datePart ? `${datePart}${timePart}` : null;
              const row = renderConfirmRow(
                { ...ev, _sub: sub },
                { labelKey: 'name', subKey: '_sub', confidenceKey: 'confidence', key: i }
              );
              const dateInput = !ev.date
                ? `<div class="em-date-wrap" data-idx="${i}" style="padding:0 var(--spacing-md) var(--spacing-xs)">
                     <label style="font-size:var(--font-xs);color:var(--warning)">Date unknown вАФ tap to set</label>
                     <input type="date" class="field__input em-date" data-idx="${i}" style="margin-top:4px">
                   </div>`
                : '';
              return row + dateInput;
            }).join('');
          }

          const card = document.createElement('div');
          card.className = 'admin-form__section';
          card.style.cssText = 'border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--spacing-md);margin-bottom:var(--spacing-md)';
          card.dataset.emailId = emailId;
          card.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">
              <span style="font-size:var(--font-sm);font-weight:600">${esc(senderName)}</span>
              <span style="font-size:var(--font-xs);color:var(--text-muted)">${esc(timestamp)}</span>
            </div>
            <div style="font-size:var(--font-sm);color:var(--text-muted);margin-bottom:var(--spacing-sm)">${esc(entry.subject || '(no subject)')}</div>
            <div class="confirm-list em-events">${eventsHtml}</div>
            <div class="admin-form__actions mt-sm">
              <button class="btn btn--secondary btn--sm em-dismiss">Dismiss</button>
              ${events.length ? `<button class="btn btn--primary btn--sm em-import">Import ${events.length} event${events.length !== 1 ? 's' : ''}</button>` : ''}
            </div>
            <div class="em-status" style="font-size:var(--font-sm);margin-top:var(--spacing-xs)"></div>`;

          listEl.appendChild(card);

          if (events.length) {
            const evList = card.querySelector('.em-events');
            const importBtn = card.querySelector('.em-import');

            const updateImportBtn = () => {
              const n = evList.querySelectorAll('.confirm-row:not(.is-deselected)').length;
              importBtn.textContent = `Import ${n} event${n !== 1 ? 's' : ''}`;
              importBtn.disabled = n === 0;
            };

            evList.addEventListener('click', (e) => {
              if (e.target.closest('.em-date-wrap')) return;
              const row = e.target.closest('.confirm-row');
              if (!row) return;
              row.classList.toggle('is-deselected');
              updateImportBtn();
            });

            importBtn.addEventListener('click', async () => {
              const selected = [...evList.querySelectorAll('.confirm-row:not(.is-deselected)')]
                .map(row => {
                  const ev = events[+row.dataset.key];
                  if (!ev) return null;
                  if (!ev.date) {
                    const dateEl = evList.querySelector(`.em-date[data-idx="${row.dataset.key}"]`);
                    return { ...ev, date: dateEl?.value || null };
                  }
                  return ev;
                })
                .filter(Boolean)
                .filter(ev => ev.date);

              if (!selected.length) return;
              importBtn.disabled = true; importBtn.textContent = 'AddingвА¶';

              try {
                let counter = 0;
                for (const ev of selected) {
                  const newId = await pushEvent({
                    name: ev.name, date: ev.date, allDay: ev.allDay ?? true,
                    startTime: ev.time || null, endTime: null,
                    color: Object.values(peopleObj)[0]?.color || '#4285f4',
                    people: [], notes: ev.notes || null, url: null,
                  });
                }

                await updateData(`emailImports/${emailId}`, { processed: true });
                const statusEl = card.querySelector('.em-status');
                if (statusEl) statusEl.innerHTML = `<span style="color:var(--success)">${selected.length} event${selected.length !== 1 ? 's' : ''} added.</span>`;
                showToast(`${selected.length} event${selected.length !== 1 ? 's' : ''} added to schedule`);
                setTimeout(() => {
                  card.style.opacity = '0';
                  card.style.transition = 'opacity 0.3s';
                  setTimeout(() => card.remove(), 300);
                }, 1500);
              } catch (err) {
                importBtn.disabled = false;
                importBtn.textContent = `Import ${selected.length} event${selected.length !== 1 ? 's' : ''}`;
              }
            });
          }

          card.querySelector('.em-dismiss').addEventListener('click', async () => {
            try {
              await updateData(`emailImports/${emailId}`, { processed: true });
            } catch (err) { /* ignore вАФ dismiss visually; write will retry on reconnect */ }
            card.style.opacity = '0';
            card.style.transition = 'opacity 0.3s';
            setTimeout(() => {
              card.remove();
              if (!listEl.querySelector('[data-email-id]')) {
                listEl.innerHTML = `<p style="color:var(--text-muted);font-size:var(--font-sm)">No pending imports.</p>`;
              }
            }, 300);
          });
        }
      } catch (err) {
        listEl.innerHTML = `
          <p style="color:var(--text-muted);font-size:var(--font-sm)">Couldn't load imports.</p>
          <p style="color:var(--text-muted);font-size:var(--font-xs)">${esc(err?.message) || ''}</p>
          <button class="btn btn--secondary btn--sm" id="emRetry" style="margin-top:var(--spacing-sm)">Retry</button>`;
        listEl.querySelector('#emRetry')?.addEventListener('click', loadEmailImports);
      }
    }

    // вФАвФА Initial render if PIN session was cached or bypass applies вФАвФА
    if (pinSessionValid || isAdminBypass) {
      render();
      // вФАвФА Hash deep-link: #activity/{id} вЖТ open edit form; #activity/new вЖТ open create form вФАвФА
      const _hashAtBoot = location.hash;
      const hashMatch = _hashAtBoot.match(/^#activity\/(.+)$/);
      if (hashMatch) {
        const targetId = decodeURIComponent(hashMatch[1]);
        history.replaceState(null, '', location.pathname + location.search); // clear hash
        // Switch to Library вЖТ Activities and open form
        activeTab = 'library';
        activeLibrarySection = 'activities';
        activitiesObj = (await readActivities()) || {};
        render();
        if (targetId === 'new') {
          openActivityFormSheet(null); // create mode
        } else if (activitiesObj[targetId]) {
          openActivityFormSheet(targetId); // edit mode
        }
      }
    }
  </script>
  <script src="/shared/dev-banner.js"></script>
