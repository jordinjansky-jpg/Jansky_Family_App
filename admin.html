<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#141413">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/App Icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/App Icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Family Hub — Admin</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/admin.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>

    <!-- PIN Gate -->
    <div id="pinGate" style="display:none;">
      <div class="admin-pin-gate">
        <div>🔒</div>
        <h2 class="admin-pin-gate__title">Admin Access</h2>
        <p class="admin-pin-gate__desc">Enter your 4-digit PIN</p>
        <div class="admin-pin-gate__inputs">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="0" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="1" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="2" inputmode="numeric">
          <input type="tel" class="admin-pin-digit" maxlength="1" data-pin="3" inputmode="numeric">
        </div>
        <p class="admin-pin-gate__error" id="pinError"></p>
      </div>
    </div>

    <!-- Admin Content (after PIN) -->
    <div id="mainContent" style="display:none;overflow-x:hidden;"></div>
  </div>
  <div id="navMount"></div>
  <div id="toastMount"></div>
  <div id="taskSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import {
      initFirebase, isFirstRun, readSettings, writeSettings,
      readPeople, writePerson, pushPerson, removeData,
      readTasks, pushTask, writeTask, removeTask,
      readCategories, writeCategories,
      readEvents, pushEvent, writeEvent, removeEvent,
      readCompletions, readAllSchedule, readOnce,
      multiUpdate, updateData, pushDebugEvent, factoryReset, onConnectionChange,
      readRewards, pushReward, writeReward, archiveReward, removeReward,
      readMessages, readAllMessages, writeMessage, readAllSnapshots, readBalanceAnchor, writeBalanceAnchor, clearMessages, deletePersonRewardsData, readMultipliers,
      readAllAchievements, writeAchievement, deleteAchievement,
      readAchievementDefs, writeAchievementDef, deleteAchievementDef,
      readBank, writeBankToken, removeBankToken
    } from './shared/firebase.js';
    import { renderNavBar, initNavMore, renderHeader, renderEmptyState, renderUndoToast, renderTaskForm, renderBottomSheet, initOfflineBanner, showConfirm, applyDataColors, showToast, renderColorButton, initColorButton, renderEventForm, renderRepeatSheet } from './shared/components.js';

    import { applyTheme, loadCachedTheme, defaultThemeConfig, getPresets, getColorPalette, resolveTheme } from './shared/theme.js';
    import { todayKey, addDays, dateRange, formatDateShort, getTimezoneOptions, detectTimezone, dayOfWeek, escapeHtml, parseIntOr, parseFloatOr } from './shared/utils.js';
    const esc = (s) => escapeHtml(String(s ?? ''));
    import { generateSchedule, buildScheduleUpdates, getRotationOwner } from './shared/scheduler.js';
    import { basePoints, calculateBalance, ACHIEVEMENTS, DEFAULT_ACHIEVEMENTS, mergeAchievementDefs, getActiveAchievements } from './shared/scoring.js';
    import { clearWeatherCache } from './shared/weather.js';
    import { resizeImageForUpload, renderConfirmRow, openMonthClarificationSheet } from './shared/ai-helpers.js';
    const KITCHEN_WORKER_URL = 'https://kitchen-import.jordin-jansky.workers.dev';

    const MSG_POSITIVE = ['Awesome Job!','Super Star','Great Teamwork','Above & Beyond',
      'So Proud of You','Way to Go!','Amazing Effort','Kindness Award',
      'Helping Hand','You Crushed It!','Keep It Up!','Big Improvement'];
    const MSG_NEGATIVE = ['Room Check','Reminder Needed',"Let's Do Better",'Responsibility Check',
      'Try Again Tomorrow','Needs Attention','Not Your Best','We Talked About This'];



    // ── Undo toast helper ──
    let undoTimer = null;
    function showUndoToast(message, undoCallback) {
      const mount = document.getElementById('toastMount');
      mount.innerHTML = renderUndoToast(message);
      if (undoTimer) clearTimeout(undoTimer);
      const undoBtn = mount.querySelector('.undo-toast__btn');
      if (undoCallback) {
        undoBtn.addEventListener('click', () => {
          clearTimeout(undoTimer);
          mount.innerHTML = '';
          undoCallback();
        });
      } else {
        undoBtn.style.display = 'none';
      }
      undoTimer = setTimeout(() => {
        const toast = mount.querySelector('.undo-toast');
        if (toast) toast.style.opacity = '0';
        setTimeout(() => { mount.innerHTML = ''; }, 300);
      }, 5000);
    }

    // ── Cached theme (device override > family cache > default) ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load data ──
    let settings = await readSettings();
    if (settings?.theme) applyTheme(resolveTheme(settings.theme));
    document.documentElement.setAttribute('data-text-size', settings?.textSize || 'default');

    let peopleObj = await readPeople() || {};
    let tasksObj = await readTasks() || {};
    let catsObj = await readCategories() || {};
    let eventsObj = await readEvents() || {};
    let rewardsObj = (await readRewards()) || {};
    let allAchievements = (await readAllAchievements()) || {};
    let allMessagesObj = (await readAllMessages()) || {};
    let allBankData = {};
    let achievementDefsObj = (await readAchievementDefs()) || {};

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);

    autoPrune(settings?.autoPruneMonths || 0).catch(() => {}); // fire-and-forget, silent

    // ── Header & Nav ──
    document.getElementById('headerMount').innerHTML = renderHeader({
      variant: 'admin',
      title: 'Admin',
      subtitle: settings?.appName || 'Daily Rundown',
    });
    document.getElementById('navMount').innerHTML = renderNavBar(null);
    initNavMore(document.getElementById('taskSheetMount'), () => settings?.theme);

    // ── Connection status + Offline/Online banner ──
    initOfflineBanner(onConnectionChange);

    // ══════════════════════════════════════════
    // PIN Gate
    // ══════════════════════════════════════════

    document.getElementById('loadingState').style.display = 'none';

    const PIN_SESSION_KEY = 'dr-admin-pin-ts';
    const PIN_SESSION_TTL = 30 * 60 * 1000; // 30 minutes
    const adminPin = settings?.adminPin || '';
    const recoveryPin = settings?.recoveryPin || '2522';

    // Check if PIN session is still valid
    const pinTs = parseInt(sessionStorage.getItem(PIN_SESSION_KEY) || '0', 10);
    const pinSessionValid = Date.now() - pinTs < PIN_SESSION_TTL;

    // isAdmin bypass: person.html writes dr-person-home (name string). The spec mentioned
    // dr-active-person (ID) but that key is never written — name lookup is what's available.
    const personHomeName = sessionStorage.getItem('dr-person-home');
    const personHomeEntry = personHomeName
      ? Object.values(peopleObj).find(p => p.name === personHomeName)
      : null;
    const isAdminBypass = !!personHomeEntry?.isAdmin;

    if (pinSessionValid || isAdminBypass) {
      if (isAdminBypass && !pinSessionValid) {
        sessionStorage.setItem(PIN_SESSION_KEY, String(Date.now()));
      }
      // Skip PIN gate — render() called after main is defined below
      document.getElementById('mainContent').style.display = '';
    } else {
      document.getElementById('pinGate').style.display = '';
      const digits = document.querySelectorAll('.admin-pin-digit');

      digits.forEach((input, i) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value.replace(/\D/g, '');
          e.target.value = val.slice(0, 1);
          if (val && i < digits.length - 1) digits[i + 1].focus();
          checkPin();
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && i > 0) digits[i - 1].focus();
        });
      });
      digits[0].focus();

      function checkPin() {
        const entered = Array.from(digits).map(d => d.value).join('');
        if (entered.length !== 4) return;

        if (entered === adminPin || entered === recoveryPin) {
          sessionStorage.setItem(PIN_SESSION_KEY, String(Date.now()));
          document.getElementById('pinGate').style.display = 'none';
          const main = document.getElementById('mainContent');
          main.style.display = '';
          render();
        } else {
          document.getElementById('pinError').textContent = 'Incorrect PIN';
          digits.forEach(d => d.value = '');
          digits[0].focus();
          setTimeout(() => { document.getElementById('pinError').textContent = ''; }, 2000);
        }
      }
    }

    // ══════════════════════════════════════════
    // Admin panel — tab-based layout
    // ══════════════════════════════════════════

    const TABS = [
      { id: 'library',  label: 'Library'  },
      { id: 'people',   label: 'People'   },
      { id: 'settings', label: 'Settings' },
      { id: 'tools',    label: 'Tools'    },
    ];

    const LIBRARY_SECTIONS = [
      { id: 'tasks',      label: 'Tasks'      },
      { id: 'events',     label: 'Events'     },
      { id: 'categories', label: 'Categories' },
      { id: 'rewards',    label: 'Rewards'    },
      { id: 'badges',     label: 'Badges'     },
    ];

    const SETTINGS_SECTIONS = [
      { id: 'family',       label: 'Family'       },
      { id: 'appearance',   label: 'Appearance'   },
      { id: 'scoring',      label: 'Scoring'      },
      { id: 'calendar',     label: 'Calendar'     },
      { id: 'integrations', label: 'Integrations' },
      { id: 'security',     label: 'Security'     },
      { id: 'about',        label: 'About'        },
    ];

    const TOOLS_SECTIONS = [
      { id: 'schedule', label: 'Schedule' },
      { id: 'imports',  label: 'Imports'  },
      { id: 'data',     label: 'Data'     },
    ];

    let activeTab = 'library';
    let activeLibrarySection = 'tasks';
    let activeSettingsSection = 'family';
    let activeToolsSection = 'schedule';
    // ── Helpers ──

    async function autoPrune(months) {
      if (!months || months <= 0) return;
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - months);
      const cutoffKey = cutoff.toLocaleDateString('en-CA', { timeZone: tz });

      const db = firebase.database();
      const pruneRef = (path) => db.ref(path).orderByKey().endAt(cutoffKey).once('value').then(snap => {
        const updates = {};
        snap.forEach(child => { updates[child.key] = null; });
        if (Object.keys(updates).length > 0) return db.ref(path).update(updates);
      });

      await Promise.all([
        pruneRef('rundown/schedule'),
        pruneRef('rundown/snapshots'),
      ]);
    }

    function peopleArray() {
      return Object.entries(peopleObj).map(([id, p]) => ({ id, ...p }));
    }
    function catsArray() {
      return Object.entries(catsObj).map(([key, c]) => ({ key, ...c }));
    }
    function getAccentColors() {
      return [
        '#ef5350', '#e85d75', '#ec407a', '#f06292',
        '#ab47bc', '#8e24aa', '#7e57c2', '#5b7fd6',
        '#42a5f5', '#00acc1', '#26a69a', '#43a047',
        '#66bb6a', '#ffca28', '#ffa726', '#ff9800',
        '#ff7043', '#8d6e63', '#78909c', '#546e7a'
      ];
    }

    /**
     * Shared list row for all Library sections.
     * icon: HTML string (SVG, emoji in a span, or color swatch div)
     * primary: escaped text string
     * secondary: escaped text string or ''
     * dataAttrs: string of additional data-* attributes for the row
     */
    function renderAdminRow({ icon, primary, secondary = '', dataAttrs = '', extraClass = '' }) {
      return `<div class="admin-list-item admin-list-item--clickable${extraClass ? ' ' + extraClass : ''}" ${dataAttrs}>
    <div class="admin-icon-tile">${icon}</div>
    <div class="admin-list-item__body">
      <span class="admin-list-item__name">${primary}</span>
      ${secondary ? `<span class="admin-list-item__meta">${secondary}</span>` : ''}
    </div>
    <svg class="admin-list-item__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
  </div>`;
    }

    /**
     * 40×40 color swatch for use as the icon in renderAdminRow.
     * color: CSS color string
     */
    function renderColorSwatch(color) {
      return `<div class="admin-icon-tile__swatch" style="background:${color}"></div>`;
    }

    /**
     * Emoji tile for use as the icon in renderAdminRow.
     */
    function renderEmojiTile(emoji) {
      return `<span class="admin-icon-tile__emoji" aria-hidden="true">${emoji}</span>`;
    }

    const main = document.getElementById('mainContent');

    // ══════════════════════════════════════════
    // Main render
    // ══════════════════════════════════════════

    function render() {
      // Top-level tab bar
      let html = `<nav class="tabs tabs--pill admin-section-tabs" role="tablist" aria-label="Admin sections">`;
      for (const tab of TABS) {
        html += `<button class="tab${tab.id === activeTab ? ' is-active' : ''}" data-tab="${tab.id}" type="button" role="tab" aria-selected="${tab.id === activeTab}">${esc(tab.label)}</button>`;
      }
      html += `</nav>`;

      // Library sub-nav
      if (activeTab === 'library') {
        html += `<nav class="tabs tabs--pill admin-lib-tabs" role="tablist" aria-label="Library sections">`;
        for (const sec of LIBRARY_SECTIONS) {
          html += `<button class="tab${sec.id === activeLibrarySection ? ' is-active' : ''}" data-section="${sec.id}" type="button">${esc(sec.label)}</button>`;
        }
        html += `</nav>`;
      }

      // Settings sub-nav
      if (activeTab === 'settings') {
        html += `<nav class="tabs tabs--pill admin-settings-tabs" role="tablist" aria-label="Settings sections">`;
        for (const sec of SETTINGS_SECTIONS) {
          html += `<button class="tab${sec.id === activeSettingsSection ? ' is-active' : ''}" data-settings-section="${sec.id}" type="button">${esc(sec.label)}</button>`;
        }
        html += `</nav>`;
      }

      // Tools sub-nav
      if (activeTab === 'tools') {
        html += `<nav class="tabs tabs--pill admin-settings-tabs" role="tablist" aria-label="Tools sections">`;
        for (const sec of TOOLS_SECTIONS) {
          html += `<button class="tab${sec.id === activeToolsSection ? ' is-active' : ''}" data-tools-section="${sec.id}" type="button">${esc(sec.label)}</button>`;
        }
        html += `</nav>`;
      }

      html += `<div class="admin-content" role="tabpanel">`;

      switch (activeTab) {
        case 'library':
          switch (activeLibrarySection) {
            case 'tasks':      html += renderTasksTab();      break;
            case 'events':     html += renderEventsTab();     break;
            case 'categories': html += renderCategoriesTab(); break;
            case 'rewards':    html += renderRewardsTab();    break;
            case 'badges':     html += renderAchievementsTab(); break;
          }
          break;
        case 'people':   html += renderPeopleTab();   break;
        case 'settings': html += renderSettingsTab(); break;
        case 'tools':    html += renderToolsTab();    break;
      }

      html += `</div>`;
      main.innerHTML = html;
      applyDataColors(main);
      bindTabEvents();
      bindTabContent();
    }

    function bindTabEvents() {
      for (const tab of main.querySelectorAll('.admin-section-tabs .tab')) {
        tab.addEventListener('click', async () => {
          activeTab = tab.dataset.tab;
          selectMode = false;
          selectedTaskIds.clear();
          if (activeTab === 'library' && activeLibrarySection === 'badges') {
            allAchievements = (await readAllAchievements()) || {};
            achievementDefsObj = (await readAchievementDefs()) || {};
          }
          render();
        });
      }
      for (const pill of main.querySelectorAll('.admin-lib-tabs .tab')) {
        pill.addEventListener('click', async () => {
          activeLibrarySection = pill.dataset.section;
          selectMode = false;
          selectedTaskIds.clear();
          if (activeLibrarySection === 'badges') {
            allAchievements = (await readAllAchievements()) || {};
            achievementDefsObj = (await readAchievementDefs()) || {};
          }
          if (activeLibrarySection === 'rewards') {
            allAchievements = (await readAllAchievements()) || {};
            allMessagesObj = (await readAllMessages()) || {};
            allBankData = {};
            for (const pid of Object.keys(peopleObj)) {
              allBankData[pid] = (await readBank(pid)) || {};
            }
          }
          render();
        });
      }
      for (const pill of main.querySelectorAll('.admin-settings-tabs .tab')) {
        pill.addEventListener('click', () => {
          if (pill.dataset.settingsSection) {
            activeSettingsSection = pill.dataset.settingsSection;
          } else if (pill.dataset.toolsSection) {
            activeToolsSection = pill.dataset.toolsSection;
          }
          render();
        });
      }
    }

    // ══════════════════════════════════════════
    // Tasks Tab
    // ══════════════════════════════════════════

    let taskSearch = '';
    let taskFilter = { rotation: '', owner: '', category: '', status: '', difficulty: '' };
    let taskSort = 'name';
    let selectMode = false;
    let selectedTaskIds = new Set();

    // Per-section search + sort + filter state
    let eventsSearch = ''; let eventsSort = 'date'; let eventsOwner = ''; let eventsTimeRange = 'all';
    let catsSearch = '';   let catsSort = 'name';
    let rewardsSearch = ''; let rewardsSort = 'name'; let rewardsType = ''; let rewardsStatus = 'active';
    let badgesSearch = ''; let badgesSort = 'name'; let badgesFilter = '';

    // ── Library filter chip helpers ──

    function renderFilterSortChip(id, activeCount) {
      const label = activeCount > 0 ? `Filter &amp; Sort · ${activeCount}` : 'Filter &amp; Sort';
      const extraCls = activeCount > 0 ? ' admin-filter-chip--active' : '';
      return `<button class="btn btn--ghost btn--sm admin-filter-chip${extraCls}" id="${id}" type="button">${label} ▾</button>`;
    }

    function closeAdminSheet() {
      const sheet = document.getElementById('bottomSheet');
      sheet?.classList.remove('active');
      setTimeout(() => { document.getElementById('taskSheetMount').innerHTML = ''; }, 300);
    }

    function taskFilterActiveCount() {
      return [
        taskFilter.rotation, taskFilter.owner, taskFilter.category,
        taskFilter.status, taskFilter.difficulty,
        taskSort !== 'name' ? 'x' : '',
      ].filter(Boolean).length;
    }
    function eventsFilterActiveCount() {
      return [
        eventsTimeRange !== 'all' ? 'x' : '',
        eventsOwner,
        eventsSort !== 'date' ? 'x' : '',
      ].filter(Boolean).length;
    }
    function catsFilterActiveCount() {
      return catsSort !== 'name' ? 1 : 0;
    }
    function rewardsFilterActiveCount() {
      return [
        rewardsType,
        rewardsStatus !== 'active' ? 'x' : '',
        rewardsSort !== 'name' ? 'x' : '',
      ].filter(Boolean).length;
    }
    function badgesFilterActiveCount() {
      return [
        badgesFilter,
        badgesSort !== 'name' ? 'x' : '',
      ].filter(Boolean).length;
    }

    function renderTasksTab() {
      const pa = peopleArray();
      const ca = catsArray();
      const taskEntries = Object.entries(tasksObj);

      // Filters
      let html = `<div class="admin-section">
        <div class="admin-filters admin-filters--row">
          <input class="admin-select" type="search" id="taskSearch" placeholder="Search tasks…" value="${esc(taskSearch)}">
          ${renderFilterSortChip('taskFilterSortBtn', taskFilterActiveCount())}
        </div>
      </div>`;

      // Filtered tasks
      let filtered = taskEntries.filter(([id, t]) => {
        if (taskSearch && !(t.name || '').toLowerCase().includes(taskSearch.toLowerCase())) return false;
        // Auto-hide completed one-time tasks unless status filter is explicitly set
        if (!taskFilter.status && t.rotation === 'once' && t.status === 'completed') return false;
        if (taskFilter.rotation && t.rotation !== taskFilter.rotation) return false;
        if (taskFilter.owner && !(t.owners || []).includes(taskFilter.owner)) return false;
        if (taskFilter.category && t.category !== taskFilter.category) return false;
        if (taskFilter.status && t.status !== taskFilter.status) return false;
        if (taskFilter.difficulty && (t.difficulty || 'medium') !== taskFilter.difficulty) return false;
        return true;
      });

      // Sort
      const diffOrder = { easy: 0, medium: 1, hard: 2 };
      const rotOrder = { daily: 0, weekly: 1, monthly: 2, once: 3 };
      filtered.sort((a, b) => {
        const ta = a[1], tb = b[1];
        switch (taskSort) {
          case 'name': return (ta.name || '').localeCompare(tb.name || '');
          case 'difficulty': return (diffOrder[ta.difficulty || 'medium'] || 0) - (diffOrder[tb.difficulty || 'medium'] || 0);
          case 'points': return basePoints(tb, settings?.difficultyMultipliers) - basePoints(ta, settings?.difficultyMultipliers);
          case 'rotation': return (rotOrder[ta.rotation] ?? 9) - (rotOrder[tb.rotation] ?? 9);
          case 'estMin': return (tb.estMin || 0) - (ta.estMin || 0);
          default: return 0;
        }
      });

      if (selectMode) {
        html += `<div class="admin-list-toolbar">
          <span class="admin-list-toolbar__count">${selectedTaskIds.size} selected</span>
          <div class="admin-list-toolbar__actions">
            <button class="btn btn--ghost btn--sm" id="selectAllBtn" type="button">All</button>
            <button class="btn btn--ghost btn--sm" id="deselectAllBtn" type="button">None</button>
            <button class="btn btn--secondary btn--sm" id="cancelSelectBtn" type="button">Cancel</button>
          </div>
        </div>`;
      } else {
        html += `<div class="admin-list-toolbar">
          <span class="admin-list-toolbar__count">${filtered.length} task${filtered.length !== 1 ? 's' : ''}</span>
          <div class="admin-list-toolbar__actions">
            <button class="btn btn--ghost btn--sm" id="selectModeBtn" type="button">Select</button>
            <button class="btn btn--primary btn--sm" id="addTaskBtn" type="button">+ Add Task</button>
          </div>
        </div>`;
      }

      if (filtered.length === 0) {
        html += `<div class="admin-empty">No tasks yet. Tap + Add Task to get started.</div>`;
      } else {
        html += `<div class="admin-list" id="taskList">`;
        for (const [id, t] of filtered) {
          const cat = catsObj[t.category] || {};
          const icon = renderEmojiTile(cat.icon || '📋');
          const ownerNames = (t.owners || []).map(oid => peopleObj[oid]?.name || '?').join(', ');
          const rotLabel = { daily: 'Daily', weekly: 'Weekly', monthly: 'Monthly', once: 'One-time' }[t.rotation] || t.rotation;
          const secondary = `${rotLabel}${ownerNames ? ' · ' + ownerNames : ''}`;
          html += renderAdminRow({
            icon,
            primary: esc(t.name),
            secondary: esc(secondary),
            dataAttrs: `data-task-id="${id}"`,
            extraClass: selectMode && selectedTaskIds.has(id) ? 'admin-list-item--selected' : '',
          });
        }
        html += `</div>`;
      }

      // Floating action bar (select mode with selections)
      if (selectMode && selectedTaskIds.size > 0) {
        html += `<div class="bulk-action-bar">
          <button class="btn btn--ghost btn--sm" id="bulkCancelBtn" type="button">Cancel</button>
          <button class="btn btn--danger btn--sm" id="bulkDeleteBtn" type="button">Delete ${selectedTaskIds.size}</button>
          <button class="btn btn--primary btn--sm" id="bulkEditBtn" type="button">Edit ${selectedTaskIds.size}</button>
        </div>`;
      }

      return html;
    }

    function openTasksFilterSheet() {
      const mount = document.getElementById('taskSheetMount');
      const pa = peopleArray();

      const statusOpts = [{v:'',l:'All'},{v:'active',l:'Active'},{v:'paused',l:'Paused'},{v:'completed',l:'Completed'}];

      mount.innerHTML = renderBottomSheet(`
        <h3 class="sheet-section-title">Filter &amp; Sort</h3>

        <div class="fs-section">
          <div class="fs-section__label">Sort by</div>
          <div class="chip-group" id="fs_sort">

            ${pa.map(p => `<button class="chip chip--selectable${taskFilter.owner===p.id?' chip--active':''}" data-owner="${p.id}" style="--person-color:${p.color}" type="button">${esc(p.name)}</button>`).join('')}
          </div>
        </div>

        <div class="fs-section">
          <div class="fs-section__label">Category</div>
          <div class="chip-group" id="fs_category">
            <button class="chip chip--selectable${!taskFilter.category?' chip--active':''}" data-cat="" type="button">All</button>
            ${ca.map(c => `<button class="chip chip--selectable${taskFilter.category===c.key?' chip--active':''}" data-cat="${esc(c.key)}" type="button">${esc(c.icon)} ${esc(c.label)}</button>`).join('')}
          </div>
        </div>

        <div class="fs-section">
          <div class="fs-section__label">Status</div>
          <div class="chip-group" id="fs_status">
            ${statusOpts.map(({v,l}) => `<button class="chip chip--selectable${taskFilter.status===v?' chip--active':''}" data-status="${v}" type="button">${l}</button>`).join('')}
          </div>
        </div>

        <div class="fs-section">
          <div class="fs-section__label">Difficulty</div>
          <div class="chip-group" id="fs_diff">
            ${diffOpts.map(({v,l}) => `<button class="chip chip--selectable${taskFilter.difficulty===v?' chip--active':''}" data-diff="${v}" type="button">${l}</button>`).join('')}
          </div>
        </div>

        <div class="sheet-actions">
          <button class="btn btn--ghost" id="fsTasksClear" type="button">Clear</button>
          <button class="btn btn--primary" id="fsTasksApply" type="button">Apply</button>
        </div>
      `);

      requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

      mount.querySelector('.bottom-sheet')?.addEventListener('click', e => {
        const chip = e.target.closest('.chip--selectable');
        if (!chip) return;
        const group = chip.closest('.chip-group');
        if (!group) return;
        group.querySelectorAll('.chip--selectable').forEach(c => c.classList.remove('chip--active'));
        chip.classList.add('chip--active');
      });

      document.getElementById('bottomSheet')?.addEventListener('click', e => {
        if (e.target.id === 'bottomSheet') closeAdminSheet();
      });

      document.getElementById('fsTasksApply')?.addEventListener('click', () => {
        taskSort = mount.querySelector('#fs_sort .chip--active')?.dataset.sort || 'name';
        taskFilter.rotation = mount.querySelector('#fs_rotation .chip--active')?.dataset.rotation || '';
        taskFilter.owner = mount.querySelector('#fs_owner .chip--active')?.dataset.owner || '';
        taskFilter.category = mount.querySelector('#fs_category .chip--active')?.dataset.cat || '';
        taskFilter.status = mount.querySelector('#fs_status .chip--active')?.dataset.status || '';
        taskFilter.difficulty = mount.querySelector('#fs_diff .chip--active')?.dataset.diff || '';
        closeAdminSheet();
        render();
      }, { once: true });

      document.getElementById('fsTasksClear')?.addEventListener('click', () => {
        taskFilter = { rotation: '', owner: '', category: '', status: '', difficulty: '' };
        taskSort = 'name';
        closeAdminSheet();
        render();

    function openAdminTaskSheet(taskId = null) {
      const baseTask = taskId ? (tasksObj[taskId] || {}) : {};
      const mode = taskId ? 'edit' : 'create';
      const catsArr = catsArray();
      const pa = peopleArray();

      const mount = document.getElementById('taskSheetMount');
      const html = renderTaskForm({ task: baseTask, taskId, mode, categories: catsArr, people: pa });
      mount.innerHTML = renderBottomSheet(html);

      mount.querySelectorAll('.ef2-person-chip[data-person-color]').forEach(chip => {
        chip.style.setProperty('--chip-color', chip.dataset.personColor);
      });

      requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

      function tfHidePicker() { document.getElementById('tf_pickerOverlay')?.remove(); }
      const doClose = () => { tfHidePicker(); closeAdminSheet(); };

      document.getElementById('tf_close')?.addEventListener('click', doClose);
      document.getElementById('bottomSheet')?.addEventListener('click', e => {
        if (e.target === document.getElementById('bottomSheet')) doClose();
      });

      // ── Person chip state machine ─────────────────────────────
      const peopleWrap = document.getElementById('tf_people');
      function tfGetOwnerIds() {
        return [...(peopleWrap?.querySelectorAll('.ef2-person-chip') || [])]
          .filter(c => c.dataset.state === 'primary').map(c => c.dataset.personId);
      }
      function tfUpdateAssignRow() {
        document.getElementById('tf_assignRow')?.classList.toggle('is-hidden', tfGetOwnerIds().length < 2);
      }
      peopleWrap?.querySelectorAll('.ef2-person-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          if (chip.dataset.state === 'primary') chip.removeAttribute('data-state');
          else chip.setAttribute('data-state', 'primary');
          tfUpdateAssignRow();
        });
      });

      // ── Assign mode pills ─────────────────────────────────────
      document.getElementById('tf_assignRow')?.querySelectorAll('.tf-assign-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('tf_assignRow')?.querySelectorAll('.tf-assign-pill').forEach(b => b.classList.remove('tf-assign-pill--active'));
          btn.classList.add('tf-assign-pill--active');
        });
      });

      // ── Rotation pills ────────────────────────────────────────
      let tfRotation = baseTask.rotation || 'daily';
      function tfUpdateRotation(rot) {
        tfRotation = rot;
        document.getElementById('tf_rotation')?.querySelectorAll('.tf-rot-pill').forEach(p => {
          p.classList.toggle('tf-rot-pill--active', p.dataset.rot === rot);
        });
        document.getElementById('tf_weeklyReveal')?.classList.toggle('is-open', rot !== 'once');
        document.getElementById('tf_onceReveal')?.classList.toggle('is-open', rot === 'once');
        const showCd = rot === 'weekly' || rot === 'monthly';
        const chip = document.getElementById('tf_optionsChip');
        if (chip) chip.dataset.showCd = showCd ? '1' : '';
        document.getElementById('tf_cooldownRow')?.classList.toggle('is-hidden', !showCd);
        const cdInput = document.getElementById('tf_cooldown');
        if (cdInput && !cdInput.value) {
          cdInput.placeholder = rot === 'weekly' ? '3' : rot === 'monthly' ? '7' : '';
        }
      }
      document.getElementById('tf_rotation')?.querySelectorAll('.tf-rot-pill').forEach(pill => {
        pill.addEventListener('click', () => tfUpdateRotation(pill.dataset.rot));
      });

      // ── Detail chip pickers ───────────────────────────────────
      let tfDiff = baseTask.difficulty || 'medium';
      let tfDur  = baseTask.estMin ?? 10;
      let tfTod  = baseTask.timeOfDay || 'anytime';
      let tfCat  = baseTask.category || catsArr.find(c => c.isDefault)?.key || '';

      function tfShowPicker(field, chipEl) {
        tfHidePicker();
        const DUR_PRESETS = [5, 10, 15, 20, 30, 45, 60];
        let inner = '';
        if (field === 'diff') {
          inner = `<div class="tf-picker-cells">
            ${[['easy','Easy'],['medium','Medium'],['hard','Hard']].map(([v,l]) =>
              `<button class="tf-picker-cell${tfDiff === v ? ' tf-picker-cell--active' : ''}" data-pick-val="${v}" data-pick-label="${l}" type="button">${l}</button>`
            ).join('')}
          </div>`;
        } else if (field === 'dur') {
          inner = `<div class="tf-dur-grid">
            ${DUR_PRESETS.map(v =>
              `<button class="tf-dur-cell${tfDur === v ? ' tf-dur-cell--active' : ''}" data-pick-val="${v}" data-pick-label="${v} min" type="button">${v}</button>`
            ).join('')}
            <button class="tf-dur-cell" data-pick-val="custom" type="button">...</button>
          </div>
          <div class="tf-dur-custom-wrap is-hidden" id="tf_durCustomWrap">
            <input type="number" id="tf_durCustom" min="1" max="300" placeholder="Minutes" value="${!DUR_PRESETS.includes(tfDur) ? tfDur : ''}">
          </div>`;
        } else if (field === 'tod') {
          inner = `<div class="tf-picker-cells">
            ${[['am','Morning'],['anytime','Anytime'],['pm','Afternoon'],['both','Both']].map(([v,l]) =>
              `<button class="tf-picker-cell${tfTod === v ? ' tf-picker-cell--active' : ''}" data-pick-val="${v}" data-pick-label="${l}" type="button">${l}</button>`
            ).join('')}
          </div>`;
        } else if (field === 'cat') {
          inner = `<div class="tf-cat-list">
            ${catsArr.map(c =>
              `<button class="tf-cat-item${tfCat === c.key ? ' tf-cat-item--active' : ''}" data-pick-val="${esc(c.key)}" data-pick-label="${esc((c.icon||'')+' '+c.label)}" type="button">
                <span class="tf-cat-icon">${c.icon||''}</span>
                <span class="tf-cat-label">${esc(c.label)}</span>
              </button>`
            ).join('')}
          </div>`;
        }
        const overlay = document.createElement('div');
        overlay.className = 'tf-picker-overlay';
        overlay.id = 'tf_pickerOverlay';
        overlay.innerHTML = `<div class="tf-picker-backdrop"></div><div class="tf-picker" id="tf_pickerInner">${inner}</div>`;
        document.body.appendChild(overlay);

        const rect = chipEl.getBoundingClientRect();
        const picker = overlay.querySelector('.tf-picker');
        const W = Math.min(280, window.innerWidth - 32);
        picker.style.width = `${W}px`;
        let left = rect.left;
        if (left + W > window.innerWidth - 16) left = window.innerWidth - W - 16;
        if (left < 16) left = 16;
        picker.style.left = `${left}px`;
        if (window.innerHeight - rect.bottom > 200) {
          picker.style.top = `${rect.bottom + 8}px`;
        } else {
          picker.style.bottom = `${window.innerHeight - rect.top + 8}px`;
        }
        overlay.querySelector('.tf-picker-backdrop').addEventListener('click', tfHidePicker);
        overlay.querySelector('[data-pick-val="custom"]')?.addEventListener('click', () => {
          overlay.querySelector('#tf_durCustomWrap')?.classList.remove('is-hidden');
          overlay.querySelector('#tf_durCustom')?.focus();
        });
        const customInput = overlay.querySelector('#tf_durCustom');
        if (customInput) {
          const confirmCustom = () => { const v = parseInt(customInput.value, 10); if (v > 0) tfOnPickerSelect('dur', v, `${v} min`); };
          customInput.addEventListener('keydown', e => { if (e.key === 'Enter') confirmCustom(); });
          customInput.addEventListener('blur', confirmCustom);
        }
        overlay.querySelectorAll('[data-pick-val]:not([data-pick-val="custom"])').forEach(btn => {
          btn.addEventListener('click', () => tfOnPickerSelect(field, btn.dataset.pickVal, btn.dataset.pickLabel || btn.textContent.trim()));
        });
      }

      function tfOnPickerSelect(field, val, label) {
        if (field === 'diff') { tfDiff = val; document.getElementById('tf_diffChip').textContent = label; }
        else if (field === 'dur') { tfDur = typeof val === 'number' ? val : parseInt(val, 10); document.getElementById('tf_durChip').textContent = label || `${tfDur} min`; }
        else if (field === 'tod') { tfTod = val; document.getElementById('tf_todChip').textContent = label; }
        else if (field === 'cat') { tfCat = val; document.getElementById('tf_catChip').textContent = label; }
        tfHidePicker();
      }

      document.getElementById('tf_diffChip')?.addEventListener('click', e => tfShowPicker('diff', e.currentTarget));
      document.getElementById('tf_durChip')?.addEventListener('click',  e => tfShowPicker('dur',  e.currentTarget));
      document.getElementById('tf_todChip')?.addEventListener('click',  e => tfShowPicker('tod',  e.currentTarget));
      document.getElementById('tf_catChip')?.addEventListener('click',  e => tfShowPicker('cat',  e.currentTarget));

      // ── Notes reveal ──────────────────────────────────────────
      document.getElementById('tf_notesChip')?.addEventListener('click', () => {
        const reveal = document.getElementById('tf_notesReveal');
        const chip   = document.getElementById('tf_notesChip');
        const open   = reveal?.classList.toggle('is-open');
        chip?.classList.toggle('is-active', open);
        if (open) document.getElementById('tf_notes')?.focus();
      });
      document.getElementById('tf_notesClose')?.addEventListener('click', () => {
        document.getElementById('tf_notesReveal')?.classList.remove('is-open');
        document.getElementById('tf_notesChip')?.classList.remove('is-active');
      });

      // ── Options reveal ────────────────────────────────────────
      document.getElementById('tf_optionsChip')?.addEventListener('click', () => {
        document.getElementById('tf_optionsReveal')?.classList.toggle('is-open');
        document.getElementById('tf_optionsChip')?.classList.toggle('is-active');
      });

      // ── Exempt toggle ─────────────────────────────────────────
      document.getElementById('tf_exempt')?.addEventListener('click', e => {
        const btn = e.currentTarget;
        const on  = btn.classList.toggle('is-active');
        btn.textContent = on ? 'On' : 'Off';
      });

      // ── Save ──────────────────────────────────────────────────
      document.getElementById('tf_save')?.addEventListener('click', async () => {
        const name = document.getElementById('tf_name')?.value.trim();
        if (!name) {
          const inp = document.getElementById('tf_name');
          inp?.classList.add('is-invalid');
          inp?.focus();
          setTimeout(() => inp?.classList.remove('is-invalid'), 600);
          return;
        }

        const ownerIds = tfGetOwnerIds();
        const assignPill = document.getElementById('tf_assignRow')?.querySelector('.tf-assign-pill--active')?.dataset.mode;
        const ownerAssignmentMode = ownerIds.length <= 1 ? 'fixed' : (assignPill === 'everyone' ? 'duplicate' : 'rotate');
        const rotation = tfRotation;
        const dayVal = document.getElementById('tf_daySelect')?.value;
        const dedicatedDay = rotation === 'weekly'
          ? (dayVal !== '' && dayVal != null ? parseInt(dayVal, 10) : null)
          : null;
        const dedicatedDate = rotation === 'once' ? (document.getElementById('tf_onceDate')?.value || null) : null;
        const showCd = rotation === 'weekly' || rotation === 'monthly';
        const cdVal  = document.getElementById('tf_cooldown')?.value;
        const cdDefault = rotation === 'weekly' ? 3 : rotation === 'monthly' ? 7 : 0;
        const cooldownDays = showCd
          ? (cdVal !== '' ? (parseInt(cdVal, 10) || cdDefault) : cdDefault)
          : null;
        const exempt = document.getElementById('tf_exempt')?.classList.contains('is-active') || false;
        const notes  = document.getElementById('tf_notes')?.value.trim() || null;

        const existing = taskId ? (tasksObj[taskId] || {}) : {};
        const taskData = {
          name,
          rotation,
          difficulty: tfDiff,
          timeOfDay: tfTod,
          estMin: tfDur,
          category: tfCat,
          owners: ownerIds,
          ownerAssignmentMode,
          dedicatedDay,
          dedicatedDate,
          eventTime: existing.eventTime || null,
          notes: notes || null,
          cooldownDays: cooldownDays || null,
          exempt,
          bounty: taskId ? (existing.bounty ?? null) : null,
          status: existing.status || 'active',
        };

        const saveBtn = document.getElementById('tf_save');
        if (saveBtn) saveBtn.disabled = true;

        if (!taskId) {
          taskData.createdDate = today;
          const newId = await pushTask(taskData);
          tasksObj[newId] = taskData;

          const skipToday = (rotation === 'once' && dedicatedDate && dedicatedDate !== today)
            || ((rotation === 'weekly' || rotation === 'monthly') && dedicatedDay != null && dayOfWeek(today) !== dedicatedDay);
          if (ownerIds.length > 0 && !skipToday) {
            const schedUpdates = {};
            const baseEntry = { taskId: newId, rotationType: rotation, ownerAssignmentMode, timeOfDay: tfTod };
            let counter = 0;
            const newKey = () => `sched_${Date.now()}_${String(counter++).padStart(5, '0')}`;
            if (ownerAssignmentMode === 'duplicate') {
              for (const oid of ownerIds) {
                if (tfTod === 'both') {
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'am' };
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'pm' };
                } else {
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: tfTod };
                }
              }
            } else {
              const ownerId = ownerAssignmentMode === 'fixed' ? ownerIds[0] : getRotationOwner(taskData, today, newId);
              if (tfTod === 'both') {
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'am' };
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'pm' };
              } else {
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: tfTod };
              }
            }
            await multiUpdate(schedUpdates);
          }
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, undefined, catsObj);
          await multiUpdate(futureUpdates);
        } else {
          taskData.createdDate = existing.createdDate || today;
          await writeTask(taskId, taskData);
          tasksObj[taskId] = taskData;
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, { includeToday: true }, catsObj);
          await multiUpdate(futureUpdates);
        }

        tfHidePicker();
        closeAdminSheet();
        render();
      });

      // ── Delete (edit mode only) ───────────────────────────────
      document.getElementById('tf_delete')?.addEventListener('click', async () => {
        if (!taskId) return;
        const name = tasksObj[taskId]?.name || 'this task';
        if (!await showConfirm({ title: `Delete "${name}"?`, danger: true })) return;
        const updates = { [`tasks/${taskId}`]: null };
        const allSched = await readAllSchedule() || {};
        for (const [dateKey, dayEntries] of Object.entries(allSched)) {
          for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
            if (entry.taskId === taskId) updates[`schedule/${dateKey}/${entryKey}`] = null;
          }
        }
        await multiUpdate(updates);
        delete tasksObj[taskId];
        tfHidePicker();
        closeAdminSheet();
        render();
      });
    }

    function renderEventsTab() {
      let html = '';

      html += `<div class="admin-filters admin-filters--row">
  <input class="admin-select" type="search" id="eventsSearch" placeholder="Search events…" value="${esc(eventsSearch)}">
  ${renderFilterSortChip('eventsFilterSortBtn', eventsFilterActiveCount())}
  <button class="btn btn--primary btn--sm" id="addEventBtn" type="button">+ Add Event</button>
</div>`;

      let evEntries = Object.entries(eventsObj || {});
      if (eventsSearch) evEntries = evEntries.filter(([, ev]) => (ev.name || '').toLowerCase().includes(eventsSearch.toLowerCase()));
      if (eventsOwner) evEntries = evEntries.filter(([, ev]) => (ev.people || []).includes(eventsOwner));
      if (eventsTimeRange === 'upcoming') evEntries = evEntries.filter(([, ev]) => (ev.date || '') >= today);
      else if (eventsTimeRange === 'past') evEntries = evEntries.filter(([, ev]) => (ev.date || '') < today);
      evEntries.sort((a, b) => eventsSort === 'name'
        ? (a[1].name || '').localeCompare(b[1].name || '')
        : (a[1].date || '').localeCompare(b[1].date || ''));

      if (evEntries.length === 0) {
        html += `<div class="admin-empty">No events yet. Tap + Add Event to create one.</div>`;
      } else {
        html += `<div class="admin-list" id="eventList">`;
        for (const [id, ev] of evEntries) {
          const color = ev.color || '#4285f4';
          const icon = renderColorSwatch(color);
          const dateStr = ev.date
            ? new Date(ev.date + 'T12:00:00Z').toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric',
                timeZone: settings?.timezone || 'UTC',
              })
            : '';
          const timeStr = ev.allDay ? 'All day' : [ev.startTime, ev.endTime].filter(Boolean).join(' – ');
          const secondary = [dateStr, timeStr].filter(Boolean).join(' · ');
          html += renderAdminRow({
            icon,
            primary: esc(ev.name || 'Untitled'),
            secondary: esc(secondary),
            dataAttrs: `data-event-id="${id}"`,
          });
        }
        html += `</div>`;
      }

      return html;
    }

    function openEventFormAdmin(existingEventId = null, savedState = null) {
      const event = savedState || (existingEventId ? eventsObj[existingEventId] : {});
      const mode = existingEventId ? 'edit' : 'create';
      const taskSheetMount = document.getElementById('taskSheetMount');
      const html = renderEventForm({ event, eventId: existingEventId, people: peopleArray(), dateKey: today, mode });
      taskSheetMount.innerHTML = renderBottomSheet(html);
      taskSheetMount.querySelectorAll('.ef2-person-chip[data-person-color]').forEach(chip => {
        chip.style.setProperty('--chip-color', chip.dataset.personColor);
      });
      applyDataColors(taskSheetMount);

      requestAnimationFrame(() => {
        document.getElementById('bottomSheet')?.classList.add('active');
        if (mode === 'create') document.getElementById('ef2_name')?.focus();
      });

      document.getElementById('ef2_close')?.addEventListener('click', closeAdminSheet);
      document.getElementById('bottomSheet')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('bottomSheet')) closeAdminSheet();
      });

      const dateBtn = document.getElementById('ef2_dateBtn');
      const datePicker = document.getElementById('ef2_datePicker');
      const dateDisplay = document.getElementById('ef2_dateDisplay');
      const dateInput = document.getElementById('ef2_date');
      const timePicker = document.getElementById('ef2_timePicker');
      const timeBtn = document.getElementById('ef2_timeBtn');
      const timeDisplay = document.getElementById('ef2_timeDisplay');

      function ef2GetTime(prefix) {
        const raw = (document.getElementById(`ef2_${prefix}Text`)?.value || '').replace(/\D/g, '');
        const ampm = document.getElementById(`ef2_${prefix}AmPm`)?.dataset.ampm || 'AM';
        if (!raw) return '';
        let h, m;
        if (raw.length <= 2) { h = parseInt(raw, 10); m = 0; }
        else if (raw.length === 3) { h = parseInt(raw[0], 10); m = parseInt(raw.slice(1), 10); }
        else { h = parseInt(raw.slice(0, 2), 10); m = parseInt(raw.slice(2, 4), 10); }
        if (isNaN(h) || h < 1 || h > 12) return '';
        if (isNaN(m) || m > 59) m = 0;
        let h24 = h;
        if (ampm === 'AM' && h === 12) h24 = 0;
        else if (ampm === 'PM' && h !== 12) h24 = h + 12;
        return `${String(h24).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      }

      dateBtn?.addEventListener('click', () => {
        const open = datePicker.classList.toggle('is-open');
        if (open) timePicker?.classList.remove('is-open');
      });
      dateInput?.addEventListener('change', () => {
        dateDisplay.textContent = dateInput.value ? formatDateShort(dateInput.value) : 'Set date';
        datePicker?.classList.remove('is-open');
      });
      timeBtn?.addEventListener('click', () => {
        const open = timePicker.classList.toggle('is-open');
        if (open) datePicker?.classList.remove('is-open');
      });

      function updateTimeDisplay() {
        if (document.getElementById('ef2_allDay')?.classList.contains('is-active')) return;
        const s = ef2GetTime('start');
        const e = ef2GetTime('end');
        if (timeDisplay) {
          const fmt = (t) => {
            if (!t) return '';
            const [h, min] = t.split(':').map(Number);
            const ap = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return min === 0 ? `${h12} ${ap}` : `${h12}:${String(min).padStart(2, '0')} ${ap}`;
          };
          timeDisplay.textContent = s ? `${fmt(s)} → ${fmt(e)}` : 'Set time';
        }
      }

      ['ef2_startText', 'ef2_endText'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', updateTimeDisplay);
      });
      ['ef2_startAmPm', 'ef2_endAmPm'].forEach(id => {
        const btn = document.getElementById(id);
        btn?.addEventListener('click', () => {
          const curr = btn.dataset.ampm || 'AM';
          const next = curr === 'AM' ? 'PM' : 'AM';
          btn.dataset.ampm = next; btn.textContent = next;
          updateTimeDisplay();
        });
      });

      document.getElementById('ef2_allDay')?.addEventListener('click', () => {
        const allDayBtn = document.getElementById('ef2_allDay');
        allDayBtn.classList.toggle('is-active');
        const isAllDay = allDayBtn.classList.contains('is-active');
        document.getElementById('ef2_timeBtn')?.classList.toggle('ef2-hidden', isAllDay);
        document.getElementById('ef2_timePicker')?.classList.toggle('ef2-hidden', isAllDay);
        if (isAllDay) document.getElementById('ef2_timePicker')?.classList.remove('is-open');
        if (!isAllDay) updateTimeDisplay();
      });

      const peopleWrap = document.getElementById('ef2_people');
      function getPrimaryChip() { return peopleWrap?.querySelector('.ef2-person-chip[data-state="primary"]'); }
      peopleWrap?.addEventListener('click', (e) => {
        const chip = e.target.closest('.ef2-person-chip');
        if (!chip) return;
        const currentState = chip.dataset.state;
        if (!currentState) {
          chip.setAttribute('data-state', getPrimaryChip() ? 'attending' : 'primary');
        } else if (currentState === 'attending') {
          const oldPrimary = getPrimaryChip();
          if (oldPrimary) oldPrimary.setAttribute('data-state', 'attending');
          chip.setAttribute('data-state', 'primary');
        } else if (currentState === 'primary') {
          chip.removeAttribute('data-state');
          const firstAttending = peopleWrap.querySelector('.ef2-person-chip[data-state="attending"]');
          if (firstAttending) firstAttending.setAttribute('data-state', 'primary');
        }
      });

      document.getElementById('ef2_notesChip')?.addEventListener('click', () => {
        const reveal = document.getElementById('ef2_notesReveal');
        const isOpen = reveal?.classList.contains('is-open');
        if (isOpen) { reveal.classList.remove('is-open'); document.getElementById('ef2_notesChip')?.classList.remove('is-active'); }
        else { reveal?.classList.add('is-open'); document.getElementById('ef2_notesChip')?.classList.add('is-active'); document.getElementById('ef2_notes')?.focus(); }
      });
      document.getElementById('ef2_notesClose')?.addEventListener('click', () => {
        document.getElementById('ef2_notesReveal')?.classList.remove('is-open');
        document.getElementById('ef2_notesChip')?.classList.remove('is-active');
      });
      document.getElementById('ef2_locChip')?.addEventListener('click', () => {
        const reveal = document.getElementById('ef2_locReveal');
        const isOpen = reveal?.classList.contains('is-open');
        if (isOpen) { reveal.classList.remove('is-open'); document.getElementById('ef2_locChip')?.classList.remove('is-active'); }
        else { reveal?.classList.add('is-open'); document.getElementById('ef2_locChip')?.classList.add('is-active'); document.getElementById('ef2_location')?.focus(); }
      });
      document.getElementById('ef2_locClose')?.addEventListener('click', () => {
        document.getElementById('ef2_locReveal')?.classList.remove('is-open');
        document.getElementById('ef2_locChip')?.classList.remove('is-active');
      });

      let currentRepeat = event.repeat || null;
      document.getElementById('ef2_repeatChip')?.addEventListener('click', () => {
        const formState = captureFormState();
        openAdminRepeatSheet(currentRepeat, (newRule) => {
          currentRepeat = newRule;
          openEventFormAdmin(existingEventId, { ...formState, repeat: currentRepeat });
        }, () => openEventFormAdmin(existingEventId, formState));
      });

      function captureFormState() {
        const primaryChip = getPrimaryChip();
        const attendingChips = [...(peopleWrap?.querySelectorAll('.ef2-person-chip[data-state="attending"]') || [])];
        const peoplArr = [];
        if (primaryChip) peoplArr.push(primaryChip.dataset.personId);
        attendingChips.forEach(c => peoplArr.push(c.dataset.personId));
        return {
          name: document.getElementById('ef2_name')?.value || '',
          date: document.getElementById('ef2_date')?.value || today,
          allDay: document.getElementById('ef2_allDay')?.classList.contains('is-active') || false,
          startTime: ef2GetTime('start') || '09:00',
          endTime: ef2GetTime('end') || '10:00',
          people: peoplArr,
          notes: document.getElementById('ef2_notes')?.value || '',
          location: document.getElementById('ef2_location')?.value || '',
          notesOpen: document.getElementById('ef2_notesReveal')?.classList.contains('is-open') || false,
          locOpen: document.getElementById('ef2_locReveal')?.classList.contains('is-open') || false,
          repeat: currentRepeat,
        };
      }

      document.getElementById('ef2_save')?.addEventListener('click', async () => {
        const name = document.getElementById('ef2_name')?.value.trim();
        if (!name) {
          const inp = document.getElementById('ef2_name');
          inp?.classList.add('ef2-shake'); inp?.focus();
          inp?.addEventListener('animationend', () => inp.classList.remove('ef2-shake'), { once: true });
          return;
        }
        const formState = captureFormState();
        formState.name = name;
        const primaryId = formState.people[0] || null;
        const primaryPerson = peopleArray().find(p => p.id === primaryId);
        const color = primaryPerson?.color || peopleArray()[0]?.color || '#4285f4';
        const eventData = {
          name: formState.name,
          date: formState.date || today,
          allDay: formState.allDay,
          startTime: formState.allDay ? null : (formState.startTime || null),
          endTime: formState.allDay ? null : (formState.endTime || null),
          color,
          people: formState.people,
          location: formState.location || null,
          notes: formState.notes || null,
          repeat: formState.repeat || null,
          createdDate: existingEventId ? (eventsObj[existingEventId]?.createdDate || today) : today,
        };
        const saveBtn = document.getElementById('ef2_save');
        if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '…'; }
        try {
          if (existingEventId) {
            const oldEvent = eventsObj[existingEventId];
            await writeEvent(existingEventId, eventData);
            eventsObj[existingEventId] = eventData;
            if (oldEvent && oldEvent.date !== eventData.date) {
              const allSched = await readAllSchedule() || {};
              const moveUpdates = {};
              for (const [dk, dayEntries] of Object.entries(allSched)) {
                for (const [ek, entry] of Object.entries(dayEntries || {})) {
                  if (entry.type === 'event' && entry.eventId === existingEventId) {
                    moveUpdates[`schedule/${dk}/${ek}`] = null;
                  }
                }
              }
              const newSchedKey = `sched_${Date.now()}_event`;
              moveUpdates[`schedule/${eventData.date}/${newSchedKey}`] = { type: 'event', eventId: existingEventId };
              await multiUpdate(moveUpdates);
            }
          } else {
            const newId = await pushEvent(eventData);
            eventsObj[newId] = eventData;
            const schedKey = `sched_${Date.now()}_event`;
            await multiUpdate({ [`schedule/${eventData.date}/${schedKey}`]: { type: 'event', eventId: newId } });
          }
          closeAdminSheet();
          render();
        } catch (err) {
          if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = '✓'; }
          const errEl = document.getElementById('ef2_importError');
          if (errEl) { errEl.textContent = "Couldn't save — try again."; errEl.classList.add('is-visible'); }
        }
      });

      document.getElementById('ef2_delete')?.addEventListener('click', async () => {
        if (!existingEventId) return;
        const name = eventsObj[existingEventId]?.name || 'this event';
        if (!await showConfirm({ title: `Delete "${name}"?`, danger: true })) return;
        try {
          await removeEvent(existingEventId);
          delete eventsObj[existingEventId];
          closeAdminSheet();
          render();
        } catch (err) {
          const errEl = document.getElementById('ef2_importError');
          if (errEl) { errEl.textContent = "Couldn't delete — try again."; errEl.classList.add('is-visible'); }
        }
      });
    }

    function openAdminRepeatSheet(currentRule, onDone, onCancel) {

      requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));
      const getSelectedType = () => taskSheetMount.querySelector('.ef2-repeat-option.is-selected')?.dataset.type || 'none';

          opt.classList.add('is-selected');

      taskSheetMount.querySelector('#rs_cancel')?.addEventListener('click', () => {

        const rule = type === 'none' ? null : { type };
        closeAdminSheet();
        if (onDone) setTimeout(() => onDone(rule), 320);
      });
    }

    function openAdminCatSheet(catKey) {
      const isNew = catKey === 'new';
      const mount = document.getElementById('taskSheetMount');
      if (!mount) return;
      mount.innerHTML = renderBottomSheet(`
        <h3 class="sheet-section-title">${isNew ? 'New Category' : 'Edit Category'}</h3>
        ${renderCategoryForm(isNew ? null : catKey)}
      `);
      requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });
      document.getElementById('bottomSheet')?.addEventListener('click', e => {
        if (e.target.id === 'bottomSheet') closeAdminSheet();
      });

      initColorButton(mount.querySelector('#cf_eventColor')?.closest('.cpick-wrap'), null);

      const eventCheckbox = mount.querySelector('#cf_isEvent');
      const eventColorRow = mount.querySelector('#eventColorRow');
      const catLimitsRow = mount.querySelector('#catLimitsRow');
      eventCheckbox?.addEventListener('change', () => {
        if (eventColorRow) eventColorRow.style.display = eventCheckbox.checked ? '' : 'none';
        if (catLimitsRow) catLimitsRow.style.display = eventCheckbox.checked ? 'none' : 'flex';
      });

      mount.querySelector('#catFormCancel')?.addEventListener('click', () => { closeAdminSheet(); });

      mount.querySelector('#catFormDelete')?.addEventListener('click', async () => {
        const ca = catsArray();
        if (ca.length <= 1) { await showConfirm({ title: 'Cannot delete the last category', alert: true }); return; }
        const defaultEntry = Object.entries(catsObj).find(([k, c]) => k !== catKey && c?.isDefault);
        const fallbackKey = defaultEntry ? defaultEntry[0] : (Object.keys(catsObj).find(k => k !== catKey) || 'chores');
        const fallbackLabel = catsObj[fallbackKey]?.label || fallbackKey;
        if (!await showConfirm({ title: `Delete category "${catsObj[catKey]?.label}"?`, message: `Tasks will be reassigned to "${fallbackLabel}".`, danger: true })) return;
        for (const [taskId, task] of Object.entries(tasksObj)) {
          if (task.category === catKey) { task.category = fallbackKey; await writeTask(taskId, task); }
        }
        delete catsObj[catKey];
        await writeCategories(catsObj);
        closeAdminSheet();
        render();
      });

      mount.querySelector('#catFormSave')?.addEventListener('click', async () => {
        const icon = mount.querySelector('#cf_icon')?.value.trim() || '📌';
        const label = mount.querySelector('#cf_label')?.value.trim();
        if (!label) { mount.querySelector('#cf_label')?.focus(); return; }
        const weight = mount.querySelector('#cf_weight')?.value;
        const showIcon = mount.querySelector('#cf_showIcon')?.checked ?? true;
        const pinProtected = mount.querySelector('#cf_pinProtected')?.checked || false;
        const isDefault = mount.querySelector('#cf_isDefault')?.checked || false;
        const isEvent = mount.querySelector('#cf_isEvent')?.checked || false;
        const limitPerson = mount.querySelector('#cf_limitPerson')?.value;
        const limitHousehold = mount.querySelector('#cf_limitHousehold')?.value;
        if (isDefault) {
          for (const [k, c] of Object.entries(catsObj)) { if (c.isDefault) c.isDefault = false; }
        }
        const catData = {
          label, icon, showIcon, pinProtected, isDefault, isEvent,
          eventColor: isEvent ? (mount.querySelector('#cf_eventColor')?.value || '#5b7fd6') : null,
          weightPercent: isEvent ? null : (weight ? parseInt(weight, 10) : null),
          dailyLimitPerPerson: isEvent ? null : (limitPerson ? parseInt(limitPerson, 10) : null),
          dailyLimitPerHousehold: isEvent ? null : (limitHousehold ? parseInt(limitHousehold, 10) : null)
        };
        if (isNew) {
          const key = label.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
          if (catsObj[key]) { await showConfirm({ title: 'A category with this key already exists', alert: true }); return; }
          catsObj[key] = catData;
        } else {
          catsObj[catKey] = catData;
        }
        await writeCategories(catsObj);
        closeAdminSheet();
        render();
      });
    }

    async function loadScheduleStats() {
      const el = document.getElementById('scheduleStats');
      if (!el) return;

      const allSchedule = await readAllSchedule() || {};
      const tomorrow = addDays(today, 1);
      const futureDates = Object.keys(allSchedule).filter(d => d >= tomorrow).sort();
      const pa = peopleArray();

      let totalEntries = 0;
      let totalMinutes = 0;
      const perPerson = {};
      const perPersonMin = {};
      for (const p of pa) { perPerson[p.id] = 0; perPersonMin[p.id] = 0; }

      for (const dateKey of futureDates) {
        const dayEntries = allSchedule[dateKey] || {};
        const entries = Object.values(dayEntries);
        totalEntries += entries.length;
        for (const e of entries) {
          const task = tasksObj[e.taskId];
          const mins = task ? (task.estMin || 0) : 0;
          totalMinutes += mins;
          if (perPerson[e.ownerId] !== undefined) {
            perPerson[e.ownerId]++;
            perPersonMin[e.ownerId] += mins;
          }
        }
      }

      const totalHrs = Math.floor(totalMinutes / 60);
      const totalRem = totalMinutes % 60;
      const totalTimeStr = totalHrs > 0 ? `${totalHrs}h ${totalRem}m` : `${totalRem}m`;
      const avgTasksPerDay = futureDates.length > 0 ? (totalEntries / futureDates.length).toFixed(1) : '—';
      const avgMinsPerDay = futureDates.length > 0 ? totalMinutes / futureDates.length : 0;
      const avgTimePerDayStr = avgMinsPerDay >= 60
        ? `${Math.floor(avgMinsPerDay / 60)}h ${Math.round(avgMinsPerDay % 60)}m`
        : `${Math.round(avgMinsPerDay)}m`;

      let html = `<p class="form-hint mb-xs">${futureDates.length} days scheduled ahead</p>
      <div class="admin-stat-cards">
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${totalEntries}</span>
          <span class="admin-stat-card__label">Total Tasks</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${avgTasksPerDay}</span>
          <span class="admin-stat-card__label">Avg / Day</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${totalTimeStr}</span>
          <span class="admin-stat-card__label">Total Time</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-card__value">${avgTimePerDayStr}</span>
          <span class="admin-stat-card__label">Avg / Day</span>
        </div>
      </div>
      <h4 class="form-label mt-md">Load per Person</h4>
      <div class="admin-list">`;
      for (const p of pa) {
        const count = perPerson[p.id] || 0;
        const avg = futureDates.length > 0 ? (count / futureDates.length).toFixed(1) : '0';
        const personMins = perPersonMin[p.id] || 0;
        const avgMins = futureDates.length > 0 ? (personMins / futureDates.length) : 0;
        const avgMinsStr = avgMins >= 60
          ? `${Math.floor(avgMins / 60)}h ${Math.round(avgMins % 60)}m`
          : `${Math.round(avgMins)}m`;
        const personTotalStr = personMins >= 60
          ? `${Math.floor(personMins / 60)}h ${personMins % 60}m`
          : `${personMins}m`;
        html += `<div class="admin-list-item">
          <div class="admin-person-dot admin-person-dot--sm" style="background:${p.color}"></div>
          <div class="admin-list-item__body">
            <span class="admin-list-item__name">${esc(p.name)}</span>
            <span class="admin-list-item__meta">${count} tasks · ${avg}/day</span>
            <span class="admin-list-item__meta">${personTotalStr} · ${avgMinsStr}/day</span>
          </div>
        </div>`;
      }
      html += `</div>`;
      el.innerHTML = html;
    }

    function renderRewardsTab() {
      let html = '';

      html += `<div class="admin-filters admin-filters--row">
  <input class="admin-select" type="search" id="rewardsSearch" placeholder="Search rewards…" value="${esc(rewardsSearch)}">
  ${renderFilterSortChip('rewardsFilterSortBtn', rewardsFilterActiveCount())}
  <button class="btn btn--primary btn--sm" id="addRewardBtn" type="button">+ Add Reward</button>
</div>`;

      let rewardEntries = Object.entries(rewardsObj || {});
      if (rewardsStatus === 'active') rewardEntries = rewardEntries.filter(([, r]) => r.status !== 'archived');
      else if (rewardsStatus === 'archived') rewardEntries = rewardEntries.filter(([, r]) => r.status === 'archived');
      if (rewardsType) rewardEntries = rewardEntries.filter(([, r]) => (r.rewardType || 'custom') === rewardsType);
      if (rewardsSearch) rewardEntries = rewardEntries.filter(([, r]) => (r.name || '').toLowerCase().includes(rewardsSearch.toLowerCase()));
      if (rewardsSort === 'cost') rewardEntries.sort((a, b) => (a[1].pointCost ?? 0) - (b[1].pointCost ?? 0));
      else rewardEntries.sort((a, b) => (a[1].name || '').localeCompare(b[1].name || ''));

      if (rewardEntries.length === 0) {
        html += `<div class="admin-empty">No rewards defined yet. Tap + Add Reward to create one.</div>`;
      } else {
        html += `<div class="admin-list" id="rewardList">`;
        for (const [id, r] of rewardEntries) {
          const icon = renderEmojiTile(r.icon || '🎁');
          const secondary = `${r.pointCost ?? 0} pts · ${r.rewardType || 'custom'}`;
          html += renderAdminRow({
            icon,
            primary: esc(r.name || 'Untitled'),
            secondary: esc(secondary),
            dataAttrs: `data-reward-id="${id}"`,
          });
        }
        html += `</div>`;
      }

      // Archived rewards toggle — only show when status filter is 'active' (archived not already in main list)
      if (rewardsStatus === 'active') {
        const archived = Object.entries(rewardsObj).filter(([, r]) => r.status === 'archived');
        if (archived.length > 0) {
          html += `<details class="admin-archived-rewards" style="margin-top: 16px;">
            <summary style="cursor: pointer; color: var(--text-muted); font-size: var(--font-sm);">${archived.length} archived reward${archived.length > 1 ? 's' : ''}</summary>
            <div class="reward-list" style="margin-top: 8px;">`;
          for (const [id, reward] of archived) {
            html += `<div class="reward-card reward-card--archived" data-reward-id="${id}">
              <div class="reward-card__icon" style="opacity: 0.5;">${esc(reward.icon || '🎁')}</div>
              <div class="reward-card__body">
                <div class="reward-card__name" style="text-decoration: line-through;">${esc(reward.name)}</div>
                <div class="reward-card__meta"><span class="reward-card__cost">${reward.pointCost} pts</span></div>
              </div>
            </div>`;
          }
          html += `</div></details>`;
        }
      }

      // ── Redemption History ──
      const redemptionTypes = ['redemption-request', 'redemption-approved', 'redemption-denied', 'use-request', 'use-approved', 'use-denied'];
      const allRedemptions = [];
      for (const [personId, msgs] of Object.entries(allMessagesObj)) {
        if (!msgs) continue;
        for (const [msgId, m] of Object.entries(msgs)) {
          if (redemptionTypes.includes(m.type)) {
            allRedemptions.push({ personId, msgId, ...m });
          }
        }
      }
      allRedemptions.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      if (allRedemptions.length > 0) {
        const shown = allRedemptions.slice(0, 20);
        html += `<details class="admin-section" style="margin-top: 24px;">
          <summary class="admin-section__header" style="cursor: pointer;"><h3>Redemption History (${allRedemptions.length})</h3></summary>
          <div class="redemption-history" style="margin-top: 8px;">`;
        for (const r of shown) {
          const person = peopleObj[r.personId];
          const reward = r.rewardId ? rewardsObj[r.rewardId] : null;
          const statusIcon = (r.type === 'redemption-approved' || r.type === 'use-approved') ? '✅' :
                             (r.type === 'redemption-denied' || r.type === 'use-denied') ? '❌' : '⏳';
          const statusLabel = (r.type === 'redemption-approved' || r.type === 'use-approved') ? 'Approved' :
                              (r.type === 'redemption-denied' || r.type === 'use-denied') ? 'Denied' :
                              r.type === 'use-request' ? 'Use Request' : 'Pending';
          const date = r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-US', { timeZone: tz }) : '';
          html += `<div class="redemption-row">
            <span class="redemption-row__status">${statusIcon}</span>
            <span class="redemption-row__person" style="color: ${person?.color || 'inherit'}">${esc(person?.name || '?')}</span>
            <span class="redemption-row__reward">${esc(reward?.icon || '🎁')} ${esc(r.title || reward?.name || 'Reward')}</span>
            <span class="redemption-row__cost">${Math.abs(r.amount || 0)} pts</span>
            <span class="redemption-row__date">${date}</span>
            <span class="redemption-row__label">${statusLabel}</span>
          </div>`;
        }
        if (allRedemptions.length > 20) {
          html += `<div style="text-align: center; padding: 8px; color: var(--text-muted); font-size: var(--font-sm);">+ ${allRedemptions.length - 20} more</div>`;
        }
        html += `</div></details>`;
      }

      return html;
    }

    function openRewardForm(rewardId) {
      const mount = document.getElementById('taskSheetMount');
      const reward = rewardId ? (rewardsObj[rewardId] || {}) : {};
      const isEdit = !!rewardId;
      const isArchived = isEdit && reward.status === 'archived';
      const isApprovalRequired = reward.approvalRequired !== false;
      const sheetTitle = isArchived ? 'Archived Reward' : (isEdit ? 'Edit Reward' : 'New Reward');
      const defaultEmoji = reward.icon || '\u{1F381}';

      const peopleHtml = peopleArray().map(p => {
        const vis = !reward.perPerson || reward.perPerson.includes(p.id);
        return `<button type="button" class="ef2-person-chip" data-person-id="${esc(p.id)}"${vis ? ' data-state="primary"' : ''} style="--chip-color:${esc(p.color)}">${esc(p.name)}</button>`;
      }).join('');

      mount.innerHTML = renderBottomSheet(`
        <div class="tf-form">
          <div class="sheet__header">
            <h2 class="sheet__title">${sheetTitle}</h2>
            <div class="rf-header-actions">
              ${isEdit ? (isArchived

                : `<button class="ef2-icon-btn" id="rf_archive" type="button" aria-label="Archive" title="Archive">${RF_ARCHIVE_SVG}</button>`) : ''}
              ${isEdit ? `<button class="ef2-icon-btn rf-delete-btn" id="rf_delete" type="button" aria-label="Delete" title="Delete reward">${RF_DELETE_SVG}</button>` : ''}
              <button class="ef2-icon-btn rf-save-btn" id="rf_save" type="button" aria-label="${isEdit ? 'Save' : 'Create reward'}" title="${isEdit ? 'Save' : 'Create'}">${RF_SAVE_SVG}</button>
              <button class="ef2-icon-btn" id="rf_close" type="button" aria-label="Close">${RF_CLOSE_SVG}</button>
            </div>
          </div>

          <div class="rf-title-row">
            <button class="rf-emoji-btn" id="rf_emojiBtnPreview" type="button" title="Pick emoji">${defaultEmoji}</button>
            <input class="tf-title-input" id="rf_name" type="text" placeholder="Reward name" value="${esc(reward.name || '')}" autocomplete="off">
          </div>

          <div class="rf-emoji-reveal" id="rf_emojiReveal">
            <div class="rf-emoji-grid" id="rf_emojiPicker">
              ${REWARD_EMOJIS.map(e => `<button type="button" class="rf-emoji-cell${defaultEmoji === e ? ' is-selected' : ''}" data-emoji="${e}">${e}</button>`).join('')}
              <input type="search" id="rf_customEmoji" class="rf-emoji-custom" placeholder="+">
            </div>
          </div>

          <div class="ef2-divider"></div>

          <div class="tf-rotation-section">
            <div class="tf-rotation-pills" id="rf_type">
              <button class="tf-rot-pill${(reward.rewardType || 'custom') === 'custom' ? ' tf-rot-pill--active' : ''}" data-rtype="custom" type="button">Custom</button>
              <button class="tf-rot-pill${reward.rewardType === 'task-skip' ? ' tf-rot-pill--active' : ''}" data-rtype="task-skip" type="button">Task Skip</button>
              <button class="tf-rot-pill${reward.rewardType === 'penalty-removal' ? ' tf-rot-pill--active' : ''}" data-rtype="penalty-removal" type="button">No Penalty</button>
            </div>
            <div id="rf_typeHint" class="form-hint rf-type-hint"></div>
          </div>

          <div class="ef2-divider"></div>

          <div class="rf-cost-row">
            <input type="number" id="rf_pointCost" class="rf-cost-input" value="${reward.pointCost || ''}" min="1" placeholder="0">
            <span class="rf-cost-unit">pts</span>
            <button class="ef2-add-chip" id="rf_pricingChip" type="button">+ Pricing help</button>
          </div>

          <div class="ef2-field-reveal" id="rf_pricingReveal">
            <div class="rf-pricing-inner">
              <div class="rf-pricing-row">
                <input type="number" id="rf_daysInput" class="rf-days-input" value="7" min="1">
                <span class="rf-cost-unit">days at</span>
                <select id="rf_avgSelect" class="rf-avg-select">
                  ${PRICING_AVERAGES.map(a => `<option value="${a.value}"${a.value === 88 ? ' selected' : ''}>${a.label}</option>`).join('')}
                </select>
              </div>
              <input type="range" id="rf_daysSlider" min="1" max="30" value="7" class="rf-days-slider">

          </div>

          <div class="ef2-divider"></div>

          <div class="tf-for-section">
            <div class="ef2-for-header">
              <span class="ef2-section-label">Visible to</span>
            </div>
            <div class="ef2-person-chips" id="rf_people">${peopleHtml}</div>
          </div>

          <div class="ef2-divider"></div>

          <div class="ef2-secondary-row">
            <button class="ef2-add-chip${isApprovalRequired ? ' is-active' : ''}" id="rf_approvalChip" type="button">Approval required</button>
            <button class="ef2-add-chip" id="rf_advancedChip" type="button">+ Advanced</button>
          </div>

          <div class="ef2-field-reveal" id="rf_advancedReveal">
