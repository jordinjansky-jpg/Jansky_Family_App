          showTodIconSingle: !!main.querySelector('#sf_showTodIconSingle')?.checked,
          longPressMs: parseIntOr(main.querySelector('#sf_longPressMs')?.value, 500),
          kidLongPressMs: parseIntOr(main.querySelector('#sf_kidLongPressMs')?.value, 500),
          difficultyMultipliers: { easy: newDiffEasy, medium: newDiffMedium, hard: newDiffHard },
          calendarDefaults: {
            defaultView: main.querySelector('#set_calView')?.value || 'week',
            density: main.querySelector('#set_calDensity')?.value || 'snug',
            weekStartDay: parseInt(main.querySelector('#set_weekStart')?.value, 10) || 0,
            showDailyInWeek: main.querySelector('#set_showDaily')?.value !== 'false'
          }
        };

        if (newPin && newPin.length === 4 && /^\d{4}$/.test(newPin)) {
          updated.adminPin = newPin;
        }

        await writeSettings(updated);
        settings = updated;

        // Update header
        document.getElementById('headerMount').innerHTML = renderHeader({
          appName: settings.appName,
          subtitle: 'Admin',
          showAdmin: false,
          showDebug: localStorage.getItem('dr-debug') === 'true'
        });

        if (msgEl) {
          msgEl.textContent = 'Settings saved!';
          msgEl.className = 'admin-msg admin-msg--success mt-sm';
          setTimeout(() => { msgEl.textContent = ''; }, 2000);
        }
      });

      main.querySelector('#sf_diffReset')?.addEventListener('click', () => {
        const easyInput = main.querySelector('#sf_diffEasy');
        const mediumInput = main.querySelector('#sf_diffMedium');
        const hardInput = main.querySelector('#sf_diffHard');
        if (easyInput) easyInput.value = 1;
        if (mediumInput) mediumInput.value = 2;
        if (hardInput) hardInput.value = 3;
      });
    }

    // ── Theme tab events ──

    function bindThemeTab() {
      const currentTheme = loadCachedTheme() || settings?.theme || defaultThemeConfig();

      async function saveTheme(newTheme) {
        applyTheme(newTheme);
        settings.theme = newTheme;
        await writeSettings(settings);
        render();
      }

      for (const btn of main.querySelectorAll('.admin-theme-option')) {
        btn.addEventListener('click', () => {
          const preset = btn.dataset.preset;
          const presets = getPresets();
          const info = presets.find(p => p.key === preset);
          const newTheme = { mode: info.mode, preset, accentColor: currentTheme.accentColor || '#5b7fd6' };
          saveTheme(newTheme);
        });
      }

      for (const btn of main.querySelectorAll('.admin-accent')) {
        btn.addEventListener('click', () => {
          const color = btn.dataset.color;
          const newTheme = { ...currentTheme, accentColor: color };
          saveTheme(newTheme);
        });
      }
    }

    // ── Schedule tab events ──

    function bindScheduleTab() {
      loadScheduleStats();

      for (const [btnId, clearPast, label] of [
        ['rebuildScheduleBtn', false, 'Rebuild Schedule'],
        ['resetScheduleBtn', true, 'Clear Past & Rebuild']
      ]) {
        main.querySelector(`#${btnId}`)?.addEventListener('click', async () => {
          const msgEl = main.querySelector('#scheduleMsg');
          const btn = main.querySelector(`#${btnId}`);
          btn.disabled = true;
          btn.textContent = clearPast ? 'Clearing & Rebuilding...' : 'Rebuilding...';

          try {
            const completions = await readCompletions() || {};
            const existingSchedule = await readAllSchedule() || {};
            const updates = buildScheduleUpdates(tasksObj, peopleArray(), settings, completions, existingSchedule, { includeToday: true, clearPast }, catsObj);
            await multiUpdate(updates);

            await pushDebugEvent({ type: 'schedule_rebuilt', payload: { clearPast, initiator: 'admin' }, timestamp: Date.now() });

            if (msgEl) {
              msgEl.textContent = clearPast ? 'Past cleared & schedule rebuilt!' : 'Schedule rebuilt successfully!';
              msgEl.className = 'admin-msg admin-msg--success mt-sm';
            }
            await loadScheduleStats();
          } catch (err) {
            console.error('Rebuild failed:', err);
            if (msgEl) {
              msgEl.textContent = 'Rebuild failed: ' + err.message;
              msgEl.className = 'admin-msg admin-msg--danger mt-sm';
            }
          }

          btn.disabled = false;
          btn.textContent = label;
        });
      }
    }

    // ── Data tab events ──

    function bindDataTab() {
      main.querySelector('#exportDataBtn')?.addEventListener('click', async () => {
        const allData = await readOnce('');
        const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `daily-rundown-export-${today}.json`;
        a.click();
        URL.revokeObjectURL(url);
      });

      // Import data
      main.querySelector('#importDataInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const statusEl = main.querySelector('#importStatus');
        statusEl.innerHTML = '<span class="text-muted">Reading file...</span>';

        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!data || typeof data !== 'object') throw new Error('Invalid JSON structure');

          // Validate it looks like a rundown export
          const hasKnownKeys = ['settings', 'people', 'tasks', 'categories', 'schedule'].some(k => k in data);
          if (!hasKnownKeys) throw new Error('File does not appear to be a Daily Rundown export');

          if (!confirm('This will OVERWRITE all current data with the imported backup. Continue?')) {
            statusEl.innerHTML = '';
            return;
          }

          statusEl.innerHTML = '<span class="text-muted">Importing...</span>';

          // Write the entire data object under rundown/
          const updates = {};
          for (const [key, value] of Object.entries(data)) {
            updates[key] = value;
          }
          await multiUpdate(updates);

          // Reload local state
          const [newSettings, newPeople, newTasks, newCats] = await Promise.all([
            readSettings(), readPeople(), readTasks(), readCategories()
          ]);
          Object.assign(settings, newSettings || {});
          peopleObj = newPeople || {};
          tasksObj = newTasks || {};
          catsObj = newCats || {};

          statusEl.innerHTML = '<span class="admin-msg admin-msg--success">Import complete! Data restored.</span>';
          setTimeout(() => { statusEl.innerHTML = ''; render(); }, 2000);
        } catch (err) {
          statusEl.innerHTML = `<span class="admin-msg admin-msg--danger">Import failed: ${esc(err.message)}</span>`;
        }
      });

      // Archive old data
      main.querySelector('#archiveBtn')?.addEventListener('click', async () => {
        const months = parseInt(main.querySelector('#archiveMonths').value, 10);
        const statusEl = main.querySelector('#archiveStatus');
        const btn = main.querySelector('#archiveBtn');

        const cutoffDate = addDays(today, -(months * 30));

        btn.disabled = true;
        btn.textContent = 'Scanning...';
        statusEl.innerHTML = '';

        try {
          const [allSched, allComp, allSnaps] = await Promise.all([
            readAllSchedule(), readCompletions(), readOnce('snapshots')
          ]);

          const pruneUpdates = {};
          let schedCount = 0, compCount = 0, snapCount = 0;

          // Prune old schedule entries
          if (allSched) {
            for (const dateKey of Object.keys(allSched)) {
              if (dateKey < cutoffDate) {
                pruneUpdates[`schedule/${dateKey}`] = null;
                schedCount++;
              }
            }
          }

          // Prune completions tied to old schedule entries
          if (allComp && allSched) {
            for (const [entryKey, comp] of Object.entries(allComp)) {
              // Check if this completion's schedule entry was pruned
              let foundInFuture = false;
              if (allSched) {
                for (const dateKey of Object.keys(allSched)) {
                  if (dateKey >= cutoffDate && allSched[dateKey]?.[entryKey]) {
                    foundInFuture = true;
                    break;
                  }
                }
              }
              if (!foundInFuture) {
                // Check all old dates for this entry
                let foundInOld = false;
                for (const dateKey of Object.keys(allSched)) {
                  if (dateKey < cutoffDate && allSched[dateKey]?.[entryKey]) {
                    foundInOld = true;
                    break;
                  }
                }
                if (foundInOld) {
                  pruneUpdates[`completions/${entryKey}`] = null;
                  compCount++;
                }
              }
            }
          }

          // Prune old snapshots
          if (allSnaps) {
            for (const dateKey of Object.keys(allSnaps)) {
              if (dateKey < cutoffDate) {
                pruneUpdates[`snapshots/${dateKey}`] = null;
                snapCount++;
              }
            }
          }

          const totalPruned = schedCount + compCount + snapCount;
          if (totalPruned === 0) {
            statusEl.innerHTML = '<span class="text-muted">No data older than the cutoff to prune.</span>';
          } else {
            if (!confirm(`Prune ${schedCount} schedule days, ${compCount} completions, ${snapCount} snapshot days older than ${months} months?`)) {
              statusEl.innerHTML = '';
              btn.disabled = false;
              btn.textContent = 'Prune Data';
              return;
            }
            await multiUpdate(pruneUpdates);
            statusEl.innerHTML = `<span class="admin-msg admin-msg--success">Pruned ${totalPruned} records (${schedCount} schedule days, ${compCount} completions, ${snapCount} snapshots).</span>`;
          }
        } catch (err) {
          statusEl.innerHTML = `<span class="admin-msg admin-msg--danger">Archive failed: ${esc(err.message)}</span>`;
        }

        btn.disabled = false;
        btn.textContent = 'Prune Data';
      });

      // Scoreboard reset
      main.querySelector('#showScoreResetBtn')?.addEventListener('click', () => {
        main.querySelector('#scoreResetSection').style.display = 'none';
        main.querySelector('#scoreResetConfirm').style.display = '';
      });
      main.querySelector('#scoreResetCancel')?.addEventListener('click', () => {
        main.querySelector('#scoreResetConfirm').style.display = 'none';
        main.querySelector('#scoreResetSection').style.display = '';
      });
      const scoreResetWord = main.querySelector('#scoreResetWord');
      const scoreResetBtn = main.querySelector('#scoreResetConfirmBtn');
      if (scoreResetWord && scoreResetBtn) {
        scoreResetWord.addEventListener('input', () => {
          scoreResetBtn.disabled = scoreResetWord.value.trim() !== 'RESET';
        });
        scoreResetBtn.addEventListener('click', async () => {
          scoreResetBtn.disabled = true;
          scoreResetBtn.textContent = 'Clearing...';
          await multiUpdate({
            'snapshots': null,
            'streaks': null,
            'completions': null
          });
          scoreResetBtn.textContent = 'Done!';
          setTimeout(() => {
            main.querySelector('#scoreResetConfirm').style.display = 'none';
            main.querySelector('#scoreResetSection').style.display = '';
          }, 1500);
        });
      }

      // Factory reset
      main.querySelector('#showResetBtn')?.addEventListener('click', () => {
        main.querySelector('#resetSection').style.display = 'none';
        main.querySelector('#resetConfirm').style.display = '';
      });

      main.querySelector('#resetCancel')?.addEventListener('click', () => {
        main.querySelector('#resetConfirm').style.display = 'none';
        main.querySelector('#resetSection').style.display = '';
      });

      const resetWord = main.querySelector('#resetWord');
      const resetBtn = main.querySelector('#resetConfirmBtn');
      if (resetWord && resetBtn) {
        resetWord.addEventListener('input', () => {
          resetBtn.disabled = resetWord.value.trim() !== 'RESET';
        });

        resetBtn.addEventListener('click', async () => {
          resetBtn.disabled = true;
          resetBtn.textContent = 'Deleting...';
          await factoryReset();
          localStorage.removeItem('dr-theme');
          localStorage.removeItem('dr-debug');
          window.location.href = 'setup.html';
        });
      }
    }

    // ── Debug tab events ──

    function bindDebugTab() {
      loadEventLog();

      main.querySelector('#debugToggle')?.addEventListener('change', (e) => {
        localStorage.setItem('dr-debug', e.target.checked ? 'true' : 'false');
        // Update header icon
        document.getElementById('headerMount').innerHTML = renderHeader({
          appName: settings?.appName || 'Daily Rundown',
          subtitle: 'Admin',
          showAdmin: false,
          showDebug: e.target.checked
        });
      });

      main.querySelector('#copyEventLog')?.addEventListener('click', async () => {
        const el = main.querySelector('#eventLog');
        const text = el ? el.innerText : 'No events.';
        await navigator.clipboard.writeText(`== Event Log ==\n${text}`);
        alert('Copied to clipboard!');
      });

      const inspectSelect = main.querySelector('#inspectTaskSelect');
      if (inspectSelect) {
        inspectSelect.addEventListener('change', () => {
          inspectTask(inspectSelect.value);
        });
      }

      main.querySelector('#copyInspect')?.addEventListener('click', async () => {
        const el = main.querySelector('#inspectResult pre');
        const text = el ? el.textContent : 'No task selected.';
        await navigator.clipboard.writeText(`== Schedule Inspector ==\n${text}`);
        alert('Copied to clipboard!');
      });

      // Past-due test entry
      main.querySelector('#createPastDueBtn')?.addEventListener('click', async () => {
        const taskId = main.querySelector('#pastDueTask')?.value;
        const dateKey = main.querySelector('#pastDueDate')?.value;
        const ownerId = main.querySelector('#pastDueOwner')?.value;
        const msgEl = main.querySelector('#pastDueMsg');

        if (!taskId || !dateKey || !ownerId) {
          if (msgEl) { msgEl.textContent = 'Select a task, date, and owner.'; msgEl.className = 'admin-msg admin-msg--danger mt-sm'; }
          return;
        }
        if (dateKey >= today) {
          if (msgEl) { msgEl.textContent = 'Date must be in the past.'; msgEl.className = 'admin-msg admin-msg--danger mt-sm'; }
          return;
        }

        const task = tasksObj[taskId];
        const entry = {
          taskId,
          ownerId,
          rotationType: task.rotation,
          ownerAssignmentMode: task.ownerAssignmentMode || 'rotate',
          timeOfDay: task.timeOfDay || 'anytime'
        };

        const updates = {};
        updates[`schedule/${dateKey}/sched_${Date.now()}_pastdue`] = entry;
        await multiUpdate(updates);

        if (msgEl) {
          msgEl.textContent = `Created overdue entry for "${task.name}" on ${dateKey}`;
          msgEl.className = 'admin-msg admin-msg--success mt-sm';
          setTimeout(() => { msgEl.textContent = ''; }, 3000);
        }
      });
    }

    // ── Initial render if PIN session was cached ──
    if (pinSessionValid) {
      render();
    }
  </script>
</body>
</html>
