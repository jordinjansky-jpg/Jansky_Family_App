    function bindRewardsTab() {
      main.querySelector('#addRewardBtn')?.addEventListener('click', () => {
        editingRewardId = 'new';
        render();
      });

      // Row click to open modal edit
      for (const card of main.querySelectorAll('.reward-card[data-reward-id]')) {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.reward-archive')) return;
          const id = card.dataset.rewardId;
          editingRewardId = id;
          render();
        });
      }

      for (const btn of main.querySelectorAll('.reward-archive')) {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.rewardId;
          await archiveReward(id);
          rewardsObj[id].status = 'archived';
          editingRewardId = null;
          render();
        });
      }

      // Bind modal form if visible
      const form = main.querySelector('#rewardForm');
      if (form) bindRewardForm();

      // Backdrop close
      document.querySelector('#rewardFormBackdrop')?.addEventListener('click', (e) => {
        if (e.target.id === 'rewardFormBackdrop') {
          editingRewardId = null;
          render();
        }
      });

      // Bank management — remove tokens
      for (const btn of main.querySelectorAll('.admin-bank-remove')) {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const pid = btn.dataset.personId;
          const tokenId = btn.dataset.tokenId;
          const tokenName = btn.dataset.tokenName;
          const person = peopleObj[pid];
          if (!await showConfirm({ title: `Remove "${tokenName}" from ${person?.name}'s bank?`, danger: true })) return;
          await removeBankToken(pid, tokenId);
          delete allBankData[pid]?.[tokenId];
          render();
        });
      }

      // Bank management — add to bank
      main.querySelector('#adminBankAdd')?.addEventListener('click', () => {
        const mount = document.getElementById('taskSheetMount');
        const ppl = peopleArray();
        const activeRewards = Object.entries(rewardsObj).filter(([, r]) => r.status !== 'archived');

        let formHtml = `<h3 style="margin-bottom: 12px;">Add to Bank</h3>
          <label class="form-label">Person</label>
          <div class="chip-group" id="bankAdd_person">
            ${ppl.map(p => `<button class="chip chip--selectable" data-person-id="${p.id}" style="--person-color:${p.color}" type="button">${esc(p.name)}</button>`).join('')}
          </div>
          <label class="form-label" style="margin-top: 12px;">Reward</label>
          <select class="form-input" id="bankAdd_reward">
            <option value="">Select a reward...</option>
            ${activeRewards.map(([id, r]) => `<option value="${id}">${esc(r.icon || '🎁')} ${esc(r.name)} (${r.pointCost} pts)</option>`).join('')}
          </select>
          <div class="admin-form__actions" style="margin-top: 16px;">
            <button class="btn btn--secondary" id="bankAdd_cancel" type="button">Cancel</button>
            <button class="btn btn--primary" id="bankAdd_save" type="button">Add</button>
          </div>`;

        mount.innerHTML = renderBottomSheet(formHtml);
        applyDataColors(mount);
        requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

        // Person chip toggle (exclusive)
        for (const chip of mount.querySelectorAll('#bankAdd_person .chip--selectable')) {
          chip.addEventListener('click', () => {
            mount.querySelectorAll('#bankAdd_person .chip--selectable').forEach(c => c.classList.remove('chip--active'));
            chip.classList.add('chip--active');
          });
        }

        mount.querySelector('#bankAdd_cancel')?.addEventListener('click', () => { mount.innerHTML = ''; });
        mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
          if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
        });

        mount.querySelector('#bankAdd_save')?.addEventListener('click', async () => {
          const selectedChip = mount.querySelector('#bankAdd_person .chip--active');
          const rewardId = mount.querySelector('#bankAdd_reward').value;
          if (!selectedChip || !rewardId) { await showConfirm({ title: 'Select a person and reward', alert: true }); return; }
          const pid = selectedChip.dataset.personId;
          const reward = rewardsObj[rewardId];
          await writeBankToken(pid, {
            rewardType: reward.rewardType || 'custom',
            rewardId,
            rewardName: reward.name || 'Reward',
            rewardIcon: reward.icon || '🎁',
            acquiredAt: Date.now(),
            used: false,
            usedAt: null,
            targetEntryKey: null
          });
          allBankData[pid] = (await readBank(pid)) || {};
          mount.innerHTML = '';
          render();
        });
      });
    }

    function bindRewardForm() {
      const form = main.querySelector('#rewardForm') || document.getElementById('rewardForm');
      if (!form) return;

      // Emoji picker
      for (const btn of form.querySelectorAll('.emoji-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-btn--selected'));
          btn.classList.add('emoji-btn--selected');
          form.querySelector('#rf_customEmoji').value = '';
        });
      }

      // Type segmented control
      for (const btn of form.querySelectorAll('#rf_type .segmented-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('#rf_type .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          const hint = form.querySelector('#rf_typeHint');
          const val = btn.dataset.value;
          hint.textContent = val === 'task-skip' ? 'Person picks a task to skip for the day'
            : val === 'penalty-removal' ? 'Removes the late penalty from a past task' : '';
        });
      }

      // Pricing helper
      const slider = form.querySelector('#rf_daysSlider');
      const daysInput = form.querySelector('#rf_daysInput');
      const avgSelect = form.querySelector('#rf_avgSelect');
      const suggestion = form.querySelector('#rf_suggestion');
      const pointCost = form.querySelector('#rf_pointCost');

      function updateSuggestion() {
        const days = parseInt(daysInput.value) || 7;
        const avg = parseInt(avgSelect.value) || 88;
        const cost = Math.round((days * avg) / 5) * 5;
        const avgLabel = PRICING_AVERAGES.find(a => a.value === avg)?.label || avg + '%';
        suggestion.innerHTML = `${days} day${days > 1 ? 's' : ''} at ${avgLabel} average &rarr; <strong>${cost} pts</strong> (click to apply)`;
        suggestion.dataset.cost = cost;
      }

      slider.addEventListener('input', () => { daysInput.value = slider.value; updateSuggestion(); });
      daysInput.addEventListener('input', () => {
        const v = parseInt(daysInput.value);
        if (v && v <= 30) slider.value = v;
        updateSuggestion();
      });
      avgSelect.addEventListener('change', updateSuggestion);
      suggestion.addEventListener('click', () => { pointCost.value = suggestion.dataset.cost; });
      updateSuggestion();

      // Person chips
      for (const chip of form.querySelectorAll('#rf_people .chip--selectable')) {
        chip.addEventListener('click', () => chip.classList.toggle('chip--active'));
      }

      // Cancel
      form.querySelector('#rf_cancel').addEventListener('click', () => {
        editingRewardId = null;
        render();
      });

      // Delete
      form.querySelector('#rf_delete')?.addEventListener('click', async () => {
        const reward = rewardsObj[editingRewardId];
        if (!await showConfirm({ title: `Delete "${reward?.name || 'this reward'}"?`, message: 'This cannot be undone.', danger: true })) return;
        await removeReward(editingRewardId);
        delete rewardsObj[editingRewardId];
        editingRewardId = null;
        render();
      });

      // Save
      form.querySelector('#rf_save').addEventListener('click', async () => {
        const name = form.querySelector('#rf_name').value.trim();
        if (!name) return;

        const selectedEmoji = form.querySelector('.emoji-btn--selected')?.dataset?.emoji
          || form.querySelector('#rf_customEmoji').value.trim() || '🎁';
        const rewardType = form.querySelector('#rf_type .segmented-btn--active')?.dataset?.value || 'custom';
        const cost = parseInt(form.querySelector('#rf_pointCost').value) || 0;
        if (cost <= 0) return;

        const selectedPeople = [...form.querySelectorAll('#rf_people .chip--active')]
          .map(c => c.dataset.personId);
        const maxRedemptions = parseInt(form.querySelector('#rf_maxRedemptions').value) || null;
        const streakReq = parseInt(form.querySelector('#rf_streakReq').value) || null;
        const expiresDate = form.querySelector('#rf_expiresAt').value;
        const expiresAt = expiresDate ? new Date(expiresDate + 'T23:59:59').getTime() : null;

        const data = {
          name,
          icon: selectedEmoji,
          pointCost: cost,
          rewardType,
          perPerson: selectedPeople.length > 0 ? selectedPeople : null,
          maxRedemptions,
          streakRequirement: streakReq,
          expiresAt,
          status: 'active'
        };

        if (editingRewardId && editingRewardId !== 'new') {
          await writeReward(editingRewardId, data);
          rewardsObj[editingRewardId] = data;
        } else {
          const newKey = await pushReward(data);
          rewardsObj[newKey] = data;
        }

        editingRewardId = null;
        render();
      });
    }

    // ══════════════════════════════════════════
    // Achievements Tab
    // ══════════════════════════════════════════

    let editingAchievementId = null;
    let achievementPersonExpanded = {};

    const ACHIEVEMENT_STATS = [
      { value: 'streak', label: 'Current Streak (days)' },
      { value: 'bestStreak', label: 'Best Streak (days)' },
      { value: 'totalEarned', label: 'Total Points Earned' },
      { value: 'tasksCompleted', label: 'Tasks Completed' },
      { value: 'perfectDays', label: 'Perfect Days (100%)' },
      { value: 'gradeDay', label: 'Daily Grade' },
      { value: 'gradeWeek', label: 'Weekly Grade' },
      { value: 'gradeMonth', label: 'Monthly Grade' },
      { value: 'firstRedemption', label: 'First Store Purchase' }
    ];

    const ACHIEVEMENT_EMOJIS = ['🏆','⭐','🔥','💎','🎯','🏅','👑','💪','🌟','🚀','🎖️','💰','🎁','📚','🧹','🏠','⚡','🌈'];

    function renderAchievementsTab() {
      const allDefs = mergeAchievementDefs(achievementDefsObj);
      const activeDefs = getActiveAchievements(allDefs);
      const ppl = peopleArray();

      let html = '';

      // ── Per-person status (collapsible) ──
      html += `<div class="admin-section">
        <div class="admin-section__header"><h3>Status by Person</h3></div>`;

      for (const p of ppl) {
        const pa = allAchievements[p.id] || {};
        const unlocked = Object.keys(pa).filter(k => activeDefs[k] && !pa[k].revoked).length;
        const total = Object.keys(activeDefs).length;
        const isExpanded = achievementPersonExpanded[p.id];

        html += `<div class="ach-person-row">
          <button class="ach-person-header" data-person-id="${p.id}" type="button">
            <span class="sb-mini-dot" style="background:${p.color}"></span>
            <span class="ach-person-name">${esc(p.name)}</span>
            <span class="ach-person-count">${unlocked}/${total}</span>
            <span class="ach-person-chevron">${isExpanded ? '▾' : '▸'}</span>
          </button>`;

        if (isExpanded) {
          html += `<div class="ach-person-badges">`;
          for (const [key, def] of Object.entries(activeDefs)) {
            if (def.perPerson && !def.perPerson.includes(p.id)) continue;
            const got = pa[key];
            const isRevoked = got?.revoked;
            const isUnlocked = got && !isRevoked;
            const date = isUnlocked ? new Date(got.unlockedAt).toLocaleDateString('en-US', { timeZone: tz }) : '';
            html += `<button class="ach-badge-btn ${isUnlocked ? 'ach-badge-btn--unlocked' : ''}" data-key="${esc(key)}" data-person-id="${p.id}" type="button" title="${esc(def.label)}">
              <span class="ach-badge-icon">${def.icon}</span>
              <span class="ach-badge-label">${esc(def.label)}</span>
              ${isRevoked ? '<span class="ach-badge-date" style="color: var(--accent-danger, #e53e3e);">Revoked</span>' : ''}
              ${date ? `<span class="ach-badge-date">${date}</span>` : ''}
            </button>`;
          }
          html += `</div>`;
          if (unlocked > 0 || Object.keys(pa).length > 0) {
            html += `<div style="text-align: right; margin-top: var(--spacing-xs);">
              <button class="btn btn--ghost btn--xs ach-reset-all" data-person-id="${p.id}" type="button" style="color: var(--accent-danger, #e53e3e);">Reset All</button>
            </div>`;
          }
        }
        html += `</div>`;
      }
      html += `</div>`;

      // ── Achievement definitions list ──
      html += `<div class="admin-section" style="margin-top: 16px;">
        <div class="admin-section__header">
          <h3>Achievement Definitions</h3>
          <button class="btn btn--primary btn--sm" id="addAchBtn" type="button">+ Add Badge</button>
        </div>`;

      const defsEntries = Object.entries(allDefs).sort((a, b) => {
        if (a[1].isDefault && !b[1].isDefault) return -1;
        if (!a[1].isDefault && b[1].isDefault) return 1;
        return (a[1].label || '').localeCompare(b[1].label || '');
      });

      html += `<div class="admin-list" style="margin-top: var(--spacing-sm);">`;
      for (const [key, def] of defsEntries) {
        const isHidden = def.status === 'hidden';
        const typeIcon = def.conditionType === 'manual' ? '✋' : def.conditionType === 'hybrid' ? '⚡' : '🤖';
        const rewardLabel = def.reward?.type === 'points' ? `+${def.reward.amount} pts` : def.reward?.type === 'reward' ? '🎁 Reward' : '';
        const condLabel = def.condition?.stat ? ACHIEVEMENT_STATS.find(s => s.value === def.condition.stat)?.label || def.condition.stat : 'Manual';
        const threshLabel = def.condition?.threshold != null ? ` ≥ ${def.condition.threshold}` : '';

        html += `<div class="reward-card--inline admin-list-item--clickable${isHidden ? ' admin-list-item--paused' : ''}" data-ach-key="${esc(key)}">
          <span class="reward-card__icon--sm">${def.icon}</span>
          <span class="reward-card__name">${esc(def.label)}</span>
          <span class="admin-badge">${typeIcon} ${def.conditionType || 'hybrid'}</span>
          ${isHidden ? '<span class="admin-badge admin-badge--muted">Hidden</span>' : ''}
          ${def.isDefault ? '<span class="admin-badge admin-badge--muted">Default</span>' : ''}
          ${rewardLabel ? `<span class="reward-card__cost">${rewardLabel}</span>` : ''}
          <div style="margin-left: auto; flex-shrink: 0;">
            ${def.isDefault
              ? `<button class="btn btn--ghost btn--sm ach-toggle" data-ach-key="${esc(key)}" type="button">${isHidden ? 'Show' : 'Hide'}</button>`
              : `<button class="btn btn--ghost btn--sm ach-delete" data-ach-key="${esc(key)}" type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`}
          </div>
        </div>`;
      }
      html += `</div></div>`;

      // Achievement form modal
      if (editingAchievementId) {
        const modalAchKey = editingAchievementId === 'new' ? null : editingAchievementId;
        html += `<div class="task-form-backdrop" id="achFormBackdrop">
          <div class="task-form-modal">${renderAchievementForm(modalAchKey)}</div>
        </div>`;
      }

      return html;
    }

    function renderAchievementForm(achKey) {
      const allDefs = mergeAchievementDefs(achievementDefsObj);
      const def = achKey ? allDefs[achKey] || {} : {};
      const isEdit = !!achKey;
      const title = isEdit ? 'Edit Badge' : 'New Badge';
      const cType = def.conditionType || 'hybrid';
      const cStat = def.condition?.stat || '';
      const cThreshold = def.condition?.threshold ?? '';
      const isGradeStat = ['gradeDay', 'gradeWeek', 'gradeMonth'].includes(cStat);
      const rType = def.reward?.type || 'none';

      return `<div class="form-compact" id="achForm">
        <h3 class="admin-form__title">${title}</h3>

        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" id="af_name" value="${esc(def.label || '')}" placeholder="e.g. 7-Day Streak">
        </div>
        <div class="form-group">
          <label class="form-label">Icon</label>
          <div class="emoji-picker" id="af_emojiPicker">
            ${ACHIEVEMENT_EMOJIS.map(e => `<button type="button" class="emoji-btn${def.icon === e ? ' emoji-btn--selected' : ''}" data-emoji="${e}">${e}</button>`).join('')}
            <input type="text" id="af_customEmoji" class="form-input form-input--sm" placeholder="✏️" maxlength="2" style="width: 44px; text-align: center;" value="${def.icon && !ACHIEVEMENT_EMOJIS.includes(def.icon) ? esc(def.icon) : ''}">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" id="af_desc" value="${esc(def.description || '')}" placeholder="What does this badge celebrate?">
        </div>

        <div class="form-group">
          <label class="form-label">Trigger</label>
          <div class="segmented-control" id="af_condType">
            <button type="button" class="segmented-btn${cType === 'stat' ? ' segmented-btn--active' : ''}" data-value="stat">Auto</button>
            <button type="button" class="segmented-btn${cType === 'hybrid' ? ' segmented-btn--active' : ''}" data-value="hybrid">Either</button>
            <button type="button" class="segmented-btn${cType === 'manual' ? ' segmented-btn--active' : ''}" data-value="manual">Manual</button>
          </div>
        </div>

        <div id="af_condFields" style="${cType === 'manual' ? 'display:none;' : ''}">
          <div class="form-row-2">
            <div class="form-group">
              <label class="form-label">Condition</label>
              <select id="af_stat">
                <option value="">Select...</option>
                ${ACHIEVEMENT_STATS.map(s => `<option value="${s.value}"${cStat === s.value ? ' selected' : ''}>${s.label}</option>`).join('')}
              </select>
            </div>
            <div class="form-group" id="af_thresholdGroup">
              <label class="form-label">Threshold</label>
              ${isGradeStat
                ? `<select id="af_threshold">
                    <option value="A+"${cThreshold === 'A+' ? ' selected' : ''}>A+</option>
                    <option value="A"${cThreshold === 'A' ? ' selected' : ''}>A</option>
                    <option value="B+"${cThreshold === 'B+' ? ' selected' : ''}>B+</option>
                    <option value="B"${cThreshold === 'B' ? ' selected' : ''}>B</option>
                  </select>`
                : `<input type="number" id="af_threshold" value="${cThreshold}" min="1" placeholder="e.g. 7">`}
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Reward on unlock</label>
          <div class="segmented-control" id="af_rewardType">
            <button type="button" class="segmented-btn${rType === 'none' ? ' segmented-btn--active' : ''}" data-value="none">Badge Only</button>
            <button type="button" class="segmented-btn${rType === 'points' ? ' segmented-btn--active' : ''}" data-value="points">+ Points</button>
            <button type="button" class="segmented-btn${rType === 'reward' ? ' segmented-btn--active' : ''}" data-value="reward">Store Item</button>
          </div>
        </div>

        <div id="af_rewardPointsField" style="${rType === 'points' ? '' : 'display:none;'}">
          <div class="form-group">
            <label class="form-label">Bonus points</label>
            <input type="number" id="af_rewardAmount" class="form-input" value="${def.reward?.amount || 50}" min="1">
          </div>
        </div>

        <div id="af_rewardItemField" style="${rType === 'reward' ? '' : 'display:none;'}">
          <div class="form-group">
            <label class="form-label">Store reward</label>
            <select id="af_rewardId" class="form-input">
              <option value="">Select...</option>
              ${Object.entries(rewardsObj).filter(([,r]) => r.status === 'active').map(([id, r]) =>
                `<option value="${id}" ${def.reward?.rewardId === id ? 'selected' : ''}>${esc(r.icon || '')} ${esc(r.name)}</option>`
              ).join('')}
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Available to</label>
          <div class="chip-group" id="af_people">
            ${peopleArray().map(p => {
              const selected = def.perPerson && def.perPerson.includes(p.id);
              return `<button class="chip chip--selectable${selected ? ' chip--active' : ''}" data-person-id="${p.id}" style="--person-color:${p.color}" type="button">${esc(p.name)}</button>`;
            }).join('')}
            <span class="form-hint" style="margin-left: 4px;">None = all</span>
          </div>
        </div>

        <div class="admin-form__actions">
          <button class="btn btn--secondary" id="af_cancel" type="button">Cancel</button>
          <button class="btn btn--primary" id="af_save" type="button"${achKey ? ` data-ach-key="${esc(achKey)}"` : ''}>${isEdit ? 'Save' : 'Create'}</button>
        </div>
      </div>`;
    }

    function bindAchievementsTab() {
      // Reset all achievements for a person
      for (const btn of main.querySelectorAll('.ach-reset-all')) {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const pid = btn.dataset.personId;
          const person = peopleObj[pid];
          if (!await showConfirm({ title: `Reset all achievements for ${person?.name}?`, message: 'They can re-earn them when criteria are met again.', danger: true })) return;
          await removeData(`achievements/${pid}`);
          allAchievements = (await readAllAchievements()) || {};
          render();
        });
      }

      // Person expand/collapse
      for (const btn of main.querySelectorAll('.ach-person-header')) {
        btn.addEventListener('click', () => {
          const pid = btn.dataset.personId;
          achievementPersonExpanded[pid] = !achievementPersonExpanded[pid];
          render();
        });
      }

      // Badge long-press in person view — opens popup to award/revoke
      for (const btn of main.querySelectorAll('.ach-badge-btn')) {
        let pressTimer = null;
        const openPopup = () => {
          const key = btn.dataset.key;
          const pid = btn.dataset.personId;
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          const def = allDefs[key] || {};
          const pa = allAchievements[pid] || {};
          const got = pa[key];
          const isRevoked = got?.revoked;
          const isUnlocked = got && !isRevoked;
          const person = peopleObj[pid];

          const mount = document.getElementById('taskSheetMount');
          let statusHtml = isUnlocked
            ? `<span style="color: var(--accent-success, #38a169);">Unlocked ${new Date(got.unlockedAt).toLocaleDateString('en-US', { timeZone: tz })}</span>`
            : isRevoked
              ? `<span style="color: var(--accent-danger, #e53e3e);">Revoked</span>`
              : `<span style="color: var(--text-faint);">Locked</span>`;

          let popupHtml = `<div style="padding: 8px 0; text-align: center;">
            <div style="font-size: 2.5rem; margin-bottom: 4px;">${def.icon || '🏆'}</div>
            <h3 style="margin-bottom: 4px;">${esc(def.label || key)}</h3>
            <p style="color: var(--text-muted); font-size: var(--font-sm); margin-bottom: 12px;">${esc(def.description || '')}</p>
            <p style="font-size: var(--font-sm); margin-bottom: 16px;">
              <span style="color: ${person?.color || 'inherit'}; font-weight: 600;">${esc(person?.name || '?')}</span> —
              ${statusHtml}
            </p>
            <div style="display: flex; gap: 8px; justify-content: center;">
              ${isUnlocked
                ? `<button class="btn btn--sm btn--ghost" id="achPopupRevoke" type="button" style="color: var(--accent-danger, #e53e3e);">Revoke</button>`
                : `<button class="btn btn--sm btn--primary" id="achPopupAward" type="button">Award</button>`}
              <button class="btn btn--sm btn--ghost" id="achPopupClose" type="button">Close</button>
            </div>
          </div>`;

          mount.innerHTML = renderBottomSheet(popupHtml);
          applyDataColors(mount);
          requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

          mount.querySelector('#achPopupAward')?.addEventListener('click', async () => {
            await writeAchievement(pid, key, { unlockedAt: Date.now(), seen: false });
            // Grant point reward if configured
            if (def.reward?.type === 'points' && def.reward.amount > 0) {
              await writeMessage(pid, {
                type: 'bonus', title: `🏅 ${def.label}`, body: `Achievement reward: +${def.reward.amount} pts`,
                amount: def.reward.amount, rewardId: null, entryKey: null,
                seen: true, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system'
              });
            }
            allAchievements = (await readAllAchievements()) || {};
            mount.innerHTML = '';
            render();
          });
          mount.querySelector('#achPopupRevoke')?.addEventListener('click', async () => {
            if (!await showConfirm({ title: `Revoke "${def.label}" from ${person?.name}?`, danger: true })) return;
            await updateData(`achievements/${pid}/${key}`, { revoked: true, revokedAt: Date.now() });
            allAchievements = (await readAllAchievements()) || {};
            mount.innerHTML = '';
            render();
          });
          mount.querySelector('#achPopupClose')?.addEventListener('click', () => { mount.innerHTML = ''; });
          mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
            if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
          });
        };

        let longPressFired = false;
        btn.addEventListener('pointerdown', () => {
          longPressFired = false;
          pressTimer = setTimeout(() => { longPressFired = true; openPopup(); }, 500);
        });
        btn.addEventListener('pointerup', () => {
          clearTimeout(pressTimer);
          if (!longPressFired) openPopup();
        });
        btn.addEventListener('pointerleave', () => { clearTimeout(pressTimer); });
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
      }

      // Add badge button
      main.querySelector('#addAchBtn')?.addEventListener('click', () => {
        editingAchievementId = 'new';
        render();
      });

      // Row click to open modal
      for (const row of main.querySelectorAll('[data-ach-key].admin-list-item--clickable')) {
        row.addEventListener('click', (e) => {
          if (e.target.closest('.ach-toggle, .ach-delete')) return;
          const key = row.dataset.achKey;
          editingAchievementId = key;
          render();
        });
      }

      // Hide/Show toggle for defaults
      for (const btn of main.querySelectorAll('.ach-toggle')) {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.achKey;
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          const def = allDefs[key] || {};
          const newStatus = def.status === 'hidden' ? 'active' : 'hidden';
          await writeAchievementDef(key, { status: newStatus });
          achievementDefsObj = (await readAchievementDefs()) || {};
          render();
        });
      }

      // Delete custom achievements
      for (const btn of main.querySelectorAll('.ach-delete')) {
        btn.addEventListener('click', async () => {
          const key = btn.dataset.achKey;
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          if (!await showConfirm({ title: `Delete "${allDefs[key]?.label || key}"?`, message: 'This cannot be undone.', danger: true })) return;
          await deleteAchievementDef(key);
          // Also remove from all people
          for (const p of peopleArray()) {
            if (allAchievements[p.id]?.[key]) {
              await deleteAchievement(p.id, key);
            }
          }
          achievementDefsObj = (await readAchievementDefs()) || {};
          allAchievements = (await readAllAchievements()) || {};
          render();
        });
      }

      // Bind modal form if visible
      const form = main.querySelector('#achForm');
      if (form) bindAchievementForm(form);

      // Backdrop close
      document.querySelector('#achFormBackdrop')?.addEventListener('click', (e) => {
        if (e.target.id === 'achFormBackdrop') {
          editingAchievementId = null;
          render();
        }
      });
    }

    function bindAchievementForm(form) {
      // Emoji picker
      for (const btn of form.querySelectorAll('.emoji-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-btn--selected'));
          btn.classList.add('emoji-btn--selected');
          form.querySelector('#af_customEmoji').value = '';
        });
      }
      form.querySelector('#af_customEmoji')?.addEventListener('input', () => {
        form.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('emoji-btn--selected'));
      });

      // Condition type toggle
      for (const btn of form.querySelectorAll('#af_condType .segmented-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('#af_condType .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          form.querySelector('#af_condFields').style.display = btn.dataset.value === 'manual' ? 'none' : '';
        });
      }

      // Stat change — swap threshold input for grade selects
      form.querySelector('#af_stat')?.addEventListener('change', () => {
        const stat = form.querySelector('#af_stat').value;
        const isGrade = ['gradeDay', 'gradeWeek', 'gradeMonth'].includes(stat);
        const isBool = stat === 'firstRedemption';
        const group = form.querySelector('#af_thresholdGroup');
        if (isBool) {
          group.style.display = 'none';
        } else {
          group.style.display = '';
          group.innerHTML = `<label class="form-label">Threshold</label>` + (isGrade
            ? `<select id="af_threshold"><option value="A+">A+</option><option value="A">A</option><option value="B+">B+</option><option value="B">B</option></select>`
            : `<input type="number" id="af_threshold" value="" min="1" placeholder="e.g. 7">`);
        }
      });

      // Reward type toggle
      for (const btn of form.querySelectorAll('#af_rewardType .segmented-btn')) {
        btn.addEventListener('click', () => {
          form.querySelectorAll('#af_rewardType .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          form.querySelector('#af_rewardPointsField').style.display = btn.dataset.value === 'points' ? '' : 'none';
          form.querySelector('#af_rewardItemField').style.display = btn.dataset.value === 'reward' ? '' : 'none';
        });
      }

      // Person chips
      for (const chip of form.querySelectorAll('#af_people .chip--selectable')) {
        chip.addEventListener('click', () => chip.classList.toggle('chip--active'));
      }

      // Cancel
      form.querySelector('#af_cancel')?.addEventListener('click', () => {
        editingAchievementId = null;
        render();
      });

      // Save
      form.querySelector('#af_save')?.addEventListener('click', async () => {
        const name = form.querySelector('#af_name')?.value?.trim();
        if (!name) { await showConfirm({ title: 'Name is required', alert: true }); return; }

        const selectedEmoji = form.querySelector('.emoji-btn--selected')?.dataset?.emoji;
        const customEmoji = form.querySelector('#af_customEmoji')?.value?.trim();
        const icon = customEmoji || selectedEmoji || '🏆';

        const description = form.querySelector('#af_desc')?.value?.trim() || '';
        const conditionType = form.querySelector('#af_condType .segmented-btn--active')?.dataset?.value || 'hybrid';

        let condition = null;
        if (conditionType !== 'manual') {
          const stat = form.querySelector('#af_stat')?.value;
          if (stat) {
            const thresholdEl = form.querySelector('#af_threshold');
            const threshold = thresholdEl?.tagName === 'SELECT' ? thresholdEl.value : (parseInt(thresholdEl?.value) || null);
            if (stat !== 'firstRedemption' && !threshold) { await showConfirm({ title: 'Threshold is required', alert: true }); return; }
            condition = { stat, threshold: stat === 'firstRedemption' ? 1 : threshold };
          }
        }

        let reward = null;
        const rType = form.querySelector('#af_rewardType .segmented-btn--active')?.dataset?.value || 'none';
        if (rType === 'points') {
          reward = { type: 'points', amount: parseInt(form.querySelector('#af_rewardAmount')?.value) || 50 };
        } else if (rType === 'reward') {
          const rid = form.querySelector('#af_rewardId')?.value;
          if (rid) reward = { type: 'reward', rewardId: rid };
        }

        const perPerson = [...form.querySelectorAll('#af_people .chip--active')].map(c => c.dataset.personId);

        const data = {
          label: name,
          icon,
          description,
          conditionType,
          condition,
          reward,
          perPerson: perPerson.length > 0 ? perPerson : null,
          status: 'active'
        };

        const existingKey = form.querySelector('#af_save')?.dataset?.achKey;
        if (existingKey) {
          // Editing existing
          const allDefs = mergeAchievementDefs(achievementDefsObj);
          if (allDefs[existingKey]?.isDefault) data.isDefault = true;
          await writeAchievementDef(existingKey, data);
        } else {
          // New — generate key
          const key = 'custom-' + Date.now();
          await writeAchievementDef(key, data);
        }

        achievementDefsObj = (await readAchievementDefs()) || {};
        editingAchievementId = null;
        render();
      });
    }

    // ══════════════════════════════════════════
    // Tab-specific event binding
    // ══════════════════════════════════════════

    function bindTabContent() {
      switch (activeTab) {
        case 'library':
          switch (activeLibrarySection) {
            case 'tasks':      bindTasksTab();      break;
            case 'events':     bindEventsTab();     break;
            case 'meals':      bindMealsTab();      break;
            case 'categories': bindCategoriesTab(); break;
            case 'rewards':    bindRewardsTab();    break;
            case 'badges':     bindAchievementsTab(); break;
          }
          break;
        case 'people':   bindPeopleTab();   break;
        case 'settings': bindSettingsTab(); break;
        case 'tools':    bindToolsTab();    break;
      }
    }

    // ── Tasks tab events ──

    function bindTasksTab() {
      // Filters
      for (const id of ['taskFilterRotation', 'taskFilterOwner', 'taskFilterCategory', 'taskFilterStatus', 'taskFilterDifficulty', 'taskSortBy']) {
        const el = main.querySelector(`#${id}`);
        if (el) el.addEventListener('change', () => {
          taskFilter.rotation = main.querySelector('#taskFilterRotation')?.value || '';
          taskFilter.owner = main.querySelector('#taskFilterOwner')?.value || '';
          taskFilter.category = main.querySelector('#taskFilterCategory')?.value || '';
          taskFilter.status = main.querySelector('#taskFilterStatus')?.value || '';
          taskFilter.difficulty = main.querySelector('#taskFilterDifficulty')?.value || '';
          taskSort = main.querySelector('#taskSortBy')?.value || 'name';
          render();
        });
      }

      // Add task
      main.querySelector('#addTaskBtn')?.addEventListener('click', () => {
        editingTaskId = 'new';
        render();
      });

      // Select mode toggle
      main.querySelector('#selectModeBtn')?.addEventListener('click', () => {
        selectMode = true;
        editingTaskId = null;
        render();
      });
      main.querySelector('#cancelSelectBtn')?.addEventListener('click', () => {
        selectMode = false;
        selectedTaskIds.clear();
        render();
      });
      main.querySelector('#selectAllBtn')?.addEventListener('click', () => {
        for (const item of main.querySelectorAll('.admin-list-item[data-task-id]')) {
          selectedTaskIds.add(item.dataset.taskId);
        }
        render();
      });
      main.querySelector('#deselectAllBtn')?.addEventListener('click', () => {
        selectedTaskIds.clear();
        render();
      });

      // Floating action bar buttons
      main.querySelector('#bulkCancelBtn')?.addEventListener('click', () => {
        selectMode = false;
        selectedTaskIds.clear();
        render();
      });
      main.querySelector('#bulkEditBtn')?.addEventListener('click', () => {
        renderBulkEditModal();
      });
      main.querySelector('#bulkDeleteBtn')?.addEventListener('click', () => {
        handleBulkDelete();
      });

      // Task row click — select mode toggles checkbox, normal mode opens edit
      for (const item of main.querySelectorAll('.admin-list-item[data-task-id]')) {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.admin-list-item__actions')) return;
          const tid = item.dataset.taskId;
          if (selectMode) {
            if (selectedTaskIds.has(tid)) {
              selectedTaskIds.delete(tid);
            } else {
              selectedTaskIds.add(tid);
            }
            render();
          } else {
            editingTaskId = editingTaskId === tid ? null : tid;
            render();
          }
        });
      }
      for (const btn of main.querySelectorAll('.admin-edit-task')) {
        btn.addEventListener('click', () => {
          const tid = btn.dataset.taskId;
          editingTaskId = editingTaskId === tid ? null : tid;
          render();
        });
      }

      // Modal backdrop click → close
      document.querySelector('#taskFormBackdrop')?.addEventListener('click', (e) => {
        if (e.target.id === 'taskFormBackdrop') {
          editingTaskId = null;
          render();
        }
      });

      // Pause/unpause
      for (const btn of main.querySelectorAll('.admin-pause-task')) {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.taskId;
          const task = tasksObj[id];
          if (!task) return;
          task.status = task.status === 'paused' ? 'active' : 'paused';
          await writeTask(id, task);
          // Rebuild schedule so paused tasks are removed / unpaused tasks are placed
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, { includeToday: true }, catsObj);
          await multiUpdate(futureUpdates);
          render();
        });
      }

      // Delete task (with undo)
      for (const btn of main.querySelectorAll('.admin-delete-task')) {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.taskId;
          const taskBackup = { ...tasksObj[id] };
          const taskName = taskBackup.name || 'task';

          // Immediately hide from UI
          delete tasksObj[id];
          editingTaskId = null;
          render();

          // Delayed delete — undo restores before Firebase delete fires
          let cancelled = false;
          const deleteTimer = setTimeout(async () => {
            if (cancelled) return;
            // Delete the task first — this is the critical operation
            await removeTask(id);
            // Clean up orphaned schedule entries and completions (best-effort)
            try {
              const allSched = await readAllSchedule() || {};
              const allComp = await readCompletions() || {};
              const cleanupUpdates = {};
              for (const [dateKey, dayEntries] of Object.entries(allSched)) {
                for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
                  if (entry.taskId === id) {
                    cleanupUpdates[`schedule/${dateKey}/${entryKey}`] = null;
                    if (allComp[entryKey]) {
                      cleanupUpdates[`completions/${entryKey}`] = null;
                    }
                  }
                }
              }
              if (Object.keys(cleanupUpdates).length > 0) {
                await multiUpdate(cleanupUpdates);
              }
            } catch (e) {
              console.warn('Task deleted but schedule cleanup failed:', e);
            }
          }, 5500);

          showUndoToast(`Deleted "${taskName}"`, () => {
            cancelled = true;
            clearTimeout(deleteTimer);
            tasksObj[id] = taskBackup;
            render();
          });
        });
      }

      // Task form events
      if (editingTaskId !== null) {
        bindTaskForm();
      }
    }

    function bindTaskForm() {
      const root = editingTaskId === 'new' ? main : document;
      initOwnerChips('tf_owners');
      // Assignment mode toggle
      for (const btn of root.querySelectorAll('#tf_assignMode .admin-mode-btn')) {
        btn.addEventListener('click', () => {
          root.querySelectorAll('#tf_assignMode .admin-mode-btn').forEach(b => b.classList.remove('admin-mode-btn--active'));
          btn.classList.add('admin-mode-btn--active');
        });
      }

      // Category change — show/hide event date icon
      root.querySelector('#tf_category')?.addEventListener('change', (e) => {
        const opt = e.target.selectedOptions[0];
        const isEvent = opt?.dataset.event === '1';
        const eventBtn = root.querySelector('#tf_eventDateBtn');
        if (eventBtn) eventBtn.classList.toggle('is-hidden', !isEvent);
        const eventTimeGroup = root.querySelector('#tf_eventTimeGroup');
        if (eventTimeGroup) eventTimeGroup.classList.toggle('is-hidden', !isEvent);
        const notesGroup = root.querySelector('#tf_notesGroup');
        if (notesGroup) notesGroup.classList.toggle('is-hidden', !isEvent);
        // If event, force rotation to once
        if (isEvent) {
          const rotSelect = root.querySelector('#tf_rotation');
          if (rotSelect) { rotSelect.value = 'once'; rotSelect.dispatchEvent(new Event('change')); }
        }
      });

      // Event date icon — open native date picker
      root.querySelector('#tf_eventDateBtn')?.addEventListener('click', () => {
        const picker = root.querySelector('#tf_eventDate');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      // Rotation change — show/hide dedicated day vs date picker
      root.querySelector('#tf_rotation')?.addEventListener('change', (e) => {
        const rot = e.target.value;
        const group = root.querySelector('#tf_dedicatedDayGroup');
        const daySelect = root.querySelector('#tf_daySelect');
        const dateRow = root.querySelector('#tf_dedicatedDateRow');
        const label = root.querySelector('#tf_dedicatedDayLabel');
        const catOpt = root.querySelector('#tf_category')?.selectedOptions[0];
        const isEvent = catOpt?.dataset.event === '1';
        if (rot === 'daily') {
          group.classList.add('is-hidden');
        } else {
          group.classList.remove('is-hidden');
          const eventBtn = label?.querySelector('#tf_eventDateBtn');
          const btnHtml = eventBtn ? eventBtn.outerHTML : '';
          if (rot === 'once') {
            daySelect.classList.add('is-hidden');
            dateRow.classList.toggle('is-hidden', isEvent);
            label.innerHTML = (isEvent ? 'Event Date ' : 'Date ') + btnHtml;
          } else {
            daySelect.classList.remove('is-hidden');
            dateRow.classList.add('is-hidden');
            label.innerHTML = 'Day ' + btnHtml;
          }
          // Re-bind event date button after innerHTML replace
          label?.querySelector('#tf_eventDateBtn')?.addEventListener('click', () => {
            const picker = root.querySelector('#tf_eventDate');
            if (picker) { try { picker.showPicker(); } catch(e2) { picker.click(); } }
          });
        }
      });

      // Exempt chip toggle
      const exemptChip = root.querySelector('#tf_exempt');
      if (exemptChip) {
        exemptChip.addEventListener('click', () => exemptChip.classList.toggle('chip--active'));
      }

      // Bounty chip toggle
      const bountyToggle = root.querySelector('#tf_bountyToggle');
      const bountyFields = root.querySelector('#tf_bountyFields');
      if (bountyToggle) {
        bountyToggle.addEventListener('click', () => {
          bountyToggle.classList.toggle('chip--active');
          const isActive = bountyToggle.classList.contains('chip--active');
          bountyFields.classList.toggle('is-hidden', !isActive);
          if (isActive) {
            exemptChip?.classList.add('chip--active');
          }
        });
      }
      // Bounty type segmented control
      for (const btn of root.querySelectorAll('#tf_bountyType .segmented-btn')) {
        btn.addEventListener('click', () => {
          root.querySelectorAll('#tf_bountyType .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          root.querySelector('#tf_bountyPointsField').classList.toggle('is-hidden', btn.dataset.value !== 'points');
          root.querySelector('#tf_bountyRewardField').classList.toggle('is-hidden', btn.dataset.value !== 'reward');
        });
      }

      // Cancel
      root.querySelector('#tf_cancel')?.addEventListener('click', () => {
        editingTaskId = null;
        render();
      });

      // Save
      root.querySelector('#tf_save')?.addEventListener('click', async () => {
        const name = root.querySelector('#tf_name')?.value.trim();
        if (!name) { root.querySelector('#tf_name')?.focus(); return; }

        const owners = getSelectedOwners('tf_owners');
        const activeMode = root.querySelector('#tf_assignMode .admin-mode-btn.admin-mode-btn--active');
        const assignMode = activeMode?.dataset.mode || 'rotate';
        const cooldown = root.querySelector('#tf_cooldown')?.value;
        const rotation = root.querySelector('#tf_rotation')?.value || 'daily';

        // Read dedicated day from select or date from picker
        const dayVal = root.querySelector('#tf_daySelect')?.value;
        const dedicatedDay = (rotation !== 'once' && dayVal !== '' && dayVal != null) ? parseInt(dayVal, 10) : null;
        const dedicatedDate = rotation === 'once' ? (root.querySelector('#tf_dedicatedDate')?.value || null) : null;

        const catKey = root.querySelector('#tf_category')?.value || '';
        const catIsEvent = catsObj[catKey]?.isEvent || false;
        const effectiveMode = catIsEvent ? 'fixed' : assignMode;

        // Event date overrides dedicatedDate & rotation
        const eventDate = catIsEvent ? (root.querySelector('#tf_eventDate')?.value || null) : null;
        const effectiveRotation = catIsEvent && eventDate ? 'once' : rotation;
        const effectiveDedicatedDate = catIsEvent && eventDate ? eventDate : dedicatedDate;
        const eventTime = catIsEvent ? (root.querySelector('#tf_eventTime')?.value || null) : null;
        const notes = catIsEvent ? (root.querySelector('#tf_notes')?.value.trim() || null) : null;

        const taskData = {
          name,
          rotation: effectiveRotation,
          difficulty: root.querySelector('#tf_difficulty')?.value || 'medium',
          timeOfDay: root.querySelector('#tf_timeOfDay')?.value || 'anytime',
          estMin: (v => isNaN(v) ? 10 : v)(parseInt(root.querySelector('#tf_estMin')?.value, 10)),
          category: catKey,
          owners,
          ownerAssignmentMode: effectiveMode,
          dedicatedDay,
          dedicatedDate: effectiveDedicatedDate,
          eventTime,
          notes,
          cooldownDays: cooldown ? parseInt(cooldown, 10) : null,
          exempt: root.querySelector('#tf_exempt')?.classList.contains('chip--active') || false,
          status: 'active'
        };

        // Read bounty data
        const isBounty = root.querySelector('#tf_bountyToggle')?.classList.contains('chip--active');
        let bounty = null;
        if (isBounty) {
          const bountyType = root.querySelector('#tf_bountyType .segmented-btn--active')?.dataset?.value || 'points';
          bounty = {
            type: bountyType,
            amount: bountyType === 'points' ? (parseInt(root.querySelector('#tf_bountyAmount')?.value) || 50) : null,
            rewardId: bountyType === 'reward' ? (root.querySelector('#tf_bountyReward')?.value || null) : null
          };
          taskData.exempt = true;
        }
        taskData.bounty = bounty;

        if (editingTaskId === 'new') {
          taskData.createdDate = today;
          const newId = await pushTask(taskData);
          tasksObj[newId] = taskData;

          // Create schedule entry for today so the task appears immediately
          // Skip if one-time task with a future dedicatedDate
          // Skip weekly/monthly if they have a dedicatedDay that isn't today
          const skipToday = (taskData.rotation === 'once' && taskData.dedicatedDate && taskData.dedicatedDate !== today)
            || ((taskData.rotation === 'weekly' || taskData.rotation === 'monthly') && taskData.dedicatedDay != null && dayOfWeek(today) !== taskData.dedicatedDay);
          if (owners.length > 0 && !skipToday) {
            const schedUpdates = {};
            const baseEntry = { taskId: newId, rotationType: taskData.rotation, ownerAssignmentMode: effectiveMode, ...(taskData.notes ? { notes: taskData.notes } : {}) };
            const tod = taskData.timeOfDay || 'anytime';
            let newCounter = 0;
            const newKey = () => `sched_${Date.now()}_${String(newCounter++).padStart(5, '0')}`;

            if (effectiveMode === 'duplicate') {
              for (const oid of owners) {
                if (tod === 'both') {
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'am' };
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'pm' };
                } else {
                  schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: tod };
                }
              }
            } else {
              // Use proper rotation owner instead of always first owner
              const ownerId = effectiveMode === 'fixed' ? owners[0] : getRotationOwner(taskData, today, newId);
              if (tod === 'both') {
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'am' };
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'pm' };
              } else {
                schedUpdates[`schedule/${today}/${newKey()}`] = { ...baseEntry, ownerId, timeOfDay: tod };
              }
            }
            await multiUpdate(schedUpdates);
          }

          // Rebuild future schedule so the new task appears on upcoming days
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, undefined, catsObj);
          await multiUpdate(futureUpdates);
        } else {
          // Preserve existing fields
          const existing = tasksObj[editingTaskId] || {};
          taskData.createdDate = existing.createdDate || today;
          taskData.status = existing.status || 'active';
          await writeTask(editingTaskId, taskData);
          tasksObj[editingTaskId] = taskData;

          // Auto-rebuild future schedule so edits take effect immediately
          const allSched = await readAllSchedule() || {};
          const allComp = await readCompletions() || {};
          const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, { includeToday: true }, catsObj);
          await multiUpdate(futureUpdates);
        }

        editingTaskId = null;
        render();
      });
    }

    // ── Bulk Actions ──

      const pa = peopleArray();
      const ca = catsArray();
      const count = selectedTaskIds.size;

      const ownerChips = pa.map(p =>
        `<button type="button" class="owner-chip" data-id="${p.id}">${esc(p.name)}</button>`
      ).join('');

      const catOptions = ca.map(c =>
        `<option value="${esc(c.key)}">${esc(c.icon)} ${esc(c.label)}</option>`
      ).join('');

      const modalHtml = `<div class="task-form-backdrop" id="bulkEditBackdrop">
        <div class="task-form-modal">
          <div class="admin-form">
            <h3 class="admin-form__title">Edit ${count} task${count !== 1 ? 's' : ''}</h3>
            <div class="bulk-edit-form">
              <div class="form-group">
                <label class="form-label">Rotation</label>

                  <option value="rotate">Rotate</option>

                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Category</label>
                <select id="be_category">
                  <option value="" selected>\u2014 no change \u2014</option>
                  ${catOptions}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Status</label>
                <select id="be_status">
                  <option value="" selected>\u2014 no change \u2014</option>
                  <option value="active">Active</option>
                  <option value="paused">Paused</option>

                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Difficulty</label>
                <select id="be_difficulty">
                  <option value="" selected>\u2014 no change \u2014</option>
                  <option value="easy">Easy</option>
                  <option value="medium">Medium</option>

                </select>

              <div class="form-group">
                <label class="form-label">Time of Day</label>
                <select id="be_timeOfDay">
                  <option value="" selected>\u2014 no change \u2014</option>
                  <option value="am">AM</option>
                  <option value="pm">PM</option>
                  <option value="anytime">Anytime</option>
                  <option value="both">Both</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Estimated Minutes</label>
                <input type="number" id="be_estMin" value="" min="0" max="120" placeholder="Leave blank for no change">
              </div>
              <div class="form-group">
                <label class="form-label">Owners</label>
                <div class="owner-chips" id="be_owners">${ownerChips}</div>
                <span class="owner-chips-hint" id="be_ownersHint">Leave unchanged</span>
              </div>
            </div>
            <div class="admin-form__actions mt-md">
              <button class="btn btn--secondary" id="bulkEditCancel" type="button">Cancel</button>
              <button class="btn btn--primary" id="bulkEditApply" type="button">Apply to ${count} task${count !== 1 ? 's' : ''}</button>

      </div>`;

      // Mount modal into document body so it's above everything
      const mountDiv = document.createElement('div');
      mountDiv.id = 'bulkEditMount';
      mountDiv.innerHTML = modalHtml;
      document.body.appendChild(mountDiv);

      // Track whether owners were touched
      let ownersChanged = false;
      const ownersContainer = document.getElementById('be_owners');
      const ownersHint = document.getElementById('be_ownersHint');
      ownersContainer?.addEventListener('click', (e) => {
        const chip = e.target.closest('.owner-chip');
        if (chip) {
          chip.classList.toggle('owner-chip--selected');
          if (!ownersChanged) {
            ownersChanged = true;
            if (ownersHint) ownersHint.style.display = 'none';
          }
        }
      });

      // Backdrop click closes
      document.getElementById('bulkEditBackdrop')?.addEventListener('click', (e) => {
        if (e.target.id === 'bulkEditBackdrop') closeBulkEditModal();
      });

      // Cancel button
      document.getElementById('bulkEditCancel')?.addEventListener('click', () => {
        closeBulkEditModal();
      });

      // Apply button
      document.getElementById('bulkEditApply')?.addEventListener('click', async () => {
        const changes = {};
        const rotation = document.getElementById('be_rotation')?.value;
        const assignMode = document.getElementById('be_assignMode')?.value;
        const category = document.getElementById('be_category')?.value;
        const status = document.getElementById('be_status')?.value;
        const difficulty = document.getElementById('be_difficulty')?.value;
        const timeOfDay = document.getElementById('be_timeOfDay')?.value;
        const estMinVal = document.getElementById('be_estMin')?.value;

        if (rotation) changes.rotation = rotation;
        if (assignMode) changes.ownerAssignmentMode = assignMode;
        if (category) changes.category = category;
        if (status) changes.status = status;
        if (difficulty) changes.difficulty = difficulty;
        if (timeOfDay) changes.timeOfDay = timeOfDay;
        if (estMinVal !== '' && estMinVal != null) {
          const parsed = parseInt(estMinVal, 10);
          if (!isNaN(parsed)) changes.estMin = parsed;
        }
        if (ownersChanged) {
          changes.owners = Array.from(document.querySelectorAll('#be_owners .owner-chip--selected')).map(b => b.dataset.id);
        }

        if (Object.keys(changes).length === 0) {
          closeBulkEditModal();
          return;
        }

        // Disable button during save
        const applyBtn = document.getElementById('bulkEditApply');
        if (applyBtn) { applyBtn.disabled = true; applyBtn.textContent = 'Saving...'; }

        // Apply changes to each selected task
        const ids = [...selectedTaskIds];
        for (const id of ids) {
          const existing = tasksObj[id];
          if (!existing) continue;
          const merged = { ...existing, ...changes };
          await writeTask(id, merged);
          tasksObj[id] = merged;
        }

        // Single schedule rebuild
        const allSched = await readAllSchedule() || {};
        const allComp = await readCompletions() || {};
        const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp, allSched, { includeToday: true }, catsObj);
        await multiUpdate(futureUpdates);

        closeBulkEditModal();
        selectMode = false;
        selectedTaskIds.clear();
        render();
        showUndoToast(`Updated ${ids.length} task${ids.length !== 1 ? 's' : ''}`);
      });
    }

    function closeBulkEditModal() {
      document.getElementById('bulkEditMount')?.remove();
    }

    async function handleBulkDelete() {
      const count = selectedTaskIds.size;
      if (!await showConfirm({ title: `Delete ${count} task${count !== 1 ? 's' : ''}?`, message: 'This cannot be undone.', danger: true })) return;

      const ids = [...selectedTaskIds];

      // Remove from local state immediately
      for (const id of ids) {
        delete tasksObj[id];
      }
      selectMode = false;
      selectedTaskIds.clear();
      editingTaskId = null;
      render();

      // Delete tasks from Firebase
      for (const id of ids) {
        await removeTask(id);
      }

      // Clean up orphaned schedule entries and completions
      try {
        const allSched = await readAllSchedule() || {};
        const allComp = await readCompletions() || {};
        const cleanupUpdates = {};
        const idSet = new Set(ids);
        for (const [dateKey, dayEntries] of Object.entries(allSched)) {
          for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
            if (idSet.has(entry.taskId)) {
              cleanupUpdates[`schedule/${dateKey}/${entryKey}`] = null;
              if (allComp[entryKey]) {
                cleanupUpdates[`completions/${entryKey}`] = null;
              }
            }
          }
        }
        if (Object.keys(cleanupUpdates).length > 0) {
          await multiUpdate(cleanupUpdates);
        }
      } catch (e) {
        console.warn('Tasks deleted but schedule cleanup failed:', e);
      }

      // Rebuild schedule
      const allSched2 = await readAllSchedule() || {};
      const allComp2 = await readCompletions() || {};
      const futureUpdates = buildScheduleUpdates(tasksObj, peopleArray(), settings, allComp2, allSched2, { includeToday: true }, catsObj);
      await multiUpdate(futureUpdates);

      showUndoToast(`Deleted ${count} task${count !== 1 ? 's' : ''}`);
    }

    // ── Events tab events ──

    function bindEventsTab() {
      main.querySelector('#addEventBtn')?.addEventListener('click', () => {
        editingEventId = 'new';
        render();
      });

      main.querySelectorAll('.admin-event-row').forEach(row => {
        row.addEventListener('click', (e) => {
          if (e.target.closest('.admin-event-delete')) return;
          editingEventId = row.dataset.eventId;
          render();
        });
      });

      main.querySelectorAll('.admin-event-delete').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.eventId;
          const name = eventsObj[id]?.name || 'this event';
          if (!await showConfirm({ title: `Delete "${name}"?`, danger: true })) return;
          await removeEvent(id);
          delete eventsObj[id];
          // Clean up schedule entries
          const allSched = await readAllSchedule() || {};
          const updates = {};
          for (const [dk, dayEntries] of Object.entries(allSched)) {
            for (const [ek, entry] of Object.entries(dayEntries || {})) {
              if (entry.type === 'event' && entry.eventId === id) {
                updates[`schedule/${dk}/${ek}`] = null;
              }
            }
          }
          if (Object.keys(updates).length > 0) await multiUpdate(updates);
          render();
        });
      });

      main.querySelector('#eventFormCancel')?.addEventListener('click', () => {
        editingEventId = null;
        render();
      });

      // All-day chip toggle
      main.querySelector('#aef_allDay')?.addEventListener('click', () => {
        const btn = main.querySelector('#aef_allDay');
        btn.classList.toggle('chip--active');
        const timeGroup = main.querySelector('#aef_timeGroup');
        if (timeGroup) timeGroup.style.display = btn.classList.contains('chip--active') ? 'none' : 'flex';
      });

      // People chips
      main.querySelectorAll('#aef_people .chip').forEach(chip => {
        chip.addEventListener('click', () => chip.classList.toggle('chip--active'));
      });

      // Color dots
      main.querySelectorAll('#aef_colors .dt-color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          main.querySelectorAll('#aef_colors .dt-color-btn').forEach(b => b.classList.remove('dt-color-btn--active'));
          btn.classList.add('dt-color-btn--active');
        });
      });

      main.querySelector('#eventFormSave')?.addEventListener('click', async () => {
        const name = main.querySelector('#aef_name')?.value.trim();
        if (!name) { await showConfirm({ title: 'Event name is required', alert: true }); return; }

        const date = main.querySelector('#aef_date')?.value;
        if (!date) { await showConfirm({ title: 'Date is required', alert: true }); return; }

        const allDay = main.querySelector('#aef_allDay')?.classList.contains('chip--active') || false;
        const startTime = allDay ? null : (main.querySelector('#aef_startTime')?.value || null);
        const endTime = allDay ? null : (main.querySelector('#aef_endTime')?.value || null);
        const selectedPeople = [...main.querySelectorAll('#aef_people .chip--active')].map(c => c.dataset.personId);
        const color = main.querySelector('#aef_colors .dt-color-btn--active')?.dataset.color || '#4285f4';
        const location = main.querySelector('#aef_location')?.value.trim() || null;
        const notes = main.querySelector('#aef_notes')?.value.trim() || null;

        const eventData = { name, date, allDay, startTime, endTime, people: selectedPeople, color, location, notes };

        if (editingEventId && editingEventId !== 'new') {
          await writeEvent(editingEventId, eventData);
          eventsObj[editingEventId] = eventData;
          // Update schedule entry date if changed
          const allSched = await readAllSchedule() || {};
          const updates = {};
          for (const [dk, dayEntries] of Object.entries(allSched)) {
            for (const [ek, entry] of Object.entries(dayEntries || {})) {
              if (entry.type === 'event' && entry.eventId === editingEventId) {
                if (dk !== date) {
                  updates[`schedule/${dk}/${ek}`] = null;
                  const newKey = `sched_${Date.now()}_0`;
                  updates[`schedule/${date}/${newKey}`] = { type: 'event', eventId: editingEventId };
                }
              }
            }
          }
          if (Object.keys(updates).length > 0) await multiUpdate(updates);
        } else {
          const newId = await pushEvent(eventData);
          eventsObj[newId] = eventData;
          // Create schedule entry
          const schedKey = `sched_${Date.now()}_0`;
          await multiUpdate({ [`schedule/${date}/${schedKey}`]: { type: 'event', eventId: newId } });
        }

        editingEventId = null;
        render();

        });
      }

      // Delete person (with undo)
      for (const btn of main.querySelectorAll('.admin-delete-person')) {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.personId;
          const personBackup = { ...peopleObj[id] };
          const name = personBackup.name || 'this person';

          delete peopleObj[id];
          editingPersonId = null;
          render();

          let cancelled = false;
          const deleteTimer = setTimeout(async () => {
            if (cancelled) return;
            await removeData(`people/${id}`);
            await deletePersonRewardsData(id);
          }, 5500);

          showUndoToast(`Removed "${name}"`, () => {
            cancelled = true;
            clearTimeout(deleteTimer);
            peopleObj[id] = personBackup;
            render();
          });
        });
      }

      // Silent balance adjustment (no message sent to person)
      for (const btn of main.querySelectorAll('.admin-adjust-balance')) {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const pid = btn.dataset.personId;
          const person = peopleObj[pid];
          const msgs = (await readMessages(pid)) || {};
          const anchor = (await readBalanceAnchor(pid)) || null;
          const snaps = (await readAllSnapshots()) || {};
          const mults = (await readMultipliers()) || {};
          const { balance } = calculateBalance(pid, snaps, msgs, anchor, mults, tz);

          // Build prompt modal
          const overlay = document.createElement('div');
          overlay.className = 'confirm-modal';
          overlay.setAttribute('role', 'dialog');
          overlay.innerHTML = `<div class="confirm-modal__card">
            <div class="confirm-modal__title">Adjust ${esc(person?.name || '?')}'s Points</div>
            <div class="confirm-modal__message" style="margin-bottom: 12px;">Current balance: <strong>${balance.toLocaleString()} pts</strong></div>
            <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 16px;">
              <button class="btn btn--xs admin-adj-minus" type="button" style="font-size: 1.25rem; padding: 4px 12px;">−</button>
              <input type="number" class="form-input admin-adj-input" value="0" style="text-align: center; flex: 1; font-size: var(--font-md); font-weight: 600;">
              <button class="btn btn--xs admin-adj-plus" type="button" style="font-size: 1.25rem; padding: 4px 12px;">+</button>
            </div>
            <div class="confirm-modal__message admin-adj-preview" style="font-size: var(--font-sm); margin-bottom: 12px;"></div>
            <div class="confirm-modal__actions">
              <button class="btn btn--secondary confirm-modal__cancel" type="button">Cancel</button>
              <button class="btn btn--primary confirm-modal__ok" type="button">Apply</button>
            </div>
          </div>`;

          const input = overlay.querySelector('.admin-adj-input');
          const preview = overlay.querySelector('.admin-adj-preview');
          const minusBtn = overlay.querySelector('.admin-adj-minus');
          const plusBtn = overlay.querySelector('.admin-adj-plus');

          function updatePreview() {
            const val = parseInt(input.value) || 0;
            const newBal = balance + val;
            const sign = val > 0 ? '+' : val < 0 ? '' : '±';
            preview.textContent = val === 0 ? '' : `New balance: ${newBal.toLocaleString()} pts (${sign}${val})`;
            preview.style.color = val > 0 ? 'var(--accent-success, #38a169)' : val < 0 ? 'var(--accent-danger, #e53e3e)' : '';
          }
          input.addEventListener('input', updatePreview);
          minusBtn.addEventListener('click', () => { input.value = (parseInt(input.value) || 0) - 10; updatePreview(); });
          plusBtn.addEventListener('click', () => { input.value = (parseInt(input.value) || 0) + 10; updatePreview(); });

          document.body.appendChild(overlay);
          requestAnimationFrame(() => { overlay.classList.add('confirm-modal--active'); input.focus(); input.select(); });

          const result = await new Promise((resolve) => {
            overlay.querySelector('.confirm-modal__ok').addEventListener('click', () => resolve(parseInt(input.value) || 0));
            overlay.querySelector('.confirm-modal__cancel').addEventListener('click', () => resolve(null));
            overlay.addEventListener('click', (e) => { if (e.target === overlay) resolve(null); });
            overlay.addEventListener('keydown', (e) => {
              if (e.key === 'Escape') resolve(null);
              else if (e.key === 'Enter') resolve(parseInt(input.value) || 0);
            });
          });

          overlay.classList.remove('confirm-modal--active');
          setTimeout(() => overlay.remove(), 200);

          if (result === null || result === 0) return;

          // Silently adjust: freeze current balance + adjustment into anchor
          const newBalance = balance + result;
          await writeBalanceAnchor(pid, { amount: newBalance, anchoredAt: Date.now() });
          await clearMessages(pid, Date.now());
          showUndoToast(`${result > 0 ? '+' : ''}${result} pts → ${esc(person?.name || '?')}`, () => {});
          render();
        });
      }

      // Reset balance
      for (const btn of main.querySelectorAll('.admin-reset-balance')) {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!await showConfirm({ title: 'Reset rewards balance to 0?', danger: true })) return;
          await writeBalanceAnchor(btn.dataset.personId, { amount: 0, anchoredAt: Date.now() });
          render();
        });
      }

      // Clear history (preserve balance)
      for (const btn of main.querySelectorAll('.admin-clear-history')) {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!await showConfirm({ title: 'Clear message history?', message: 'Balance will be preserved.', danger: true })) return;
          const pid = btn.dataset.personId;
          const msgs = (await readMessages(pid)) || {};
          const anchor = (await readBalanceAnchor(pid)) || null;
          const snaps = (await readAllSnapshots()) || {};
          const mults = (await readMultipliers()) || {};
          const { balance } = calculateBalance(pid, snaps, msgs, anchor, mults, tz);
          await writeBalanceAnchor(pid, { amount: balance, anchoredAt: Date.now() });
          await clearMessages(pid, Date.now());
          render();
        });
      }

      if (editingPersonId !== null) {
        bindPersonForm();
      }
    }

          // Reassign tasks to the default category (or first remaining if none flagged)
          const defaultEntry = Object.entries(catsObj).find(([k, c]) => k !== key && c?.isDefault);
          const fallbackKey = defaultEntry ? defaultEntry[0] : (Object.keys(catsObj).find(k => k !== key) || 'chores');
          const fallbackLabel = catsObj[fallbackKey]?.label || fallbackKey;

          if (!await showConfirm({ title: `Delete category "${catsObj[key]?.label}"?`, message: `Tasks will be reassigned to "${fallbackLabel}".`, danger: true })) return;

          for (const [taskId, task] of Object.entries(tasksObj)) {
            if (task.category === key) {
              task.category = fallbackKey;
              await writeTask(taskId, task);
            }
          }

          delete catsObj[key];
          await writeCategories(catsObj);
          render();
        });
      }

      if (editingCatKey !== null) {

          kidLongPressMs: parseIntOr(main.querySelector('#sf_kidLongPressMs')?.value, 500),
          difficultyMultipliers: { easy: newDiffEasy, medium: newDiffMedium, hard: newDiffHard },
          calendarDefaults: {
            defaultView: main.querySelector('#set_calView')?.value || 'week',
            density: main.querySelector('#set_calDensity')?.value || 'snug',
            weekStartDay: parseInt(main.querySelector('#set_weekStart')?.value, 10) || 0,

          },

          msgEl.className = 'admin-msg admin-msg--success mt-sm';
          setTimeout(() => { msgEl.textContent = ''; }, 2000);
