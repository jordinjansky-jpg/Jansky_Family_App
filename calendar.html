<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#141413">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/app-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/app-icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Family Hub — Calendar</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="styles/calendar.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body class="cal-page">
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>
  <div id="sheetMount"></div>
  <div id="taskSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import { initFirebase, isFirstRun, readSettings, writeSettings, readPeople, readTasks, readCategories, readAllSchedule, readEvents, writeCompletion, removeCompletion, writeTask, pushTask, pushEvent, writeEvent, removeEvent, writePerson, multiUpdate, onCompletions, onEvents, onConnectionChange, onAllMessages, writeMessage, markMessageSeen, removeMessage, writeBankToken, markBankTokenUsed, readBank, writeMultiplier, readRewards, readKitchenRecipes, readAllKitchenPlan, writeKitchenPlanSlot, removeKitchenPlanSlot, pushKitchenRecipe, writeKitchenRecipe } from './shared/firebase.js';
    import { renderNavBar, initNavMore, renderHeader, renderPersonFilter, renderTaskCard, renderTimeHeader, renderEmptyState, renderUndoToast, renderGradeBadge, renderTaskDetailSheet, renderBottomSheet, renderEventForm, renderEventDetailSheet, renderAddMenu, openDeviceThemeSheet, initOfflineBanner, initBell, showConfirm, applyDataColors, renderMealDetailSheet, renderMealPlanSheet, initColorButton, renderTaskForm, renderRepeatSheet } from './shared/components.js';
    import { bindTaskRowGesture, closeTaskSheet as closeTaskSheetShared } from './shared/dom-helpers.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig, resolveTheme, applyTextSize } from './shared/theme.js';
    import { todayKey, addDays, dayOfWeek, weekStartForDay, weekEndForDay, monthStart, monthEnd, dateRange, monthNumber, yearNumber, DAY_NAMES_SHORT, formatDateShort, formatDateLong, debounce, escapeHtml } from './shared/utils.js';
    import { isComplete, filterByPerson, filterEventsByPerson, getEventsForDate, sortEvents, dayProgress, getOverdueCooldownTaskIds, sortEntries, groupByFrequency } from './shared/state.js';
    import { basePoints, dailyScore, dailyPossible, gradeDisplay } from './shared/scoring.js';
    import { buildScheduleUpdates, getRotationOwner, rebuildSingleTaskSchedule } from './shared/scheduler.js';
    import { renderWeekView, renderDayView, renderMonthView, renderCalendarNav } from './shared/calendar-views.js';
    import { resizeImageForUpload, renderConfirmRow, openMonthClarificationSheet } from './shared/ai-helpers.js';

    const KITCHEN_WORKER_URL = 'https://kitchen-import.jordin-jansky.workers.dev';

    // ── Cached theme ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load core data ──
    const [settings, peopleObj, tasksObj, catsObj, eventsObj, calRewards] = await Promise.all([
      readSettings(), readPeople(), readTasks(), readCategories(), readEvents(), readRewards()
    ]);

    if (settings?.theme) applyTheme(resolveTheme(settings.theme));
    if (settings?.textSize) applyTextSize(settings.textSize);

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);
    const people = peopleObj ? Object.entries(peopleObj).map(([id, p]) => ({ id, ...p })) : [];
    const tasks = tasksObj || {};
    const cats = catsObj || {};
    let events = eventsObj || {};

    const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    // ── Personal preferences (localStorage) ──
    const calPrefsRaw = localStorage.getItem('dr-cal-prefs');
    const calPrefs = calPrefsRaw ? JSON.parse(calPrefsRaw) : {};
    function saveCalPrefs() { localStorage.setItem('dr-cal-prefs', JSON.stringify(calPrefs)); }

    // ── Calendar defaults (admin settings → personal override) ──
    const calDefaults = settings?.calendarDefaults || {};
    let weekStartDay = calPrefs.weekStartDay ?? calDefaults.weekStartDay ?? 0;
    let density = calPrefs.density || calDefaults.density || 'snug';
    let showDailyInWeek = calPrefs.showDailyInWeek ?? calDefaults.showDailyInWeek ?? true;
    const defaultView = calPrefs.defaultView || calDefaults.defaultView || 'week';

    // ── Person link mode ──
    const personParam = new URLSearchParams(window.location.search).get('person');
    const linkedPerson = personParam
      ? people.find(p => p.name.toLowerCase() === personParam.toLowerCase())
      : null;
    if (linkedPerson?.theme?.preset) applyTheme(linkedPerson.theme);

    // ── App state ──
    let currentView = defaultView; // 'week' | 'month' | 'day'
    let viewWeekStart = weekStartForDay(today, weekStartDay);
    let viewMonth = today.substring(0, 7);
    let viewDay = null;
    let activePerson = calPrefs.personFilter || linkedPerson?.prefs?.calendar?.personFilter || null;
    let completions = {};
    let allSchedule = {};
    let allMeals = {};
    let recipes = {};
    let suppressedCooldownTaskIds = new Set();
    let pendingSliderOverride = null;
    let daySwipeController = null;

    // ── Header & Nav ──
    const debugActive = localStorage.getItem('dr-debug') === 'true';
    document.getElementById('headerMount').innerHTML = renderHeader({
      title: 'Calendar',
      showBell: true,
    });
    document.getElementById('navMount').innerHTML = renderNavBar('calendar');
    initNavMore(document.getElementById('taskSheetMount'), () => settings?.theme,
      linkedPerson ? { person: linkedPerson, writePerson, displayDefaults: settings } : undefined,
      { settings, writeSettings, displayDefaults: settings },
      () => render());
    initOfflineBanner(onConnectionChange);
    initBell(() => people, () => calRewards || {}, onAllMessages, { writeMessageFn: writeMessage, markMessageSeenFn: markMessageSeen, removeMessageFn: removeMessage, writeBankTokenFn: writeBankToken, markBankTokenUsedFn: markBankTokenUsed, readBankFn: readBank, writeMultiplierFn: writeMultiplier, getTodayFn: () => today, approverName: linkedPerson?.name || null });

    document.getElementById('loadingState').style.display = 'none';
    const main = document.getElementById('mainContent');
    main.style.display = '';
    const sheetMount = document.getElementById('sheetMount');
    const taskSheetMount = document.getElementById('taskSheetMount');

    // ══════════════════════════════════════════
    // Data loading
    // ══════════════════════════════════════════

    async function loadData() {
      const sched = await readAllSchedule();
      allSchedule = sched || {};
      suppressedCooldownTaskIds = getOverdueCooldownTaskIds(allSchedule, completions, tasks, today);
      [allMeals, recipes] = await Promise.all([
        readAllKitchenPlan().then(v => v || {}),
        readKitchenRecipes().then(v => v || {}),
      ]);
    }

    // ══════════════════════════════════════════
    // Main render — dispatches to active view
    // ══════════════════════════════════════════

    function render(opts = {}) {
      // Backwards-compat: render(true) used to mean preserveScroll=true
      if (opts === true) opts = { preserveScroll: true, animate: false };
      const { preserveScroll = false, animate = true } = opts;
      const scrollY = preserveScroll ? window.scrollY : null;
      const enterCls = animate ? 'cal-view-enter' : 'cal-view-static';
      let navLabel = '';
      let isCurrentPeriod = false;

      if (currentView === 'day') {
        const dayLabel = formatDateShort(viewDay);
        const isToday = viewDay === today;
        const prog = getDayProgress(viewDay);

        let html = `<div class="cal-day-header">
          <div>
            <div class="cal-day-header__title">${dayLabel}${isToday ? ' <span class="cal-sheet__today">Today</span>' : ''}</div>
          </div>
          <div class="cal-day-header__meta">
            ${prog.total > 0 ? `<span>${prog.done}/${prog.total}</span>` : ''}
            <button class="date-nav__btn" id="backToWeek" type="button" title="Back to week">&times;</button>
          </div>
        </div>`;

        html += renderPersonFilter(people, activePerson);
        html += `<div class="${enterCls}">`;
        html += renderDayView({
          dateKey: viewDay, today, events, allSchedule, completions, tasks, cats, people, activePerson, settings,
          dayMeals: allMeals[viewDay] || {},
          recipes
        });
        html += `</div>`;
        main.innerHTML = html;
        applyDataColors(main);
        bindDayViewEvents();
        if (scrollY != null) requestAnimationFrame(() => window.scrollTo(0, scrollY));
        return;
      }

      // Week or Month view
      if (currentView === 'week') {
        const weekEnd = addDays(viewWeekStart, 6);
        const m1 = MONTH_NAMES[monthNumber(viewWeekStart) - 1];
        const m2 = monthNumber(viewWeekStart) !== monthNumber(weekEnd) ? ' – ' + MONTH_NAMES[monthNumber(weekEnd) - 1] : '';
        navLabel = `${m1}${m2} ${yearNumber(viewWeekStart)}`;
        const todayWeekStart = weekStartForDay(today, weekStartDay);
        isCurrentPeriod = viewWeekStart === todayWeekStart;
      } else {
        navLabel = `${MONTH_NAMES[monthNumber(viewMonth + '-01') - 1]} ${yearNumber(viewMonth + '-01')}`;
        isCurrentPeriod = viewMonth === today.substring(0, 7);
      }

      // Monoline SVG icons for density + daily toggles — matches view switcher style
      const densityIcon = density === 'cozy'
        ? `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="3" x2="14" y2="3"/><line x1="2" y1="6.5" x2="14" y2="6.5"/><line x1="2" y1="10" x2="14" y2="10"/><line x1="2" y1="13.5" x2="14" y2="13.5"/></svg>`;
      const dailyIcon = showDailyInWeek
        ? `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="5.5"/><path d="M5.5 8l1.8 1.8 3.2-3.6"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="5.5"/><line x1="5.5" y1="5.5" x2="10.5" y2="10.5"/><line x1="10.5" y1="5.5" x2="5.5" y2="10.5"/></svg>`;
      const controlsHtml = currentView === 'week' ? `
          <button class="cal-controls__toggle${density === 'cozy' ? ' active' : ''}" data-ctl-density="${density === 'cozy' ? 'snug' : 'cozy'}" type="button" title="${density === 'cozy' ? 'Compact view' : 'Spacious view'}">
            ${densityIcon}
          </button>
          <button class="cal-controls__toggle${showDailyInWeek ? ' active' : ''}" data-ctl-daily="${showDailyInWeek ? 'false' : 'true'}" type="button" title="${showDailyInWeek ? 'Hide daily tasks' : 'Show daily tasks'}">
            ${dailyIcon}
          </button>` : '';
      let html = renderCalendarNav({ currentView, viewLabel: navLabel, isCurrentPeriod, weekStartDay, controlsHtml });
      html += renderPersonFilter(people, activePerson);

      html += `<div class="${enterCls} ${density === 'cozy' ? 'cal-density--cozy' : ''}">`;
      if (currentView === 'week') {
        html += renderWeekView({
          weekStartDate: viewWeekStart, today, events, allSchedule, completions, tasks, cats, people, activePerson, density, weekStartDay, showDailyInWeek
        });
      } else {
        html += renderMonthView({
          viewMonth, today, events, allSchedule, completions, tasks, cats, people, activePerson, density, weekStartDay
        });
      }
      html += `</div>`;

      main.innerHTML = html;
      applyDataColors(main);
      bindNavEvents();
      bindPersonFilterEvents();

      if (currentView === 'week') bindWeekViewEvents();
      else bindMonthViewEvents();

      if (scrollY != null) requestAnimationFrame(() => window.scrollTo(0, scrollY));
    }

    function getDayProgress(dateKey) {
      const dayEntries = allSchedule[dateKey] || {};
      const filtered = filterByPerson(dayEntries, activePerson);
      const taskEntries = Object.fromEntries(
        Object.entries(filtered).filter(([, e]) => e.type !== 'event')
      );
      return dayProgress(taskEntries, completions);
    }

    // ══════════════════════════════════════════
    // Navigation bindings
    // ══════════════════════════════════════════

    function bindNavEvents() {
      document.getElementById('prevPeriod')?.addEventListener('click', () => {
        if (currentView === 'week') {
          viewWeekStart = addDays(viewWeekStart, -7);
        } else {
          const d = new Date(Date.UTC(yearNumber(viewMonth + '-01'), monthNumber(viewMonth + '-01') - 2, 1));
          viewMonth = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
        }
        render();
      });

      document.getElementById('nextPeriod')?.addEventListener('click', () => {
        if (currentView === 'week') {
          viewWeekStart = addDays(viewWeekStart, 7);
        } else {
          const d = new Date(Date.UTC(yearNumber(viewMonth + '-01'), monthNumber(viewMonth + '-01'), 1));
          viewMonth = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
        }
        render();
      });

      document.getElementById('goToday')?.addEventListener('click', () => {
        if (currentView === 'week') viewWeekStart = weekStartForDay(today, weekStartDay);
        else viewMonth = today.substring(0, 7);
        render();
      });

      document.getElementById('viewSwitcher')?.addEventListener('click', () => {
        currentView = currentView === 'week' ? 'month' : 'week';
        render();
      });

      // Inline density toggle
      main.querySelectorAll('[data-ctl-density]').forEach(btn => btn.addEventListener('click', () => {
        density = btn.dataset.ctlDensity;
        calPrefs.density = density;
        saveCalPrefs();
        render();
      }));

      // Inline daily toggle
      main.querySelectorAll('[data-ctl-daily]').forEach(btn => btn.addEventListener('click', () => {
        showDailyInWeek = btn.dataset.ctlDaily === 'true';
        calPrefs.showDailyInWeek = showDailyInWeek;
        saveCalPrefs();
        render();
      }));
    }

    function bindPersonFilterEvents() {
      main.querySelectorAll('.person-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          activePerson = btn.dataset.personId || null;
          calPrefs.personFilter = activePerson;
          saveCalPrefs();
          if (linkedPerson) {
            const prefs = { ...(linkedPerson.prefs || {}), calendar: { personFilter: activePerson } };
            linkedPerson.prefs = prefs;
            const { id, ...data } = linkedPerson;
            writePerson(id, data);
          }
          render();
        });
      });
    }

    // ══════════════════════════════════════════
    // Week view bindings
    // ══════════════════════════════════════════

    function bindWeekViewEvents() {
      main.querySelectorAll('.cal-week__col[data-date]').forEach(col => {
        col.addEventListener('click', (e) => {
          if (e.target.classList.contains('cal-week__task-check')) return;
          viewDay = col.dataset.date;
          currentView = 'day';
          render();
        });
      });

      main.querySelectorAll('.cal-week__task-check').forEach(cb => {
        cb.addEventListener('change', (e) => {
          e.stopPropagation();
          toggleTask(cb.dataset.entryKey, cb.dataset.dateKey);
        });
      });

    }

    function bindMonthViewEvents() {
      main.querySelectorAll('.cal-grid__cell[data-date]').forEach(cell => {
        cell.addEventListener('click', () => {
          viewDay = cell.dataset.date;
          currentView = 'day';
          render();
        });
      });
    }

    // ══════════════════════════════════════════
    // Day view bindings
    // ══════════════════════════════════════════

    function bindDayViewEvents() {
      bindPersonFilterEvents();

      document.getElementById('backToWeek')?.addEventListener('click', () => {
        currentView = defaultView;
        if (currentView === 'week' && viewDay) {
          viewWeekStart = weekStartForDay(viewDay, weekStartDay);
        }
        viewDay = null;
        render();
      });

      main.querySelectorAll('.event-bubble[data-event-id]').forEach(btn => {
        let pressTimer = null;
        let didLongPress = false;
        btn.addEventListener('pointerdown', () => {
          didLongPress = false;
          pressTimer = setTimeout(() => {
            didLongPress = true;
            openEventDetailSheet(btn.dataset.eventId);
          }, settings?.longPressMs ?? 800);
        });
        btn.addEventListener('pointerup', () => {
          clearTimeout(pressTimer);
          if (!didLongPress) openEventDetailSheet(btn.dataset.eventId);
        });
        btn.addEventListener('pointerleave', () => { clearTimeout(pressTimer); });
        btn.addEventListener('pointercancel', () => { clearTimeout(pressTimer); });
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
      });

      // Timed event pills in day view (wrapper divs carry data-event-id)
      main.querySelectorAll('[data-event-id]:not(.event-bubble)').forEach(pill => {
        let pressTimer = null;
        let didLongPress = false;
        pill.addEventListener('pointerdown', () => {
          didLongPress = false;
          pressTimer = setTimeout(() => {
            didLongPress = true;
            openEventDetailSheet(pill.dataset.eventId);
          }, settings?.longPressMs ?? 800);
        });
        pill.addEventListener('pointerup', () => {
          clearTimeout(pressTimer);
          if (!didLongPress) openEventDetailSheet(pill.dataset.eventId);
        });
        pill.addEventListener('pointerleave', () => { clearTimeout(pressTimer); });
        pill.addEventListener('pointercancel', () => { clearTimeout(pressTimer); });
        pill.addEventListener('contextmenu', (e) => e.preventDefault());
      });

      main.querySelectorAll('.cal-day__task').forEach(row => {
        bindTaskRowGesture(row, {
          longPressMs: settings?.longPressMs ?? 800,
          onTap: toggleTask,
          onLongPress: openTaskSheet,
          isTapBlocked: () => row.querySelector('.cal-day__task-check')?.dataset.tapBlocked === 'true',
        });
      });

      // Meal cards
      main.querySelectorAll('.card--meal:not(.card--meal--school)').forEach(card => {
        card.addEventListener('click', () => {
          const recipeId = card.dataset.mealId;
          const slot = card.dataset.slot;
          const plan = allMeals[viewDay]?.[slot];
          if (!plan) return;
          openCalMealDetailSheet(plan, slot);
        });
      });

      // Meals section "+" add button
      main.querySelector('.cal-day__section-add[data-add-meal]')?.addEventListener('click', () => {
        openCalMealPlanSheet('dinner');
      });

      // Swipe between days — use AbortController to prevent stacking listeners on re-render
      if (daySwipeController) daySwipeController.abort();
      daySwipeController = new AbortController();
      let sx = 0, sy = 0;
      main.addEventListener('touchstart', (e) => {
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
      }, { passive: true, signal: daySwipeController.signal });
      main.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - sx;
        const dy = e.changedTouches[0].clientY - sy;
        if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          viewDay = addDays(viewDay, dx < 0 ? 1 : -1);
          render();
        }
      }, { passive: true, signal: daySwipeController.signal });
    }

    // ══════════════════════════════════════════
    // Completion toggle
    // ══════════════════════════════════════════

    async function toggleTask(entryKey, dateKey, { noPenalty = false } = {}) {
      if (!entryKey) return;
      const wasComplete = isComplete(entryKey, completions);

      // Tactile press feedback on the affected row (week or day view) — mirrors dashboard.
      // Only for completing (not un-completing) so undo feels snappy.
      let pressEl = null;
      if (!wasComplete) {
        pressEl = main.querySelector(`.cal-day__task[data-entry-key="${entryKey}"], .cal-week__task[data-entry-key="${entryKey}"]`);
        if (pressEl) {
          pressEl.classList.add('cal-task--completing');
          pressEl.style.pointerEvents = 'none';
        }
      }

      if (wasComplete) {
        delete completions[entryKey];
        await removeCompletion(entryKey);
      } else {
        const record = {
          completedAt: firebase.database.ServerValue.TIMESTAMP,
          completedBy: 'calendar'
        };
        const pendingVal = pendingSliderOverride?.entryKey === entryKey ? pendingSliderOverride.value : null;
        const savedVal = (allSchedule[dateKey] || {})[entryKey]?.pointsOverride;
        const overrideVal = pendingVal ?? savedVal ?? null;
        if (overrideVal != null && overrideVal !== 100) {
          record.pointsOverride = overrideVal;
        }
        pendingSliderOverride = null;

        if (!noPenalty && dateKey < today && record.pointsOverride == null) {
          const entry = (allSchedule[dateKey] || {})[entryKey];
          const task = entry ? tasks[entry.taskId] : null;
          const cat = task?.category ? cats[task.category] : null;
          if (!cat?.isEvent && !task?.exempt) {
            record.pointsOverride = settings?.pastDueCreditPct ?? 75;
            record.isLate = true;
          }
        }
        completions[entryKey] = record;
        await writeCompletion(entryKey, record);

        // Auto-archive one-time tasks
        const dayEntries = allSchedule[dateKey] || {};
        const entry = dayEntries[entryKey];
        if (entry) {
          const task = tasks[entry.taskId];
          if (task && task.rotation === 'once') {
            task.status = 'completed';
            await writeTask(entry.taskId, task);
          }
        }
      }

      // Cooldown task rebuild
      const toggledEntry = (allSchedule[dateKey] || {})[entryKey];
      if (toggledEntry) {
        const toggledTask = tasks[toggledEntry.taskId];
        if (toggledTask?.cooldownDays > 0) {
          const cdUpdates = rebuildSingleTaskSchedule(
            toggledEntry.taskId, toggledTask, today, allSchedule, completions, people, settings, tasks, catsObj
          );
          if (Object.keys(cdUpdates).length > 0) {
            await multiUpdate(cdUpdates);
            allSchedule = await readAllSchedule() || {};
            suppressedCooldownTaskIds = getOverdueCooldownTaskIds(allSchedule, completions, tasks, today);
          }
        }
      }

      // Match dashboard: when completing, let the press animation play before swapping the DOM.
      // The 400ms delay also coalesces the Firebase echo (debouncedRender at ~150-300ms) into
      // a single render, eliminating the double-flash.
      // animate:false suppresses the cal-view-enter fade so the row update feels in-place.
      if (!wasComplete) {
        setTimeout(() => render({ preserveScroll: true, animate: false }), 400);
      } else {
        render({ preserveScroll: true, animate: false });
      }
    }

    // ══════════════════════════════════════════
    // Universal Add Menu
    // ══════════════════════════════════════════

    function openAddMenu() {
      const importIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>';
      const options = [

    function openCalendarPhotoImport() {
      const CAM_SVG = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;

      const FILE_SVG = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;

      const cpGallery = document.createElement('input');

      const cpFiles = document.createElement('input');
      cpFiles.type = 'file'; cpFiles.accept = '.jpg,.jpeg,.png,.heic,.heif,.webp,.gif'; cpFiles.hidden = true;

      const cpCleanup = () => [cpCamera, cpGallery, cpFiles].forEach(i => { if (document.body.contains(i)) document.body.removeChild(i); });

      const processFile = async (file) => {
        if (!file) return;
        cpCleanup();
        taskSheetMount.innerHTML = renderBottomSheet(`
          <div class="sheet__header"><h2 class="sheet__title">Photo of flyer</h2></div>
          <div class="sheet__content">
            <div class="ai-loading"><div class="ai-loading__spinner"></div>Reading calendar…</div>
          </div>`);
        applyDataColors(taskSheetMount);
        requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));
        try {
          const { base64, mediaType } = await resizeImageForUpload(file);
          const resp = await fetch(KITCHEN_WORKER_URL, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'calendarPhoto', input: { base64, mediaType, contextDate: today, context: cpContext } }),

          closeTaskSheet();
          if (data.error || !data.events?.length) {

                </div>
                <div class="sheet__footer">
                  <button class="btn btn--secondary" id="cpRetry">Try again</button>
                </div>`);
              applyDataColors(taskSheetMount);
              requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));
              taskSheetMount.querySelector('#cpRetry')?.addEventListener('click', () => {
                closeTaskSheet();
                setTimeout(() => openCalendarPhotoImport(), 320);
              });

          }
          if (data.monthUncertain) {
            setTimeout(() => {
              openMonthClarificationSheet(data.assumedMonth, (yearMonth) => {
                const remapped = data.events.map(ev => {
                  if (!ev.date || !/^\d{4}-\d{2}-\d{2}$/.test(ev.date)) return ev;
                  return { ...ev, date: `${yearMonth}-${ev.date.slice(8, 10)}` };
                });
                openImportEventsConfirm(remapped, false);
              });
            }, 320);
          } else {
            setTimeout(() => openImportEventsConfirm(data.events, false), 320);
          }
        } catch (err) {
          closeTaskSheet();
          setTimeout(() => {
            taskSheetMount.innerHTML = renderBottomSheet(`
              <div class="sheet__header"><h2 class="sheet__title">Photo of flyer</h2></div>
              <div class="sheet__content">
                <p style="color:var(--text-muted);font-size:var(--font-sm)">Something went wrong.</p>
                <p style="color:var(--text-muted);font-size:var(--font-xs)">${escapeHtml(err?.message || 'Check your connection.')}</p>

                <button class="btn btn--secondary" id="cpRetry">Try again</button>
              </div>`);
            applyDataColors(taskSheetMount);
            requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));
            taskSheetMount.querySelector('#cpRetry')?.addEventListener('click', () => {
              closeTaskSheet();
              setTimeout(() => openCalendarPhotoImport(), 320);
            });
          }, 320);
        }
      };

      [cpCamera, cpGallery, cpFiles].forEach(inp => {
        document.body.appendChild(inp);

      const overlay = document.createElement('div');
      overlay.className = 'ef2-subsheet-overlay';
      overlay.innerHTML = `<div class="ef2-subsheet">
        <div class="sheet__header"><h2 class="sheet__title">Photo of flyer</h2></div>
        <div class="sheet__content">
          <div class="field" style="margin-bottom:var(--spacing-sm)">
            <label class="field__label" for="cp_ctx">Optional note for AI</label>
            <input class="field__input" id="cp_ctx" type="text" placeholder="e.g. May 2026, Sophie's school" autocomplete="off">
          </div>
          <button class="ef2-source-btn" data-source="camera" type="button"><span class="ef2-source-icon">${CAM_SVG}</span><span>Camera</span></button>
          <button class="ef2-source-btn" data-source="gallery" type="button"><span class="ef2-source-icon">${GAL_SVG}</span><span>Gallery</span></button>
          <button class="ef2-source-btn" data-source="files" type="button"><span class="ef2-source-icon">${FILE_SVG}</span><span>Files</span></button>
        </div>
        <div class="sheet__footer">
          <button class="btn btn--ghost" id="cpCancelBtn" type="button">Cancel</button>
        </div>
      </div>`;

      const closeOverlay = () => {
        overlay.classList.remove('active');
        setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 320);
      };
      overlay.querySelector('#cpCancelBtn')?.addEventListener('click', () => { cpCleanup(); closeOverlay(); });
      overlay.querySelectorAll('.ef2-source-btn').forEach(btn => {

    function openImportEventsConfirm(eventsArr, hadRecurring) {
      const recurringBanner = hadRecurring
        ? `<div class="banner banner--info" role="status" style="margin-bottom:var(--spacing-sm)">Recurring events were skipped — only one-time events are supported.</div>`
        : '';

      const rows = eventsArr.map((ev, i) => {
        const timeSub = ev.time ? ev.time : (ev.allDay ? 'All day' : null);
        const row = renderConfirmRow(
          { ...ev, _sub: timeSub },
          { labelKey: 'name', subKey: '_sub', confidenceKey: 'confidence', key: i }
        );
        const dateLabel = ev.dateConfidence === 'low'
          ? `<label style="font-size:var(--font-xs);color:var(--warning)">Date (uncertain — please verify)</label>`
          : `<label style="font-size:var(--font-xs);color:var(--text-muted)">Date</label>`;
        const dateWrap = `<div class="ev-date-wrap" data-idx="${i}" style="padding:0 var(--spacing-md) var(--spacing-xs)">
          ${dateLabel}
          <input type="date" class="field__input ev-date" data-idx="${i}" value="${ev.date || ''}" style="margin-top:4px">
        </div>`;
        return row + dateWrap;
      }).join('');

      const n = eventsArr.length;

      taskSheetMount.innerHTML = renderBottomSheet(`
        <div class="sheet__header"><h2 class="sheet__title">Import events</h2></div>
        <div class="sheet__content">
          ${recurringBanner}
          <div class="confirm-list" id="ievList">${rows}</div>
        </div>
        <div class="sheet__footer">
          <button class="btn btn--secondary" id="ievCancel">Cancel</button>
          <button class="btn btn--primary" id="ievImport">Import ${n} event${n !== 1 ? 's' : ''}</button>
        </div>`);
      applyDataColors(taskSheetMount);
      requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));

      const list = taskSheetMount.querySelector('#ievList');
      const importBtn = taskSheetMount.querySelector('#ievImport');

      const updateBtn = () => {
        const count = list.querySelectorAll('.confirm-row:not(.is-deselected)').length;
        importBtn.textContent = `Import ${count} event${count !== 1 ? 's' : ''}`;
        importBtn.disabled = count === 0;
      };

      list.addEventListener('click', (e) => {
        if (e.target.closest('.ev-date-wrap')) return;
        const row = e.target.closest('.confirm-row');
        if (!row) return;
        const idx = row.dataset.key;
        row.classList.toggle('is-deselected');
        const dateWrap = list.querySelector(`.ev-date-wrap[data-idx="${idx}"]`);
        if (dateWrap) dateWrap.style.display = row.classList.contains('is-deselected') ? 'none' : '';
        updateBtn();
      });

      taskSheetMount.querySelector('#ievCancel')?.addEventListener('click', closeTaskSheet);

      importBtn.addEventListener('click', async () => {
        const selected = [...list.querySelectorAll('.confirm-row:not(.is-deselected)')]
          .map(row => {
            const ev = eventsArr[+row.dataset.key];
            const dateEl = list.querySelector(`.ev-date[data-idx="${row.dataset.key}"]`);
            const date = dateEl?.value || ev.date || null;
            return date ? { ...ev, date } : null;
          })
          .filter(Boolean);
        if (!selected.length) { closeTaskSheet(); return; }
        importBtn.disabled = true; importBtn.textContent = 'Adding…';
        try {
          let counter = 0;
          for (const ev of selected) {
            const eventData = {
              name: ev.name, date: ev.date, allDay: ev.allDay ?? true,
              startTime: ev.time || null, endTime: null,
              color: people[0]?.color || '#4285f4',
              people: [], notes: ev.notes || null, url: null,
            };
            const newId = await pushEvent(eventData);
            events[newId] = eventData;
            const schedKey = `sched_${Date.now()}_evt_${counter++}`;
            await multiUpdate({ [`schedule/${ev.date}/${schedKey}`]: { type: 'event', eventId: newId } });
          }
          closeTaskSheet();
          render();
        } catch (err) {
          importBtn.disabled = false;
          importBtn.textContent = `Import ${selected.length} event${selected.length !== 1 ? 's' : ''}`;
        }
      });
    }

    // ══════════════════════════════════════════
    // Event Form (Create / Edit)
    // ══════════════════════════════════════════

    function openEventForm(existingEventId = null, savedState = null) {
      const event = savedState || (existingEventId ? events[existingEventId] : {});
      const mode = existingEventId ? 'edit' : 'create';
      const dateKey = event.date || viewDay || today;
      const html = renderEventForm({ event, eventId: existingEventId, people, dateKey, mode });
      taskSheetMount.innerHTML = renderBottomSheet(html);
      taskSheetMount.querySelectorAll('.ef2-person-chip[data-person-color]').forEach(chip => {
        chip.style.setProperty('--chip-color', chip.dataset.personColor);
      });
      applyDataColors(taskSheetMount);

      requestAnimationFrame(() => {
        document.getElementById('bottomSheet')?.classList.add('active');
        if (mode === 'create') document.getElementById('ef2_name')?.focus();
      });

      document.getElementById('ef2_close')?.addEventListener('click', closeTaskSheet);
      document.getElementById('bottomSheet')?.addEventListener('click', (e) => {
        if (e.target === document.getElementById('bottomSheet')) closeTaskSheet();
      });

      const dateBtn = document.getElementById('ef2_dateBtn');
      const datePicker = document.getElementById('ef2_datePicker');
      const dateDisplay = document.getElementById('ef2_dateDisplay');
      const dateInput = document.getElementById('ef2_date');
      const timePicker = document.getElementById('ef2_timePicker');
      const timeBtn = document.getElementById('ef2_timeBtn');
      const timeDisplay = document.getElementById('ef2_timeDisplay');

      function ef2GetTime(prefix) {
        const raw = (document.getElementById(`ef2_${prefix}Text`)?.value || '').replace(/\D/g, '');
        const ampm = document.getElementById(`ef2_${prefix}AmPm`)?.dataset.ampm || 'AM';
        if (!raw) return '';
        let h, m;
        if (raw.length <= 2) { h = parseInt(raw, 10); m = 0; }
        else if (raw.length === 3) { h = parseInt(raw[0], 10); m = parseInt(raw.slice(1), 10); }
        else { h = parseInt(raw.slice(0, 2), 10); m = parseInt(raw.slice(2, 4), 10); }
        if (isNaN(h) || h < 1 || h > 12) return '';
        if (isNaN(m) || m > 59) m = 0;
        let h24 = h;
        if (ampm === 'AM' && h === 12) h24 = 0;
        else if (ampm === 'PM' && h !== 12) h24 = h + 12;
        return `${String(h24).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      }

      dateBtn?.addEventListener('click', () => {
        const open = datePicker.classList.toggle('is-open');
        if (open) timePicker?.classList.remove('is-open');
      });
      dateInput?.addEventListener('change', () => {
        dateDisplay.textContent = dateInput.value ? formatDateShort(dateInput.value) : 'Set date';
        datePicker?.classList.remove('is-open');
      });
      timeBtn?.addEventListener('click', () => {
        const open = timePicker.classList.toggle('is-open');
        if (open) datePicker?.classList.remove('is-open');
      });

      function updateTimeDisplay() {
        if (document.getElementById('ef2_allDay')?.classList.contains('is-active')) return;
        const s = ef2GetTime('start');
        const e = ef2GetTime('end');
        if (timeDisplay) {
          const fmt = (t) => {
            if (!t) return '';
            const [h, min] = t.split(':').map(Number);
            const ap = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return min === 0 ? `${h12} ${ap}` : `${h12}:${String(min).padStart(2, '0')} ${ap}`;
          };
          timeDisplay.textContent = s ? `${fmt(s)} → ${fmt(e)}` : 'Set time';
        }
      }

      ['ef2_startText', 'ef2_endText'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', updateTimeDisplay);
      });
      ['ef2_startAmPm', 'ef2_endAmPm'].forEach(id => {
        const btn = document.getElementById(id);
        btn?.addEventListener('click', () => {
          const curr = btn.dataset.ampm || 'AM';
          const next = curr === 'AM' ? 'PM' : 'AM';
          btn.dataset.ampm = next; btn.textContent = next;
          updateTimeDisplay();
        });
      });

      document.getElementById('ef2_allDay')?.addEventListener('click', () => {
        const allDayBtn = document.getElementById('ef2_allDay');
        allDayBtn.classList.toggle('is-active');
        const isAllDay = allDayBtn.classList.contains('is-active');
        document.getElementById('ef2_timeBtn')?.classList.toggle('ef2-hidden', isAllDay);
        document.getElementById('ef2_timePicker')?.classList.toggle('ef2-hidden', isAllDay);
        if (isAllDay) document.getElementById('ef2_timePicker')?.classList.remove('is-open');
        if (!isAllDay) updateTimeDisplay();
      });

      const peopleWrap = document.getElementById('ef2_people');
      function getPrimaryChip() { return peopleWrap?.querySelector('.ef2-person-chip[data-state="primary"]'); }
      peopleWrap?.addEventListener('click', (e) => {
        const chip = e.target.closest('.ef2-person-chip');
        if (!chip) return;
        const currentState = chip.dataset.state;
        if (!currentState) {
          chip.setAttribute('data-state', getPrimaryChip() ? 'attending' : 'primary');
        } else if (currentState === 'attending') {
          const oldPrimary = getPrimaryChip();
          if (oldPrimary) oldPrimary.setAttribute('data-state', 'attending');
          chip.setAttribute('data-state', 'primary');
        } else if (currentState === 'primary') {
          chip.removeAttribute('data-state');
          const firstAttending = peopleWrap.querySelector('.ef2-person-chip[data-state="attending"]');
          if (firstAttending) firstAttending.setAttribute('data-state', 'primary');
        }
      });

      document.getElementById('ef2_notesChip')?.addEventListener('click', () => {
        const reveal = document.getElementById('ef2_notesReveal');
        const isOpen = reveal?.classList.contains('is-open');
        if (isOpen) { reveal.classList.remove('is-open'); document.getElementById('ef2_notesChip')?.classList.remove('is-active'); }
        else { reveal?.classList.add('is-open'); document.getElementById('ef2_notesChip')?.classList.add('is-active'); document.getElementById('ef2_notes')?.focus(); }
      });
      document.getElementById('ef2_notesClose')?.addEventListener('click', () => {
        document.getElementById('ef2_notesReveal')?.classList.remove('is-open');
        document.getElementById('ef2_notesChip')?.classList.remove('is-active');
      });
      document.getElementById('ef2_locChip')?.addEventListener('click', () => {
        const reveal = document.getElementById('ef2_locReveal');
        const isOpen = reveal?.classList.contains('is-open');
        if (isOpen) { reveal.classList.remove('is-open'); document.getElementById('ef2_locChip')?.classList.remove('is-active'); }
        else { reveal?.classList.add('is-open'); document.getElementById('ef2_locChip')?.classList.add('is-active'); document.getElementById('ef2_location')?.focus(); }
      });
      document.getElementById('ef2_locClose')?.addEventListener('click', () => {
        document.getElementById('ef2_locReveal')?.classList.remove('is-open');
        document.getElementById('ef2_locChip')?.classList.remove('is-active');
      });

      let currentRepeat = event.repeat || null;
      document.getElementById('ef2_repeatChip')?.addEventListener('click', () => {
        const formState = captureFormState();
        openRepeatSheet(currentRepeat, (newRule) => {
          currentRepeat = newRule;
          openEventForm(existingEventId, { ...formState, repeat: currentRepeat });
        }, () => openEventForm(existingEventId, formState));
      });

      function captureFormState() {
        const primaryChip = getPrimaryChip();
        const attendingChips = [...(peopleWrap?.querySelectorAll('.ef2-person-chip[data-state="attending"]') || [])];
        const peoplArr = [];
        if (primaryChip) peoplArr.push(primaryChip.dataset.personId);
        attendingChips.forEach(c => peoplArr.push(c.dataset.personId));
        return {
          name: document.getElementById('ef2_name')?.value || '',
          date: document.getElementById('ef2_date')?.value || viewDay || today,
          allDay: document.getElementById('ef2_allDay')?.classList.contains('is-active') || false,
          startTime: ef2GetTime('start') || '09:00',
          endTime: ef2GetTime('end') || '10:00',
          people: peoplArr,
          notes: document.getElementById('ef2_notes')?.value || '',
          location: document.getElementById('ef2_location')?.value || '',
          notesOpen: document.getElementById('ef2_notesReveal')?.classList.contains('is-open') || false,
          locOpen: document.getElementById('ef2_locReveal')?.classList.contains('is-open') || false,
          repeat: currentRepeat,
        };
      }

      document.getElementById('ef2_save')?.addEventListener('click', async () => {
        const name = document.getElementById('ef2_name')?.value.trim();
        if (!name) {
          const inp = document.getElementById('ef2_name');
          inp?.classList.add('ef2-shake'); inp?.focus();
          inp?.addEventListener('animationend', () => inp.classList.remove('ef2-shake'), { once: true });
          return;
        }
        const formState = captureFormState();
        formState.name = name;
        const primaryId = formState.people[0] || null;
        const primaryPerson = people.find(p => p.id === primaryId);
        const color = primaryPerson?.color || people[0]?.color || '#4285f4';
        const eventData = {
          name: formState.name,
          date: formState.date || viewDay || today,
          allDay: formState.allDay,
          startTime: formState.allDay ? null : (formState.startTime || null),
          endTime: formState.allDay ? null : (formState.endTime || null),
          color,
          people: formState.people,
          location: formState.location || null,
          notes: formState.notes || null,
          repeat: formState.repeat || null,
          createdDate: existingEventId
            ? (events[existingEventId]?.createdDate || today)
            : today,
        };
        const saveBtn = document.getElementById('ef2_save');
        if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '…'; }
        try {
          if (existingEventId) {
            const oldEvent = events[existingEventId];
            await writeEvent(existingEventId, eventData);
            events[existingEventId] = eventData;
            if (oldEvent && oldEvent.date !== eventData.date) {
              const moveUpdates = {};
              for (const [dk, dayEntries] of Object.entries(allSchedule)) {
                for (const [ek, entry] of Object.entries(dayEntries || {})) {
                  if (entry.type === 'event' && entry.eventId === existingEventId) {
                    moveUpdates[`schedule/${dk}/${ek}`] = null;
                  }
                }
              }
              const newSchedKey = `sched_${Date.now()}_event`;
              moveUpdates[`schedule/${eventData.date}/${newSchedKey}`] = { type: 'event', eventId: existingEventId };
              await multiUpdate(moveUpdates);
            }
          } else {
            const newId = await pushEvent(eventData);
            events[newId] = eventData;
            const schedKey = `sched_${Date.now()}_event`;
            await multiUpdate({ [`schedule/${eventData.date}/${schedKey}`]: { type: 'event', eventId: newId } });
          }
          closeTaskSheet();
          allSchedule = await readAllSchedule() || {};
          render();
        } catch (err) {
          if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = '✓'; }
          const errEl = document.getElementById('ef2_importError');
          if (errEl) { errEl.textContent = "Couldn't save — try again."; errEl.classList.add('is-visible'); }
        }
      });

      document.getElementById('ef2_delete')?.addEventListener('click', async () => {
        if (!existingEventId) return;
        const name = events[existingEventId]?.name || 'this event';
        if (!await showConfirm({ title: `Delete "${name}"?`, danger: true })) return;
        try {
          await removeEvent(existingEventId);
          delete events[existingEventId];
          const updates = {};
          for (const [dk, dayEntries] of Object.entries(allSchedule)) {
            for (const [ek, entry] of Object.entries(dayEntries || {})) {
              if (entry.type === 'event' && entry.eventId === existingEventId) {
                updates[`schedule/${dk}/${ek}`] = null;
              }
            }
          }
          if (Object.keys(updates).length > 0) await multiUpdate(updates);
          closeTaskSheet();
          allSchedule = await readAllSchedule() || {};
          render();
        } catch (err) {
          const errEl = document.getElementById('ef2_importError');
          if (errEl) { errEl.textContent = "Couldn't delete — try again."; errEl.classList.add('is-visible'); }
        }
      });

      // ── AI import (create mode) ──
      document.getElementById('ef2_wand')?.addEventListener('click', () => doCalWandParse());
      document.getElementById('ef2_photoBtn')?.addEventListener('click', () => openCalPhotoSourceSheet());
      ['ef2_photoCamera', 'ef2_photoGallery', 'ef2_photoFiles'].forEach(id => {
        document.getElementById(id)?.addEventListener('change', (e) => {
          const file = e.target.files?.[0];
          if (file) doCalPhotoImport(file);
          e.target.value = '';
        });
      });
      document.getElementById('ef2_ical')?.addEventListener('click', () => openCalEfIcalSheet());

      let errDismissTimer = null;
      let photoContextNote = '';

      async function doCalWandParse() {
        const title = document.getElementById('ef2_name')?.value.trim();
        if (!title) return;
        const wandBtn = document.getElementById('ef2_wand');
        const loadEl = document.getElementById('ef2_importLoading');
        const errEl = document.getElementById('ef2_importError');
        const msgEl = document.getElementById('ef2_importMsg');
        wandBtn?.classList.add('ef2-icon-btn--loading');
        if (loadEl) loadEl.classList.add('is-visible');
        if (msgEl) msgEl.textContent = 'Parsing…';
        if (errEl) errEl.classList.remove('is-visible');
        try {
          const res = await fetch(KITCHEN_WORKER_URL, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'parseEvent', input: { text: title, contextDate: today } }),
          });
          const data = await res.json();
          if (data.error || !data.name) {
            if (errEl) { errEl.textContent = "Couldn't parse — fill manually."; errEl.classList.add('is-visible'); }
            clearTimeout(errDismissTimer);
            errDismissTimer = setTimeout(() => errEl?.classList.remove('is-visible'), 3000);
          } else {
            if (data.name) { const inp = document.getElementById('ef2_name'); if (inp) inp.value = data.name; }
            if (data.date) {
              const di = document.getElementById('ef2_date');
              const dd = document.getElementById('ef2_dateDisplay');
              if (di) di.value = data.date;
              if (dd) dd.textContent = formatDateShort(data.date);
            }
            if (data.time && !data.allDay) {
              const [h, m] = data.time.split(':').map(Number);
              const setTime = (prefix, h24, min) => {
                const ap = h24 >= 12 ? 'PM' : 'AM';
                const h12 = h24 % 12 || 12;
                const minPad = String(Math.round(min / 5) * 5 % 60).padStart(2, '0');
                const textEl = document.getElementById(`ef2_${prefix}Text`);
                const ampmBtn = document.getElementById(`ef2_${prefix}AmPm`);
                if (textEl) textEl.value = `${h12}:${minPad}`;
                if (ampmBtn) { ampmBtn.dataset.ampm = ap; ampmBtn.textContent = ap; }
              };
              setTime('start', h, m);
              setTime('end', (h + 1) % 24, m);
              updateTimeDisplay();
            }
            if (data.allDay) {
              document.getElementById('ef2_allDay')?.classList.add('is-active');
              document.getElementById('ef2_timeBtn')?.classList.add('ef2-hidden');
              document.getElementById('ef2_timePicker')?.classList.add('ef2-hidden');
            }
            if (data.name) {
              const lowerName = data.name.toLowerCase();
              for (const p of people) {
                if (lowerName.includes(p.name.toLowerCase())) {
                  const thisChip = peopleWrap?.querySelector(`.ef2-person-chip[data-person-id="${p.id}"]`);
                  if (thisChip && !getPrimaryChip()) thisChip.setAttribute('data-state', 'primary');
                  break;
                }
              }
            }
          }
        } catch (err) {
          if (errEl) { errEl.textContent = "Couldn't parse — fill manually."; errEl.classList.add('is-visible'); }
          clearTimeout(errDismissTimer);
          errDismissTimer = setTimeout(() => errEl?.classList.remove('is-visible'), 3000);
        } finally {
          wandBtn?.classList.remove('ef2-icon-btn--loading');
          document.getElementById('ef2_importLoading')?.classList.remove('is-visible');
        }
      }

      async function doCalPhotoImport(file) {
        const loadEl = document.getElementById('ef2_importLoading');
        const errEl = document.getElementById('ef2_importError');
        const msgEl = document.getElementById('ef2_importMsg');
        if (loadEl) loadEl.classList.add('is-visible');
        if (msgEl) msgEl.textContent = 'Reading photo…';
        if (errEl) errEl.classList.remove('is-visible');
        const contextNote = photoContextNote || document.getElementById('ef2_name')?.value.trim() || '';
        photoContextNote = '';
        try {
          const { base64, mediaType } = await resizeImageForUpload(file);
          const payload = { base64, mediaType, contextDate: today };
          if (contextNote) payload.context = contextNote;
          const res = await fetch(KITCHEN_WORKER_URL, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'calendarPhoto', input: payload }),
          });
          const data = await res.json();
          loadEl?.classList.remove('is-visible');
          if (data.error || !data.events?.length) {
            if (errEl) { errEl.textContent = 'No events found — try a clearer photo.'; errEl.classList.add('is-visible'); }
            return;
          }
          const savedState = captureFormState();
          const proceed = (eventsArr) => {
            openCalEfImportConfirm(eventsArr, data.hadRecurring || false, () => openEventForm(existingEventId, savedState));
          };
          if (data.monthUncertain) {
            openMonthClarificationSheet(data.assumedMonth, (yearMonth) => {
              const remapped = data.events.map(ev => {
                if (!ev.date || !/^\d{4}-\d{2}-\d{2}$/.test(ev.date)) return ev;
                return { ...ev, date: `${yearMonth}-${ev.date.slice(8, 10)}` };
              });
              proceed(remapped);
            });
          } else {
            proceed(data.events);
          }
        } catch (err) {
          loadEl?.classList.remove('is-visible');
          if (errEl) { errEl.textContent = 'Something went wrong — try again.'; errEl.classList.add('is-visible'); }
        }
      }

        const FILE_SVG = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;

              <input class="field__input" id="ef2_photoCtx" type="text" placeholder="e.g. May 2026, Sophie's school" value="${existingNote.replace(/"/g, '&quot;')}" autocomplete="off">
            </div>
            <button class="ef2-source-btn" data-source="camera" type="button"><span class="ef2-source-icon">${CAM_SVG}</span><span>Camera</span></button>
            <button class="ef2-source-btn" data-source="gallery" type="button"><span class="ef2-source-icon">${GAL_SVG}</span><span>Gallery</span></button>

        document.body.appendChild(overlay);
        requestAnimationFrame(() => overlay.classList.add('active'));
        function close() {
          overlay.classList.remove('active');
          setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 320);
        }
        overlay.querySelector('#ef2_photoSourceCancel')?.addEventListener('click', close);
        overlay.querySelectorAll('.ef2-source-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const ctx = overlay.querySelector('#ef2_photoCtx')?.value.trim() || '';
            photoContextNote = ctx;

      function openCalEfIcalSheet() {
        const overlay = document.createElement('div');
        overlay.className = 'ef2-subsheet-overlay';
        overlay.innerHTML = `<div class="ef2-subsheet">
          <div class="sheet__header"><h2 class="sheet__title">Calendar URL</h2></div>
          <div class="sheet__content">
            <p class="sheet__hint">Paste a .ics calendar feed URL (e.g. from TeamSnap or your school).</p>
            <div class="field">
              <label class="field__label" for="ef2IcalUrl">Calendar URL (.ics)</label>
              <input class="field__input" id="ef2IcalUrl" type="url" placeholder="https://…/calendar.ics" autocomplete="off">
            </div>
            <div id="ef2IcalStatus" class="sheet__hint"></div>
          </div>
          <div class="sheet__footer">
            <button class="btn btn--ghost" id="ef2IcalCancel">Cancel</button>
            <button class="btn btn--primary" id="ef2IcalImport">Import</button>
          </div>
        </div>`;
        document.body.appendChild(overlay);
        requestAnimationFrame(() => { overlay.classList.add('active'); overlay.querySelector('#ef2IcalUrl')?.focus(); });
        function closeIcal() {
          overlay.classList.remove('active');
          setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 320);
        }
        overlay.querySelector('#ef2IcalCancel')?.addEventListener('click', closeIcal);
        overlay.querySelector('#ef2IcalImport')?.addEventListener('click', async () => {
          const url = overlay.querySelector('#ef2IcalUrl')?.value.trim();
          if (!url) return;
          const status = overlay.querySelector('#ef2IcalStatus');
          const btn = overlay.querySelector('#ef2IcalImport');
          btn.disabled = true; btn.textContent = 'Fetching…';
          if (status) status.textContent = 'Fetching calendar…';
          try {
            const res = await fetch(KITCHEN_WORKER_URL, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ type: 'ical', input: url }),
            });
            const data = await res.json();
            if (data.error || !data.events?.length) {
              if (status) status.textContent = "Couldn't fetch that calendar. Check the URL.";
              btn.disabled = false; btn.textContent = 'Import';
              return;
            }
            closeIcal();
            const savedState = captureFormState();
            setTimeout(() => {
              if (!document.getElementById('bottomSheet')?.classList.contains('active')) return;
              openCalEfImportConfirm(data.events, data.hadRecurring || false, () => openEventForm(existingEventId, savedState));
            }, 320);

            btn.disabled = false; btn.textContent = 'Import';
