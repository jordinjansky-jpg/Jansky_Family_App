<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/App Icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/App Icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Family Hub — Calendar</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="styles/calendar.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body class="cal-page">
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>
  <div id="sheetMount"></div>
  <div id="taskSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import { initFirebase, isFirstRun, readSettings, readPeople, readTasks, readCategories, readAllSchedule, readEvents, writeCompletion, removeCompletion, writeTask, pushTask, pushEvent, writeEvent, removeEvent, writePerson, multiUpdate, onCompletions, onEvents, onConnectionChange } from './shared/firebase.js';
    import { renderNavBar, renderHeader, renderPersonFilter, renderTaskCard, renderTimeHeader, renderEmptyState, renderUndoToast, renderGradeBadge, renderTaskDetailSheet, renderBottomSheet, renderEditTaskSheet, renderQuickAddSheet, renderEventForm, renderEventDetailSheet, renderAddMenu, openDeviceThemeSheet, initOfflineBanner } from './shared/components.js';
    import { initOwnerChips, getSelectedOwners } from './shared/dom-helpers.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig, resolveTheme } from './shared/theme.js';
    import { todayKey, addDays, dayOfWeek, weekStartForDay, weekEndForDay, monthStart, monthEnd, dateRange, monthNumber, yearNumber, DAY_NAMES_SHORT, formatDateShort, formatDateLong, debounce } from './shared/utils.js';
    import { isComplete, filterByPerson, filterEventsByPerson, getEventsForDate, sortEvents, dayProgress, getOverdueCooldownTaskIds, sortEntries, groupByFrequency } from './shared/state.js';
    import { basePoints, dailyScore, dailyPossible, gradeDisplay } from './shared/scoring.js';
    import { buildScheduleUpdates, getRotationOwner, rebuildSingleTaskSchedule } from './shared/scheduler.js';
    import { renderWeekView, renderDayView, renderMonthView, renderCalendarNav } from './shared/calendar-views.js';

    // ── Cached theme ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load core data ──
    const [settings, peopleObj, tasksObj, catsObj, eventsObj] = await Promise.all([
      readSettings(), readPeople(), readTasks(), readCategories(), readEvents()
    ]);

    if (settings?.theme) applyTheme(resolveTheme(settings.theme));

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);
    const people = peopleObj ? Object.entries(peopleObj).map(([id, p]) => ({ id, ...p })) : [];
    const tasks = tasksObj || {};
    const cats = catsObj || {};
    let events = eventsObj || {};

    const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    // ── Personal preferences (localStorage) ──
    const calPrefsRaw = localStorage.getItem('dr-cal-prefs');
    const calPrefs = calPrefsRaw ? JSON.parse(calPrefsRaw) : {};
    function saveCalPrefs() { localStorage.setItem('dr-cal-prefs', JSON.stringify(calPrefs)); }

    // ── Calendar defaults (admin settings → personal override) ──
    const calDefaults = settings?.calendarDefaults || {};
    let weekStartDay = calPrefs.weekStartDay ?? calDefaults.weekStartDay ?? 0;
    let density = calPrefs.density || calDefaults.density || 'snug';
    let showDailyInWeek = calPrefs.showDailyInWeek ?? calDefaults.showDailyInWeek ?? true;
    const defaultView = calPrefs.defaultView || calDefaults.defaultView || 'week';

    // ── Person link mode ──
    const personParam = new URLSearchParams(window.location.search).get('person');
    const linkedPerson = personParam
      ? people.find(p => p.name.toLowerCase() === personParam.toLowerCase())
      : null;

    // ── App state ──
    let currentView = defaultView; // 'week' | 'month' | 'day'
    let viewWeekStart = weekStartForDay(today, weekStartDay);
    let viewMonth = today.substring(0, 7);
    let viewDay = null;
    let activePerson = calPrefs.personFilter || linkedPerson?.prefs?.calendar?.personFilter || null;
    let completions = {};
    let allSchedule = {};
    let suppressedCooldownTaskIds = new Set();
    let pendingSliderOverride = null;
    let daySwipeController = null;

    // ── Header & Nav ──
    const debugActive = localStorage.getItem('dr-debug') === 'true';
    document.getElementById('headerMount').innerHTML = renderHeader({
      appName: settings?.appName || 'Daily Rundown',
      subtitle: 'Calendar',
      dateLine: formatDateLong(today),
      showAdmin: true,
      showDebug: debugActive,
      showAddTask: true,
      showThemePicker: true
    });
    document.getElementById('navMount').innerHTML = renderNavBar('calendar');
    initOfflineBanner(onConnectionChange);

    document.getElementById('loadingState').style.display = 'none';
    const main = document.getElementById('mainContent');
    main.style.display = '';
    const sheetMount = document.getElementById('sheetMount');
    const taskSheetMount = document.getElementById('taskSheetMount');

    // ══════════════════════════════════════════
    // Data loading
    // ══════════════════════════════════════════

    async function loadData() {
      const sched = await readAllSchedule();
      allSchedule = sched || {};
      suppressedCooldownTaskIds = getOverdueCooldownTaskIds(allSchedule, completions, tasks, today);
    }

    // ══════════════════════════════════════════
    // Main render — dispatches to active view
    // ══════════════════════════════════════════

    function render() {
      let navLabel = '';
      let isCurrentPeriod = false;

      if (currentView === 'day') {
        const dayLabel = formatDateShort(viewDay);
        const isToday = viewDay === today;
        const prog = getDayProgress(viewDay);

        let html = `<div class="cal-day-header">
          <div>
            <div class="cal-day-header__title">${dayLabel}${isToday ? ' <span class="cal-sheet__today">Today</span>' : ''}</div>
          </div>
          <div class="cal-day-header__meta">
            ${prog.total > 0 ? `<span>${prog.done}/${prog.total}</span>` : ''}
            <button class="date-nav__btn" id="backToWeek" type="button" title="Back to week">&times;</button>
          </div>
        </div>`;

        html += renderPersonFilter(people, activePerson);
        html += `<div class="cal-view-enter">`;
        html += renderDayView({
          dateKey: viewDay, today, events, allSchedule, completions, tasks, cats, people, activePerson, settings
        });
        html += `</div>`;
        main.innerHTML = html;
        bindDayViewEvents();
        return;
      }

      // Week or Month view
      if (currentView === 'week') {
        const weekEnd = addDays(viewWeekStart, 6);
        const m1 = MONTH_NAMES[monthNumber(viewWeekStart) - 1];
        const m2 = monthNumber(viewWeekStart) !== monthNumber(weekEnd) ? ' – ' + MONTH_NAMES[monthNumber(weekEnd) - 1] : '';
        navLabel = `${m1}${m2} ${yearNumber(viewWeekStart)}`;
        const todayWeekStart = weekStartForDay(today, weekStartDay);
        isCurrentPeriod = viewWeekStart === todayWeekStart;
      } else {
        navLabel = `${MONTH_NAMES[monthNumber(viewMonth + '-01') - 1]} ${yearNumber(viewMonth + '-01')}`;
        isCurrentPeriod = viewMonth === today.substring(0, 7);
      }

      let html = renderCalendarNav({ currentView, viewLabel: navLabel, isCurrentPeriod, weekStartDay });
      html += renderPersonFilter(people, activePerson);

      html += `<div class="cal-view-enter ${density === 'cozy' ? 'cal-density--cozy' : ''}">`;
      if (currentView === 'week') {
        html += renderWeekView({
          weekStartDate: viewWeekStart, today, events, allSchedule, completions, tasks, cats, people, activePerson, density, weekStartDay, showDailyInWeek
        });
      } else {
        html += renderMonthView({
          viewMonth, today, events, allSchedule, completions, tasks, cats, people, activePerson, density, weekStartDay
        });
      }
      html += `</div>`;

      main.innerHTML = html;
      bindNavEvents();
      bindPersonFilterEvents();

      if (currentView === 'week') bindWeekViewEvents();
      else bindMonthViewEvents();
    }

    function getDayProgress(dateKey) {
      const dayEntries = allSchedule[dateKey] || {};
      const filtered = filterByPerson(dayEntries, activePerson);
      const taskEntries = Object.fromEntries(
        Object.entries(filtered).filter(([, e]) => e.type !== 'event')
      );
      return dayProgress(taskEntries, completions);
    }

    // ══════════════════════════════════════════
    // Navigation bindings
    // ══════════════════════════════════════════

    function bindNavEvents() {
      document.getElementById('prevPeriod')?.addEventListener('click', () => {
        if (currentView === 'week') {
          viewWeekStart = addDays(viewWeekStart, -7);
        } else {
          const d = new Date(Date.UTC(yearNumber(viewMonth + '-01'), monthNumber(viewMonth + '-01') - 2, 1));
          viewMonth = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
        }
        render();
      });

      document.getElementById('nextPeriod')?.addEventListener('click', () => {
        if (currentView === 'week') {
          viewWeekStart = addDays(viewWeekStart, 7);
        } else {
          const d = new Date(Date.UTC(yearNumber(viewMonth + '-01'), monthNumber(viewMonth + '-01'), 1));
          viewMonth = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
        }
        render();
      });

      document.getElementById('goToday')?.addEventListener('click', () => {
        if (currentView === 'week') viewWeekStart = weekStartForDay(today, weekStartDay);
        else viewMonth = today.substring(0, 7);
        render();
      });

      document.getElementById('viewSwitcher')?.addEventListener('click', () => {
        currentView = currentView === 'week' ? 'month' : 'week';
        render();
      });
    }

    function bindPersonFilterEvents() {
      main.querySelectorAll('.person-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          activePerson = btn.dataset.personId || null;
          calPrefs.personFilter = activePerson;
          saveCalPrefs();
          if (linkedPerson) {
            const prefs = { ...(linkedPerson.prefs || {}), calendar: { personFilter: activePerson } };
            linkedPerson.prefs = prefs;
            const { id, ...data } = linkedPerson;
            writePerson(id, data);
          }
          render();
        });
      });
    }

    // ══════════════════════════════════════════
    // Week view bindings
    // ══════════════════════════════════════════

    function bindWeekViewEvents() {
      main.querySelectorAll('.cal-week__col[data-date]').forEach(col => {
        col.addEventListener('click', (e) => {
          if (e.target.classList.contains('cal-week__task-check')) return;
          viewDay = col.dataset.date;
          currentView = 'day';
          render();
        });
      });

      main.querySelectorAll('.cal-week__task-check').forEach(cb => {
        cb.addEventListener('change', (e) => {
          e.stopPropagation();
          toggleTask(cb.dataset.entryKey, cb.dataset.dateKey);
        });
      });
    }

    function bindMonthViewEvents() {
      main.querySelectorAll('.cal-grid__cell[data-date]').forEach(cell => {
        cell.addEventListener('click', () => {
          viewDay = cell.dataset.date;
          currentView = 'day';
          render();
        });
      });
    }

    // ══════════════════════════════════════════
    // Day view bindings
    // ══════════════════════════════════════════

    function bindDayViewEvents() {
      bindPersonFilterEvents();

      document.getElementById('backToWeek')?.addEventListener('click', () => {
        currentView = defaultView;
        if (currentView === 'week' && viewDay) {
          viewWeekStart = weekStartForDay(viewDay, weekStartDay);
        }
        viewDay = null;
        render();
      });

      main.querySelectorAll('.event-bubble[data-event-id]').forEach(btn => {
        btn.addEventListener('click', () => openEventDetailSheet(btn.dataset.eventId));
      });

      main.querySelectorAll('.cal-day__task-check').forEach(btn => {
        const entryKey = btn.dataset.entryKey;
        const dateKey = btn.dataset.dateKey;
        if (btn.dataset.tapBlocked === 'true') {
          btn.addEventListener('click', () => openTaskSheet(entryKey, dateKey));
        } else {
          btn.addEventListener('click', () => toggleTask(entryKey, dateKey));
        }
      });

      main.querySelectorAll('.cal-day__task').forEach(row => {
        let pressTimer = null;
        let didLongPress = false;
        const entryKey = row.dataset.entryKey;
        const dateKey = row.dataset.dateKey;

        row.addEventListener('pointerdown', (e) => {
          if (e.target.closest('.cal-day__task-check')) return;
          didLongPress = false;
          pressTimer = setTimeout(() => {
            didLongPress = true;
            openTaskSheet(entryKey, dateKey);
          }, settings?.longPressMs ?? 800);
        });
        row.addEventListener('pointerup', () => { clearTimeout(pressTimer); });
        row.addEventListener('pointerleave', () => { clearTimeout(pressTimer); });
        row.addEventListener('pointercancel', () => { clearTimeout(pressTimer); });
        row.addEventListener('contextmenu', (e) => e.preventDefault());
      });

      // Swipe between days — use AbortController to prevent stacking listeners on re-render
      if (daySwipeController) daySwipeController.abort();
      daySwipeController = new AbortController();
      let sx = 0, sy = 0;
      main.addEventListener('touchstart', (e) => {
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
      }, { passive: true, signal: daySwipeController.signal });
      main.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - sx;
        const dy = e.changedTouches[0].clientY - sy;
        if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          viewDay = addDays(viewDay, dx < 0 ? 1 : -1);
          render();
        }
      }, { passive: true, signal: daySwipeController.signal });
    }

    // ══════════════════════════════════════════
    // Completion toggle
    // ══════════════════════════════════════════

    async function toggleTask(entryKey, dateKey) {
      if (!entryKey) return;
      const wasComplete = isComplete(entryKey, completions);

      if (wasComplete) {
        delete completions[entryKey];
        await removeCompletion(entryKey);
      } else {
        const record = {
          completedAt: firebase.database.ServerValue.TIMESTAMP,
          completedBy: 'calendar'
        };
        const pendingVal = pendingSliderOverride?.entryKey === entryKey ? pendingSliderOverride.value : null;
        const savedVal = (allSchedule[dateKey] || {})[entryKey]?.pointsOverride;
        const overrideVal = pendingVal ?? savedVal ?? null;
        if (overrideVal != null && overrideVal !== 100) {
          record.pointsOverride = overrideVal;
        }
        pendingSliderOverride = null;

        if (dateKey < today && record.pointsOverride == null) {
          const entry = (allSchedule[dateKey] || {})[entryKey];
          const task = entry ? tasks[entry.taskId] : null;
          const cat = task?.category ? cats[task.category] : null;
          if (!cat?.isEvent && !task?.exempt) {
            record.pointsOverride = settings?.pastDueCreditPct ?? 75;
            record.isLate = true;
          }
        }
        completions[entryKey] = record;
        await writeCompletion(entryKey, record);

        const dayEntries = allSchedule[dateKey] || {};
        const entry = dayEntries[entryKey];
        if (entry) {
          const task = tasks[entry.taskId];
          if (task && task.rotation === 'once') {
            task.status = 'completed';
            await writeTask(entry.taskId, task);
          }
        }
      }

      const toggledEntry = (allSchedule[dateKey] || {})[entryKey];
      if (toggledEntry) {
        const toggledTask = tasks[toggledEntry.taskId];
        if (toggledTask?.cooldownDays > 0) {
          const cdUpdates = rebuildSingleTaskSchedule(
            toggledEntry.taskId, toggledTask, today, allSchedule, completions, people, settings, tasks, catsObj
          );
          if (Object.keys(cdUpdates).length > 0) {
            await multiUpdate(cdUpdates);
            allSchedule = await readAllSchedule() || {};
            suppressedCooldownTaskIds = getOverdueCooldownTaskIds(allSchedule, completions, tasks, today);
          }
        }
      }

      render();
    }

    // ══════════════════════════════════════════
    // Universal Add Menu
    // ══════════════════════════════════════════

    function openAddMenu() {
      const options = [
        { key: 'event', label: 'New Event', icon: '📅' },
        { key: 'task', label: 'New Task', icon: '✅' }
      ];
      const html = renderAddMenu(options);
      taskSheetMount.innerHTML = renderBottomSheet(html);
      requestAnimationFrame(() => {
        document.getElementById('bottomSheet')?.classList.add('active');
      });

      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => {
        if (e.target === overlay) closeTaskSheet();
      });

      taskSheetMount.querySelectorAll('.add-menu__item').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          closeTaskSheet();
          if (action === 'event') {
            setTimeout(() => openEventForm(), 320);
          } else if (action === 'task') {
            setTimeout(() => openQuickAddSheet(), 320);
          }
        });
      });
    }

    document.getElementById('headerAddTask')?.addEventListener('click', openAddMenu);

    // ══════════════════════════════════════════
    // Event Form (Create / Edit)
    // ══════════════════════════════════════════

    function openEventForm(existingEventId = null) {
      const event = existingEventId ? events[existingEventId] : {};
      const mode = existingEventId ? 'edit' : 'create';
      const dateKey = viewDay || today;
      const html = renderEventForm({ event, eventId: existingEventId, people, dateKey, mode });
      taskSheetMount.innerHTML = renderBottomSheet(html);

      requestAnimationFrame(() => {
        document.getElementById('bottomSheet')?.classList.add('active');
        if (mode === 'create') document.getElementById('ef_name')?.focus();
      });

      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => {
        if (e.target === overlay) closeTaskSheet();
      });

      document.getElementById('ef_allDay')?.addEventListener('change', (e) => {
        const hide = e.target.checked;
        document.getElementById('ef_timeGroup').style.display = hide ? 'none' : '';
        document.getElementById('ef_endTimeGroup').style.display = hide ? 'none' : '';
      });

      document.querySelectorAll('#ef_colors .dt-color-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#ef_colors .dt-color-btn').forEach(b => b.classList.remove('dt-color-btn--active'));
          btn.classList.add('dt-color-btn--active');
        });
      });

      document.querySelectorAll('#ef_people .chip--selectable').forEach(chip => {
        chip.addEventListener('click', () => chip.classList.toggle('chip--active'));
      });

      document.getElementById('ef_cancel')?.addEventListener('click', closeTaskSheet);

      document.getElementById('ef_save')?.addEventListener('click', async () => {
        const name = document.getElementById('ef_name')?.value.trim();
        if (!name) { document.getElementById('ef_name')?.focus(); return; }

        const selectedPeople = [];
        document.querySelectorAll('#ef_people .chip--active').forEach(c => {
          if (c.dataset.personId) selectedPeople.push(c.dataset.personId);
        });

        const selectedColor = document.querySelector('#ef_colors .dt-color-btn--active')?.dataset.color
          || (selectedPeople[0] ? people.find(p => p.id === selectedPeople[0])?.color : null)
          || '#4285f4';

        const eventData = {
          name,
          date: document.getElementById('ef_date')?.value || today,
          allDay: document.getElementById('ef_allDay')?.checked || false,
          startTime: document.getElementById('ef_allDay')?.checked ? null : (document.getElementById('ef_startTime')?.value || null),
          endTime: document.getElementById('ef_allDay')?.checked ? null : (document.getElementById('ef_endTime')?.value || null),
          color: selectedColor,
          people: selectedPeople,
          location: document.getElementById('ef_location')?.value.trim() || null,
          notes: document.getElementById('ef_notes')?.value.trim() || null,
          url: document.getElementById('ef_url')?.value.trim() || null,
          recurrence: null,
          reminders: null,
          createdDate: today
        };

        const eventId = existingEventId;
        if (eventId) {
          const oldEvent = events[eventId];
          await writeEvent(eventId, eventData);
          events[eventId] = eventData;

          // If date changed, move schedule entry to new date
          if (oldEvent && oldEvent.date !== eventData.date) {
            const moveUpdates = {};
            for (const [dk, dayEntries] of Object.entries(allSchedule)) {
              for (const [ek, entry] of Object.entries(dayEntries || {})) {
                if (entry.type === 'event' && entry.eventId === eventId) {
                  moveUpdates[`schedule/${dk}/${ek}`] = null;
                }
              }
            }
            const newSchedKey = `sched_${Date.now()}_event_${Math.random().toString(36).slice(2, 6)}`;
            moveUpdates[`schedule/${eventData.date}/${newSchedKey}`] = { type: 'event', eventId };
            await multiUpdate(moveUpdates);
          }
        } else {
          const newId = await pushEvent(eventData);
          events[newId] = eventData;

          const schedKey = `sched_${Date.now()}_event_${Math.random().toString(36).slice(2, 6)}`;
          await multiUpdate({
            [`schedule/${eventData.date}/${schedKey}`]: { type: 'event', eventId: newId }
          });
        }

        closeTaskSheet();
        await loadData();
        render();
      });

      document.getElementById('ef_delete')?.addEventListener('click', async () => {
        if (!existingEventId) return;
        if (!confirm('Delete this event?')) return;
        await removeEvent(existingEventId);
        delete events[existingEventId];

        const updates = {};
        for (const [dk, dayEntries] of Object.entries(allSchedule)) {
          for (const [ek, entry] of Object.entries(dayEntries || {})) {
            if (entry.type === 'event' && entry.eventId === existingEventId) {
              updates[`schedule/${dk}/${ek}`] = null;
            }
          }
        }
        if (Object.keys(updates).length > 0) await multiUpdate(updates);

        closeTaskSheet();
        await loadData();
        render();
      });
    }

    // ══════════════════════════════════════════
    // Event Detail Sheet
    // ══════════════════════════════════════════

    function openEventDetailSheet(eventId) {
      const event = events[eventId];
      if (!event) return;
      const html = renderEventDetailSheet(eventId, event, people);
      taskSheetMount.innerHTML = renderBottomSheet(html);

      requestAnimationFrame(() => {
        document.getElementById('bottomSheet')?.classList.add('active');
      });

      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => {
        if (e.target === overlay) closeTaskSheet();
      });

      document.getElementById('eventEdit')?.addEventListener('click', () => {
        closeTaskSheet();
        setTimeout(() => openEventForm(eventId), 320);
      });

      document.getElementById('eventDelete')?.addEventListener('click', async () => {
        if (!confirm('Delete this event?')) return;
        await removeEvent(eventId);
        delete events[eventId];
        const updates = {};
        for (const [dk, dayEntries] of Object.entries(allSchedule)) {
          for (const [ek, entry] of Object.entries(dayEntries || {})) {
            if (entry.type === 'event' && entry.eventId === eventId) {
              updates[`schedule/${dk}/${ek}`] = null;
            }
          }
        }
        if (Object.keys(updates).length > 0) await multiUpdate(updates);
        closeTaskSheet();
        await loadData();
        render();
      });
    }

    // ══════════════════════════════════════════
    // Task detail bottom sheet (long-press) — carried from v1
    // ══════════════════════════════════════════

    function closeTaskSheet() {
      if (pendingSliderOverride) {
        const { entryKey, dateKey: sliderDateKey, value } = pendingSliderOverride;
        const override = value === 100 ? null : value;
        pendingSliderOverride = null;
        multiUpdate({ [`schedule/${sliderDateKey}/${entryKey}/pointsOverride`]: override });
        const dayEntries = allSchedule[sliderDateKey] || {};
        if (dayEntries[entryKey]) dayEntries[entryKey].pointsOverride = override;
        if (isComplete(entryKey, completions)) {
          completions[entryKey].pointsOverride = override;
          writeCompletion(entryKey, completions[entryKey]);
        }
      }
      const overlay = document.getElementById('bottomSheet');
      if (overlay) {
        overlay.classList.remove('active');
        setTimeout(() => { taskSheetMount.innerHTML = ''; }, 300);
      } else {
        taskSheetMount.innerHTML = '';
      }
    }

    function openTaskSheet(entryKey, dateKey) {
      const dayEntries = allSchedule[dateKey] || {};
      const entry = dayEntries[entryKey];
      if (!entry) return;

      const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
      const person = people.find(p => p.id === entry.ownerId);
      const cat = task.category ? cats[task.category] : null;
      const completed = isComplete(entryKey, completions);
      const pts = basePoints(task, settings?.difficultyMultipliers);
      const completion = completions[entryKey];
      const currentOverride = completion?.pointsOverride ?? entry.pointsOverride ?? null;

      const filtered = filterByPerson(dayEntries, activePerson);
      const score = dailyScore(filtered, completions, tasks, cats, settings, dateKey, today);
      const gd = gradeDisplay(score.percentage);
      const gradePreview = score.possible > 0 ? `${gd.grade} (${score.percentage}%)` : null;

      const sheetContent = renderTaskDetailSheet({
        entryKey,
        entry: { ...entry, dateKey },
        task,
        person,
        category: cat,
        completed,
        points: { possible: pts },
        sliderMin: settings?.sliderMin ?? 0,
        sliderMax: settings?.sliderMax ?? 150,
        currentOverride: currentOverride != null ? currentOverride : 100,
        gradePreview,
        people,
        showDelegate: true,
        showMove: true,
        showEdit: true,
        showPoints: settings?.showPoints !== false,
        isEvent: !!cat?.isEvent,
        isPastDate: dateKey < today
      });

      taskSheetMount.innerHTML = renderBottomSheet(sheetContent);
      requestAnimationFrame(() => {
        document.getElementById('bottomSheet')?.classList.add('active');
      });
      bindTaskSheetEvents(entryKey, dateKey);
    }

    function bindTaskSheetEvents(entryKey, dateKey) {
      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => {
        if (e.target === overlay) closeTaskSheet();
      });

      document.getElementById('sheetToggleComplete')?.addEventListener('click', async () => {
        await closeTaskSheet();
        await toggleTask(entryKey, dateKey);
      });

      // Notes inline editing
      const notesAddBtn = document.getElementById('notesAddBtn');
      const notesEditBtn = document.getElementById('notesEditBtn');
      const notesCancelBtn = document.getElementById('notesCancelBtn');
      const notesSaveBtn = document.getElementById('notesSaveBtn');
      const notesEditor = document.getElementById('notesEditor');
      const notesDisplay = document.getElementById('notesDisplay');
      const notesInput = document.getElementById('notesInput');

      function openNotesEditor() {
        if (notesEditor) notesEditor.style.display = '';
        if (notesDisplay) notesDisplay.style.display = 'none';
        if (notesAddBtn) notesAddBtn.style.display = 'none';
        if (notesInput) notesInput.focus();
      }
      function closeNotesEditor() {
        if (notesEditor) notesEditor.style.display = 'none';
        const originalText = document.getElementById('notesText')?.textContent?.trim() || '';
        if (notesInput) notesInput.value = originalText;
        if (notesDisplay) notesDisplay.style.display = originalText ? '' : 'none';
        if (notesAddBtn) notesAddBtn.style.display = originalText ? 'none' : '';
      }
      notesAddBtn?.addEventListener('click', openNotesEditor);
      notesEditBtn?.addEventListener('click', openNotesEditor);
      notesCancelBtn?.addEventListener('click', closeNotesEditor);
      notesSaveBtn?.addEventListener('click', async () => {
        const noteValue = notesInput?.value.trim() || null;
        const ek = notesSaveBtn.dataset.entryKey;
        const dk = notesSaveBtn.dataset.dateKey;
        if (ek && dk) {
          await multiUpdate({ [`schedule/${dk}/${ek}/notes`]: noteValue });
          if (allSchedule[dk]?.[ek]) allSchedule[dk][ek].notes = noteValue;
        }
        const notesText = document.getElementById('notesText');
        if (notesText) notesText.textContent = noteValue || '';
        closeNotesEditor();
      });

      // Points slider
      const slider = document.getElementById('pointsSlider');
      if (slider) {
        const dayEntries = allSchedule[dateKey] || {};
        slider.addEventListener('input', () => {
          const val = parseInt(slider.value, 10);
          const basePts = parseInt(slider.dataset.basePts, 10);
          const earnedPts = Math.round(basePts * (val / 100));
          const label = document.getElementById('sliderValueLabel');
          if (label) label.textContent = `${val}% (${earnedPts}pt)`;
          pendingSliderOverride = { entryKey, dateKey, value: val };

          const filtered = filterByPerson(dayEntries, activePerson);
          const hadRecord = !!completions[entryKey];
          const origRecord = completions[entryKey];
          completions[entryKey] = {
            ...(origRecord || { completedAt: Date.now(), completedBy: 'preview' }),
            pointsOverride: val === 100 ? null : val
          };
          const previewScore = dailyScore(filtered, completions, tasks, cats, settings, dateKey, today);
          const previewGd = gradeDisplay(previewScore.percentage);
          const previewEl = document.getElementById('gradePreview');
          if (previewEl) previewEl.textContent = `Grade: ${previewGd.grade} (${previewScore.percentage}%)`;
          if (hadRecord) completions[entryKey] = origRecord;
          else delete completions[entryKey];
        });

        const resetBtn = document.getElementById('sliderReset');
        if (resetBtn) {
          resetBtn.addEventListener('click', () => {
            slider.value = 100;
            slider.dispatchEvent(new Event('input'));
          });
        }
      }

      // Delegate
      document.getElementById('sheetDelegate')?.addEventListener('click', () => {
        const panel = document.getElementById('delegatePanel');
        if (panel) panel.style.display = panel.style.display === 'none' ? '' : 'none';
      });

      let pendingDelegateOwnerId = null;
      document.querySelectorAll('#delegatePanel .chip--selectable').forEach(chip => {
        chip.addEventListener('click', async () => {
          const newOwnerId = chip.dataset.personId;
          if (!newOwnerId) return;

          const moveToggle = document.getElementById('delegateMoveToggle');
          if (moveToggle?.checked) {
            pendingDelegateOwnerId = newOwnerId;
            document.querySelectorAll('#delegatePanel .chip--selectable').forEach(c => c.classList.remove('chip--active'));
            chip.classList.add('chip--active');
            const picker = document.getElementById('delegateMoveDatePicker');
            if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
            return;
          }

          const dayEntries = allSchedule[dateKey] || {};
          const entry = dayEntries[entryKey];
          if (!entry) return;
          const originalPerson = people.find(p => p.id === entry.ownerId);
          const newEntry = { ...entry, ownerId: newOwnerId, delegatedFromName: originalPerson?.name || '?' };
          const updates = {};
          updates[`schedule/${dateKey}/${entryKey}`] = null;
          const newKey = `sched_${Date.now()}_delegate`;
          updates[`schedule/${dateKey}/${newKey}`] = newEntry;
          if (completions[entryKey]) {
            updates[`completions/${entryKey}`] = null;
            updates[`completions/${newKey}`] = completions[entryKey];
          }
          await multiUpdate(updates);
          closeTaskSheet();
          await loadData(); render();
        });
      });

      document.getElementById('delegateMoveDatePicker')?.addEventListener('change', async (e) => {
        const newDate = e.target.value;
        if (!newDate || !pendingDelegateOwnerId) return;
        const dayEntries = allSchedule[dateKey] || {};
        const entry = dayEntries[entryKey];
        if (!entry) return;
        const originalPerson = people.find(p => p.id === entry.ownerId);
        const newEntry = { ...entry, ownerId: pendingDelegateOwnerId, delegatedFromName: originalPerson?.name || '?', movedFromDate: dateKey };
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        const newKey = `sched_${Date.now()}_delegate_moved`;
        updates[`schedule/${newDate}/${newKey}`] = newEntry;
        if (completions[entryKey]) {
          updates[`completions/${entryKey}`] = null;
          updates[`completions/${newKey}`] = completions[entryKey];
        }
        await multiUpdate(updates);
        pendingDelegateOwnerId = null;
        closeTaskSheet();
        await loadData(); render();
      });

      // Move
      document.getElementById('sheetMove')?.addEventListener('click', () => {
        const picker = document.getElementById('moveDatePicker');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      document.getElementById('moveDatePicker')?.addEventListener('change', async (e) => {
        const newDate = e.target.value;
        if (!newDate) return;
        const dayEntries = allSchedule[dateKey] || {};
        const entry = dayEntries[entryKey];
        if (!entry) return;
        const newEntry = { ...entry, movedFromDate: dateKey };
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        const newKey = `sched_${Date.now()}_moved`;
        updates[`schedule/${newDate}/${newKey}`] = newEntry;
        if (completions[entryKey]) {
          updates[`completions/${entryKey}`] = null;
          updates[`completions/${newKey}`] = completions[entryKey];
        }
        await multiUpdate(updates);
        closeTaskSheet();
        await loadData(); render();
      });

      document.getElementById('moveSkip')?.addEventListener('click', async () => {
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        if (completions[entryKey]) updates[`completions/${entryKey}`] = null;
        await multiUpdate(updates);
        closeTaskSheet();
        await loadData(); render();
      });

      // Edit task
      document.getElementById('sheetEdit')?.addEventListener('click', () => {
        const taskId = document.getElementById('sheetEdit').dataset.taskId;
        const overlay = document.getElementById('bottomSheet');
        if (overlay) overlay.classList.remove('active');
        setTimeout(() => { openEditTaskSheet(taskId); }, 320);
      });
    }

        const owners = getSelectedOwners('et_owners');
        const rotation = document.getElementById('et_rotation')?.value || task.rotation;
        const activeMode = modeGroup?.querySelector('.admin-mode-btn--active')?.dataset.mode || 'rotate';
        const dayVal = document.getElementById('et_daySelect')?.value;
        const dedicatedDay = (rotation !== 'once' && dayVal !== '' && dayVal != null) ? parseInt(dayVal, 10) : null;
        const dedicatedDate = rotation === 'once' ? (document.getElementById('et_dedicatedDate')?.value || null) : null;
        const cooldown = document.getElementById('et_cooldown')?.value;
        const catOpt = document.getElementById('et_category')?.selectedOptions[0];
        const catIsEvent = catOpt?.dataset.event === '1';
        const eventDate = document.getElementById('et_eventDate')?.value;
        const effectiveDedicatedDate = catIsEvent && eventDate ? eventDate : dedicatedDate;

        const eventTime = catIsEvent ? (document.getElementById('et_eventTime')?.value || null) : null;
        const notes = catIsEvent ? (document.getElementById('et_notes')?.value.trim() || null) : null;
        const updated = {
          ...task, name, rotation,
          difficulty: document.getElementById('et_difficulty')?.value || task.difficulty,
          timeOfDay: document.getElementById('et_timeOfDay')?.value || task.timeOfDay,
          estMin: (v => isNaN(v) ? 10 : v)(parseInt(document.getElementById('et_estMin')?.value, 10)),
          category: document.getElementById('et_category')?.value || task.category,
          owners, ownerAssignmentMode: activeMode, dedicatedDay,

        await writeTask(taskId, updated);

        const owners = getSelectedOwners('qa_owners');
        const catKey = document.getElementById('qa_category')?.value || '';
        const isEvent = !!cats[catKey]?.isEvent;
        const eventDate = document.getElementById('qa_eventDate')?.value || '';
        const rotation = isEvent && eventDate ? 'once' : (document.getElementById('qa_rotation')?.value || 'daily');

        const activeModeBtn = document.querySelector('#qa_assignMode .admin-mode-btn--active');
        const assignMode = isEvent ? 'fixed' : (activeModeBtn?.dataset.mode || 'rotate');

        const dayVal = document.getElementById('qa_daySelect')?.value;
        const dedicatedDay = (rotation !== 'once' && dayVal !== '' && dayVal != null) ? parseInt(dayVal, 10) : null;
        const dedicatedDate = isEvent && eventDate ? eventDate : (rotation === 'once' ? (document.getElementById('qa_dedicatedDate')?.value || null) : null);

        };

          || ((taskData.rotation === 'weekly' || taskData.rotation === 'monthly') && taskData.dedicatedDay != null && dayOfWeek(today) !== taskData.dedicatedDay);
        const schedDate = dedicatedDate || today;
        if (owners.length > 0 && !skipToday) {

          if (mode === 'duplicate') {

      });

      // View toggle
      mount.querySelectorAll('[data-pref-view]').forEach(btn => btn.addEventListener('click', () => {
        calPrefs.defaultView = btn.dataset.prefView;
        saveCalPrefs();
        mount.querySelectorAll('[data-pref-view]').forEach(b => b.classList.remove('dt-theme-btn--active'));
        btn.classList.add('dt-theme-btn--active');
      }));

      // Density toggle
      mount.querySelectorAll('[data-pref-density]').forEach(btn => btn.addEventListener('click', () => {
        density = btn.dataset.prefDensity;
        calPrefs.density = density;
        saveCalPrefs();
        mount.querySelectorAll('[data-pref-density]').forEach(b => b.classList.remove('dt-theme-btn--active'));
        btn.classList.add('dt-theme-btn--active');
        render();
      }));

      // Week start day toggle
      mount.querySelectorAll('[data-pref-wsd]').forEach(btn => btn.addEventListener('click', () => {
        weekStartDay = parseInt(btn.dataset.prefWsd, 10);
        calPrefs.weekStartDay = weekStartDay;
        saveCalPrefs();
        viewWeekStart = weekStartForDay(today, weekStartDay);
        mount.querySelectorAll('[data-pref-wsd]').forEach(b => b.classList.remove('dt-theme-btn--active'));
        btn.classList.add('dt-theme-btn--active');
        render();
      }));

      // Daily tasks toggle
      mount.querySelectorAll('[data-pref-daily]').forEach(btn => btn.addEventListener('click', () => {
        showDailyInWeek = btn.dataset.prefDaily === 'true';
        calPrefs.showDailyInWeek = showDailyInWeek;
        saveCalPrefs();
        mount.querySelectorAll('[data-pref-daily]').forEach(b => b.classList.remove('dt-theme-btn--active'));
        btn.classList.add('dt-theme-btn--active');
        render();
      }));

      // Open theme sub-sheet
      mount.querySelector('#prefOpenTheme')?.addEventListener('click', () => {
        openDeviceThemeSheet(mount, settings?.theme);
      });

      // Close
      mount.querySelector('#prefClose')?.addEventListener('click', () => {
        const overlay = document.getElementById('bottomSheet');
        if (overlay) { overlay.classList.remove('active'); setTimeout(() => mount.innerHTML = '', 300); }
      });
      document.getElementById('bottomSheet')?.addEventListener('click', (e) => {
        if (e.target.id === 'bottomSheet') {
          e.target.classList.remove('active');
          setTimeout(() => mount.innerHTML = '', 300);
        }
      });
    });

    // ══════════════════════════════════════════
    // Swipe navigation (week/month)
    // ══════════════════════════════════════════

    let swipeStartX = 0, swipeStartY = 0;
    main.addEventListener('touchstart', (e) => {
      if (currentView === 'day') return;
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
    }, { passive: true });
    main.addEventListener('touchend', (e) => {
      if (currentView === 'day') return;
      const dx = e.changedTouches[0].clientX - swipeStartX;
      const dy = e.changedTouches[0].clientY - swipeStartY;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        const delta = dx < 0 ? 1 : -1;
        if (currentView === 'week') {
          viewWeekStart = addDays(viewWeekStart, delta * 7);
        } else {
          const d = new Date(Date.UTC(yearNumber(viewMonth + '-01'), monthNumber(viewMonth + '-01') - 1 + delta, 1));
          viewMonth = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
        }
        render();
      }
    }, { passive: true });

    // ══════════════════════════════════════════
    // Real-time listeners
    // ══════════════════════════════════════════

    const debouncedRender = debounce(() => render(), 100);

    onCompletions((val) => {
      completions = val || {};
      suppressedCooldownTaskIds = getOverdueCooldownTaskIds(allSchedule, completions, tasks, today);
      debouncedRender();
    });

    onEvents((val) => {
      events = val || {};
      debouncedRender();
    });

    // ══════════════════════════════════════════
    // Migration: isEvent categories → events/ node
    // ══════════════════════════════════════════

    async function migrateEventCategories() {
      const migrated = localStorage.getItem('dr-events-migrated');
      if (migrated) return;

      const eventCatKeys = Object.entries(cats)
        .filter(([, c]) => c.isEvent)
        .map(([key]) => key);

      if (eventCatKeys.length === 0) {
        localStorage.setItem('dr-events-migrated', 'true');
        return;
      }

      const updates = {};
      let counter = 0;

      for (const [taskId, task] of Object.entries(tasks)) {
        if (!eventCatKeys.includes(task.category)) continue;

        const cat = cats[task.category];
        const eventData = {
          name: task.name,
          date: task.dedicatedDate || today,
          allDay: !task.eventTime,
          startTime: task.eventTime || null,
          endTime: null,
          color: cat?.eventColor || '#4285f4',
          people: task.owners || [],
          location: null,
          notes: task.notes || null,
          url: null,
          recurrence: null,
          reminders: null,
          createdDate: task.createdDate || today
        };

        // Generate a push key via multiUpdate path — avoids direct firebase.database() call
        const eventId = `evt_${Date.now()}_${counter}`;
        updates[`events/${eventId}`] = eventData;

        for (const [dateKey, dayEntries] of Object.entries(allSchedule)) {
          for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
            if (entry.taskId === taskId) {
              updates[`schedule/${dateKey}/${entryKey}`] = { type: 'event', eventId };
            }
          }
        }

        for (const [entryKey] of Object.entries(completions)) {
          const schedEntry = Object.values(allSchedule).flatMap(d => Object.entries(d || {})).find(([k]) => k === entryKey);
          if (schedEntry && schedEntry[1]?.taskId === taskId) {
            updates[`completions/${entryKey}`] = null;
          }
        }

        updates[`tasks/${taskId}`] = null;
        counter++;
      }

      if (counter > 0) {
        await multiUpdate(updates);
        const [newTasks, newEvents, newSched] = await Promise.all([
          readTasks(), readEvents(), readAllSchedule()
        ]);
        Object.keys(tasks).forEach(k => delete tasks[k]);
        Object.assign(tasks, newTasks || {});
        events = newEvents || {};
        allSchedule = newSched || {};
        console.log(`Migrated ${counter} event tasks to events/ node`);
      }

      localStorage.setItem('dr-events-migrated', 'true');
    }

    // ══════════════════════════════════════════
    // Initial load
    // ══════════════════════════════════════════

    await loadData();
    await migrateEventCategories();
    render();
  </script>
</body>
</html>
