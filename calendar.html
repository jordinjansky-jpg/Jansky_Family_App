<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="manifest" href="manifest.json">
  <title>Daily Rundown — Calendar</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>
  <div id="sheetMount"></div>
  <div id="taskSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import { initFirebase, isFirstRun, readSettings, readPeople, readTasks, readCategories, readCompletions, readAllSchedule, writeCompletion, removeCompletion, writeTask, pushTask, multiUpdate, onValue } from './shared/firebase.js';
    import { renderNavBar, renderHeader, renderPersonFilter, renderTaskCard, renderTimeHeader, renderEmptyState, renderUndoToast, renderGradeBadge, renderTaskDetailSheet, renderBottomSheet, renderEditTaskSheet, renderQuickAddSheet } from './shared/components.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig } from './shared/theme.js';
    import { todayKey, addDays, dayOfWeek, monthStart, monthEnd, dateRange, monthNumber, yearNumber, DAY_NAMES_SHORT, formatDateShort, formatDateLong } from './shared/utils.js';
    import { isComplete, filterByPerson, groupByFrequency, dayProgress, sortEntries } from './shared/state.js';
    import { basePoints, dailyScore, dailyPossible, gradeDisplay } from './shared/scoring.js';
    import { buildScheduleUpdates, getRotationOwner } from './shared/scheduler.js';

    // ── Cached theme ──
    const cached = loadCachedTheme();
    applyTheme(cached || defaultThemeConfig());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load core data ──
    const [settings, peopleObj, tasksObj, catsObj] = await Promise.all([
      readSettings(), readPeople(), readTasks(), readCategories()
    ]);

    if (!cached && settings?.theme) applyTheme(settings.theme);

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);
    const people = peopleObj ? Object.entries(peopleObj).map(([id, p]) => ({ id, ...p })) : [];
    const tasks = tasksObj || {};
    const cats = catsObj || {};

    const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    // ── App state ──
    let viewMonth = today.substring(0, 7); // YYYY-MM
    let activePerson = null;
    let selectedDay = null;
    let completions = {};
    let allSchedule = {};

    // ── Header & Nav ──
    const debugActive = localStorage.getItem('dr-debug') === 'true';
    document.getElementById('headerMount').innerHTML = renderHeader({
      appName: settings?.appName || 'Daily Rundown',
      subtitle: 'Calendar',
      dateLine: formatDateLong(todayKey(settings?.timezone || 'America/Chicago')),
      showAdmin: true,
      showDebug: debugActive,
      showAddTask: true
    });
    document.getElementById('navMount').innerHTML = renderNavBar('calendar');

    // ── Hide loading, show content ──
    document.getElementById('loadingState').style.display = 'none';
    const main = document.getElementById('mainContent');
    main.style.display = '';

    // ══════════════════════════════════════════
    // Data loading
    // ══════════════════════════════════════════

    async function loadData() {
      const [comp, sched] = await Promise.all([
        readCompletions(),
        readAllSchedule()
      ]);
      completions = comp || {};
      allSchedule = sched || {};
    }

    // ══════════════════════════════════════════
    // Calendar grid helpers
    // ══════════════════════════════════════════

    function getDaySummary(dateKey) {
      const dayEntries = allSchedule[dateKey] || {};
      const filtered = filterByPerson(dayEntries, activePerson);
      const keys = Object.keys(filtered);
      const total = keys.length;
      const done = keys.filter(k => isComplete(k, completions)).length;

      // Count by frequency
      const freq = { daily: { total: 0, done: 0 }, weekly: { total: 0, done: 0 }, monthly: { total: 0, done: 0 } };
      // Collect unique event colors for this day
      const eventColors = new Set();
      for (const [key, entry] of Object.entries(filtered)) {
        const task = tasks[entry.taskId];
        const cat = task?.category ? cats[task.category] : null;
        if (cat?.isEvent && cat.eventColor) {
          eventColors.add(cat.eventColor);
        }
        const rt = entry.rotationType || 'daily';
        const bucket = freq[rt] || freq.daily;
        bucket.total++;
        if (isComplete(key, completions)) bucket.done++;
      }

      return { total, done, freq, eventColors: [...eventColors] };
    }

    // ══════════════════════════════════════════
    // Render
    // ══════════════════════════════════════════

    function getMonthKey(baseMonth, delta) {
      const d = new Date(Date.UTC(yearNumber(baseMonth + '-01'), monthNumber(baseMonth + '-01') - 1 + delta, 1));
      return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
    }

    function renderMonthGrid(month) {
      const mStart = `${month}-01`;
      const mEnd = monthEnd(mStart);
      const firstDow = dayOfWeek(mStart);
      const days = dateRange(mStart, mEnd);
      const mn = monthNumber(mStart);
      const yr = yearNumber(mStart);
      const isCurrent = month === today.substring(0, 7);

      let html = `<div class="cal-month${isCurrent ? ' cal-month--current' : ''}">`;
      html += `<div class="cal-month__title">${MONTH_NAMES[mn - 1]} ${yr}</div>`;
      html += `<div class="cal-grid">`;

      for (const d of DAY_NAMES_SHORT) {
        html += `<div class="cal-grid__dow">${d}</div>`;
      }

      for (let i = 0; i < firstDow; i++) {
        html += `<div class="cal-grid__cell cal-grid__cell--empty"></div>`;
      }

      for (const dateKey of days) {
        const summary = getDaySummary(dateKey);
        const isToday = dateKey === today;
        const isSelected = dateKey === selectedDay;
        const allDone = summary.total > 0 && summary.done === summary.total;

        let cls = 'cal-grid__cell';
        if (isToday) cls += ' cal-grid__cell--today';
        if (isSelected) cls += ' cal-grid__cell--selected';
        if (allDone) cls += ' cal-grid__cell--alldone';

        const dayNum = parseInt(dateKey.split('-')[2], 10);

        // Frequency breakdown labels
        let freqHtml = '';
        if (summary.total > 0) {
          const parts = [];
          if (summary.freq.daily.total > 0) parts.push(`<span class="cal-freq cal-freq--d">D${summary.freq.daily.done}/${summary.freq.daily.total}</span>`);
          if (summary.freq.weekly.total > 0) parts.push(`<span class="cal-freq cal-freq--w">W${summary.freq.weekly.done}/${summary.freq.weekly.total}</span>`);
          if (summary.freq.monthly.total > 0) parts.push(`<span class="cal-freq cal-freq--m">M${summary.freq.monthly.done}/${summary.freq.monthly.total}</span>`);
          freqHtml = `<div class="cal-grid__freq">${parts.join('')}</div>`;
        }

        // Event color indicators
        let eventHtml = '';
        if (summary.eventColors.length > 0) {
          const thickness = summary.eventColors.length === 1 ? '3px' : `${Math.max(2, Math.floor(6 / summary.eventColors.length))}px`;
          const segments = summary.eventColors.map(c => `<span class="cal-event-bar" style="background:${c};height:${thickness}"></span>`).join('');
          eventHtml = `<div class="cal-event-bars">${segments}</div>`;
        }

        html += `<button class="${cls}${summary.eventColors.length > 0 ? ' cal-grid__cell--has-events' : ''}" data-date="${dateKey}" type="button">
          <span class="cal-grid__day">${dayNum}</span>
          ${freqHtml}
          ${eventHtml}
        </button>`;
      }

      html += `</div></div>`;
      return html;
    }

    function render() {
      let html = '';

      // Nav
      html += `<div class="date-header">
        <div class="date-nav">
          <button class="date-nav__btn" id="prevMonth" type="button" title="Previous 3 months">&lsaquo;</button>
          <div class="date-nav__center">
            <span class="date-header__day">${MONTH_NAMES[monthNumber(viewMonth + '-01') - 1]} ${yearNumber(viewMonth + '-01')}</span>
          </div>
          <button class="date-nav__btn" id="nextMonth" type="button" title="Next 3 months">&rsaquo;</button>
        </div>
        ${viewMonth !== today.substring(0, 7) ? `<button class="btn btn--ghost btn--sm mt-sm" id="goThisMonth" type="button">This Month</button>` : ''}
      </div>`;

      // Person filter
      html += renderPersonFilter(people, activePerson);

      // 3 months: current, next, next+1
      const nextMonth = getMonthKey(viewMonth, 1);
      const nextMonth2 = getMonthKey(viewMonth, 2);

      html += renderMonthGrid(viewMonth);
      html += renderMonthGrid(nextMonth);
      html += renderMonthGrid(nextMonth2);

      main.innerHTML = html;
      bindEvents();

      // If sheet is already open, update in place (no re-animation)
      if (selectedDay && document.getElementById('calSheet')) {
        updateSheet(selectedDay);
      } else if (selectedDay) {
        openSheet(selectedDay);
      } else {
        closeSheet();
      }
    }

    // ══════════════════════════════════════════
    // Bottom sheet for day detail
    // ══════════════════════════════════════════

    const sheetMount = document.getElementById('sheetMount');

    function buildDayContent(dateKey) {
      const dayEntries = allSchedule[dateKey] || {};
      const filtered = filterByPerson(dayEntries, activePerson);
      const prog = dayProgress(filtered, completions);
      const score = dailyScore(filtered, completions, tasks, cats, settings, dateKey, today);
      const gd = gradeDisplay(score.percentage);

      let html = '';

      if (prog.total === 0) {
        html += `<div class="empty-state" style="padding:var(--spacing-md) 0;">
          <span class="empty-state__icon">📭</span>
          <h3 class="empty-state__title">Nothing scheduled</h3>
        </div>`;
      } else {
        const incomplete = {};
        const completedEntries = {};
        for (const [key, entry] of Object.entries(filtered)) {
          if (isComplete(key, completions)) completedEntries[key] = entry;
          else incomplete[key] = entry;
        }

        const groups = groupByFrequency(incomplete, tasks, cats);
        const sections = [
          { key: 'events', label: 'Events' },
          { key: 'monthly', label: 'Monthly' },
          { key: 'weekly', label: 'Weekly' },
          { key: 'once', label: 'One-Time' },
          { key: 'daily', label: 'Daily' }
        ];

        const nonEmpty = sections.filter(s => Object.keys(groups[s.key]).length > 0);
        const showHeaders = nonEmpty.length > 1;

        for (const sec of sections) {
          const entries = groups[sec.key];
          const sorted = sortEntries(entries, completions);
          if (sorted.length === 0) continue;
          if (showHeaders) html += renderTimeHeader(sec.label);
          for (const [entryKey, entry] of sorted) {
            const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
            const person = people.find(p => p.id === entry.ownerId);
            const cat = task.category ? cats[task.category] : null;
            const pts = score.pointsMap[entryKey] || basePoints(task);
            const ovr = completions[entryKey]?.pointsOverride ?? null;
            html += renderTaskCard({ entryKey, entry: { ...entry, dateKey }, task, person, category: cat, completed: false, overdue: false, points: { possible: pts, override: ovr }, isEvent: !!cat?.isEvent, showPoints: settings?.showPoints !== false });
          }
        }

        const compArr = Object.entries(completedEntries);
        if (compArr.length > 0) {
          html += renderTimeHeader(`Completed (${compArr.length})`);
          for (const [entryKey, entry] of compArr) {
            const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
            const person = people.find(p => p.id === entry.ownerId);
            const cat = task.category ? cats[task.category] : null;
            const pts = score.pointsMap[entryKey] || basePoints(task);
            const ovr = completions[entryKey]?.pointsOverride ?? null;
            html += renderTaskCard({ entryKey, entry: { ...entry, dateKey }, task, person, category: cat, completed: true, overdue: false, points: { possible: pts, override: ovr }, isEvent: !!cat?.isEvent, showPoints: settings?.showPoints !== false });
          }
        }
      }

      // Compute time remaining (incomplete tasks only)
      let remainMin = 0;
      for (const [key, entry] of Object.entries(filtered)) {
        if (!isComplete(key, completions)) {
          const task = tasks[entry.taskId];
          if (task?.estMin) remainMin += task.estMin;
        }
      }
      const rH = Math.floor(remainMin / 60);
      const rM = remainMin % 60;
      const timeLeft = rH > 0 ? `${rH}h${rM > 0 ? ' ' + String(rM).padStart(2, '0') + 'm' : ''}` : `${rM}m`;

      return { html, prog, score, gd, timeLeft, remainMin };
    }

    function openSheet(dateKey) {
      const { html, prog, score, gd, timeLeft, remainMin } = buildDayContent(dateKey);
      const dateLabel = formatDateShort(dateKey);
      const isToday = dateKey === today;
      const dayTag = isToday ? ' <span class="cal-sheet__today">Today</span>' : '';
      const gradeHtml = score.possible > 0 ? ` ${renderGradeBadge(gd.grade, gd.tier)}` : '';
      const summaryParts = [`${prog.done}/${prog.total} done`];
      if (remainMin > 0) summaryParts.push(`${timeLeft} left`);

      sheetMount.innerHTML = `<div class="cal-sheet-overlay" id="calSheetOverlay">
        <div class="cal-sheet" id="calSheet">
          <div class="cal-sheet__handle"></div>
          <div class="cal-sheet__header">
            <div class="cal-sheet__title">${dateLabel}${dayTag}${gradeHtml}</div>
            <div class="cal-sheet__summary">${summaryParts.join(' · ')}</div>
          </div>
          <div class="cal-sheet__progress">
            <div class="cal-sheet__progress-fill" style="width:${prog.pct}%"></div>
          </div>
          ${renderPersonFilter(people, activePerson)}
          <div class="cal-sheet__body">${html}</div>
        </div>
      </div>`;

      // Animate in, then lock height so filter changes don't resize
      requestAnimationFrame(() => {
        const overlay = document.getElementById('calSheetOverlay');
        const sheet = document.getElementById('calSheet');
        if (overlay) overlay.classList.add('active');
        if (sheet) {
          sheet.classList.add('active');
          // After transition completes, lock the sheet height
          sheet.addEventListener('transitionend', () => {
            sheet.style.minHeight = sheet.offsetHeight + 'px';
          }, { once: true });
        }
      });

      // Bind overlay click to close
      document.getElementById('calSheetOverlay')?.addEventListener('click', (e) => {
        if (e.target.id === 'calSheetOverlay') {
          selectedDay = null;
          closeSheet();
          render();
        }
      });

      bindSheetEvents();
      bindSheetSwipe();
    }

    function changeSheetDay(delta) {
      if (!selectedDay) return;
      selectedDay = addDays(selectedDay, delta);
      // Update grid selection
      main.querySelectorAll('.cal-grid__cell--selected').forEach(el => el.classList.remove('cal-grid__cell--selected'));
      const newCell = main.querySelector(`.cal-grid__cell[data-date="${selectedDay}"]`);
      if (newCell) newCell.classList.add('cal-grid__cell--selected');
      // Update sheet title + content
      const sheet = document.getElementById('calSheet');
      if (sheet) {
        const { html, prog, score, gd } = buildDayContent(selectedDay);
        const dateLabel = formatDateShort(selectedDay);
        const isToday = selectedDay === today;
        const dayTag = isToday ? ' <span class="cal-sheet__today">Today</span>' : '';
        const gradeHtml = score.possible > 0 ? ` ${renderGradeBadge(gd.grade, gd.tier)}` : '';
        const titleEl = sheet.querySelector('.cal-sheet__title');
        if (titleEl) titleEl.innerHTML = `${dateLabel}${dayTag}${gradeHtml}`;
        updateSheet(selectedDay);
      }
    }

    function bindSheetSwipe() {
      const sheet = document.getElementById('calSheet');
      if (!sheet) return;
      let sx = 0, sy = 0;
      sheet.addEventListener('touchstart', (e) => {
        sx = e.touches[0].clientX;
        sy = e.touches[0].clientY;
      }, { passive: true });
      sheet.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - sx;
        const dy = e.changedTouches[0].clientY - sy;
        if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          changeSheetDay(dx < 0 ? 1 : -1);
        }
      }, { passive: true });
    }

    function updateSheet(dateKey) {
      const { html, prog, score, gd, timeLeft, remainMin } = buildDayContent(dateKey);
      const sheet = document.getElementById('calSheet');
      if (!sheet) return;

      // Update progress
      const progFill = sheet.querySelector('.cal-sheet__progress-fill');
      if (progFill) progFill.style.width = `${prog.pct}%`;
      const summary = sheet.querySelector('.cal-sheet__summary');
      const sumParts = [`${prog.done}/${prog.total} done`];
      if (remainMin > 0) sumParts.push(`${timeLeft} left`);
      if (summary) summary.textContent = sumParts.join(' · ');

      // Update grade badge in title
      const titleEl = sheet.querySelector('.cal-sheet__title');
      if (titleEl) {
        const existingBadge = titleEl.querySelector('.grade-badge');
        const newBadgeHtml = score.possible > 0 ? ` ${renderGradeBadge(gd.grade, gd.tier)}` : '';
        if (existingBadge) existingBadge.outerHTML = newBadgeHtml;
        else if (newBadgeHtml) titleEl.insertAdjacentHTML('beforeend', newBadgeHtml);
      }

      // Update filter pills
      const filterContainer = sheet.querySelector('.person-filter');
      if (filterContainer) filterContainer.outerHTML = renderPersonFilter(people, activePerson);

      // Update body
      const body = sheet.querySelector('.cal-sheet__body');
      if (body) body.innerHTML = html;

      bindSheetEvents();
    }

    function bindSheetEvents() {
      // Bind person filter in sheet
      sheetMount.querySelectorAll('.person-pill').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          activePerson = btn.dataset.personId || null;
          // render() updates the grid and calls updateSheet() in place (no re-animation)
          render();
        });
      });

      // Bind task cards in sheet: tap to toggle, long-press for detail sheet
      sheetMount.querySelectorAll('.task-card').forEach(btn => {
        let pressTimer = null;
        let didLongPress = false;

        const startPress = (e) => {
          e.stopPropagation();
          didLongPress = false;
          pressTimer = setTimeout(() => {
            didLongPress = true;
            openTaskSheet(btn.dataset.entryKey, btn.dataset.dateKey);
          }, 500);
        };

        const endPress = (e) => {
          e.stopPropagation();
          clearTimeout(pressTimer);
          if (!didLongPress) {
            toggleTask(btn.dataset.entryKey, btn.dataset.dateKey);
          }
        };

        const cancelPress = () => { clearTimeout(pressTimer); };

        btn.addEventListener('pointerdown', startPress);
        btn.addEventListener('pointerup', endPress);
        btn.addEventListener('pointerleave', cancelPress);
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
      });
    }

    function closeSheet() {
      const overlay = document.getElementById('calSheetOverlay');
      const sheet = document.getElementById('calSheet');
      if (overlay) {
        overlay.classList.remove('active');
        sheet?.classList.remove('active');
        setTimeout(() => { sheetMount.innerHTML = ''; }, 300);
      } else {
        sheetMount.innerHTML = '';
      }
    }

    // ══════════════════════════════════════════
    // Task detail bottom sheet (long-press)
    // ══════════════════════════════════════════

    const taskSheetMount = document.getElementById('taskSheetMount');

    function openTaskSheet(entryKey, dateKey) {
      const dayEntries = allSchedule[dateKey] || {};
      const entry = dayEntries[entryKey];
      if (!entry) return;

      const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
      const person = people.find(p => p.id === entry.ownerId);
      const cat = task.category ? cats[task.category] : null;
      const completed = isComplete(entryKey, completions);
      const pts = basePoints(task);
      const completion = completions[entryKey];
      const currentOverride = completion?.pointsOverride ?? null;

      // Grade preview
      const filtered = filterByPerson(dayEntries, activePerson);
      const score = dailyScore(filtered, completions, tasks, cats, settings, dateKey, today);
      const gd = gradeDisplay(score.percentage);
      const gradePreview = score.possible > 0 ? `${gd.grade} (${score.percentage}%)` : null;

      const sheetContent = renderTaskDetailSheet({
        entryKey,
        entry: { ...entry, dateKey },
        task,
        person,
        category: cat,
        completed,
        points: { possible: pts },
        sliderMin: settings?.sliderMin ?? 0,
        sliderMax: settings?.sliderMax ?? 150,
        currentOverride: currentOverride != null ? currentOverride : 100,
        gradePreview,
        people,
        showDelegate: true,
        showMove: true,
        showEdit: true,
        showPoints: settings?.showPoints !== false
      });

      taskSheetMount.innerHTML = renderBottomSheet(sheetContent);

      requestAnimationFrame(() => {
        const overlay = document.getElementById('bottomSheet');
        if (overlay) overlay.classList.add('active');
      });

      bindTaskSheetEvents(entryKey, dateKey);
    }

    function closeTaskSheet() {
      const overlay = document.getElementById('bottomSheet');
      if (overlay) {
        overlay.classList.remove('active');
        setTimeout(() => { taskSheetMount.innerHTML = ''; }, 300);
      }
    }

    function bindTaskSheetEvents(entryKey, dateKey) {
      // Close on overlay click
      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => {
        if (e.target === overlay) closeTaskSheet();
      });

      // Toggle complete
      document.getElementById('sheetToggleComplete')?.addEventListener('click', async () => {
        closeTaskSheet();
        await toggleTask(entryKey, dateKey);
      });

      // Points slider — preview for all tasks, save only for completed
      const slider = document.getElementById('pointsSlider');
      if (slider) {
        const isCompleted = isComplete(entryKey, completions);
        const dayEntries = allSchedule[dateKey] || {};

        slider.addEventListener('input', () => {
          const val = parseInt(slider.value, 10);
          const basePts = parseInt(slider.dataset.basePts, 10);
          const earnedPts = Math.round(basePts * (val / 100));
          const label = document.getElementById('sliderValueLabel');
          if (label) label.textContent = `${val}% (${earnedPts}pt)`;

          // Live grade preview — temporarily inject override into completions
          const filtered = filterByPerson(dayEntries, activePerson);
          const hadRecord = !!completions[entryKey];
          const origRecord = completions[entryKey];
          completions[entryKey] = {
            ...(origRecord || { completedAt: Date.now(), completedBy: 'preview' }),
            pointsOverride: val === 100 ? null : val
          };
          const previewScore = dailyScore(filtered, completions, tasks, cats, settings, dateKey, today);
          const previewGd = gradeDisplay(previewScore.percentage);
          const previewEl = document.getElementById('gradePreview');
          if (previewEl) previewEl.textContent = `Grade: ${previewGd.grade} (${previewScore.percentage}%)`;
          // Restore original state
          if (hadRecord) completions[entryKey] = origRecord;
          else delete completions[entryKey];
        });

        slider.addEventListener('change', async () => {
          if (!isCompleted) return; // preview only for incomplete tasks
          const val = parseInt(slider.value, 10);
          const override = val === 100 ? null : val;
          completions[entryKey].pointsOverride = override;
          await writeCompletion(entryKey, completions[entryKey]);
          if (selectedDay) updateSheet(selectedDay);
        });

        // Reset to 100% button
        const resetBtn = document.getElementById('sliderReset');
        if (resetBtn) {
          resetBtn.addEventListener('click', () => {
            slider.value = 100;
            slider.dispatchEvent(new Event('input'));
            slider.dispatchEvent(new Event('change'));
          });
        }
      }

      // Delegate
      document.getElementById('sheetDelegate')?.addEventListener('click', () => {
        const panel = document.getElementById('delegatePanel');
        if (panel) panel.style.display = panel.style.display === 'none' ? '' : 'none';
      });

      let pendingDelegateOwnerId = null;
      document.querySelectorAll('#delegatePanel .chip--selectable').forEach(chip => {
        chip.addEventListener('click', async () => {
          const newOwnerId = chip.dataset.personId;
          if (!newOwnerId) return;

          const moveToggle = document.getElementById('delegateMoveToggle');
          if (moveToggle?.checked) {
            pendingDelegateOwnerId = newOwnerId;
            document.querySelectorAll('#delegatePanel .chip--selectable').forEach(c => c.classList.remove('chip--active'));
            chip.classList.add('chip--active');
            const picker = document.getElementById('delegateMoveDatePicker');
            if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
            return;
          }

          const dayEntries = allSchedule[dateKey] || {};
          const entry = dayEntries[entryKey];
          if (!entry) return;
          const originalPerson = people.find(p => p.id === entry.ownerId);
          const newEntry = { ...entry, ownerId: newOwnerId, delegatedFromName: originalPerson?.name || '?' };
          const updates = {};
          updates[`schedule/${dateKey}/${entryKey}`] = null;
          const newKey = `sched_${Date.now()}_delegate`;
          updates[`schedule/${dateKey}/${newKey}`] = newEntry;
          if (completions[entryKey]) {
            updates[`completions/${entryKey}`] = null;
            updates[`completions/${newKey}`] = completions[entryKey];
          }
          await multiUpdate(updates);
          closeTaskSheet();
          await loadData(); render();
        });
      });

      // Delegate+Move date picker
      document.getElementById('delegateMoveDatePicker')?.addEventListener('change', async (e) => {
        const newDate = e.target.value;
        if (!newDate || !pendingDelegateOwnerId) return;
        const dayEntries = allSchedule[dateKey] || {};
        const entry = dayEntries[entryKey];
        if (!entry) return;
        const originalPerson = people.find(p => p.id === entry.ownerId);
        const newEntry = { ...entry, ownerId: pendingDelegateOwnerId, delegatedFromName: originalPerson?.name || '?', movedFromDate: dateKey };
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        const newKey = `sched_${Date.now()}_delegate_moved`;
        updates[`schedule/${newDate}/${newKey}`] = newEntry;
        if (completions[entryKey]) {
          updates[`completions/${entryKey}`] = null;
          updates[`completions/${newKey}`] = completions[entryKey];
        }
        await multiUpdate(updates);
        pendingDelegateOwnerId = null;
        closeTaskSheet();
        await loadData(); render();
      });

      // Move — directly open date picker
      document.getElementById('sheetMove')?.addEventListener('click', () => {
        const picker = document.getElementById('moveDatePicker');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      document.getElementById('moveDatePicker')?.addEventListener('change', async (e) => {
        const newDate = e.target.value;
        if (!newDate) return;
        const dayEntries = allSchedule[dateKey] || {};
        const entry = dayEntries[entryKey];
        if (!entry) return;
        const newEntry = { ...entry, movedFromDate: dateKey };
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        const newKey = `sched_${Date.now()}_moved`;
        updates[`schedule/${newDate}/${newKey}`] = newEntry;
        if (completions[entryKey]) {
          updates[`completions/${entryKey}`] = null;
          updates[`completions/${newKey}`] = completions[entryKey];
        }
        await multiUpdate(updates);
        closeTaskSheet();
        await loadData(); render();
      });

      document.getElementById('moveSkip')?.addEventListener('click', async () => {
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        if (completions[entryKey]) updates[`completions/${entryKey}`] = null;
        await multiUpdate(updates);
        closeTaskSheet();
        await loadData(); render();
      });

      // Edit task
      document.getElementById('sheetEdit')?.addEventListener('click', () => {
        const taskId = document.getElementById('sheetEdit').dataset.taskId;
        const overlay = document.getElementById('bottomSheet');
        if (overlay) overlay.classList.remove('active');
        setTimeout(() => { openEditTaskSheet(taskId); }, 320);
      });
    }

    // ── Edit task sheet ──

    function openEditTaskSheet(taskId) {
      const task = tasks[taskId];
      if (!task) return;
      const catsArr = Object.entries(cats).map(([key, c]) => ({ key, ...c }));
      const sheetContent = renderEditTaskSheet(taskId, task, catsArr, people);
      taskSheetMount.innerHTML = renderBottomSheet(sheetContent);
      requestAnimationFrame(() => {
        const overlay = document.getElementById('bottomSheet');
        if (overlay) overlay.classList.add('active');
      });
      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) closeTaskSheet(); });
      document.getElementById('etCancel')?.addEventListener('click', closeTaskSheet);

      // Assignment mode toggle
      const modeGroup = document.getElementById('et_assignModeHint')?.parentElement;
      if (modeGroup) {
        for (const btn of modeGroup.querySelectorAll('.admin-mode-btn')) {
          btn.addEventListener('click', () => {
            modeGroup.querySelectorAll('.admin-mode-btn').forEach(b => b.classList.remove('admin-mode-btn--active'));
            btn.classList.add('admin-mode-btn--active');
            document.getElementById('et_assignModeHint').textContent = btn.dataset.mode === 'duplicate' ? 'Each owner gets their own entry.' : 'Rotate between owners each period.';
          });
        }
      }

      // Rotation change — show/hide dedicated day vs date
      document.getElementById('et_rotation')?.addEventListener('change', (e) => {
        const rot = e.target.value;
        const group = document.getElementById('et_dedicatedDayGroup');
        const daySelect = document.getElementById('et_daySelect');
        const dateRow = document.getElementById('et_dedicatedDateRow');
        const label = document.getElementById('et_dedicatedDayLabel');
        const catOpt = document.getElementById('et_category')?.selectedOptions[0];
        const isEvent = catOpt?.dataset.event === '1';
        if (rot === 'daily') {
          group.style.display = 'none';
        } else {
          group.style.display = '';
          const eventBtn = label?.querySelector('#et_eventDateBtn');
          const btnHtml = eventBtn ? eventBtn.outerHTML : '';
          if (rot === 'once') {
            daySelect.style.display = 'none';
            dateRow.style.display = isEvent ? 'none' : '';
            label.innerHTML = (isEvent ? 'Event Date ' : 'Scheduled Date ') + btnHtml;
          } else {
            daySelect.style.display = '';
            dateRow.style.display = 'none';
            label.innerHTML = 'Dedicated Day ' + btnHtml;
          }
          label?.querySelector('#et_eventDateBtn')?.addEventListener('click', () => {
            const picker = document.getElementById('et_eventDate');
            if (picker) { try { picker.showPicker(); } catch(e2) { picker.click(); } }
          });
        }
      });

      // Category change — show/hide event date button
      document.getElementById('et_category')?.addEventListener('change', (e) => {
        const isEvent = e.target.selectedOptions[0]?.dataset.event === '1';
        const eventBtn = document.getElementById('et_eventDateBtn');
        if (eventBtn) eventBtn.style.display = isEvent ? 'inline' : 'none';
        const eventTimeGroup = document.getElementById('et_eventTimeGroup');
        if (eventTimeGroup) eventTimeGroup.style.display = isEvent ? '' : 'none';
        if (isEvent) {
          const rotSelect = document.getElementById('et_rotation');
          if (rotSelect) { rotSelect.value = 'once'; rotSelect.dispatchEvent(new Event('change')); }
        }
      });

      // Event date icon
      document.getElementById('et_eventDateBtn')?.addEventListener('click', () => {
        const picker = document.getElementById('et_eventDate');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      document.getElementById('etSave')?.addEventListener('click', async () => {
        const name = document.getElementById('et_name')?.value.trim();
        if (!name) { document.getElementById('et_name')?.focus(); return; }
        const owners = Array.from(document.querySelectorAll('#et_owners input:checked')).map(cb => cb.value);
        const rotation = document.getElementById('et_rotation')?.value || task.rotation;
        const activeMode = modeGroup?.querySelector('.admin-mode-btn--active')?.dataset.mode || 'rotate';
        const dayVal = document.getElementById('et_daySelect')?.value;
        const dedicatedDay = (rotation !== 'once' && dayVal !== '' && dayVal != null) ? parseInt(dayVal, 10) : null;
        const dedicatedDate = rotation === 'once' ? (document.getElementById('et_dedicatedDate')?.value || null) : null;
        const cooldown = document.getElementById('et_cooldown')?.value;
        const catOpt = document.getElementById('et_category')?.selectedOptions[0];
        const catIsEvent = catOpt?.dataset.event === '1';
        const eventDate = document.getElementById('et_eventDate')?.value;
        const effectiveDedicatedDate = catIsEvent && eventDate ? eventDate : dedicatedDate;

        const eventTime = catIsEvent ? (document.getElementById('et_eventTime')?.value || null) : null;
        const updated = {
          ...task, name, rotation,
          difficulty: document.getElementById('et_difficulty')?.value || task.difficulty,
          timeOfDay: document.getElementById('et_timeOfDay')?.value || task.timeOfDay,
          estMin: (v => isNaN(v) ? 10 : v)(parseInt(document.getElementById('et_estMin')?.value, 10)),
          category: document.getElementById('et_category')?.value || task.category,
          owners, ownerAssignmentMode: activeMode, dedicatedDay,
          dedicatedDate: effectiveDedicatedDate,
          eventTime,
          cooldownDays: cooldown ? parseInt(cooldown, 10) : null,
          exempt: document.getElementById('et_exempt')?.checked || false
        };
        await writeTask(taskId, updated);
        tasks[taskId] = updated;
        closeTaskSheet();
        if (selectedDay) updateSheet(selectedDay);
      });
    }

    // ══════════════════════════════════════════
    // Events
    // ══════════════════════════════════════════

    function bindEvents() {
      // Month nav
      document.getElementById('prevMonth')?.addEventListener('click', () => changeMonth(-1));
      document.getElementById('nextMonth')?.addEventListener('click', () => changeMonth(1));
      document.getElementById('goThisMonth')?.addEventListener('click', () => {
        viewMonth = today.substring(0, 7);
        selectedDay = null;
        render();
      });

      // Person filter
      main.querySelectorAll('.person-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          activePerson = btn.dataset.personId || null;
          render();
        });
      });

      // Day cell tap
      main.querySelectorAll('.cal-grid__cell[data-date]').forEach(btn => {
        btn.addEventListener('click', () => {
          const dateKey = btn.dataset.date;
          // Update selected styling
          main.querySelectorAll('.cal-grid__cell--selected').forEach(el => el.classList.remove('cal-grid__cell--selected'));
          if (selectedDay === dateKey) {
            selectedDay = null;
            closeSheet();
          } else {
            selectedDay = dateKey;
            btn.classList.add('cal-grid__cell--selected');
            openSheet(dateKey);
          }
        });
      });
    }

    function changeMonth(delta) {
      const mStart = `${viewMonth}-01`;
      const d = new Date(Date.UTC(yearNumber(mStart), monthNumber(mStart) - 1 + delta, 1));
      viewMonth = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
      selectedDay = null;
      render();
    }

    // ══════════════════════════════════════════
    // Completion toggle
    // ══════════════════════════════════════════

    async function toggleTask(entryKey, dateKey) {
      if (!entryKey) return;
      const wasComplete = isComplete(entryKey, completions);

      if (wasComplete) {
        delete completions[entryKey];
        await removeCompletion(entryKey);
      } else {
        const record = {
          completedAt: firebase.database.ServerValue.TIMESTAMP,
          completedBy: 'calendar'
        };
        completions[entryKey] = record;
        await writeCompletion(entryKey, record);

        // Auto-archive one-time tasks on completion
        const allSched = await readAllSchedule() || {};
        for (const [dk, dayEntries] of Object.entries(allSched)) {
          const entry = dayEntries?.[entryKey];
          if (entry) {
            const task = tasks[entry.taskId];
            if (task && task.rotation === 'once') {
              task.status = 'completed';
              await writeTask(entry.taskId, task);
            }
            break;
          }
        }
      }

      // Refresh grid + sheet content (render handles updateSheet if sheet is open)
      render();
    }

    // ══════════════════════════════════════════
    // Quick-add task
    // ══════════════════════════════════════════

    function openQuickAddSheet() {
      const catsArr = Object.entries(cats).map(([key, c]) => ({ key, ...c }));
      const defaultCatKey = catsArr.find(c => c.isDefault)?.key || '';
      const sheetContent = renderQuickAddSheet(people, catsArr, defaultCatKey);
      taskSheetMount.innerHTML = renderBottomSheet(sheetContent);

      requestAnimationFrame(() => {
        const overlay = document.getElementById('bottomSheet');
        if (overlay) overlay.classList.add('active');
        document.getElementById('qa_name')?.focus();
      });

      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) closeTaskSheet(); });

      // Show/hide event date icon when category changes
      document.getElementById('qa_category')?.addEventListener('change', (e) => {
        const opt = e.target.selectedOptions[0];
        const isEvent = opt?.dataset.event === '1';
        const eventBtn = document.getElementById('qa_eventDateBtn');
        if (eventBtn) eventBtn.style.display = isEvent ? 'inline' : 'none';
        const eventTimeGroup = document.getElementById('qa_eventTimeGroup');
        if (eventTimeGroup) eventTimeGroup.style.display = isEvent ? '' : 'none';
        if (isEvent) {
          const rotSelect = document.getElementById('qa_rotation');
          if (rotSelect) { rotSelect.value = 'once'; rotSelect.dispatchEvent(new Event('change')); }
        }
      });

      // Event date icon — open native date picker
      document.getElementById('qa_eventDateBtn')?.addEventListener('click', () => {
        const picker = document.getElementById('qa_eventDate');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      // Rotation change — show/hide dedicated day vs date
      document.getElementById('qa_rotation')?.addEventListener('change', (e) => {
        const rot = e.target.value;
        const group = document.getElementById('qa_dedicatedDayGroup');
        const daySelect = document.getElementById('qa_daySelect');
        const dateRow = document.getElementById('qa_dedicatedDateRow');
        const label = document.getElementById('qa_dedicatedDayLabel');
        const catOpt = document.getElementById('qa_category')?.selectedOptions[0];
        const isEvent = catOpt?.dataset.event === '1';
        if (rot === 'daily') {
          group.style.display = 'none';
        } else {
          group.style.display = '';
          const eventBtn = label?.querySelector('#qa_eventDateBtn');
          const btnHtml = eventBtn ? eventBtn.outerHTML : '';
          if (rot === 'once') {
            daySelect.style.display = 'none';
            dateRow.style.display = isEvent ? 'none' : '';
            label.innerHTML = (isEvent ? 'Event Date ' : 'Scheduled Date ') + btnHtml;
          } else {
            daySelect.style.display = '';
            dateRow.style.display = 'none';
            label.innerHTML = 'Dedicated Day ' + btnHtml;
          }
          // Re-bind event date button after innerHTML replace
          label?.querySelector('#qa_eventDateBtn')?.addEventListener('click', () => {
            const picker = document.getElementById('qa_eventDate');
            if (picker) { try { picker.showPicker(); } catch(e2) { picker.click(); } }
          });
        }
      });

      // Assignment mode toggle
      const modeGroup = document.getElementById('qa_assignModeHint')?.parentElement;
      if (modeGroup) {
        for (const btn of modeGroup.querySelectorAll('.admin-mode-btn')) {
          btn.addEventListener('click', () => {
            modeGroup.querySelectorAll('.admin-mode-btn').forEach(b => b.classList.remove('admin-mode-btn--active'));
            btn.classList.add('admin-mode-btn--active');
            const hint = document.getElementById('qa_assignModeHint');
            if (hint) hint.textContent = btn.dataset.mode === 'duplicate' ? 'Each selected owner gets their own task instance every period.' : 'Rotate between owners each period.';
          });
        }
      }

      document.getElementById('qaCancel')?.addEventListener('click', closeTaskSheet);

      document.getElementById('qaSave')?.addEventListener('click', async () => {
        const name = document.getElementById('qa_name')?.value.trim();
        if (!name) { document.getElementById('qa_name')?.focus(); return; }

        const owners = Array.from(document.querySelectorAll('#qa_owners input:checked')).map(cb => cb.value);
        const catKey = document.getElementById('qa_category')?.value || '';
        const isEvent = !!cats[catKey]?.isEvent;
        const eventDate = document.getElementById('qa_eventDate')?.value || '';
        const rotation = isEvent && eventDate ? 'once' : (document.getElementById('qa_rotation')?.value || 'daily');

        // Read assignment mode
        const activeModeBtn = document.getElementById('qa_assignModeHint')?.parentElement?.querySelector('.admin-mode-btn--active');
        const assignMode = isEvent ? 'fixed' : (activeModeBtn?.dataset.mode || 'rotate');

        // Read dedicated day/date
        const dayVal = document.getElementById('qa_daySelect')?.value;
        const dedicatedDay = (rotation !== 'once' && dayVal !== '' && dayVal != null) ? parseInt(dayVal, 10) : null;
        const dedicatedDate = isEvent && eventDate ? eventDate : (rotation === 'once' ? (document.getElementById('qa_dedicatedDate')?.value || null) : null);

        const eventTime = isEvent ? (document.getElementById('qa_eventTime')?.value || null) : null;
        const taskData = {
          name,
          rotation,
          difficulty: document.getElementById('qa_difficulty')?.value || 'medium',
          timeOfDay: document.getElementById('qa_timeOfDay')?.value || 'anytime',
          estMin: (v => isNaN(v) ? 10 : v)(parseInt(document.getElementById('qa_estMin')?.value, 10)),
          category: catKey,
          owners,
          ownerAssignmentMode: assignMode,
          dedicatedDay,
          dedicatedDate,
          eventTime,
          cooldownDays: parseInt(document.getElementById('qa_cooldown')?.value, 10) || null,
          exempt: !!document.getElementById('qa_exempt')?.checked,
          status: 'active',
          createdDate: today
        };

        const newId = await pushTask(taskData);
        tasks[newId] = taskData;

        // Create schedule entry: event/once with date goes on that date, otherwise today
        // Skip today for weekly/monthly with dedicatedDay that isn't today
        const skipToday = (taskData.rotation === 'once' && dedicatedDate && dedicatedDate !== today)
          || ((taskData.rotation === 'weekly' || taskData.rotation === 'monthly') && taskData.dedicatedDay != null && dayOfWeek(today) !== taskData.dedicatedDay);
        const schedDate = dedicatedDate || today;
        if (owners.length > 0 && !skipToday) {
          const schedUpdates = {};
          const mode = taskData.ownerAssignmentMode || 'rotate';
          const timeOfDay = taskData.timeOfDay || 'anytime';
          const baseEntry = { taskId: newId, rotationType: taskData.rotation, ownerAssignmentMode: mode };
          let qaCounter = 0;
          const qaKey = () => `sched_${Date.now()}_qa_${String(qaCounter++).padStart(3, '0')}`;

          if (mode === 'duplicate') {
            for (const oid of owners) {
              if (timeOfDay === 'both') {
                schedUpdates[`schedule/${schedDate}/${qaKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'am' };
                schedUpdates[`schedule/${schedDate}/${qaKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay: 'pm' };
              } else {
                schedUpdates[`schedule/${schedDate}/${qaKey()}`] = { ...baseEntry, ownerId: oid, timeOfDay };
              }
            }
          } else {
            // Use proper rotation owner instead of always first owner
            const ownerId = mode === 'fixed' ? owners[0] : getRotationOwner(taskData, today);
            if (timeOfDay === 'both') {
              schedUpdates[`schedule/${schedDate}/${qaKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'am' };
              schedUpdates[`schedule/${schedDate}/${qaKey()}`] = { ...baseEntry, ownerId, timeOfDay: 'pm' };
            } else {
              schedUpdates[`schedule/${schedDate}/${qaKey()}`] = { ...baseEntry, ownerId, timeOfDay };
            }
          }
          await multiUpdate(schedUpdates);
        }

        // Rebuild future schedule so the new task appears on upcoming days
        const existingSched = await readAllSchedule() || {};
        const allComp = await readCompletions() || {};
        const futureUpdates = buildScheduleUpdates(tasks, people, settings, allComp, existingSched);
        await multiUpdate(futureUpdates);

        await loadData();
        closeTaskSheet();
        render();
      });
    }

    document.getElementById('headerAddTask')?.addEventListener('click', openQuickAddSheet);

    // ══════════════════════════════════════════
    // Real-time listener
    // ══════════════════════════════════════════

    onValue('completions', (val) => {
      completions = val || {};
      render();
    });

    // ══════════════════════════════════════════
    // Initial load
    // ══════════════════════════════════════════

    await loadData();
    render();
  </script>
</body>
</html>
