    function openCalEfImportConfirm(eventsArr, hadRecurring, onCancel) {
      const recurringBanner = hadRecurring
        ? `<div class="banner banner--info" role="status">Recurring events were skipped — only one-time events are supported.</div>`
        : '';
      const rows = eventsArr.map((ev, i) => {
        const timeSub = ev.time ? ev.time : (ev.allDay ? 'All day' : null);
        const row = renderConfirmRow({ ...ev, _sub: timeSub }, { labelKey: 'name', subKey: '_sub', confidenceKey: 'confidence', key: i });
        const dateLabel = ev.dateConfidence === 'low'
          ? `<label class="ef2-date-label ef2-date-label--warn">Date (uncertain — please verify)</label>`
          : `<label class="ef2-date-label">Date</label>`;
        const dateWrap = `<div class="ev-date-wrap" data-idx="${i}" style="padding:0 var(--spacing-md) var(--spacing-xs)">${dateLabel}<input type="date" class="field__input ev-date" data-idx="${i}" value="${ev.date || ''}"></div>`;
        return row + dateWrap;
      }).join('');
      const n = eventsArr.length;
      taskSheetMount.innerHTML = renderBottomSheet(`
        <div class="sheet__header"><h2 class="sheet__title">Import events</h2></div>
        <div class="sheet__content">${recurringBanner}<div class="confirm-list" id="efIevList">${rows}</div></div>
        <div class="sheet__footer">
          <button class="btn btn--ghost" id="efIevCancel">Cancel</button>
          <button class="btn btn--primary" id="efIevImport">Import ${n} event${n !== 1 ? 's' : ''}</button>
        </div>`);
      requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));
      const list = taskSheetMount.querySelector('#efIevList');
      const importBtn = taskSheetMount.querySelector('#efIevImport');
      const updateBtn = () => {
        const count = list.querySelectorAll('.confirm-row:not(.is-deselected)').length;
        importBtn.textContent = `Import ${count} event${count !== 1 ? 's' : ''}`;
        importBtn.disabled = count === 0;
      };
      list.addEventListener('click', (e) => {
        if (e.target.closest('.ev-date-wrap')) return;
        const row = e.target.closest('.confirm-row');
        if (!row) return;
        const idx = row.dataset.key;
        row.classList.toggle('is-deselected');
        const dateWrap = list.querySelector(`.ev-date-wrap[data-idx="${idx}"]`);
        if (dateWrap) dateWrap.style.display = row.classList.contains('is-deselected') ? 'none' : '';
        updateBtn();
      });
      taskSheetMount.querySelector('#efIevCancel')?.addEventListener('click', () => {
        closeTaskSheet();
        if (onCancel) setTimeout(onCancel, 320);
      });
      importBtn.addEventListener('click', async () => {
        const selected = [...list.querySelectorAll('.confirm-row:not(.is-deselected)')].map(row => {
          const ev = eventsArr[+row.dataset.key];
          const dateEl = list.querySelector(`.ev-date[data-idx="${row.dataset.key}"]`);
          const date = dateEl?.value || ev.date || null;
          return date ? { ...ev, date } : null;
        }).filter(Boolean);
        if (!selected.length) { closeTaskSheet(); return; }
        importBtn.disabled = true; importBtn.textContent = 'Adding…';
        try {
          let counter = 0;
          for (const ev of selected) {
            const eventData = { name: ev.name, date: ev.date, allDay: ev.allDay ?? true, startTime: ev.time || null, endTime: null, color: people[0]?.color || '#4285f4', people: [], notes: ev.notes || null, repeat: null };
            const newId = await pushEvent(eventData);
            events[newId] = eventData;
            const schedKey = `sched_${Date.now()}_evt_${counter++}`;
            await multiUpdate({ [`schedule/${ev.date}/${schedKey}`]: { type: 'event', eventId: newId } });
          }
          closeTaskSheet();
          allSchedule = await readAllSchedule() || {};
          render();
        } catch (err) {
          importBtn.disabled = false;
          importBtn.textContent = `Import ${selected.length} event${selected.length !== 1 ? 's' : ''}`;
        }
      });
    }

    function openRepeatSheet(currentRule, onDone, onCancel) {
      taskSheetMount.innerHTML = renderBottomSheet(renderRepeatSheet(currentRule));
      requestAnimationFrame(() => document.getElementById('bottomSheet')?.classList.add('active'));
      const getSelectedType = () => taskSheetMount.querySelector('.ef2-repeat-option.is-selected')?.dataset.type || 'none';
      taskSheetMount.querySelectorAll('.ef2-repeat-option').forEach(opt => {
        opt.addEventListener('click', () => {
          taskSheetMount.querySelectorAll('.ef2-repeat-option').forEach(o => o.classList.remove('is-selected'));
          opt.classList.add('is-selected');
        });
      });
      taskSheetMount.querySelector('#rptBack')?.addEventListener('click', () => {
        closeTaskSheet();
        if (onCancel) setTimeout(onCancel, 320);
      });
      taskSheetMount.querySelector('#rptCancel')?.addEventListener('click', () => {
        closeTaskSheet();
        if (onCancel) setTimeout(onCancel, 320);
      });
      taskSheetMount.querySelector('#rptDone')?.addEventListener('click', () => {
        const type = getSelectedType();
        const rule = type === 'none' ? null : { type };
        closeTaskSheet();
        if (onDone) setTimeout(() => onDone(rule), 320);
      });
    }

    // ══════════════════════════════════════════
    // Meal Detail Sheet (calendar day view)
    // ══════════════════════════════════════════

    function openCalMealDetailSheet(planEntry, slot) {
      const meal = planEntry?.recipeId ? recipes[planEntry.recipeId] : null;
      const html = renderMealDetailSheet(meal, planEntry, true); // readonly=true
      taskSheetMount.innerHTML = renderBottomSheet(html);
      requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });
      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', e => { if (e.target === overlay) taskSheetMount.innerHTML = ''; });
    }

    function openCalMealPlanSheet(preSlot = 'dinner') {
      const date = viewDay;
      const currentMealId = allMeals[date]?.[preSlot]?.recipeId || null;
      taskSheetMount.innerHTML = renderBottomSheet(
        renderMealPlanSheet({ date, slot: preSlot, library: recipes, currentMealId })
      );
      requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

      const overlay = document.getElementById('bottomSheet');
      const searchInput = document.getElementById('mp_search');
      const resultsDiv = document.getElementById('mp_results');
      const inlineEditor = document.getElementById('mp_inlineEditor');
      let selectedSlot = preSlot;
      let selectedMealId = currentMealId;

      overlay?.addEventListener('click', e => { if (e.target === overlay) taskSheetMount.innerHTML = ''; });

      document.getElementById('mp_slotTabs')?.addEventListener('click', e => {
        const btn = e.target.closest('.mp-slot-tab');
        if (!btn) return;
        selectedSlot = btn.dataset.slot;
        selectedMealId = allMeals[date]?.[selectedSlot]?.recipeId || null;
        document.getElementById('mp_selectedMealId').value = selectedMealId || '';
        document.querySelectorAll('.mp-slot-tab').forEach(b => {
          b.classList.toggle('is-active', b.dataset.slot === selectedSlot);
          b.setAttribute('aria-selected', b.dataset.slot === selectedSlot);
        });
        const removeLink = document.getElementById('mp_removeLink');
        if (removeLink) {
          const cur = allMeals[date]?.[selectedSlot];
          const curRecipe = cur?.recipeId ? recipes[cur.recipeId] : null;
          const curName = curRecipe?.name || cur?.customName || null;
          removeLink.style.display = curName ? '' : 'none';
          if (curName) removeLink.textContent = `Remove "${curName}" from this slot`;
        }
        filterOptions('');
        searchInput.value = '';
      });

      const checkSvg = `<svg class="meal-option__check" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`;

      function filterOptions(query) {
        const q = query.toLowerCase().trim();
        const entries = Object.entries(recipes).sort(([, a], [, b]) => {
          if (a.isFavorite && !b.isFavorite) return -1;
          if (!a.isFavorite && b.isFavorite) return 1;
          return (b.lastUsed || 0) - (a.lastUsed || 0);
        });
        const filtered = q ? entries.filter(([, m]) => m.name.toLowerCase().includes(q)) : entries;
        resultsDiv.innerHTML = filtered.map(([id, m]) =>
          `<button class="meal-option${id === selectedMealId ? ' is-selected' : ''}"
                   data-meal-id="${escapeHtml(id)}" type="button">
            <span class="meal-option__name">${escapeHtml(String(m.name))}</span>
            ${checkSvg}
          </button>`
        ).join('');
        bindOptionClicks();
      }

      function bindOptionClicks() {
        resultsDiv.querySelectorAll('.meal-option').forEach(btn => {
          btn.addEventListener('click', () => {
            selectedMealId = btn.dataset.mealId;
            document.getElementById('mp_selectedMealId').value = selectedMealId;
            resultsDiv.querySelectorAll('.meal-option').forEach(b =>
              b.classList.toggle('is-selected', b.dataset.mealId === selectedMealId)
            );
          });
        });
      }

      searchInput?.addEventListener('input', () => filterOptions(searchInput.value));
      filterOptions('');

      const searchRow = document.querySelector('.mp-search-row');

      document.getElementById('mp_createNew')?.addEventListener('click', () => {
        inlineEditor.hidden = false;
        if (searchRow) searchRow.style.display = 'none';
        resultsDiv.style.display = 'none';
        document.getElementById('mp_inlineName')?.focus();
      });
      document.getElementById('mp_inlineBack')?.addEventListener('click', () => {
        inlineEditor.hidden = true;
        if (searchRow) searchRow.style.display = '';
        resultsDiv.style.display = '';
      });

      document.getElementById('mp_removeLink')?.addEventListener('click', async () => {
        await removeKitchenPlanSlot(date, selectedSlot);
        allMeals = (await readAllKitchenPlan()) || {};
        taskSheetMount.innerHTML = '';
        render();
      });

      document.getElementById('mpForm')?.addEventListener('submit', async e => {
        e.preventDefault();
        const planDate = document.getElementById('mp_date').value;
        if (!planDate) return;
        if (!inlineEditor.hidden) {
          const inlineName = document.getElementById('mp_inlineName').value.trim();
          if (!inlineName) {
            document.getElementById('mp_inlineNameError').textContent = 'Name is required';
            return;
          }
          const inlineUrl = document.getElementById('mp_inlineUrl').value.trim() || null;
          const inlinePrepTime = document.getElementById('mp_inlinePrepTime')?.value.trim() || null;
          const inlineNotes = document.getElementById('mp_inlineNotes')?.value.trim() || null;
          const newId = await pushKitchenRecipe({
            name: inlineName, url: inlineUrl, prepTime: inlinePrepTime, notes: inlineNotes,
            ingredients: [], tags: [], isFavorite: false,
            createdAt: firebase.database.ServerValue.TIMESTAMP,
            lastUsed: firebase.database.ServerValue.TIMESTAMP,
          });
          recipes[newId] = { name: inlineName, url: inlineUrl, prepTime: inlinePrepTime, notes: inlineNotes, ingredients: [], tags: [], isFavorite: false };
          await writeKitchenPlanSlot(planDate, selectedSlot, { recipeId: newId, source: 'manual' });
        } else {
          if (!selectedMealId) return;
          await writeKitchenPlanSlot(planDate, selectedSlot, { recipeId: selectedMealId, source: 'manual' });
          const entry = recipes[selectedMealId];
          if (entry) {
            entry.lastUsed = Date.now();
            await writeKitchenRecipe(selectedMealId, { ...entry, lastUsed: firebase.database.ServerValue.TIMESTAMP });
          }
        }
        allMeals = (await readAllKitchenPlan()) || {};
        recipes = (await readKitchenRecipes()) || {};
        taskSheetMount.innerHTML = '';
        render();
      });
    }

    // ══════════════════════════════════════════
    // Event Detail Sheet
    // ══════════════════════════════════════════

    function openEventDetailSheet(eventId) {
      const event = events[eventId];
      if (!event) return;
      const html = renderEventDetailSheet(eventId, event, people);
      taskSheetMount.innerHTML = renderBottomSheet(html);
      applyDataColors(taskSheetMount);

      requestAnimationFrame(() => {
        document.getElementById('bottomSheet')?.classList.add('active');
      });

      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => {
        if (e.target === overlay) closeTaskSheet();
      });

      document.getElementById('eventEdit')?.addEventListener('click', () => {
        closeTaskSheet();
        setTimeout(() => openEventForm(eventId), 320);
      });

      document.getElementById('eventDelete')?.addEventListener('click', async () => {
        if (!await showConfirm({ title: 'Delete this event?', danger: true })) return;
        await removeEvent(eventId);
        delete events[eventId];
        const updates = {};
        for (const [dk, dayEntries] of Object.entries(allSchedule)) {
          for (const [ek, entry] of Object.entries(dayEntries || {})) {
            if (entry.type === 'event' && entry.eventId === eventId) {
              updates[`schedule/${dk}/${ek}`] = null;
            }
          }
        }
        if (Object.keys(updates).length > 0) await multiUpdate(updates);
        closeTaskSheet();
        await loadData();
        render();
      });
    }

    // ══════════════════════════════════════════
    // Task detail bottom sheet (long-press) — carried from v1
    // ══════════════════════════════════════════

    function closeTaskSheet() {
      const override = pendingSliderOverride;
      pendingSliderOverride = null;
      // Note: no onClosed re-render here — calendar's prior version intentionally
      // omitted it (calendar relies on its Firebase listeners to refresh).
      return closeTaskSheetShared({
        mount: taskSheetMount,
        pendingOverride: override,
        completions,
        multiUpdate,
        writeCompletion,
        applyToScheduleEntry: (ek, dk, ov) => {
          const dayEntries = allSchedule[dk] || {};
          if (dayEntries[ek]) dayEntries[ek].pointsOverride = ov;
        },
      });
    }

    function openTaskSheet(entryKey, dateKey) {
      const dayEntries = allSchedule[dateKey] || {};
      const entry = dayEntries[entryKey];
      if (!entry) return;

      const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
      const person = people.find(p => p.id === entry.ownerId);
      const cat = task.category ? cats[task.category] : null;
      const completed = isComplete(entryKey, completions);
      const pts = basePoints(task, settings?.difficultyMultipliers);
      const completion = completions[entryKey];
      const currentOverride = completion?.pointsOverride ?? entry.pointsOverride ?? null;

      const filtered = filterByPerson(dayEntries, activePerson);
      const score = dailyScore(filtered, completions, tasks, cats, settings, dateKey, today);
      const gd = gradeDisplay(score.percentage);
      const gradePreview = score.possible > 0 ? `${gd.grade} (${score.percentage}%)` : null;

      const sheetContent = renderTaskDetailSheet({
        entryKey,
        entry: { ...entry, dateKey },
        task,
        person,
        category: cat,
        completed,
        points: { possible: pts },
        sliderMin: settings?.sliderMin ?? 0,
        sliderMax: settings?.sliderMax ?? 150,
        currentOverride: currentOverride != null ? currentOverride : 100,
        gradePreview,
        people,
        showDelegate: true,
        showMove: true,
        showEdit: true,
        isEvent: !!cat?.isEvent,
        isPastDate: dateKey < today
      });

      taskSheetMount.innerHTML = renderBottomSheet(sheetContent);
      applyDataColors(taskSheetMount);
      requestAnimationFrame(() => {
        document.getElementById('bottomSheet')?.classList.add('active');
      });
      bindTaskSheetEvents(entryKey, dateKey);
    }

    function bindTaskSheetEvents(entryKey, dateKey) {
      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => {
        if (e.target === overlay) closeTaskSheet();
      });
      document.getElementById('dsClose')?.addEventListener('click', closeTaskSheet);

      document.getElementById('sheetToggleComplete')?.addEventListener('click', async () => {
        await closeTaskSheet();
        await toggleTask(entryKey, dateKey);
      });

      // Complete without penalty (full credit for late task)
      document.getElementById('sheetCompleteNoPenalty')?.addEventListener('click', async () => {
        await closeTaskSheet();
        await toggleTask(entryKey, dateKey, { noPenalty: true });
      });

      // Notes inline editing
      const notesAddBtn = document.getElementById('notesAddBtn');
      const notesEditBtn = document.getElementById('notesEditBtn');
      const notesCancelBtn = document.getElementById('notesCancelBtn');
      const notesSaveBtn = document.getElementById('notesSaveBtn');
      const notesEditor = document.getElementById('notesEditor');
      const notesDisplay = document.getElementById('notesDisplay');
      const notesInput = document.getElementById('notesInput');

      function openNotesEditor() {
        notesEditor?.classList.remove('is-hidden');
        notesDisplay?.classList.add('is-hidden');
        notesAddBtn?.classList.add('is-hidden');
        if (notesInput) notesInput.focus();
      }
      function closeNotesEditor() {
        notesEditor?.classList.add('is-hidden');
        const originalText = document.getElementById('notesText')?.textContent?.trim() || '';
        if (notesInput) notesInput.value = originalText;
        notesDisplay?.classList.toggle('is-hidden', !originalText);
        notesAddBtn?.classList.toggle('is-hidden', !!originalText);
      }
      notesAddBtn?.addEventListener('click', openNotesEditor);
      notesEditBtn?.addEventListener('click', openNotesEditor);
      notesCancelBtn?.addEventListener('click', closeNotesEditor);
      notesSaveBtn?.addEventListener('click', async () => {
        const noteValue = notesInput?.value.trim() || null;
        const ek = notesSaveBtn.dataset.entryKey;
        const dk = notesSaveBtn.dataset.dateKey;
        if (ek && dk) {
          await multiUpdate({ [`schedule/${dk}/${ek}/notes`]: noteValue });
          if (allSchedule[dk]?.[ek]) allSchedule[dk][ek].notes = noteValue;
        }
        const notesText = document.getElementById('notesText');
        if (notesText) notesText.textContent = noteValue || '';
        closeNotesEditor();
      });

      // Points slider
      const slider = document.getElementById('pointsSlider');
      if (slider) {
        const dayEntries = allSchedule[dateKey] || {};
        slider.addEventListener('input', () => {
          const val = parseInt(slider.value, 10);
          const basePts = parseInt(slider.dataset.basePts, 10);
          const earnedPts = Math.round(basePts * (val / 100));
          const label = document.getElementById('sliderValueLabel');
          if (label) label.textContent = `${val}% (${earnedPts}pt)`;
          pendingSliderOverride = { entryKey, dateKey, value: val };

          const filtered = filterByPerson(dayEntries, activePerson);
          const hadRecord = !!completions[entryKey];
          const origRecord = completions[entryKey];
          completions[entryKey] = {
            ...(origRecord || { completedAt: Date.now(), completedBy: 'preview' }),
            pointsOverride: val === 100 ? null : val
          };
          const previewScore = dailyScore(filtered, completions, tasks, cats, settings, dateKey, today);
          const previewGd = gradeDisplay(previewScore.percentage);
          const previewEl = document.getElementById('gradePreview');
          if (previewEl) previewEl.textContent = `Grade: ${previewGd.grade} (${previewScore.percentage}%)`;
          if (hadRecord) completions[entryKey] = origRecord;
          else delete completions[entryKey];
        });

        const resetBtn = document.getElementById('sliderReset');
        if (resetBtn) {
          resetBtn.addEventListener('click', () => {
            slider.value = 100;
            slider.dispatchEvent(new Event('input'));
          });
        }
      }

      // Delegate
      document.getElementById('sheetDelegate')?.addEventListener('click', () => {
        document.getElementById('delegatePanel')?.classList.toggle('is-hidden');
      });
      document.getElementById('delegateMoveToggle')?.addEventListener('click', e => {
        e.currentTarget.classList.toggle('is-active');
      });

      let pendingDelegateOwnerId = null;
      document.querySelectorAll('#delegatePanel .ef2-person-chip').forEach(chip => {
        chip.addEventListener('click', async () => {
          const newOwnerId = chip.dataset.personId;
          if (!newOwnerId) return;

          const moveToggle = document.getElementById('delegateMoveToggle');
          if (moveToggle?.classList.contains('is-active')) {
            pendingDelegateOwnerId = newOwnerId;
            document.querySelectorAll('#delegatePanel .ef2-person-chip').forEach(c => c.removeAttribute('data-state'));
            chip.setAttribute('data-state', 'primary');
            const picker = document.getElementById('delegateMoveDatePicker');
            if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
            return;
          }

          const dayEntries = allSchedule[dateKey] || {};
          const entry = dayEntries[entryKey];
          if (!entry) return;
          const originalPerson = people.find(p => p.id === entry.ownerId);
          const newEntry = { ...entry, ownerId: newOwnerId, delegatedFromName: originalPerson?.name || '?' };
          const updates = {};
          updates[`schedule/${dateKey}/${entryKey}`] = null;
          const newKey = `sched_${Date.now()}_delegate`;
          updates[`schedule/${dateKey}/${newKey}`] = newEntry;
          if (completions[entryKey]) {
            updates[`completions/${entryKey}`] = null;
            updates[`completions/${newKey}`] = completions[entryKey];
          }
          await multiUpdate(updates);
          closeTaskSheet();
          await loadData(); render();
        });
      });

      document.getElementById('delegateMoveDatePicker')?.addEventListener('change', async (e) => {
        const newDate = e.target.value;
        if (!newDate || !pendingDelegateOwnerId) return;
        const dayEntries = allSchedule[dateKey] || {};
        const entry = dayEntries[entryKey];
        if (!entry) return;
        const originalPerson = people.find(p => p.id === entry.ownerId);
        const newEntry = { ...entry, ownerId: pendingDelegateOwnerId, delegatedFromName: originalPerson?.name || '?', movedFromDate: dateKey };
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        const newKey = `sched_${Date.now()}_delegate_moved`;
        updates[`schedule/${newDate}/${newKey}`] = newEntry;
        if (completions[entryKey]) {
          updates[`completions/${entryKey}`] = null;
          updates[`completions/${newKey}`] = completions[entryKey];
        }
        await multiUpdate(updates);
        pendingDelegateOwnerId = null;
        closeTaskSheet();
        await loadData(); render();
      });

      // Move
      document.getElementById('sheetMove')?.addEventListener('click', () => {
        const picker = document.getElementById('moveDatePicker');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      document.getElementById('moveDatePicker')?.addEventListener('change', async (e) => {
        const newDate = e.target.value;
        if (!newDate) return;
        const dayEntries = allSchedule[dateKey] || {};
        const entry = dayEntries[entryKey];
        if (!entry) return;
        const newEntry = { ...entry, movedFromDate: dateKey };
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        const newKey = `sched_${Date.now()}_moved`;
        updates[`schedule/${newDate}/${newKey}`] = newEntry;
        if (completions[entryKey]) {
          updates[`completions/${entryKey}`] = null;
          updates[`completions/${newKey}`] = completions[entryKey];
        }
        await multiUpdate(updates);
        closeTaskSheet();
        await loadData(); render();
      });

      document.getElementById('moveSkip')?.addEventListener('click', async () => {
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        if (completions[entryKey]) updates[`completions/${entryKey}`] = null;
        await multiUpdate(updates);
        closeTaskSheet();
        await loadData(); render();
      });

      // Edit task
      document.getElementById('sheetEdit')?.addEventListener('click', () => {
        const taskId = document.getElementById('sheetEdit').dataset.taskId;
        const overlay = document.getElementById('bottomSheet');
        if (overlay) overlay.classList.remove('active');
        setTimeout(() => { openTaskForm(taskId); }, 320);
      });
    }

    // ── Task form (create + edit) ──

    function openTaskForm(taskId = null) {
      const task = taskId ? tasks[taskId] : {};
      const mode = taskId ? 'edit' : 'create';
      const catsArr = Object.entries(cats).map(([key, c]) => ({ key, ...c }));

      const html = renderTaskForm({ task, taskId, mode, categories: catsArr, people });
      taskSheetMount.innerHTML = renderBottomSheet(html);
      applyDataColors(taskSheetMount);

      taskSheetMount.querySelectorAll('.ef2-person-chip[data-person-color]').forEach(chip => {
        chip.style.setProperty('--chip-color', chip.dataset.personColor);
      });

      requestAnimationFrame(() => {
        document.getElementById('bottomSheet')?.classList.add('active');
        if (mode === 'create') document.getElementById('tf_name')?.focus();
      });

      function calHidePicker() { document.getElementById('tf_pickerOverlay')?.remove(); }

      const doClose = () => { calHidePicker(); closeTaskSheet(); };
      document.getElementById('tf_close')?.addEventListener('click', doClose);
      document.getElementById('bottomSheet')?.addEventListener('click', e => {
        if (e.target === document.getElementById('bottomSheet')) doClose();
      });

      // Person chips
      const pw = document.getElementById('tf_people');
      function calGetOwnerIds() {
        return [...(pw?.querySelectorAll('.ef2-person-chip') || [])]
          .filter(c => c.dataset.state === 'primary').map(c => c.dataset.personId);
      }
      function calUpdateAssignRow() {
        document.getElementById('tf_assignRow')?.classList.toggle('is-hidden', calGetOwnerIds().length < 2);
      }
      pw?.querySelectorAll('.ef2-person-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          if (chip.dataset.state === 'primary') chip.removeAttribute('data-state');
          else chip.setAttribute('data-state', 'primary');
          calUpdateAssignRow();
        });
      });
      document.getElementById('tf_assignRow')?.querySelectorAll('.tf-assign-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('tf_assignRow')?.querySelectorAll('.tf-assign-pill').forEach(b => b.classList.remove('tf-assign-pill--active'));
          btn.classList.add('tf-assign-pill--active');
        });
      });

      // Rotation pills
      let calRot = task.rotation || 'daily';
      function calUpdateRot(rot) {
        calRot = rot;
        document.getElementById('tf_rotation')?.querySelectorAll('.tf-rot-pill').forEach(p => p.classList.toggle('tf-rot-pill--active', p.dataset.rot === rot));
        document.getElementById('tf_weeklyReveal')?.classList.toggle('is-open', rot !== 'once');
        document.getElementById('tf_onceReveal')?.classList.toggle('is-open', rot === 'once');
        const showCd = rot === 'weekly' || rot === 'monthly';
        const chip = document.getElementById('tf_optionsChip');
        if (chip) chip.dataset.showCd = showCd ? '1' : '';
        document.getElementById('tf_cooldownRow')?.classList.toggle('is-hidden', !showCd);
        const cdInput = document.getElementById('tf_cooldown');
        if (cdInput && !cdInput.value) cdInput.placeholder = rot === 'weekly' ? '3' : rot === 'monthly' ? '7' : '';
      }
      document.getElementById('tf_rotation')?.querySelectorAll('.tf-rot-pill').forEach(p => p.addEventListener('click', () => calUpdateRot(p.dataset.rot)));

      // Detail chip pickers
      let calDiff = task.difficulty || 'medium';
      let calDur  = task.estMin ?? 10;
      let calTod  = task.timeOfDay || 'anytime';
      let calCat  = task.category || catsArr.find(c => c.isDefault)?.key || '';

      function calShowPicker(field, chipEl) {
        calHidePicker();
        const PRESETS = [5, 10, 15, 20, 30, 45, 60];
        let inner = '';
        if (field === 'diff') {
          inner = `<div class="tf-picker-cells">${[['easy','Easy'],['medium','Medium'],['hard','Hard']].map(([v,l]) => `<button class="tf-picker-cell${calDiff===v?' tf-picker-cell--active':''}" data-pick-val="${v}" data-pick-label="${l}" type="button">${l}</button>`).join('')}</div>`;
        } else if (field === 'dur') {
          inner = `<div class="tf-dur-grid">${PRESETS.map(v => `<button class="tf-dur-cell${calDur===v?' tf-dur-cell--active':''}" data-pick-val="${v}" data-pick-label="${v} min" type="button">${v}</button>`).join('')}<button class="tf-dur-cell" data-pick-val="custom" type="button">...</button></div><div class="tf-dur-custom-wrap is-hidden" id="tf_durCustomWrap"><input type="number" id="tf_durCustom" min="1" max="300" placeholder="Minutes" value="${!PRESETS.includes(calDur)?calDur:''}"></div>`;
        } else if (field === 'tod') {
          inner = `<div class="tf-picker-cells">${[['am','Morning'],['anytime','Anytime'],['pm','Afternoon'],['both','Both']].map(([v,l]) => `<button class="tf-picker-cell${calTod===v?' tf-picker-cell--active':''}" data-pick-val="${v}" data-pick-label="${l}" type="button">${l}</button>`).join('')}</div>`;
        } else if (field === 'cat') {
          inner = `<div class="tf-cat-list">${catsArr.map(c => `<button class="tf-cat-item${calCat===c.key?' tf-cat-item--active':''}" data-pick-val="${escapeHtml(c.key)}" data-pick-label="${escapeHtml((c.icon||'')+' '+c.label)}" type="button"><span class="tf-cat-icon">${c.icon||''}</span><span class="tf-cat-label">${escapeHtml(c.label)}</span></button>`).join('')}</div>`;
        }
        const ov = document.createElement('div');
        ov.className = 'tf-picker-overlay'; ov.id = 'tf_pickerOverlay';
        ov.innerHTML = `<div class="tf-picker-backdrop"></div><div class="tf-picker">${inner}</div>`;
        document.body.appendChild(ov);
        const rect = chipEl.getBoundingClientRect();
        const pic = ov.querySelector('.tf-picker');
        const W = Math.min(280, window.innerWidth - 32);
        pic.style.width = `${W}px`;
        pic.style.left = `${Math.max(16, Math.min(rect.left, window.innerWidth - W - 16))}px`;
        window.innerHeight - rect.bottom > 200 ? (pic.style.top = `${rect.bottom+8}px`) : (pic.style.bottom = `${window.innerHeight-rect.top+8}px`);
        ov.querySelector('.tf-picker-backdrop').addEventListener('click', calHidePicker);
        ov.querySelector('[data-pick-val="custom"]')?.addEventListener('click', () => {
          ov.querySelector('#tf_durCustomWrap')?.classList.remove('is-hidden');
          ov.querySelector('#tf_durCustom')?.focus();
        });
        const ci = ov.querySelector('#tf_durCustom');
        if (ci) {
          const cc = () => { const v = parseInt(ci.value, 10); if (v > 0) calOnPick('dur', v, `${v} min`); };
          ci.addEventListener('keydown', e => { if (e.key === 'Enter') cc(); });
          ci.addEventListener('blur', cc);
        }
        ov.querySelectorAll('[data-pick-val]:not([data-pick-val="custom"])').forEach(b => b.addEventListener('click', () => calOnPick(field, b.dataset.pickVal, b.dataset.pickLabel || b.textContent.trim())));
      }
      function calOnPick(field, val, label) {
        if (field==='diff') { calDiff=val; document.getElementById('tf_diffChip').textContent=label; }
        else if (field==='dur') { calDur=typeof val==='number'?val:parseInt(val,10); document.getElementById('tf_durChip').textContent=label||`${calDur} min`; }
        else if (field==='tod') { calTod=val; document.getElementById('tf_todChip').textContent=label; }
        else if (field==='cat') { calCat=val; document.getElementById('tf_catChip').textContent=label; }
        calHidePicker();
      }
      document.getElementById('tf_diffChip')?.addEventListener('click', e => calShowPicker('diff', e.currentTarget));
      document.getElementById('tf_durChip')?.addEventListener('click',  e => calShowPicker('dur',  e.currentTarget));
      document.getElementById('tf_todChip')?.addEventListener('click',  e => calShowPicker('tod',  e.currentTarget));
      document.getElementById('tf_catChip')?.addEventListener('click',  e => calShowPicker('cat',  e.currentTarget));

      // Notes / options / exempt
      document.getElementById('tf_notesChip')?.addEventListener('click', () => {
        const r = document.getElementById('tf_notesReveal'), c = document.getElementById('tf_notesChip');
        const open = r?.classList.toggle('is-open');
        c?.classList.toggle('is-active', open);
        if (open) document.getElementById('tf_notes')?.focus();
      });
      document.getElementById('tf_notesClose')?.addEventListener('click', () => {
        document.getElementById('tf_notesReveal')?.classList.remove('is-open');
        document.getElementById('tf_notesChip')?.classList.remove('is-active');
      });
      document.getElementById('tf_optionsChip')?.addEventListener('click', () => {
        document.getElementById('tf_optionsReveal')?.classList.toggle('is-open');
        document.getElementById('tf_optionsChip')?.classList.toggle('is-active');
      });
      document.getElementById('tf_exempt')?.addEventListener('click', e => {
        const on = e.currentTarget.classList.toggle('is-active');
        e.currentTarget.textContent = on ? 'On' : 'Off';
      });

      // Save
      document.getElementById('tf_save')?.addEventListener('click', async () => {
        const name = document.getElementById('tf_name')?.value.trim();
        if (!name) {
          const inp = document.getElementById('tf_name');
          inp?.classList.add('is-invalid');
          inp?.focus();
          setTimeout(() => inp?.classList.remove('is-invalid'), 600);
          return;
        }
        const ownerIds = calGetOwnerIds();
        const ap = document.getElementById('tf_assignRow')?.querySelector('.tf-assign-pill--active')?.dataset.mode;
        const ownerAssignmentMode = ownerIds.length <= 1 ? 'fixed' : (ap === 'everyone' ? 'duplicate' : 'rotate');
        const rotation = calRot;
        const dayVal = document.getElementById('tf_daySelect')?.value;
        const dedicatedDay = rotation === 'weekly' ? (dayVal !== '' && dayVal != null ? parseInt(dayVal, 10) : null) : null;
        const dedicatedDate = rotation === 'once' ? (document.getElementById('tf_onceDate')?.value || null) : null;
        const showCd = rotation === 'weekly' || rotation === 'monthly';
        const cdVal = document.getElementById('tf_cooldown')?.value;
        const cdDef = rotation === 'weekly' ? 3 : rotation === 'monthly' ? 7 : 0;
        const cooldownDays = showCd ? (cdVal !== '' ? (parseInt(cdVal, 10) || cdDef) : cdDef) : null;
        const exempt = document.getElementById('tf_exempt')?.classList.contains('is-active') || false;
        const notes = document.getElementById('tf_notes')?.value.trim() || null;
        const updated = {
          ...(taskId ? tasks[taskId] : {}),
          name, rotation, difficulty: calDiff, estMin: calDur, timeOfDay: calTod, category: calCat,
          owners: ownerIds, ownerAssignmentMode, dedicatedDay, dedicatedDate,
          cooldownDays: cooldownDays || null, exempt, notes: notes || null,
          bounty: taskId ? (tasks[taskId]?.bounty ?? null) : null,
          eventTime: null, status: 'active',
        };
        if (!taskId) updated.createdDate = today;
        document.getElementById('tf_save').disabled = true;

        if (taskId) {
          await writeTask(taskId, updated);
          tasks[taskId] = updated;
          const allSched = await readAllSchedule() || {};
          const fu = buildScheduleUpdates(tasks, people, settings, completions, allSched, { includeToday: true }, catsObj);
          await multiUpdate(fu);
        } else {
          const newId = await pushTask(updated);
          tasks[newId] = updated;
          const skipToday = (rotation === 'once' && dedicatedDate && dedicatedDate !== today)
            || ((rotation === 'weekly' || rotation === 'monthly') && dedicatedDay != null && dayOfWeek(today) !== dedicatedDay);
          if (ownerIds.length > 0 && !skipToday) {
            const sd = dedicatedDate || today;
            const su = {};
            const be = { taskId: newId, rotationType: rotation, ownerAssignmentMode, timeOfDay: calTod };
            let qc = 0;
            const qk = () => `sched_${Date.now()}_qa_${String(qc++).padStart(3, '0')}`;
            if (ownerAssignmentMode === 'duplicate') {
              for (const oid of ownerIds) {
                if (calTod === 'both') {
                  su[`schedule/${sd}/${qk()}`] = { ...be, ownerId: oid, timeOfDay: 'am' };
                  su[`schedule/${sd}/${qk()}`] = { ...be, ownerId: oid, timeOfDay: 'pm' };
                } else {
                  su[`schedule/${sd}/${qk()}`] = { ...be, ownerId: oid };
                }
              }
            } else {
              const oid = ownerAssignmentMode === 'fixed' ? ownerIds[0] : getRotationOwner(updated, today, newId);
              if (calTod === 'both') {
                su[`schedule/${sd}/${qk()}`] = { ...be, ownerId: oid, timeOfDay: 'am' };
                su[`schedule/${sd}/${qk()}`] = { ...be, ownerId: oid, timeOfDay: 'pm' };
              } else {
                su[`schedule/${sd}/${qk()}`] = { ...be, ownerId: oid };
              }
            }
            await multiUpdate(su);
          }
          const as = await readAllSchedule() || {};
          await multiUpdate(buildScheduleUpdates(tasks, people, settings, completions, as, undefined, catsObj));
        }
        calHidePicker();
        await loadData();
        closeTaskSheet();
        render();
      });

      // Delete (edit only)
      document.getElementById('tf_delete')?.addEventListener('click', async () => {
        if (!taskId) return;
        const name = tasks[taskId]?.name || 'this task';
        if (!await showConfirm({ title: `Delete "${name}"?`, danger: true })) return;
        const updates = { [`tasks/${taskId}`]: null };
        const allSched = await readAllSchedule() || {};
        for (const [dk, de] of Object.entries(allSched)) {
          for (const [ek, en] of Object.entries(de || {})) {
            if (en.taskId === taskId) {
              updates[`schedule/${dk}/${ek}`] = null;
              updates[`completions/${ek}`] = null;
            }
          }
        }
        await multiUpdate(updates);
        delete tasks[taskId];
        calHidePicker();
        closeTaskSheet();
        await loadData();
        render();
      });
    }

    // ══════════════════════════════════════════
    // Swipe navigation (week/month)
    // ══════════════════════════════════════════

    let swipeStartX = 0, swipeStartY = 0;
    main.addEventListener('touchstart', (e) => {
      if (currentView === 'day') return;
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
    }, { passive: true });
    main.addEventListener('touchend', (e) => {
      if (currentView === 'day') return;
      const dx = e.changedTouches[0].clientX - swipeStartX;
      const dy = e.changedTouches[0].clientY - swipeStartY;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        const delta = dx < 0 ? 1 : -1;
        if (currentView === 'week') {
          viewWeekStart = addDays(viewWeekStart, delta * 7);
        } else {
          const d = new Date(Date.UTC(yearNumber(viewMonth + '-01'), monthNumber(viewMonth + '-01') - 1 + delta, 1));
          viewMonth = `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
        }
        render();
      }
    }, { passive: true });

    // ══════════════════════════════════════════
    // Real-time listeners
    // ══════════════════════════════════════════

    // Listener echoes are not user-initiated navigation — render silently, no fade.
    const debouncedRender = debounce(() => render({ preserveScroll: true, animate: false }), 100);

    onCompletions((val) => {
      completions = val || {};
      suppressedCooldownTaskIds = getOverdueCooldownTaskIds(allSchedule, completions, tasks, today);
      debouncedRender();
    });

    onEvents((val) => {
      events = val || {};
      debouncedRender();
    });

    // ══════════════════════════════════════════
    // Migration: isEvent categories → events/ node
    // ══════════════════════════════════════════

    async function migrateEventCategories() {
      const migrated = localStorage.getItem('dr-events-migrated');
      if (migrated) return;

      const eventCatKeys = Object.entries(cats)
        .filter(([, c]) => c.isEvent)
        .map(([key]) => key);

      if (eventCatKeys.length === 0) {
        localStorage.setItem('dr-events-migrated', 'true');
        return;
      }

      const updates = {};
      let counter = 0;

      for (const [taskId, task] of Object.entries(tasks)) {
        if (!eventCatKeys.includes(task.category)) continue;

        const cat = cats[task.category];
        const eventData = {
          name: task.name,
          date: task.dedicatedDate || today,
          allDay: !task.eventTime,
          startTime: task.eventTime || null,
          endTime: null,
          color: cat?.eventColor || '#4285f4',
          people: task.owners || [],
          location: null,
          notes: task.notes || null,
          url: null,
          recurrence: null,
          reminders: null,
          createdDate: task.createdDate || today
        };

        // Generate a push key via multiUpdate path — avoids direct firebase.database() call
        const eventId = `evt_${Date.now()}_${counter}`;
        updates[`events/${eventId}`] = eventData;

        for (const [dateKey, dayEntries] of Object.entries(allSchedule)) {
          for (const [entryKey, entry] of Object.entries(dayEntries || {})) {
            if (entry.taskId === taskId) {
              updates[`schedule/${dateKey}/${entryKey}`] = { type: 'event', eventId };
            }
          }
        }

        for (const [entryKey] of Object.entries(completions)) {
          const schedEntry = Object.values(allSchedule).flatMap(d => Object.entries(d || {})).find(([k]) => k === entryKey);
          if (schedEntry && schedEntry[1]?.taskId === taskId) {
            updates[`completions/${entryKey}`] = null;
          }
        }

        updates[`tasks/${taskId}`] = null;
        counter++;
      }

      if (counter > 0) {
        await multiUpdate(updates);
        const [newTasks, newEvents, newSched] = await Promise.all([
          readTasks(), readEvents(), readAllSchedule()
        ]);
        Object.keys(tasks).forEach(k => delete tasks[k]);
        Object.assign(tasks, newTasks || {});
        events = newEvents || {};
        allSchedule = newSched || {};
        console.log(`Migrated ${counter} event tasks to events/ node`);
      }

      localStorage.setItem('dr-events-migrated', 'true');
    }

    // ══════════════════════════════════════════
    // Initial load
    // ══════════════════════════════════════════

    await loadData();
    await migrateEventCategories();
    render();
  </script>
  <script src="/shared/dev-banner.js"></script>
</body>
</html>
