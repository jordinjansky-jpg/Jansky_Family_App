<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/App Icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/App Icon.png">
  <title>Family Hub</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="styles/responsive.css">
  <script>
    // TEMP diagnostic overlay — capture errors and stuck-load state visibly on
    // the page so mobile clients can surface problems without a USB console.
    // Safe to remove once the Phase 1+1.5 mobile load bug is understood.
    (function () {
      var box = null;
      function show(label, msg) {
        if (!box) {
          box = document.createElement('pre');
          box.id = '__errOverlay';
          box.style.cssText = 'position:fixed;left:8px;right:8px;top:8px;z-index:99999;background:#b4491c;color:#fff;padding:12px;font:11px/1.3 ui-monospace,Menlo,Consolas,monospace;max-height:70vh;overflow:auto;white-space:pre-wrap;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.4);word-break:break-word;';
          (document.body || document.documentElement).appendChild(box);
        }
        box.textContent += '[' + label + '] ' + msg + '\n\n';
      }
      window.addEventListener('error', function (e) {
        show('error',
          (e.message || e.type) + ' @ ' +
          (e.filename || '?') + ':' + (e.lineno || '?') + ':' + (e.colno || '?') +
          (e.error && e.error.stack ? '\n' + e.error.stack : '')
        );
      }, true);
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        show('unhandled', r && r.stack ? r.stack : String(r));
      });
      setTimeout(function () {
        var loading = document.getElementById('loadingState');
        var main = document.getElementById('mainContent');
        if (loading && !loading.classList.contains('is-hidden')) {
          show('stuck',
            'Still loading after 8s.\n' +
            'mainContent=' + (main ? main.innerHTML.length + ' chars' : 'null') + '\n' +
            'headerMount=' + (document.getElementById('headerMount')?.innerHTML.length || 0) + ' chars\n' +
            'navMount=' + (document.getElementById('navMount')?.innerHTML.length || 0) + ' chars\n' +
            'UA=' + navigator.userAgent + '\n' +
            'online=' + navigator.onLine);
        }
      }, 8000);
    })();
  </script>
</head>
<body>
  <div id="headerMount"></div>
  <main class="app-shell" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" class="is-hidden"></div>
  </main>
  <div id="fabMount"></div>
  <div id="navMount"></div>
  <div id="toastMount"></div>
  <div id="celebrationMount"></div>
  <div id="taskSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <script>sessionStorage.removeItem('dr-person-home');</script>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
