<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daily Rundown</title>
  <link rel="stylesheet" href="styles/common.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>
  <div id="toastMount"></div>
  <div id="celebrationMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script type="module">
    import { initFirebase, isFirstRun, readSettings, readPeople, readTasks, readCategories, readCompletions, readSchedule, readAllSchedule, writeCompletion, removeCompletion, onConnectionChange, onValue } from './shared/firebase.js';
    import { renderNavBar, renderHeader, renderEmptyState, renderConnectionStatus, renderPersonFilter, renderProgressBar, renderTaskCard, renderTimeHeader, renderOverdueBanner, renderCelebration, renderUndoToast } from './shared/components.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig } from './shared/theme.js';
    import { todayKey, formatDateLong, formatDateShort, DAY_NAMES } from './shared/utils.js';
    import { isComplete, filterByPerson, groupByTime, dayProgress, getOverdueEntries, isAllDone, sortEntries } from './shared/state.js';

    // ── Cached theme ──
    const cached = loadCachedTheme();
    applyTheme(cached || defaultThemeConfig());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load core data ──
    const [settings, peopleObj, tasksObj, catsObj] = await Promise.all([
      readSettings(), readPeople(), readTasks(), readCategories()
    ]);

    if (settings?.theme) applyTheme(settings.theme);

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);
    const people = peopleObj ? Object.entries(peopleObj).map(([id, p]) => ({ id, ...p })) : [];
    const tasks = tasksObj || {};
    const cats = catsObj || {};

    // ── App state ──
    let activePerson = null;  // null = "All"
    let completions = {};
    let todayEntries = {};
    let overdueItems = [];
    let overdueExpanded = false;
    let celebrationShown = false;

    // ── Header & Nav ──
    const debugActive = localStorage.getItem('dr-debug') === 'true';
    document.getElementById('headerMount').innerHTML = renderHeader({
      appName: settings?.appName || 'Daily Rundown',
      subtitle: settings?.familyName || '',
      showAdmin: true,
      showDebug: debugActive
    });
    document.getElementById('navMount').innerHTML = renderNavBar('home');

    // ── Connection status ──
    onConnectionChange(connected => {
      const existing = document.querySelector('.connection-dot');
      const html = renderConnectionStatus(connected);
      if (existing) existing.outerHTML = html;
      else document.querySelector('.header__right')?.insertAdjacentHTML('afterbegin', html);
    });

    // ── Hide loading, show content ──
    document.getElementById('loadingState').style.display = 'none';
    const main = document.getElementById('mainContent');
    main.style.display = '';

    // ── Celebration mount ──
    document.getElementById('celebrationMount').innerHTML = renderCelebration();

    // ══════════════════════════════════════════
    // Render the dashboard
    // ══════════════════════════════════════════

    async function loadData() {
      const [comp, sched, allSched] = await Promise.all([
        readCompletions(),
        readSchedule(today),
        readAllSchedule()
      ]);
      completions = comp || {};
      todayEntries = sched || {};
      overdueItems = getOverdueEntries(allSched || {}, completions, today);
    }

    function render() {
      const filtered = filterByPerson(todayEntries, activePerson);
      const prog = dayProgress(filtered, completions);
      const overdueFiltered = activePerson
        ? overdueItems.filter(e => e.ownerId === activePerson)
        : overdueItems;

      // Date header
      const dateObj = new Date(today + 'T12:00:00Z');
      const dayName = DAY_NAMES[dateObj.getUTCDay()];
      const longDate = formatDateLong(today);

      let html = '';

      // Date
      html += `<div class="date-header">
        <span class="date-header__day">${dayName}</span>
        <span class="date-header__full">${longDate}</span>
      </div>`;

      // Person filter
      html += renderPersonFilter(people, activePerson);

      // Progress
      html += renderProgressBar(prog.done, prog.total);

      // Overdue banner
      if (overdueFiltered.length > 0) {
        html += renderOverdueBanner(overdueFiltered.length);
        html += `<div class="overdue-list" id="overdueList" style="display:${overdueExpanded ? 'block' : 'none'};">`;
        for (const item of overdueFiltered) {
          const task = tasks[item.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
          const person = people.find(p => p.id === item.ownerId);
          const cat = task.category ? cats[task.category] : null;
          html += renderTaskCard({
            entryKey: item.entryKey,
            entry: { ...item, dateKey: item.dateKey },
            task,
            person,
            category: cat,
            completed: isComplete(item.entryKey, completions),
            overdue: true,
            dateLabel: formatDateShort(item.dateKey)
          });
        }
        html += `</div>`;
      }

      // Today's tasks
      if (prog.total === 0) {
        html += renderEmptyState('📭', 'No tasks today', 'Enjoy your free time!');
      } else {
        // Group by time
        const groups = groupByTime(filtered);
        const sections = [
          { key: 'am', label: 'Morning' },
          { key: 'pm', label: 'Afternoon' },
          { key: 'anytime', label: 'Anytime' }
        ];

        // Only show section headers if there are entries in multiple groups
        const nonEmpty = sections.filter(s => Object.keys(groups[s.key]).length > 0);
        const showHeaders = nonEmpty.length > 1;

        for (const sec of sections) {
          const entries = groups[sec.key];
          const sorted = sortEntries(entries, completions);
          if (sorted.length === 0) continue;

          if (showHeaders) html += renderTimeHeader(sec.label);

          for (const [entryKey, entry] of sorted) {
            const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
            const person = people.find(p => p.id === entry.ownerId);
            const cat = task.category ? cats[task.category] : null;
            html += renderTaskCard({
              entryKey,
              entry: { ...entry, dateKey: today },
              task,
              person,
              category: cat,
              completed: isComplete(entryKey, completions),
              overdue: false
            });
          }
        }
      }

      main.innerHTML = html;
      bindEvents();
    }

    // ══════════════════════════════════════════
    // Event binding
    // ══════════════════════════════════════════

    function bindEvents() {
      // Person filter
      main.querySelectorAll('.person-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          activePerson = btn.dataset.personId || null;
          celebrationShown = false;
          render();
        });
      });

      // Task card toggle
      main.querySelectorAll('.task-card').forEach(btn => {
        btn.addEventListener('click', () => toggleTask(btn.dataset.entryKey, btn.dataset.dateKey));
      });

      // Overdue toggle
      const overdueBtn = document.getElementById('overdueToggle');
      if (overdueBtn) {
        overdueBtn.addEventListener('click', () => {
          overdueExpanded = !overdueExpanded;
          const list = document.getElementById('overdueList');
          const arrow = document.getElementById('overdueArrow');
          if (list) list.style.display = overdueExpanded ? 'block' : 'none';
          if (arrow) arrow.classList.toggle('expanded', overdueExpanded);
        });
      }
    }

    // ══════════════════════════════════════════
    // Completion toggle
    // ══════════════════════════════════════════

    let undoTimer = null;

    async function toggleTask(entryKey, dateKey) {
      if (!entryKey) return;
      const wasComplete = isComplete(entryKey, completions);

      if (wasComplete) {
        // Uncomplete
        delete completions[entryKey];
        await removeCompletion(entryKey);
        celebrationShown = false;
      } else {
        // Complete
        const record = {
          completedAt: firebase.database.ServerValue.TIMESTAMP,
          completedBy: 'dashboard'
        };
        completions[entryKey] = record;
        await writeCompletion(entryKey, record);
      }

      render();

      // Undo toast
      showUndoToast(
        wasComplete ? 'Task marked incomplete' : 'Task completed',
        async () => {
          if (wasComplete) {
            const record = { completedAt: firebase.database.ServerValue.TIMESTAMP, completedBy: 'dashboard' };
            completions[entryKey] = record;
            await writeCompletion(entryKey, record);
          } else {
            delete completions[entryKey];
            await removeCompletion(entryKey);
          }
          celebrationShown = false;
          render();
        }
      );

      // Check for celebration
      checkCelebration();
    }

    function showUndoToast(message, undoCallback) {
      const mount = document.getElementById('toastMount');
      mount.innerHTML = renderUndoToast(message);
      const toast = mount.querySelector('.undo-toast');

      if (undoTimer) clearTimeout(undoTimer);

      toast.querySelector('.undo-toast__btn').addEventListener('click', () => {
        mount.innerHTML = '';
        if (undoTimer) clearTimeout(undoTimer);
        undoCallback();
      });

      // Auto-dismiss after 4s
      undoTimer = setTimeout(() => {
        if (toast.parentNode) {
          toast.style.opacity = '0';
          setTimeout(() => { mount.innerHTML = ''; }, 300);
        }
      }, 4000);
    }

    function checkCelebration() {
      if (celebrationShown) return;
      const filtered = filterByPerson(todayEntries, activePerson);
      if (isAllDone(filtered, completions)) {
        celebrationShown = true;
        const cel = document.getElementById('celebration');
        cel.classList.add('active');
        setTimeout(() => cel.classList.remove('active'), 2500);
      }
    }

    // ══════════════════════════════════════════
    // Real-time listener for completions
    // ══════════════════════════════════════════

    onValue('completions', (val) => {
      completions = val || {};
      render();
    });

    // ══════════════════════════════════════════
    // Initial load
    // ══════════════════════════════════════════

    await loadData();
    render();
  </script>
</body>
</html>
