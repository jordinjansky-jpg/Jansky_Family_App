        function taskNameWithEmoji(name) {
          if (!ks.showTaskEmoji) return name;
          const matched = [];
          const seen = new Set();
          for (const [regex, e1, e2] of TASK_EMOJI_MAP) {
            if (!regex.test(name)) continue;
            if (!seen.has(e1)) { seen.add(e1); matched.push(e1); }
            if (e2 && !seen.has(e2)) { seen.add(e2); matched.push(e2); }
            if (matched.length >= 2) break;
          }
          if (matched.length === 0) return name;
          return name + ' ' + matched.join('');
        }

          ]);
          const allOverdue = getOverdueEntries(allSched || {}, completions, today, tasks);
          overdueItems = allOverdue.filter(e => e.ownerId === kid.id);
          suppressedCooldownTaskIds = getOverdueCooldownTaskIds(allSched || {}, completions, tasks, today);
          streakData = streaks || { current: 0, best: 0 };
        }

        // ══════════════════════════════════════════
        // Render
        // ══════════════════════════════════════════

        function render() {
          // Filter out future instances of cooldown tasks that have overdue entries
          let displayEntries = viewEntries;
          if (suppressedCooldownTaskIds.size > 0 && viewDate > today) {
            displayEntries = {};
            for (const [key, entry] of Object.entries(viewEntries)) {
              if (!suppressedCooldownTaskIds.has(entry.taskId)) {
                displayEntries[key] = entry;
              }
            }
          }

          const prog = dayProgress(displayEntries, completions);
          const isToday = viewDate === today;
          const score = dailyScore(displayEntries, completions, tasks, cats, settings, viewDate, today);
          const gd = gradeDisplay(score.percentage);

          let html = '';

          // ── Kid header ──
          const dateLabel = formatDateLong(viewDate);
          const dayPrefix = isToday ? 'Today' : DAY_NAMES[new Date(viewDate + 'T12:00:00Z').getUTCDay()];
          html += `<div class="kid-header">
            ${ks.showGearIcon ? `<button class="kid-header__gear" id="kidGearBtn" type="button" aria-label="Settings">⚙️</button>` : ''}
            <div class="kid-header__greeting">
              <span class="kid-header__wave">👋</span>
              <h1 class="kid-header__name" style="color:${kid.color}">Hey, ${esc(kid.name)}!</h1>
            </div>
            <div class="kid-header__date">${dayPrefix} &mdash; ${dateLabel}</div>
          </div>`;

          // ── Stats bar ──
          html += `<div class="kid-stats">
            <div class="kid-stats__item">
              ${score.possible > 0 ? renderGradeBadge(gd.grade, gd.tier) : '<span class="kid-stats__value">--</span>'}
              <span class="kid-stats__label">${score.possible > 0 ? score.percentage + '%' : 'Grade'}</span>
            </div>
            <div class="kid-stats__item">
              <span class="kid-stats__value">${prog.done}/${prog.total}</span>
              <span class="kid-stats__label">Tasks</span>
            </div>
            <div class="kid-stats__item">
              <span class="kid-stats__value">🔥 ${streakData.current || 0}</span>
              <span class="kid-stats__label">Streak</span>
            </div>
          </div>`;

          // ── Week tabs (conditional) ──
          if (ks.showWeekView) {
            const monday = weekStart(today);
            const sunday = weekEnd(today);
            const weekDays = dateRange(monday, sunday);
            html += `<div class="kid-week-tabs">`;
            for (const day of weekDays) {
              const d = new Date(day + 'T12:00:00Z');
              const dayNum = d.getUTCDate();
              const dayShort = DAY_NAMES_SHORT[d.getUTCDay()];
              const isActive = day === viewDate;
              const isTodayTab = day === today;
              let cls = 'kid-week-tab';
              if (isActive) cls += ' kid-week-tab--active';
              if (isTodayTab) cls += ' kid-week-tab--today';
              html += `<button class="${cls}" data-date="${day}" type="button">
                <span class="kid-week-tab__day">${dayShort}</span>
                <span class="kid-week-tab__num">${dayNum}</span>
              </button>`;
            }
            html += `</div>`;
          }

          // ── Progress bar ──
          html += renderProgressBar(prog.done, prog.total);

          // ── Overdue banner (only on today view) ──
          const overdueActive = overdueItems.filter(e => !isComplete(e.entryKey, completions));
          if (isToday && overdueActive.length > 0) {
            html += renderOverdueBanner(overdueActive.length);
            html += `<div class="overdue-list" id="overdueList" style="display:${overdueExpanded ? 'block' : 'none'};">`;
            for (const item of overdueActive) {
              const task = tasks[item.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
              const cat = task.category ? cats[task.category] : null;
              const pts = basePoints(task);
              const ovr = completions[item.entryKey]?.pointsOverride ?? null;
              html += renderTaskCard({
                entryKey: item.entryKey,
                entry: { ...item, dateKey: item.dateKey },
                task: kidTask(task),
                person: kid,
                category: cat,
                completed: isComplete(item.entryKey, completions),
                overdue: true,
                dateLabel: `Overdue`,
                points: { possible: pts, override: ovr },
                isEvent: !!cat?.isEvent,
                showPoints: settings?.showPoints !== false,
                showTodIconBoth: !!settings?.showTodIconBoth,
                showTodIconSingle: !!settings?.showTodIconSingle
              });
            }
            html += `</div>`;
          }

          // ── Day's tasks ──
          html += `<div class="kid-tasks">`;
          if (prog.total === 0) {
            html += renderEmptyState('', '', '', { variant: 'kid-free' });
          } else {
            // Split incomplete / completed
            const incomplete = {};
            const completed_ = {};
            for (const [key, entry] of Object.entries(displayEntries)) {
              if (isComplete(key, completions)) completed_[key] = entry;
              else incomplete[key] = entry;
            }

            const allDone = Object.keys(incomplete).length === 0 && Object.keys(completed_).length > 0;

            if (allDone) {
              // ── Victory screen! ──
              const v = pickVictoryScene();
              const personalTitle = v.title;
              const personalSub = v.subtitle.replace(/\{name\}/g, esc(kid.name));
              html += `<div class="kid-victory">
                <div class="kid-victory__scene">${v.scene}</div>
                <div class="kid-victory__title">${personalTitle}</div>
                <div class="kid-victory__subtitle">${personalSub}</div>
                <div class="kid-victory__completed-label">${prog.done} tasks crushed today</div>
              </div>`;

              // Still show completed tasks collapsed below, grouped by frequency
              html += renderTimeHeader(`Completed (${Object.keys(completed_).length})`);
              const compGroups = groupByFrequency(completed_, tasks, cats);
              const compSections = [
                { key: 'events', label: 'Events' },
                { key: 'daily', label: 'Daily' },
                { key: 'weekly', label: 'Weekly' },
                { key: 'monthly', label: 'Monthly' },
                { key: 'once', label: 'One-Time' }
              ];
              const compNonEmpty = compSections.filter(s => Object.keys(compGroups[s.key]).length > 0);
              const showCompHeaders = compNonEmpty.length > 1;
              for (const sec of compSections) {
                const entries = compGroups[sec.key];
                const sorted = sortEntries(entries, completions);
                if (sorted.length === 0) continue;
                if (showCompHeaders) html += renderTimeHeader(sec.label);
                for (const [entryKey, entry] of sorted) {
                  const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
                  const cat = task.category ? cats[task.category] : null;
                  const pts = score.pointsMap[entryKey] || basePoints(task);
                  const ovr = completions[entryKey]?.pointsOverride ?? null;
                  html += renderTaskCard({
                    entryKey,
                    entry: { ...entry, dateKey: viewDate },
                    task: kidTask(task),
                    person: kid,
                    category: cat,
                    completed: true,
                    overdue: false,
                    points: { possible: pts, override: ovr },
                    isEvent: !!cat?.isEvent,
                    showPoints: settings?.showPoints !== false
                  });
                }
              }
            } else {
              // Incomplete grouped by frequency
              const groups = groupByFrequency(incomplete, tasks, cats);
              const sections = [
                { key: 'events', label: 'Events' },
                { key: 'daily', label: 'Daily' },
                { key: 'weekly', label: 'Weekly' },
                { key: 'monthly', label: 'Monthly' },
                { key: 'once', label: 'One-Time' }
              ];
              const nonEmpty = sections.filter(s => Object.keys(groups[s.key]).length > 0);
              const showHeaders = nonEmpty.length > 1;

              for (const sec of sections) {
                const entries = groups[sec.key];
                const sorted = sortEntries(entries, completions);
                if (sorted.length === 0) continue;
                if (showHeaders) html += renderTimeHeader(sec.label);

                for (const [entryKey, entry] of sorted) {
                  const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
                  const cat = task.category ? cats[task.category] : null;
                  const pts = score.pointsMap[entryKey] || basePoints(task);
                  const ovr = completions[entryKey]?.pointsOverride ?? null;
                  html += renderTaskCard({
                    entryKey,
                    entry: { ...entry, dateKey: viewDate },
                    task: kidTask(task),
                    person: kid,
                    category: cat,
                    completed: false,
                    overdue: false,
                    points: { possible: pts, override: ovr },
                    isEvent: !!cat?.isEvent,
                    showPoints: settings?.showPoints !== false
                  });
                }
              }

              // Completed at bottom, grouped by frequency
              const completedEntries = Object.entries(completed_);
              if (completedEntries.length > 0) {
                html += renderTimeHeader(`Completed (${completedEntries.length})`);
                const compGroups2 = groupByFrequency(completed_, tasks, cats);
                const compNonEmpty2 = sections.filter(s => Object.keys(compGroups2[s.key]).length > 0);
                const showCompHeaders2 = compNonEmpty2.length > 1;
                for (const sec of sections) {
                  const entries = compGroups2[sec.key];
                  const sorted = sortEntries(entries, completions);
                  if (sorted.length === 0) continue;
                  if (showCompHeaders2) html += renderTimeHeader(sec.label);
                  for (const [entryKey, entry] of sorted) {
                    const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
                    const cat = task.category ? cats[task.category] : null;
                    const pts = score.pointsMap[entryKey] || basePoints(task);
                    const ovr = completions[entryKey]?.pointsOverride ?? null;
                    html += renderTaskCard({
                      entryKey,
                      entry: { ...entry, dateKey: viewDate },
                      task: kidTask(task),
                      person: kid,
                      category: cat,
                      completed: true,
                      overdue: false,
                      points: { possible: pts, override: ovr },
                      isEvent: !!cat?.isEvent,
                      showPoints: settings?.showPoints !== false
                    });
                  }
                }
              }
            }
          }
          html += `</div>`;

          main.innerHTML = html;

          // Add lock icon to pin-protected task cards
          main.querySelectorAll('.task-card').forEach(card => {
            const ek = card.dataset.entryKey;
            if (ek && isTaskPinProtected(ek) && !card.querySelector('.task-card__lock')) {
              const nameEl = card.querySelector('.task-card__name');
              if (nameEl) nameEl.insertAdjacentHTML('beforeend', '<span class="task-card__lock">🔒</span>');
            }
          });

          bindEvents();
        }

        // ══════════════════════════════════════════
        // Event binding
        // ══════════════════════════════════════════

        function bindEvents() {
          // Week tabs
          main.querySelectorAll('.kid-week-tab').forEach(btn => {
            btn.addEventListener('click', () => {
              viewDate = btn.dataset.date;
              celebrationShown = false;
              overdueExpanded = false;
              subscribeSchedule(viewDate);
              loadData();
            });
          });

          // Task cards: tap to toggle, long-press for detail
          // Movement threshold (px) — cancel long-press if finger moves more than this (scroll detection)
          const PRESS_MOVE_THRESHOLD = 10;
          main.querySelectorAll('.task-card').forEach(btn => {
            let pressTimer = null;
            let didLongPress = false;
            let startX = 0, startY = 0;

            const startPress = (e) => {
              didLongPress = false;
              startX = e.clientX; startY = e.clientY;
              pressTimer = setTimeout(() => {
                didLongPress = true;
                pressTimer = null;
                openTaskSheet(btn.dataset.entryKey, btn.dataset.dateKey);
              }, 800);
            };

            const movePress = (e) => {
              if (pressTimer && (Math.abs(e.clientX - startX) > PRESS_MOVE_THRESHOLD || Math.abs(e.clientY - startY) > PRESS_MOVE_THRESHOLD)) {
                clearTimeout(pressTimer); pressTimer = null;
              }
            };

            const endPress = () => {
              clearTimeout(pressTimer);
              pressTimer = null;
              if (!didLongPress) {
                toggleTask(btn.dataset.entryKey, btn.dataset.dateKey);
              }
            };

            const cancelPress = () => { clearTimeout(pressTimer); pressTimer = null; };

            btn.addEventListener('pointerdown', startPress);
            btn.addEventListener('pointermove', movePress);
            btn.addEventListener('pointerup', endPress);
            btn.addEventListener('pointerleave', cancelPress);
            btn.addEventListener('pointercancel', cancelPress);
            btn.addEventListener('contextmenu', e => e.preventDefault());
          });

          // Gear icon opens settings
          document.getElementById('kidGearBtn')?.addEventListener('click', openKidSettings);

          // Overdue toggle
          const overdueBtn = document.getElementById('overdueToggle');
          if (overdueBtn) {
            overdueBtn.addEventListener('click', () => {
              overdueExpanded = !overdueExpanded;
              const list = document.getElementById('overdueList');
              const arrow = document.getElementById('overdueArrow');
              if (list) list.style.display = overdueExpanded ? 'block' : 'none';
              if (arrow) arrow.classList.toggle('expanded', overdueExpanded);
            });
          }
        }

        // ══════════════════════════════════════════
        // PIN-protected category check
        // ══════════════════════════════════════════

        function isTaskPinProtected(entryKey) {
          const entry = viewEntries[entryKey] || (overdueItems || []).find(e => e.entryKey === entryKey);
          if (!entry) return false;
          const task = tasks[entry.taskId];
          if (!task || !task.category) return false;
          const cat = cats[task.category];
          return !!cat?.pinProtected;
        }

        function requirePin() {
          return new Promise((resolve) => {
            const adminPin = settings?.adminPin || '';
            const recoveryPin = '2522'; // Fixed backstop per CLAUDE.md — never read from settings
            const mount = document.getElementById('pinPromptMount');
            mount.innerHTML = `
              <div class="kid-pin-overlay" id="kidPinOverlay">
                <div class="kid-pin-dialog">
                  <div class="kid-pin-dialog__icon">🔒</div>
                  <div class="kid-pin-dialog__title">Ask a Parent</div>
                  <div class="kid-pin-dialog__desc">This task needs a parent's PIN to complete</div>
                  <div class="kid-pin-dialog__inputs">
                    <input type="tel" class="kid-pin-digit" maxlength="1" data-pin="0" inputmode="numeric">
                    <input type="tel" class="kid-pin-digit" maxlength="1" data-pin="1" inputmode="numeric">
                    <input type="tel" class="kid-pin-digit" maxlength="1" data-pin="2" inputmode="numeric">
                    <input type="tel" class="kid-pin-digit" maxlength="1" data-pin="3" inputmode="numeric">
                  </div>
                  <div class="kid-pin-dialog__error" id="kidPinError"></div>
                  <button class="kid-pin-dialog__cancel" id="kidPinCancel" type="button">Cancel</button>
                </div>
              </div>`;

            const digits = mount.querySelectorAll('.kid-pin-digit');
            const cleanup = () => { mount.innerHTML = ''; };

            digits[0].focus();
            digits.forEach((inp, i) => {
              inp.addEventListener('input', () => {
                if (inp.value.length === 1 && i < 3) digits[i + 1].focus();
                const entered = Array.from(digits).map(d => d.value).join('');
                if (entered.length === 4) {
                  if (entered === adminPin || entered === recoveryPin) {
                    cleanup();
                    resolve(true);
                  } else {
                    document.getElementById('kidPinError').textContent = 'Wrong PIN — try again';
                    digits.forEach(d => { d.value = ''; });
                    digits[0].focus();
                  }
                }
              });
              inp.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !inp.value && i > 0) digits[i - 1].focus();
              });
            });

            document.getElementById('kidPinCancel').addEventListener('click', () => {
              cleanup();
              resolve(false);
            });
            document.getElementById('kidPinOverlay').addEventListener('click', (e) => {
              if (e.target === e.currentTarget) { cleanup(); resolve(false); }
            });
          });
        }

        // ══════════════════════════════════════════
        // Completion toggle
        // ══════════════════════════════════════════

        let undoTimer = null;

        async function toggleTask(entryKey, dateKey) {
          if (!entryKey) return;
          const wasComplete = isComplete(entryKey, completions);

          // PIN-protected: require PIN to mark complete (not to unmark)
          if (!wasComplete && isTaskPinProtected(entryKey)) {
            const ok = await requirePin();
            if (!ok) return;
          }

          if (wasComplete) {
            delete completions[entryKey];
            await removeCompletion(entryKey);
            celebrationShown = false;
          } else {
            const record = {
              completedAt: firebase.database.ServerValue.TIMESTAMP,
              completedBy: 'kid-mode'
            };
            completions[entryKey] = record;
            await writeCompletion(entryKey, record);

            // Auto-archive one-time tasks on completion
            const entry = viewEntries[entryKey];
            if (entry) {
              const task = tasks[entry.taskId];
              if (task && task.rotation === 'once') {
                task.status = 'completed';
                await writeTask(entry.taskId, task);
              }
            }

            // Cooldown task rebuild
            const cdEntry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
            if (cdEntry) {
              const cdTask = tasks[cdEntry.taskId];
              if (cdTask?.cooldownDays > 0) {
                const allSched = await readAllSchedule() || {};
                const cdUpdates = rebuildSingleTaskSchedule(
                  cdEntry.taskId, cdTask, today, allSched, completions, people, settings, tasks, catsObj
                );
                if (Object.keys(cdUpdates).length > 0) {
                  await multiUpdate(cdUpdates);
                }
                await loadData();
              }
            }

            // Per-task celebration
            triggerCelebration(entryKey, 'task');
          }

          const doRenderAndToast = () => {
            render();
            showUndoToast(
              wasComplete ? 'Task marked incomplete' : 'Task completed!',
              async () => {
                if (wasComplete) {
                  const record = { completedAt: firebase.database.ServerValue.TIMESTAMP, completedBy: 'kid-mode' };
                  completions[entryKey] = record;
                  await writeCompletion(entryKey, record);
                } else {
                  delete completions[entryKey];
                  await removeCompletion(entryKey);
                  // Restore archived one-time task
                  const entry = viewEntries[entryKey];
                  if (entry) {
                    const task = tasks[entry.taskId];
                    if (task && task.status === 'completed' && task.rotation === 'once') {
                      task.status = 'active';
                      await writeTask(entry.taskId, task);
                    }
                  }
                }
                // Rebuild cooldown task schedule after undo
                const undoEntry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
                if (undoEntry) {
                  const undoTask = tasks[undoEntry.taskId];
                  if (undoTask?.cooldownDays > 0) {
                    const allSched = await readAllSchedule() || {};
                    const undoUpdates = rebuildSingleTaskSchedule(
                      undoEntry.taskId, undoTask, today, allSched, completions, people, settings, tasks, catsObj
                    );
                    if (Object.keys(undoUpdates).length > 0) {
                      await multiUpdate(undoUpdates);
                    }
                    await loadData();
                  }
                }
                celebrationShown = false;
                render();
              }
            );

            // Check all-done
            checkCelebration();
          };

          if (!wasComplete) {
            // Add press animation, then render after delay
            const cardEl = document.querySelector(`[data-entry-key="${entryKey}"]`);
            if (cardEl) {
              cardEl.classList.add('task-card--completing');
              cardEl.style.pointerEvents = 'none';
            }
            setTimeout(doRenderAndToast, 400);
          } else {
            doRenderAndToast();
          }
        }

        function showUndoToast(message, undoCallback) {
          const mount = document.getElementById('toastMount');
          mount.innerHTML = renderUndoToast(message);
          const toast = mount.querySelector('.undo-toast');

          if (undoTimer) clearTimeout(undoTimer);

          toast.querySelector('.undo-toast__btn').addEventListener('click', () => {
            mount.innerHTML = '';
            if (undoTimer) clearTimeout(undoTimer);
            undoCallback();
          });

          undoTimer = setTimeout(() => {
            if (toast.parentNode) {
              toast.style.opacity = '0';
              setTimeout(() => { mount.innerHTML = ''; }, 300);
            }
          }, 4000);
        }

        // ══════════════════════════════════════════
        // Celebration system
        // ══════════════════════════════════════════

        const CELEBRATION_EMOJI = [
          '🌟', '⭐', '✨', '🎉', '🎊', '🏆', '💪', '🔥', '🚀', '💫', '🎯', '👏',
          '🦄', '🌈', '⚡', '🍕', '🎸', '🎮', '🧁', '🍩', '🎈', '🎶', '💎', '👑',
          '🦋', '🐬', '🐙', '🦀', '🍦', '🎪', '🛸', '🌸', '🍭', '🎵', '💜', '💚'
        ];

        const CONFETTI_EMOJI = ['🎉', '🎊', '✨', '🌟', '💫', '🎈', '🎵', '💎', '🦄', '🌈', '⭐', '🍭'];

        const VICTORY_SCENES = [
          { scene: '🐱🎉🎈🐱\n🎶💃🕺🎶', title: 'Cat Party!', subtitle: 'Even the cats are celebrating, {name}!' },

          { scene: '🐙🎸🥁🐙\n🎵🔥🔥🎵', title: 'Octopus Rock Band!', subtitle: 'They wrote a song about how awesome {name} is!' },
          { scene: '🚀🌟🪐⭐🛸\n👽🎉👾🎉👽', title: 'Space Party!', subtitle: 'Aliens traveled here just to high-five {name}!' },
          { scene: '🐧❄️🎿🏂🐧\n⛷️🏔️🏔️⛷️', title: 'Penguin Ski Trip!', subtitle: 'The penguins are doing tricks in {name}\'s honor!' },

          { scene: '🦊🎩🐰🎩🦊\n✨🪄🎭🪄✨', title: 'Magic Show!', subtitle: '{name} made all the tasks disappear! Abracadabra!' },
          { scene: '🐋💦🐬🐳💦\n🌊🎉🏄🎉🌊', title: 'Ocean Bash!', subtitle: 'The whales are throwing a splash party for {name}!' },
          { scene: '🦁👑🐯🏆🦁\n🎺🥇🏅🥇🎺', title: 'Champion of the Jungle!', subtitle: 'King {name}, ruler of getting stuff done!' },
          { scene: '🤖🎮👾🕹️🤖\n💥⚡🔥⚡💥', title: 'Level Complete!', subtitle: '{name} beat the final boss — all tasks destroyed!' },
          { scene: '🐸🎤🎵🐸🎤\n🎶🎼🎹🎼🎶', title: 'Frog Choir!', subtitle: 'The frogs are singing {name}\'s victory song!' },
          { scene: '🦈🎉🐠🐡🦈\n🫧🎊🫧🎊🫧', title: 'Under the Sea Party!', subtitle: 'Even the sharks are smiling for {name}!' },
          { scene: '🐒🍌🐒🍌🐒\n🌴🎉🌴🎉🌴', title: 'Monkey Business!', subtitle: 'The monkeys are going bananas for {name}!' },
          { scene: '🦕🌋🦖🌋🦕\n🎉🥚🎊🥚🎉', title: 'Dino Dance!', subtitle: 'The dinosaurs came back just to celebrate {name}!' },
        ];

        function pickVictoryScene() {
          return VICTORY_SCENES[Math.floor(Math.random() * VICTORY_SCENES.length)];
        }

        function showConfettiRain() {
          const count = 40;
          for (let i = 0; i < count; i++) {
            const el = document.createElement('span');
            el.className = 'kid-confetti';
            el.textContent = CONFETTI_EMOJI[Math.floor(Math.random() * CONFETTI_EMOJI.length)];
            el.style.left = (Math.random() * 100) + 'vw';
            el.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
            el.style.animationDelay = (Math.random() * 2) + 's';
            el.style.fontSize = (1.5 + Math.random() * 1.5) + 'rem';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 6000);
          }
        }

        function triggerCelebration(entryKey, type) {
          if (!ks.celebrationsEnabled && ks.celebrationsEnabled !== undefined) return;
          if (ks.celebrationStyle === 'off') return;

          if (type === 'task') {
            if (ks.celebrationStyle === 'subtle') showSubtleTaskCelebration(entryKey);
            else showFullTaskCelebration(entryKey);
          } else if (type === 'allDone') {
            if (ks.celebrationStyle === 'subtle') showSubtleAllDoneCelebration();
            else showFullAllDoneCelebration();
          }
        }

        // Themed emoji sets for per-task bursts — picks a random theme each time
        const BURST_THEMES = [
          ['🌟', '⭐', '✨', '💫', '🌟', '⭐', '✨', '💫'],
          ['🎉', '🎊', '🎈', '🎵', '🎶', '🎉', '🎊', '🎈'],
          ['🦄', '🌈', '💜', '💖', '💎', '🦋', '🌸', '✨'],
          ['🍕', '🍩', '🧁', '🍦', '🍭', '🍫', '🎂', '🍪'],
          ['🚀', '⚡', '🔥', '💥', '🛸', '☄️', '🌟', '⭐'],
          ['🐱', '🐶', '🐰', '🐸', '🦊', '🐼', '🐨', '🐵'],
        ];

        function showFullTaskCelebration(entryKey) {
          const container = document.createElement('div');
          container.className = 'kid-emoji-rain';

          // Pick a random theme or mix
          const useMix = Math.random() > 0.5;
          const theme = useMix ? CELEBRATION_EMOJI : BURST_THEMES[Math.floor(Math.random() * BURST_THEMES.length)];

          const count = 16 + Math.floor(Math.random() * 8);
          for (let i = 0; i < count; i++) {
            const span = document.createElement('span');
            span.className = 'kid-emoji-rain__drop';
            span.textContent = theme[Math.floor(Math.random() * theme.length)];
            span.style.left = (Math.random() * 100) + '%';
            span.style.setProperty('--delay', (Math.random() * 0.5) + 's');
            span.style.setProperty('--fall-dur', (0.9 + Math.random() * 0.8) + 's');
            span.style.setProperty('--fall-dist', (50 + Math.random() * 30) + 'vh');
            span.style.setProperty('--spin', (Math.random() * 360 - 180) + 'deg');
            container.appendChild(span);
          }

          document.body.appendChild(container);
          setTimeout(() => container.remove(), 2200);
        }

        const SPARKLE_EMOJI = ['⭐', '🌟', '✨', '💫', '🦄', '💎', '🔥', '⚡'];

        function showSubtleTaskCelebration(entryKey) {
          const container = document.createElement('div');
          container.className = 'kid-sparkle-rain';

          const count = 8 + Math.floor(Math.random() * 4);
          for (let i = 0; i < count; i++) {
            const span = document.createElement('span');
            span.className = 'kid-sparkle-rain__drop';
            span.textContent = SPARKLE_EMOJI[Math.floor(Math.random() * SPARKLE_EMOJI.length)];
            span.style.left = (Math.random() * 100) + '%';
            span.style.setProperty('--delay', (Math.random() * 0.3) + 's');
            span.style.setProperty('--fall-dur', (0.8 + Math.random() * 0.6) + 's');
            span.style.setProperty('--fall-dist', (40 + Math.random() * 25) + 'vh');
            container.appendChild(span);
          }

          document.body.appendChild(container);
          setTimeout(() => container.remove(), 1800);
        }

        const ALL_DONE_MESSAGES = [
          `Amazing job, ${esc(kid.name)}! You're a superstar!`,
          `${esc(kid.name)} absolutely CRUSHED it today!`,
          `Boom! ${esc(kid.name)} wins the day!`,
          `${esc(kid.name)} is officially a legend!`,
          `Nothing can stop ${esc(kid.name)}!`,
          `${esc(kid.name)} just unlocked: Day Complete Achievement!`,
        ];

        function showFullAllDoneCelebration() {
          const cel = document.getElementById('celebration');
          if (!cel) return;
          const subtitle = cel.querySelector('.celebration__subtitle');
          if (subtitle) subtitle.textContent = ALL_DONE_MESSAGES[Math.floor(Math.random() * ALL_DONE_MESSAGES.length)];
          cel.classList.add('active');
          showConfettiRain();
          setTimeout(() => cel.classList.remove('active'), 3000);
        }

        function showSubtleAllDoneCelebration() {
          const msg = ALL_DONE_MESSAGES[Math.floor(Math.random() * ALL_DONE_MESSAGES.length)];
          const toast = document.createElement('div');
          toast.className = 'kid-celebration-toast';
          toast.textContent = `🎉 ${msg}`;
          document.body.appendChild(toast);
          showConfettiRain();
          setTimeout(() => toast.remove(), 3200);
        }

        function checkCelebration() {
          if (celebrationShown) return;
          if (isAllDone(viewEntries, completions)) {
            celebrationShown = true;
            triggerCelebration(null, 'allDone');
          }
        }

        // ══════════════════════════════════════════
        // Task detail bottom sheet (long-press)
        // ══════════════════════════════════════════

        const taskSheetMount = document.getElementById('taskSheetMount');

        function openTaskSheet(entryKey, dateKey) {
          const entry = viewEntries[entryKey]
            || overdueItems.find(o => o.entryKey === entryKey);
          if (!entry) return;

          const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
          const cat = task.category ? cats[task.category] : null;
          const completed = isComplete(entryKey, completions);
          const pts = basePoints(task);
          const completion = completions[entryKey];
          const currentOverride = completion?.pointsOverride ?? null;

          // Build kid-specific sheet content
          const sheetContent = renderKidTaskSheet({
            entryKey,
            entry: { ...entry, dateKey: dateKey || viewDate },
            task,
            cat,
            completed,
            pts,
            currentOverride,
            people
          });

          taskSheetMount.innerHTML = renderBottomSheet(sheetContent);

          requestAnimationFrame(() => {
            const overlay = document.getElementById('bottomSheet');
            if (overlay) overlay.classList.add('active');
          });

          bindTaskSheetEvents(entryKey, dateKey);
        }

        function renderKidTaskSheet({ entryKey, entry, task, cat, completed, pts, currentOverride, people }) {
          const catIcon = cat?.icon || '';
          const diffLabel = { easy: 'Easy', medium: 'Medium', hard: 'Hard' }[task.difficulty] || 'Medium';
          const rotLabel = { daily: 'Daily', weekly: 'Weekly', monthly: 'Monthly', once: 'One-Time' }[entry.rotationType] || '';
          const todLabel = { am: 'Morning', pm: 'Afternoon', anytime: 'Anytime' }[entry.timeOfDay] || '';
          const sliderVal = currentOverride ?? 100;

          let html = `<div class="task-detail-sheet">`;

          // Task info
          html += `<div class="task-detail__info">
            <div class="task-detail__name" style="--owner-color:${kid.color}">
              <span class="task-card__avatar">${kid.name[0].toUpperCase()}</span>
              <span>${catIcon ? catIcon + ' ' : ''}${taskNameWithEmoji(task.name)}</span>
            </div>
            <div class="task-detail__meta">
              <span class="chip">${rotLabel}</span>
              <span class="chip">${diffLabel}</span>
              ${todLabel ? `<span class="chip">${todLabel}</span>` : ''}
              ${task.estMin ? `<span class="chip">${task.estMin}m</span>` : ''}
              <span class="chip">${pts}pt</span>
            </div>
            ${entry.delegatedFromName ? `<div class="task-detail__source-info">↪ Delegated from <strong>${esc(entry.delegatedFromName)}</strong></div>` : ''}
            ${entry.movedFromDate ? `<div class="task-detail__source-info">📅 Moved from <strong>${(() => { const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; const d = new Date(entry.movedFromDate + 'T12:00:00'); return isNaN(d) ? entry.movedFromDate : days[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate(); })()}</strong></div>` : ''}
          </div>`;

          // Event notes (read-only)
          const noteText = entry.notes || '';
          if (cat?.isEvent && noteText) {
            html += `<div class="task-detail__notes mt-md">
              <span class="form-label">Notes</span>
              <div class="task-detail__notes-text">${esc(noteText)}</div>
            </div>`;
          }

          // Complete/uncomplete button
          const isPinLocked = !completed && isTaskPinProtected(entryKey);
          const toggleLabel = completed ? 'Mark Incomplete' : (isPinLocked ? '🔒 Mark Complete' : 'Mark Complete');
          const toggleClass = completed ? 'btn--secondary' : 'btn--primary';
          html += `<button class="btn ${toggleClass} btn--full mt-md" id="sheetToggleComplete" data-entry-key="${entryKey}" data-date-key="${entry.dateKey || ''}" type="button">${toggleLabel}</button>`;

          // Action buttons row (conditional)
          const showDelegate = ks.canDelegate;
          const showMove = ks.canMoveTasks;
          if (showDelegate || showMove) {
            html += `<div class="task-detail__actions mt-md">`;
            if (showDelegate) {
              html += `<button class="btn btn--secondary btn--sm" id="sheetDelegate" type="button">👤 Delegate</button>`;
            }
            if (showMove) {
              html += `<button class="btn btn--secondary btn--sm" id="sheetMove" type="button">📅 Move</button>`;
            }
            html += `</div>`;
          }

          // Delegate panel
          if (showDelegate) {
            const otherPeople = people.filter(p => p.id !== entry.ownerId);
            html += `<div class="task-detail__delegate-panel" id="delegatePanel" style="display:none;">
              <div class="task-detail__delegate-header">
                <span class="form-label">Reassign to:</span>
                ${showMove ? `<label class="task-detail__move-toggle"><input type="checkbox" id="delegateMoveToggle"> 📅 Move too</label>` : ''}
              </div>
              <div class="task-detail__person-chips">
                ${otherPeople.map(p => `<button class="chip chip--selectable" data-person-id="${p.id}" style="--person-color:${p.color}" type="button">${esc(p.name)}</button>`).join('')}
              </div>
              <input type="date" id="delegateMoveDatePicker" class="task-detail__date-input" style="position:absolute;opacity:0;pointer-events:none;">
            </div>`;
          }

          // Move date picker
          if (showMove) {
            html += `<input type="date" id="moveDatePicker" class="task-detail__date-input" style="position:absolute;opacity:0;pointer-events:none;">`;
          }

          // Points slider (conditional)
          if (ks.showSlider) {
            const min = settings?.sliderMin ?? 0;
            const max = settings?.sliderMax ?? 150;
            const earnedPts = Math.round(pts * (sliderVal / 100));
            const sliderLabel = completed ? 'Points Override' : 'Points Preview';
            const previewNote = completed ? '' : '<div class="form-hint">Complete the task to save override</div>';
            html += `<div class="task-detail__slider mt-md">
              <div class="task-detail__slider-header">
                <span class="form-label">${sliderLabel}</span>
                <span class="task-detail__slider-value" id="sliderValueLabel">${sliderVal}% (${earnedPts}pt)</span>
              </div>
              <div class="task-detail__slider-row">
                <input type="range" class="slider" id="pointsSlider" min="${min}" max="${max}" value="${sliderVal}" step="5" data-entry-key="${entryKey}" data-base-pts="${pts}">
                ${sliderVal !== 100 ? `<button class="btn btn--secondary btn--sm" id="sliderReset" type="button">Reset</button>` : ''}
              </div>
              ${previewNote}
            </div>`;
          }

          html += `</div>`;
          return html;
        }

        function closeTaskSheet() {
          const overlay = document.getElementById('bottomSheet');
          if (overlay) {
            overlay.classList.remove('active');
            setTimeout(() => { taskSheetMount.innerHTML = ''; }, 300);
          }
        }

        function bindTaskSheetEvents(entryKey, dateKey) {
          const overlay = document.getElementById('bottomSheet');
          overlay?.addEventListener('click', e => {
            if (e.target === overlay) closeTaskSheet();
          });

          // Toggle complete
          document.getElementById('sheetToggleComplete')?.addEventListener('click', async () => {
            closeTaskSheet();
            await toggleTask(entryKey, dateKey);
          });

          // Points slider
          if (ks.showSlider) {
            const slider = document.getElementById('pointsSlider');
            if (slider) {
              const isCompleted = isComplete(entryKey, completions);

              slider.addEventListener('input', () => {
                const val = parseInt(slider.value, 10);
                const basePts = parseInt(slider.dataset.basePts, 10);
                const earnedPts = Math.round(basePts * (val / 100));
                const label = document.getElementById('sliderValueLabel');
                if (label) label.textContent = `${val}% (${earnedPts}pt)`;
              });

              slider.addEventListener('change', async () => {
                if (!isCompleted) return;
                const val = parseInt(slider.value, 10);
                const override = val === 100 ? null : val;
                completions[entryKey].pointsOverride = override;
                await writeCompletion(entryKey, completions[entryKey]);
                render();
              });

              document.getElementById('sliderReset')?.addEventListener('click', () => {
                slider.value = 100;
                slider.dispatchEvent(new Event('input'));
                slider.dispatchEvent(new Event('change'));
              });
            }
          }

          // Delegate
          if (ks.canDelegate) {
            document.getElementById('sheetDelegate')?.addEventListener('click', () => {
              const panel = document.getElementById('delegatePanel');
              if (panel) panel.style.display = panel.style.display === 'none' ? '' : 'none';
            });

            let pendingDelegateOwnerId = null;
            document.querySelectorAll('#delegatePanel .chip--selectable').forEach(chip => {
              chip.addEventListener('click', async () => {
                const newOwnerId = chip.dataset.personId;
                if (!newOwnerId) return;

                const moveToggle = document.getElementById('delegateMoveToggle');
                if (moveToggle?.checked) {
                  pendingDelegateOwnerId = newOwnerId;
                  document.querySelectorAll('#delegatePanel .chip--selectable').forEach(c => c.classList.remove('chip--active'));
                  chip.classList.add('chip--active');
                  const picker = document.getElementById('delegateMoveDatePicker');
                  if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
                  return;
                }

                const entry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
                if (!entry) return;

                const originalPerson = people.find(p => p.id === entry.ownerId);
                const targetDate = dateKey || viewDate;
                const newEntry = { ...entry, ownerId: newOwnerId, delegatedFromName: originalPerson?.name || '?' };
                delete newEntry.entryKey;

                const updates = {};
                updates[`schedule/${targetDate}/${entryKey}`] = null;
                const newKey = `sched_${Date.now()}_delegate`;
                updates[`schedule/${targetDate}/${newKey}`] = newEntry;

                if (completions[entryKey]) {
                  updates[`completions/${entryKey}`] = null;
                  updates[`completions/${newKey}`] = completions[entryKey];
                }

                await multiUpdate(updates);
                closeTaskSheet();
                await loadData();
                render();
              });
            });

            // Delegate+Move date picker
            document.getElementById('delegateMoveDatePicker')?.addEventListener('change', async (e) => {
              const newDate = e.target.value;
              if (!newDate || !pendingDelegateOwnerId) return;

              const entry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
              if (!entry) return;

              const originalPerson = people.find(p => p.id === entry.ownerId);
              const sourceDate = dateKey || viewDate;
              const newEntry = { ...entry, ownerId: pendingDelegateOwnerId, delegatedFromName: originalPerson?.name || '?', movedFromDate: sourceDate };
              delete newEntry.entryKey;

              const updates = {};
              updates[`schedule/${sourceDate}/${entryKey}`] = null;
              const newKey = `sched_${Date.now()}_delegate_moved`;
              updates[`schedule/${newDate}/${newKey}`] = newEntry;

              if (completions[entryKey]) {
                updates[`completions/${entryKey}`] = null;
                updates[`completions/${newKey}`] = completions[entryKey];
              }

              await multiUpdate(updates);
              pendingDelegateOwnerId = null;
              closeTaskSheet();
              await loadData();
              render();
            });
          }

          // Move
          if (ks.canMoveTasks) {
            document.getElementById('sheetMove')?.addEventListener('click', () => {
              const picker = document.getElementById('moveDatePicker');
              if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
            });

            document.getElementById('moveDatePicker')?.addEventListener('change', async (e) => {
              const newDate = e.target.value;
              if (!newDate) return;

              const entry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
              if (!entry) return;

              const sourceDate = dateKey || viewDate;
              const newEntry = { ...entry, movedFromDate: sourceDate };
              delete newEntry.entryKey;

              const updates = {};
              updates[`schedule/${sourceDate}/${entryKey}`] = null;
              const newKey = `sched_${Date.now()}_moved`;
              updates[`schedule/${newDate}/${newKey}`] = newEntry;

              if (completions[entryKey]) {
                updates[`completions/${entryKey}`] = null;
                updates[`completions/${newKey}`] = completions[entryKey];
              }

              await multiUpdate(updates);
              closeTaskSheet();
              await loadData();
              render();
            });
          }
        }

        // ══════════════════════════════════════════
        // Kid settings panel (gear icon)
        // ══════════════════════════════════════════

        const kidSettingsMount = document.getElementById('kidSettingsMount');
        const presets = getPresets();
        const colorPalette = getColorPalette();

        function openKidSettings() {
          const currentThemePreset = kid.theme?.preset || '';
          const currentColor = kid.color;

          let html = `<div class="kid-settings-overlay" id="kidSettingsOverlay">
            <div class="kid-settings-panel">
              <div class="kid-settings__title">⚙️ My Settings</div>

              <div class="kid-settings__section">
                <div class="kid-settings__label">Theme</div>
                <div class="kid-settings__themes">
                  <button class="kid-settings__theme-btn${!currentThemePreset ? ' kid-settings__theme-btn--active' : ''}" data-preset="" type="button">Family Default</button>
                  ${presets.map(p => `<button class="kid-settings__theme-btn${currentThemePreset === p.key ? ' kid-settings__theme-btn--active' : ''}" data-preset="${p.key}" type="button">${esc(p.label)}</button>`).join('')}
                </div>
              </div>

              <div class="kid-settings__section">
                <div class="kid-settings__label">My Color</div>
                <div class="kid-settings__colors">
                  ${colorPalette.map(c => `<button class="kid-settings__color-btn${c === currentColor ? ' kid-settings__color-btn--active' : ''}" data-color="${c}" style="background:${c}" type="button" aria-label="${c}"></button>`).join('')}
                </div>
              </div>

              <button class="btn btn--secondary btn--full mt-md" id="kidSettingsClose" type="button">Done</button>
            </div>
          </div>`;

          kidSettingsMount.innerHTML = html;

          requestAnimationFrame(() => {
            document.getElementById('kidSettingsOverlay')?.classList.add('active');
          });

          // Theme buttons
          kidSettingsMount.querySelectorAll('.kid-settings__theme-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              const preset = btn.dataset.preset;
              kidSettingsMount.querySelectorAll('.kid-settings__theme-btn').forEach(b => b.classList.remove('kid-settings__theme-btn--active'));
              btn.classList.add('kid-settings__theme-btn--active');

              if (preset) {
                kid.theme = { preset, accentColor: settings?.theme?.accentColor || '#5b7fd6' };
                applyTheme(kid.theme);
              } else {
                kid.theme = null;
                applyTheme(settings?.theme || defaultThemeConfig());
              }
              await writePerson(kid.id, { ...kid });
            });
          });

          // Color buttons
          kidSettingsMount.querySelectorAll('.kid-settings__color-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              const color = btn.dataset.color;
              kidSettingsMount.querySelectorAll('.kid-settings__color-btn').forEach(b => b.classList.remove('kid-settings__color-btn--active'));
              btn.classList.add('kid-settings__color-btn--active');
              kid.color = color;
              await writePerson(kid.id, { ...kid });
              render();
            });
          });

          // Close
          const closeSettings = () => {
            const overlay = document.getElementById('kidSettingsOverlay');
            if (overlay) {
              overlay.classList.remove('active');
              setTimeout(() => { kidSettingsMount.innerHTML = ''; }, 300);
            }
          };
          document.getElementById('kidSettingsClose')?.addEventListener('click', closeSettings);
          document.getElementById('kidSettingsOverlay')?.addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeSettings();
          });
        }

        // ══════════════════════════════════════════
        // Swipe to change day (admin-toggled)
        // ══════════════════════════════════════════

        if (ks.canSwipeDays) {
          let swipeStartX = 0;
          let swipeStartY = 0;
          main.addEventListener('touchstart', (e) => {
            swipeStartX = e.touches[0].clientX;
            swipeStartY = e.touches[0].clientY;
          }, { passive: true });
          main.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - swipeStartX;
            const dy = e.changedTouches[0].clientY - swipeStartY;
            if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
              viewDate = addDays(viewDate, dx < 0 ? 1 : -1);
              celebrationShown = false;
              overdueExpanded = false;
              subscribeSchedule(viewDate);
              loadData();
            }
          }, { passive: true });
        }

        // ══════════════════════════════════════════
        // Real-time listeners
        // ══════════════════════════════════════════

        const debouncedRender = debounce(() => render(), 100);

        // Completions listener — stays active for the lifetime of the page
        onCompletions(async (val) => {
          completions = val || {};
          await loadData();
          debouncedRender();
        });

        // Schedule listener — resubscribed when viewDate changes
        let unsubscribeSchedule = null;

        function subscribeSchedule(dateKey) {
          if (unsubscribeSchedule) unsubscribeSchedule();
          unsubscribeSchedule = onScheduleDay(dateKey, (val) => {
            const daySched = val || {};
            viewEntries = filterByPerson(daySched, kid.id);
            debouncedRender();
          });
        }

        // ══════════════════════════════════════════
        // Initial load
        // ══════════════════════════════════════════

        // Subscribe to today's schedule (fires immediately with current data)
        subscribeSchedule(viewDate);
        // Load overdue items and streaks (one-shot)
        await loadData();
        // Listeners will trigger debouncedRender; run render immediately for first paint
        render();
      }
    }
  </script>
</body>
</html>
