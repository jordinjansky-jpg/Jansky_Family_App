    // ── Cached theme (device override > family cache > default) ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    const settings = await readSettings();
    if (settings?.theme) applyTheme(resolveTheme(settings.theme));

    // ── Check for kid parameter ──
    const params = new URLSearchParams(window.location.search);
    const kidName = params.get('kid');

    const main = document.getElementById('mainContent');

    if (!kidName) {
      document.getElementById('loadingState').style.display = 'none';
      main.style.display = '';
      main.innerHTML = `
        <div class="kid-error">
          <div class="kid-error__emoji">🔒</div>
          <h2 class="kid-error__title">Kid Mode</h2>
          <p class="kid-error__desc">This page requires a kid name parameter.<br>Ask a parent for your link!</p>
        </div>`;
    } else {
      // Verify the kid exists
      const peopleObj = await readPeople();
      const people = peopleObj ? Object.entries(peopleObj).map(([id, p]) => ({ id, ...p })) : [];
      const kid = people.find(p => p.name.toLowerCase() === kidName.toLowerCase() && p.role === 'child');

      if (!kid) {
        document.getElementById('loadingState').style.display = 'none';
        main.style.display = '';
        main.innerHTML = `
          <div class="kid-error">
            <div class="kid-error__emoji">🤔</div>
            <h2 class="kid-error__title">Who's ${esc(kidName)}?</h2>
            <p class="kid-error__desc">We couldn't find a kid with that name.<br>Check with a parent to make sure the name is right.</p>
          </div>`;
      } else {
        // ══════════════════════════════════════════
        // KID MODE — Main App
        // ══════════════════════════════════════════

        // Apply per-person theme if set
        if (kid.theme?.preset) {
          applyTheme(kid.theme);
        }

        document.title = `${esc(kid.name)}'s Daily Rundown`;

        // ── Offline/Online banner ──
        initOfflineBanner(onConnectionChange, { showConnectionDot: false });

        const [tasksObj, catsObj, rewardsObj, kidMessages, kidBank, kidWishlist, kidAchievements, allSnapshots, allAnchors, allMultipliers, achDefsObj] = await Promise.all([
          readTasks(), readCategories(),
          readRewards(), readMessages(kid.id), readBank(kid.id), readWishlist(kid.id),
          readAchievements(kid.id), readAllSnapshots(), readAllBalanceAnchors(), readMultipliers(),
          readAchievementDefs()
        ]);
        const tasks = tasksObj || {};
        const cats = catsObj || {};
        const tz = settings?.timezone || 'America/Chicago';
        const today = todayKey(tz);
        const ks = kid.kidSettings || {};

        let rewards = rewardsObj || {};
        let messages = kidMessages || {};
        let bank = kidBank || {};
        let wishlist = kidWishlist || {};
        let achievements = kidAchievements || {};
        const anchor = allAnchors?.[kid.id] || null;
        const multipliers = allMultipliers || {};
        const allAchDefs = mergeAchievementDefs(achDefsObj || {});
        const activeDefs = getActiveAchievements(allAchDefs);

        // Calculate balance
        let { balance, totalEarned } = calculateBalance(kid.id, allSnapshots, messages, anchor, multipliers, tz);
        let prevBalance = balance;

        // ── Check for new achievements ──
        const kidStreak = (await readStreaks(kid.id)) || { current: 0, best: 0 };
        const weekS = weekStart(today);
        const weekE = weekEnd(today);
        const monthS = monthStart(today);
        const monthE = monthEnd(today);

        const weekAgg = periodGrade(allSnapshots, kid.id, weekS, weekE);
        const monthAgg = periodGrade(allSnapshots, kid.id, monthS, monthE);

        // Get today's grade for achievement checking
        const todaySchedule = (await readOnce(`schedule/${today}`)) || {};
        const todayEntries = {};
        for (const [k, e] of Object.entries(todaySchedule)) {
          if (e.ownerId === kid.id) todayEntries[k] = e;
        }
        const todayCompletions = (await readCompletions()) || {};
        const todayScoreResult = dailyScore(todayEntries, todayCompletions, tasks, cats, settings, today, today);
        const todayGrade = todayScoreResult.grade || 'F';

        const hasRedeemed = Object.values(messages).some(m => m.type === 'redemption-approved');

        const newAchievements = checkNewAchievements({
          streak: kidStreak.current,
          totalEarned,
          existingAchievements: achievements,
          weeklyGrade: weekAgg.grade,
          monthlyGrade: monthAgg.grade,
          dailyGrade: todayGrade,
          hasRedeemed,
          personId: kid.id,
          achievementDefs: activeDefs
        });

        for (const key of newAchievements) {
          if (achievements[key]?.revoked) continue;
          await writeAchievement(kid.id, key, { unlockedAt: Date.now(), seen: false });
          achievements[key] = { unlockedAt: Date.now(), seen: false };
          // Grant point reward immediately as bonus message
          const achDef = activeDefs[key];
          if (achDef?.reward?.type === 'points' && achDef.reward.amount > 0) {
            await writeMessage(kid.id, {
              type: 'bonus', title: `🏅 ${achDef.label}`, body: `Achievement reward: +${achDef.reward.amount} pts`,
              amount: achDef.reward.amount, rewardId: null, entryKey: null,
              seen: true, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system'
            });
            balance += achDef.reward.amount;
          }
        }

        // ── Re-check achievements after events (task completion, bounty, redemption) ──
        async function recheckAchievements() {
          const freshStreak = (await readStreaks(kid.id)) || { current: 0, best: 0 };
          streakData = freshStreak;
          const freshMessages = (await readMessages(kid.id)) || {};
          messages = freshMessages;
          const { balance: freshBal, totalEarned: freshTotal } = calculateBalance(kid.id, allSnapshots, freshMessages, anchor, multipliers, tz);
          balance = freshBal;
          const freshHasRedeemed = Object.values(freshMessages).some(m => m.type === 'redemption-approved');
          const freshSched = (await readOnce(`schedule/${today}`)) || {};
          const freshKidEntries = {};
          for (const [k, e] of Object.entries(freshSched)) {
            if (e.ownerId === kid.id) freshKidEntries[k] = e;
          }
          const freshComps = await readCompletions();
          const freshScore = dailyScore(freshKidEntries, freshComps, tasks, cats, settings, today, today);
          const freshWeek = periodGrade(allSnapshots, kid.id, weekS, weekE);
          const freshMonth = periodGrade(allSnapshots, kid.id, monthS, monthE);

          const newKeys = checkNewAchievements({
            streak: freshStreak.current,
            totalEarned: freshTotal,
            existingAchievements: achievements,
            weeklyGrade: freshWeek.grade,
            monthlyGrade: freshMonth.grade,
            dailyGrade: freshScore.grade || 'F',
            hasRedeemed: freshHasRedeemed,
            personId: kid.id,
            achievementDefs: activeDefs
          });

          let awarded = 0;
          for (const key of newKeys) {
            if (achievements[key]?.revoked) continue;
            await writeAchievement(kid.id, key, { unlockedAt: Date.now(), seen: false });
            achievements[key] = { unlockedAt: Date.now(), seen: false };
            // Grant point reward immediately as bonus message
            const achDef = activeDefs[key];
            if (achDef?.reward?.type === 'points' && achDef.reward.amount > 0) {

                type: 'bonus', title: `🏅 ${achDef.label}`, body: `Achievement reward: +${achDef.reward.amount} pts`,

                seen: true, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system'

              balance += achDef.reward.amount;
            }
            awarded++;
          }
          if (awarded > 0) showUnseenAchievements();

        function taskNameWithEmoji(name) {
          if (!ks.showTaskEmoji) return name;
          const matched = [];
          const seen = new Set();
          for (const [regex, e1, e2] of TASK_EMOJI_MAP) {
            if (!regex.test(name)) continue;
            if (!seen.has(e1)) { seen.add(e1); matched.push(e1); }
            if (e2 && !seen.has(e2)) { seen.add(e2); matched.push(e2); }
            if (matched.length >= 2) break;
          }
          if (matched.length === 0) return name;
          return name + ' ' + matched.join('');
        }

        // Helper to wrap task for kid emoji display
        function kidTask(task) {
          return { ...task, name: taskNameWithEmoji(task.name) };

        // ── App state ──
        let viewDate = today;

        {

        // loadData loads overdue items and streaks (completions and schedule/{viewDate} come from listeners)
        async function loadData() {
          const [allSched, streaks] = await Promise.all([
            readAllSchedule(),
            readStreaks(kid.id)
          ]);
          const allOverdue = getOverdueEntries(allSched || {}, completions, today, tasks);
          overdueItems = allOverdue.filter(e => e.ownerId === kid.id);
          suppressedCooldownTaskIds = getOverdueCooldownTaskIds(allSched || {}, completions, tasks, today);
          streakData = streaks || { current: 0, best: 0 };

        // ══════════════════════════════════════════
        // Render

        // ══════════════════════════════════════════
        // Message overlay (unseen messages)
        // ══════════════════════════════════════════

        const VISIBLE_MSG_TYPES = ['bonus', 'deduction', 'redemption-approved', 'redemption-denied', 'use-approved', 'use-denied', 'task-skip-used', 'penalty-removed'];
        const POSITIVE_MSG_TYPES = ['bonus', 'redemption-approved', 'use-approved', 'task-skip-used', 'penalty-removed'];

        function showUnseenMessages() {
          const unseen = Object.entries(messages)
            .filter(([, m]) => !m.seen && VISIBLE_MSG_TYPES.includes(m.type))
            .sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));

          if (unseen.length === 0) return;

          const [msgId, msg] = unseen[0];
          const isPositive = POSITIVE_MSG_TYPES.includes(msg.type);
          const amountDisplay = msg.amount > 0 ? `+${msg.amount}` : msg.amount;
          const mount = document.getElementById('celebrationMount');

          // For approved rewards, show Use Now / Save choice
          const isApproval = msg.type === 'redemption-approved';
          const reward = isApproval && msg.rewardId ? rewards[msg.rewardId] : null;
          const isFunctional = reward && (reward.rewardType === 'task-skip' || reward.rewardType === 'penalty-removal');

          let buttonsHtml;
          if (isApproval) {
            buttonsHtml = `<div style="display: flex; gap: 8px; justify-content: center; margin-top: 12px;">
              <button class="btn btn--primary kid-msg-overlay__use-now" type="button">Use Now</button>
              <button class="btn btn--secondary kid-msg-overlay__save" type="button">Save for Later</button>
            </div>`;
          } else {
            buttonsHtml = `<button class="btn btn--primary kid-msg-overlay__dismiss" type="button">Got it!</button>`;
          }

          mount.innerHTML = `<div class="kid-msg-overlay ${isPositive ? 'kid-msg-overlay--positive' : 'kid-msg-overlay--negative'}">
            <div class="kid-msg-overlay__card">
              <div class="kid-msg-overlay__icon">${isPositive ? '⭐' : '📋'}</div>
              <h3 class="kid-msg-overlay__title">${esc(msg.title || msg.type)}</h3>
              ${msg.body ? `<p class="kid-msg-overlay__body">${esc(msg.body)}</p>` : ''}
              ${msg.amount ? `<div class="kid-msg-overlay__amount ${isPositive ? 'kid-msg-overlay__amount--positive' : 'kid-msg-overlay__amount--negative'}">${amountDisplay} pts</div>` : ''}
              ${isApproval ? `<p style="color: var(--text-secondary); font-size: var(--font-size-sm); margin-top: 8px;">Saved to your rewards bank</p>` : ''}
              ${buttonsHtml}
            </div>
          </div>`;

          async function dismissAndContinue() {
            await markMessageSeen(kid.id, msgId);
            messages[msgId].seen = true;
            mount.innerHTML = renderCelebration();
            applyDataColors(mount);
            showUnseenMessages();
            if (!Object.values(messages).some(m => !m.seen && VISIBLE_MSG_TYPES.includes(m.type))) {
              showUnseenAchievements();
            }
          }

          mount.querySelector('.kid-msg-overlay__dismiss')?.addEventListener('click', dismissAndContinue);

          // "Save for Later" — just dismiss, token stays in bank
          mount.querySelector('.kid-msg-overlay__save')?.addEventListener('click', dismissAndContinue);

          // "Use Now" — for functional rewards, apply immediately; for custom, send use-request
          mount.querySelector('.kid-msg-overlay__use-now')?.addEventListener('click', async () => {
            if (isFunctional) {
              // Find the newest unused token of this type
              const token = Object.entries(bank).find(([, t]) => t.rewardId === msg.rewardId && !t.used);
              if (token) {
                if (reward.rewardType === 'task-skip') {
                  // Just dismiss — kid uses it from the bank when they pick a task
                  await dismissAndContinue();
                  return;
                } else if (reward.rewardType === 'penalty-removal') {
                  // Apply immediately to highest-damage penalty
                  const freshSched = await readAllSchedule() || {};
                  const freshComps = await readCompletions() || {};
                  const penalty = findHighestDamagePenalty(freshComps, freshSched, tasks, settings, kid.id);
                  if (penalty) {
                    await markBankTokenUsed(kid.id, token[0], penalty.entryKey);
                    await updateData(`completions/${penalty.entryKey}`, { isLate: null, pointsOverride: null });
                    bank[token[0]].used = true;
                    await writeMessage(kid.id, { type: 'penalty-removed', title: `Restored: ${penalty.taskName}`, body: `Full points restored (+${penalty.pointsRestored} pts)`, amount: penalty.pointsRestored, rewardId: null, entryKey: penalty.entryKey, seen: false, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system' });
                  }
                  await dismissAndContinue();
                  return;
                }
              }
              await dismissAndContinue();
            } else {
              // Custom reward — send use-request for parent approval
              const token = Object.entries(bank).find(([, t]) => t.rewardId === msg.rewardId && !t.used);
              if (token) {
                // Guard against duplicate use-request if one is already pending
                const alreadyPending = Object.values(messages).some(m =>
                  m.type === 'use-request' && !m.seen && m.bankTokenId === token[0]);
                if (alreadyPending) { await dismissAndContinue(); return; }
                await writeMessage(kid.id, {
                  type: 'use-request',
                  title: reward?.name || msg.title || 'Reward',
                  body: null,
                  amount: 0,
                  rewardId: msg.rewardId,
                  rewardName: reward?.name || 'Reward',
                  rewardIcon: reward?.icon || '🎁',
                  bankTokenId: token[0],
                  entryKey: null,
                  seen: false,
                  createdAt: firebase.database.ServerValue.TIMESTAMP,
                  createdBy: kid.id
                });
              }
              await dismissAndContinue();
            }
          });
        }

        function animateBalance(el, from, to) {
          if (from === to || !el) return;
          const duration = 600;
          const start = performance.now();
          const step = (now) => {
            const t = Math.min((now - start) / duration, 1);
            const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
            el.textContent = Math.round(from + (to - from) * eased).toLocaleString();
            if (t < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        }

          // Wishlist progress
          const wishlistItems = Object.keys(wishlist).map(rid => rewards[rid]).filter(Boolean);
          if (wishlistItems.length > 0) {
            for (const r of wishlistItems) {
              const wProgress = Math.min(100, Math.round((balance / r.pointCost) * 100));

          html += `</div>`;

          // ── Bank (Saved Rewards) ──
          const unusedTokens = Object.entries(bank).filter(([, t]) => !t.used);
          if (unusedTokens.length > 0) {

                    const allPending = g.tokens.every(t => t.isPending);
                    const firstUsable = g.tokens.find(t => !t.isPending);
                    return `<div class="kid-bank__token kid-bank__token--custom${allPending ? ' kid-bank__token--pending' : ''}">
                      <span class="kid-bank__token-icon">${esc(g.icon)}</span>
                      <span class="kid-bank__token-name">${esc(g.name)}${count > 1 ? ` <span class="kid-bank__count">&times;${count}</span>` : ''}</span>
                      ${allPending
                        ? `<span class="kid-bank__token-status">Pending...</span>`
                        : `<button class="btn btn--xs btn--primary kid-bank__use-btn" data-token-id="${esc(firstUsable.tokenId)}" type="button">Use</button>`}
                    </div>`;
                  }).join('');
                })()}
              </div>
            </details>`;
          }

          // ── Stats bar ──
          html += `<div class="kid-stats">
            <div class="kid-stats__item">
              ${score.possible > 0 ? renderGradeBadge(gd.grade, gd.tier) : '<span class="kid-stats__value">--</span>'}
              <span class="kid-stats__label">${score.possible > 0 ? score.percentage + '%' : 'Grade'}</span>
            </div>
            <div class="kid-stats__item">
              <span class="kid-stats__value">${prog.done}/${prog.total}</span>
              <span class="kid-stats__label">Tasks</span>
            </div>
            <div class="kid-stats__item">
              <span class="kid-stats__value">🔥 ${streakData.current || 0}</span>
              <span class="kid-stats__label">Streak</span>
            </div>
          </div>`;

          // ── Week tabs (conditional) ──
          if (ks.showWeekView) {
            const monday = weekStart(today);
            const sunday = weekEnd(today);
            const weekDays = dateRange(monday, sunday);
            html += `<div class="kid-week-tabs">`;
            for (const day of weekDays) {
              const d = new Date(day + 'T12:00:00Z');
              const dayNum = d.getUTCDate();
              const dayShort = DAY_NAMES_SHORT[d.getUTCDay()];
              const isActive = day === viewDate;
              const isTodayTab = day === today;
              let cls = 'kid-week-tab';
              if (isActive) cls += ' kid-week-tab--active';
              if (isTodayTab) cls += ' kid-week-tab--today';
              html += `<button class="${cls}" data-date="${day}" type="button">
                <span class="kid-week-tab__day">${dayShort}</span>
                <span class="kid-week-tab__num">${dayNum}</span>
              </button>`;
            }
            html += `</div>`;
          }

          // ── Progress bar ──
          html += renderProgressBar(prog.done, prog.total);

          // ── Overdue banner (only on today view) ──
          const overdueActive = overdueItems.filter(e => !isComplete(e.entryKey, completions));
          if (isToday && overdueActive.length > 0) {
            html += renderOverdueBanner(overdueActive.length);
            html += `<div class="overdue-list" id="overdueList" style="display:${overdueExpanded ? 'block' : 'none'};">`;
            for (const item of overdueActive) {
              const task = tasks[item.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
              const cat = task.category ? cats[task.category] : null;
              const pts = basePoints(task, settings?.difficultyMultipliers);
              const ovr = completions[item.entryKey]?.pointsOverride ?? item.pointsOverride ?? null;
              html += renderTaskCard({
                entryKey: item.entryKey,
                entry: { ...item, dateKey: item.dateKey },
                task: kidTask(task),
                person: kid,
                category: cat,
                completed: isComplete(item.entryKey, completions),
                overdue: true,
                dateLabel: `Overdue`,
                points: { possible: pts, override: ovr },
                isEvent: !!cat?.isEvent,
                showPoints: settings?.showPoints !== false,
                showTodIconBoth: !!settings?.showTodIconBoth,
                showTodIconSingle: !!settings?.showTodIconSingle
              });
            }
            html += `</div>`;
          }

          // ── Day's tasks ──
          html += `<div class="kid-tasks">`;
          if (prog.total === 0) {
            html += renderEmptyState('', '', '', { variant: 'kid-free' });
          } else {
            // Split incomplete / completed
            const incomplete = {};
            const completed_ = {};
            for (const [key, entry] of Object.entries(displayEntries)) {
              if (isComplete(key, completions)) completed_[key] = entry;
              else incomplete[key] = entry;
            }

            const allDone = Object.keys(incomplete).length === 0 && Object.keys(completed_).length > 0;

            if (allDone) {
              // ── Victory screen! ──
              const v = pickVictoryScene();
              const personalTitle = v.title;
              const personalSub = v.subtitle.replace(/\{name\}/g, esc(kid.name));
              html += `<div class="kid-victory">
                <div class="kid-victory__scene">${v.scene}</div>
                <div class="kid-victory__title">${personalTitle}</div>
                <div class="kid-victory__subtitle">${personalSub}</div>
                <div class="kid-victory__completed-label">${prog.done} tasks crushed today</div>
              </div>`;

              // Still show completed tasks collapsed below, grouped by frequency
              html += renderTimeHeader(`Completed (${Object.keys(completed_).length})`);
              const compGroups = groupByFrequency(completed_, tasks, cats);
              const compSections = [
                { key: 'events', label: 'Events' },
                { key: 'daily', label: 'Daily' },
                { key: 'weekly', label: 'Weekly' },
                { key: 'monthly', label: 'Monthly' },
                { key: 'once', label: 'One-Time' }
              ];
              const compNonEmpty = compSections.filter(s => Object.keys(compGroups[s.key]).length > 0);
              const showCompHeaders = compNonEmpty.length > 1;
              for (const sec of compSections) {
                const entries = compGroups[sec.key];
                const sorted = sortEntries(entries, completions);
                if (sorted.length === 0) continue;
                if (showCompHeaders) html += renderTimeHeader(sec.label);
                for (const [entryKey, entry] of sorted) {
                  const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
                  const cat = task.category ? cats[task.category] : null;
                  const pts = score.pointsMap[entryKey] || basePoints(task, settings?.difficultyMultipliers);
                  const ovr = completions[entryKey]?.pointsOverride ?? entry.pointsOverride ?? null;
                  html += renderTaskCard({
                    entryKey,
                    entry: { ...entry, dateKey: viewDate },
                    task: kidTask(task),
                    person: kid,
                    category: cat,
                    completed: true,
                    overdue: false,
                    points: { possible: pts, override: ovr },
                    isEvent: !!cat?.isEvent,
                    showPoints: settings?.showPoints !== false,
                    showTodIconBoth: !!settings?.showTodIconBoth,
                    showTodIconSingle: !!settings?.showTodIconSingle
                  });
                }
              }
            } else {
              // Incomplete grouped by frequency
              const groups = groupByFrequency(incomplete, tasks, cats);
              const sections = [
                { key: 'events', label: 'Events' },
                { key: 'daily', label: 'Daily' },
                { key: 'weekly', label: 'Weekly' },
                { key: 'monthly', label: 'Monthly' },
                { key: 'once', label: 'One-Time' }
              ];
              const nonEmpty = sections.filter(s => Object.keys(groups[s.key]).length > 0);
              const showHeaders = nonEmpty.length > 1;

              for (const sec of sections) {
                const entries = groups[sec.key];
                const sorted = sortEntries(entries, completions);
                if (sorted.length === 0) continue;
                if (showHeaders) html += renderTimeHeader(sec.label);

                for (const [entryKey, entry] of sorted) {
                  const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
                  const cat = task.category ? cats[task.category] : null;
                  const pts = score.pointsMap[entryKey] || basePoints(task, settings?.difficultyMultipliers);
                  const ovr = completions[entryKey]?.pointsOverride ?? entry.pointsOverride ?? null;
                  html += renderTaskCard({
                    entryKey,
                    entry: { ...entry, dateKey: viewDate },
                    task: kidTask(task),
                    person: kid,
                    category: cat,
                    completed: false,
                    overdue: false,
                    points: { possible: pts, override: ovr },
                    isEvent: !!cat?.isEvent,
                    showPoints: settings?.showPoints !== false,
                    isPastDaily: viewDate < today && entry.rotationType === 'daily',
                    showTodIconBoth: !!settings?.showTodIconBoth,
                    showTodIconSingle: !!settings?.showTodIconSingle
                  });
                }
              }

              // Completed at bottom, grouped by frequency
              const completedEntries = Object.entries(completed_);
              if (completedEntries.length > 0) {
                html += renderTimeHeader(`Completed (${completedEntries.length})`);
                const compGroups2 = groupByFrequency(completed_, tasks, cats);
                const compNonEmpty2 = sections.filter(s => Object.keys(compGroups2[s.key]).length > 0);
                const showCompHeaders2 = compNonEmpty2.length > 1;
                for (const sec of sections) {
                  const entries = compGroups2[sec.key];
                  const sorted = sortEntries(entries, completions);
                  if (sorted.length === 0) continue;
                  if (showCompHeaders2) html += renderTimeHeader(sec.label);
                  for (const [entryKey, entry] of sorted) {
                    const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
                    const cat = task.category ? cats[task.category] : null;
                    const pts = score.pointsMap[entryKey] || basePoints(task, settings?.difficultyMultipliers);
                    const ovr = completions[entryKey]?.pointsOverride ?? entry.pointsOverride ?? null;
                    html += renderTaskCard({
                      entryKey,
                      entry: { ...entry, dateKey: viewDate },
                      task: kidTask(task),
                      person: kid,
                      category: cat,
                      completed: true,
                      overdue: false,
                      points: { possible: pts, override: ovr },
                      isEvent: !!cat?.isEvent,
                      showPoints: settings?.showPoints !== false,
                      showTodIconBoth: !!settings?.showTodIconBoth,
                      showTodIconSingle: !!settings?.showTodIconSingle
                    });
                  }
                }
              }
            }
          }
          html += `</div>`;

          main.innerHTML = html;
          applyDataColors(main);

          // Animate balance count-up if changed
          if (prevBalance !== balance) {
            const balEl = main.querySelector('.kid-balance__amount');
            animateBalance(balEl, prevBalance, balance);
            prevBalance = balance;
          }

          // Add lock icon to pin-protected task cards
          main.querySelectorAll('.task-card').forEach(card => {
            const ek = card.dataset.entryKey;
            if (ek && isTaskPinProtected(ek) && !card.querySelector('.task-card__lock')) {
              const nameEl = card.querySelector('.task-card__name');
              if (nameEl) nameEl.insertAdjacentHTML('beforeend', '<span class="task-card__lock">🔒</span>');
            }
          });

          bindEvents();
        }

        // ══════════════════════════════════════════
        // Event binding
        // ══════════════════════════════════════════

        function bindEvents() {
          // Week tabs
          main.querySelectorAll('.kid-week-tab').forEach(btn => {
            btn.addEventListener('click', () => {
              viewDate = btn.dataset.date;
              celebrationShown = false;
              overdueExpanded = false;
              subscribeSchedule(viewDate);
              loadData();
            });
          });

          // Task cards: tap to toggle, long-press for detail
          // Movement threshold (px) — cancel long-press if finger moves more than this (scroll detection)
          const PRESS_MOVE_THRESHOLD = 10;
          main.querySelectorAll('.task-card').forEach(btn => {
            let pressTimer = null;
            let didLongPress = false;
            let startX = 0, startY = 0;

            const startPress = (e) => {
              didLongPress = false;
              startX = e.clientX; startY = e.clientY;
              pressTimer = setTimeout(() => {
                didLongPress = true;
                pressTimer = null;
                openTaskSheet(btn.dataset.entryKey, btn.dataset.dateKey);
              }, settings?.kidLongPressMs ?? 500);
            };

            const movePress = (e) => {
              if (pressTimer && (Math.abs(e.clientX - startX) > PRESS_MOVE_THRESHOLD || Math.abs(e.clientY - startY) > PRESS_MOVE_THRESHOLD)) {
                clearTimeout(pressTimer); pressTimer = null;
              }
            };

            const endPress = () => {
              clearTimeout(pressTimer);
              pressTimer = null;
              if (!didLongPress) {
                // Block tap on past incomplete daily tasks — must use detail sheet
                const ek = btn.dataset.entryKey;
                const dk = btn.dataset.dateKey || viewDate;
                const entry = viewEntries[ek] || overdueItems.find(o => o.entryKey === ek);
                if (entry && dk < today && entry.rotationType === 'daily' && !isComplete(ek, completions)) {
                  openTaskSheet(ek, dk);
                  return;
                }
                toggleTask(ek, dk);
              }
            };

            const cancelPress = () => { clearTimeout(pressTimer); pressTimer = null; };

            btn.addEventListener('pointerdown', startPress);
            btn.addEventListener('pointermove', movePress);
            btn.addEventListener('pointerup', endPress);
            btn.addEventListener('pointerleave', cancelPress);
            btn.addEventListener('pointercancel', cancelPress);
            btn.addEventListener('contextmenu', e => e.preventDefault());
          });

          // Gear icon opens settings
          document.getElementById('kidGearBtn')?.addEventListener('click', openKidSettings);

          // Trophy icon opens achievements sheet
          document.getElementById('kidTrophyBtn')?.addEventListener('click', () => {
            const mount = document.getElementById('taskSheetMount');
            mount.innerHTML = renderBottomSheet(renderTrophyCaseSheet(achievements));
            requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });
            mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
              if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
            });
          });

          // ── Store button ──
          document.getElementById('kidStoreBtn')?.addEventListener('click', async () => {
            const mount = document.getElementById('taskSheetMount');

            // Count redemptions per reward globally (across all people) for maxRedemptions check
            const redemptionCounts = {};
            const rewardsWithLimits = Object.entries(rewards).filter(([, r]) => r.maxRedemptions);
            for (const [rid] of rewardsWithLimits) {
              redemptionCounts[rid] = await countGlobalRedemptions(rid);
            }

            // Track pending requests to prevent double-spend
            const pendingRewardIds = new Set(
              Object.values(messages)
                .filter(m => m.type === 'redemption-request' && !m.seen)
                .map(m => m.rewardId)
            );

            const available = Object.entries(rewards)
              .filter(([id, r]) => {
                if (r.status !== 'active') return false;
                if (r.expiresAt && Date.now() > r.expiresAt) return false;
                if (r.perPerson && !r.perPerson.includes(kid.id)) return false;
                if (pendingRewardIds.has(id)) return false;
                if (r.maxRedemptions && (redemptionCounts[id] || 0) >= r.maxRedemptions) return false;
                return true;
              })
              .map(([id, r]) => ({ id, ...r }));

            available.sort((a, b) => {
              const aOk = balance >= a.pointCost && streakData.current >= (a.streakRequirement || 0);
              const bOk = balance >= b.pointCost && streakData.current >= (b.streakRequirement || 0);
              if (aOk && !bOk) return -1;
              if (!aOk && bOk) return 1;
              return a.pointCost - b.pointCost;
            });

            // Pending requests
            const pendingRequests = Object.entries(messages)
              .filter(([, m]) => m.type === 'redemption-request' && !m.seen)
              .map(([msgId, m]) => ({ msgId, reward: rewards[m.rewardId] || {}, amount: Math.abs(m.amount) }));

            let storeHtml = `<div class="store-header"><span class="store-balance">💰 ${balance.toLocaleString()} pts</span></div>`;

            // Bounty tasks section — show available bounties the kid can earn today
            const bountyTasks = Object.entries(viewEntries)
              .filter(([key, entry]) => {
                if (entry.ownerId !== kid.id) return false;
                if (completions[key]) return false;
                const t = tasks[entry.taskId];
                return t?.bounty;
              })
              .map(([key, entry]) => ({ entryKey: key, entry, task: tasks[entry.taskId] }));

            if (bountyTasks.length > 0) {
              storeHtml += `<div class="store-bounties"><h4 style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-bottom: 8px;">🎯 Earn Extra</h4>`;
              for (const bt of bountyTasks) {
                const bountyValue = bt.task.bounty.type === 'points'
                  ? `+${bt.task.bounty.amount} pts`
                  : `🎁 ${rewards[bt.task.bounty.rewardId]?.name || 'Reward'}`;
                storeHtml += `<div class="store-card store-card--bounty" style="border-color: var(--accent-success, #48bb78);">
                  <div class="store-card__icon">🎯</div>
                  <div class="store-card__body">
                    <div class="store-card__name">${esc(bt.task.name)}</div>
                    <div class="store-card__cost" style="color: var(--accent-success, #48bb78);">${bountyValue}</div>
                  </div>
                </div>`;
              }
              storeHtml += `</div>`;
            }

            if (pendingRequests.length > 0) {
              storeHtml += `<div class="store-pending"><h4 style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-bottom: 8px;">Pending Requests</h4>`;
              for (const req of pendingRequests) {
                storeHtml += `<div class="store-card store-card--pending" style="border-color: var(--accent-warning, #ecc94b); opacity: 0.8;">
                  <div class="store-card__icon">${esc(req.reward.icon || '🎁')}</div>
                  <div class="store-card__body">
                    <div class="store-card__name">${esc(req.reward.name || 'Reward')}</div>
                    <div class="store-card__cost">${req.amount} pts — waiting for approval</div>
                  </div>
                  <div class="store-card__actions">
                    <button class="btn btn--sm btn--ghost store-cancel-btn" data-msg-id="${esc(req.msgId)}" data-reward-name="${esc(req.reward.name || 'Reward')}" data-amount="${req.amount}" type="button">Cancel</button>
                  </div>
                </div>`;
              }
              storeHtml += `</div>`;
            }

            if (available.length === 0 && pendingRequests.length === 0) {
              storeHtml += `<div style="text-align: center; padding: 32px; color: var(--text-secondary);"><div style="font-size: 2rem; margin-bottom: 8px;">🏪</div><p>No rewards available yet!</p></div>`;
            }

            for (const reward of available) {
              const canAfford = balance >= reward.pointCost;
              const meetsStreak = streakData.current >= (reward.streakRequirement || 0);
              const canRequest = canAfford && meetsStreak;
              const isWishlisted = !!wishlist[reward.id];
              const storeProgress = Math.min(100, Math.round((balance / reward.pointCost) * 100));
              const daysNeeded = canAfford ? 0 : Math.ceil((reward.pointCost - balance) / 85);
              const almostThere = !canAfford && daysNeeded <= 2;

              let stockLabel = '';
              if (reward.maxRedemptions) {
                const used = redemptionCounts[reward.id] || 0;
                stockLabel = `<span class="store-card__badge">${reward.maxRedemptions - used} left</span>`;
              }

              let expiryLabel = '';
              if (reward.expiresAt) {
                const daysLeft = Math.ceil((reward.expiresAt - Date.now()) / 86400000);
                if (daysLeft <= 7) expiryLabel = `<span class="store-card__badge store-card__badge--warning">Expires in ${daysLeft} day${daysLeft !== 1 ? 's' : ''}</span>`;
              }

              storeHtml += `<div class="store-card ${almostThere ? 'store-card--almost' : ''} ${canRequest ? 'store-card--available' : ''}" data-reward-id="${reward.id}">
                <div class="store-card__icon">${esc(reward.icon || '🎁')}</div>
                <div class="store-card__body">
                  <div class="store-card__name">${esc(reward.name)}</div>
                  <div class="store-card__cost">${reward.pointCost.toLocaleString()} pts</div>
                  <div class="store-card__badges">
                    ${reward.streakRequirement ? `<span class="store-card__badge">🔥 ${reward.streakRequirement}-day streak${!meetsStreak ? ` (need ${reward.streakRequirement - streakData.current} more)` : ''}</span>` : ''}
                    ${stockLabel}${expiryLabel}
                  </div>
                  <div class="store-card__progress"><div class="store-card__progress-bar" style="width: ${storeProgress}%"></div></div>
                  ${almostThere ? `<div class="store-card__nudge">So close! ${daysNeeded} more day${daysNeeded > 1 ? 's' : ''}!</div>` : ''}
                  ${!canAfford && !almostThere ? `<div class="store-card__need">Need ${(reward.pointCost - balance).toLocaleString()} more pts</div>` : ''}
                </div>
                <div class="store-card__actions">
                  <button class="wishlist-btn ${isWishlisted ? 'wishlist-btn--active' : ''}" data-reward-id="${reward.id}" type="button" title="Wishlist"><svg width="16" height="16" viewBox="0 0 24 24" fill="${isWishlisted ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
                  ${canRequest ? `<button class="btn btn--sm btn--primary store-get-btn" data-reward-id="${reward.id}" type="button">Get it!</button>` : ''}
                </div>
              </div>`;
            }

            mount.innerHTML = renderBottomSheet(storeHtml);
            requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

            // Bind "Get it!" buttons
            for (const btn of mount.querySelectorAll('.store-get-btn')) {
              btn.addEventListener('click', async () => {
                const rewardId = btn.dataset.rewardId;
                const reward = rewards[rewardId];
                if (!reward || !await showConfirm({ title: `Spend ${reward.pointCost} pts on ${reward.name}?` })) return;

                await writeMessage(kid.id, {
                  type: 'redemption-request',
                  title: reward.name,
                  body: null,
                  amount: -reward.pointCost,
                  rewardId,
                  entryKey: null,
                  seen: false,
                  createdAt: firebase.database.ServerValue.TIMESTAMP,
                  createdBy: kid.id
                });

                mount.innerHTML = '';
                showToast(`Requested ${reward.name}! Waiting for approval...`);
              });
            }

            // Bind wishlist buttons
            for (const btn of mount.querySelectorAll('.wishlist-btn')) {
              btn.addEventListener('click', async () => {
                const rewardId = btn.dataset.rewardId;
                if (btn.classList.contains('wishlist-btn--active')) {
                  await removeWishlistItem(kid.id, rewardId);
                  delete wishlist[rewardId];
                  btn.classList.remove('wishlist-btn--active');
                } else {
                  await writeWishlistItem(kid.id, rewardId);
                  wishlist[rewardId] = { addedAt: Date.now() };
                  btn.classList.add('wishlist-btn--active');
                }
              });
            }

            // Bind cancel buttons
            for (const btn of mount.querySelectorAll('.store-cancel-btn')) {
              btn.addEventListener('click', async () => {
                const cancelMsgId = btn.dataset.msgId;
                const rewardName = btn.dataset.rewardName;
                const cancelAmount = parseInt(btn.dataset.amount) || 0;
                if (!await showConfirm({ title: `Cancel request for ${rewardName}?`, message: 'Points will be refunded.', danger: true })) return;

                await markMessageSeen(kid.id, cancelMsgId);
                await writeMessage(kid.id, { type: 'redemption-denied', title: `${rewardName} — cancelled`, body: null, amount: 0, rewardId: null, entryKey: null, seen: true, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system' });
                await writeMessage(kid.id, { type: 'bonus', title: `Refund: ${rewardName}`, body: null, amount: cancelAmount, rewardId: null, entryKey: null, seen: true, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system' });

                mount.innerHTML = '';
                showToast(`Cancelled — ${cancelAmount} pts refunded`);
              });
            }

            // Backdrop close
            mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
              if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
            });
          });

          // ── History button ──
          document.getElementById('kidHistoryBtn')?.addEventListener('click', () => {
            const mount = document.getElementById('taskSheetMount');
            const entries = [];

            // Add snapshot daily earnings
            if (allSnapshots) {
              for (const [dateKey, snapshotPeople] of Object.entries(allSnapshots)) {
                const snap = snapshotPeople?.[kid.id];
                if (!snap) continue;
                const mult = multipliers?.[dateKey]?.[kid.id]?.multiplier || 1;
                const earned = Math.round((snap.percentage || 0) * mult);
                entries.push({ date: dateKey, timestamp: new Date(dateKey + 'T23:59:59Z').getTime(), icon: '📊', title: 'Daily Score', amount: earned, type: 'earning' });
              }
            }

            // Add messages
            for (const msg of Object.values(messages)) {
              const icon = msg.type === 'bonus' ? '➕' : msg.type === 'deduction' ? '➖' : msg.type === 'redemption-request' ? '🛒' : msg.type === 'redemption-approved' ? '✅' : msg.type === 'redemption-denied' ? '❌' : msg.type === 'use-request' ? '📤' : msg.type === 'use-approved' ? '✅' : msg.type === 'use-denied' ? '❌' : msg.type === 'reward-used' ? '🎉' : msg.type === 'task-skip-used' ? '⏭️' : msg.type === 'penalty-removed' ? '🛡️' : '📋';
              entries.push({ date: msg.createdAt ? new Date(msg.createdAt).toLocaleDateString('en-CA', { timeZone: tz }) : '?', timestamp: msg.createdAt || 0, icon, title: msg.title || msg.type, amount: msg.amount || 0, type: msg.type });
            }

            entries.sort((a, b) => b.timestamp - a.timestamp);

            const grouped = {};
            for (const entry of entries) { if (!grouped[entry.date]) grouped[entry.date] = []; grouped[entry.date].push(entry); }

            let histHtml = '<h3 style="margin-bottom: 12px;">Point History</h3>';
            if (entries.length === 0) {
              histHtml += '<div style="text-align: center; padding: 32px; color: var(--text-secondary);">No history yet</div>';
            } else {
              for (const [date, items] of Object.entries(grouped)) {
                histHtml += `<div class="history-date">${date}</div>`;
                for (const item of items) {
                  const amtClass = item.amount >= 0 ? 'history-item__amount--positive' : 'history-item__amount--negative';
                  histHtml += `<div class="history-item"><span class="history-item__icon">${item.icon}</span><span class="history-item__title">${esc(item.title)}</span><span class="history-item__amount ${amtClass}">${item.amount >= 0 ? '+' : ''}${item.amount}</span></div>`;
                }
              }
            }

            mount.innerHTML = renderBottomSheet(histHtml);
            requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });
            mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
              if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
            });
          });

          // ── Task Skip button ──
          document.getElementById('useTaskSkip')?.addEventListener('click', async () => {
            const skippable = Object.entries(viewEntries)
              .filter(([key, entry]) => {
                if (entry.ownerId !== kid.id) return false;
                if (completions[key]) return false;
                if (entry.exempt) return false;
                const task = tasks[entry.taskId];
                if (!task) return false;
                const cat = task.category ? cats[task.category] : null;
                if (cat?.isEvent) return false;
                return true;
              });

            if (skippable.length === 0) { await showConfirm({ title: 'All tasks done — nothing to skip!', alert: true }); return; }

            const mount = document.getElementById('taskSheetMount');
            let skipHtml = '<h3 style="margin-bottom: 12px;">Pick a task to skip</h3>';
            for (const [key, entry] of skippable) {
              const task = tasks[entry.taskId];
              skipHtml += `<button class="skip-pick-btn" data-entry-key="${key}" type="button" style="display: block; width: 100%; text-align: left; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: var(--radius, 8px); background: var(--surface); cursor: pointer;">${esc(task.name)}</button>`;
            }
            mount.innerHTML = renderBottomSheet(skipHtml);
            requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

            for (const btn of mount.querySelectorAll('.skip-pick-btn')) {
              btn.addEventListener('click', async () => {
                const skipEntryKey = btn.dataset.entryKey;
                const token = Object.entries(bank).find(([, t]) => t.rewardType === 'task-skip' && !t.used);
                if (!token) return;

                await updateData(`schedule/${viewDate}/${skipEntryKey}`, { exempt: true, skipped: true });
                await markBankTokenUsed(kid.id, token[0], skipEntryKey);

                const skipEntry = viewEntries[skipEntryKey];
                const skipTask = tasks[skipEntry?.taskId];
                await writeMessage(kid.id, { type: 'task-skip-used', title: `Skipped: ${skipTask?.name || 'task'}`, body: null, amount: 0, rewardId: null, entryKey: skipEntryKey, seen: false, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system' });

                mount.innerHTML = '';
                bank[token[0]].used = true;
                render();
              });
            }

            mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
              if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
            });
          });

          // ── Penalty Removal button ──
          document.getElementById('usePenaltyRemoval')?.addEventListener('click', async () => {
            const allSched = await readAllSchedule();
            const freshCompletions = await readCompletions();
            const penalty = findHighestDamagePenalty(freshCompletions || {}, allSched || {}, tasks, settings, kid.id);

            if (!penalty) { await showConfirm({ title: 'No penalties to remove right now', alert: true }); return; }

            if (!await showConfirm({ title: `Restore full points for "${penalty.taskName}"?`, message: `${penalty.dateKey} — +${penalty.pointsRestored} pts` })) return;

            const token = Object.entries(bank).find(([, t]) => t.rewardType === 'penalty-removal' && !t.used);
            if (!token) return;

            await updateData(`completions/${penalty.entryKey}`, { isLate: null, pointsOverride: null });
            await markBankTokenUsed(kid.id, token[0], penalty.entryKey);
            await writeMessage(kid.id, { type: 'penalty-removed', title: `Restored: ${penalty.taskName}`, body: `Full points restored for ${penalty.dateKey} (+${penalty.pointsRestored} pts)`, amount: penalty.pointsRestored, rewardId: null, entryKey: penalty.entryKey, seen: false, createdAt: firebase.database.ServerValue.TIMESTAMP, createdBy: 'system' });

            // Rebuild snapshot — apply mutation locally to avoid race with Firebase propagation
            const freshComps = { ...(freshCompletions || {}) };
            if (freshComps[penalty.entryKey]) {
              freshComps[penalty.entryKey] = { ...freshComps[penalty.entryKey], isLate: null, pointsOverride: null };
            }
            const penDaySched = allSched[penalty.dateKey] || {};
            const penPersonEntries = {};
            for (const [k, e] of Object.entries(penDaySched)) {
              if (e.ownerId === kid.id) penPersonEntries[k] = e;
            }
            const newSnap = buildSnapshot(penPersonEntries, freshComps, tasks, cats, settings, penalty.dateKey);
            if (newSnap) await writeSnapshot(penalty.dateKey, kid.id, newSnap);

            bank[token[0]].used = true;
            render();
          });

          // ── Custom reward Use buttons (send use-request) ──
          for (const btn of document.querySelectorAll('.kid-bank__use-btn')) {
            btn.addEventListener('click', async () => {
              const tokenId = btn.dataset.tokenId;
              const token = bank[tokenId];
              if (!token || token.used) return;
              if (!await showConfirm({ title: `Use ${token.rewardName || 'this reward'}?`, message: 'A parent will need to approve.' })) return;

              await writeMessage(kid.id, {
                type: 'use-request',
                title: token.rewardName || 'Reward',
                body: null,
                amount: 0,
                rewardId: token.rewardId || null,
                rewardName: token.rewardName || 'Reward',
                rewardIcon: token.rewardIcon || '🎁',
                bankTokenId: tokenId,
                entryKey: null,
                seen: false,
                createdAt: firebase.database.ServerValue.TIMESTAMP,
                createdBy: kid.id
              });

              showToast(`Requested to use ${token.rewardName}! Waiting for approval...`);
              render();
            });
          }

          // Overdue toggle
          const overdueBtn = document.getElementById('overdueToggle');
          if (overdueBtn) {
            overdueBtn.addEventListener('click', () => {
              overdueExpanded = !overdueExpanded;
              const list = document.getElementById('overdueList');
              const arrow = document.getElementById('overdueArrow');
              if (list) list.style.display = overdueExpanded ? 'block' : 'none';
              if (arrow) arrow.classList.toggle('expanded', overdueExpanded);
            });
          }
        }

        // ══════════════════════════════════════════
        // PIN-protected category check
        // ══════════════════════════════════════════

        function isTaskPinProtected(entryKey) {
          const entry = viewEntries[entryKey] || (overdueItems || []).find(e => e.entryKey === entryKey);
          if (!entry) return false;
          const task = tasks[entry.taskId];
          if (!task || !task.category) return false;
          const cat = cats[task.category];
          return !!cat?.pinProtected;
        }

        function requirePin() {
          return new Promise((resolve) => {
            const adminPin = settings?.adminPin || '';
            const recoveryPin = '2522'; // Fixed backstop per CLAUDE.md — never read from settings
            const mount = document.getElementById('pinPromptMount');
            mount.innerHTML = `
              <div class="kid-pin-overlay" id="kidPinOverlay">
                <div class="kid-pin-dialog">
                  <div class="kid-pin-dialog__icon">🔒</div>
                  <div class="kid-pin-dialog__title">Ask a Parent</div>
                  <div class="kid-pin-dialog__desc">This task needs a parent's PIN to complete</div>
                  <div class="kid-pin-dialog__inputs">
                    <input type="tel" class="kid-pin-digit" maxlength="1" data-pin="0" inputmode="numeric">
                    <input type="tel" class="kid-pin-digit" maxlength="1" data-pin="1" inputmode="numeric">
                    <input type="tel" class="kid-pin-digit" maxlength="1" data-pin="2" inputmode="numeric">
                    <input type="tel" class="kid-pin-digit" maxlength="1" data-pin="3" inputmode="numeric">
                  </div>
                  <div class="kid-pin-dialog__error" id="kidPinError"></div>
                  <button class="kid-pin-dialog__cancel" id="kidPinCancel" type="button">Cancel</button>
                </div>
              </div>`;

            const digits = mount.querySelectorAll('.kid-pin-digit');
            const cleanup = () => { mount.innerHTML = ''; };

            digits[0].focus();
            digits.forEach((inp, i) => {
              inp.addEventListener('input', () => {
                if (inp.value.length === 1 && i < 3) digits[i + 1].focus();
                const entered = Array.from(digits).map(d => d.value).join('');
                if (entered.length === 4) {
                  if (entered === adminPin || entered === recoveryPin) {
                    cleanup();
                    resolve(true);
                  } else {
                    document.getElementById('kidPinError').textContent = 'Wrong PIN — try again';
                    digits.forEach(d => { d.value = ''; });
                    digits[0].focus();
                  }
                }
              });
              inp.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !inp.value && i > 0) digits[i - 1].focus();
              });
            });

            document.getElementById('kidPinCancel').addEventListener('click', () => {
              cleanup();
              resolve(false);
            });
            document.getElementById('kidPinOverlay').addEventListener('click', (e) => {
              if (e.target === e.currentTarget) { cleanup(); resolve(false); }
            });
          });
        }

        // ══════════════════════════════════════════
        // Completion toggle
        // ══════════════════════════════════════════

        let undoTimer = null;

        async function toggleTask(entryKey, dateKey, { noPenalty = false } = {}) {
          if (!entryKey) return;
          const wasComplete = isComplete(entryKey, completions);

          // PIN-protected: require PIN to mark complete (not to unmark)
          if (!wasComplete && isTaskPinProtected(entryKey)) {
            const ok = await requirePin();
            if (!ok) return;
          }

          if (wasComplete) {
            delete completions[entryKey];
            await removeCompletion(entryKey);
            celebrationShown = false;
          } else {
            const record = {
              completedAt: firebase.database.ServerValue.TIMESTAMP,
              completedBy: 'kid-mode'
            };
            const pendingVal = pendingSliderOverride?.entryKey === entryKey ? pendingSliderOverride.value : null;
            const savedVal = (viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey))?.pointsOverride;
            const overrideVal = pendingVal ?? savedVal ?? null;
            if (overrideVal != null && overrideVal !== 100) {
              record.pointsOverride = overrideVal;
            }
            pendingSliderOverride = null;
            // Late completion: apply penalty if completing a past-date task with no prior override
            const entryDateKey = dateKey || viewDate;
            if (!noPenalty && entryDateKey < today && record.pointsOverride == null) {
              const entry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
              const task = entry ? tasks[entry.taskId] : null;
              const cat = task?.category ? cats[task.category] : null;
              if (!cat?.isEvent && !task?.exempt) {
                record.pointsOverride = settings?.pastDueCreditPct ?? 75;
                record.isLate = true;
              }
            }
            completions[entryKey] = record;
            await writeCompletion(entryKey, record);

            // Bounty reward on completion
            {
              const bEntry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
              const bTask = bEntry ? tasks[bEntry.taskId] : null;
              if (bTask?.bounty) {
                if (bTask.bounty.type === 'points') {
                  await writeMessage(kid.id, {
                    type: 'bonus',
                    title: `Bounty: ${bTask.name}`,
                    body: null,
                    amount: bTask.bounty.amount,
                    rewardId: null,
                    entryKey,
                    seen: false,
                    createdAt: firebase.database.ServerValue.TIMESTAMP,
                    createdBy: 'system'
                  });
                } else if (bTask.bounty.type === 'reward' && bTask.bounty.rewardId) {
                  const bReward = rewards[bTask.bounty.rewardId];
                  await writeMessage(kid.id, {
                    type: 'redemption-approved',
                    title: `Bounty reward: ${bReward?.name || 'Reward'}`,
                    body: null,
                    amount: 0,
                    rewardId: bTask.bounty.rewardId,
                    entryKey,
                    seen: false,
                    createdAt: firebase.database.ServerValue.TIMESTAMP,
                    createdBy: 'system'
                  });
                  if (bReward) {
                    await writeBankToken(kid.id, {
                      rewardType: bReward.rewardType || 'custom',
                      rewardId: bTask.bounty.rewardId,
                      rewardName: bReward.name || 'Reward',
                      rewardIcon: bReward.icon || '🎁',
                      acquiredAt: Date.now(),
                      used: false,
                      usedAt: null,
                      targetEntryKey: null
                    });
                  }
                }
                // Multi-person bounty: first-come-first-served — remove other entries
                if (bTask.ownerAssignmentMode === 'duplicate' && bTask.owners?.length > 1) {
                  const bDateKey = bEntry.dateKey || viewDate;
                  const bDaySched = await readOnce(`schedule/${bDateKey}`) || {};
                  for (const [otherKey, otherEntry] of Object.entries(bDaySched)) {
                    if (otherKey !== entryKey && otherEntry.taskId === bEntry.taskId) {
                      await removeData(`schedule/${bDateKey}/${otherKey}`);
                    }
                  }
                }
              }
            }

            // Auto-archive one-time tasks on completion
            const entry = viewEntries[entryKey];
            if (entry) {
              const task = tasks[entry.taskId];
              if (task && task.rotation === 'once') {
                task.status = 'completed';
                await writeTask(entry.taskId, task);
              }
            }

            // Cooldown task rebuild
            const cdEntry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
            if (cdEntry) {
              const cdTask = tasks[cdEntry.taskId];
              if (cdTask?.cooldownDays > 0) {
                const allSched = await readAllSchedule() || {};
                const cdUpdates = rebuildSingleTaskSchedule(
                  cdEntry.taskId, cdTask, today, allSched, completions, people, settings, tasks, cats
                );
                if (Object.keys(cdUpdates).length > 0) {
                  await multiUpdate(cdUpdates);
                }
                await loadData();
              }
            }

            // Per-task celebration
            triggerCelebration(entryKey, 'task');

            // Re-check achievements after completion
            recheckAchievements();
          }

          const doRenderAndToast = () => {
            render();
            showUndoToast(
              wasComplete ? 'Task marked incomplete' : 'Task completed!',
              async () => {
                if (wasComplete) {
                  const record = { completedAt: firebase.database.ServerValue.TIMESTAMP, completedBy: 'kid-mode' };
                  completions[entryKey] = record;
                  await writeCompletion(entryKey, record);
                } else {
                  delete completions[entryKey];
                  await removeCompletion(entryKey);
                  // Reverse bounty rewards on undo
                  const undoBountyEntry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
                  const undoBountyTask = undoBountyEntry ? tasks[undoBountyEntry.taskId] : null;
                  if (undoBountyTask?.bounty) {
                    await removeMessagesByEntryKey(kid.id, entryKey);
                    if (undoBountyTask.bounty.type === 'reward' && undoBountyTask.bounty.rewardId) {
                      const bReward = rewards[undoBountyTask.bounty.rewardId];
                      if (bReward?.rewardType === 'task-skip' || bReward?.rewardType === 'penalty-removal') {
                        await removeLatestBankToken(kid.id, bReward.rewardType);
                      }
                    }
                  }
                  // Restore archived one-time task
                  const entry = viewEntries[entryKey];
                  if (entry) {
                    const task = tasks[entry.taskId];
                    if (task && task.status === 'completed' && task.rotation === 'once') {
                      task.status = 'active';
                      await writeTask(entry.taskId, task);
                    }
                  }
                }
                // Rebuild cooldown task schedule after undo
                const undoEntry = viewEntries[entryKey] || overdueItems.find(o => o.entryKey === entryKey);
                if (undoEntry) {
                  const undoTask = tasks[undoEntry.taskId];
                  if (undoTask?.cooldownDays > 0) {
                    const allSched = await readAllSchedule() || {};
                    const undoUpdates = rebuildSingleTaskSchedule(
                      undoEntry.taskId, undoTask, today, allSched, completions, people, settings, tasks, cats
                    );
                    if (Object.keys(undoUpdates).length > 0) {
                      await multiUpdate(undoUpdates);
                    }
                    await loadData();
                  }
                }
                celebrationShown = false;
                render();
              }
            );

            // Check all-done
            checkCelebration();
          };

          if (!wasComplete) {
            // Add press animation, then render after delay
            const cardEl = document.querySelector(`[data-entry-key="${entryKey}"]`);
            if (cardEl) {
              cardEl.classList.add('task-card--completing');
              cardEl.style.pointerEvents = 'none';
            }
            setTimeout(doRenderAndToast, 400);
          } else {
            doRenderAndToast();
          }
        }

        function showUndoToast(message, undoCallback) {
          const mount = document.getElementById('toastMount');
          mount.innerHTML = renderUndoToast(message);
          const toast = mount.querySelector('.undo-toast');

          if (undoTimer) clearTimeout(undoTimer);

          toast.querySelector('.undo-toast__btn').addEventListener('click', () => {
            mount.innerHTML = '';
            if (undoTimer) clearTimeout(undoTimer);
            undoCallback();
          });

          undoTimer = setTimeout(() => {
            if (toast.parentNode) {
              toast.style.opacity = '0';
              setTimeout(() => { mount.innerHTML = ''; }, 300);
            }
          }, 4000);
        }

        // ══════════════════════════════════════════

        function pickVictoryScene() {
          return VICTORY_SCENES[Math.floor(Math.random() * VICTORY_SCENES.length)];
        }

        function showConfettiRain() {
          const count = 40;
          for (let i = 0; i < count; i++) {
            const el = document.createElement('span');
            el.className = 'kid-confetti';
            el.textContent = CONFETTI_EMOJI[Math.floor(Math.random() * CONFETTI_EMOJI.length)];

            el.style.fontSize = (1.5 + Math.random() * 1.5) + 'rem';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 6000);
          }
        }

        function triggerCelebration(entryKey, type) {
          if (!ks.celebrationsEnabled && ks.celebrationsEnabled !== undefined) return;
          if (ks.celebrationStyle === 'off') return;

          if (type === 'task') {
            if (ks.celebrationStyle === 'subtle') showSubtleTaskCelebration(entryKey);
            else showFullTaskCelebration(entryKey);
          } else if (type === 'allDone') {
            if (ks.celebrationStyle === 'subtle') showSubtleAllDoneCelebration();
            else showFullAllDoneCelebration();
          }
        }

        // Themed emoji sets for per-task bursts — picks a random theme each time
        const BURST_THEMES = [
          ['🌟', '⭐', '✨', '💫', '🌟', '⭐', '✨', '💫'],
          ['🎉', '🎊', '🎈', '🎵', '🎶', '🎉', '🎊', '🎈'],
          ['🦄', '🌈', '💜', '💖', '💎', '🦋', '🌸', '✨'],
          ['🍕', '🍩', '🧁', '🍦', '🍭', '🍫', '🎂', '🍪'],
          ['🚀', '⚡', '🔥', '💥', '🛸', '☄️', '🌟', '⭐'],
          ['🐱', '🐶', '🐰', '🐸', '🦊', '🐼', '🐨', '🐵'],
        ];

        function showFullTaskCelebration(entryKey) {
          const container = document.createElement('div');
          container.className = 'kid-emoji-rain';

          // Pick a random theme or mix
          const useMix = Math.random() > 0.5;
          const theme = useMix ? CELEBRATION_EMOJI : BURST_THEMES[Math.floor(Math.random() * BURST_THEMES.length)];

          const count = 16 + Math.floor(Math.random() * 8);
          for (let i = 0; i < count; i++) {
            const span = document.createElement('span');
            span.className = 'kid-emoji-rain__drop';
            span.textContent = theme[Math.floor(Math.random() * theme.length)];
            span.style.left = (Math.random() * 100) + '%';
            span.style.setProperty('--delay', (Math.random() * 0.5) + 's');
            span.style.setProperty('--fall-dur', (0.9 + Math.random() * 0.8) + 's');
            span.style.setProperty('--fall-dist', (50 + Math.random() * 30) + 'vh');
            span.style.setProperty('--spin', (Math.random() * 360 - 180) + 'deg');
