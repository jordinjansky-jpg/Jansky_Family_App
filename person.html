<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Personal daily task dashboard">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/App Icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/App Icon.png">
  <title>Family Hub</title>
  <script>
    // Set title for "Add to Home Screen" using cached app name
    (function() {
      var person = new URLSearchParams(window.location.search).get('person');
      if (person) {
        var appName = localStorage.getItem('dr-app-name') || 'Family Hub';
        document.title = person + "'s " + appName;
      } else {
        window.location.href = 'index.html';
      }
    })();
  </script>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>
  <div id="toastMount"></div>
  <div id="celebrationMount"></div>
  <div id="taskSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    // Unregister SW on person pages so Chrome creates a plain shortcut
    // (not a PWA that uses the main manifest's start_url)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
  </script>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
