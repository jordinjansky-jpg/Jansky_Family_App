<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/App Icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/App Icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Family Hub — Scoreboard</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/scoreboard.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>
  <div id="drilldownMount"></div>
  <div id="storeMount"></div>
  <div id="themeSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import { initFirebase, isFirstRun, readSettings, readPeople, readTasks, readCategories, readCompletions, readAllSchedule, readAllSnapshots, readAllStreaks, readAllAchievements, onConnectionChange, writePerson, onAllMessages, writeMessage, markMessageSeen, removeMessage, writeBankToken, markBankTokenUsed, readBank, removeBankToken, writeMultiplier, readAllBalanceAnchors, readAllMessages, readMultipliers, readRewards, countGlobalRedemptions, readAchievementDefs } from './shared/firebase.js';
    import { renderNavBar, renderHeader, renderEmptyState, renderPersonFilter, renderGradeBadge, renderBottomSheet, openDeviceThemeSheet, initOfflineBanner, initBell } from './shared/components.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig, resolveTheme } from './shared/theme.js';
    import { todayKey, weekStart, weekEnd, monthStart, monthEnd, addDays, formatDateShort, formatMinutes, formatDateLong, escapeHtml } from './shared/utils.js';
    const esc = (s) => escapeHtml(String(s ?? ''));
    import { isComplete, filterByPerson, dayProgress } from './shared/state.js';
    import { basePoints, dailyScore, periodGrade, collectSnapshots, aggregateSnapshots, gradeDisplay, earnedPoints, mergeAchievementDefs, getActiveAchievements, calculateBalance } from './shared/scoring.js';

    // ── Cached theme (device override > family cache > default) ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load all data ──
    const [settings, peopleObj, tasksObj, catsObj, completions, allSchedule, allSnapshots, allStreaks, allAchievementsData, allAnchors, allMessages, allMultipliers, sbRewards, achDefsObj] = await Promise.all([
      readSettings(), readPeople(), readTasks(), readCategories(),
      readCompletions(), readAllSchedule(), readAllSnapshots(), readAllStreaks(), readAllAchievements(),
      readAllBalanceAnchors(), readAllMessages(), readMultipliers(), readRewards(), readAchievementDefs()
    ]);
    const activeDefs = getActiveAchievements(mergeAchievementDefs(achDefsObj || {}));

    if (settings?.theme) applyTheme(resolveTheme(settings.theme));

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);
    const people = peopleObj ? Object.entries(peopleObj).map(([id, p]) => ({ id, ...p })) : [];
    const tasks = tasksObj || {};
    const cats = catsObj || {};
    const comps = completions || {};
    const schedule = allSchedule || {};
    const snapshots = allSnapshots || {};
    const streaks = allStreaks || {};

    // ── Person link mode (?person=Name) for per-user prefs ──
    const personParam = new URLSearchParams(window.location.search).get('person');
    const linkedPerson = personParam
      ? people.find(p => p.name.toLowerCase() === personParam.toLowerCase())
      : null;

    // ── Date ranges ──
    const wStart = weekStart(today);
    const wEnd = weekEnd(today);
    const mStart = monthStart(today);
    const mEnd = monthEnd(today);
    const y12Start = addDays(today, -365);

    // ── Header & Nav ──
    const debugActive = localStorage.getItem('dr-debug') === 'true';
    document.getElementById('headerMount').innerHTML = renderHeader({
      appName: settings?.appName || 'Daily Rundown',
      subtitle: 'Scoreboard',
      dateLine: formatDateLong(today),
      showAdmin: true,
      showDebug: debugActive,
      showThemePicker: true,
      showBell: true
    });
    document.getElementById('navMount').innerHTML = renderNavBar('scoreboard');

    document.getElementById('headerThemeBtn')?.addEventListener('click', () => {
      openDeviceThemeSheet(document.getElementById('themeSheetMount'), settings?.theme);
    });

    // ── Connection status + Offline/Online banner ──
    initOfflineBanner(onConnectionChange);
    initBell(() => people, () => sbRewards || {}, onAllMessages, { writeMessageFn: writeMessage, markMessageSeenFn: markMessageSeen, removeMessageFn: removeMessage, writeBankTokenFn: writeBankToken, markBankTokenUsedFn: markBankTokenUsed, readBankFn: readBank, writeMultiplierFn: writeMultiplier, getTodayFn: () => today });

    // ── Helpers ──

    /** Get today's live score for a person (not from snapshot, from live schedule+completions). */
    function todayScore(personId) {
      const dayEntries = schedule[today] || {};
      const personEntries = {};
      for (const [k, e] of Object.entries(dayEntries)) {
        if (e.ownerId === personId) personEntries[k] = e;
      }
      if (Object.keys(personEntries).length === 0) return { earned: 0, possible: 0, percentage: 0, grade: '--' };
      return dailyScore(personEntries, comps, tasks, cats, settings, today, today);
    }

    /** Get weekly grade: snapshots for past days + live today. */
    function weeklyGrade(personId) {
      const pastSnaps = collectSnapshots(snapshots, personId, wStart, addDays(today, -1));
      const todayLive = todayScore(personId);
      const all = [...pastSnaps];
      if (todayLive.possible > 0) all.push(todayLive);
      return aggregateSnapshots(all);
    }

    /** Get monthly grade: snapshots for past days + live today. */
    function monthlyGrade(personId) {
      const pastSnaps = collectSnapshots(snapshots, personId, mStart, addDays(today, -1));
      const todayLive = todayScore(personId);
      const all = [...pastSnaps];
      if (todayLive.possible > 0) all.push(todayLive);
      return aggregateSnapshots(all);
    }

    /** Get 12-month grade from snapshots + live today. */
    function yearGrade(personId) {
      const pastSnaps = collectSnapshots(snapshots, personId, y12Start, addDays(today, -1));
      const todayLive = todayScore(personId);
      const all = [...pastSnaps];
      if (todayLive.possible > 0) all.push(todayLive);
      return aggregateSnapshots(all);
    }

    /** Calculate total time contributed this week for a person. */
    function weeklyTime(personId) {
      let totalMin = 0;
      let current = wStart;
      while (current <= wEnd && current <= today) {
        const dayEntries = schedule[current] || {};
        for (const [k, e] of Object.entries(dayEntries)) {
          if (e.ownerId === personId && isComplete(k, comps)) {
            const task = tasks[e.taskId];
            if (task) totalMin += (task.estMin || 0);
          }
        }
        current = addDays(current, 1);
      }
      return totalMin;
    }

    /** Get per-category breakdown for a person over a date range. */
    function categoryBreakdown(personId, startDate, endDate) {
      const catTotals = {}; // catKey -> { earned, possible, label, icon }
      let current = startDate;
      while (current <= endDate && current <= today) {
        const dayEntries = schedule[current] || {};
        for (const [k, e] of Object.entries(dayEntries)) {
          if (e.ownerId !== personId) continue;
          const task = tasks[e.taskId];
          if (!task) continue;
          const cat = task.category ? cats[task.category] : null;
          // Skip event categories and exempt tasks (consistent with scoring)
          if (cat?.isEvent) continue;
          if (task.exempt) continue;
          const catKey = task.category || '_none';
          if (!catTotals[catKey]) {
            catTotals[catKey] = { earned: 0, possible: 0, label: cat?.label || cat?.name || 'Uncategorized', icon: cat?.icon || '' };
          }
          const pts = basePoints(task, settings?.difficultyMultipliers);
          catTotals[catKey].possible += pts;
          const completion = comps[k] || null;
          if (completion) {
            catTotals[catKey].earned += earnedPoints(task, completion, settings?.difficultyMultipliers);
          }
        }
        current = addDays(current, 1);
      }
      return catTotals;
    }

    /** Get weekly trend: compare this week's grade to last week's. Returns 'up' | 'down' | 'same' | null. */
    function weeklyTrend(personId) {
      const lastWkStart = addDays(wStart, -7);
      const lastWkEnd = addDays(wStart, -1);
      const lastWeek = periodGrade(snapshots, personId, lastWkStart, lastWkEnd);
      const thisWeek = weeklyGrade(personId);
      if (lastWeek.possible === 0 || thisWeek.possible === 0) return null;
      const diff = thisWeek.percentage - lastWeek.percentage;
      if (diff > 2) return 'up';
      if (diff < -2) return 'down';
      return 'same';
    }

    /** Get last 4 weeks of grades for sparkline. */
    function weeklyHistory(personId) {
      const weeks = [];
      for (let i = 3; i >= 0; i--) {
        const ws = addDays(wStart, -7 * i);
        const we = addDays(ws, 6);
        // For current week (i=0), include live today
        if (i === 0) {
          const grade = weeklyGrade(personId);
          weeks.push(grade);
        } else {
          const grade = periodGrade(snapshots, personId, ws, we);
          weeks.push(grade);
        }
      }
      return weeks;
    }

    // ── Period selector state ──
    let selectedPeriod = linkedPerson?.prefs?.scoreboard?.period || 'week'; // 'today' | 'week' | 'month' | 'year'

    // ── Render ──

    function render() {
      const main = document.getElementById('mainContent');

      if (people.length === 0) {
        main.innerHTML = renderEmptyState('🏆', 'No family members', 'Add people in the setup wizard.');
        return;
      }

      let html = '';

      // Period selector tabs + store button
      const hasRewards = sbRewards && Object.values(sbRewards).some(r => r.status === 'active');
      html += `<div class="sb-period-tabs">
        <button class="sb-tab${selectedPeriod === 'today' ? ' sb-tab--active' : ''}" data-period="today">Today</button>
        <button class="sb-tab${selectedPeriod === 'week' ? ' sb-tab--active' : ''}" data-period="week">Week</button>
        <button class="sb-tab${selectedPeriod === 'month' ? ' sb-tab--active' : ''}" data-period="month">Month</button>
        <button class="sb-tab${selectedPeriod === 'year' ? ' sb-tab--active' : ''}" data-period="year">12 Mo</button>
        ${hasRewards ? `<button class="sb-tab sb-tab--store" id="sbStoreBtn" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg></button>` : ''}
      </div>`;

      // Build person data for leaderboard
      const board = people.map(p => {
        const td = todayScore(p.id);
        const wk = weeklyGrade(p.id);
        const mo = monthlyGrade(p.id);
        const yr = yearGrade(p.id);
        const streak = streaks[p.id] || { current: 0, best: 0 };
        const trend = weeklyTrend(p.id);
        const time = weeklyTime(p.id);
        return { person: p, today: td, week: wk, month: mo, year: yr, streak, trend, time };
      });

      // Sort by selected period grade
      const gradeKey = selectedPeriod === 'today' ? 'today' : selectedPeriod === 'week' ? 'week' : selectedPeriod === 'month' ? 'month' : 'year';
      board.sort((a, b) => b[gradeKey].percentage - a[gradeKey].percentage);

      // ── Grade summary cards ──
      html += `<div class="sb-cards">`;
      for (const b of board) {
        const active = b[gradeKey];
        const gd = gradeDisplay(active.percentage);
        const trendIcon = b.trend === 'up' ? '↑' : b.trend === 'down' ? '↓' : '';
        const trendClass = b.trend === 'up' ? 'sb-trend--up' : b.trend === 'down' ? 'sb-trend--down' : '';

        const personAchievements = allAchievementsData?.[b.person.id] || {};
        const badgeIcons = Object.entries(personAchievements)
          .filter(([, a]) => !a.revoked)
          .map(([key]) => activeDefs[key]?.icon)
          .filter(Boolean)
          .slice(0, 5)
          .join('');

        const personMsgs = allMessages?.[b.person.id] || {};
        const personAnchor = allAnchors?.[b.person.id] || null;
        const { balance } = calculateBalance(b.person.id, allSnapshots, personMsgs, personAnchor, allMultipliers);

        html += `<button class="sb-card" data-person-id="${b.person.id}" type="button" style="--person-color: ${b.person.color}">
          <div class="sb-card__rank"></div>
          <div class="sb-card__left">
            <span class="sb-card__initial" style="background: ${b.person.color}">${b.person.name[0].toUpperCase()}</span>
            <div class="sb-card__info">
              <span class="sb-card__name">${esc(b.person.name)}</span>${badgeIcons ? `<span class="sb-card__badges">${badgeIcons}</span>` : ''}
              <div class="sb-card__meta">
                ${b.streak.current > 0 ? `<span class="sb-streak">🔥 ${b.streak.current}d</span>` : ''}
                ${trendIcon ? `<span class="sb-trend ${trendClass}">${trendIcon}</span>` : ''}
                <span class="sb-time">${formatMinutes(b.time)}</span>
                <span class="sb-balance">💰 ${Math.round(balance).toLocaleString()}</span>
              </div>
            </div>
          </div>
          <div class="sb-card__right">
            <span class="sb-card__grade grade-badge grade-badge--${gd.tier}">${gd.grade}</span>
            <span class="sb-card__pct">${active.percentage}%</span>
          </div>
        </button>`;
      }
      html += `</div>`;

      // ── All grades at a glance ──
      html += `<div class="sb-section-label">All Grades</div>`;
      html += `<div class="sb-grades-table">`;
      html += `<div class="sb-grades-row sb-grades-header">
        <span class="sb-grades-cell sb-grades-cell--name"></span>
        <span class="sb-grades-cell">Today</span>
        <span class="sb-grades-cell">Week</span>
        <span class="sb-grades-cell">Month</span>
        <span class="sb-grades-cell">12 Mo</span>
      </div>`;
      for (const b of board) {
        const tdG = gradeDisplay(b.today.percentage);
        const wkG = gradeDisplay(b.week.percentage);
        const moG = gradeDisplay(b.month.percentage);
        const yrG = gradeDisplay(b.year.percentage);
        html += `<div class="sb-grades-row">
          <span class="sb-grades-cell sb-grades-cell--name"><span class="sb-mini-dot" style="background:${b.person.color}"></span>${esc(b.person.name)}</span>
          <span class="sb-grades-cell">${renderGradeBadge(tdG.grade, tdG.tier)}</span>
          <span class="sb-grades-cell">${renderGradeBadge(wkG.grade, wkG.tier)}</span>
          <span class="sb-grades-cell">${renderGradeBadge(moG.grade, moG.tier)}</span>
          <span class="sb-grades-cell">${renderGradeBadge(yrG.grade, yrG.tier)}</span>
        </div>`;
      }
      html += `</div>`;

      // ── Trends (sparklines as bar segments) ──
      html += `<div class="sb-section-label">Weekly Trends</div>`;
      html += `<div class="sb-trends">`;
      for (const b of board) {
        const history = weeklyHistory(b.person.id);
        html += `<div class="sb-trend-row">
          <span class="sb-trend-name"><span class="sb-mini-dot" style="background:${b.person.color}"></span>${esc(b.person.name)}</span>
          <div class="sb-sparkline">`;
        for (let i = 0; i < history.length; i++) {
          const h = history[i];
          const pct = h.possible > 0 ? h.percentage : 0;
          const tier = pct > 0 ? gradeDisplay(pct).tier : 'none';
          const label = i === 3 ? 'This wk' : i === 2 ? 'Last wk' : `${3 - i} wks ago`;
          html += `<div class="sb-spark-bar" title="${label}: ${pct}%">
            <div class="sb-spark-fill sb-spark-fill--${tier}" style="height:${Math.max(pct, 4)}%"></div>
          </div>`;
        }
        html += `</div></div>`;
      }
      html += `</div>`;

      // ── Category Breakdown (for selected period) ──
      const periodDates = {
        today: [today, today],
        week: [wStart, wEnd],
        month: [mStart, mEnd],
        year: [y12Start, today]
      };
      const [catStart, catEnd] = periodDates[selectedPeriod];

      html += `<div class="sb-section-label">Category Breakdown</div>`;
      html += `<div class="sb-categories">`;
      for (const b of board) {
        const breakdown = categoryBreakdown(b.person.id, catStart, catEnd);
        const catKeys = Object.keys(breakdown);
        if (catKeys.length === 0) continue;

        html += `<div class="sb-cat-person">
          <span class="sb-cat-person-name"><span class="sb-mini-dot" style="background:${b.person.color}"></span>${esc(b.person.name)}</span>
          <div class="sb-cat-bars">`;
        for (const ck of catKeys) {
          const c = breakdown[ck];
          const pct = c.possible > 0 ? Math.round((c.earned / c.possible) * 100) : 0;
          const tier = pct > 0 ? gradeDisplay(pct).tier : 'none';
          html += `<div class="sb-cat-row">
            <span class="sb-cat-label">${c.icon} ${c.label}</span>
            <div class="sb-cat-bar">
              <div class="sb-cat-bar-fill sb-cat-bar-fill--${tier}" style="width:${pct}%"></div>
            </div>
            <span class="sb-cat-pct">${pct}%</span>
          </div>`;
        }
        html += `</div></div>`;
      }
      html += `</div>`;

      // ── Balance Trends (last 7 days) ──
      html += `<div class="sb-section-label">Balance Trends</div>`;
      html += `<div class="sb-trends">`;
      for (const b of board) {
        const personMsgs = allMessages?.[b.person.id] || {};
        const personAnchor = allAnchors?.[b.person.id] || null;
        // Compute balance at end of each of last 7 days by filtering snapshots
        const balanceDays = [];
        for (let i = 6; i >= 0; i--) {
          const d = addDays(today, -i);
          // Build filtered snapshots up to date d
          const filteredSnaps = {};
          if (allSnapshots) {
            for (const [dk, ppl] of Object.entries(allSnapshots)) {
              if (dk <= d) filteredSnaps[dk] = ppl;
            }
          }
          // Filter messages up to date d (approximate by midnight)
          const dEnd = new Date(d + 'T23:59:59Z').getTime();
          const filteredMsgs = {};
          for (const [mk, m] of Object.entries(personMsgs)) {
            if (m.createdAt && m.createdAt <= dEnd) filteredMsgs[mk] = m;
          }
          const { balance: bal } = calculateBalance(b.person.id, filteredSnaps, filteredMsgs, personAnchor, allMultipliers);
          balanceDays.push({ date: d, balance: bal });
        }
        const maxBal = Math.max(...balanceDays.map(d => Math.abs(d.balance)), 1);
        html += `<div class="sb-trend-row">
          <span class="sb-trend-name"><span class="sb-mini-dot" style="background:${b.person.color}"></span>${esc(b.person.name)}</span>
          <div class="sb-sparkline">`;
        for (let i = 0; i < balanceDays.length; i++) {
          const bd = balanceDays[i];
          const pct = Math.round(Math.abs(bd.balance) / maxBal * 100);
          const label = i === 6 ? 'Today' : formatDateShort(bd.date);
          html += `<div class="sb-spark-bar" title="${label}: ${bd.balance.toLocaleString()} pts">
            <div class="sb-spark-fill sb-spark-fill--${bd.balance >= 0 ? 'a' : 'f'}" style="height:${Math.max(pct, 4)}%"></div>
          </div>`;
        }
        html += `</div>
          <span class="sb-balance-label" style="font-size: var(--font-size-sm); color: var(--text-secondary); min-width: 50px; text-align: right;">${balanceDays[6].balance.toLocaleString()}</span>
        </div>`;
      }
      html += `</div>`;

      // ── Streaks ──
      html += `<div class="sb-section-label">Streaks</div>`;
      html += `<div class="sb-streaks">`;
      for (const b of board) {
        html += `<div class="sb-streak-row">
          <span class="sb-streak-name"><span class="sb-mini-dot" style="background:${b.person.color}"></span>${esc(b.person.name)}</span>
          <div class="sb-streak-vals">
            <span class="sb-streak-current streak-value--animate">🔥 ${b.streak.current}d current</span>
            <span class="sb-streak-best streak-value--animate">⭐ ${b.streak.best}d best</span>
          </div>
        </div>`;
      }
      html += `</div>`;

      main.innerHTML = html;
      bindEvents();
    }

    // ── Event binding ──

    function bindEvents() {
      // Period tabs
      document.querySelectorAll('.sb-tab[data-period]').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedPeriod = btn.dataset.period;
          if (linkedPerson) {
            const prefs = { ...(linkedPerson.prefs || {}), scoreboard: { period: selectedPeriod } };
            linkedPerson.prefs = prefs;
            const { id, ...data } = linkedPerson;
            writePerson(id, data);
          }
          render();
        });
      });

      // Store button
      document.getElementById('sbStoreBtn')?.addEventListener('click', openStorePicker);

      // Person card long-press for drill-down
      document.querySelectorAll('.sb-card').forEach(btn => {
        let pressTimer = null;
        let didLongPress = false;

        const startPress = (e) => {
          didLongPress = false;
          pressTimer = setTimeout(() => {
            didLongPress = true;
            openDrilldown(btn.dataset.personId);
          }, settings?.longPressMs ?? 500);
        };
        const endPress = (e) => {
          clearTimeout(pressTimer);
          if (!didLongPress) {
            openDrilldown(btn.dataset.personId);
          }
        };
        const cancelPress = () => { clearTimeout(pressTimer); };

        btn.addEventListener('pointerdown', startPress);
        btn.addEventListener('pointerup', endPress);
        btn.addEventListener('pointerleave', cancelPress);
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
      });
    }

    // ── Drill-down bottom sheet ──

    function openDrilldown(personId) {
      const person = people.find(p => p.id === personId);
      if (!person) return;

      const periodDates = {
        today: [today, today],
        week: [wStart, wEnd],
        month: [mStart, mEnd],
        year: [y12Start, today]
      };
      const [dStart, dEnd] = periodDates[selectedPeriod];
      const periodLabels = { today: 'Today', week: 'This Week', month: 'This Month', year: '12 Months' };

      // Gather task-level detail for this person in the period
      const taskDetails = [];
      let current = dStart;
      while (current <= dEnd && current <= today) {
        const dayEntries = schedule[current] || {};
        for (const [k, e] of Object.entries(dayEntries)) {
          if (e.ownerId !== personId) continue;
          const task = tasks[e.taskId];
          if (!task) continue;
          const completion = comps[k] || null;
          const pts = basePoints(task, settings?.difficultyMultipliers);
          const earned = completion ? earnedPoints(task, completion, settings?.difficultyMultipliers) : 0;

          let status;
          if (completion) {
            status = completion.isLate ? 'Late' : 'Done';
          } else if (current < today) {
            status = 'Missed';
          } else {
            status = 'Pending';
          }

          taskDetails.push({
            name: task.name,
            category: task.category ? (cats[task.category]?.icon || '') : '',
            date: current,
            pts,
            earned,
            status
          });
        }
        current = addDays(current, 1);
      }

      // Build sheet content
      let html = `<div class="sb-drilldown">`;
      html += `<div class="sb-drilldown__header" style="--person-color: ${person.color}">
        <span class="sb-card__initial" style="background: ${person.color}">${person.name[0].toUpperCase()}</span>
        <span class="sb-drilldown__name">${esc(person.name)}</span>
        <span class="sb-drilldown__period">${periodLabels[selectedPeriod]}</span>
      </div>`;

      // Summary row
      const grade = selectedPeriod === 'today' ? todayScore(personId)
        : selectedPeriod === 'week' ? weeklyGrade(personId)
        : selectedPeriod === 'month' ? monthlyGrade(personId)
        : yearGrade(personId);
      const gd = gradeDisplay(grade.percentage);

      html += `<div class="sb-drilldown__summary">
        <span class="grade-badge grade-badge--${gd.tier} grade-badge--lg">${gd.grade}</span>
        <span class="sb-drilldown__stats">${settings?.showPoints !== false ? `${grade.earned}/${grade.possible} pts · ` : ''}${grade.percentage}%</span>
      </div>`;

      // Task list grouped by status
      const statusOrder = ['Missed', 'Late', 'Pending', 'Done'];
      const statusGroups = {};
      for (const td of taskDetails) {
        if (!statusGroups[td.status]) statusGroups[td.status] = [];
        statusGroups[td.status].push(td);
      }

      for (const status of statusOrder) {
        const items = statusGroups[status];
        if (!items || items.length === 0) continue;
        const statusClass = `sb-status--${status.toLowerCase()}`;
        html += `<div class="sb-drilldown__group">
          <div class="sb-drilldown__group-label ${statusClass}">${status} (${items.length})</div>`;
        for (const item of items) {
          html += `<div class="sb-drilldown__task">
            <span class="sb-drilldown__task-name">${item.category ? esc(item.category) + ' ' : ''}${esc(item.name)}</span>
            <span class="sb-drilldown__task-date">${formatDateShort(item.date)}</span>
            ${settings?.showPoints !== false ? `<span class="sb-drilldown__task-pts">${item.earned}/${item.pts}</span>` : ''}
          </div>`;
        }
        html += `</div>`;
      }

      if (taskDetails.length === 0) {
        html += `<div class="sb-drilldown__empty">No tasks in this period</div>`;
      }

      html += `</div>`;

      // Mount bottom sheet
      const mount = document.getElementById('drilldownMount');
      mount.innerHTML = renderBottomSheet(html);

      requestAnimationFrame(() => {
        const overlay = document.getElementById('bottomSheet');
        if (overlay) {
          overlay.classList.add('active');
          overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeDrilldown();
          });
        }
      });
    }

    function closeDrilldown() {
      const overlay = document.getElementById('bottomSheet');
      if (overlay) {
        overlay.classList.remove('active');
        setTimeout(() => {
          document.getElementById('drilldownMount').innerHTML = '';
        }, 300);
      }
    }

    // ── Store ──

    async function openStore(personId) {
      const person = people.find(p => p.id === personId);
      if (!person) return;
      const rewards = sbRewards || {};
      const personMsgs = allMessages?.[personId] || {};
      const personAnchor = allAnchors?.[personId] || null;
      const { balance } = calculateBalance(personId, allSnapshots, personMsgs, personAnchor, allMultipliers);
      const personStreak = streaks[personId] || { current: 0, best: 0 };
      const personBank = (await readBank(personId)) || {};

      // Count redemptions for max-limit rewards
      const redemptionCounts = {};
      for (const [rid, r] of Object.entries(rewards)) {
        if (r.maxRedemptions) redemptionCounts[rid] = await countGlobalRedemptions(rid);
      }

      // Track pending requests
      const pendingRewardIds = new Set(
        Object.values(personMsgs)
          .filter(m => m.type === 'redemption-request' && !m.seen)
          .map(m => m.rewardId)
      );

      const available = Object.entries(rewards)
        .filter(([id, r]) => {
          if (r.status !== 'active') return false;
          if (r.expiresAt && Date.now() > r.expiresAt) return false;
          if (r.perPerson && !r.perPerson.includes(personId)) return false;
          if (pendingRewardIds.has(id)) return false;
          if (r.maxRedemptions && (redemptionCounts[id] || 0) >= r.maxRedemptions) return false;
          return true;
        })
        .map(([id, r]) => ({ id, ...r }));

      available.sort((a, b) => {
        const aOk = balance >= a.pointCost && personStreak.current >= (a.streakRequirement || 0);
        const bOk = balance >= b.pointCost && personStreak.current >= (b.streakRequirement || 0);
        if (aOk && !bOk) return -1;
        if (!aOk && bOk) return 1;
        return a.pointCost - b.pointCost;
      });

      // Pending requests
      const pendingRequests = Object.entries(personMsgs)
        .filter(([, m]) => m.type === 'redemption-request' && !m.seen)
        .map(([msgId, m]) => ({ msgId, reward: rewards[m.rewardId] || {}, amount: Math.abs(m.amount) }));

      let html = `<div class="store-header">
        <span class="sb-card__initial" style="background: ${person.color}; width: 28px; height: 28px; font-size: 0.875rem; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; color: #fff;">${person.name[0].toUpperCase()}</span>
        <span style="font-weight: 600;">${esc(person.name)}'s Store</span>
        <span class="store-balance">💰 ${Math.round(balance).toLocaleString()} pts</span>
      </div>`;

      // Saved rewards section
      const savedTokens = Object.entries(personBank).filter(([, t]) => !t.used);
      if (savedTokens.length > 0) {
        html += `<div style="margin-bottom: 12px;"><h4 style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-bottom: 8px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg> Saved (${savedTokens.length})</h4>`;
        for (const [tokenId, token] of savedTokens) {
          const typeLabel = token.rewardType === 'task-skip' ? 'Task Skip'
            : token.rewardType === 'penalty-removal' ? 'Penalty Removal'
            : (token.rewardName || 'Reward');
          const icon = token.rewardType === 'task-skip' ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>'
            : token.rewardType === 'penalty-removal' ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
            : esc(token.rewardIcon || '🎁');
          html += `<div class="store-card" style="border-color: var(--accent);">
            <div class="store-card__icon">${icon}</div>
            <div class="store-card__body">
              <div class="store-card__name">${esc(typeLabel)}</div>
              <div class="store-card__cost" style="color: var(--text-secondary); font-size: var(--font-size-xs, 0.75rem);">Saved ${new Date(token.acquiredAt).toLocaleDateString()}</div>
            </div>
            <div class="store-card__actions">
              <button class="btn btn--xs btn--ghost store-remove-token" data-token-id="${esc(tokenId)}" data-token-name="${esc(typeLabel)}" type="button" style="color: var(--accent-danger, #e53e3e);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
          </div>`;
        }
        html += `</div>`;
      }

      if (pendingRequests.length > 0) {
        html += `<div style="margin-bottom: 12px;"><h4 style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-bottom: 8px;">Pending Requests</h4>`;
        for (const req of pendingRequests) {
          html += `<div class="store-card store-card--pending" style="border-color: var(--accent-warning, #ecc94b); opacity: 0.8;">
            <div class="store-card__icon">${esc(req.reward.icon || '🎁')}</div>
            <div class="store-card__body">
              <div class="store-card__name">${esc(req.reward.name || 'Reward')}</div>
              <div class="store-card__cost">${req.amount} pts — waiting for approval</div>
            </div>
          </div>`;
        }
        html += `</div>`;
      }

      if (available.length === 0 && pendingRequests.length === 0) {
        html += `<div style="text-align: center; padding: 32px; color: var(--text-secondary);"><div style="font-size: 2rem; margin-bottom: 8px;">🏪</div><p>No rewards available!</p></div>`;
      }

      for (const reward of available) {
        const canAfford = balance >= reward.pointCost;
        const meetsStreak = personStreak.current >= (reward.streakRequirement || 0);
        const canRequest = canAfford && meetsStreak;
        const storeProgress = Math.min(100, Math.round((balance / reward.pointCost) * 100));

        let stockLabel = '';
        if (reward.maxRedemptions) {
          const used = redemptionCounts[reward.id] || 0;
          stockLabel = `<span class="store-card__badge">${reward.maxRedemptions - used} left</span>`;
        }

        let expiryLabel = '';
        if (reward.expiresAt) {
          const daysLeft = Math.ceil((reward.expiresAt - Date.now()) / 86400000);
          if (daysLeft <= 7) expiryLabel = `<span class="store-card__badge store-card__badge--warning">Expires in ${daysLeft} day${daysLeft !== 1 ? 's' : ''}</span>`;
        }

        html += `<div class="store-card ${canRequest ? 'store-card--available' : ''}" data-reward-id="${reward.id}">
          <div class="store-card__icon">${esc(reward.icon || '🎁')}</div>
          <div class="store-card__body">
            <div class="store-card__name">${esc(reward.name)}</div>
            <div class="store-card__cost">${reward.pointCost.toLocaleString()} pts</div>
            <div class="store-card__badges">
              ${reward.streakRequirement ? `<span class="store-card__badge">🔥 ${reward.streakRequirement}-day streak${!meetsStreak ? ` (need ${reward.streakRequirement - personStreak.current} more)` : ''}</span>` : ''}
              ${stockLabel}${expiryLabel}
            </div>
            <div class="store-card__progress"><div class="store-card__progress-bar" style="width: ${storeProgress}%"></div></div>
            ${!canAfford ? `<div class="store-card__need">Need ${(reward.pointCost - balance).toLocaleString()} more pts</div>` : ''}
          </div>
          <div class="store-card__actions">
            ${canRequest ? `<button class="btn btn--sm btn--primary store-get-btn" data-reward-id="${reward.id}" type="button">Get it!</button>` : ''}
          </div>
        </div>`;
      }

      const mount = document.getElementById('storeMount');
      mount.innerHTML = renderBottomSheet(html);
      requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

      // Bind "Get it!" buttons
      for (const btn of mount.querySelectorAll('.store-get-btn')) {
        btn.addEventListener('click', async () => {
          const rewardId = btn.dataset.rewardId;
          const reward = rewards[rewardId];
          if (!reward || !confirm(`Spend ${reward.pointCost} pts on ${reward.name} for ${person.name}?`)) return;

          await writeMessage(personId, {
            type: 'redemption-request',
            title: reward.name,
            body: null,
            amount: -reward.pointCost,
            rewardId,
            entryKey: null,
            seen: false,
            createdAt: firebase.database.ServerValue.TIMESTAMP,
            createdBy: personId
          });

          mount.innerHTML = '';
          const toast = document.createElement('div');
          toast.className = 'toast';
          toast.textContent = `Requested ${reward.name}! Waiting for approval...`;
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 3000);
        });
      }

      // Bind remove-token buttons
      for (const btn of mount.querySelectorAll('.store-remove-token')) {
        btn.addEventListener('click', async () => {
          const tokenId = btn.dataset.tokenId;
          const tokenName = btn.dataset.tokenName;
          if (!confirm(`Remove "${tokenName}" from ${person.name}'s bank?`)) return;
          await removeBankToken(personId, tokenId);
          mount.innerHTML = '';
          openStore(personId);
        });
      }

      // Backdrop close
      mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
        if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
      });
    }

    function openStorePicker() {
      if (people.length === 1) {
        openStore(people[0].id);
        return;
      }
      let html = `<div style="padding: 8px 0;">
        <h3 style="margin-bottom: 12px;">Who's shopping?</h3>`;
      for (const p of people) {
        const personMsgs = allMessages?.[p.id] || {};
        const personAnchor = allAnchors?.[p.id] || null;
        const { balance } = calculateBalance(p.id, allSnapshots, personMsgs, personAnchor, allMultipliers);
        html += `<button class="store-person-btn" data-person-id="${p.id}" type="button" style="display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-card); cursor: pointer; margin-bottom: 8px; font-size: var(--font-size-base);">
          <span style="background: ${p.color}; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: #fff; font-weight: 600;">${p.name[0].toUpperCase()}</span>
          <span style="flex: 1; text-align: left; font-weight: 500;">${esc(p.name)}</span>
          <span style="color: var(--text-secondary); font-size: var(--font-size-sm);">💰 ${Math.round(balance).toLocaleString()}</span>
        </button>`;
      }
      html += `</div>`;

      const mount = document.getElementById('storeMount');
      mount.innerHTML = renderBottomSheet(html);
      requestAnimationFrame(() => { document.getElementById('bottomSheet')?.classList.add('active'); });

      for (const btn of mount.querySelectorAll('.store-person-btn')) {
        btn.addEventListener('click', () => {
          mount.innerHTML = '';
          openStore(btn.dataset.personId);
        });
      }
      mount.querySelector('.bottom-sheet-overlay')?.addEventListener('click', (e) => {
        if (e.target.classList.contains('bottom-sheet-overlay')) mount.innerHTML = '';
      });
    }

    // ── Init ──
    document.getElementById('loadingState').style.display = 'none';
    const main = document.getElementById('mainContent');
    main.style.display = '';
    render();
  </script>
</body>
</html>
