<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#141413">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/app-icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/app-icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Family Hub — Scoreboard</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/scoreboard.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div id="bannerMount"></div>
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>
  <div id="drilldownMount"></div>
  <div id="themeSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import { initFirebase, isFirstRun, readSettings, writeSettings, readPeople, readTasks, readCategories, readCompletions, readAllSchedule, readAllSnapshots, readAllStreaks, readAllAchievements, onConnectionChange, writePerson, writeCompletion, onAllMessages, writeMessage, markMessageSeen, removeMessage, writeBankToken, markBankTokenUsed, readBank, writeMultiplier, readAllBalanceAnchors, readAllMessages, readMultipliers, readRewards, readAchievementDefs, writeAchievement } from './shared/firebase.js';
    import { renderNavBar, initNavMore, initBottomNav, renderHeader, renderEmptyState, renderErrorState, renderBottomSheet, openDeviceThemeSheet, initOfflineBanner, initBell, initBanner, applyDataColors, renderScoreCard, renderSectionHead, renderPersonAvatar, renderAchievementBadge, renderSendMessageSheet, bindSendMessageSheet, renderHeatmap } from './shared/components.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig, resolveTheme, applyTextSize } from './shared/theme.js';
    import { todayKey, weekStart, weekStartForDay, weekEnd, monthStart, monthEnd, addDays, formatDateShort, formatMinutes, formatDateLong, escapeHtml } from './shared/utils.js';
    const esc = (s) => escapeHtml(String(s ?? ''));
    import { isComplete, filterByPerson, dayProgress } from './shared/state.js';
    import { basePoints, dailyScore, periodGrade, collectSnapshots, aggregateSnapshots, gradeDisplay, gradeTier, earnedPoints, mergeAchievementDefs, getActiveAchievements, calculateBalance, checkNewAchievements, familyGrade, timeContributed, achievementProgress, streakAtRisk, dayOfWeekPattern, personalBest } from './shared/scoring.js';

    // ── Cached theme (device override > family cache > default) ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load all data ──
    try {
    const [settings, peopleObj, tasksObj, catsObj, completions, allSchedule, allSnapshots, allStreaks, allAchievementsData, allAnchors, allMessages, allMultipliers, sbRewards, achDefsObj] = await Promise.all([
      readSettings(), readPeople(), readTasks(), readCategories(),
      readCompletions(), readAllSchedule(), readAllSnapshots(), readAllStreaks(), readAllAchievements(),
      readAllBalanceAnchors(), readAllMessages(), readMultipliers(), readRewards(), readAchievementDefs()
    ]);
    const activeDefs = getActiveAchievements(mergeAchievementDefs(achDefsObj || {}));

    if (settings?.theme) applyTheme(resolveTheme(settings.theme));
    if (settings?.textSize) applyTextSize(settings.textSize);

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);
    const people = peopleObj ? Object.entries(peopleObj).map(([id, p]) => ({ id, ...p })) : [];
    const tasks = tasksObj || {};
    const cats = catsObj || {};
    const comps = completions || {};
    const schedule = allSchedule || {};
    const snapshots = allSnapshots || {};
    const streaks = allStreaks || {};

    // ── Person link mode (?person=Name) for per-user prefs ──
    const personParam = new URLSearchParams(window.location.search).get('person');
    const linkedPerson = personParam
      ? people.find(p => p.name.toLowerCase() === personParam.toLowerCase())
      : null;
    if (linkedPerson?.theme?.preset) applyTheme(linkedPerson.theme);

    // ── Date ranges ──
    const wStart = weekStart(today);
    const wEnd = weekEnd(today);
    const mStart = monthStart(today);
    const mEnd = monthEnd(today);
    const y12Start = addDays(today, -365);

    // ── Header & Nav ──
    const debugActive = localStorage.getItem('dr-debug') === 'true';
    document.getElementById('headerMount').innerHTML = renderHeader({
      title: 'Scoreboard',
      showBell: true,
    });
    initBottomNav({
      navMount:     document.getElementById('navMount'),
      activePage:   'scoreboard',
      sheetMount:   document.getElementById('drilldownMount'),
      getTheme:     () => settings?.theme,
      personOpts:   linkedPerson ? { person: linkedPerson, writePerson, displayDefaults: settings } : undefined,
      currentPage:  'scoreboard',
      onPageRender: () => render(),
    });

    // ── Connection status + Offline/Online banner ──
    initOfflineBanner(onConnectionChange);
    initBell(() => people, () => sbRewards || {}, onAllMessages, { writeMessageFn: writeMessage, markMessageSeenFn: markMessageSeen, removeMessageFn: removeMessage, writeBankTokenFn: writeBankToken, markBankTokenUsedFn: markBankTokenUsed, readBankFn: readBank, writeMultiplierFn: writeMultiplier, getTodayFn: () => today, approverName: linkedPerson?.name || null });

    // Cross-page banner queue (vacation / freeze / running-activity / offline).
    let __pageIsOffline = !navigator.onLine;
    const bannerCtl = initBanner({ getIsOffline: () => __pageIsOffline });
    window.addEventListener('online',  () => { __pageIsOffline = false; bannerCtl?.refresh(); });
    window.addEventListener('offline', () => { __pageIsOffline = true;  bannerCtl?.refresh(); });
    // Refresh every 5s to update running-activity elapsed time.
    setInterval(() => bannerCtl?.refresh(), 5000);

    // ── Helpers ──

    /** Get today's live score for a person (not from snapshot, from live schedule+completions). */
    function todayScore(personId) {
      const dayEntries = schedule[today] || {};
      const personEntries = {};
      for (const [k, e] of Object.entries(dayEntries)) {
        if (e.ownerId === personId) personEntries[k] = e;
      }
      if (Object.keys(personEntries).length === 0) return { earned: 0, possible: 0, percentage: 0, grade: '--' };
      return dailyScore(personEntries, comps, tasks, cats, settings, today, today);
    }

    /** Get weekly grade: rolling 7 days ending today. */
    function weeklyGrade(personId) {
      const pastSnaps = collectSnapshots(snapshots, personId, addDays(today, -6), addDays(today, -1));
      const todayLive = todayScore(personId);
      const all = [...pastSnaps];
      if (todayLive.possible > 0) all.push(todayLive);
      return aggregateSnapshots(all);
    }

    /** Get monthly grade: rolling 30 days ending today. */
    function monthlyGrade(personId) {
      const pastSnaps = collectSnapshots(snapshots, personId, addDays(today, -29), addDays(today, -1));
      const todayLive = todayScore(personId);
      const all = [...pastSnaps];
      if (todayLive.possible > 0) all.push(todayLive);
      return aggregateSnapshots(all);
    }

    /** Get 12-month grade from snapshots + live today. */
    function yearGrade(personId) {
      const pastSnaps = collectSnapshots(snapshots, personId, y12Start, addDays(today, -1));
      const todayLive = todayScore(personId);
      const all = [...pastSnaps];
      if (todayLive.possible > 0) all.push(todayLive);
      return aggregateSnapshots(all);
    }

    /** Calculate total time contributed over the rolling 7 days for a person. */
    /** Get per-category breakdown for a person over a date range. */
    function categoryBreakdown(personId, startDate, endDate) {
      const catTotals = {}; // catKey -> { earned, possible, label, icon }
      let current = startDate;
      while (current <= endDate && current <= today) {
        const dayEntries = schedule[current] || {};
        for (const [k, e] of Object.entries(dayEntries)) {
          if (e.ownerId !== personId) continue;
          const task = tasks[e.taskId];
          if (!task) continue;
          const cat = task.category ? cats[task.category] : null;
          // Skip event categories and exempt tasks (consistent with scoring)
          if (cat?.isEvent) continue;
          if (task.exempt) continue;
          const catKey = task.category || '_none';
          if (!catTotals[catKey]) {
            catTotals[catKey] = { earned: 0, possible: 0, label: cat?.label || cat?.name || 'Uncategorized', icon: cat?.icon || '' };
          }
          const pts = basePoints(task, settings?.difficultyMultipliers);
          catTotals[catKey].possible += pts;
          const completion = comps[k] || null;
          if (completion) {
            catTotals[catKey].earned += earnedPoints(task, completion, settings?.difficultyMultipliers);
          }
        }
        current = addDays(current, 1);
      }
      return catTotals;
    }

    /** Get weekly trend vs rolling 7 days prior. Returns 'up' | 'down' | 'same' | null. */
    function weeklyTrend(personId) {
      const lastWeek = periodGrade(snapshots, personId, addDays(today, -13), addDays(today, -7));
      const thisWeek = weeklyGrade(personId);
      if (lastWeek.possible === 0 || thisWeek.possible === 0) return null;
      const diff = thisWeek.percentage - lastWeek.percentage;
      if (diff > 2) return 'up';
      if (diff < -2) return 'down';
      return 'same';
    }

    /**
     * Compute the smallest number of remaining tasks that would lift this person
     * across the next grade tier boundary today. Returns a hint string or null.
     */
    function tasksToNextGrade(personId) {
      const td = todayScore(personId);
      if (td.possible === 0) return null;
      if (td.percentage >= 97) return null; // Already A+

      // Find the next grade-tier minimum above the current percentage
      const tiers = [97, 93, 90, 87, 83, 80, 77, 73, 70, 67, 63, 60];
      const nextMin = [...tiers].reverse().find(t => t > td.percentage);
      if (!nextMin) return null;

      // Collect remaining tasks (scheduled today for this person, not completed)
      const dayEntries = schedule[today] || {};
      const remaining = [];
      for (const [k, e] of Object.entries(dayEntries)) {
        if (e.ownerId !== personId) continue;
        if (comps[k]) continue; // already completed
        const task = tasks[e.taskId];
        if (!task) continue;
        const cat = task.category ? cats[task.category] : null;
        if (cat?.isEvent) continue;
        if (task.exempt) continue;
        remaining.push(basePoints(task, settings?.difficultyMultipliers));
      }
      if (remaining.length === 0) return null;

      // Greedy: sort by points desc, accumulate until next tier crossed
      remaining.sort((a, b) => b - a);
      let earned = td.earned;
      const possible = td.possible;
      let count = 0;
      for (const pts of remaining) {
        earned += pts;
        count += 1;
        const pct = Math.round((earned / possible) * 100);
        if (pct >= nextMin) {
          const gd = gradeDisplay(pct);
          const word = count === 1 ? 'task' : 'tasks';
          return `${count} more ${word} → ${gd.grade}`;
        }
      }
      return null;
    }

    // ── Period selector state ──
    let selectedPeriod = linkedPerson?.prefs?.scoreboard?.period || 'week'; // 'today' | 'week' | 'month' | 'year'
    // Per-card period overrides for the badge cycle interaction.
    // Map<personId, 'today' | 'week' | 'month' | 'year'>
    const cardPeriods = new Map();

    // ── Check achievements for all people (covers adults who only use non-kid pages) ──
    {
      const writes = [];
      for (const p of people) {
        const existing = allAchievementsData?.[p.id] || {};
        const msgs = allMessages?.[p.id] || {};
        const anchor = allAnchors?.[p.id] || null;
        const { totalEarned } = calculateBalance(p.id, allSnapshots, msgs, anchor, allMultipliers, tz);
        const pStreak = streaks[p.id] || { current: 0, best: 0 };
        const newKeys = checkNewAchievements({
          streak: pStreak.current,
          bestStreak: pStreak.best,
          totalEarned,
          existingAchievements: existing,
          weeklyGrade: weeklyGrade(p.id).grade,
          monthlyGrade: monthlyGrade(p.id).grade,
          dailyGrade: todayScore(p.id).grade,
          hasRedeemed: Object.values(msgs).some(m => m.type === 'redemption-approved'),
          personId: p.id,
          achievementDefs: activeDefs
        });
        for (const key of newKeys) {
          if (existing[key]?.revoked) continue;
          writes.push(writeAchievement(p.id, key, { unlockedAt: Date.now(), seen: false }));
          if (!allAchievementsData[p.id]) allAchievementsData[p.id] = {};
          allAchievementsData[p.id][key] = { unlockedAt: Date.now(), seen: false };
        }
      }
      if (writes.length) await Promise.all(writes);
    }

    // Build person data for leaderboard — precompute all display values here
    const board = people.map(p => {
      const td = todayScore(p.id);
      const wk = weeklyGrade(p.id);
      const mo = monthlyGrade(p.id);
      const yr = yearGrade(p.id);
      const streak = streaks[p.id] || { current: 0, best: 0 };
      const trend = weeklyTrend(p.id);
      const personMsgs = allMessages?.[p.id] || {};
      const personAnchor = allAnchors?.[p.id] || null;
      const { balance } = calculateBalance(p.id, allSnapshots, personMsgs, personAnchor, allMultipliers, tz);
      const liveBalance = Math.round(balance);
      const personAchievements = allAchievementsData?.[p.id] || {};
      const badgeIcons = Object.entries(personAchievements)
        .filter(([, a]) => !a.revoked)
        .sort((a, b) => (b[1].unlockedAt || 0) - (a[1].unlockedAt || 0))
        .slice(0, 5)
        .map(([key]) => activeDefs[key]?.icon || '')
        .filter(Boolean)
        .join('');
      const lastWeek = periodGrade(snapshots, p.id, addDays(today, -13), addDays(today, -7));
      return { person: p, today: td, week: wk, month: mo, year: yr, streak, trend, liveBalance, badgeIcons, lastWeek };
    });

    // ── Render ──

    function cyclePeriod(personId) {
      const order = ['today', 'week', 'month', 'year'];
      const cur = cardPeriods.get(personId) || selectedPeriod;
      const next = order[(order.indexOf(cur) + 1) % order.length];
      cardPeriods.set(personId, next);
      render();
    }

    function render() {
      const main = document.getElementById('mainContent');

      if (people.length === 0) {
        main.innerHTML = renderEmptyState('🏆', 'No family members', 'Add people in the setup wizard.');
        return;
      }

      // Sort board by selected period grade
      const gradeKey = selectedPeriod === 'today' ? 'today'
        : selectedPeriod === 'week' ? 'week'
        : selectedPeriod === 'month' ? 'month'
        : 'year';
      board.sort((a, b) => b[gradeKey].percentage - a[gradeKey].percentage);

      // Assign ranks. Ties share rank; subsequent ranks skip (1, 1, 3, 4 — standard "competition" ranking).
      {
        let lastPct = null;
        let lastRank = 0;
        for (let i = 0; i < board.length; i++) {
          const pct = board[i][gradeKey].percentage;
          const possible = board[i][gradeKey].possible;
          if (possible === 0) {
            board[i].rank = null; // No tasks → no rank
          } else if (pct === lastPct) {
            board[i].rank = lastRank;
          } else {
            board[i].rank = i + 1;
            lastPct = pct;
            lastRank = i + 1;
          }
        }
      }

      let html = '';

      // ── Family score banner ──
      const familyAgg = familyGrade(board.map(b => b[gradeKey]));
      const familyGd = familyAgg.possible > 0 ? gradeDisplay(familyAgg.percentage) : null;

      // Family trend: this period vs. prior period of same length (week vs. last week, etc.)
      let familyTrendDir = null;
      if (selectedPeriod === 'week' || selectedPeriod === 'month') {
        const priorRanges = {
          week:  [addDays(today, -13), addDays(today, -7)],
          month: [addDays(today, -59), addDays(today, -30)],
        };
        const [ps, pe] = priorRanges[selectedPeriod];
        const priorAgg = familyGrade(board.map(b => periodGrade(snapshots, b.person.id, ps, pe)));
        if (familyAgg.possible > 0 && priorAgg.possible > 0) {
          const diff = familyAgg.percentage - priorAgg.percentage;
          if (diff > 2) familyTrendDir = 'up';
          else if (diff < -2) familyTrendDir = 'down';
        }
      }

      const periodLabelMap = { today: 'today', week: 'this week', month: 'this month', year: 'this year' };
      const trendArrowFamily = (dir) => {
        if (!dir) return '';
        const points = dir === 'up'
          ? '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>'
          : '<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>';
        return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${points}</svg>`;
      };

      if (familyGd) {
        html += `<div class="sb-family-banner">
          <span class="sb-family-banner__label">Family</span>
          <span class="sb-family-banner__grade grade-badge grade-badge--${esc(familyGd.tier)} grade-badge--sm">${esc(familyGd.grade)}</span>
          <span class="sb-family-banner__period">${periodLabelMap[selectedPeriod]}</span>
          ${trendArrowFamily(familyTrendDir)}
        </div>`;
      }

      // ── Period tabs ──
      const periods = [
        { key: 'today', label: 'Today' },
        { key: 'week',  label: 'Week' },
        { key: 'month', label: 'Month' },
        { key: 'year',  label: 'Year' },
      ];
      html += `<nav class="tabs tabs--pill">`;
      for (const p of periods) {
        html += `<button class="tab${selectedPeriod === p.key ? ' is-active' : ''}" data-period="${p.key}" type="button">${p.label}</button>`;
      }
      html += `</nav>`;

      // ── Grade cards (hero leaderboard) ──
      html += `<div class="card-stack">`;
      for (const b of board) {
        const effectivePeriod = cardPeriods.get(b.person.id) || selectedPeriod;
        const active = b[effectivePeriod];
        const gd = gradeDisplay(active.percentage);
        const hint = effectivePeriod === 'today' ? tasksToNextGrade(b.person.id) : null;
        html += renderScoreCard(b, active, gd, b.liveBalance, b.badgeIcons, b.rank, hint);
      }
      html += `</div>`;

      // ── Highlights — priority queue, max 3 rows, hide when zero candidates ──
      {
        const trendSvg = (dir) => dir === 'up'
          ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`
          : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>`;
        const flameSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`;
        const checkSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`;

        const candidates = [];

        // Priority 3: perfect-day-today / all-done-today
        const withTasks = board.filter(b => b.today.possible > 0);
        const allDone = withTasks.length > 0 && withTasks.every(b => b.today.percentage === 100);
        if (allDone && board.length > 1) {
          candidates.push({ priority: 3, html: `<div class="sb-highlight-row">${checkSvg} Everyone finished today</div>` });
        } else {
          const perfect = board.find(b => b.today.possible > 0 && b.today.percentage === 100);
          if (perfect && board.length > 1) {
            candidates.push({ priority: 3, html: `<div class="sb-highlight-row">${checkSvg} ${esc(perfect.person.name)} is at 100% today</div>` });
          }
        }

        // Priority 2: streak-leader (≥3 days)
        const streakLeader = board.reduce((best, b) => (!best || b.streak.current > best.streak.current) ? b : best, null);
        if (streakLeader?.streak.current >= 3) {
          candidates.push({ priority: 2, html: `<div class="sb-highlight-row">${flameSvg} ${esc(streakLeader.person.name)} is on a ${streakLeader.streak.current}-day streak</div>` });
        }

        // Priority 5: most-improved week-over-week (≥5%)
        let mostImproved = null; let bestDiff = 5;
        for (const b of board) {
          if (b.lastWeek.possible === 0 || b.week.possible === 0) continue;
          const diff = b.week.percentage - b.lastWeek.percentage;
          if (diff > bestDiff) { bestDiff = diff; mostImproved = b; }
        }
        if (mostImproved) {
          candidates.push({ priority: 5, html: `<div class="sb-highlight-row">${trendSvg('up')} ${esc(mostImproved.person.name)} is up ${Math.round(bestDiff)}% from last week</div>` });
        }

        // Priority 1: streak-at-risk (highest — actionable warning)
        const warnSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
        for (const b of board) {
          const risk = streakAtRisk(b.person.id, schedule, comps, b.streak, today, tz);
          if (risk) {
            const word = risk.incompleteCount === 1 ? 'task' : 'tasks';
            candidates.push({ priority: 1, html: `<div class="sb-highlight-row">${warnSvg} ${esc(b.person.name)}'s ${risk.currentStreak}-day streak ends tonight — ${risk.incompleteCount} ${word} left</div>` });
          }
        }

        // Priority 6: personal-best
        const trophySvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>`;
        for (const b of board) {
          const pb = personalBest(allSnapshots, b.person.id, today);
          if (pb) {
            candidates.push({ priority: 6, html: `<div class="sb-highlight-row">${trophySvg} ${esc(b.person.name)} just set a personal best — ${pb.count} perfect days in ${esc(pb.monthLabel)}</div>` });
          }
        }

        // Priority 7: day-of-week-pattern (lowest — only fills if other slots aren't full)
        const calSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
        for (const b of board) {
          const pat = dayOfWeekPattern(allSnapshots, b.person.id);
          if (pat) {
            candidates.push({ priority: 7, html: `<div class="sb-highlight-row">${calSvg} ${esc(b.person.name)} peaks on ${esc(pat.bestDay)}s (${pat.bestPct}%), dips on ${esc(pat.worstDay)}s (${pat.worstPct}%)</div>` });
          }
        }

        // Sort by priority (lower = higher rank), take top 3
        candidates.sort((a, b) => a.priority - b.priority);
        const top = candidates.slice(0, 3);

        if (top.length > 0) {
          html += renderSectionHead('Highlights');
          html += `<div class="card sb-highlights">${top.map(c => c.html).join('')}</div>`;
        }
      }

      // ── Category Leaders (2+ people only) ──
      if (board.length >= 2) {
        const clDates = { today: [today, today], week: [addDays(today, -6), today], month: [addDays(today, -29), today], year: [y12Start, today] };
        const [clStart, clEnd] = clDates[selectedPeriod];
        const allCatData = {};
        for (const b of board) {
          const breakdown = categoryBreakdown(b.person.id, clStart, clEnd);
          for (const [catKey, data] of Object.entries(breakdown)) {
            if (data.possible === 0) continue;
            const pct = Math.round((data.earned / data.possible) * 100);
            if (!allCatData[catKey]) allCatData[catKey] = { label: data.label, icon: data.icon, entries: [] };
            allCatData[catKey].entries.push({ person: b.person, pct });
          }
        }
        const sharedCats = Object.entries(allCatData)
          .filter(([, d]) => d.entries.length >= 2)
          .sort((a, b) => a[1].label.localeCompare(b[1].label));
        const catsWithLeaders = sharedCats
          .map(([, data]) => {
            const sorted = [...data.entries].sort((a, b) => b.pct - a.pct);
            const leader = sorted[0];
            return leader.pct > 0 ? { data, leader } : null;
          })
          .filter(Boolean);
        if (catsWithLeaders.length > 0) {
          html += renderSectionHead('Category Leaders');
          html += `<div class="card sb-cat-leaders">`;
          for (const { data, leader } of catsWithLeaders) {
            html += `<div class="sb-cat-leader-row">
              <span class="sb-cat-leader-label">${data.icon ? esc(data.icon) + ' ' : ''}${esc(data.label)}</span>
              <span class="sb-cat-leader-person">
                <span class="sb-mini-dot" style="background:${esc(leader.person.color)}"></span>
                ${esc(leader.person.name)}
              </span>
              <span class="sb-cat-leader-pct">${leader.pct}%</span>
            </div>`;
          }
          html += `</div>`;
        }
      }

      main.innerHTML = html;
      applyDataColors(main);
      bindEvents();
    }

    // ── Event binding ──

    function bindEvents() {
      // Period tabs
      for (const btn of document.querySelectorAll('.tab[data-period]')) {
        btn.addEventListener('click', () => {
          selectedPeriod = btn.dataset.period;
          cardPeriods.clear(); // reset per-card overrides on global period change
          if (linkedPerson) {
            const prefs = { ...(linkedPerson.prefs || {}), scoreboard: { period: selectedPeriod } };
            linkedPerson.prefs = prefs;
            const { id, ...data } = linkedPerson;
            writePerson(id, data);
          }
          render();
        });
      }

      // Hero cards — three click zones: drilldown / rewards / cycle-period
      for (const card of document.querySelectorAll('.card--score[data-person-id]')) {
        // Outer click → drilldown (only when not on an inner button)
        card.addEventListener('click', (e) => {
          const inner = e.target.closest('[data-action]');
          if (!inner || inner === card) {
            openDrilldown(card.dataset.personId);
            return;
          }
          const action = inner.dataset.action;
          if (action === 'rewards') {
            e.stopPropagation();
            const name = card.querySelector('.card__title')?.textContent || '';
            location.href = `rewards.html?person=${encodeURIComponent(name.trim())}`;
          } else if (action === 'cycle-period') {
            e.stopPropagation();
            cyclePeriod(card.dataset.personId);
          } else if (action === 'drilldown') {
            openDrilldown(card.dataset.personId);
          }
        });
        // Keyboard support for the div-role-button outer
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openDrilldown(card.dataset.personId);
          }
        });
      }
    }

    // ── Drill-down bottom sheet ──

    function openDrilldown(personId) {
      const person = people.find(p => p.id === personId);
      if (!person) return;

      const periodDates = {
        today: [today, today],
        week:  [addDays(today, -6), today],
        month: [addDays(today, -29), today],
        year:  [y12Start, today],
      };
      const [dStart, dEnd] = periodDates[selectedPeriod];
      const periodLabels = { today: 'Today', week: 'Last 7 Days', month: 'Last 30 Days', year: 'This Year' };

      const grade = selectedPeriod === 'today' ? todayScore(personId)
        : selectedPeriod === 'week'  ? weeklyGrade(personId)
        : selectedPeriod === 'month' ? monthlyGrade(personId)
        : yearGrade(personId);
      const gd = gradeDisplay(grade.percentage);

      // Family average for the same period — used for "+3 vs family" comparison
      let familyAvgPct = null;
      {
        const ps = selectedPeriod === 'today' ? today : (selectedPeriod === 'week' ? addDays(today, -6) : (selectedPeriod === 'month' ? addDays(today, -29) : y12Start));
        const perPerson = people.map(p => {
          if (p.id === personId) return null;
          if (selectedPeriod === 'today') {
            return todayScore(p.id);
          }
          const pastSnaps = collectSnapshots(snapshots, p.id, ps, addDays(today, -1));
          const todayLive = todayScore(p.id);
          const all = [...pastSnaps];
          if (todayLive.possible > 0 && selectedPeriod !== 'today') all.push(todayLive);
          return aggregateSnapshots(all);
        }).filter(Boolean);
        const fam = aggregateSnapshots(perPerson);
        if (fam.possible > 0) familyAvgPct = fam.percentage;
      }
      const familyDiff = (familyAvgPct !== null && grade.possible > 0) ? grade.percentage - familyAvgPct : null;

      const streak = streaks[personId] || { current: 0, best: 0 };
      const personMsgs = allMessages?.[personId] || {};
      const personAnchor = allAnchors?.[personId] || null;
      const { balance } = calculateBalance(personId, allSnapshots, personMsgs, personAnchor, allMultipliers, tz);
      const currentBalance = Math.round(balance);

      // Gather task-level detail for this person in the period
      const taskDetails = [];
      let cur = dStart;
      while (cur <= dEnd && cur <= today) {
        const dayEntries = schedule[cur] || {};
        for (const [k, e] of Object.entries(dayEntries)) {
          if (e.ownerId !== personId) continue;
          const task = tasks[e.taskId];
          if (!task) continue;
          const completion = comps[k] || null;
          const pts = basePoints(task, settings?.difficultyMultipliers);
          const earned = completion ? earnedPoints(task, completion, settings?.difficultyMultipliers) : 0;
          let status;
          if (completion) {
            status = completion.isLate ? 'Late' : 'Done';
          } else if (cur < today) {
            status = 'Missed';
          } else {
            status = 'Pending';
          }
          const cat = task.category ? cats[task.category] : null;
          const catIcon = cat?.icon || '';
          taskDetails.push({ entryKey: k, name: task.name, catIcon, date: cur, pts, earned, status, exempt: !!task.exempt, isEvent: !!cat?.isEvent });
        }
        cur = addDays(cur, 1);
      }

      // ── Task count (store-points-correct: excludes events + exempt) ──
      const countable = taskDetails.filter(t => !t.exempt && !t.isEvent);
      const tasksDone = countable.filter(t => t.status === 'Done' || t.status === 'Late').length;
      const tasksTotal = countable.length;

      // ── Store points actually earned this period (percentage × multiplier per day) ──
      let periodStorePts = 0;
      {
        let cur2 = dStart;
        while (cur2 <= dEnd && cur2 <= today) {
          let dayPct = 0;
          if (cur2 === today) {
            dayPct = todayScore(personId).percentage || 0;
          } else {
            dayPct = snapshots[cur2]?.[personId]?.percentage || 0;
          }
          const mult = allMultipliers?.[cur2]?.[personId]?.multiplier || 1;
          if (dayPct > 0) periodStorePts += dayPct * mult;
          cur2 = addDays(cur2, 1);
        }
        periodStorePts = Math.round(periodStorePts);
      }

      // ── Category breakdown ──
      const breakdown = categoryBreakdown(personId, dStart, dEnd);
      const catKeys = Object.keys(breakdown).sort(
        (a, b) => breakdown[b].possible - breakdown[a].possible
      );

      // ── Build sheet HTML ──
      let html = `<div class="sb-drilldown">`;

      // Header — name with inline grade badge
      const inlineBadge = grade.possible > 0
        ? `<span class="grade-badge grade-badge--${esc(gd.tier)} grade-badge--sm sb-drilldown__inline-grade">${esc(gd.grade)}</span>`
        : '';
      html += `<div class="sb-drilldown__header" style="--owner-color: ${esc(person.color)}">
        <div class="avatar" style="--person-color: ${esc(person.color)}">${esc((person.name || '?')[0].toUpperCase())}</div>
        <span class="sb-drilldown__name">${esc(person.name)}</span>
        ${inlineBadge}
        <span class="sb-drilldown__period">${periodLabels[selectedPeriod]}</span>
        <button class="ef2-icon-btn" id="ddClose" aria-label="Close" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;

      // Summary row — stats inline, no large duplicate badge (badge moved to header)
      const famCompare = familyDiff !== null
        ? ` · <span class="sb-drilldown__fam-cmp">${familyDiff >= 0 ? '+' : ''}${familyDiff} vs family</span>`
        : '';
      html += grade.possible > 0
        ? `<div class="sb-drilldown__summary">
            <span class="sb-drilldown__stats">${tasksDone}/${tasksTotal} tasks · ${grade.percentage}%${famCompare}</span>
          </div>`
        : `<div class="sb-drilldown__summary">
            <span class="sb-drilldown__stats">No tasks ${periodLabels[selectedPeriod].toLowerCase()}</span>
          </div>`;

      // Time contributed for the active period
      const contribMin = timeContributed(personId, schedule, comps, tasks, dStart, dEnd, addDays);
      if (contribMin > 0) {
        html += `<div class="sb-drilldown__contrib">${formatMinutes(contribMin)} contributed</div>`;
      }

      // Category breakdown
      if (catKeys.length > 0) {
        html += renderSectionHead('Category Breakdown');
        html += `<div class="sb-cat-bars">`;
        for (const ck of catKeys) {
          const c = breakdown[ck];
          const pct = c.possible > 0 ? Math.round((c.earned / c.possible) * 100) : 0;
          const tier = pct > 0 ? gradeDisplay(pct).tier : 'none';
          html += `<div class="sb-cat-row">
            <span class="sb-cat-label">${esc(c.icon)} ${esc(c.label)}</span>
            <div class="sb-cat-bar">
              <div class="sb-cat-bar-fill sb-cat-bar-fill--${esc(tier)}" style="width:${pct}%"></div>
            </div>
            <span class="sb-cat-pct">${pct}%</span>
          </div>`;
        }
        html += `</div>`;
      }

      // ── Achievement gallery (Pass 3) ──
      {
        const personAchievements = allAchievementsData?.[personId] || {};
        const unlockedEntries = Object.entries(personAchievements)
          .filter(([, a]) => !a.revoked)
          .map(([key, a]) => ({ key, def: activeDefs[key], unlockedAt: a.unlockedAt }))
          .filter(e => e.def)
          .sort((a, b) => (b.unlockedAt || 0) - (a.unlockedAt || 0))
          .slice(0, 6);

        // Build context for progress computation (mirrors checkNewAchievements call site)
        const pStreak = streaks[personId] || { current: 0, best: 0 };
        const personMsgsForCtx = allMessages?.[personId] || {};
        const personAnchorForCtx = allAnchors?.[personId] || null;
        const { totalEarned } = calculateBalance(personId, allSnapshots, personMsgsForCtx, personAnchorForCtx, allMultipliers, tz);
        const progressContext = {
          streak: pStreak.current,
          bestStreak: pStreak.best,
          totalEarned,
          tasksCompleted: 0,
          perfectDays: 0,
          hasRedeemed: Object.values(personMsgsForCtx).some(m => m.type === 'redemption-approved'),
        };

        const lockedCandidates = Object.entries(activeDefs)
          .filter(([key]) => !personAchievements[key] || personAchievements[key].revoked)
          .map(([key, def]) => ({ key, def, prog: achievementProgress(def, progressContext) }))
          .filter(e => e.prog && e.prog.progressPct > 0)
          .sort((a, b) => b.prog.progressPct - a.prog.progressPct)
          .slice(0, 3);

        if (unlockedEntries.length > 0 || lockedCandidates.length > 0) {
          html += renderSectionHead('Achievements');
          if (unlockedEntries.length > 0) {
            html += `<div class="sb-achievements">`;
            for (const e of unlockedEntries) {
              html += renderAchievementBadge(e.def, { unlocked: true, unlockedAt: e.unlockedAt });
            }
            html += `</div>`;
          }

          if (lockedCandidates.length > 0) {
            html += `<div class="sb-achievements__label">Closest to unlock</div>`;
            html += `<div class="sb-achievements sb-achievements--locked">`;
            for (const e of lockedCandidates) {
              html += renderAchievementBadge(e.def, { unlocked: false, hint: e.prog.hint });
            }
            html += `</div>`;
          }
        }
      }

      // ── Last 90 days heatmap (Pass 4) — replaces sparkline ──
      html += renderSectionHead('Last 90 days');
      html += renderHeatmap(snapshots, personId, today, todayScore(personId), addDays, weekStartForDay, gradeTier);

      // Streak
      const flameSvg = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`;
      html += renderSectionHead('Streak');
      html += `<div class="sb-drilldown__streak-row">
        <div class="sb-drilldown__streak-item">
          <div class="sb-streak-top">
            <span class="sb-streak-icon">${flameSvg}</span>
            <span class="sb-streak-num">${streak.current}</span>
          </div>
          <div class="sb-streak-sub">day streak</div>
        </div>
        <div class="sb-drilldown__streak-item">
          <div class="sb-streak-top">
            <span class="sb-streak-num sb-streak-num--muted">${streak.best}</span>
          </div>
          <div class="sb-streak-sub">best ever</div>
        </div>
      </div>`;

      // Balance summary
      html += renderSectionHead('Balance');
      html += `<div class="sb-drilldown__balance-summary">
        <span class="sb-drilldown__balance-big">${currentBalance.toLocaleString()}</span><span class="sb-drilldown__balance-unit">pts</span>
        ${periodStorePts > 0 ? `<span class="sb-drilldown__balance-delta">+${periodStorePts.toLocaleString()} pts earned ${esc(periodLabels[selectedPeriod].toLowerCase())}</span>` : ''}
      </div>`;

      // ── Send Kudos button (Pass 3) ──
      html += `<button class="sb-kudos-btn" type="button" id="ddKudos">
        <span class="sb-kudos-btn__icon" aria-hidden="true">👏</span>
        <span class="sb-kudos-btn__label">Send kudos to ${esc(person.name)}</span>
      </button>`;

      // Needs attention — Missed and Late only
      html += renderSectionHead(`Needs Attention`);
      const attentionOrder = ['Missed', 'Late'];
      const statusGroups = {};
      for (const td of taskDetails) {
        if (!statusGroups[td.status]) statusGroups[td.status] = [];
        statusGroups[td.status].push(td);
      }
      let hasAnyAttention = false;
      for (const status of attentionOrder) {
        const items = statusGroups[status];
        if (!items?.length) continue;
        hasAnyAttention = true;
        const statusClass = `sb-status--${status.toLowerCase()}`;
        html += `<div class="sb-drilldown__group">
          <div class="sb-drilldown__group-label ${statusClass}">${status} (${items.length})</div>`;
        for (const item of items) {
          html += `<button class="sb-drilldown__task sb-drilldown__task--tappable" type="button" data-entry-key="${esc(item.entryKey || '')}" data-status="${esc(item.status)}">
            <span class="sb-drilldown__task-name">${item.catIcon ? esc(item.catIcon) + ' ' : ''}${esc(item.name)}</span>
            <span class="sb-drilldown__task-date">${formatDateShort(item.date)}</span>
          </button>`;
        }
        html += `</div>`;
      }
      if (!hasAnyAttention) {
        html += `<div class="sb-drilldown__empty">Nothing missed or late${taskDetails.length > 0 ? ' — nice work!' : ''}</div>`;
      }

      html += `</div>`;

      // Mount bottom sheet
      const mount = document.getElementById('drilldownMount');
      mount.innerHTML = renderBottomSheet(html);
      applyDataColors(mount);

      requestAnimationFrame(() => {
        const overlay = document.getElementById('bottomSheet');
        if (overlay) {
          overlay.classList.add('active');
          overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeDrilldown();
          });
        }
        document.getElementById('ddClose')?.addEventListener('click', closeDrilldown);
        document.getElementById('ddKudos')?.addEventListener('click', () => {
          // Mount the kudos sheet as a new overlay on top of the drilldown
          const kudosMount = document.createElement('div');
          kudosMount.id = 'kudosMount';
          document.body.appendChild(kudosMount);
          kudosMount.innerHTML = renderSendMessageSheet(people, personId, sbRewards || {});
          // The renderSendMessageSheet wraps in renderBottomSheet which has class .bottom-sheet-overlay.
          // Activate it now (renderBottomSheet starts without the .active class).
          requestAnimationFrame(() => {
            const overlay = kudosMount.querySelector('.bottom-sheet-overlay');
            overlay?.classList.add('active');
          });
          // Bind with writeMessage + writeBankToken from firebase.js (already imported)
          bindSendMessageSheet(kudosMount, writeMessage, linkedPerson?.name || 'Family', writeBankToken, () => sbRewards || {});
          // bindSendMessageSheet clears kudosMount.innerHTML on cancel/send/overlay-click.
          // We also need to remove the empty mount element itself afterwards. Use a MutationObserver.
          const obs = new MutationObserver(() => {
            if (!kudosMount.innerHTML) {
              kudosMount.remove();
              obs.disconnect();
            }
          });
          obs.observe(kudosMount, { childList: true, subtree: false });
        });

        // Needs Attention rows — tap opens action sheet
        for (const row of document.querySelectorAll('.sb-drilldown__task--tappable')) {
          const entryKey = row.dataset.entryKey;
          const status = row.dataset.status;
          if (!entryKey) continue;
          row.addEventListener('click', () => {
            openLateActionSheet(entryKey, status);
          });
        }
      });
    }

    function closeDrilldown() {
      const overlay = document.getElementById('bottomSheet');
      if (overlay) {
        overlay.classList.remove('active');
        setTimeout(() => {
          document.getElementById('drilldownMount').innerHTML = '';
        }, 300);
      }
    }

    function openLateActionSheet(entryKey, status) {
      let entry = null;
      for (const day of Object.keys(schedule)) {
        if (schedule[day]?.[entryKey]) { entry = schedule[day][entryKey]; break; }
      }
      if (!entry) return;
      const task = tasks[entry.taskId];
      if (!task) return;

      const overlayEl = document.createElement('div');
      overlayEl.id = 'lateActionOverlay';
      overlayEl.className = 'bottom-sheet-overlay';
      overlayEl.innerHTML = `<div class="bottom-sheet">
        <div class="sb-late-action">
          <div class="sb-late-action__title">${esc(task.name)}</div>
          <div class="sb-late-action__sub">Status: ${esc(status)}</div>
          <button class="sb-late-action__btn sb-late-action__btn--primary" id="ddLateDone" type="button">Mark Late-Done</button>
          <button class="sb-late-action__btn" id="ddLateCancel" type="button">Cancel</button>
        </div>
      </div>`;
      document.body.appendChild(overlayEl);
      requestAnimationFrame(() => overlayEl.classList.add('active'));

      const close = () => overlayEl.remove();
      overlayEl.addEventListener('click', (e) => { if (e.target === overlayEl) close(); });
      document.getElementById('ddLateCancel').addEventListener('click', close);
      document.getElementById('ddLateDone').addEventListener('click', async () => {
        await writeCompletion(entryKey, {
          completedAt: firebase.database.ServerValue.TIMESTAMP,
          completedBy: 'scoreboard',
          pointsOverride: settings?.pastDueCreditPct ?? 75,
          isLate: true,
        });
        close();
        location.reload();
      });
    }

    // ── Init ──
    document.getElementById('loadingState').style.display = 'none';
    const main = document.getElementById('mainContent');
    main.style.display = '';
    render();
    } catch (err) {
      document.getElementById('loadingState').style.display = 'none';
      const errMain = document.getElementById('mainContent');
      errMain.style.display = '';
      renderErrorState(errMain, {
        title: "Couldn't load scoreboard",
        message: 'Check your connection and try again.',
        retry: () => location.reload(),
      });
    }
  </script>
  <script src="/shared/dev-banner.js"></script>
</body>
</html>
