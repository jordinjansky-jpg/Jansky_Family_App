<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanity Check — Family Hub</title>
  <style>
    body { font: 14px ui-monospace, Menlo, Consolas, monospace; padding: 12px; background: #f7f6f2; color: #171717; }
    pre { white-space: pre-wrap; word-break: break-word; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #e8e4de; }
    h1 { font: 600 18px system-ui; margin: 0 0 12px; }
    .ok { color: #166534; }
    .fail { color: #b4491c; font-weight: 700; }
    button { font: 14px system-ui; padding: 10px 16px; border-radius: 8px; border: 1px solid #d0cfc9; background: #fff; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Family Hub — Sanity Check</h1>
  <pre id="out">running…</pre>
  <button id="clearSw">Unregister service worker + clear caches</button>
  <pre id="clearOut"></pre>

  <script>
    var out = document.getElementById('out');
    out.textContent = '';
    function log(k, v) { out.textContent += k + ': ' + v + '\n'; }

    log('UA', navigator.userAgent);
    log('onLine', navigator.onLine);
    log('cookieEnabled', navigator.cookieEnabled);
    log('localStorage', (function () {
      try { localStorage.setItem('_t', '1'); localStorage.removeItem('_t'); return 'ok'; }
      catch (e) { return 'FAIL ' + e.message; }
    })());
    log('sessionStorage', (function () {
      try { sessionStorage.setItem('_t', '1'); sessionStorage.removeItem('_t'); return 'ok'; }
      catch (e) { return 'FAIL ' + e.message; }
    })());

    log('CSS color-mix', CSS.supports('color', 'color-mix(in srgb, red, blue)'));
    log('CSS overflow:clip', CSS.supports('overflow', 'clip'));
    log('CSS 100dvh', CSS.supports('height', '100dvh'));
    log('CSS env()', CSS.supports('padding', 'env(safe-area-inset-top)'));
    log('CSS :has()', CSS.supports('selector(:has(*))'));
    log('structuredClone', typeof structuredClone);
    log('Promise.allSettled', typeof Promise.allSettled);
    log('Array.prototype.at', typeof Array.prototype.at);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        log('SW registrations', regs.length);
        regs.forEach(function (r, i) {
          log('SW ' + i + ' scope', r.scope);
          log('SW ' + i + ' active', r.active ? r.active.scriptURL : '(no active)');
          log('SW ' + i + ' waiting', r.waiting ? r.waiting.scriptURL : '(none)');
          log('SW ' + i + ' installing', r.installing ? r.installing.scriptURL : '(none)');
        });
      });
      if ('caches' in window) {
        caches.keys().then(function (keys) {
          log('Cache keys', JSON.stringify(keys));
        });
      }
    } else {
      log('SW', 'not supported');
    }

    fetch('/dashboard.js', { cache: 'no-store' })
      .then(function (r) { log('fetch /dashboard.js (no-store)', r.status); })
      .catch(function (e) { log('fetch /dashboard.js', 'FAIL ' + e.message); });

    fetch('/shared/components.js', { cache: 'no-store' })
      .then(function (r) { log('fetch /shared/components.js', r.status); })
      .catch(function (e) { log('fetch /shared/components.js', 'FAIL ' + e.message); });

    document.getElementById('clearSw').addEventListener('click', async function () {
      var co = document.getElementById('clearOut');
      co.textContent = 'working…\n';
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var r of regs) {
            var ok = await r.unregister();
            co.textContent += 'unregister ' + r.scope + ' → ' + ok + '\n';
          }
        }
        if ('caches' in window) {
          var keys = await caches.keys();
          for (var k of keys) {
            var ok = await caches.delete(k);
            co.textContent += 'delete cache ' + k + ' → ' + ok + '\n';
          }
        }
        co.textContent += 'done — hard-refresh now.\n';
      } catch (e) {
        co.textContent += 'FAIL ' + e.message + '\n';
      }
    });
  </script>
</body>
</html>
