<!DOCTYPE html>
<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Family task manager with scheduling, scoring, and gamification">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/App Icon.png" type="image/png">
  <link rel="apple-touch-icon" href="/App Icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Family Hub — Tracker</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/tracker.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
  <div id="headerMount"></div>
  <div class="page-content" id="app">
    <div id="bannerMount"></div>
    <div class="loading-inline" id="loadingState">
      <div class="loading-spinner loading-spinner--small"></div>
      <span>Loading...</span>
    </div>
    <div id="mainContent" style="display:none;"></div>
  </div>
  <div id="navMount"></div>
  <div id="taskSheetMount"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

  <script type="module">
    import { initFirebase, isFirstRun, readSettings, readPeople, readTasks, readCategories, readCompletions, readAllSchedule, writeCompletion, removeCompletion, writeTask, writePerson, multiUpdate, onConnectionChange, onAllMessages, writeMessage, markMessageSeen, removeMessage, writeBankToken, markBankTokenUsed, readBank, writeMultiplier, readRewards } from './shared/firebase.js';
    import { renderNavBar, renderHeader, renderEmptyState, renderPersonFilter, renderTaskDetailSheet, renderBottomSheet, renderEditTaskSheet, openDeviceThemeSheet, initOfflineBanner, initBell, initBanner, applyDataColors } from './shared/components.js';
    import { initOwnerChips, getSelectedOwners } from './shared/dom-helpers.js';
    import { basePoints, gradeDisplay } from './shared/scoring.js';
    import { applyTheme, loadCachedTheme, defaultThemeConfig, resolveTheme } from './shared/theme.js';
    import { todayKey, weekStart, weekEnd, monthStart, monthEnd, addDays, dateRange, formatDateShort, dayOfWeek, DAY_NAMES_SHORT, isoWeekNumber, formatDateLong, escapeHtml } from './shared/utils.js';
    const esc = (s) => escapeHtml(String(s ?? ''));
    import { isComplete } from './shared/state.js';
    import { isInCooldown } from './shared/scheduler.js';

    // ── Cached theme ──
    applyTheme(resolveTheme());

    // ── Init Firebase ──
    initFirebase();
    const firstRun = await isFirstRun();
    if (firstRun) { window.location.href = 'setup.html'; }

    // ── Load all data ──
    const [settings, peopleObj, tasksObj, catsObj, completions, allSchedule, trkRewards] = await Promise.all([
      readSettings(), readPeople(), readTasks(), readCategories(),
      readCompletions(), readAllSchedule(), readRewards()
    ]);

    if (settings?.theme) applyTheme(resolveTheme(settings.theme));

    const tz = settings?.timezone || 'America/Chicago';
    const today = todayKey(tz);
    const people = peopleObj ? Object.entries(peopleObj).map(([id, p]) => ({ id, ...p })) : [];
    const tasks = tasksObj || {};
    const cats = catsObj || {};
    let comps = completions || {};
    let schedule = allSchedule || {};
    let pendingSliderOverride = null;

    async function loadData() {
      const [c, s] = await Promise.all([readCompletions(), readAllSchedule()]);
      comps = c || {};
      schedule = s || {};
    }

    // ── Period anchor (in-memory only, resets to today on reload) ──
    let periodAnchor = today;

    function currentRange() {
      if (activeView === 'weekly') {
        return { start: weekStart(periodAnchor), end: weekEnd(periodAnchor) };
      }
      // Expand to full calendar weeks so partial weeks at month edges are complete
      return { start: weekStart(monthStart(periodAnchor)), end: weekEnd(monthEnd(periodAnchor)) };
    }

    function shiftPeriod(delta) {
      // delta is -1 (previous) or +1 (next)
      if (activeView === 'weekly') {
        periodAnchor = addDays(periodAnchor, delta * 7);
      } else {
        // Step to the adjacent calendar month, then normalise to its start
        // so repeated taps are stable regardless of month length.
        const anchor = monthStart(periodAnchor);
        const stepped = delta < 0
          ? addDays(anchor, -1)                 // day before this month's start
          : addDays(monthEnd(anchor), 1);       // day after this month's end
        periodAnchor = monthStart(stepped);
      }
      render();
    }

    function snapToToday() {
      periodAnchor = today;
      render();
    }

    // ── Person link mode (?person=Name) for per-user prefs ──
    const personParam = new URLSearchParams(window.location.search).get('person');
    const linkedPerson = personParam
      ? people.find(p => p.name.toLowerCase() === personParam.toLowerCase())
      : null;

    // ── State (restore from prefs if available) ──
    const _tp = linkedPerson?.prefs?.tracker || {};
    let activeView = _tp.view || 'weekly';  // 'weekly' | 'monthly'
    let activePerson = _tp.personFilter || null;
    let activeCategory = _tp.category || null;
    let activeStatus = _tp.status || null;    // null = all, or 'done'|'late'|'overdue'|'upcoming'|'skipped'

    // ── Header & Nav ──
    const debugActive = localStorage.getItem('dr-debug') === 'true';
    document.getElementById('headerMount').innerHTML = renderHeader({
      appName: settings?.appName || 'Daily Rundown',
      subtitle: 'Tracker',
      dateLine: formatDateLong(today),
      showAdmin: true,
      showDebug: debugActive,
      showThemePicker: true,
      showBell: true
    });
    document.getElementById('navMount').innerHTML = renderNavBar('tracker');

    document.getElementById('headerThemeBtn')?.addEventListener('click', () => {
      openDeviceThemeSheet(document.getElementById('taskSheetMount'), settings?.theme);
    });

    // ── Connection status + Offline/Online banner ──
    initOfflineBanner(onConnectionChange);
    initBell(() => people, () => trkRewards || {}, onAllMessages, { writeMessageFn: writeMessage, markMessageSeenFn: markMessageSeen, removeMessageFn: removeMessage, writeBankTokenFn: writeBankToken, markBankTokenUsedFn: markBankTokenUsed, readBankFn: readBank, writeMultiplierFn: writeMultiplier, getTodayFn: () => today, approverName: linkedPerson?.name || null });

    // Cross-page banner queue (vacation / freeze / running-activity / offline).
    let __pageIsOffline = !navigator.onLine;
    const bannerCtl = initBanner({ getIsOffline: () => __pageIsOffline });
    window.addEventListener('online',  () => { __pageIsOffline = false; bannerCtl?.refresh(); });
    window.addEventListener('offline', () => { __pageIsOffline = true;  bannerCtl?.refresh(); });
    // Refresh every 5s to update running-activity elapsed time.
    setInterval(() => bannerCtl?.refresh(), 5000);

    // ── Helpers ──

    /**
     * Determine the status of a schedule entry.
     * Returns: 'done' | 'late' | 'overdue' | 'upcoming'
     */
    function entryStatus(entryKey, dateKey) {
      const completion = comps[entryKey];
      if (completion) {
        // Done: completed. "Late" only if isLate flag was set at completion time.
        return completion.isLate ? 'late' : 'done';
      }
      // Not completed
      return dateKey < today ? 'overdue' : 'upcoming';
    }

    /**
     * Format a completion date for display.
     */
    function formatCompletionDate(completedAt) {
      if (!completedAt) return '';
      const d = new Date(completedAt);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    /**
     * Collect tracker rows for a rotation type within a date range.
     * Returns array of { entryKey, dateKey, entry, task, person, category, status, completionDate }
     */
    function collectRows(rotationType, startDate, endDate) {
      const dates = dateRange(startDate, endDate);
      const rows = [];

      for (const dateKey of dates) {
        const dayEntries = schedule[dateKey];
        if (!dayEntries) continue;

        for (const [entryKey, entry] of Object.entries(dayEntries)) {
          if (entry.rotationType !== rotationType) continue;

          const task = tasks[entry.taskId];
          if (!task) continue;

          const person = people.find(p => p.id === entry.ownerId);
          const cat = task.category ? cats[task.category] : null;
          const status = entryStatus(entryKey, dateKey);
          const completion = comps[entryKey];

          rows.push({
            entryKey,
            dateKey,
            entry,
            task,
            person,
            category: cat,
            status,
            completionDate: completion ? formatCompletionDate(completion.completedAt) : null
          });
        }
      }

      return rows;
    }

    /**
     * Find active tasks of a rotation type that have NO schedule entry in the period.
     * These are "skipped" — e.g., due to cooldown or paused status during scheduling.
     */
    function findSkippedTasks(rotationType, startDate, endDate, existingRows) {
      const scheduledTaskIds = new Set(existingRows.map(r => r.entry.taskId));
      const skipped = [];

      for (const [taskId, task] of Object.entries(tasks)) {
        if (task.rotation !== rotationType || task.status !== 'active') continue;
        if (scheduledTaskIds.has(taskId)) continue;
        if (task.createdDate && task.createdDate > endDate) continue;

        // Detect cooldown: check if the end of the period is still in cooldown
        const isCooldownSkip = task.cooldownDays > 0 &&
          isInCooldown(task, taskId, endDate, comps, schedule);
        const status = isCooldownSkip ? 'cooldown' : 'skipped';

        const mode = task.ownerAssignmentMode || 'rotate';
        if (mode === 'duplicate') {
          // Duplicate mode: show per-owner since each owner gets the task
          for (const ownerId of (task.owners || [])) {
            const person = people.find(p => p.id === ownerId);
            const cat = task.category ? cats[task.category] : null;
            skipped.push({
              entryKey: null, dateKey: null,
              entry: { taskId, ownerId, rotationType, timeOfDay: task.timeOfDay },
              task, person, category: cat, status, completionDate: null
            });
          }
        } else {
          // Rotate/fixed: one row per task (only one person gets it per period)
          const cat = task.category ? cats[task.category] : null;
          skipped.push({
            entryKey: null, dateKey: null,
            entry: { taskId, ownerId: null, rotationType, timeOfDay: task.timeOfDay },
            task, person: null, category: cat, status, completionDate: null
          });
        }
      }

      return skipped;
    }

    /**
     * Apply filters to rows.
     */
    function filterRows(rows) {
      return rows.filter(row => {
        // For rotate-mode skipped/cooldown rows (ownerId is null), check if the
        // filtered person is one of the task's owners
        if (activePerson) {
          if (row.entry.ownerId) {
            if (row.entry.ownerId !== activePerson) return false;
          } else if (!row.task.owners?.includes(activePerson)) {
            return false;
          }
        }
        if (activeCategory && row.task.category !== activeCategory) return false;
        if (activeStatus && row.status !== activeStatus) return false;
        return true;
      });
    }

    // ── Status badge rendering ──

    const STATUS_CONFIG = {
      done:     { label: 'Done',     class: 'tracker-status--done' },
      late:     { label: 'Done Late', class: 'tracker-status--late' },
      overdue:  { label: 'Overdue',  class: 'tracker-status--overdue' },
      upcoming: { label: 'Upcoming', class: 'tracker-status--upcoming' },
      cooldown: { label: 'Cooldown', class: 'tracker-status--cooldown' },
      skipped:  { label: 'Skipped',  class: 'tracker-status--skipped' }
    };

    function renderStatusBadge(status) {
      const cfg = STATUS_CONFIG[status] || STATUS_CONFIG.upcoming;
      return `<span class="tracker-status ${cfg.class}">${cfg.label}</span>`;
    }

    // ── Row rendering ──

    function renderRow(row) {
      const showIcon = row.category?.showIcon !== false;
      const catIcon = showIcon ? (row.category?.icon || '') : '';
      const ownerColor = row.person?.color || 'var(--text-muted)';
      const ownerInitial = row.person ? row.person.name[0].toUpperCase() : '↻';
      const ownerName = row.person?.name || 'Rotates';
      const taskName = catIcon ? `${catIcon} ${esc(row.task.name)}` : esc(row.task.name);
      const dateLabel = row.dateKey ? formatDateShort(row.dateKey) : '—';
      const completionInfo = row.completionDate ? `<span class="tracker-row__completed">${row.completionDate}</span>` : '';
      const overdueClass = row.status === 'overdue' ? ' tracker-row--overdue' : '';
      const doneClass = (row.status === 'done' || row.status === 'late') ? ' tracker-row--done' : '';

      return `<div class="tracker-row${overdueClass}${doneClass}" data-entry-key="${row.entryKey || ''}" data-date-key="${row.dateKey || ''}">
        <span class="tracker-row__initial" style="--owner-color:${ownerColor}">${ownerInitial}</span>
        <div class="tracker-row__info">
          <span class="tracker-row__name">${taskName}</span>
          <span class="tracker-row__meta">${esc(ownerName)} · ${dateLabel}</span>
        </div>
        <div class="tracker-row__right">
          ${renderStatusBadge(row.status)}
          ${completionInfo}
        </div>
      </div>`;
    }

    // ── Summary bar ──

    function renderSummary(rows) {
      const counts = { done: 0, late: 0, overdue: 0, upcoming: 0, cooldown: 0, skipped: 0 };
      for (const r of rows) counts[r.status] = (counts[r.status] || 0) + 1;
      const total = rows.length;
      const completed = counts.done + counts.late;
      const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

      return `<div class="tracker-summary">
        <div class="tracker-summary__bar">
          <div class="tracker-summary__fill" style="width:${pct}%"></div>
        </div>
        <div class="tracker-summary__counts">
          <span class="tracker-summary__count tracker-summary__count--done">${counts.done} Done</span>
          ${counts.late > 0 ? `<span class="tracker-summary__count tracker-summary__count--late">${counts.late} Late</span>` : ''}
          <span class="tracker-summary__count tracker-summary__count--overdue">${counts.overdue} Overdue</span>
          <span class="tracker-summary__count tracker-summary__count--upcoming">${counts.upcoming} Upcoming</span>
          ${counts.cooldown > 0 ? `<span class="tracker-summary__count tracker-summary__count--cooldown">${counts.cooldown} Cooldown</span>` : ''}
          ${counts.skipped > 0 ? `<span class="tracker-summary__count tracker-summary__count--skipped">${counts.skipped} Skipped</span>` : ''}
        </div>
      </div>`;
    }

    // ── Category filter dropdown ──

    function renderCategoryFilter() {
      const catEntries = Object.entries(cats);
      if (catEntries.length === 0) return '';
      let html = `<select class="tracker-select" id="categoryFilter">
        <option value="">All Categories</option>`;
      for (const [key, cat] of catEntries) {
        const sel = activeCategory === key ? ' selected' : '';
        html += `<option value="${esc(key)}"${sel}>${esc(cat.icon || '')} ${esc(cat.label || cat.name)}</option>`;
      }
      html += `</select>`;
      return html;
    }

    // ── Status filter dropdown ──

    function renderStatusFilter() {
      const options = [
        { value: '', label: 'All Statuses' },
        { value: 'done', label: 'Done' },
        { value: 'late', label: 'Done Late' },
        { value: 'overdue', label: 'Overdue' },
        { value: 'upcoming', label: 'Upcoming' },
        { value: 'cooldown', label: 'Cooldown' },
        { value: 'skipped', label: 'Skipped' }
      ];
      let html = `<select class="tracker-select" id="statusFilter">`;
      for (const opt of options) {
        const sel = activeStatus === (opt.value || null) ? ' selected' : '';
        html += `<option value="${opt.value}"${sel}>${opt.label}</option>`;
      }
      html += `</select>`;
      return html;
    }

    // ── Weekly view ──

    function renderWeeklyView() {
      const { start, end } = currentRange();
      const rows = collectRows('weekly', start, end);
      const skipped = start > today ? [] : findSkippedTasks('weekly', start, end, rows);
      const allRows = [...rows, ...skipped];
      const filtered = filterRows(allRows);

      // Sort: overdue first, then upcoming, then done/late, then skipped
      const statusOrder = { overdue: 0, upcoming: 1, late: 2, done: 3, cooldown: 4, skipped: 5 };
      filtered.sort((a, b) => (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9));

      let html = renderSummary(filtered);

      if (filtered.length === 0) {
        html += renderEmptyState('📋', 'No weekly tasks', 'No weekly tasks match the current filters.');
        return html;
      }

      html += `<div class="tracker-rows">`;
      for (const row of filtered) {
        html += renderRow(row);
      }
      html += `</div>`;
      return html;
    }

    // ── Monthly view ──

    function renderMonthlyView() {
      const { start, end } = currentRange();
      const rows = collectRows('monthly', start, end);
      const skipped = start > today ? [] : findSkippedTasks('monthly', start, end, rows);
      const allRows = [...rows, ...skipped];
      const filtered = filterRows(allRows);

      if (filtered.length === 0) {
        let html = renderSummary(filtered);
        html += renderEmptyState('📋', 'No monthly tasks', 'No monthly tasks match the current filters.');
        return html;
      }

      // Group by week start date key for proper sorting
      const weekGroups = {};
      const todayWeekStart = weekStart(today);
      for (const row of filtered) {
        const wkStart = row.dateKey ? weekStart(row.dateKey) : '0000-00-00';
        const wkLabel = row.dateKey
          ? `Week of ${formatDateShort(weekStart(row.dateKey))}`
          : 'Unscheduled';
        if (!weekGroups[wkStart]) weekGroups[wkStart] = { label: wkLabel, rows: [], isCurrent: wkStart === todayWeekStart };
        weekGroups[wkStart].rows.push(row);
      }

      // Sort: current week first, then future weeks, then past weeks (descending)
      const sortedWeeks = Object.keys(weekGroups).sort((a, b) => {
        const aIsCurrent = a === todayWeekStart ? 1 : 0;
        const bIsCurrent = b === todayWeekStart ? 1 : 0;
        if (aIsCurrent !== bIsCurrent) return bIsCurrent - aIsCurrent; // current first
        const aIsFuture = a > todayWeekStart ? 1 : 0;
        const bIsFuture = b > todayWeekStart ? 1 : 0;
        if (aIsFuture !== bIsFuture) return bIsFuture - aIsFuture; // future before past
        if (aIsFuture) return a < b ? -1 : 1; // future: ascending
        return a > b ? -1 : 1; // past: descending (most recent first)
      });

      let html = renderSummary(filtered);

      for (const wkKey of sortedWeeks) {
        const group = weekGroups[wkKey];
        const statusOrder = { overdue: 0, upcoming: 1, late: 2, done: 3, cooldown: 4, skipped: 5 };
        group.rows.sort((a, b) => (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9));

        const currentClass = group.isCurrent ? ' tracker-week-group--current' : '';
        const currentTag = group.isCurrent ? ' <span class="tracker-week-current-tag">This Week</span>' : '';

        html += `<div class="tracker-week-group${currentClass}">
          <div class="tracker-week-label">${group.label}${currentTag}</div>
          <div class="tracker-rows">`;
        for (const row of group.rows) {
          html += renderRow(row);
        }
        html += `</div></div>`;
      }

      return html;
    }

    // ── Period navigation label ──

    function renderPeriodLabel() {
      const { start, end } = currentRange();
      if (activeView === 'weekly') {
        return `${formatDateShort(start)} – ${formatDateShort(end)}`;
      }
      const anchor = monthStart(periodAnchor);
      const monthName = new Date(anchor + 'T00:00:00Z').toLocaleDateString('en-US', { month: 'long', year: 'numeric', timeZone: 'UTC' });
      return monthName;
    }

    // ── Full render ──

    function render() {
      const weeklyActive = activeView === 'weekly' ? ' tracker-tab--active' : '';
      const monthlyActive = activeView === 'monthly' ? ' tracker-tab--active' : '';

      let html = `
        <div class="tracker-tabs">
          <button class="tracker-tab${weeklyActive}" data-view="weekly" type="button">Weekly</button>
          <button class="tracker-tab${monthlyActive}" data-view="monthly" type="button">Monthly</button>
        </div>
        <div class="tracker-period">
          <div class="tracker-period__row">
            <button class="tracker-period__nav" data-period-nav="prev" type="button" aria-label="Previous"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
            <span class="tracker-period__label">${renderPeriodLabel()}</span>
            <button class="tracker-period__nav" data-period-nav="next" type="button" aria-label="Next"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
          </div>
          <button class="tracker-period__today" data-period-nav="today" type="button">Today</button>
        </div>
        ${renderPersonFilter(people, activePerson)}
        <div class="tracker-filters">
          ${renderCategoryFilter()}
          ${renderStatusFilter()}
        </div>
        <div class="tracker-content">
          ${activeView === 'weekly' ? renderWeeklyView() : renderMonthlyView()}
        </div>`;

      main.innerHTML = html;
      applyDataColors(main);
      bindEvents();
    }

    // ── Event binding ──

    function saveTrackerPrefs() {
      if (!linkedPerson) return;
      const prefs = { ...(linkedPerson.prefs || {}), tracker: { view: activeView, personFilter: activePerson, category: activeCategory, status: activeStatus } };
      linkedPerson.prefs = prefs;
      const { id, ...data } = linkedPerson;
      writePerson(id, data);
    }

    function bindEvents() {
      // View tabs
      for (const tab of main.querySelectorAll('.tracker-tab')) {
        tab.addEventListener('click', () => {
          activeView = tab.dataset.view;
          periodAnchor = today;  // Reset to current period on tab switch
          saveTrackerPrefs();
          render();
        });
      }

      // Person filter
      for (const pill of main.querySelectorAll('.person-pill')) {
        pill.addEventListener('click', () => {
          activePerson = pill.dataset.personId || null;
          saveTrackerPrefs();
          render();
        });
      }

      // Category filter
      const catSelect = main.querySelector('#categoryFilter');
      if (catSelect) {
        catSelect.addEventListener('change', () => {
          activeCategory = catSelect.value || null;
          saveTrackerPrefs();
          render();
        });
      }

      // Status filter
      const statusSelect = main.querySelector('#statusFilter');
      if (statusSelect) {
        statusSelect.addEventListener('change', () => {
          activeStatus = statusSelect.value || null;
          saveTrackerPrefs();
          render();
        });
      }

      // Period navigation buttons
      for (const btn of main.querySelectorAll('[data-period-nav]')) {
        btn.addEventListener('click', () => {
          const nav = btn.dataset.periodNav;
          if (nav === 'prev') shiftPeriod(-1);
          else if (nav === 'next') shiftPeriod(1);
          else if (nav === 'today') snapToToday();
        });
      }

      // Long-press on tracker rows to open detail sheet
      for (const row of main.querySelectorAll('.tracker-row[data-entry-key]')) {
        if (!row.dataset.entryKey) continue; // skip skipped tasks (no entry)
        let pressTimer = null;
        let didLongPress = false;

        row.addEventListener('pointerdown', () => {
          didLongPress = false;
          pressTimer = setTimeout(() => {
            didLongPress = true;
            openTaskSheet(row.dataset.entryKey, row.dataset.dateKey);
          }, settings?.longPressMs ?? 500);
        });

        row.addEventListener('pointerup', () => { clearTimeout(pressTimer); });
        row.addEventListener('pointerleave', () => { clearTimeout(pressTimer); });
        row.addEventListener('contextmenu', (e) => e.preventDefault());
      }
    }

    // ── Task detail bottom sheet (long-press) ──

    const taskSheetMount = document.getElementById('taskSheetMount');

    function openTaskSheet(entryKey, dateKey) {
      if (!entryKey) return;

      // Find the entry in schedule
      const dayEntries = schedule[dateKey];
      const entry = dayEntries?.[entryKey];
      if (!entry) return;

      const task = tasks[entry.taskId] || { name: 'Unknown', estMin: 0, difficulty: 'medium' };
      const person = people.find(p => p.id === entry.ownerId);
      const cat = task.category ? cats[task.category] : null;
      const completed = !!comps[entryKey];
      const pts = basePoints(task, settings?.difficultyMultipliers);
      const completion = comps[entryKey];
      const currentOverride = completion?.pointsOverride ?? entry.pointsOverride ?? null;

      const sheetContent = renderTaskDetailSheet({
        entryKey,
        entry: { ...entry, dateKey },
        task,
        person,
        category: cat,
        completed,
        points: { possible: pts },
        sliderMin: settings?.sliderMin ?? 0,
        sliderMax: settings?.sliderMax ?? 150,
        currentOverride: currentOverride != null ? currentOverride : 100,
        gradePreview: null,
        people,
        showDelegate: true,
        showMove: true,
        showEdit: true,
        isEvent: !!cat?.isEvent
      });

      taskSheetMount.innerHTML = renderBottomSheet(sheetContent);
      applyDataColors(taskSheetMount);

      requestAnimationFrame(() => {
        const overlay = document.getElementById('bottomSheet');
        if (overlay) overlay.classList.add('active');
      });

      bindTaskSheetEvents(entryKey, dateKey);
    }

    async function closeTaskSheet() {
      if (pendingSliderOverride) {
        const { entryKey, dateKey: sliderDateKey, value } = pendingSliderOverride;
        const override = value === 100 ? null : value;
        pendingSliderOverride = null;
        await multiUpdate({ [`schedule/${sliderDateKey}/${entryKey}/pointsOverride`]: override });
        const dayEntries = schedule[sliderDateKey] || {};
        if (dayEntries[entryKey]) dayEntries[entryKey].pointsOverride = override;
        if (comps[entryKey]) {
          comps[entryKey].pointsOverride = override;
          await writeCompletion(entryKey, comps[entryKey]);
        }
      }
      const overlay = document.getElementById('bottomSheet');
      if (overlay) {
        overlay.classList.remove('active');
        setTimeout(() => { taskSheetMount.innerHTML = ''; render(); }, 300);
      }
    }

    function bindTaskSheetEvents(entryKey, dateKey) {
      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => {
        if (e.target === overlay) closeTaskSheet();
      });

      // Toggle complete from sheet
      document.getElementById('sheetToggleComplete')?.addEventListener('click', async () => {
        await closeTaskSheet();
        await toggleCompletion(entryKey, dateKey);
      });

      // Complete without penalty (full credit for late task)
      document.getElementById('sheetCompleteNoPenalty')?.addEventListener('click', async () => {
        await closeTaskSheet();
        await toggleCompletion(entryKey, dateKey);
      });

      // Points slider — stores pending override, saved on sheet close or toggle-complete
      const slider = document.getElementById('pointsSlider');
      if (slider) {
        slider.addEventListener('input', () => {
          const val = parseInt(slider.value, 10);
          const basePts = parseInt(slider.dataset.basePts, 10);
          const earnedPts = Math.round(basePts * (val / 100));
          const label = document.getElementById('sliderValueLabel');
          if (label) label.textContent = `${val}% (${earnedPts}pt)`;
          pendingSliderOverride = { entryKey, dateKey, value: val };
        });

        const resetBtn = document.getElementById('sliderReset');
        if (resetBtn) {
          resetBtn.addEventListener('click', () => {
            slider.value = 100;
            slider.dispatchEvent(new Event('input'));
          });
        }
      }

      // Delegate
      document.getElementById('sheetDelegate')?.addEventListener('click', () => {
        document.getElementById('delegatePanel')?.classList.toggle('is-hidden');
      });

      let pendingDelegateOwnerId = null;
      document.querySelectorAll('#delegatePanel .chip--selectable').forEach(chip => {
        chip.addEventListener('click', async () => {
          const newOwnerId = chip.dataset.personId;
          if (!newOwnerId) return;

          const moveToggle = document.getElementById('delegateMoveToggle');
          if (moveToggle?.checked) {
            pendingDelegateOwnerId = newOwnerId;
            document.querySelectorAll('#delegatePanel .chip--selectable').forEach(c => c.classList.remove('chip--active'));
            chip.classList.add('chip--active');
            const picker = document.getElementById('delegateMoveDatePicker');
            if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
            return;
          }

          const dayEntries = schedule[dateKey];
          const entry = dayEntries?.[entryKey];
          if (!entry) return;
          const originalPerson = people.find(p => p.id === entry.ownerId);
          const newEntry = { ...entry, ownerId: newOwnerId, delegatedFromName: originalPerson?.name || '?' };
          const updates = {};
          updates[`schedule/${dateKey}/${entryKey}`] = null;
          const newKey = `sched_${Date.now()}_delegate`;
          updates[`schedule/${dateKey}/${newKey}`] = newEntry;
          if (comps[entryKey]) {
            updates[`completions/${entryKey}`] = null;
            updates[`completions/${newKey}`] = comps[entryKey];
          }
          await multiUpdate(updates);
          closeTaskSheet();
          await loadData(); render();
        });
      });

      // Delegate+Move date picker
      document.getElementById('delegateMoveDatePicker')?.addEventListener('change', async (e) => {
        const newDate = e.target.value;
        if (!newDate || !pendingDelegateOwnerId) return;
        const dayEntries = schedule[dateKey];
        const entry = dayEntries?.[entryKey];
        if (!entry) return;
        const originalPerson = people.find(p => p.id === entry.ownerId);
        const newEntry = { ...entry, ownerId: pendingDelegateOwnerId, delegatedFromName: originalPerson?.name || '?', movedFromDate: dateKey };
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        const newKey = `sched_${Date.now()}_delegate_moved`;
        updates[`schedule/${newDate}/${newKey}`] = newEntry;
        if (comps[entryKey]) {
          updates[`completions/${entryKey}`] = null;
          updates[`completions/${newKey}`] = comps[entryKey];
        }
        await multiUpdate(updates);
        pendingDelegateOwnerId = null;
        closeTaskSheet();
        await loadData(); render();
      });

      // Move — directly open date picker
      document.getElementById('sheetMove')?.addEventListener('click', () => {
        const picker = document.getElementById('moveDatePicker');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      document.getElementById('moveDatePicker')?.addEventListener('change', async (e) => {
        const newDate = e.target.value;
        if (!newDate) return;
        const dayEntries = schedule[dateKey];
        const entry = dayEntries?.[entryKey];
        if (!entry) return;

        const newEntry = { ...entry, movedFromDate: dateKey };
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        const newKey = `sched_${Date.now()}_moved`;
        updates[`schedule/${newDate}/${newKey}`] = newEntry;
        if (comps[entryKey]) {
          updates[`completions/${entryKey}`] = null;
          updates[`completions/${newKey}`] = comps[entryKey];
        }
        await multiUpdate(updates);
        closeTaskSheet();
        await loadData(); render();
      });

      document.getElementById('moveSkip')?.addEventListener('click', async () => {
        const updates = {};
        updates[`schedule/${dateKey}/${entryKey}`] = null;
        if (comps[entryKey]) updates[`completions/${entryKey}`] = null;
        await multiUpdate(updates);
        closeTaskSheet();
        await loadData(); render();
      });

      // Notes inline editing
      const notesAddBtn = document.getElementById('notesAddBtn');
      const notesEditBtn = document.getElementById('notesEditBtn');
      const notesCancelBtn = document.getElementById('notesCancelBtn');
      const notesSaveBtn = document.getElementById('notesSaveBtn');
      const notesEditor = document.getElementById('notesEditor');
      const notesDisplay = document.getElementById('notesDisplay');
      const notesInput = document.getElementById('notesInput');

      function openNotesEditor() {
        notesEditor?.classList.remove('is-hidden');
        notesDisplay?.classList.add('is-hidden');
        notesAddBtn?.classList.add('is-hidden');
        if (notesInput) notesInput.focus();
      }

      function closeNotesEditor() {
        notesEditor?.classList.add('is-hidden');
        const originalText = document.getElementById('notesText')?.textContent?.trim() || '';
        if (notesInput) notesInput.value = originalText;
        notesDisplay?.classList.toggle('is-hidden', !originalText);
        notesAddBtn?.classList.toggle('is-hidden', !!originalText);
      }

      notesAddBtn?.addEventListener('click', openNotesEditor);
      notesEditBtn?.addEventListener('click', openNotesEditor);
      notesCancelBtn?.addEventListener('click', closeNotesEditor);

      notesSaveBtn?.addEventListener('click', async () => {
        const noteValue = notesInput?.value.trim() || null;
        const ek = notesSaveBtn.dataset.entryKey;
        const dk = notesSaveBtn.dataset.dateKey;
        if (ek && dk) {
          await multiUpdate({ [`schedule/${dk}/${ek}/notes`]: noteValue });
          if (schedule[dk]?.[ek]) schedule[dk][ek].notes = noteValue;
        }
        const notesText = document.getElementById('notesText');
        if (notesText) notesText.textContent = noteValue || '';
        closeNotesEditor();
      });

      // Edit task
      document.getElementById('sheetEdit')?.addEventListener('click', () => {
        const taskId = document.getElementById('sheetEdit').dataset.taskId;
        const overlay = document.getElementById('bottomSheet');
        if (overlay) overlay.classList.remove('active');
        setTimeout(() => { openEditTaskSheet(taskId); }, 320);
      });
    }

    // ── Edit task sheet ──

    function openEditTaskSheet(taskId) {
      const task = tasks[taskId];
      if (!task) return;
      const catsArr = Object.entries(cats).map(([key, c]) => ({ key, ...c }));
      const sheetContent = renderEditTaskSheet(taskId, task, catsArr, people, trkRewards);
      taskSheetMount.innerHTML = renderBottomSheet(sheetContent);
      applyDataColors(taskSheetMount);
      initOwnerChips('et_owners');

      requestAnimationFrame(() => {
        const overlay = document.getElementById('bottomSheet');
        if (overlay) overlay.classList.add('active');
      });

      const overlay = document.getElementById('bottomSheet');
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) closeTaskSheet(); });
      document.getElementById('et_cancel')?.addEventListener('click', closeTaskSheet);

      // Assignment mode toggle
      const modeGroup = document.getElementById('et_assignMode');
      if (modeGroup) {
        for (const btn of modeGroup.querySelectorAll('.admin-mode-btn')) {
          btn.addEventListener('click', () => {
            modeGroup.querySelectorAll('.admin-mode-btn').forEach(b => b.classList.remove('admin-mode-btn--active'));
            btn.classList.add('admin-mode-btn--active');
          });
        }
      }

      // Rotation change — show/hide dedicated day vs date
      document.getElementById('et_rotation')?.addEventListener('change', (e) => {
        const rot = e.target.value;
        const group = document.getElementById('et_dedicatedDayGroup');
        const daySelect = document.getElementById('et_daySelect');
        const dateRow = document.getElementById('et_dedicatedDateRow');
        const label = document.getElementById('et_dedicatedDayLabel');
        const catOpt = document.getElementById('et_category')?.selectedOptions[0];
        const isEvent = catOpt?.dataset.event === '1';
        if (rot === 'daily') {
          group.classList.add('is-hidden');
        } else {
          group.classList.remove('is-hidden');
          const eventBtn = label?.querySelector('#et_eventDateBtn');
          const btnHtml = eventBtn ? eventBtn.outerHTML : '';
          if (rot === 'once') {
            daySelect.classList.add('is-hidden');
            dateRow.classList.toggle('is-hidden', isEvent);
            label.innerHTML = (isEvent ? 'Event Date ' : 'Scheduled Date ') + btnHtml;
          } else {
            daySelect.classList.remove('is-hidden');
            dateRow.classList.add('is-hidden');
            label.innerHTML = 'Dedicated Day ' + btnHtml;
          }
          label?.querySelector('#et_eventDateBtn')?.addEventListener('click', () => {
            const picker = document.getElementById('et_eventDate');
            if (picker) { try { picker.showPicker(); } catch(e2) { picker.click(); } }
          });
        }
      });

      // Category change — show/hide event date button
      document.getElementById('et_category')?.addEventListener('change', (e) => {
        const isEvent = e.target.selectedOptions[0]?.dataset.event === '1';
        const eventBtn = document.getElementById('et_eventDateBtn');
        if (eventBtn) eventBtn.classList.toggle('is-hidden', !isEvent);
        const eventTimeGroup = document.getElementById('et_eventTimeGroup');
        if (eventTimeGroup) eventTimeGroup.classList.toggle('is-hidden', !isEvent);
        const notesGroup = document.getElementById('et_notesGroup');
        if (notesGroup) notesGroup.classList.toggle('is-hidden', !isEvent);
        if (isEvent) {
          const rotSelect = document.getElementById('et_rotation');
          if (rotSelect) { rotSelect.value = 'once'; rotSelect.dispatchEvent(new Event('change')); }
        }
      });

      // Event date icon
      document.getElementById('et_eventDateBtn')?.addEventListener('click', () => {
        const picker = document.getElementById('et_eventDate');
        if (picker) { try { picker.showPicker(); } catch(e) { picker.click(); } }
      });

      // Exempt / Bounty chip toggles
      document.getElementById('et_exempt')?.addEventListener('click', (e) => e.currentTarget.classList.toggle('chip--active'));
      document.getElementById('et_bountyToggle')?.addEventListener('click', (e) => {
        e.currentTarget.classList.toggle('chip--active');
        const bf = document.getElementById('et_bountyFields');
        if (bf) bf.classList.toggle('is-hidden', !e.currentTarget.classList.contains('chip--active'));
        if (e.currentTarget.classList.contains('chip--active')) document.getElementById('et_exempt')?.classList.add('chip--active');
      });
      for (const btn of document.querySelectorAll('#et_bountyType .segmented-btn')) {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#et_bountyType .segmented-btn').forEach(b => b.classList.remove('segmented-btn--active'));
          btn.classList.add('segmented-btn--active');
          document.getElementById('et_bountyPointsField').classList.toggle('is-hidden', btn.dataset.value !== 'points');
          document.getElementById('et_bountyRewardField').classList.toggle('is-hidden', btn.dataset.value !== 'reward');
        });
      }

      document.getElementById('et_save')?.addEventListener('click', async () => {
        const name = document.getElementById('et_name')?.value.trim();
        if (!name) { document.getElementById('et_name')?.focus(); return; }
        const owners = getSelectedOwners('et_owners');
        const rotation = document.getElementById('et_rotation')?.value || task.rotation;
        const activeMode = modeGroup?.querySelector('.admin-mode-btn--active')?.dataset.mode || 'rotate';
        const dayVal = document.getElementById('et_daySelect')?.value;
        const dedicatedDay = (rotation !== 'once' && dayVal !== '' && dayVal != null) ? parseInt(dayVal, 10) : null;
        const dedicatedDate = rotation === 'once' ? (document.getElementById('et_dedicatedDate')?.value || null) : null;
        const cooldown = document.getElementById('et_cooldown')?.value;
        const catOpt = document.getElementById('et_category')?.selectedOptions[0];
        const catIsEvent = catOpt?.dataset.event === '1';
        const eventDate = document.getElementById('et_eventDate')?.value;
        const effectiveDedicatedDate = catIsEvent && eventDate ? eventDate : dedicatedDate;

        const eventTime = catIsEvent ? (document.getElementById('et_eventTime')?.value || null) : null;
        const notes = catIsEvent ? (document.getElementById('et_notes')?.value.trim() || null) : null;
        const updated = {
          ...task, name, rotation,
          difficulty: document.getElementById('et_difficulty')?.value || task.difficulty,
          timeOfDay: document.getElementById('et_timeOfDay')?.value || task.timeOfDay,
          estMin: (v => isNaN(v) ? 10 : v)(parseInt(document.getElementById('et_estMin')?.value, 10)),
          category: document.getElementById('et_category')?.value || task.category,
          owners, ownerAssignmentMode: activeMode, dedicatedDay,
          dedicatedDate: effectiveDedicatedDate,
          eventTime,
          notes,
          cooldownDays: cooldown ? parseInt(cooldown, 10) : null,
          exempt: document.getElementById('et_exempt')?.classList.contains('chip--active') || false
        };
        const isBounty = document.getElementById('et_bountyToggle')?.classList.contains('chip--active');
        if (isBounty) {
          const bountyType = document.querySelector('#et_bountyType .segmented-btn--active')?.dataset?.value || 'points';
          updated.bounty = {
            type: bountyType,
            amount: bountyType === 'points' ? (parseInt(document.getElementById('et_bountyAmount')?.value) || 50) : null,
            rewardId: bountyType === 'reward' ? (document.getElementById('et_bountyReward')?.value || null) : null
          };
          updated.exempt = true;
        } else {
          updated.bounty = null;
        }
        await writeTask(taskId, updated);
        tasks[taskId] = updated;
        closeTaskSheet();
        render();
      });
    }

    // ── Completion toggle (from sheet) ──

    async function toggleCompletion(entryKey, dateKey) {
      if (!entryKey) return;
      const wasComplete = !!comps[entryKey];

      if (wasComplete) {
        delete comps[entryKey];
        await removeCompletion(entryKey);
      } else {
        const record = {
          completedAt: firebase.database.ServerValue.TIMESTAMP,
          completedBy: 'tracker'
        };
        const pendingVal = pendingSliderOverride?.entryKey === entryKey ? pendingSliderOverride.value : null;
        const savedVal = (schedule[dateKey] || {})[entryKey]?.pointsOverride;
        const overrideVal = pendingVal ?? savedVal ?? null;
        if (overrideVal != null && overrideVal !== 100) {
          record.pointsOverride = overrideVal;
        }
        pendingSliderOverride = null;
        comps[entryKey] = record;
        await writeCompletion(entryKey, record);
      }

      render();
    }

    // ── Show content ──
    document.getElementById('loadingState').style.display = 'none';
    const main = document.getElementById('mainContent');
    main.style.display = '';

    // ── Swipe to change period ──
    // Bound once to the stable `main` element (its innerHTML is replaced per
    // render, but the node itself persists). Do NOT move this into bindEvents
    // or listeners will stack on every render.
    let swipeStartX = 0;
    let swipeStartY = 0;
    main.addEventListener('touchstart', (e) => {
      if (e.target.closest('#taskSheetMount') || e.target.closest('.bottom-sheet')) return;
      swipeStartX = e.touches[0].clientX;
      swipeStartY = e.touches[0].clientY;
    }, { passive: true });
    main.addEventListener('touchend', (e) => {
      if (e.target.closest('#taskSheetMount') || e.target.closest('.bottom-sheet')) return;
      const dx = e.changedTouches[0].clientX - swipeStartX;
      const dy = e.changedTouches[0].clientY - swipeStartY;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
        shiftPeriod(dx < 0 ? 1 : -1);
      }
    }, { passive: true });

    render();
  </script>
</body>
</html>
